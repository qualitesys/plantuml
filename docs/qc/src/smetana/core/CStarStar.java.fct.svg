@startuml
!pragma layout smetana
:return new CStarStar<O >(access);;
stop
start
note right
constructor CStarStar(ACCESS<O> access)
end note
:this.access=access;;
end
start
note right
O star()
end note
:return access.get();;
stop
end
start
note right
void star(O data)
end note
:access.set(data);;
end
@enduml

