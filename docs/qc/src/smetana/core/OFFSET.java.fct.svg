@startuml
!pragma layout smetana
start
note right
intgetSign()
end note
:return sign;;
stop
end
start
note right
constructor OFFSET(Stringfield)
end note
:this.field=field;;
:this.sign=1;;
end
start
note right
constructor OFFSET(intsign)
end note
:this.field=null ;;
:this.sign=sign;;
end
start
note right
StringtoString()
end note
if (field==null ) then (yes) 
:return "["+sign+"]";;
stop
endif 
:return "["+field+"]";;
stop
end
start
note right
OFFSETexternalHolder()
end note
:return new OFFSET(-1);;
stop
end
start
note right
OFFSETzero()
end note
:return new OFFSET(0);;
stop
end
start
note right
OFFSETnegative()
end note
:return this;;
stop
end
start
note right
StringgetField()
end note
:return field;;
stop
