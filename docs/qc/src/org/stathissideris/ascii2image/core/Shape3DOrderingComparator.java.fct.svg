@startuml
!pragma layout smetana
start
note right
int compare(Object object1,Object object2)
end note
if (!(object1 instanceof DiagramShape )||!(object2 instanceof DiagramShape )) then (yes) 
:throw new RuntimeException("This comparator can only compare DiagramShapeS");;
stop
endif 
:DiagramShape shape1=(DiagramShape )object1;;
:DiagramShape shape2=(DiagramShape )object2;;
:double y1=shape1.makeIntoPath().getBounds()
.getCenterY();;
:double y2=shape2.makeIntoPath().getBounds()
.getCenterY();;
if (y1>y2) then (yes) 
:return -1;;
stop
endif 
if (y1<y2) then (yes) 
:return 1;;
stop
endif 
:return 0;;
stop
end
@enduml

