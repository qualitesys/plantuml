@startuml
!pragma layout smetana
start
note right
void startElement(String nsURI,String strippedName,
String tagName,Attributes attributes)
end note
if (tagName.equalsIgnoreCase("title")) then (yes) 
:title=true;;
endif 
if (tagName.equalsIgnoreCase("url")) then (yes) 
:url=true;;
endif 
end
start
note right
void characters(char[] ch,int start,int length)
end note
if (title) then (yes) 
:System.out.println("Title: "+new String(ch,
start,length));;
:title=false;;
else if (url) then (yes) 
:System.out.println("Url: "+new String(ch,
start,length));;
:url=false;;
endif 
end
start
note right
void list()
end note
:XMLReader parser=XMLReaderFactory.createXMLReader("org.apache.crimson.parser.XMLReaderImpl");;
:parser.setContentHandler(new HowToHandler());;
:parser.parse("howto.xml");;
end
start
note right
void main(String[] args)
end note
:new DocBookConverter().list();;
end
@enduml

