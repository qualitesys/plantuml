@startuml
!pragma layout smetana
start
note right
constructor BlockPair(byte[]data,byte[]errorCorrection)
end note
:dataBytes=data;;
:errorCorrectionBytes=errorCorrection;;
end
start
note right
byte[]getDataBytes()
end note
:return dataBytes;;
stop
end
start
note right
byte[]getErrorCorrectionBytes()
end note
:return errorCorrectionBytes;;
stop
end
@enduml

