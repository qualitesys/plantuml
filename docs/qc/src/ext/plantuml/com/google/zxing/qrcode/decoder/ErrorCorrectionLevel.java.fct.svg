@startuml
!pragma layout smetana
start
note right
constructor ErrorCorrectionLevel(intordinal,
intbits,Stringname)
end note
:this.ordinal=ordinal;;
:this.bits=bits;;
:this.name=name;;
end
start
note right
intordinal()
end note
:return ordinal;;
stop
end
start
note right
intgetBits()
end note
:return bits;;
stop
end
start
note right
StringgetName()
end note
:return name;;
stop
end
start
note right
StringtoString()
end note
:return name;;
stop
end
start
note right
ErrorCorrectionLevelforBits(intbits)
end note
if (bits<0||bits>=FOR_BITS.length) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:return FOR_BITS[bits];;
stop
end
@enduml

