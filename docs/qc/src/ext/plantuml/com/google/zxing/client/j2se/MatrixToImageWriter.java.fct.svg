@startuml
!pragma layout smetana
start
note right
constructor MatrixToImageWriter()
end note
end
start
note right
BufferedImagetoBufferedImage(BitMatrixmatrix,
intfore,intback)
end note
:intwidth=matrix.getWidth();;
:intheight=matrix.getHeight();;
:BufferedImageimage=new BufferedImage(width,
height,BufferedImage.TYPE_INT_ARGB);;
:image.setRGB(x,y,matrix.get(x,y)? fore:back);;
:return image;;
stop
end
@enduml

