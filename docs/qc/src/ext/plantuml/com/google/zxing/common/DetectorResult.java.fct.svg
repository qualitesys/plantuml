@startuml
!pragma layout smetana
start
note right
constructor DetectorResult(BitMatrix bits,
ResultPoint[] points)
end note
:this.bits=bits;;
:this.points=points;;
end
start
note right
BitMatrix getBits()
end note
:return bits;;
stop
end
start
note right
ResultPoint[] getPoints()
end note
:return points;;
stop
end
@enduml

