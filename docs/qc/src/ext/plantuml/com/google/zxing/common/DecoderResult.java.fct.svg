@startuml
!pragma layout smetana
start
note right
constructor DecoderResult(byte[]rawBytes,
Stringtext,VectorbyteSegments,ErrorCorrectionLevelecLevel)
end note
if (rawBytes==null &&text==null ) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:this.rawBytes=rawBytes;;
:this.text=text;;
:this.byteSegments=byteSegments;;
:this.ecLevel=ecLevel;;
end
start
note right
byte[]getRawBytes()
end note
:return rawBytes;;
stop
end
start
note right
StringgetText()
end note
:return text;;
stop
end
start
note right
VectorgetByteSegments()
end note
:return byteSegments;;
stop
end
start
note right
ErrorCorrectionLevelgetECLevel()
end note
:return ecLevel;;
stop
end
@enduml

