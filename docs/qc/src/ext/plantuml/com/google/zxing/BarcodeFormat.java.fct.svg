@startuml
!pragma layout smetana
start
note right
constructor BarcodeFormat(String name)
end note
:this.name=name;;
:VALUES.put(name,this);;
end
start
note right
String getName()
end note
:return name;;
stop
end
start
note right
String toString()
end note
:return name;;
stop
end
start
note right
BarcodeFormat valueOf(String name)
end note
if (name==null ||name.length()==0) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:BarcodeFormat format=(BarcodeFormat )VALUES.get(name);;
if (format==null ) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:return format;;
stop
end
@enduml

