@startuml
!pragma layout smetana
start
note right
constructor BarcodeFormat(Stringname)
end note
:this.name=name;;
:VALUES.put(name,this);;
end
start
note right
StringgetName()
end note
:return name;;
stop
end
start
note right
StringtoString()
end note
:return name;;
stop
end
start
note right
BarcodeFormatvalueOf(Stringname)
end note
if (name==null ||name.length()==0) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:BarcodeFormatformat=(BarcodeFormat)VALUES.get(name);;
if (format==null ) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:return format;;
stop
end
@enduml

