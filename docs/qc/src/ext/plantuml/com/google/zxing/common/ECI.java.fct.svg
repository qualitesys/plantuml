@startuml
!pragma layout smetana
start
note right
constructor ECI(intvalue)
end note
:this.value=value;;
end
start
note right
intgetValue()
end note
:return value;;
stop
end
start
note right
ECIgetECIByValue(intvalue)
end note
if (value<0||value>999999) then (yes) 
:throw new IllegalArgumentException("Bad ECI value: "+
value);;
stop
endif 
if (value<900) then (yes) 
:return CharacterSetECI.getCharacterSetECIByValue(value);;
stop
endif 
:return null ;;
stop
end
@enduml

