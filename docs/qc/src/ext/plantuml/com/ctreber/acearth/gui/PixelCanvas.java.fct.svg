@startuml
!pragma layout smetana
start
note right
constructor PixelCanvas(intpWidth,intpHeight)
end note
:fImageWidth=pWidth;;
:fImageHeight=pHeight;;
:fEarthImage2=new BufferedImage(fImageWidth,
fImageHeight,BufferedImage.TYPE_INT_RGB);;
end
start
note right
Graphics2DgetGraphics2D()
end note
:return fEarthImage2.createGraphics();;
stop
end
start
note right
void setPixel(intpX,intpY,intpA,intpR,intpG,
intpB)
end note
:setPixel(pX,pY,new Color(pR,pG,pB,pA));;
end
start
note right
void setPixel(intpX,intpY,ColorpColor)
end note
:fEarthImage2.setRGB(pX,pY,pColor.getRGB());;
end
start
note right
intgetImageWidth()
end note
:return fImageWidth;;
stop
end
start
note right
intgetImageHeight()
end note
:return fImageHeight;;
stop
end
start
note right
void saveToImage(OutputStreamos)
end note
:SImageIO.write(fEarthImage2,"png",os);;
end
@enduml

