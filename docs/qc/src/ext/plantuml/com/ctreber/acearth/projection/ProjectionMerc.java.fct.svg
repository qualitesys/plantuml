.4141" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="335.5" x2="335.5" y1="887.9805" y2="910.5469"/><polygon fill="#181818" points="331.5,900.5469,335.5,910.5469,339.5,900.5469,335.5,904.5469" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="335.5" x2="335.5" y1="958.4844" y2="978.4844"/><polygon fill="#181818" points="331.5,968.4844,335.5,978.4844,339.5,968.4844,335.5,972.4844" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="335.5" x2="335.5" y1="1063.0508" y2="1085.6172"/><polygon fill="#181818" points="331.5,1075.6172,335.5,1085.6172,339.5,1075.6172,335.5,1079.6172" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="335.5" x2="335.5" y1="1119.5859" y2="1139.5859"/><polygon fill="#181818" points="331.5,1129.5859,335.5,1139.5859,339.5,1129.5859,335.5,1133.5859" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[b7bb6c596aa9ec14b3fb61971d28a592]
@startuml
!pragma layout smetana
start
note right
boolean isVisible(Point3D pPoint)
end note
:return true;;
stop
end
start
note right
Coordinate getLocation(int pX,int pY)
end note
:final Coordinate lRaw=new Coordinate(2*(Math.atan(Math.exp(inverseFinalizeY(pY)))-Math.PI/4),
inverseFinalizeX(pX));;
:return rotateReverse(lRaw.getPoint3DRads())
.getCoordinate();;
stop
end
start
note right
void setScale()
end note
:fScale=fViewMagnification*fImageWidth/(2*Math.PI);;
end
start
note right
double projectX(double pX,double pZ)
end note
:return Math.atan2(pX,pZ);;
stop
end
start
note right
double inverseProjectX(double pX)
end note
:return Math.sin(pX);;
stop
end
start
note right
double projectY(double pY)
end note
:return (pY>=0.9999999999)? 1e6:(pY<=-0.9999999999)? -1e6:Math.log(Math.tan(Math.asin(pY)/2+
Math.PI/4));;
stop
end
start
note right
double inverseProjectY(double y)
end note
:return Math.sin(2*(Math.atan(Math.exp(y))-Math.PI/4));;
stop
end
@enduml

