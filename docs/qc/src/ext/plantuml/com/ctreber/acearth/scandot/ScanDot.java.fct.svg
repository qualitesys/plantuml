@startuml
!pragma layout smetana
start
note right
constructor ScanDot(int pType,int pX,int pY)
end note
:fType=pType;;
:fX=pX;;
:fY=pY;;
end
start
note right
constructor ScanDot(int pType,Point2D pPoint)
end note
:fType=pType;;
:fX=(int )pPoint.getX();;
:fY=(int )pPoint.getY();;
end
start
note right
int compareTo(Object o)
end note
if (o instanceof ScanDot ) then (yes) 
:ScanDot lOther=(ScanDot )o;;
:return fY>lOther.fY? 1:(fY<lOther.fY? -1:0);;
stop
endif 
:throw new IllegalArgumentException("Can't compare to "+
o.getClass());;
stop
end
start
note right
int getType()
end note
:return fType;;
stop
end
start
note right
int getX()
end note
:return fX;;
stop
end
start
note right
int getY()
end note
:return fY;;
stop
end
start
note right
String toString()
end note
:return fX+", "+fY+": "+fType;;
stop
end
@enduml

