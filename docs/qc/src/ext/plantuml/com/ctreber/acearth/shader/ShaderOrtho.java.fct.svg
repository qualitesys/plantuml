@startuml
!pragma layout smetana
start
note right
Color[]getShadedColors(intpRowNo,int[]pRowTypes)
end note
if (pRowNo==0) then (yes) 
:fXValues=computeXValues(pRowTypes.length);;
endif 
:final doubley=fProjection.inverseProjectY(fProjection.inverseFinalizeY(pRowNo));;
:final doubletmp=1-(y*y);;
:final doublelYBySunVectorY=y*fLightVector.getY();;
:final Color[]lColors=new Color[pRowTypes.length];;
:doublex=fXValues[lColNo];;
:doublez=Math.sqrt(tmp-(x*x));;
:doublelSunValue=(x*fLightVector.getX())+
lYBySunVectorY+(z*fLightVector.getZ());;
:lColors[lColNo]=getShadedColorForType(pRowTypes[lColNo],
lSunValue);;
:return lColors;;
stop
end
start
note right
double[]computeXValues(intpWidth)
end note
:final double[]lTable=new double[pWidth];;
:lTable[lColNo]=fProjection.inverseProjectX(fProjection.inverseFinalizeX(lColNo));;
:return lTable;;
stop
end
@enduml

