@startuml
!pragma layout smetana
start
note right
constructor Point3D(double pX,double pY,double pZ)
end note
:fX=pX;;
:fY=pY;;
:fZ=pZ;;
end
start
note right
double getX()
end note
:return fX;;
stop
end
start
note right
double getY()
end note
:return fY;;
stop
end
start
note right
double getZ()
end note
:return fZ;;
stop
end
start
note right
String toString()
end note
:return "x: "+fX+", y: "+fY+", z: "+fZ;;
stop
end
start
note right
Coordinate getCoordinate()
end note
:return new Coordinate(Toolkit.radsToDegs(Math.asin(fY)),
Toolkit.radsToDegs(Math.atan2(fX,fZ)));;
stop
end
@enduml

