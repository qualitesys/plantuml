@startuml
!pragma layout smetana
start
note right
void startNewRun()
end note
:fScanBitIndex=0;;
:generateScanToPixelTypeTable();;
end
start
note right
void getPixelTypes(intpRowNo,int[]pPixelTypes)
end note
while ((fScanBitIndex<fScanBits.length)&&(fScanBits[fScanBitIndex].getY()==pRowNo))
:pPixelTypes[i]+=fScanBits[fScanBitIndex].getType();;
:fScanBitIndex++;;
endwhile
:pPixelTypes[lCol]=fScanToPixelType[pPixelTypes[lCol]&0xff];;
end
start
note right
void generateScanToPixelTypeTable()
end note
if (i==0) then (yes) 
:fScanToPixelType[i]=BitGeneratorMap.PixTypeSpace;;
else if (i>64) then (yes) 
:fScanToPixelType[i]=BitGeneratorMap.PixTypeLand;;
else (no)
:fScanToPixelType[i]=BitGeneratorMap.PixTypeWater;;
endif 
end
start
note right
void setScanBits(ScanBit[]pScanBits)
end note
:fScanBits=pScanBits;;
end
@enduml

