@startuml
!pragma layout smetana
start
note right
constructor EdgeCrossing(intpType,intpIndex,
doublepX,doublepY,doublepAngle)
end note
:fType=pType;;
:fX=pX;;
:fY=pY;;
:fAngle=pAngle;;
:fIndex=pIndex;;
end
start
note right
StringtoString()
end note
:return fType+": "+fX+", "+fY+", "+fAngle+
" ("+fIndex+")";;
stop
end
start
note right
intgetType()
end note
:return fType;;
stop
end
start
note right
doublegetX()
end note
:return fX;;
stop
end
start
note right
doublegetY()
end note
:return fY;;
stop
end
start
note right
doublegetAngle()
end note
:return fAngle;;
stop
end
start
note right
intgetIndex()
end note
:return fIndex;;
stop
end
@enduml

