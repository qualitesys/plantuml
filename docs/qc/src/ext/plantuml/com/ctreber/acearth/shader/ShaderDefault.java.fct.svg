@startuml
!pragma layout smetana
start
note right
Color[]getShadedColors(intpRowNo,int[]pRowTypes)
end note
:final doubley=fProjection.inverseProjectY(fProjection.inverseFinalizeY(pRowNo));;
:doubletmp=Math.sqrt(1-(y*y));;
:doublex=Math.sin(fProjection.inverseFinalizeX(0))*tmp;;
:doublez=Math.cos(fProjection.inverseFinalizeX(0))*tmp;;
:tmp=1/fProjection.getScale();;
:final doublesin_theta=Math.sin(tmp);;
:final doublecos_theta=Math.cos(tmp);;
:final doublelYBySunVectorY=y*fLightVector.getY();;
:final Color[]lColors=new Color[pRowTypes.length];;
:doublelSunValue=(x*fLightVector.getX())+
lYBySunVectorY+(z*fLightVector.getZ());;
:lColors[lColNo]=getShadedColorForType(pRowTypes[lColNo],
lSunValue);;
:tmp=(cos_theta*z)-(sin_theta*x);;
:x=(sin_theta*z)+(cos_theta*x);;
:z=tmp;;
:return lColors;;
stop
end
@enduml

