81818;stroke-width:1.0;"/><!--MD5=[6429504e3ab8ff2d31bbb07210c364ac]
@startuml
!pragma layout smetana
start
note right
constructor PluginMarkers(List<Marker> markers)
end note
:fMarkers=markers;;
end
start
note right
boolean hasGUIP()
end note
:return false;;
stop
end
start
note right
void render()
end note
if (!fActiveP) then (yes) 
:return ;;
stop
endif 
:Iterator lIt=fMarkers.iterator();;
while (lIt.hasNext())
:Marker lMarker=(Marker )lIt.next();;
:lMarker.render(fRenderTarget,fProjection);;
endwhile
end
start
note right
String toString()
end note
:return "AC.earth Markers plug-in";;
stop
end
@enduml

