@startuml
!pragma layout smetana
start
note right
constructor ScanBit(intpY,intpLoX,intpHiX,
intpType)
end note
:fY=pY;;
:lXFrom=pLoX;;
:fXTo=pHiX;;
:fType=pType;;
end
start
note right
intcompareTo(Objecto)
end note
if (o instanceof ScanBit) then (yes) 
:ScanBitlOther=(ScanBit)o;;
:return (fY>lOther.fY)? 1:(fY<lOther.fY)? -1:0;;
stop
endif 
:throw new IllegalArgumentException("Can't compare with "+
o.getClass());;
stop
end
start
note right
intgetY()
end note
:return fY;;
stop
end
start
note right
intgetlXFrom()
end note
:return lXFrom;;
stop
end
start
note right
intgetXTo()
end note
:return fXTo;;
stop
end
start
note right
intgetType()
end note
:return fType;;
stop
end
@enduml

