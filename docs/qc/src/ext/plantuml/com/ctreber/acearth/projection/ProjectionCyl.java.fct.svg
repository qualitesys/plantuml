@startuml
!pragma layout smetana
start
note right
booleanisVisible(Point3DpPoint)
end note
:return true;;
stop
end
start
note right
CoordinategetLocation(intpX,intpY)
end note
:final CoordinatelRaw=new Coordinate(Math.atan(inverseFinalizeY(pY)),
inverseFinalizeX(pX));;
:return rotateReverse(lRaw.getPoint3DRads())
.getCoordinate();;
stop
end
start
note right
void setScale()
end note
:fScale=fViewMagnification*fImageWidth/(2*Math.PI);;
end
start
note right
doubleprojectX(doublepX,doublepZ)
end note
:return Math.atan2(pX,pZ);;
stop
end
start
note right
doubleinverseProjectX(doublepX)
end note
:return Math.sin(pX);;
stop
end
start
note right
doubleprojectY(doublepY)
end note
:return (pY>=0.9999999999)? 1e6:(pY<=-0.9999999999)? -1e6:Math.tan(Math.asin(pY));;
stop
end
start
note right
doubleinverseProjectY(doubley)
end note
:return Math.sin(Math.atan(y));;
stop
end
@enduml

