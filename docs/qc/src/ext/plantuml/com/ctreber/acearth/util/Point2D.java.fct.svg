:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="98.5" x2="98.5" y1="594.375" y2="614.375"/><polygon fill="#181818" points="94.5,604.375,98.5,614.375,102.5,604.375,98.5,608.375" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[3168286f2ee9a3e881e1c9bee14e232e]
@startuml
!pragma layout smetana
start
note right
constructor Point2D(double pX,double pY)
end note
:fX=pX;;
:fY=pY;;
end
start
note right
double getX()
end note
:return fX;;
stop
end
start
note right
double getY()
end note
:return fY;;
stop
end
start
note right
String toString()
end note
:return "x: "+fX+", y: "+fY;;
stop
end
@enduml

