@startuml
!pragma layout smetana
start
note right
boolean isVisible(Point3D pPoint)
end note
:return pPoint.getZ()>=0;;
stop
end
start
note right
Coordinate getLocation(int pX,int pY)
end note
:final double lX=inverseFinalizeX(pX);;
:final double lY=inverseFinalizeY(pY);;
:final double lZ=Math.sqrt(1-lX*lX-lY*lY);;
:final Point3D lP=new Point3D(lX,lY,lZ);;
:return rotateReverse(lP).getCoordinate();;
stop
end
start
note right
double projectX(double pX,double pZ)
end note
:return pX;;
stop
end
start
note right
double inverseProjectX(double pX)
end note
:return pX;;
stop
end
start
note right
double projectY(double pY)
end note
:return pY;;
stop
end
start
note right
double inverseProjectY(double pY)
end note
:return pY;;
stop
end
start
note right
void setScale()
end note
:fScale=Math.min(fImageHeight,fImageWidth)*fViewMagnification*0.99/2;;
end
@enduml

