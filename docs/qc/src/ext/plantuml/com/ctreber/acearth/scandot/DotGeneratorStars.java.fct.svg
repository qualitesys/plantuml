4258" y2="805.4258"/><polygon fill="#181818" points="228.5,795.4258,232.5,805.4258,236.5,795.4258,232.5,799.4258" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[f33b2e58ecc7317efa7f1a946cb61520]
@startuml
!pragma layout smetana
start
note right
constructor DotGeneratorStars(intpWidth,intpHeight,
doublepStarFrequency,intpBigStars,Randomrnd)
end note
:lRandom=rnd;;
:fImageWidth=pWidth;;
:fImageHeight=pHeight;;
:fStarFrequency=pStarFrequency;;
:fBigStars=pBigStars;;
end
start
note right
void generateScanDots()
end note
:final intlStarsMax=(int)(fImageWidth*fImageHeight*fStarFrequency);;
:intx=(int)(lRandom.nextDouble()*(fImageWidth-1));;
:inty=(int)(lRandom.nextDouble()*fImageHeight);;
:fDots.add(new ScanDot(ScanDot.DotTypeStar,
x,y));;
if ((fBigStars!=0)&&(Math.random()*100<fBigStars)) then (yes) 
:fDots.add(new ScanDot(ScanDot.DotTypeStar,x+
1,y));;
endif 
end
@enduml

