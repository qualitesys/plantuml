88,236.5,654.2188" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="236.5" x2="236.5" y1="800.5586" y2="820.5586"/><polygon fill="#181818" points="232.5,810.5586,236.5,820.5586,240.5,810.5586,236.5,814.5586" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[f2b237cfdc65544f0919e449b0689b66]
@startuml
!pragma layout smetana
start
note right
constructor DotGeneratorStars(int pWidth,
int pHeight,double pStarFrequency,int pBigStars,
Random rnd)
end note
:lRandom=rnd;;
:fImageWidth=pWidth;;
:fImageHeight=pHeight;;
:fStarFrequency=pStarFrequency;;
:fBigStars=pBigStars;;
end
start
note right
void generateScanDots()
end note
:final int lStarsMax=(int )(fImageWidth*fImageHeight*fStarFrequency);;
:int x=(int )(lRandom.nextDouble()*(fImageWidth-1));;
:int y=(int )(lRandom.nextDouble()*fImageHeight);;
:fDots.add(new ScanDot(ScanDot.DotTypeStar,
x,y));;
if ((fBigStars!=0)&&(Math.random()*100<fBigStars)) then (yes) 
:fDots.add(new ScanDot(ScanDot.DotTypeStar,x+
1,y));;
endif 
end
@enduml

