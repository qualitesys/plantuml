@startuml
!pragma layout smetana
start
note right
constructor Polygon(intpType,Point3D[]pPoints)
end note
:fType=pType;;
:fPoints=pPoints;;
end
start
note right
intgetType()
end note
:return fType;;
stop
end
start
note right
Point3D[]getPoints()
end note
:return fPoints;;
stop
end
start
note right
Point3DgetPoint(intpIndex)
end note
:return fPoints[pIndex];;
stop
end
start
note right
intgetSize()
end note
:return fPoints.length;;
stop
end
start
note right
StringtoString()
end note
:return "Type "+fType+", "+fPoints.length+
" points";;
stop
end
@enduml

