@startuml
!pragma layout smetana
start
note right
constructor Polygon(int pType,Point3D[] pPoints)
end note
:fType=pType;;
:fPoints=pPoints;;
end
start
note right
int getType()
end note
:return fType;;
stop
end
start
note right
Point3D[] getPoints()
end note
:return fPoints;;
stop
end
start
note right
Point3D getPoint(int pIndex)
end note
:return fPoints[pIndex];;
stop
end
start
note right
int getSize()
end note
:return fPoints.length;;
stop
end
start
note right
String toString()
end note
:return "Type "+fType+", "+fPoints.length+
" points";;
stop
end
@enduml

