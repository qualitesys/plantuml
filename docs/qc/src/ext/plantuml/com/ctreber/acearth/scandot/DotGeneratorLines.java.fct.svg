@startuml
!pragma layout smetana
start
note right
constructor DotGeneratorLines(ProjectionpProjection,
intpLineDevider,intpPointDivider)
end note
:fProjection=pProjection;;
:fLineDivider=pLineDevider;;
:fPointDivider=pPointDivider;;
end
start
note right
void generateScanDots()
end note
:doublelLonStep=TWOPI/(fLineDivider*4);;
:doublelLatStep=PI/(fLineDivider*2*fPointDivider);;
:transformAndAddDot(new Coordinate(lLat,lLon));;
:lLatStep=TWOPI/(fLineDivider*4);;
:lLonStep=PI/(fLineDivider*2*fPointDivider);;
:transformAndAddDot(new Coordinate(lLat,lLon));;
end
start
note right
void transformAndAddDot(CoordinatepPos)
end note
:final Point3DlPointRotated=fProjection.rotate(pPos.getPoint3DRads());;
if (fProjection.isVisible(lPointRotated)) then (yes) 
:Point2DlPoint=fProjection.finalize(fProjection.project2D(lPointRotated));;
if (fProjection.isWithinImage(lPoint)) then (yes) 
:fDots.add(new ScanDot(ScanDot.DotTypeGrid,
lPoint));;
endif 
endif 
end
@enduml

