@startuml
!pragma layout smetana
start
note right
void addChangeListener(MOChangeListener pListener)
end note
:fListeners.add(pListener);;
end
start
note right
void removeChangeListener(MOChangeListener pListener)
end note
:fListeners.remove(pListener);;
end
start
note right
void fireValueChanged()
end note
:final Iterator lIt=fListeners.iterator();;
while (lIt.hasNext())
:MOChangeListener lListener=(MOChangeListener )lIt.next();;
:lListener.valueChanged(this);;
endwhile
end
@enduml

