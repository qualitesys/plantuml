@startuml
!pragma layout smetana
start
note right
__struct__copy()
end note
:final ST_pointresult=new ST_point();;
:result.x=this.x;;
:result.y=this.y;;
:return result;;
stop
end
start
note right
void ___(__struct__other)
end note
:ST_pointthis2=(ST_point)other;;
:this.x=this2.x;;
:this.y=this2.y;;
end
@enduml

