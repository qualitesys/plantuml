@startuml
!pragma layout smetana
start
note right
__struct__ copy()
end note
:final ST_point result=new ST_point();;
:result.x=this.x;;
:result.y=this.y;;
:return result;;
stop
end
start
note right
void ___(__struct__ other)
end note
:ST_point this2=(ST_point )other;;
:this.x=this2.x;;
:this.y=this2.y;;
end
@enduml

