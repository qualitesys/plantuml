@startuml
!pragma layout smetana
start
note right
String toString()
end note
:return text+" "+dimen;;
stop
end
start
note right
boolean isSameThan(__ptr__ other)
end note
:ST_textlabel_t other2=(ST_textlabel_t )other;;
:return this==other2;;
stop
end
@enduml

