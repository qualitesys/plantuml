@startuml
!pragma layout smetana
start
note right
StringtoString()
end note
:return text+" "+dimen;;
stop
end
start
note right
booleanisSameThan(__ptr__other)
end note
:ST_textlabel_tother2=(ST_textlabel_t)other;;
:return this==other2;;
stop
end
@enduml

