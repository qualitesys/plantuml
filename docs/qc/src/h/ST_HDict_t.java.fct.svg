@startuml
!pragma layout smetana
start
note right
Object getTheField(OFFSET offset)
end note
if (offset==null ||offset.getSign()==0) then (yes) 
:return this;;
stop
endif 
if (offset.getField().equals("key")) then (yes) 
:return key;;
stop
endif 
:throw new UnsupportedOperationException();;
stop
end
@enduml

