@startuml
!pragma layout smetana
start
note right
StringtoString()
end note
:return "id="+id+" "+super .toString();;
stop
end
start
note right
ST_Agtag_scopy()
end note
:final ST_Agtag_sresult=new ST_Agtag_s();;
:result.objtype=objtype;;
:result.mtflock=mtflock;;
:result.attrwf=attrwf;;
:result.seq=seq;;
:result.id=id;;
:return result;;
stop
end
start
note right
void ___(__struct__other)
end note
:final ST_Agtag_sother2=(ST_Agtag_s)other;;
:objtype=other2.objtype;;
:mtflock=other2.mtflock;;
:attrwf=other2.attrwf;;
:seq=other2.seq;;
:id=other2.id;;
end
@enduml

