@startuml
!pragma layout smetana
start
note right
StringtoString()
end note
switch (try/catch block)
case (try)
:return NAME+" rank="+ND_rank(this)+" order="+
ND_order(this);;
stop
case (catch (Exceptione))
:return NAME;;
stop
endswitch
end
start
note right
void ___(__struct__arg)
end note
:throw new UnsupportedOperationException();;
stop
end
start
note right
booleanisSameThan(__ptr__other)
end note
:ST_Agnode_sother2=(ST_Agnode_s)other;;
:return this==other2;;
stop
end
@enduml

