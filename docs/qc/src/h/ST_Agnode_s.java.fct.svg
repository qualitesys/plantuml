@startuml
!pragma layout smetana
start
note right
String toString()
end note
switch (try/catch block)
case (try)
:return NAME+" rank="+ND_rank(this)+" order="+
ND_order(this);;
stop
case (catch (Exception e))
:return NAME;;
stop
endswitch
end
start
note right
void ___(__struct__ arg)
end note
:throw new UnsupportedOperationException();;
stop
end
start
note right
boolean isSameThan(__ptr__ other)
end note
:ST_Agnode_s other2=(ST_Agnode_s )other;;
:return this==other2;;
stop
end
@enduml

