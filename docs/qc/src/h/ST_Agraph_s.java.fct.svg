@startuml
!pragma layout smetana
start
note right
String toString()
end note
:return super .toString()+" "+NAME;;
stop
end
start
note right
constructor ST_Agraph_s()
end note
:this.NAME="G"+CPT;;
:CPT++;;
:SmetanaDebug.LOG("creation "+this);;
end
start
note right
Object getTheField(OFFSET offset)
end note
if (offset==null ||offset.getSign()==0) then (yes) 
:return this;;
stop
endif 
if (offset.getField().equals("link")) then (yes) 
:return link;;
stop
endif 
:throw new UnsupportedOperationException();;
stop
end
start
note right
void ___(__struct__ arg)
end note
:throw new UnsupportedOperationException();;
stop
end
start
note right
boolean isSameThan(__ptr__ other)
end note
:ST_Agraph_s other2=(ST_Agraph_s )other;;
:return this==other2;;
stop
end
@enduml

