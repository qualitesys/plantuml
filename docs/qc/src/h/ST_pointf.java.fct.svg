@startuml
!pragma layout smetana
start
note right
ST_pointf pointfof(double x,double y)
end note
:final ST_pointf result=new ST_pointf();;
:result.x=x;;
:result.y=y;;
:return result;;
stop
end
start
note right
ST_pointf add_pointf(final ST_pointf p,final ST_pointf q)
end note
:final ST_pointf result=new ST_pointf();;
:result.x=p.x+q.x;;
:result.y=p.y+q.y;;
:return result;;
stop
end
start
note right
boolean isSameThan(__ptr__ other)
end note
:return this==(ST_pointf )other;;
stop
end
start
note right
String toString()
end note
:return "["+x+","+y+"]";;
stop
end
start
note right
ST_pointf copy()
end note
:final ST_pointf result=new ST_pointf();;
:result.x=this.x;;
:result.y=this.y;;
:return result;;
stop
end
start
note right
void ___(__struct__ other)
end note
:final ST_pointf other2=(ST_pointf )other;;
:this.x=other2.x;;
:this.y=other2.y;;
end
@enduml

