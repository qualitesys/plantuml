@startuml
!pragma layout smetana
start
note right
ST_pointfpointfof(doublex,doubley)
end note
:final ST_pointfresult=new ST_pointf();;
:result.x=x;;
:result.y=y;;
:return result;;
stop
end
start
note right
ST_pointfadd_pointf(final ST_pointfp,final ST_pointfq)
end note
:final ST_pointfresult=new ST_pointf();;
:result.x=p.x+q.x;;
:result.y=p.y+q.y;;
:return result;;
stop
end
start
note right
booleanisSameThan(__ptr__other)
end note
:return this==(ST_pointf)other;;
stop
end
start
note right
StringtoString()
end note
:return "["+x+","+y+"]";;
stop
end
start
note right
ST_pointfcopy()
end note
:final ST_pointfresult=new ST_pointf();;
:result.x=this.x;;
:result.y=this.y;;
:return result;;
stop
end
start
note right
void ___(__struct__other)
end note
:final ST_pointfother2=(ST_pointf)other;;
:this.x=other2.x;;
:this.y=other2.y;;
end
@enduml

