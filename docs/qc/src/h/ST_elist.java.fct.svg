@startuml
!pragma layout smetana
start
note right
void ___(__struct__ other)
end note
:ST_elist other2=(ST_elist )other;;
:this.size=other2.size;;
:this.list=other2.list;;
end
start
note right
ST_elist copy()
end note
:final ST_elist result=new ST_elist();;
:result.size=this.size;;
:result.list=this.list;;
:return result;;
stop
end
@enduml

