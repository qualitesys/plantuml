note right
OFFSETcreateOFFSET(Stringfield)
end note
:return new OFFSET(field);;
stop
end
start
note right
ObjectgetTheField(OFFSEToffset)
end note
if (offset==null ||offset.getSign()==0) then (yes) 
:return this;;
stop
endif 
if (offset.getField().equals("name")) then (yes) 
:return name;;
stop
endif 
if (offset.getField().equals("link")) then (yes) 
:return link;;
stop
endif 
:throw new UnsupportedOperationException();;
stop
end
start
note right
booleanisSameThan(__ptr__other)
end note
:ST_Agsym_sother2=(ST_Agsym_s)other;;
