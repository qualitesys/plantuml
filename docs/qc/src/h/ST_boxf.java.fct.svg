@startuml
!pragma layout smetana
start
note right
StringtoString()
end note
:return "LL="+LL+" UR="+UR;;
stop
end
start
note right
ST_boxf[]malloc(intnb)
end note
:final ST_boxfresult[]=new ST_boxf[nb];;
:result[i]=new ST_boxf();;
:return result;;
stop
end
start
note right
ST_boxfcopy()
end note
:final ST_boxfresult=new ST_boxf();;
:result.LL.___((__struct__)this.LL);;
:result.UR.___((__struct__)this.UR);;
:return result;;
stop
end
start
note right
void ___(__struct__value)
end note
:final ST_boxfother=(ST_boxf)value;;
:this.LL.___(other.LL);;
:this.UR.___(other.UR);;
end
@enduml

