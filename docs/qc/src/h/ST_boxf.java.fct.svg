@startuml
!pragma layout smetana
start
note right
String toString()
end note
:return "LL="+LL+" UR="+UR;;
stop
end
start
note right
ST_boxf[] malloc(int nb)
end note
:final ST_boxf result[]=new ST_boxf[nb];;
:result[i]=new ST_boxf();;
:return result;;
stop
end
start
note right
ST_boxf copy()
end note
:final ST_boxf result=new ST_boxf();;
:result.LL.___((__struct__ )this.LL);;
:result.UR.___((__struct__ )this.UR);;
:return result;;
stop
end
start
note right
void ___(__struct__ value)
end note
:final ST_boxf other=(ST_boxf )value;;
:this.LL.___(other.LL);;
:this.UR.___(other.UR);;
end
@enduml

