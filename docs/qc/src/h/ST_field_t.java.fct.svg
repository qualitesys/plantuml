@startuml
!pragma layout smetana
start
note right
StringtoString()
end note
:return id+" sides="+sides+" n_flds="+n_flds+
" lp="+lp+" fld="+fld;;
stop
end
start
note right
ST_field_tcastTo(Classdest)
end note
if (dest==ST_field_t.class ) then (yes) 
:return this;;
stop
endif 
:return (ST_field_t)super .castTo(dest);;
stop
end
start
note right
void ___(__struct__other)
end note
:ST_field_tother2=(ST_field_t)other;;
:this.size.___(other2.size);;
:this.b.___(other2.b);;
:this.n_flds=other2.n_flds;;
:this.lp=other2.lp;;
:this.fld=other2.fld;;
:this.id=other2.id;;
:this.LR=other2.LR;;
:this.sides=other2.sides;;
end
@enduml

