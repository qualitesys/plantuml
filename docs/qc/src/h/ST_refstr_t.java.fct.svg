@startuml
!pragma layout smetana
start
note right
ObjectgetTheField(OFFSEToffset)
end note
if (offset==null ||offset.getSign()==0) then (yes) 
:return this;;
stop
endif 
if (offset.getField().equals("s")) then (yes) 
:return s;;
stop
endif 
:throw new UnsupportedOperationException();;
stop
end
start
note right
void setString(CStringnewData)
end note
:this.s=newData;;
:this.s.setParent(this);;
end
@enduml

