@startuml
!pragma layout smetana
start
note right
boolean malloc(int newdqn)
end note
:this.pnlps=new ST_pointnlink_t[newdqn];;
:return true;;
stop
end
start
note right
boolean realloc(int newdqn)
end note
if (pnlps.length>=newdqn) then (yes) 
:return true;;
stop
endif 
:ST_pointnlink_t pnlps2[]=new ST_pointnlink_t[newdqn];;
:pnlps2[i]=pnlps[i];;
:this.pnlps=pnlps2;;
:return true;;
stop
end
@enduml

