@startuml
!pragma layout smetana
start
note right
booleanmalloc(intnewdqn)
end note
:this.pnlps=new ST_pointnlink_t[newdqn];;
:return true;;
stop
end
start
note right
booleanrealloc(intnewdqn)
end note
if (pnlps.length>=newdqn) then (yes) 
:return true;;
stop
endif 
:ST_pointnlink_tpnlps2[]=new ST_pointnlink_t[newdqn];;
:pnlps2[i]=pnlps[i];;
:this.pnlps=pnlps2;;
:return true;;
stop
end
@enduml

