@startuml
!pragma layout smetana
start
note right
AbstractPSystemexecuteLine(UmlSourcesource,
Stringline)
end note
:final Matcher2m=p.matcher(line);;
if (m.find()==false) then (yes) 
:return null ;;
stop
endif 
if (m.group(1)==null ) then (yes) 
:return new PSystemSudoku(source,null );;
stop
endif 
:return new PSystemSudoku(source,Long.parseLong(StringUtils.goLowerCase(m.group(1)),
36));;
stop
end
@enduml

