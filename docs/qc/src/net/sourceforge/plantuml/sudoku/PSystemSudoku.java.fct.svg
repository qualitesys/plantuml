@startuml
!pragma layout smetana
start
note right
ImageDataexportDiagramNow(OutputStreamos,
intnum,FileFormatOptionfileFormat)
end note
:final GraphicsSudokusud=new GraphicsSudoku(sudoku);;
if (fileFormat.getFileFormat()==FileFormat.EPS) then (yes) 
:return sud.writeImageEps(os);;
stop
endif 
if (fileFormat.getFileFormat()==FileFormat.SVG) then (yes) 
:return sud.writeImageSvg(os);;
stop
endif 
if (fileFormat.getFileFormat()==FileFormat.LATEX||fileFormat.getFileFormat()==FileFormat.LATEX_NO_PREAMBLE) then (yes) 
:return sud.writeImageLatex(os,fileFormat.getFileFormat());;
stop
endif 
:return sud.writeImagePng(os);;
stop
end
start
note right
DiagramDescriptiongetDescription()
end note
:return new DiagramDescription("(Sudoku)");;
stop
end
start
note right
constructor PSystemSudoku(UmlSourcesource,
Longseed)
end note
:super (source);;
:sudoku=new SudokuDLX(seed);;
end
@enduml

