n fill="#181818" points="150,634.0977,154,644.0977,158,634.0977,154,638.0977" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[900e06039345a6a030a5fc2024557df6]
@startuml
!pragma layout smetana
start
note right
constructor ScaleMaxWidthAndHeight(double maxWidth,
double maxHeight)
end note
:this.maxWidth=maxWidth;;
:this.maxHeight=maxHeight;;
end
start
note right
double getScaleInternal(double width,double height)
end note
:final double scale1=maxWidth/width;;
:final double scale2=maxHeight/height;;
:final double min=Math.min(scale1,scale2);;
if (min>1) then (yes) 
:return 1;;
stop
endif 
:return min;;
stop
end
@enduml

