@startuml
!pragma layout smetana
start
note right
constructor ScaleMaxWidthAndHeight(doublemaxWidth,
doublemaxHeight)
end note
:this.maxWidth=maxWidth;;
:this.maxHeight=maxHeight;;
end
start
note right
doublegetScaleInternal(doublewidth,doubleheight)
end note
:final doublescale1=maxWidth/width;;
:final doublescale2=maxHeight/height;;
:final doublemin=Math.min(scale1,scale2);;
if (min>1) then (yes) 
:return 1;;
stop
endif 
:return min;;
stop
end
@enduml

