@startuml
!pragma layout smetana
start
note right
constructor Preprocessor(List<String>config,
ReadLinereader)
end note
:final ReadFilterAndfilters=new ReadFilterAnd();;
:filters.add(new ReadFilterAddConfig(config));;
:filters.add(new ReadFilterMergeLines());;
:this.source=filters.applyFilter(reader);;
end
start
note right
StringLocatedreadLine()
end note
:return source.readLine();;
stop
end
start
note right
void close()
end note
:this.source.close();;
end
@enduml

