@startuml
!pragma layout smetana
start
note right
constructor Preprocessor(List<String> config,
ReadLine reader)
end note
:final ReadFilterAnd filters=new ReadFilterAnd();;
:filters.add(new ReadFilterAddConfig(config));;
:filters.add(new ReadFilterMergeLines());;
:this.source=filters.applyFilter(reader);;
end
start
note right
StringLocated readLine()
end note
:return source.readLine();;
stop
end
start
note right
void close()
end note
:this.source.close();;
end
@enduml

