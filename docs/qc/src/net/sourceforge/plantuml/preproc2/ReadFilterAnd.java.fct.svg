@startuml
!pragma layout smetana
start
note right
void add(ReadFilterfilter)
end note
:all.add(filter);;
end
start
note right
ReadLineapplyFilter(ReadLinecurrent)
end note
:current=f.applyFilter(current);;
:return current;;
stop
end
@enduml

