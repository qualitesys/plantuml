@startuml
!pragma layout smetana
start
note right
constructor AnimationDecoder(Iterable<CharSequence>data)
end note
:Stringline=it.next().toString();;
if (line.matches("^\\s*\\[script\\]\\s*$")) then (yes) 
:final StringBuilderscriptText=new StringBuilder();;
while (true)
:line=it.next().toString();;
if (line.matches("^\\s*\\[/script\\]\\s*$")) then (yes) 
:final AnimationScriptscript=new AnimationScript();;
:final Stringout=script.eval(scriptText.toString());;
:result.add(st.nextToken());;
:break ;;
else (no)
:scriptText.append(line);;
:scriptText.append("\n");;
endif 
endwhile
else (no)
:result.add(line);;
endif 
end
start
note right
