@startuml
!pragma layout smetana
start
note right
constructor AnimationDecoder(Iterable<CharSequence> data)
end note
:String line=it.next().toString();;
if (line.matches("^\\s*\\[script\\]\\s*$")) then (yes) 
:final StringBuilder scriptText=new StringBuilder();;
while (true)
:line=it.next().toString();;
if (line.matches("^\\s*\\[/script\\]\\s*$")) then (yes) 
:final AnimationScript script=new AnimationScript();;
:final String out=script.eval(scriptText.toString());;
:result.add(st.nextToken());;
:break ;;
else (no)
:scriptText.append(line);;
:scriptText.append("\n");;
endif 
endwhile
else (no)
:result.add(line);;
endif 
end
start
note right
List<String> decode()
end note
:return Collections.unmodifiableList(result);;
stop
end
@enduml

