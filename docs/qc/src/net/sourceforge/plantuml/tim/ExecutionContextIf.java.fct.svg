@startuml
!pragma layout smetana
start
note right
constructor ExecutionContextIf(boolean isTrue)
end note
:this.isTrue=isTrue;;
if (this.isTrue) then (yes) 
:hasBeenBurn=true;;
endif 
end
start
note right
ExecutionContextIf fromValue(boolean isTrue)
end note
:return new ExecutionContextIf(isTrue);;
stop
end
start
note right
boolean conditionIsOkHere()
end note
:return isTrue;;
stop
end
start
note right
void enteringElseIf()
end note
:this.isTrue=false;;
end
start
note right
void nowInElse()
end note
:this.isTrue=!hasBeenBurn;;
end
start
note right
void nowInSomeElseIf()
end note
:this.isTrue=true;;
:this.hasBeenBurn=true;;
end
start
note right
boolean hasBeenBurn()
end note
:return hasBeenBurn;;
stop
end
start
note right
void setHasBeenBurn(boolean hasBeenBurn)
end note
:this.hasBeenBurn=hasBeenBurn;;
end
@enduml

