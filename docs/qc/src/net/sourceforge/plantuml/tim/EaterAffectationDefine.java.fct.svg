@startuml
!pragma layout smetana
start
note right
constructor EaterAffectationDefine(StringLocated s)
end note
:super (s.getTrimmed());;
end
start
note right
void analyze(TContext context,TMemory memory)
end note
:skipSpaces();;
:checkAndEatChar("!define");;
:skipSpaces();;
:final String varname=eatAndGetVarname();;
:skipSpaces();;
:final String tmp=eatAllToEnd();;
:final String tmp2=context.applyFunctionsAndVariables(memory,
getLineLocation(),tmp);;
:final TValue value=TValue.fromString(tmp2);;
:memory.putVariable(varname,value,TVariableScope.GLOBAL);;
end
@enduml

