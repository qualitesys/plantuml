@startuml
!pragma layout smetana
start
note right
constructor EaterForeach(StringLocated s)
end note
:super (s);;
end
start
note right
void analyze(TContext context,TMemory memory)
end note
:skipSpaces();;
:checkAndEatChar("!foreach");;
:skipSpaces();;
:this.varname=eatAndGetVarname();;
:skipSpaces();;
:checkAndEatChar("in");;
:skipSpaces();;
:final TValue value=eatExpression(context,
memory);;
:this.jsonArray=(JsonArray )value.toJson();;
end
start
note right
boolean isSkip()
end note
if (this.jsonArray==null ) then (yes) 
:return true;;
stop
endif 
:return this.jsonArray.size()==0;;
stop
end
start
note right
String getVarname()
end note
:return varname;;
stop
end
start
note right
JsonArray getJsonArray()
end note
:return jsonArray;;
stop
end
