243.3359,290,247.3359" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[630a757ab87e717474f1fd14223626b2]
@startuml
!pragma layout smetana
start
note right
constructor CodeIteratorLongComment(CodeIterator source,
List<StringLocated> logs)
end note
:super (source);;
:this.logs=logs;;
end
start
note right
StringLocated peek()
end note
while (true)
if (source.peek()==null ) then (yes) 
:return null ;;
stop
endif 
if (source.peek().getType()!=TLineType.COMMENT_LONG_START) then (yes) 
:return source.peek();;
stop
endif 
:StringLocated s=null ;;
while ((s=source.peek())!=null &&s.getTrimmed().getString().endsWith("'/")==false)
:logs.add(s);;
:source.next();;
endwhile
:assert source.peek()==null ||s.getTrimmed()
.getString().endsWith("'/");;
if (source.peek()!=null ) then (yes) 
:assert s.getTrimmed().getString().endsWith("'/");;
:logs.add(source.peek());;
:source.next();;
endif 
endwhile
end
@enduml

