@startuml
!pragma layout smetana
start
note right
constructor CodeIteratorShortComment(CodeIterator source,
List<StringLocated> logs)
end note
:super (source);;
:this.logs=logs;;
end
start
note right
StringLocated peek()
end note
while (true)
:final StringLocated result=source.peek();;
if (result==null ) then (yes) 
:return null ;;
stop
endif 
if (result.getType()==TLineType.COMMENT_SIMPLE) then (yes) 
:logs.add(result);;
:next();;
:continue ;;
endif 
:assert result!=null &&result.getType()!=TLineType.COMMENT_SIMPLE;;
:return result;;
stop
endwhile
end
@enduml

