ll="#181818" points="20,464.375,24,474.375,28,464.375,24,468.375" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="386" x2="386" y1="407.8086" y2="430.375"/><polygon fill="#181818" points="382,420.375,386,430.375,390,420.375,386,424.375" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[c2123a9d5df5cd2ab6982fde18434f54]
@startuml
!pragma layout smetana
start
note right
constructor CodeIteratorLegacyDefine(CodeIterator source,
TContext context,TMemory memory,FunctionsSet functionsSet,
List<StringLocated> logs)
end note
:super (source);;
:this.context=context;;
:this.functionsSet=functionsSet;;
:this.logs=logs;;
:this.memory=memory;;
end
start
note right
StringLocated peek()
end note
while (true)
:final StringLocated result=source.peek();;
if (result==null ) then (yes) 
:return null ;;
stop
endif 
if (result.getType()==TLineType.LEGACY_DEFINE) then (yes) 
:logs.add(result);;
:functionsSet.executeLegacyDefine(context,
memory,result);;
:next();;
:continue ;;
else if (result.getType()==TLineType.LEGACY_DEFINELONG) then (yes) 
:logs.add(result);;
:functionsSet.executeLegacyDefineLong(context,
memory,result);;
:next();;
:continue ;;
endif 
:return result;;
stop
endwhile
end
@enduml

