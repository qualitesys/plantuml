@startuml
!pragma layout smetana
start
note right
constructor EaterIfdef(StringLocated s)
end note
:super (s);;
end
start
note right
void analyze(TContext context,TMemory memory)
end note
:skipSpaces();;
:checkAndEatChar("!ifdef");;
:skipSpaces();;
:expression=eatAllToEnd();;
end
start
note right
boolean isTrue(final TContext context,final TMemory memory)
end note
:final EvalBoolean eval=new EvalBoolean(expression,
new Truth(){public boolean isTrue(String varname){final TValue currentValue=memory.getVariable(varname);return currentValue!=null ||context.doesFunctionExist(varname);}});;
:return eval.eval();;
stop
end
@enduml

