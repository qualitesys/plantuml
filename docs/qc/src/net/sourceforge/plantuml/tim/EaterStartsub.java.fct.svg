@startuml
!pragma layout smetana
start
note right
constructor EaterStartsub(StringLocateds)
end note
:super (s);;
end
start
note right
void analyze(TContextcontext,TMemorymemory)
end note
:skipSpaces();;
:checkAndEatChar("!startsub");;
:skipSpaces();;
:this.subname=eatAllToEnd();;
if (this.subname.matches("\\w+")==false) then (yes) 
:throw EaterException.located("Bad sub name");;
stop
endif 
end
start
note right
StringgetSubname()
end note
:return subname;;
stop
end
@enduml

