@startuml
!pragma layout smetana
start
note right
constructor TFunctionArgument(Stringname,
TValuedef)
end note
:this.name=name;;
:this.def=def;;
end
start
note right
StringgetName()
end note
:return name;;
stop
end
start
note right
StringtoString()
end note
:return "ARG:"+name;;
stop
end
start
note right
TValuegetOptionalDefaultValue()
end note
:return def;;
stop
end
@enduml

