@startuml
!pragma layout smetana
start
note right
constructor EaterLegacyDefine(StringLocated s)
end note
:super (s.getTrimmed());;
end
start
note right
void analyze(TContext context,TMemory memory)
end note
:skipSpaces();;
:checkAndEatChar("!define");;
:skipSpaces();;
:function =eatDeclareFunction(context,memory,
true,getLineLocation(),false,TFunctionType.LEGACY_DEFINE);;
:final String def=this.eatAllToEnd();;
:function .setLegacyDefinition(def);;
end
start
note right
TFunction getFunction()
end note
:return function ;;
stop
end
@enduml

