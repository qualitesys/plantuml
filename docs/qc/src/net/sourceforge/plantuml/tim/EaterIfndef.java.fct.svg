@startuml
!pragma layout smetana
start
note right
constructor EaterIfndef(StringLocateds)
end note
:super (s);;
end
start
note right
void analyze(TContextcontext,TMemorymemory)
end note
:skipSpaces();;
:checkAndEatChar("!ifndef");;
:skipSpaces();;
:varname=eatAndGetVarname();;
end
start
note right
booleanisTrue(TContextcontext,TMemorymemory)
end note
:final TValuecurrentValue=memory.getVariable(varname);;
:return currentValue==null &&context.doesFunctionExist(varname)==false;;
stop
end
@enduml

