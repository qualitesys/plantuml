@startuml
!pragma layout smetana
start
note right
constructor EaterAssert(StringLocateds)
end note
:super (s);;
end
start
note right
void analyze(TContextcontext,TMemorymemory)
end note
:skipSpaces();;
:checkAndEatChar("!assert");;
:skipSpaces();;
:final TValuevalue=eatExpressionStopAtColon(context,
memory);;
:skipSpaces();;
if (value.toBoolean()==false) then (yes) 
:final charch=peekChar();;
if (ch==':') then (yes) 
:checkAndEatChar(':');;
:final TValuemessage=eatExpression(context,
memory);;
:throw EaterException.located("Assertion error : "+
message.toString());;
stop
endif 
:throw EaterException.located("Assertion error");;
stop
endif 
end
@enduml

