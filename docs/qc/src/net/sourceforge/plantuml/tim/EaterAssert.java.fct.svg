dth:1.0;"/><!--MD5=[255459e5e7baf8ce2dc5917f9f452d57]
@startuml
!pragma layout smetana
start
note right
constructor EaterAssert(StringLocated s)
end note
:super (s);;
end
start
note right
void analyze(TContext context,TMemory memory)
end note
:skipSpaces();;
:checkAndEatChar("!assert");;
:skipSpaces();;
:final TValue value=eatExpressionStopAtColon(context,
memory);;
:skipSpaces();;
if (value.toBoolean()==false) then (yes) 
:final char ch=peekChar();;
if (ch==':') then (yes) 
:checkAndEatChar(':');;
:final TValue message=eatExpression(context,
memory);;
:throw EaterException.located("Assertion error : "+
message.toString());;
stop
endif 
:throw EaterException.located("Assertion error");;
stop
endif 
end
@enduml

