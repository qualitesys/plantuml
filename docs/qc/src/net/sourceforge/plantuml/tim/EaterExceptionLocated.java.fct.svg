@startuml
!pragma layout smetana
start
note right
constructor EaterExceptionLocated(String message,
StringLocated location)
end note
:this.message=message;;
:this.location=location;;
end
start
note right
EaterExceptionLocated located(String message,
StringLocated location)
end note
:return new EaterExceptionLocated(message,
Objects.requireNonNull(location));;
stop
end
start
note right
String getMessage()
end note
:return message;;
stop
end
start
note right
StringLocated getLocation()
end note
:return location;;
stop
end
@enduml

