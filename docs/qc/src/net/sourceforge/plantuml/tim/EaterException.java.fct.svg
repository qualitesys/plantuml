@startuml
!pragma layout smetana
start
note right
constructor EaterException(Stringmessage)
end note
:this.message=message;;
end
start
note right
EaterExceptionunlocated(Stringmessage)
end note
:return new EaterException(message);;
stop
end
start
note right
EaterExceptionlocated(Stringmessage)
end note
:return unlocated(message);;
stop
end
start
note right
StringgetMessage()
end note
:return message;;
stop
end
start
note right
EaterExceptionLocatedwithLocation(StringLocatedsl)
end note
:return EaterExceptionLocated.located(message,
sl);;
stop
end
@enduml

