@startuml
!pragma layout smetana
start
note right
constructor EaterIf(StringLocated s)
end note
:super (s);;
end
start
note right
void analyze(TContext context,TMemory memory)
end note
:skipSpaces();;
:checkAndEatChar("!if");;
:skipSpaces();;
:final TValue value=eatExpression(context,
memory);;
:this.booleanValue=value.toBoolean();;
end
start
note right
boolean isTrue()
end note
:return this.booleanValue;;
stop
end
@enduml

