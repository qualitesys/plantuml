@startuml
!pragma layout smetana
start
note right
constructor ExecutionContextWhile(TokenStack whileExpression,
CodePosition codePosition)
end note
:this.whileExpression=whileExpression;;
:this.codePosition=codePosition;;
end
start
note right
String toString()
end note
:return whileExpression.toString()+" "+codePosition;;
stop
end
start
note right
ExecutionContextWhile fromValue(TokenStack whileExpression,
CodePosition codePosition)
end note
:return new ExecutionContextWhile(whileExpression,
codePosition);;
stop
end
start
note right
TValue conditionValue(LineLocation location,
TContext context,TMemory memory)
end note
:return whileExpression.getResult(location,
context,memory);;
stop
end
start
note right
void skipMe()
end note
:skipMe=true;;
end
start
note right
boolean isSkipMe()
end note
:return skipMe;;
stop
end
start
note right
CodePosition getStartWhile()
end note
:return codePosition;;
stop
end
@enduml

