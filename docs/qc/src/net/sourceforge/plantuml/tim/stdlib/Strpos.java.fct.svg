@startuml
!pragma layout smetana
start
note right
TFunctionSignaturegetSignature()
end note
:return new TFunctionSignature("%strpos",2);;
stop
end
start
note right
booleancanCover(intnbArg,Set<String>namedArgument)
end note
:return nbArg==2;;
stop
end
start
note right
TValueexecuteReturnFunction(TContextcontext,
TMemorymemory,LineLocationlocation,List<TValue>values,
Map<String,TValue>named)
end note
:final Stringfull=values.get(0).toString();;
:final Stringsearched=values.get(1).toString();;
:return TValue.fromInt(full.indexOf(searched));;
stop
end
@enduml

