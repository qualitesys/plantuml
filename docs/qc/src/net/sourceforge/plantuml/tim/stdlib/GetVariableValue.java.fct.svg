@startuml
!pragma layout smetana
start
note right
TFunctionSignaturegetSignature()
end note
:return new TFunctionSignature("%get_variable_value",1);;
stop
end
start
note right
booleancanCover(intnbArg,Set<String>namedArgument)
end note
:return nbArg==1;;
stop
end
start
note right
TValueexecuteReturnFunction(TContextcontext,
TMemorymemory,LineLocationlocation,List<TValue>values,
Map<String,TValue>named)
end note
:final Stringname=values.get(0).toString();;
:final TValuevariable=memory.getVariable(name);;
if (variable==null ) then (yes) 
:return TValue.fromString("");;
stop
endif 
:return variable;;
stop
end
@enduml

