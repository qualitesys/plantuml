@startuml
!pragma layout smetana
start
note right
constructor Filename(Definesdefines)
end note
:this.value=defines.getEnvironmentValue("filename");;
end
start
note right
TFunctionSignaturegetSignature()
end note
:return new TFunctionSignature("%filename",0);;
stop
end
start
note right
booleancanCover(intnbArg,Set<String>namedArgument)
end note
:return nbArg==0;;
stop
end
start
note right
TValueexecuteReturnFunction(TContextcontext,
TMemorymemory,LineLocationlocation,List<TValue>values,
Map<String,TValue>named)
end note
if (value==null ) then (yes) 
:return TValue.fromString("");;
stop
endif 
:return TValue.fromString(value);;
stop
end
@enduml

