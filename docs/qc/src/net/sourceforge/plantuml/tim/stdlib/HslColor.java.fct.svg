@startuml
!pragma layout smetana
start
note right
TFunctionSignaturegetSignature()
end note
:return new TFunctionSignature("%hsl_color",3);;
stop
end
start
note right
booleancanCover(intnbArg,Set<String>namedArgument)
end note
:return nbArg==3||nbArg==4;;
stop
end
start
note right
TValueexecuteReturnFunction(TContextcontext,
TMemorymemory,LineLocationlocation,List<TValue>values,
Map<String,TValue>named)
end note
:final inth=values.get(0).toInt();;
:final ints=values.get(1).toInt();;
:final intl=values.get(2).toInt();;
if (values.size()==3) then (yes) 
:final HSLColorcolor=new HSLColor(h,s,l);;
:final Colorrgb=color.getRGB();;
:return TValue.fromString(HColors.simple(rgb)
.asString());;
stop
endif 
:final inta=values.get(3).toInt();;
:final HSLColorcolor=new HSLColor(h,s,l,(float)(a/100.0));;
:final Colorrgb=color.getRGB();;
:return TValue.fromString(HColors.simple(rgb)
.asString());;
stop
end
@enduml

