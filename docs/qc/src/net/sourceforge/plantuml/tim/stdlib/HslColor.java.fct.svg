@startuml
!pragma layout smetana
start
note right
TFunctionSignature getSignature()
end note
:return new TFunctionSignature("%hsl_color",3);;
stop
end
start
note right
boolean canCover(int nbArg,Set<String> namedArgument)
end note
:return nbArg==3||nbArg==4;;
stop
end
start
note right
TValue executeReturnFunction(TContext context,
TMemory memory,LineLocation location,List<TValue> values,
Map<String,TValue> named)
end note
:final int h=values.get(0).toInt();;
:final int s=values.get(1).toInt();;
:final int l=values.get(2).toInt();;
if (values.size()==3) then (yes) 
:final HSLColor color=new HSLColor(h,s,l);;
:final Color rgb=color.getRGB();;
:return TValue.fromString(HColors.simple(rgb)
.asString());;
stop
endif 
:final int a=values.get(3).toInt();;
:final HSLColor color=new HSLColor(h,s,l,
(float )(a/100.0));;
:final Color rgb=color.getRGB();;
:return TValue.fromString(HColors.simple(rgb)
.asString());;
stop
end
@enduml

