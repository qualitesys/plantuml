9b04a00daa01619bb3c]
@startuml
!pragma layout smetana
start
note right
TFunctionSignaturegetSignature()
end note
:return new TFunctionSignature("%getenv",1);;
stop
end
start
note right
booleancanCover(intnbArg,Set<String>namedArgument)
end note
:return nbArg==1;;
stop
end
start
note right
TValueexecuteReturnFunction(TContextcontext,
TMemorymemory,LineLocationlocation,List<TValue>values,
Map<String,TValue>named)
end note
if (OptionFlags.ALLOW_INCLUDE==false) then (yes) 
:return TValue.fromString("");;
stop
endif 
:final Stringname=values.get(0).toString();;
:final Stringvalue=getenv(name);;
if (value==null ) then (yes) 
:return TValue.fromString("");;
stop
endif 
:return TValue.fromString(value);;
stop
end
start
note right
Stringgetenv(Stringname)
end note
if (SecurityUtils.isSecurityEnv(name)) then (yes) 
:return null ;;
stop
endif 
:final Stringenv=System.getProperty(name);;
if (env!=null ) then (yes) 
:return env;;
stop
endif 
:return System.getenv(name);;
stop
end
