@startuml
!pragma layout smetana
start
note right
TFunctionSignature getSignature()
end note
:return new TFunctionSignature("%size",1);;
stop
end
start
note right
boolean canCover(int nbArg,Set<String> namedArgument)
end note
:return nbArg==1;;
stop
end
start
note right
TValue executeReturnFunction(TContext context,
TMemory memory,LineLocation location,List<TValue> values,
Map<String,TValue> named)
end note
:final TValue value=values.get(0);;
if (value.isNumber()) then (yes) 
:return TValue.fromInt(0);;
stop
endif 
if (value.isString()) then (yes) 
:return TValue.fromInt(value.toString().length());;
stop
endif 
:final JsonValue json=value.toJson();;
if (json instanceof JsonArray ) then (yes) 
:final JsonArray array=(JsonArray )json;;
:return TValue.fromInt(array.size());;
stop
endif 
if (json instanceof JsonObject ) then (yes) 
:final JsonObject object=(JsonObject )json;;
:return TValue.fromInt(object.size());;
stop
endif 
:return TValue.fromInt(0);;
stop
end
@enduml

