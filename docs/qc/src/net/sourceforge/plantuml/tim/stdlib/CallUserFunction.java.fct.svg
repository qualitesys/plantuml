@startuml
!pragma layout smetana
start
note right
TFunctionSignature getSignature()
end note
:return new TFunctionSignature("%call_user_func",1);;
stop
end
start
note right
boolean canCover(int nbArg,Set<String> namedArgument)
end note
:return nbArg>0;;
stop
end
start
note right
TValue executeReturnFunction(TContext context,
TMemory memory,LineLocation location,List<TValue> values,
Map<String,TValue> named)
end note
:final String fname=values.get(0).toString();;
:final List<TValue> args=values.subList(1,
values.size());;
:final TFunctionSignature signature=new TFunctionSignature(fname,
args.size());;
:final TFunction func=context.getFunctionSmart(signature);;
if (func==null ) then (yes) 
:throw EaterException.unlocated("Cannot find void function "+
fname);;
stop
endif 
:return func.executeReturnFunction(context,
memory,location,args,named);;
stop
end
@enduml

