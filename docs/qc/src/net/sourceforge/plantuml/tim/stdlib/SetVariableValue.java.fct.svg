@startuml
!pragma layout smetana
start
note right
TFunctionSignature getSignature()
end note
:return new TFunctionSignature("%set_variable_value",2);;
stop
end
start
note right
boolean canCover(int nbArg,Set<String> namedArgument)
end note
:return nbArg==2;;
stop
end
start
note right
TValue executeReturnFunction(TContext context,
TMemory memory,LineLocation location,List<TValue> values,
Map<String,TValue> named)
end note
:final String name=values.get(0).toString();;
:final TValue value=values.get(1);;
:memory.putVariable(name,value,TVariableScope.GLOBAL);;
:return TValue.fromString("");;
stop
end
@enduml

