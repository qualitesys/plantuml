4453,172,637.4453,176,627.4453,172,631.4453" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[4ceb5b21b0c3fd4980ebd11b1309a582]
@startuml
!pragma layout smetana
start
note right
TFunctionSignature getSignature()
end note
:return new TFunctionSignature("%eval",1);;
stop
end
start
note right
boolean canCover(int nbArg,Set<String> namedArgument)
end note
:return nbArg==1;;
stop
end
start
note right
TValue executeReturnFunction(TContext context,
TMemory memory,LineLocation location,List<TValue> values,
Map<String,TValue> named)
end note
:final String exp=values.get(0).toString();;
:final StringEater eater=new StringEater(exp);;
:final TValue value=eater.eatExpression(context,
memory);;
:return TValue.fromInt(value.toInt());;
stop
end
@enduml

