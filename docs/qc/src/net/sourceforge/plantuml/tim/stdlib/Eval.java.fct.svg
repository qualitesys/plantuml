@startuml
!pragma layout smetana
start
note right
TFunctionSignaturegetSignature()
end note
:return new TFunctionSignature("%eval",1);;
stop
end
start
note right
booleancanCover(intnbArg,Set<String>namedArgument)
end note
:return nbArg==1;;
stop
end
start
note right
TValueexecuteReturnFunction(TContextcontext,
TMemorymemory,LineLocationlocation,List<TValue>values,
Map<String,TValue>named)
end note
:final Stringexp=values.get(0).toString();;
:final StringEatereater=new StringEater(exp);;
:final TValuevalue=eater.eatExpression(context,
memory);;
:return TValue.fromInt(value.toInt());;
stop
end
@enduml

