@startuml
!pragma layout smetana
start
note right
TFunctionSignature getSignature()
end note
:return new TFunctionSignature("%get_json_keys",1);;
stop
end
start
note right
boolean canCover(int nbArg,Set<String> namedArgument)
end note
:return nbArg==1;;
stop
end
start
note right
TValue executeReturnFunction(TContext context,
TMemory memory,LineLocation location,List<TValue> values,
Map<String,TValue> named)
end note
:final TValue data=values.get(0);;
if (data.isJson()==false) then (yes) 
:throw EaterException.unlocated("Not JSON data");;
stop
endif 
:final JsonValue json=data.toJson();;
if (json.isObject()) then (yes) 
:final JsonObject object=(JsonObject )json;;
:final JsonArray result=new JsonArray();;
:result.add(key);;
:return TValue.fromJson(result);;
stop
endif 
if (json.isArray()) then (yes) 
:final JsonArray array=(JsonArray )json;;
:final JsonArray result=new JsonArray();;
:final JsonObject object=(JsonObject )tmp;;
:result.add(key);;
:return TValue.fromJson(result);;
stop
endif 
:throw EaterException.unlocated("Bad JSON type");;
stop
end
@enduml

