ext><line style="stroke:#181818;stroke-width:1.0;" x1="380.5" x2="539" y1="419.6016" y2="419.6016"/><line style="stroke:#181818;stroke-width:1.0;" x1="539" x2="539" y1="419.6016" y2="467.2109"/><polygon fill="#181818" points="535,457.2109,539,467.2109,543,457.2109,539,461.2109" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="105" x="539" y="447.2144">catch (Throwablet)</text><line style="stroke:#181818;stroke-width:1.0;" x1="327.5" x2="327.5" y1="369.9023" y2="407.6016"/><polygon fill="#181818" points="323.5,397.6016,327.5,407.6016,331.5,397.6016,327.5,401.6016" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[5f0fa251aa624497a4e6110020ba9a9e]
@startuml
!pragma layout smetana
start
note right
TFunctionSignaturegetSignature()
end note
:return new TFunctionSignature("%dec2hex",1);;
stop
end
start
note right
booleancanCover(intnbArg,Set<String>namedArgument)
end note
:return nbArg==1;;
stop
end
start
note right
TValueexecuteReturnFunction(TContextcontext,
TMemorymemory,LineLocationlocation,List<TValue>values,
Map<String,TValue>named)
end note
switch (try/catch block)
case (try)
:return TValue.fromString(""+Integer.toHexString(values.get(0)
.toInt()));;
stop
case (catch (Throwablet))
:return TValue.fromString("");;
stop
endswitch
end
@enduml

