@startuml
!pragma layout smetana
start
note right
TFunctionSignature getSignature()
end note
:return new TFunctionSignature("%hex2dec",1);;
stop
end
start
note right
boolean canCover(int nbArg,Set<String> namedArgument)
end note
:return nbArg==1;;
stop
end
start
note right
TValue executeReturnFunction(TContext context,
TMemory memory,LineLocation location,List<TValue> values,
Map<String,TValue> named)
end note
switch (try/catch block)
case (try)
:return TValue.fromInt(Integer.parseInt(values.get(0).toString(),
16));;
stop
case (catch (Throwable t))
:return TValue.fromInt(0);;
stop
endswitch
end
@enduml

