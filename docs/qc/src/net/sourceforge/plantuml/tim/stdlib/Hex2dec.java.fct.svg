 font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="15" x="218.5" y="447.2144">try</text><line style="stroke:#181818;stroke-width:1.0;" x1="377.75" x2="533.5" y1="419.6016" y2="419.6016"/><line style="stroke:#181818;stroke-width:1.0;" x1="533.5" x2="533.5" y1="419.6016" y2="467.2109"/><polygon fill="#181818" points="529.5,457.2109,533.5,467.2109,537.5,457.2109,533.5,461.2109" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="105" x="533.5" y="447.2144">catch (Throwablet)</text><line style="stroke:#181818;stroke-width:1.0;" x1="324.75" x2="324.75" y1="369.9023" y2="407.6016"/><polygon fill="#181818" points="320.75,397.6016,324.75,407.6016,328.75,397.6016,324.75,401.6016" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[79714b44ed21b71c539d72ab8708caba]
@startuml
!pragma layout smetana
start
note right
TFunctionSignaturegetSignature()
end note
:return new TFunctionSignature("%hex2dec",1);;
stop
end
start
note right
booleancanCover(intnbArg,Set<String>namedArgument)
end note
:return nbArg==1;;
stop
end
start
note right
TValueexecuteReturnFunction(TContextcontext,
TMemorymemory,LineLocationlocation,List<TValue>values,
Map<String,TValue>named)
end note
switch (try/catch block)
case (try)
:return TValue.fromInt(Integer.parseInt(values.get(0).toString(),
16));;
stop
case (catch (Throwablet))
:return TValue.fromInt(0);;
stop
endswitch
end
@enduml

