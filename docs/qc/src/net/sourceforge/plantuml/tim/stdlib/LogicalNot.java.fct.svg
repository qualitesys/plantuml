@startuml
!pragma layout smetana
start
note right
TFunctionSignaturegetSignature()
end note
:return new TFunctionSignature("%not",1);;
stop
end
start
note right
booleancanCover(intnbArg,Set<String>namedArgument)
end note
:return nbArg==1;;
stop
end
start
note right
TValueexecuteReturnFunction(TContextcontext,
TMemorymemory,LineLocationlocation,List<TValue>values,
Map<String,TValue>named)
end note
:final booleanarg=values.get(0).toBoolean();;
:return TValue.fromBoolean(!arg);;
stop
end
@enduml

