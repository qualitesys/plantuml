="11" lengthAdjust="spacing" textLength="15" x="198" y="848.0073">try</text><line style="stroke:#181818;stroke-width:1.0;" x1="437.5" x2="581.5" y1="820.3945" y2="820.3945"/><line style="stroke:#181818;stroke-width:1.0;" x1="581.5" x2="581.5" y1="820.3945" y2="868.0039"/><polygon fill="#181818" points="577.5,858.0039,581.5,868.0039,585.5,858.0039,581.5,862.0039" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="103" x="581.5" y="848.0073">catch (Exceptione)</text><line style="stroke:#181818;stroke-width:1.0;" x1="384.5" x2="384.5" y1="788.3945" y2="808.3945"/><polygon fill="#181818" points="380.5,798.3945,384.5,808.3945,388.5,798.3945,384.5,802.3945" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[4f00f5161e5df8f32812fbca208c0514]
@startuml
!pragma layout smetana
start
note right
TFunctionSignaturegetSignature()
end note
:return new TFunctionSignature("%date",2);;
stop
end
start
note right
booleancanCover(intnbArg,Set<String>namedArgument)
end note
:return nbArg==0||nbArg==1||nbArg==2;;
stop
end
start
note right
TValueexecuteReturnFunction(TContextcontext,
TMemorymemory,LineLocationlocation,List<TValue>values,
Map<String,TValue>named)
end note
if (values.size()==0) then (yes) 
:return TValue.fromString(new Date().toString());;
stop
endif 
:final Stringformat=values.get(0).toString();;
:final longnow;;
if (values.size()==2) then (yes) 
:now=1000L*values.get(1).toInt();;
else (no)
:now=System.currentTimeMillis();;
endif 
switch (try/catch block)
case (try)
:return TValue.fromString(new SimpleDateFormat(format)
.format(now));;
stop
case (catch (Exceptione))
:throw EaterException.unlocated("Bad date pattern");;
stop
endswitch
end
@enduml

