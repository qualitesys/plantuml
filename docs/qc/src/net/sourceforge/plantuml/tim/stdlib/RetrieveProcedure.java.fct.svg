@startuml
!pragma layout smetana
start
note right
TFunctionSignaturegetSignature()
end note
:return new TFunctionSignature("%retrieve_procedure",1);;
stop
end
start
note right
booleancanCover(intnbArg,Set<String>namedArgument)
end note
:return nbArg>0;;
stop
end
start
note right
TValueexecuteReturnFunction(TContextcontext,
TMemorymemory,LineLocationlocation,List<TValue>values,
Map<String,TValue>named)
end note
:final Stringfname=values.get(0).toString();;
:final List<TValue>args=values.subList(1,
values.size());;
:final TFunctionSignaturesignature=new TFunctionSignature(fname,
args.size());;
:final TFunctionfunc=context.getFunctionSmart(signature);;
:final intn1=context.getResultList().size();;
:func.executeProcedureInternal(context,memory,
args,Collections.<String,TValue>emptyMap());;
:final Stringextracted=context.extractFromResultList(n1);;
:return TValue.fromString(extracted);;
stop
end
@enduml

