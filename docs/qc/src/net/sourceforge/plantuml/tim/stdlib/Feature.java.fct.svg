@startuml
!pragma layout smetana
start
note right
TFunctionSignature getSignature()
end note
:return new TFunctionSignature("%feature",1);;
stop
end
start
note right
boolean canCover(int nbArg,Set<String> namedArgument)
end note
:return nbArg==1;;
stop
end
start
note right
TValue executeReturnFunction(TContext context,
TMemory memory,LineLocation location,List<TValue> values,
Map<String,TValue> named)
end note
:final String arg=values.get(0).toString();;
if (String.valueOf("style").equalsIgnoreCase(arg)) then (yes) 
:return TValue.fromInt(1);;
stop
endif 
if (String.valueOf("theme").equalsIgnoreCase(arg)) then (yes) 
:return TValue.fromInt(1);;
stop
endif 
:return TValue.fromInt(0);;
stop
end
@enduml

