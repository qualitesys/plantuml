/><polygon fill="#181818" points="157.5,734.3945,161.5,744.3945,165.5,734.3945,161.5,738.3945" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="161.5" x2="161.5" y1="1017.1367" y2="1037.1367"/><polygon fill="#181818" points="157.5,1027.1367,161.5,1037.1367,165.5,1027.1367,161.5,1031.1367" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="161.5" x2="161.5" y1="1071.1055" y2="1091.1055"/><polygon fill="#181818" points="157.5,1081.1055,161.5,1091.1055,165.5,1081.1055,161.5,1085.1055" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[80e4ce88b58d9b74f9b3ac5efffa0a7b]
@startuml
!pragma layout smetana
start
note right
TFunctionSignature getSignature()
end note
:return new TFunctionSignature("%substr",3);;
stop
end
start
note right
boolean canCover(int nbArg,Set<String> namedArgument)
end note
:return nbArg==2||nbArg==3;;
stop
end
start
note right
TValue executeReturnFunction(TContext context,
TMemory memory,LineLocation location,List<TValue> values,
Map<String,TValue> named)
end note
:final String full=values.get(0).toString();;
:final int pos=values.get(1).toInt();;
if (pos>=full.length()) then (yes) 
:return TValue.fromString("");;
stop
endif 
:String result=full.substring(pos);;
if (values.size()==3) then (yes) 
:final int len=values.get(2).toInt();;
if (len<result.length()) then (yes) 
:result=result.substring(0,len);;
endif 
endif 
:return TValue.fromString(result);;
stop
end
@enduml

