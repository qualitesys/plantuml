-serif" font-size="11" lengthAdjust="spacing" textLength="180" x="609.5" y="501.1831">catch (NoSuchColorException e)</text><line style="stroke:#181818;stroke-width:1.0;" x1="400.25" x2="400.25" y1="441.5703" y2="461.5703"/><polygon fill="#181818" points="396.25,451.5703,400.25,461.5703,404.25,451.5703,400.25,455.5703" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[0ed041385305361b7878898367810988]
@startuml
!pragma layout smetana
start
note right
TFunctionSignature getSignature()
end note
:return new TFunctionSignature("%reverse_color",1);;
stop
end
start
note right
boolean canCover(int nbArg,Set<String> namedArgument)
end note
:return nbArg==1;;
stop
end
start
note right
TValue executeReturnFunction(TContext context,
TMemory memory,LineLocation location,List<TValue> values,
Map<String,TValue> named)
end note
:final String colorString=values.get(0).toString();;
switch (try/catch block)
case (try)
:HColor color=HColorSet.instance().getColorLEGACY(colorString);;
:color=color.reverse();;
:return TValue.fromString(color.asString());;
stop
case (catch (NoSuchColorException e))
:throw EaterException.located("No such color");;
stop
endswitch
end
@enduml

