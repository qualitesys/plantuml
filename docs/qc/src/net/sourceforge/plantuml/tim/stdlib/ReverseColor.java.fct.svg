-size="11" lengthAdjust="spacing" textLength="176" x="605.5" y="501.1831">catch (NoSuchColorExceptione)</text><line style="stroke:#181818;stroke-width:1.0;" x1="396.25" x2="396.25" y1="441.5703" y2="461.5703"/><polygon fill="#181818" points="392.25,451.5703,396.25,461.5703,400.25,451.5703,396.25,455.5703" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[3ae13ba0035579f8c572a74db8076e9d]
@startuml
!pragma layout smetana
start
note right
TFunctionSignaturegetSignature()
end note
:return new TFunctionSignature("%reverse_color",1);;
stop
end
start
note right
booleancanCover(intnbArg,Set<String>namedArgument)
end note
:return nbArg==1;;
stop
end
start
note right
TValueexecuteReturnFunction(TContextcontext,
TMemorymemory,LineLocationlocation,List<TValue>values,
Map<String,TValue>named)
end note
:final StringcolorString=values.get(0).toString();;
switch (try/catch block)
case (try)
:HColorcolor=HColorSet.instance().getColorLEGACY(colorString);;
:color=color.reverse();;
:return TValue.fromString(color.asString());;
stop
case (catch (NoSuchColorExceptione))
:throw EaterException.located("No such color");;
stop
endswitch
end
@enduml

