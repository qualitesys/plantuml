@startuml
!pragma layout smetana
start
note right
TFunctionSignaturegetSignature()
end note
:return new TFunctionSignature("%file_exists",1);;
stop
end
start
note right
booleancanCover(intnbArg,Set<String>namedArgument)
end note
:return nbArg==1;;
stop
end
start
note right
TValueexecuteReturnFunction(TContextcontext,
TMemorymemory,LineLocationlocation,List<TValue>values,
Map<String,TValue>named)
end note
if (OptionFlags.ALLOW_INCLUDE==false) then (yes) 
:return TValue.fromBoolean(false);;
stop
endif 
:final Stringpath=values.get(0).toString();;
:return TValue.fromBoolean(fileExists(path));;
stop
end
start
note right
booleanfileExists(Stringpath)
end note
:final SFilef=new SFile(path);;
:return f.exists();;
stop
end
@enduml

