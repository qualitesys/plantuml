@startuml
!pragma layout smetana
start
note right
TFunctionSignature getSignature()
end note
:return new TFunctionSignature("%file_exists",1);;
stop
end
start
note right
boolean canCover(int nbArg,Set<String> namedArgument)
end note
:return nbArg==1;;
stop
end
start
note right
TValue executeReturnFunction(TContext context,
TMemory memory,LineLocation location,List<TValue> values,
Map<String,TValue> named)
end note
if (OptionFlags.ALLOW_INCLUDE==false) then (yes) 
:return TValue.fromBoolean(false);;
stop
endif 
:final String path=values.get(0).toString();;
:return TValue.fromBoolean(fileExists(path));;
stop
end
start
note right
boolean fileExists(String path)
end note
:final SFile f=new SFile(path);;
:return f.exists();;
stop
end
@enduml

