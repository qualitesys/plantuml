@startuml
!pragma layout smetana
start
note right
TFunctionSignature getSignature()
end note
:return new TFunctionSignature("%splitstr",3);;
stop
end
start
note right
boolean canCover(int nbArg,Set<String> namedArgument)
end note
:return nbArg==2;;
stop
end
start
note right
TValue executeReturnFunction(TContext context,
TMemory memory,LineLocation location,List<TValue> values,
Map<String,TValue> named)
end note
:final JsonArray result=new JsonArray();;
:final String str=values.get(0).toString();;
:final String separator=values.get(1).toString();;
:final StringTokenizer tokenizer=new StringTokenizer(str,
separator);;
while (tokenizer.hasMoreElements())
:result.add(tokenizer.nextToken());;
endwhile
:return TValue.fromJson(result);;
stop
end
@enduml

