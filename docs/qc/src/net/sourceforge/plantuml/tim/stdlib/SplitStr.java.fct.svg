idth:1.0;" x1="64" x2="193" y1="737.4141" y2="737.4141"/><line style="stroke:#181818;stroke-width:1.0;" x1="193" x2="193" y1="737.4141" y2="757.4141"/><polygon fill="#181818" points="189,747.4141,193,757.4141,197,747.4141,193,751.4141" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="193" x2="193" y1="617.4453" y2="637.4453"/><polygon fill="#181818" points="189,627.4453,193,637.4453,197,627.4453,193,631.4453" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="193" x2="193" y1="791.3828" y2="811.3828"/><polygon fill="#181818" points="189,801.3828,193,811.3828,197,801.3828,193,805.3828" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[e1814500f4a7f98aa5e1591da6fe7df9]
@startuml
!pragma layout smetana
start
note right
TFunctionSignaturegetSignature()
end note
:return new TFunctionSignature("%splitstr",3);;
stop
end
start
note right
booleancanCover(intnbArg,Set<String>namedArgument)
end note
:return nbArg==2;;
stop
end
start
note right
TValueexecuteReturnFunction(TContextcontext,
TMemorymemory,LineLocationlocation,List<TValue>values,
Map<String,TValue>named)
end note
:final JsonArrayresult=new JsonArray();;
:final Stringstr=values.get(0).toString();;
:final Stringseparator=values.get(1).toString();;
:final StringTokenizertokenizer=new StringTokenizer(str,
separator);;
while (tokenizer.hasMoreElements())
:result.add(tokenizer.nextToken());;
endwhile
:return TValue.fromJson(result);;
stop
end
@enduml

