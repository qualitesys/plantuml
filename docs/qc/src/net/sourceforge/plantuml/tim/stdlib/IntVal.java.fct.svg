"#181818" points="268.5,695.1172,272.5,705.1172,276.5,695.1172,272.5,699.1172" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[faabaaa81bae9094640b27ca55e0b600]
@startuml
!pragma layout smetana
start
note right
TFunctionSignaturegetSignature()
end note
:return new TFunctionSignature("%intval",1);;
stop
end
start
note right
booleancanCover(intnbArg,Set<String>namedArgument)
end note
:return nbArg==1;;
stop
end
start
note right
TValueexecuteReturnFunction(TContextcontext,
TMemorymemory,LineLocationlocation,List<TValue>values,
Map<String,TValue>named)
end note
:final Strings=values.get(0).toString();;
switch (try/catch block)
case (try)
:return TValue.fromInt(Integer.parseInt(s));;
stop
case (catch (Exceptione))
:Log.error("Cannot convert "+s);;
endswitch
:return TValue.fromInt(0);;
stop
end
@enduml

