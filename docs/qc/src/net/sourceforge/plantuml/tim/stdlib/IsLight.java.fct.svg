5" y1="555.1484" y2="575.1484"/><polygon fill="#181818" points="230.5,565.1484,234.5,575.1484,238.5,565.1484,234.5,569.1484" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="234.5" x2="234.5" y1="609.1172" y2="629.1172"/><polygon fill="#181818" points="230.5,619.1172,234.5,629.1172,238.5,619.1172,234.5,623.1172" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="635.5" x2="635.5" y1="555.1484" y2="575.1484"/><polygon fill="#181818" points="631.5,565.1484,635.5,575.1484,639.5,565.1484,635.5,569.1484" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="358.25" x2="234.5" y1="473.5703" y2="473.5703"/><line style="stroke:#181818;stroke-width:1.0;" x1="234.5" x2="234.5" y1="473.5703" y2="521.1797"/><polygon fill="#181818" points="230.5,511.1797,234.5,521.1797,238.5,511.1797,234.5,515.1797" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="15" x="234.5" y="501.1831">try</text><line style="stroke:#181818;stroke-width:1.0;" x1="464.25" x2="635.5" y1="473.5703" y2="473.5703"/><line style="stroke:#181818;stroke-width:1.0;" x1="635.5" x2="635.5" y1="473.5703" y2="521.1797"/><polygon fill="#181818" points="631.5,511.1797,635.5,521.1797,639.5,511.1797,635.5,515.1797" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="176" x="635.5" y="501.1831">catch (NoSuchColorExceptione)</text><line style="stroke:#181818;stroke-width:1.0;" x1="411.25" x2="411.25" y1="441.5703" y2="461.5703"/><polygon fill="#181818" points="407.25,451.5703,411.25,461.5703,415.25,451.5703,411.25,455.5703" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[4626dc83b14219d2660760662c6564d6]
@startuml
!pragma layout smetana
start
note right
TFunctionSignaturegetSignature()
end note
:return new TFunctionSignature("%is_light",1);;
stop
end
start
note right
booleancanCover(intnbArg,Set<String>namedArgument)
end note
:return nbArg==1;;
stop
end
start
note right
TValueexecuteReturnFunction(TContextcontext,
TMemorymemory,LineLocationlocation,List<TValue>values,
Map<String,TValue>named)
end note
:final StringcolorString=values.get(0).toString();;
switch (try/catch block)
case (try)
:final HColorcolor=HColorSet.instance().getColorLEGACY(colorString);;
:return TValue.fromBoolean(!color.isDark());;
stop
case (catch (NoSuchColorExceptione))
:throw EaterException.located("No such color");;
stop
endswitch
end
@enduml

