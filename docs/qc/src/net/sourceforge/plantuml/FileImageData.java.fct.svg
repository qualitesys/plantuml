@startuml
!pragma layout smetana
start
note right
constructor FileImageData(SFilefile,ImageDataimageData)
end note
:this.file=file;;
:this.imageData=imageData;;
end
start
note right
SFilegetFile()
end note
:return file;;
stop
end
start
note right
ImageDatagetImageData()
end note
:return imageData;;
stop
end
start
note right
intgetStatus()
end note
if (imageData==null ) then (yes) 
:return 0;;
stop
endif 
:return imageData.getStatus();;
stop
end
@enduml

