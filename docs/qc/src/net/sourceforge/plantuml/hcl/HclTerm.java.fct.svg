@startuml
!pragma layout smetana
start
note right
constructor HclTerm(SymbolTypetype)
end note
:this.type=type;;
:this.data=null ;;
end
start
note right
constructor HclTerm(SymbolTypetype,Stringdata)
end note
:this.type=type;;
:this.data=Objects.requireNonNull(data);;
end
start
note right
StringtoString()
end note
if (data==null ) then (yes) 
:return type.toString();;
stop
endif 
:return type+"("+data+")";;
stop
end
start
note right
SymbolTypegetType()
end note
:return type;;
stop
end
start
note right
StringgetData()
end note
:return data;;
stop
end
start
note right
booleanis(SymbolTypetype)
end note
:return this.type==type;;
stop
end
start
note right
booleanis(SymbolTypetype1,SymbolTypetype2)
end note
:return this.type==type1||this.type==type2;;
stop
end
@enduml

