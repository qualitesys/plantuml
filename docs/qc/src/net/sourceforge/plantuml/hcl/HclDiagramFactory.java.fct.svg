@startuml
!pragma layout smetana
start
note right
constructor HclDiagramFactory()
end note
:super (DiagramType.HCL);;
end
start
note right
Diagram createSystem(UmlSource source,Map<String,
String> skinParam)
end note
:final List<String> highlighted=new ArrayList<>();;
:JsonValue data=null ;;
:StyleExtractor styleExtractor=null ;;
switch (try/catch block)
case (try)
:final HclSource list=new HclSource();;
:styleExtractor=new StyleExtractor(source.iterator2());;
:final Iterator<String> it=styleExtractor.getIterator();;
:it.next();;
while (true)
:final String line=it.next();;
if (it.hasNext()==false) then (yes) 
:break ;;
endif 
:list.add(line);;
endwhile
:HclParser parser=new HclParser(list);;
:data=parser.parseMe();;
case (catch (Exception e))
:Logme.error(e);;
endswitch
:final JsonDiagram result=new JsonDiagram(source,
UmlDiagramType.HCL,data,highlighted);;
:return result;;
stop
end
@enduml

