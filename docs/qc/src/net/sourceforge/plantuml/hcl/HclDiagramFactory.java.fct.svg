end note
:final List<String>highlighted=new ArrayList<>();;
:JsonValuedata=null ;;
:StyleExtractorstyleExtractor=null ;;
switch (try/catch block)
case (try)
:final HclSourcelist=new HclSource();;
:styleExtractor=new StyleExtractor(source.iterator2());;
:final Iterator<String>it=styleExtractor.getIterator();;
:it.next();;
while (true)
:final Stringline=it.next();;
if (it.hasNext()==false) then (yes) 
:break ;;
endif 
:list.add(line);;
endwhile
:HclParserparser=new HclParser(list);;
:data=parser.parseMe();;
case (catch (Exceptione))
