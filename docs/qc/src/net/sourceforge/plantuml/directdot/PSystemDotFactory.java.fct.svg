@startuml
!pragma layout smetana
start
note right
constructor PSystemDotFactory(DiagramType diagramType)
end note
:super (diagramType);;
end
start
note right
PSystemDot initDiagram(UmlSource source,String startLine)
end note
:data=null ;;
:return null ;;
stop
end
start
note right
PSystemDot executeLine(UmlSource source,PSystemDot system,
String line)
end note
if (system==null &&line.matches("(strict\\s+)?(di)?graph\\s+\"?[-\\w]+\"?\\s*\\{")) then (yes) 
:data=new StringBuilder(line);;
:data.append("\n");;
:return new PSystemDot(source,data.toString());;
stop
endif 
if (data==null ||system==null ) then (yes) 
:return null ;;
stop
endif 
:data.append(line);;
:data.append("\n");;
:return new PSystemDot(source,data.toString());;
stop
end
@enduml

