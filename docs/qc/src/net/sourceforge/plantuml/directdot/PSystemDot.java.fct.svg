<polygon fill="#181818" points="395.5,1076.8672,399.5,1086.8672,403.5,1076.8672,399.5,1080.8672" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="399.5" x2="399.5" y1="818.5898" y2="838.5898"/><polygon fill="#181818" points="395.5,828.5898,399.5,838.5898,403.5,828.5898,399.5,832.5898" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="399.5" x2="399.5" y1="1120.8359" y2="1140.8359"/><polygon fill="#181818" points="395.5,1130.8359,399.5,1140.8359,403.5,1130.8359,399.5,1134.8359" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[3ed4b28b5b4f94eeb0acf5221160eabc]
@startuml
!pragma layout smetana
start
note right
constructor PSystemDot(UmlSource source,String data)
end note
:super (source);;
:this.data=data;;
end
start
note right
DiagramDescription getDescription()
end note
:return new DiagramDescription("(Dot)");;
stop
end
start
note right
ImageData exportDiagramNow(OutputStream os,
int num,FileFormatOption fileFormat)
end note
:final Graphviz graphviz=GraphvizUtils.createForSystemDot(null ,
data,StringUtils.goLowerCase(fileFormat.getFileFormat().name()));;
if (graphviz.getExeState()!=ExeState.OK) then (yes) 
:final TextBlock result=GraphicStrings.createForError(Arrays.asList("There is an issue with your Dot/Graphviz installation"),
false);;
:return plainImageBuilder(result,fileFormat)
.seed(seed()).status(FileImageData.CRASH).write(os);;
stop
endif 
:final CounterOutputStream counter=new CounterOutputStream(os);;
:final ProcessState state=graphviz.createFile3(counter);;
if (counter.getLength()==0||state.differs(ProcessState.TERMINATED_OK())) then (yes) 
:final TextBlock result=GraphicStrings.createForError(Arrays.asList("GraphViz has crashed"),
false);;
:return plainImageBuilder(result,fileFormat)
.seed(seed()).status(FileImageData.CRASH).write(os);;
stop
endif 
:return ImageDataSimple.ok();;
stop
end
@enduml

