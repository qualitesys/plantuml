l="#181818" points="393.5,1076.8672,397.5,1086.8672,401.5,1076.8672,397.5,1080.8672" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="397.5" x2="397.5" y1="818.5898" y2="838.5898"/><polygon fill="#181818" points="393.5,828.5898,397.5,838.5898,401.5,828.5898,397.5,832.5898" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="397.5" x2="397.5" y1="1120.8359" y2="1140.8359"/><polygon fill="#181818" points="393.5,1130.8359,397.5,1140.8359,401.5,1130.8359,397.5,1134.8359" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[f48591b4a9de716acb5679dc724f79ef]
@startuml
!pragma layout smetana
start
note right
constructor PSystemDot(UmlSourcesource,Stringdata)
end note
:super (source);;
:this.data=data;;
end
start
note right
DiagramDescriptiongetDescription()
end note
:return new DiagramDescription("(Dot)");;
stop
end
start
note right
ImageDataexportDiagramNow(OutputStreamos,
intnum,FileFormatOptionfileFormat)
end note
:final Graphvizgraphviz=GraphvizUtils.createForSystemDot(null ,
data,StringUtils.goLowerCase(fileFormat.getFileFormat().name()));;
if (graphviz.getExeState()!=ExeState.OK) then (yes) 
:final TextBlockresult=GraphicStrings.createForError(Arrays.asList("There is an issue with your Dot/Graphviz installation"),
false);;
:return plainImageBuilder(result,fileFormat)
.seed(seed()).status(FileImageData.CRASH).write(os);;
stop
endif 
:final CounterOutputStreamcounter=new CounterOutputStream(os);;
:final ProcessStatestate=graphviz.createFile3(counter);;
if (counter.getLength()==0||state.differs(ProcessState.TERMINATED_OK())) then (yes) 
:final TextBlockresult=GraphicStrings.createForError(Arrays.asList("GraphViz has crashed"),
false);;
:return plainImageBuilder(result,fileFormat)
.seed(seed()).status(FileImageData.CRASH).write(os);;
stop
endif 
:return ImageDataSimple.ok();;
stop
end
@enduml

