@startuml
!pragma layout smetana
start
note right
void manage(doublex,doubley)
end note
if (x<minX) then (yes) 
:minX=x;;
endif 
if (y<minY) then (yes) 
:minY=y;;
endif 
end
start
note right
void manage(XPoint2Dp)
end note
:Objects.requireNonNull(p);;
:manage(p.getX(),p.getY());;
end
start
note right
void manage(MinFinderother)
end note
:manage(other.minX,other.minY);;
end
start
note right
StringtoString()
end note
:return "minX="+minX+" minY="+minY;;
stop
end
start
note right
doublegetMinX()
end note
:return minX;;
stop
end
start
note right
doublegetMinY()
end note
:return minY;;
stop
end
@enduml

