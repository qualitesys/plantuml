@startuml
!pragma layout smetana
start
note right
constructor DecorateEntityImage3(TextBlockoriginal,
HColorcolor)
end note
:this.original=original;;
:this.color=color;;
end
start
note right
XDimension2DcalculateDimension(StringBounderstringBounder)
end note
:return original.calculateDimension(stringBounder);;
stop
end
start
note right
void drawU(UGraphicug)
end note
:original.drawU(ug);;
end
start
note right
HColorgetBackcolor()
end note
:return color;;
stop
end
@enduml

