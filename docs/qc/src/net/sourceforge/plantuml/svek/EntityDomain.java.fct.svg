5" x2="201.5" y1="750.457" y2="773.0234"/><polygon fill="#181818" points="197.5,763.0234,201.5,773.0234,205.5,763.0234,201.5,767.0234" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="201.5" x2="201.5" y1="820.9609" y2="840.9609"/><polygon fill="#181818" points="197.5,830.9609,201.5,840.9609,205.5,830.9609,201.5,834.9609" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[898ca164d549d21153fa582957dc0d9e]
@startuml
!pragma layout smetana
start
note right
constructor EntityDomain(SymbolContextsymbolContext)
end note
:this.symbolContext=symbolContext;;
end
start
note right
void drawU(UGraphicug)
end note
:doublex=0;;
:doubley=0;;
:x+=margin;;
:y+=margin;;
:ug=symbolContext.apply(ug);;
:final UEllipsecircle=new UEllipse(radius*2,
radius*2);;
:circle.setDeltaShadow(symbolContext.getDeltaShadow());;
:ug.apply(new UTranslate(x,y)).draw(circle);;
:ug.apply(new UTranslate(x,y+2*radius+suppY))
.draw(ULine.hline(2*radius));;
end
start
note right
XDimension2DcalculateDimension(StringBounderstringBounder)
end note
:return new XDimension2D(radius*2+2*margin,radius*2+
2*margin);;
stop
end
@enduml

