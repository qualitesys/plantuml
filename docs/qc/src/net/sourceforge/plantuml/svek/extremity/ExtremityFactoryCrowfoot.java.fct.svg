@startuml
!pragma layout smetana
start
note right
UDrawablecreateUDrawable(XPoint2Dp0,XPoint2Dp1,
XPoint2Dp2,Sideside)
end note
:final doubleortho=atan2(p0,p2);;
:return new ExtremityCrowfoot(p1,ortho,side);;
stop
end
start
note right
UDrawablecreateUDrawable(XPoint2Dp0,doubleangle,
Sideside)
end note
:angle-=Math.PI/2;;
:return new ExtremityCrowfoot(p0,angle,side);;
stop
end
@enduml

