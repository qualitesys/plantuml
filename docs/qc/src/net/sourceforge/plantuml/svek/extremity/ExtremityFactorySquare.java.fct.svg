@startuml
!pragma layout smetana
start
note right
constructor ExtremityFactorySquare(HColor backgroundColor)
end note
:this.backgroundColor=backgroundColor;;
end
start
note right
UDrawable createUDrawable(XPoint2D p0,double angle,
Side side)
end note
:return new ExtremitySquare(p0,backgroundColor);;
stop
end
start
note right
UDrawable createUDrawable(XPoint2D p0,XPoint2D p1,
XPoint2D p2,Side side)
end note
:return new ExtremitySquare(p1,backgroundColor);;
stop
end
@enduml

