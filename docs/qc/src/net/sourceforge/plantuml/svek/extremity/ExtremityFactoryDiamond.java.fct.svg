@startuml
!pragma layout smetana
start
note right
UDrawablecreateUDrawable(XPoint2Dp0,doubleangle,
Sideside)
end note
:return new ExtremityDiamond(p0,angle-Math.PI/2,
fill);;
stop
end
start
note right
constructor ExtremityFactoryDiamond(booleanfill)
end note
:this.fill=fill;;
end
start
note right
UDrawablecreateUDrawable(XPoint2Dp0,XPoint2Dp1,
XPoint2Dp2,Sideside)
end note
:final doubleortho=atan2(p0,p2);;
:return new ExtremityDiamond(p1,ortho,fill);;
stop
end
@enduml

