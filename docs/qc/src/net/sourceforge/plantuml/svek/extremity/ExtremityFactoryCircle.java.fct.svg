0.5,566.6094,154.5,556.6094,150.5,560.6094" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="150.5" x2="150.5" y1="614.5469" y2="634.5469"/><polygon fill="#181818" points="146.5,624.5469,150.5,634.5469,154.5,624.5469,150.5,628.5469" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[b6d3716992ffb63f1ec16abbcd087568]
@startuml
!pragma layout smetana
start
note right
constructor ExtremityFactoryCircle(booleanfill,
HColorbackgroundColor)
end note
:this.fill=fill;;
:this.backgroundColor=backgroundColor;;
end
start
note right
UDrawablecreateUDrawable(XPoint2Dcenter,doubleangle,
Sideside)
end note
:angle-=Math.PI/2;;
:return ExtremityCircle.create(center,fill,
angle,backgroundColor);;
stop
end
start
note right
UDrawablecreateUDrawable(XPoint2Dp0,XPoint2Dp1,
XPoint2Dp2,Sideside)
end note
:final doubleortho=atan2(p0,p2);;
:return ExtremityCircle.create(p1,fill,ortho,
backgroundColor);;
stop
end
@enduml

