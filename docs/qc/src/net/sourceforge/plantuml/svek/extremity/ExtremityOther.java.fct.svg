@startuml
!pragma layout smetana
start
note right
constructor ExtremityOther(UPolygonpolygon)
end note
:this.polygon=polygon;;
end
start
note right
void drawU(UGraphicug)
end note
:ug.draw(polygon);;
end
start
note right
XPoint2DsomePoint()
end note
:return polygon.getPoints().get(0);;
stop
end
