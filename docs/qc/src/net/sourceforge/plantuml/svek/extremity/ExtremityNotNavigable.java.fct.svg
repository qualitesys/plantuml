@startuml
!pragma layout smetana
start
note right
XPoint2D somePoint()
end note
:return contact;;
stop
end
start
note right
constructor ExtremityNotNavigable(XPoint2D p1,
double angle)
end note
:this.contact=new XPoint2D(p1.getX(),p1.getY());;
:angle=manageround(angle);;
:final double size=4;;
:final double move=5;;
:path.moveTo(-size,0);;
:path.lineTo(size,2*size);;
:path.moveTo(size,0);;
:path.lineTo(-size,2*size);;
:path=path.translate(0,move);;
:path=path.rotate(angle+Math.PI);;
:path=path.translate(p1.getX(),p1.getY());;
end
start
note right
void drawU(UGraphic ug)
end note
:ug.draw(path);;
end
@enduml

