@startuml
!pragma layout smetana
start
note right
constructor MiddleFactoryCircleCircled(MiddleCircleCircledModemode,
HColorbackColor,HColordiagramBackColor)
end note
:this.mode=mode;;
:this.backColor=backColor;;
:this.diagramBackColor=diagramBackColor;;
end
start
note right
UDrawablecreateUDrawable(doubleangle)
end note
:return new MiddleCircleCircled(angle,mode,
backColor,diagramBackColor);;
stop
end
@enduml

