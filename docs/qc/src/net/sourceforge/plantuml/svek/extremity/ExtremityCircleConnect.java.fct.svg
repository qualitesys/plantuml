@startuml
!pragma layout smetana
start
note right
XPoint2DsomePoint()
end note
:return dest;;
stop
end
start
note right
constructor ExtremityCircleConnect(XPoint2Dp1,
doubleortho,HColorbackgroundColor)
end note
:this.px=p1.getX()-radius;;
:this.py=p1.getY()-radius;;
:this.dest=new XPoint2D(p1.getX(),p1.getY());;
:this.ortho=ortho;;
:this.backgroundColor=backgroundColor;;
end
start
note right
void drawU(UGraphicug)
end note
:ug=ug.apply(new UStroke(1.5)).apply(backgroundColor.bg());;
:ug.apply(new UTranslate(dest.getX()-radius,
dest.getY()-radius)).draw(new UEllipse(radius*2,
radius*2));;
:final doubledeg=-ortho*180/Math.PI+90-45;;
:final UEllipsearc1=new UEllipse(2*radius2,
2*radius2,deg,90);;
:ug.apply(new UTranslate(dest.getX()-radius2,
dest.getY()-radius2)).draw(arc1);;
end
@enduml

