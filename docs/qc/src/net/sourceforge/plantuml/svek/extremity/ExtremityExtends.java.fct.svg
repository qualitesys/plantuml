@startuml
!pragma layout smetana
start
note right
XPoint2D somePoint()
end note
:return contact;;
stop
end
start
note right
constructor ExtremityExtends(XPoint2D p1,
double angle,HColor backgroundColor)
end note
:this.fill=backgroundColor;;
:this.contact=new XPoint2D(p1.getX(),p1.getY());;
:angle=manageround(angle);;
:polygon.addPoint(0,0);;
:final double xWing=19;;
:final double yAperture=7;;
:polygon.addPoint(-xWing,-yAperture);;
:polygon.addPoint(-xWing,yAperture);;
:polygon.addPoint(0,0);;
:polygon.rotate(angle+Math.PI/2);;
:polygon=polygon.translate(p1.getX(),p1.getY());;
end
start
note right
void drawU(UGraphic ug)
end note
:ug=ug.apply(fill.bg());;
:ug.draw(polygon);;
end
@enduml

