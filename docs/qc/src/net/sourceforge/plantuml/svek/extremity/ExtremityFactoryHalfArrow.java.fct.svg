@startuml
!pragma layout smetana
start
note right
UDrawablecreateUDrawable(XPoint2Dp0,doubleangle,
Sideside)
end note
:return new ExtremityHalfArrow(p0,angle);;
stop
end
start
note right
UDrawablecreateUDrawable(XPoint2Dp0,XPoint2Dp1,
XPoint2Dp2,Sideside)
end note
:final doubleortho=atan2(p0,p2);;
:final XPoint2Dcenter=new XPoint2D((p0.getX()+
p2.getX())/2,(p0.getY()+p2.getY())/2);;
:return new ExtremityHalfArrow(p1,ortho,center);;
stop
end
@enduml

