@startuml
!pragma layout smetana
start
note right
XPoint2D somePoint()
end note
:return dest;;
stop
end
start
note right
constructor ExtremitySquare(XPoint2D p1,HColor backgroundColor)
end note
:this.dest=new XPoint2D(p1.getX(),p1.getY());;
:this.backgroundColor=backgroundColor;;
end
start
note right
void drawU(UGraphic ug)
end note
:ug.apply(new UStroke(1.5)).apply(backgroundColor.bg()).apply(new UTranslate(dest.getX()-radius,
dest.getY()-radius)).draw(new URectangle(radius*2,
radius*2));;
end
@enduml

