@startuml
!pragma layout smetana
start
note right
XPoint2DsomePoint()
end note
:return dest;;
stop
end
start
note right
UDrawablecreate(XPoint2Dcenter,booleanfill,
doubleangle,HColorbackgroundColor)
end note
:return new ExtremityCircle(center.getX(),
center.getY(),fill,angle,backgroundColor);;
stop
end
start
note right
constructor ExtremityCircle(doublex,doubley,
booleanfill,doubleangle,HColorbackgroundColor)
end note
:this.dest=new XPoint2D(x-radius*Math.cos(angle+
Math.PI/2),y-radius*Math.sin(angle+Math.PI/2));;
:this.backgroundColor=backgroundColor;;
:this.fill=fill;;
end
start
note right
void drawU(UGraphicug)
end note
:ug=ug.apply(new UStroke(1.5));;
if (fill) then (yes) 
:ug=ug.apply(HColors.changeBack(ug));;
else (no)
:ug=ug.apply(backgroundColor.bg());;
endif 
:ug=ug.apply(new UTranslate(dest.getX()-radius,
dest.getY()-radius));;
:ug.draw(new UEllipse(radius*2,radius*2));;
end
@enduml

