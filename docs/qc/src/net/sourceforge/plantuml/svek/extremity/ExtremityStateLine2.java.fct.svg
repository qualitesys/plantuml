1.0;" x1="321" x2="321" y1="945.5273" y2="968.0938"/><polygon fill="#181818" points="317,958.0938,321,968.0938,325,958.0938,321,962.0938" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="321" x2="321" y1="1016.0313" y2="1036.0313"/><polygon fill="#181818" points="317,1026.0313,321,1036.0313,325,1026.0313,321,1030.0313" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="321" x2="321" y1="1097.9375" y2="1117.9375"/><polygon fill="#181818" points="317,1107.9375,321,1117.9375,325,1107.9375,321,1111.9375" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[1db6a7a071d1f19330a26f23d468a584]
@startuml
!pragma layout smetana
start
note right
XPoint2D somePoint()
end note
:return dest;;
stop
end
start
note right
constructor ExtremityStateLine2(double angle,
XPoint2D center)
end note
:this.angle=manageround(angle);;
:polygon.addPoint(0,0);;
:this.dest=new XPoint2D(center.getX(),center.getY());;
:final int xWing=9;;
:final int yAperture=4;;
:polygon.addPoint(-xWing,-yAperture);;
:final int xContact=5;;
:polygon.addPoint(-xContact,0);;
:polygon.addPoint(-xWing,yAperture);;
:polygon.addPoint(0,0);;
:polygon.rotate(this.angle);;
:polygon=polygon.translate(center.getX(),
center.getY());;
end
start
note right
void drawU(UGraphic ug)
end note
:ug.apply(ug.getParam().getColor().bg()).apply(new UTranslate(-radius*Math.cos(angle),
-radius*Math.sin(angle))).draw(polygon);;
:ug.apply(new UStroke(1.5)).apply(HColors.WHITE.bg()).apply(new UTranslate(dest.getX()-radius,
dest.getY()-radius)).draw(new UEllipse(radius*2,
radius*2));;
end
@enduml

