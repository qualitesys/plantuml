@startuml
!pragma layout smetana
start
note right
constructor ExtremityFactoryCircleConnect(HColor backgroundColor)
end note
:this.backgroundColor=backgroundColor;;
end
start
note right
UDrawable createUDrawable(XPoint2D p0,double angle,
Side side)
end note
:angle-=Math.PI/2;;
:return new ExtremityCircleConnect(p0,angle,
backgroundColor);;
stop
end
start
note right
UDrawable createUDrawable(XPoint2D p0,XPoint2D p1,
XPoint2D p2,Side side)
end note
:final double ortho=atan2(p0,p2);;
:return new ExtremityCircleConnect(p1,ortho,
backgroundColor);;
stop
end
@enduml

