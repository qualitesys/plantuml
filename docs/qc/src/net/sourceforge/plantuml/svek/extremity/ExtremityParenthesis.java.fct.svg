@startuml
!pragma layout smetana
start
note right
constructor ExtremityParenthesis(XPoint2D p1,
double ortho)
end note
:this.dest=new XPoint2D(p1.getX(),p1.getY());;
:this.ortho=ortho;;
end
start
note right
XPoint2D somePoint()
end note
:return dest;;
stop
end
start
note right
void drawU(UGraphic ug)
end note
:final double deg=-ortho*180/Math.PI+90-ang;;
:final UEllipse arc1=new UEllipse(2*radius2,
2*radius2,deg,2*ang);;
:ug.apply(new UStroke(1.5)).apply(new UTranslate(dest.getX()-radius2,
dest.getY()-radius2)).draw(arc1);;
end
@enduml

