if (mode==MiddleCircleCircledMode.BOTH) then (yes) 
:ug.apply(diagramBackColor).apply(diagramBackColor.bg()).apply(new UTranslate(-radius2,
-radius2)).draw(bigcircle);;
endif 
:ug=ug.apply(backColor.bg());;
:ug=ug.apply(new UStroke(1.5));;
:final double d=0;;
if (mode==MiddleCircleCircledMode.MODE1||mode==MiddleCircleCircledMode.BOTH) then (yes) 
:final UEllipse arc1=new UEllipse(2*radius2,
2*radius2,angle,90);;
:ug.apply(HColors.none().bg()).apply(new UTranslate(-radius2+
d,-radius2+d)).draw(arc1);;
endif 
if (mode==MiddleCircleCircledMode.MODE2||mode==MiddleCircleCircledMode.BOTH) then (yes) 
:final UEllipse arc2=new UEllipse(2*radius2,2*radius2,angle+
180,90);;
:ug.apply(HColors.none().bg()).apply(new UTranslate(-radius2+
d,-radius2+d)).draw(arc2);;
endif 
:ug.apply(new UTranslate(-radius1,-radius1))
.draw(circle);;
end
