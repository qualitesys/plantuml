@startuml
!pragma layout smetana
start
note right
XPoint2DsomePoint()
end note
:return contact;;
stop
end
start
note right
constructor ExtremityTriangle(XPoint2Dp1,
doubleangle,booleanfill,HColorbackgroundColor,
intxWing,intyAperture)
end note
:this.backgroundColor=backgroundColor;;
:this.fill=fill;;
:this.contact=new XPoint2D(p1.getX(),p1.getY());;
:angle=manageround(angle);;
:polygon.addPoint(0,0);;
:polygon.addPoint(-xWing,-yAperture);;
:polygon.addPoint(-xWing,yAperture);;
:polygon.addPoint(0,0);;
:polygon.rotate(angle+Math.PI/2);;
:polygon=polygon.translate(p1.getX(),p1.getY());;
end
start
note right
void drawU(UGraphicug)
end note
if (backgroundColor!=null ) then (yes) 
:ug=ug.apply(backgroundColor.bg());;
else if (fill) then (yes) 
:ug=ug.apply(HColors.changeBack(ug));;
endif 
:ug.draw(polygon);;
end
@enduml

