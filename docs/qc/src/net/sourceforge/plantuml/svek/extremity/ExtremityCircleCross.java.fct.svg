h:1.0;"/><!--MD5=[5388a30c14700ad6e1f377a646fe4477]
@startuml
!pragma layout smetana
start
note right
XPoint2DsomePoint()
end note
:return dest;;
stop
end
start
note right
constructor ExtremityCircleCross(XPoint2Dp1,
HColorbackgroundColor)
end note
:this.px=p1.getX()-radius;;
:this.py=p1.getY()-radius;;
:this.dest=new XPoint2D(p1.getX(),p1.getY());;
:this.backgroundColor=backgroundColor;;
end
start
note right
void drawU(UGraphicug)
end note
:ug=ug.apply(backgroundColor.bg());;
:ug.apply(new UStroke(1.5)).apply(new UTranslate(dest.getX()-radius,
dest.getY()-radius)).draw(new UEllipse(radius*2,
radius*2));;
:drawLine(ug,0,0,getPointOnCircle(Math.PI/4),getPointOnCircle(Math.PI+
Math.PI/4));;
:drawLine(ug,0,0,getPointOnCircle(-Math.PI/4),
getPointOnCircle(Math.PI-Math.PI/4));;
end
start
note right
XPoint2DgetPointOnCircle(doubleangle)
end note
:final doublex=px+radius+radius*Math.cos(angle);;
:final doubley=py+radius+radius*Math.sin(angle);;
:return new XPoint2D(x,y);;
stop
end
start
note right
void drawLine(UGraphicug,doublex,doubley,
XPoint2Dp1,XPoint2Dp2)
end note
:final doubledx=p2.getX()-p1.getX();;
:final doubledy=p2.getY()-p1.getY();;
:ug.apply(new UTranslate(x+p1.getX(),y+p1.getY())).draw(new ULine(dx,
dy));;
end
@enduml

