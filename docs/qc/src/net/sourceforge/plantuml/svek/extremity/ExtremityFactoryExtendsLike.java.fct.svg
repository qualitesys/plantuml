@startuml
!pragma layout smetana
start
note right
constructor ExtremityFactoryExtendsLike(HColor backgroundColor,
boolean definedBy)
end note
:this.backgroundColor=backgroundColor;;
:this.definedBy=definedBy;;
end
start
note right
UDrawable createUDrawable(XPoint2D p0,double angle,
Side side)
end note
if (definedBy) then (yes) 
:return new ExtremityExtendsLike.DefinedBy(p0,
angle,backgroundColor);;
stop
else (no)
:return new ExtremityExtendsLike.Redefines(p0,
angle,backgroundColor);;
stop
endif 
end
start
note right
UDrawable createUDrawable(XPoint2D p0,XPoint2D p1,
XPoint2D p2,Side side)
end note
:final double ortho=atan2(p0,p2)+(Math.PI/2.0);;
if (definedBy) then (yes) 
:return new ExtremityExtendsLike.DefinedBy(p1,
ortho,backgroundColor);;
stop
else (no)
:return new ExtremityExtendsLike.Redefines(p1,
ortho,backgroundColor);;
stop
endif 
end
@enduml

