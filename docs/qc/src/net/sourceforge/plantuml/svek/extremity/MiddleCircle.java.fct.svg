@startuml
!pragma layout smetana
start
note right
constructor MiddleCircle(HColor backColor)
end note
:this.backColor=backColor;;
end
start
note right
XPoint2D somePoint()
end note
:return null ;;
stop
end
start
note right
void drawU(UGraphic ug)
end note
:ug.apply(backColor.bg()).apply(new UStroke(1.5)).apply(new UTranslate(-radius,
-radius)).draw(circle);;
end
@enduml

