@startuml
!pragma layout smetana
start
note right
constructor ExtremityFactoryArrowAndCircle(HColor backgroundColor)
end note
:this.backgroundColor=backgroundColor;;
end
start
note right
UDrawable createUDrawable(XPoint2D p0,XPoint2D p1,
XPoint2D p2,Side side)
end note
:final double ortho=atan2(p0,p2);;
:final XPoint2D center=new XPoint2D((p0.getX()+
p2.getX())/2,(p0.getY()+p2.getY())/2);;
:return new ExtremityArrowAndCircle(p1,ortho,
center,backgroundColor);;
stop
end
@enduml

