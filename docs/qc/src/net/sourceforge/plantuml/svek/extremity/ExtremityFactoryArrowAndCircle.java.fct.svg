@startuml
!pragma layout smetana
start
note right
constructor ExtremityFactoryArrowAndCircle(HColorbackgroundColor)
end note
:this.backgroundColor=backgroundColor;;
end
start
note right
UDrawablecreateUDrawable(XPoint2Dp0,XPoint2Dp1,
XPoint2Dp2,Sideside)
end note
:final doubleortho=atan2(p0,p2);;
:final XPoint2Dcenter=new XPoint2D((p0.getX()+
p2.getX())/2,(p0.getY()+p2.getY())/2);;
:return new ExtremityArrowAndCircle(p1,ortho,
center,backgroundColor);;
stop
end
@enduml

