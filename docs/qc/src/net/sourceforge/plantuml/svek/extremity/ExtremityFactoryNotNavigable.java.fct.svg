@startuml
!pragma layout smetana
start
note right
UDrawablecreateUDrawable(XPoint2Dp0,doubleangle,
Sideside)
end note
:return new ExtremityNotNavigable(p0,angle-Math.PI/2);;
stop
end
start
note right
UDrawablecreateUDrawable(XPoint2Dp0,XPoint2Dp1,
XPoint2Dp2,Sideside)
end note
:final doubleortho=atan2(p0,p2);;
:return new ExtremityNotNavigable(p1,ortho);;
stop
end
@enduml

