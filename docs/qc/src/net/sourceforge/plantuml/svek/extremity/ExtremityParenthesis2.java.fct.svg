" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="276" x2="276" y1="689.6523" y2="712.2188"/><polygon fill="#181818" points="272,702.2188,276,712.2188,280,702.2188,276,706.2188" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="276" x2="276" y1="746.1875" y2="766.1875"/><polygon fill="#181818" points="272,756.1875,276,766.1875,280,756.1875,276,760.1875" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="276" x2="276" y1="800.1563" y2="820.1563"/><polygon fill="#181818" points="272,810.1563,276,820.1563,280,810.1563,276,814.1563" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="276" x2="276" y1="868.0938" y2="888.0938"/><polygon fill="#181818" points="272,878.0938,276,888.0938,280,878.0938,276,882.0938" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="276" x2="276" y1="936.0313" y2="956.0313"/><polygon fill="#181818" points="272,946.0313,276,956.0313,280,946.0313,276,950.0313" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[3f628045a59a0b5135ea5f91e7ad2e1d]
@startuml
!pragma layout smetana
start
note right
constructor ExtremityParenthesis2(XPoint2Dcontact,
doubleortho,XPoint2Dp1)
end note
:this.contact=new XPoint2D(contact.getX(),
contact.getY());;
:this.ortho=ortho;;
:final doubledx=p1.getX()-contact.getX();;
:final doubledy=p1.getY()-contact.getY();;
:final doubledistance1=Math.round(contact.distance(p1));;
:final doublelen=Math.round(distance1+EntityImageLollipopInterfaceEye2.SIZE/2);;
:this.center=new XPoint2D(contact.getX()+
dx/distance1*len,contact.getY()+dy/distance1*len);;
end
start
note right
XPoint2DsomePoint()
end note
:return contact;;
stop
end
start
note right
void drawU(UGraphicug)
end note
:final doubledeg=-ortho*180/Math.PI+90-ang;;
:final doublesize=Math.round(contact.distance(center));;
:final UEllipsecircle=new UEllipse(size*2,
size*2,deg,2*ang);;
:ug.apply(new UTranslate(center.getX()-size,
center.getY()-size)).draw(circle);;
end
@enduml

