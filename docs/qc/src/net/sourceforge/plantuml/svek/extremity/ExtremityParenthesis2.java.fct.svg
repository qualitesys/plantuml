@startuml
!pragma layout smetana
start
note right
constructor ExtremityParenthesis2(XPoint2D contact,
double ortho,XPoint2D p1)
end note
:this.contact=new XPoint2D(contact.getX(),
contact.getY());;
:this.ortho=ortho;;
:final double dx=p1.getX()-contact.getX();;
:final double dy=p1.getY()-contact.getY();;
:final double distance1=Math.round(contact.distance(p1));;
:final double len=Math.round(distance1+EntityImageLollipopInterfaceEye2.SIZE/2);;
:this.center=new XPoint2D(contact.getX()+
dx/distance1*len,contact.getY()+dy/distance1*len);;
end
start
note right
XPoint2D somePoint()
end note
:return contact;;
stop
end
start
note right
void drawU(UGraphic ug)
end note
:final double deg=-ortho*180/Math.PI+90-ang;;
:final double size=Math.round(contact.distance(center));;
:final UEllipse circle=new UEllipse(size*2,
size*2,deg,2*ang);;
:ug.apply(new UTranslate(center.getX()-size,
center.getY()-size)).draw(circle);;
end
@enduml

