@startuml
!pragma layout smetana
start
note right
UDrawablecreateUDrawable(XPoint2Dp0,XPoint2Dp1,
XPoint2Dp2,Sideside)
end note
:final doubleortho=atan2(p0,p2);;
:return new ExtremityCircleCrowfoot(p1,ortho);;
stop
end
@enduml

