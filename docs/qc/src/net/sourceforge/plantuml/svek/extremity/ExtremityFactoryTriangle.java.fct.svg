6.6094" y2="566.6094"/><polygon fill="#181818" points="169.5,556.6094,173.5,566.6094,177.5,556.6094,173.5,560.6094" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="173.5" x2="173.5" y1="614.5469" y2="634.5469"/><polygon fill="#181818" points="169.5,624.5469,173.5,634.5469,177.5,624.5469,173.5,628.5469" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[f5f10c3b1d29ef0ca59a1710c2a67f91]
@startuml
!pragma layout smetana
start
note right
constructor ExtremityFactoryTriangle(HColor backgroundColor,
int xWing,int yAperture)
end note
:this.backgroundColor=backgroundColor;;
:this.xWing=xWing;;
:this.yAperture=yAperture;;
end
start
note right
UDrawable createUDrawable(XPoint2D p0,double angle,
Side side)
end note
:return new ExtremityTriangle(p0,angle-Math.PI/2,
false,backgroundColor,xWing,yAperture);;
stop
end
start
note right
UDrawable createUDrawable(XPoint2D p0,XPoint2D p1,
XPoint2D p2,Side side)
end note
:final double ortho=atan2(p0,p2);;
:return new ExtremityTriangle(p1,ortho,true,
backgroundColor,xWing,yAperture);;
stop
end
@enduml

