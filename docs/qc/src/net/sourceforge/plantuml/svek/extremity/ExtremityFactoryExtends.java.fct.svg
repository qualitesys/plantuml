@startuml
!pragma layout smetana
start
note right
constructor ExtremityFactoryExtends(HColorbackgroundColor)
end note
:this.backgroundColor=backgroundColor;;
end
start
note right
UDrawablecreateUDrawable(XPoint2Dp0,doubleangle,
Sideside)
end note
:return new ExtremityExtends(p0,angle-Math.PI/2,
backgroundColor);;
stop
end
start
note right
UDrawablecreateUDrawable(XPoint2Dp0,XPoint2Dp1,
XPoint2Dp2,Sideside)
end note
:throw new UnsupportedOperationException();;
stop
end
@enduml

