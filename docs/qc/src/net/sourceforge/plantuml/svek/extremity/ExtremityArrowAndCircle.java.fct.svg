#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="329.5" x2="329.5" y1="1219.8438" y2="1239.8438"/><polygon fill="#181818" points="325.5,1229.8438,329.5,1239.8438,333.5,1229.8438,329.5,1233.8438" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[3a15a27343a8ae18c18c341a9cfbc166]
@startuml
!pragma layout smetana
start
note right
XPoint2DsomePoint()
end note
:return contact;;
stop
end
start
note right
constructor ExtremityArrowAndCircle(XPoint2Dp1,
doubleangle,XPoint2Dcenter,HColorbackgroundColor)
end note
:angle=manageround(angle);;
:polygon.addPoint(0,0);;
:this.backgroundColor=backgroundColor;;
:this.dest=new XPoint2D(p1.getX(),p1.getY());;
:final intxWing=9;;
:final intyAperture=4;;
:polygon.addPoint(-xWing,-yAperture);;
:final intxContact=5;;
:polygon.addPoint(-xContact,0);;
:polygon.addPoint(-xWing,yAperture);;
:polygon.addPoint(0,0);;
:polygon.rotate(angle+Math.PI/2);;
:polygon=polygon.translate(p1.getX()+radius*Math.sin(angle),
p1.getY()-radius*Math.cos(angle));;
:contact=new XPoint2D(p1.getX()-xContact*Math.cos(angle+
Math.PI/2),p1.getY()-xContact*Math.sin(angle+
Math.PI/2));;
end
start
note right
void drawU(UGraphicug)
end note
:ug.apply(HColors.changeBack(ug)).draw(polygon);;
:ug.apply(new UStroke(1.5)).apply(backgroundColor.bg()).apply(new UTranslate(dest.getX()-radius,
dest.getY()-radius)).draw(new UEllipse(radius*2,
radius*2));;
end
@enduml

