stroke-width:1.0;"/><!--MD5=[631688ef38800959c38625745f58b82e]
@startuml
!pragma layout smetana
start
note right
UDrawablecreateUDrawable(XPoint2Dp0,doubleangle,
Sideside)
end note
:return new ExtremityParenthesis(p0,angle-Math.PI/2);;
stop
end
start
note right
UDrawablecreateUDrawable(XPoint2Dp0,XPoint2Dp1,
XPoint2Dp2,Sideside)
end note
:final doubleortho=atan2(p0,p2);;
if (OptionFlags.USE_INTERFACE_EYE2) then (yes) 
:final XPoint2Dcenter=new XPoint2D((p0.getX()+
p2.getX())/2,(p0.getY()+p2.getY())/2);;
:return new ExtremityParenthesis2(center,
ortho,p1);;
stop
endif 
:return new ExtremityParenthesis(p1,ortho);;
stop
end
@enduml

