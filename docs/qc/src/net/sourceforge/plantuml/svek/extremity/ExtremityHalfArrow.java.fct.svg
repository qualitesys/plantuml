@startuml
!pragma layout smetana
start
note right
XPoint2DsomePoint()
end note
:return contact;;
stop
end
start
note right
constructor ExtremityHalfArrow(XPoint2Dp1,
doubleangle,XPoint2Dcenter)
end note
:angle=manageround(angle);;
:final AffineTransformrotate=AffineTransform.getRotateInstance(angle+
Math.PI/2);;
:final intxWing=9;;
:final intyAperture=4;;
:XPoint2Dother=new XPoint2D(-xWing,-yAperture);;
:other=other.transform(rotate);;
:this.contact=p1;;
:this.line=new ULine(center.getX()-contact.getX(),
center.getY()-contact.getY());;
:this.otherLine=new ULine(other.getX(),other.getY());;
end
start
note right
constructor ExtremityHalfArrow(XPoint2Dp0,
doubleangle)
end note
:throw new UnsupportedOperationException();;
stop
end
start
note right
void drawU(UGraphicug)
end note
:ug=ug.apply(HColors.changeBack(ug));;
if (line!=null &&line.getLength()>2) then (yes) 
:ug.apply(new UTranslate(contact.getX(),contact.getY()))
.draw(line);;
:ug.apply(new UTranslate(contact.getX(),contact.getY()))
.draw(otherLine);;
endif 
end
@enduml

