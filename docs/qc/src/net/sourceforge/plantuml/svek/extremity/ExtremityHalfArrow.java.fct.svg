@startuml
!pragma layout smetana
start
note right
XPoint2D somePoint()
end note
:return contact;;
stop
end
start
note right
constructor ExtremityHalfArrow(XPoint2D p1,
double angle,XPoint2D center)
end note
:angle=manageround(angle);;
:final AffineTransform rotate=AffineTransform.getRotateInstance(angle+
Math.PI/2);;
:final int xWing=9;;
:final int yAperture=4;;
:XPoint2D other=new XPoint2D(-xWing,-yAperture);;
:other=other.transform(rotate);;
:this.contact=p1;;
:this.line=new ULine(center.getX()-contact.getX(),
center.getY()-contact.getY());;
:this.otherLine=new ULine(other.getX(),other.getY());;
end
start
note right
constructor ExtremityHalfArrow(XPoint2D p0,
double angle)
end note
:throw new UnsupportedOperationException();;
stop
end
start
note right
void drawU(UGraphic ug)
end note
:ug=ug.apply(HColors.changeBack(ug));;
if (line!=null &&line.getLength()>2) then (yes) 
:ug.apply(new UTranslate(contact.getX(),contact.getY()))
.draw(line);;
:ug.apply(new UTranslate(contact.getX(),contact.getY()))
.draw(otherLine);;
endif 
end
@enduml

