@startuml
!pragma layout smetana
start
note right
constructor ExtremityFactoryPlus(HColorbackgroundColor)
end note
:this.backgroundColor=backgroundColor;;
end
start
note right
UDrawablecreateUDrawable(XPoint2Dcenter,doubleangle,
Sideside)
end note
:return ExtremityPlus.create(center,angle-Math.PI/2,
backgroundColor);;
stop
end
start
note right
UDrawablecreateUDrawable(XPoint2Dp0,XPoint2Dp1,
XPoint2Dp2,Sideside)
end note
:final doubleortho=atan2(p0,p2);;
:return ExtremityPlus.create(p1,ortho,backgroundColor);;
stop
end
@enduml

