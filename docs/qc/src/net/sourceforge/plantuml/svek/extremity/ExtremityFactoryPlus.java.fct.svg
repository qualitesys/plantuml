@startuml
!pragma layout smetana
start
note right
constructor ExtremityFactoryPlus(HColor backgroundColor)
end note
:this.backgroundColor=backgroundColor;;
end
start
note right
UDrawable createUDrawable(XPoint2D center,
double angle,Side side)
end note
:return ExtremityPlus.create(center,angle-Math.PI/2,
backgroundColor);;
stop
end
start
note right
UDrawable createUDrawable(XPoint2D p0,XPoint2D p1,
XPoint2D p2,Side side)
end note
:final double ortho=atan2(p0,p2);;
:return ExtremityPlus.create(p1,ortho,backgroundColor);;
stop
end
@enduml

