@startuml
!pragma layout smetana
start
note right
intcomputeBranch(intsize)
end note
:final doublesqrt=Math.sqrt(size);;
:final intr=(int)sqrt;;
if (r*r==size) then (yes) 
:return r;;
stop
endif 
:return r+1;;
stop
end
@enduml

