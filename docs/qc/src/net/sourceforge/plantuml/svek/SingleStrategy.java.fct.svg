@startuml
!pragma layout smetana
start
note right
int computeBranch(int size)
end note
:final double sqrt=Math.sqrt(size);;
:final int r=(int )sqrt;;
if (r*r==size) then (yes) 
:return r;;
stop
endif 
:return r+1;;
stop
end
@enduml

