@startuml
!pragma layout smetana
start
note right
ConditionStyle fromString(String value)
end note
if (String.valueOf("InsideDiamond").equalsIgnoreCase(value)) then (yes) 
:return INSIDE_DIAMOND;;
stop
endif 
if (String.valueOf("Foo1").equalsIgnoreCase(value)) then (yes) 
:return INSIDE_DIAMOND;;
stop
endif 
if (String.valueOf("Diamond").equalsIgnoreCase(value)) then (yes) 
:return EMPTY_DIAMOND;;
stop
endif 
if (String.valueOf("Inside").equalsIgnoreCase(value)) then (yes) 
:return INSIDE_HEXAGON;;
stop
endif 
if (p.toString().equalsIgnoreCase(value)) then (yes) 
:return p;;
stop
endif 
:return null ;;
stop
end
@enduml

