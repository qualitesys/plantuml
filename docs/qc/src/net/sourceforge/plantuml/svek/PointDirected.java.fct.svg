@startuml
!pragma layout smetana
start
note right
constructor PointDirected(XPoint2D p,double angle)
end note
:this.x=p.getX();;
:this.y=p.getY();;
:this.angle=angle;;
end
start
note right
XPoint2D getPoint2D()
end note
:return new XPoint2D(x,y);;
stop
end
start
note right
double getAngle()
end note
:return angle;;
stop
end
@enduml

