@startuml
!pragma layout smetana
start
note right
constructor CircleInterface2(HColor backgroundColor,
HColor foregroundColor,double deltaShadow)
end note
:this.backgroundColor=backgroundColor;;
:this.foregroundColor=foregroundColor;;
:this.deltaShadow=deltaShadow;;
end
start
note right
void drawU(UGraphic ug)
end note
:double x=0;;
:double y=0;;
:x+=margin;;
:y+=margin;;
:ug=ug.apply(backgroundColor.bg()).apply(foregroundColor);;
:final UEllipse circle=new UEllipse(radius*2,
radius*2);;
:circle.setDeltaShadow(deltaShadow);;
:ug.apply(new UTranslate(x,y)).draw(circle);;
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:return new XDimension2D(radius*2+2*margin,radius*2+
2*margin);;
stop
end
@enduml

