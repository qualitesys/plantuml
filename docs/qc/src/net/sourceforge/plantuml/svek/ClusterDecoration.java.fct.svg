 y2="864.5664"/><polygon fill="#181818" points="391.5,854.5664,395.5,864.5664,399.5,854.5664,395.5,858.5664" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="395.5" x2="395.5" y1="1087.3906" y2="1107.3906"/><polygon fill="#181818" points="391.5,1097.3906,395.5,1107.3906,399.5,1097.3906,395.5,1101.3906" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="395.5" x2="395.5" y1="1169.2969" y2="1189.2969"/><polygon fill="#181818" points="391.5,1179.2969,395.5,1189.2969,399.5,1179.2969,395.5,1183.2969" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[63c81e4f407d7599e0321039da30d879]
@startuml
!pragma layout smetana
start
note right
constructor ClusterDecoration(PackageStyle style,
USymbol symbol,TextBlock title,TextBlock stereo,
ClusterPosition clusterPosition,UStroke stroke)
end note
:this.symbol=guess(symbol,style);;
:this.stereo=stereo;;
:this.title=title;;
:this.clusterPosition=clusterPosition;;
:this.defaultStroke=stroke;;
end
start
note right
USymbol guess(USymbol symbol,PackageStyle style)
end note
if (symbol!=null ) then (yes) 
:return symbol;;
stop
endif 
:return style.toUSymbol();;
stop
end
start
note right
void drawU(UGraphic ug,HColor backColor,HColor borderColor,
double shadowing,double roundCorner,HorizontalAlignment titleAlignment,
HorizontalAlignment stereoAlignment,double diagonalCorner)
end note
:final SymbolContext biColor=new SymbolContext(backColor,
borderColor);;
if (symbol==null ) then (yes) 
:throw new UnsupportedOperationException();;
stop
endif 
:final SymbolContext symbolContext=biColor.withShadow(shadowing).withStroke(defaultStroke).withCorner(roundCorner,
diagonalCorner);;
:symbol.asBig(title,titleAlignment,stereo,
clusterPosition.getWidth(),clusterPosition.getHeight(),
symbolContext,stereoAlignment).drawU(ug.apply(clusterPosition.getPosition()));;
end
@enduml

