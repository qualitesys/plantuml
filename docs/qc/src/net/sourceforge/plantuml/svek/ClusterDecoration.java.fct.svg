lygon fill="#181818" points="389.5,854.5664,393.5,864.5664,397.5,854.5664,393.5,858.5664" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="393.5" x2="393.5" y1="1087.3906" y2="1107.3906"/><polygon fill="#181818" points="389.5,1097.3906,393.5,1107.3906,397.5,1097.3906,393.5,1101.3906" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="393.5" x2="393.5" y1="1169.2969" y2="1189.2969"/><polygon fill="#181818" points="389.5,1179.2969,393.5,1189.2969,397.5,1179.2969,393.5,1183.2969" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[a9c2a71c3e2c96fd99af69e2af3e959c]
@startuml
!pragma layout smetana
start
note right
constructor ClusterDecoration(PackageStylestyle,
USymbolsymbol,TextBlocktitle,TextBlockstereo,
ClusterPositionclusterPosition,UStrokestroke)
end note
:this.symbol=guess(symbol,style);;
:this.stereo=stereo;;
:this.title=title;;
:this.clusterPosition=clusterPosition;;
:this.defaultStroke=stroke;;
end
start
note right
USymbolguess(USymbolsymbol,PackageStylestyle)
end note
if (symbol!=null ) then (yes) 
:return symbol;;
stop
endif 
:return style.toUSymbol();;
stop
end
start
note right
void drawU(UGraphicug,HColorbackColor,HColorborderColor,
doubleshadowing,doubleroundCorner,HorizontalAlignmenttitleAlignment,
HorizontalAlignmentstereoAlignment,doublediagonalCorner)
end note
:final SymbolContextbiColor=new SymbolContext(backColor,
borderColor);;
if (symbol==null ) then (yes) 
:throw new UnsupportedOperationException();;
stop
endif 
:final SymbolContextsymbolContext=biColor.withShadow(shadowing).withStroke(defaultStroke).withCorner(roundCorner,
diagonalCorner);;
:symbol.asBig(title,titleAlignment,stereo,
clusterPosition.getWidth(),clusterPosition.getHeight(),
symbolContext,stereoAlignment).drawU(ug.apply(clusterPosition.getPosition()));;
end
@enduml

