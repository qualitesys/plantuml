@startuml
!pragma layout smetana
start
note right
constructor PointAndAngle(XPoint2D pt,double angle)
end note
:this.pt=pt;;
:this.angle=angle;;
end
start
note right
XPoint2D getPt()
end note
:return pt;;
stop
end
start
note right
double getAngle()
end note
:return angle;;
stop
end
start
note right
double getX()
end note
:return pt.getX();;
stop
end
start
note right
double getY()
end note
:return pt.getY();;
stop
end
@enduml

