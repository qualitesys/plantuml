@startuml
!pragma layout smetana
start
note right
constructor AbstractEntityImageBorder(ILeafleaf,
ISkinParamskinParam,Clusterparent,Bibliotekonbibliotekon,
FontParamfontParam)
end note
:super (leaf,skinParam);;
:this.parent=parent;;
:this.bibliotekon=bibliotekon;;
:this.entityPosition=leaf.getEntityPosition();;
:this.rankdir=skinParam.getRankdir();;
if (entityPosition==EntityPosition.NORMAL) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:final Stereotypestereotype=leaf.getStereotype();;
:final FontConfigurationfc=FontConfiguration.create(skinParam,
fontParam,stereotype);;
:this.desc=leaf.getDisplay().create(fc,HorizontalAlignment.CENTER,
skinParam);;
end
start
note right
XDimension2DcalculateDimension(StringBounderstringBounder)
end note
:return entityPosition.getDimension(rankdir);;
stop
end
start
note right
ShapeTypegetShapeType()
end note
:return entityPosition.getShapeType();;
stop
end
@enduml

