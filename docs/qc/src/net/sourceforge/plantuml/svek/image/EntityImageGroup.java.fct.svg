@startuml
!pragma layout smetana
start
note right
constructor EntityImageGroup(ILeaf entity,
ISkinParam skinParam)
end note
:super (entity,skinParam);;
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:return new XDimension2D(30,30);;
stop
end
start
note right
void drawU(UGraphic ug)
end note
end
start
note right
ShapeType getShapeType()
end note
:return ShapeType.RECTANGLE;;
stop
end
@enduml

