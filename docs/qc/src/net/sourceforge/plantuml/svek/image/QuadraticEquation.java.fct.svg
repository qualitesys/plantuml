 x1="150.5" x2="150.5" y1="503.1797" y2="523.1797"/><polygon fill="#181818" points="146.5,513.1797,150.5,523.1797,154.5,513.1797,150.5,517.1797" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="150.5" x2="150.5" y1="607.7461" y2="630.3125"/><polygon fill="#181818" points="146.5,620.3125,150.5,630.3125,154.5,620.3125,150.5,624.3125" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="150.5" x2="150.5" y1="664.2813" y2="684.2813"/><polygon fill="#181818" points="146.5,674.2813,150.5,684.2813,154.5,674.2813,150.5,678.2813" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[bbfff7f51218899f2ebb713c349b8650]
@startuml
!pragma layout smetana
start
note right
constructor QuadraticEquation(doublea,doubleb,
doublec)
end note
:this.a=a;;
:this.b=b;;
:this.c=c;;
end
start
note right
double[]solve()
end note
:final doubledelta=b*b-4*a*c;;
:final doublex0=(-b-Math.sqrt(delta))/2/a;;
:final doublex1=(-b+Math.sqrt(delta))/2/a;;
:return new double[]{x0,x1};;
stop
end
start
note right
doublegetV(doublex)
end note
:return a*x*x+b*x+c;;
stop
end
@enduml

