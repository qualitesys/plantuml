idth:1.0;" x1="152.5" x2="152.5" y1="503.1797" y2="523.1797"/><polygon fill="#181818" points="148.5,513.1797,152.5,523.1797,156.5,513.1797,152.5,517.1797" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="152.5" x2="152.5" y1="607.7461" y2="630.3125"/><polygon fill="#181818" points="148.5,620.3125,152.5,630.3125,156.5,620.3125,152.5,624.3125" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="152.5" x2="152.5" y1="664.2813" y2="684.2813"/><polygon fill="#181818" points="148.5,674.2813,152.5,684.2813,156.5,674.2813,152.5,678.2813" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[debad0f28717d0ed48e22439a9751ca6]
@startuml
!pragma layout smetana
start
note right
constructor QuadraticEquation(double a,double b,
double c)
end note
:this.a=a;;
:this.b=b;;
:this.c=c;;
end
start
note right
double[] solve()
end note
:final double delta=b*b-4*a*c;;
:final double x0=(-b-Math.sqrt(delta))/2/a;;
:final double x1=(-b+Math.sqrt(delta))/2/a;;
:return new double[]{x0,x1};;
stop
end
start
note right
double getV(double x)
end note
:return a*x*x+b*x+c;;
stop
end
@enduml

