:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="200" x2="200" y1="820.9609" y2="840.9609"/><polygon fill="#181818" points="196,830.9609,200,840.9609,204,830.9609,200,834.9609" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="200" x2="200" y1="874.9297" y2="894.9297"/><polygon fill="#181818" points="196,884.9297,200,894.9297,204,884.9297,200,888.9297" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[4c365275b6da9189bf7b91cf11a965d1]
@startuml
!pragma layout smetana
start
note right
constructor ConnectedCircle(double radius)
end note
:this.radius=radius;;
end
start
note right
void drawU(UGraphic ug)
end note
:final UEllipse circle=new UEllipse(2*radius,
2*radius);;
:final double delta=30;;
:final UEllipse part=new UEllipse(2*radius,
2*radius,angle-delta,2*delta);;
:ug.draw(part);;
:ug=ug.apply(HColors.GREEN).apply(HColors.GREEN.bg());;
:final UTranslate tr=new UTranslate(pt);;
end
start
note right
void addSecondaryConnection(XPoint2D pt)
end note
:points.add(pt);;
:double angle=Math.atan2(radius-pt.getY(),
pt.getX()-radius);;
:angle=angle*180.0/Math.PI;;
:System.err.println("pt1="+pt+" "+angle);;
:angles.add(angle);;
end
@enduml

