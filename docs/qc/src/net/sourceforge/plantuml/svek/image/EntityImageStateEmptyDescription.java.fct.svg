.3711,241,1196.3711,245,1186.3711,241,1190.3711" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="241" x2="241" y1="1322.7422" y2="1342.7422"/><polygon fill="#181818" points="237,1332.7422,241,1342.7422,245,1332.7422,241,1336.7422" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[9afd4c499eebfc6f6353e3a521d65f7a]
@startuml
!pragma layout smetana
start
note right
constructor EntityImageStateEmptyDescription(IEntityentity,
ISkinParamskinParam)
end note
:super (entity,skinParam);;
end
start
note right
XDimension2DcalculateDimension(StringBounderstringBounder)
end note
:final XDimension2Ddim=title.calculateDimension(stringBounder);;
:final XDimension2Dresult=XDimension2D.delta(dim,
MARGIN*2);;
:return XDimension2D.atLeast(result,MIN_WIDTH,
MIN_HEIGHT);;
stop
end
start
note right
void drawU(UGraphicug)
end note
if (url!=null ) then (yes) 
:ug.startUrl(url);;
endif 
:final StringBounderstringBounder=ug.getStringBounder();;
:final XDimension2DdimTotal=calculateDimension(stringBounder);;
:final XDimension2DdimDesc=title.calculateDimension(stringBounder);;
:final UStrokestroke=getStyleState().getStroke(lineConfig.getColors());;
:ug=applyColor(ug);;
:ug=ug.apply(stroke);;
:ug.draw(getShape(dimTotal));;
:final doublexDesc=(dimTotal.getWidth()-dimDesc.getWidth())/2;;
:final doubleyDesc=(dimTotal.getHeight()-dimDesc.getHeight())/2;;
:title.drawU(ug.apply(new UTranslate(xDesc,
yDesc)));;
if (url!=null ) then (yes) 
:ug.closeUrl();;
endif 
end
@enduml

