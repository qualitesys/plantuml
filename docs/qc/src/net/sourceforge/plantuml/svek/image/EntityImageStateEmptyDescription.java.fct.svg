nts="239,1186.3711,243,1196.3711,247,1186.3711,243,1190.3711" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="243" x2="243" y1="1322.7422" y2="1342.7422"/><polygon fill="#181818" points="239,1332.7422,243,1342.7422,247,1332.7422,243,1336.7422" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[567224870742851bd8a03659e51615d0]
@startuml
!pragma layout smetana
start
note right
constructor EntityImageStateEmptyDescription(IEntity entity,
ISkinParam skinParam)
end note
:super (entity,skinParam);;
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:final XDimension2D dim=title.calculateDimension(stringBounder);;
:final XDimension2D result=XDimension2D.delta(dim,
MARGIN*2);;
:return XDimension2D.atLeast(result,MIN_WIDTH,
MIN_HEIGHT);;
stop
end
start
note right
void drawU(UGraphic ug)
end note
if (url!=null ) then (yes) 
:ug.startUrl(url);;
endif 
:final StringBounder stringBounder=ug.getStringBounder();;
:final XDimension2D dimTotal=calculateDimension(stringBounder);;
:final XDimension2D dimDesc=title.calculateDimension(stringBounder);;
:final UStroke stroke=getStyleState().getStroke(lineConfig.getColors());;
:ug=applyColor(ug);;
:ug=ug.apply(stroke);;
:ug.draw(getShape(dimTotal));;
:final double xDesc=(dimTotal.getWidth()-dimDesc.getWidth())/2;;
:final double yDesc=(dimTotal.getHeight()-dimDesc.getHeight())/2;;
:title.drawU(ug.apply(new UTranslate(xDesc,
yDesc)));;
if (url!=null ) then (yes) 
:ug.closeUrl();;
endif 
end
@enduml

