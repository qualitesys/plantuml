@startuml
!pragma layout smetana
start
note right
void append(XPoint2D pt)
end note
if (all.contains(pt)==false) then (yes) 
:all.add(pt);;
endif 
:this.lastSolution=null ;;
end
start
note right
Circle getCircle()
end note
if (lastSolution==null ) then (yes) 
:lastSolution=findSec(all.size(),all,0,new ArrayList<>(all));;
endif 
:return lastSolution;;
stop
end
start
note right
Circle findSec(int n,List<XPoint2D> p,int m,
List<XPoint2D> b)
end note
:Circle sec=new Circle();;
if (m==1) then (yes) 
:sec=new Circle(b.get(0));;
else if (m==2) then (yes) 
:sec=new Circle(b.get(0),b.get(1));;
else if (m==3) then (yes) 
:return Circle.getCircle(b.get(0),b.get(1),
b.get(2));;
stop
endif 
if (sec.isOutside(p.get(i))) then (yes) 
:b.set(m,p.get(i));;
:sec=findSec(i,p,m+1,b);;
endif 
:return sec;;
stop
end
@enduml

