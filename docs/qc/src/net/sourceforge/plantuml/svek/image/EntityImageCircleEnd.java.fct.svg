:final doubleshadowing=style.value(PName.Shadowing)
.asDouble();;
:circle.setDeltaShadow(shadowing);;
:ug.apply(HColors.none().bg()).apply(color)
.draw(circle);;
:final doubledelta=4;;
:final UShapecircleSmall=new UEllipse(SIZE-delta*2,
SIZE-delta*2);;
:ug.apply(color.bg()).apply(HColors.none()).apply(new UTranslate(delta+
0.5,delta+0.5)).draw(circleSmall);;
end
start
note right
ShapeTypegetShapeType()
end note
:return ShapeType.CIRCLE;;
stop
end
