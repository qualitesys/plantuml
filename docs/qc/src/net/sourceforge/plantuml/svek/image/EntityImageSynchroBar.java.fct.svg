.5,1223.1836,259.5,1227.1836" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="259.5" x2="259.5" y1="1267.1523" y2="1287.1523"/><polygon fill="#181818" points="255.5,1277.1523,259.5,1287.1523,263.5,1277.1523,259.5,1281.1523" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[4ccd7499c3ac1efcf15702391ef1b088]
@startuml
!pragma layout smetana
start
note right
constructor EntityImageSynchroBar(ILeafentity,
ISkinParamskinParam,SNamestyleName)
end note
:super (entity,skinParam);;
end
start
note right
StyleSignatureBasicgetStyleSignature()
end note
:return StyleSignatureBasic.of(SName.root,
SName.element,SName.activityDiagram,SName.activityBar);;
stop
end
start
note right
XDimension2DcalculateDimension(StringBounderstringBounder)
end note
if (getSkinParam().getRankdir()==Rankdir.LEFT_TO_RIGHT) then (yes) 
:return new XDimension2D(8,80);;
stop
endif 
:return new XDimension2D(80,8);;
stop
end
start
note right
void drawU(UGraphicug)
end note
:final XDimension2Ddim=calculateDimension(ug.getStringBounder());;
:final Shadowablerect=new URectangle(dim.getWidth(),
dim.getHeight());;
:final Stylestyle=getStyleSignature().withTOBECHANGED(getEntity()
.getStereotype()).getMergedStyle(getSkinParam().getCurrentStyleBuilder());;
:final HColorcolor=style.value(PName.BackGroundColor)
.asColor(getSkinParam().getIHtmlColorSet());;
:final doubleshadowing=style.value(PName.Shadowing)
.asDouble();;
:rect.setDeltaShadow(shadowing);;
:ug.apply(HColors.none()).apply(color.bg())
.draw(rect);;
end
start
note right
ShapeTypegetShapeType()
end note
:return ShapeType.RECTANGLE;;
stop
end
@enduml

