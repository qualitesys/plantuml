@startuml
!pragma layout smetana
start
note right
constructor EntityImageAssociationPoint(ILeafentity,
ISkinParamskinParam)
end note
:super (entity,skinParam);;
end
start
note right
XDimension2DcalculateDimension(StringBounderstringBounder)
end note
:return new XDimension2D(SIZE,SIZE);;
stop
end
start
note right
StylegetStyle()
end note
:return StyleSignatureBasic.of(SName.root,
SName.element,SName.classDiagram,SName.arrow).withTOBECHANGED(getStereo()).getMergedStyle(getSkinParam().getCurrentStyleBuilder());;
stop
end
start
note right
void drawU(UGraphicug)
end note
:final UShapecircle=new UEllipse(SIZE,SIZE);;
:final HColorcolor=getStyle().value(PName.LineColor)
.asColor(getSkinParam().getIHtmlColorSet());;
:ug.apply(color).apply(new CopyForegroundColorToBackgroundColor())
.draw(circle);;
end
start
note right
ShapeTypegetShapeType()
end note
:return ShapeType.CIRCLE;;
stop
end
@enduml

