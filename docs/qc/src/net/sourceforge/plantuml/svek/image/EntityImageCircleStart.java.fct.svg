@startuml
!pragma layout smetana
start
note right
StyleSignatureBasic getDefaultStyleDefinitionCircle()
end note
:return StyleSignatureBasic.of(SName.root,
SName.element,SName.activityDiagram,SName.circle,
SName.start);;
stop
end
start
note right
constructor EntityImageCircleStart(ILeaf entity,
ISkinParam skinParam)
end note
:super (entity,skinParam);;
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:return new XDimension2D(SIZE,SIZE);;
stop
end
start
note right
void drawU(UGraphic ug)
end note
:final UEllipse circle=new UEllipse(SIZE,
SIZE);;
:final Style style=getDefaultStyleDefinitionCircle()
.getMergedStyle(getSkinParam().getCurrentStyleBuilder());;
:HColor color=getEntity().getColors().getColor(ColorType.BACK);;
if (color==null ) then (yes) 
:color=style.value(PName.LineColor).asColor(getSkinParam()
.getIHtmlColorSet());;
endif 
:final double shadowing=style.value(PName.Shadowing)
.asDouble();;
:circle.setDeltaShadow(shadowing);;
:ug.apply(color.bg()).apply(HColors.none())
.draw(circle);;
end
start
note right
ShapeType getShapeType()
end note
:return ShapeType.CIRCLE;;
stop
end
@enduml

