@startuml
!pragma layout smetana
start
note right
StyleSignatureBasicgetDefaultStyleDefinitionCircle()
end note
:return StyleSignatureBasic.of(SName.root,
SName.element,SName.activityDiagram,SName.circle,
SName.start);;
stop
end
start
note right
constructor EntityImageCircleStart(ILeafentity,
ISkinParamskinParam)
end note
:super (entity,skinParam);;
end
start
note right
XDimension2DcalculateDimension(StringBounderstringBounder)
end note
:return new XDimension2D(SIZE,SIZE);;
stop
end
start
note right
void drawU(UGraphicug)
end note
:final UEllipsecircle=new UEllipse(SIZE,SIZE);;
:final Stylestyle=getDefaultStyleDefinitionCircle()
.getMergedStyle(getSkinParam().getCurrentStyleBuilder());;
:HColorcolor=getEntity().getColors().getColor(ColorType.BACK);;
if (color==null ) then (yes) 
:color=style.value(PName.LineColor).asColor(getSkinParam()
.getIHtmlColorSet());;
endif 
:final doubleshadowing=style.value(PName.Shadowing)
.asDouble();;
:circle.setDeltaShadow(shadowing);;
:ug.apply(color.bg()).apply(HColors.none())
.draw(circle);;
end
start
note right
ShapeTypegetShapeType()
end note
:return ShapeType.CIRCLE;;
stop
end
@enduml

