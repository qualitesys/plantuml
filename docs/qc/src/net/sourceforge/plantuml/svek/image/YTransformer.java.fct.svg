@startuml
!pragma layout smetana
start
note right
constructor YTransformer(double alpha)
end note
:this.alpha=alpha;;
end
start
note right
XPoint2D getPoint2D(XPoint2D pt)
end note
:return new XPoint2D(pt.getX(),pt.getY()*alpha);;
stop
end
start
note right
XPoint2D getReversePoint2D(XPoint2D pt)
end note
:return new XPoint2D(pt.getX(),pt.getY()/alpha);;
stop
end
start
note right
double getAlpha()
end note
:return alpha;;
stop
end
@enduml

