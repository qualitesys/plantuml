@startuml
!pragma layout smetana
start
note right
constructor YTransformer(doublealpha)
end note
:this.alpha=alpha;;
end
start
note right
XPoint2DgetPoint2D(XPoint2Dpt)
end note
:return new XPoint2D(pt.getX(),pt.getY()*alpha);;
stop
end
start
note right
XPoint2DgetReversePoint2D(XPoint2Dpt)
end note
:return new XPoint2D(pt.getX(),pt.getY()/alpha);;
stop
end
start
note right
doublegetAlpha()
end note
:return alpha;;
stop
end
@enduml

