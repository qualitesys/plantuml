@startuml
!pragma layout smetana
start
note right
constructor EntityImageNoteLink(Display note,
Colors colors,ISkinParam skinParam,StyleBuilder styleBuilder)
end note
:final Rose skin=new Rose();;
:comp=skin.createComponentNote(new Style[]{ComponentType.NOTE.getStyleSignature().getMergedStyle(styleBuilder)},
ComponentType.NOTE,skinParam,note,colors);;
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:final double height=comp.getPreferredHeight(stringBounder);;
:final double width=comp.getPreferredWidth(stringBounder);;
:return new XDimension2D(width,height);;
stop
end
start
note right
void drawU(UGraphic ug)
end note
:comp.drawU(ug,new Area(calculateDimension(ug.getStringBounder())),
new SimpleContext2D(false));;
end
start
note right
ShapeType getShapeType()
end note
:return ShapeType.RECTANGLE;;
stop
end
start
note right
HColor getBackcolor()
end note
:return null ;;
stop
end
start
note right
Margins getShield(StringBounder stringBounder)
end note
:return Margins.NONE;;
stop
end
start
note right
boolean isHidden()
end note
:return false;;
stop
end
start
note right
double getOverscanX(StringBounder stringBounder)
end note
:return 0;;
stop
end
@enduml

