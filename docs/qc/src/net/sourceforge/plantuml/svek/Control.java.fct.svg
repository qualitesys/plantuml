@startuml
!pragma layout smetana
start
note right
constructor Control(SymbolContext symbolContext)
end note
:this.symbolContext=symbolContext;;
end
start
note right
void drawU(UGraphic ug)
end note
:double x=0;;
:double y=0;;
:x+=margin;;
:y+=margin;;
:ug=symbolContext.apply(ug);;
:final UEllipse circle=new UEllipse(radius*2,
radius*2);;
:circle.setDeltaShadow(symbolContext.getDeltaShadow());;
:ug.apply(new UTranslate(x,y)).draw(circle);;
:ug=ug.apply(new UStroke());;
:ug=ug.apply(symbolContext.getForeColor()
.bg());;
:final UPolygon polygon=new UPolygon();;
:polygon.addPoint(0,0);;
:final int xWing=6;;
:final int yAperture=5;;
:polygon.addPoint(xWing,-yAperture);;
:final int xContact=4;;
:polygon.addPoint(xContact,0);;
:polygon.addPoint(xWing,yAperture);;
:polygon.addPoint(0,0);;
:ug.apply(new UTranslate(x+radius-xContact,
y)).draw(polygon);;
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:return new XDimension2D(radius*2+2*margin,radius*2+
2*margin);;
stop
end
@enduml

