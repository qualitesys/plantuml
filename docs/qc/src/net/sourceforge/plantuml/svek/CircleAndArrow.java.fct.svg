@startuml
!pragma layout smetana
start
note right
constructor CircleAndArrow(XPoint2Dp1,XPoint2Dp2)
end note
:this.center=new XPoint2D((p1.getX()+p2.getX())/2,(p1.getY()+
p2.getY())/2);;
:at=AffineTransform.getTranslateInstance(-center.getX(),
-center.getY());;
:at2=AffineTransform.getTranslateInstance(center.getX(),
center.getY());;
:radius=(int)(p1.distance(p2)/2);;
if (radius%2==0) then (yes) 
:radius- -;;
endif 
:this.p1=putOnCircle(p1);;
:this.p2=putOnCircle(p2);;
:this.p3=this.p1.transform(at);;
:this.p3=new XPoint2D(p3.getY(),-p3.getX());;
:this.p3=this.p3.transform(at2);;
:this.p4=this.p2.transform(at);;
:this.p4=new XPoint2D(p4.getY(),-p4.getX());;
:this.p4=this.p4.transform(at2);;
end
start
note right
XPoint2DputOnCircle(XPoint2Dp)
end note
:p=p.transform(at);;
:final doublecoef=p.distance(new XPoint2D())/radius;;
:p=new XPoint2D(p.getX()/coef,p.getY()/coef);;
:return p.transform(at2);;
stop
end
start
note right
void drawU(UGraphicug)
end note
:final UShapecircle=new UEllipse(radius*2,
radius*2);;
:ug.apply(new UTranslate(center.getX()-radius,
center.getY()-radius)).draw(circle);;
end
@enduml

