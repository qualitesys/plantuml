@startuml
!pragma layout smetana
start
note right
constructor Boundary(SymbolContext symbolContext)
end note
:this.symbolContext=symbolContext;;
end
start
note right
void drawU(UGraphic ug)
end note
:double x=0;;
:double y=0;;
:x+=margin;;
:y+=margin;;
:ug=symbolContext.apply(ug);;
:final UEllipse circle=new UEllipse(radius*2,
radius*2);;
:circle.setDeltaShadow(symbolContext.getDeltaShadow());;
:final UPath path1=new UPath();;
:path1.moveTo(0,0);;
:path1.lineTo(0,radius*2);;
:path1.setDeltaShadow(symbolContext.getDeltaShadow());;
:final UPath path=new UPath();;
:path.moveTo(0,0);;
:path.lineTo(0,radius*2);;
:path.moveTo(0,radius);;
:path.lineTo(left,radius);;
:path.setDeltaShadow(symbolContext.getDeltaShadow());;
:ug.apply(new UTranslate(x,y)).apply(HColors.none()
.bg()).draw(path);;
:ug.apply(new UTranslate(x+left,y)).draw(circle);;
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:return new XDimension2D(radius*2+left+2*margin,radius*2+
2*margin);;
stop
end
@enduml

