@startuml
!pragma layout smetana
start
note right
UDrawablecreateUDrawable(XPoint2Dp0,doubleangle,
Sideside)
end note
:throw new UnsupportedOperationException(getClass()
.toString());;
stop
end
start
note right
doubleatan2(XPoint2Dp1,XPoint2Dp0)
end note
:doublea=Math.atan2(p1.getY()-p0.getY(),p1.getX()-p0.getX());;
if (a<0) then (yes) 
:a+=Math.PI*2;;
endif 
:return a;;
stop
end
@enduml

