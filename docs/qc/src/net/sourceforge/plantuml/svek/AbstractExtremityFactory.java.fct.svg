@startuml
!pragma layout smetana
start
note right
UDrawable createUDrawable(XPoint2D p0,double angle,
Side side)
end note
:throw new UnsupportedOperationException(getClass()
.toString());;
stop
end
start
note right
double atan2(XPoint2D p1,XPoint2D p0)
end note
:double a=Math.atan2(p1.getY()-p0.getY(),
p1.getX()-p0.getX());;
if (a<0) then (yes) 
:a+=Math.PI*2;;
endif 
:return a;;
stop
end
@enduml

