@startuml
!pragma layout smetana
start
note right
constructor YDelta(double delta)
end note
:this(1,delta);;
end
start
note right
constructor YDelta(double factor,double delta)
end note
:this.delta=delta;;
:this.factor=factor;;
end
start
note right
XPoint2D apply(XPoint2D pt)
end note
:return new XPoint2D(pt.getX(),pt.getY()*factor+
delta);;
stop
end
@enduml

