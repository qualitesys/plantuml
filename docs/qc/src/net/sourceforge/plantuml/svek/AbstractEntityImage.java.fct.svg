@startuml
!pragma layout smetana
start
note right
constructor AbstractEntityImage(IEntity entity,
ISkinParam skinParam)
end note
:this.entity=Objects.requireNonNull(entity);;
:this.skinParam=Objects.requireNonNull(skinParam);;
end
start
note right
boolean isHidden()
end note
:return entity.isHidden();;
stop
end
start
note right
IEntity getEntity()
end note
:return entity;;
stop
end
start
note right
ISkinParam getSkinParam()
end note
:return skinParam;;
stop
end
start
note right
HColor getBackcolor()
end note
:return skinParam.getBackgroundColor();;
stop
end
start
note right
Stereotype getStereo()
end note
:return entity.getStereotype();;
stop
end
start
note right
Margins getShield(StringBounder stringBounder)
end note
:return Margins.NONE;;
stop
end
start
note right
double getOverscanX(StringBounder stringBounder)
end note
:return 0;;
stop
end
@enduml

