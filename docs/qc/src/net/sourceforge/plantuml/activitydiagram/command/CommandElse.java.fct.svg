@startuml
!pragma layout smetana
start
note right
constructor CommandElse()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandElse.class .getName(),
RegexLeaf.start(),new RegexLeaf("else"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(ActivityDiagramsystem,
LineLocationlocation,RegexResultarg)
end note
if (system.getLastEntityConsulted()==null ) then (yes) 
:return CommandExecutionResult.error("No if for this else");;
stop
endif 
if (system.getCurrentContext()==null ) then (yes) 
:return CommandExecutionResult.error("No if for this else");;
stop
endif 
:final IEntitybranch=system.getCurrentContext()
.getBranch();;
:system.setLastEntityConsulted(branch);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

