@startuml
!pragma layout smetana
start
note right
constructor CommandEndPartition()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandEndPartition.class .getName(),
RegexLeaf.start(),new RegexOr(new RegexConcat(new RegexLeaf("end"),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf("partition")),
new RegexLeaf("\\}")),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(ActivityDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final IEntity currentPackage=diagram.getCurrentGroup();;
if (currentPackage==null ) then (yes) 
:return CommandExecutionResult.error("No partition defined");;
stop
endif 
:diagram.endGroup();;
:return CommandExecutionResult.ok();;
stop
end
@enduml

