@startuml
!pragma layout smetana
start
note right
constructor CommandEndif()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandEndif.class .getName(),
RegexLeaf.start(),new RegexLeaf("end"),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("if"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(ActivityDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
if (diagram.getLastEntityConsulted()==null ) then (yes) 
:return CommandExecutionResult.error("No if for this endif");;
stop
endif 
if (diagram.getCurrentContext()==null ) then (yes) 
:return CommandExecutionResult.error("No if for this endif");;
stop
endif 
:diagram.endif();;
:return CommandExecutionResult.ok();;
stop
end
@enduml

