@startuml
!pragma layout smetana
start
note right
constructor ConditionalContext(ConditionalContext parent,
IEntity branch,Direction direction)
end note
:this.branch=Objects.requireNonNull(branch);;
if (branch.getLeafType()!=LeafType.BRANCH) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:this.direction=direction;;
:this.parent=parent;;
end
start
note right
Direction getDirection()
end note
:return direction;;
stop
end
start
note right
ConditionalContext getParent()
end note
:return parent;;
stop
end
start
note right
IEntity getBranch()
end note
:return branch;;
stop
end
@enduml

