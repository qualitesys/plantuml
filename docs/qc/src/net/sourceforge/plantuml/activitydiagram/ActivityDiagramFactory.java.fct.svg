@startuml
!pragma layout smetana
start
note right
ActivityDiagramcreateEmptyDiagram(UmlSourcesource,
Map<String,String>skinParam)
end note
:return new ActivityDiagram(source,skinParam);;
stop
end
start
note right
List<Command>createCommands()
end note
:final List<Command>cmds=new ArrayList<>();;
:cmds.add(new CommandFootboxIgnored());;
:CommonCommands.addCommonCommands1(cmds);;
:cmds.add(new CommandRankDir());;
:cmds.add(new CommandPartition());;
:cmds.add(new CommandEndPartition());;
:cmds.add(new CommandLinkLongActivity());;
:final CommandFactoryNoteActivityfactoryNoteActivityCommand=new CommandFactoryNoteActivity();;
:cmds.add(factoryNoteActivityCommand.createSingleLine());;
:cmds.add(factoryNoteActivityCommand.createMultiLine(false));;
:final CommandFactoryNoteOnLinkfactoryNoteOnLinkCommand=new CommandFactoryNoteOnLink();;
:cmds.add(factoryNoteOnLinkCommand.createSingleLine());;
:cmds.add(factoryNoteOnLinkCommand.createMultiLine(false));;
:cmds.add(new CommandIf());;
:cmds.add(new CommandElse());;
:cmds.add(new CommandEndif());;
:cmds.add(new CommandLinkActivity());;
:cmds.add(new CommandHideShow2());;
:return cmds;;
stop
end
@enduml

