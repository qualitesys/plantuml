@startuml
!pragma layout smetana
start
note right
void fillMemoryBlocks(Instance instance)
end note
if (instance.getLanes()==1) then (yes) 
:fillMemoryBlockSingleThreaded(instance);;
else (no)
:fillMemoryBlockMultiThreaded(instance);;
endif 
end
start
note right
void fillMemoryBlockSingleThreaded(Instance instance)
end note
:Position position=new Position(i,0,j,0);;
:FillSegment.fillSegment(instance,position);;
end
start
note right
void fillMemoryBlockMultiThreaded(final Instance instance)
end note
:ExecutorService service=Executors.newFixedThreadPool(instance.getLanes());;
:List<Future<?>> futures=new ArrayList<Future<?> >();;
:final Position position=new Position(i,k,
j,0);;
:Future future=service.submit(new Runnable(){@Override public void run(){FillSegment.fillSegment(instance,
position);}});;
:futures.add(future);;
:joinThreads(instance,futures);;
:service.shutdownNow();;
end
start
note right
void joinThreads(Instance instance,List<Future<?>> futures)
end note
switch (try/catch block)
case (try)
:f.get();;
case (catch (InterruptedException e))
:instance.clear();;
:throw new RuntimeException(e);;
stop
case (catch (ExecutionException e))
:instance.clear();;
:throw new RuntimeException(e);;
stop
endswitch
end
@enduml

