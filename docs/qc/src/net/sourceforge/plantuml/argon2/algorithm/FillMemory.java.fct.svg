@startuml
!pragma layout smetana
start
note right
void fillMemoryBlocks(Instanceinstance)
end note
if (instance.getLanes()==1) then (yes) 
:fillMemoryBlockSingleThreaded(instance);;
else (no)
:fillMemoryBlockMultiThreaded(instance);;
endif 
end
start
note right
void fillMemoryBlockSingleThreaded(Instanceinstance)
end note
:Positionposition=new Position(i,0,j,0);;
:FillSegment.fillSegment(instance,position);;
end
start
note right
void fillMemoryBlockMultiThreaded(final Instanceinstance)
end note
:ExecutorServiceservice=Executors.newFixedThreadPool(instance.getLanes());;
:List<Future<? >>futures=new ArrayList<Future<? >>();;
:final Positionposition=new Position(i,k,
j,0);;
:Futurefuture=service.submit(new Runnable(){@Override public void run(){FillSegment.fillSegment(instance,
position);}});;
:futures.add(future);;
:joinThreads(instance,futures);;
:service.shutdownNow();;
end
start
note right
void joinThreads(Instanceinstance,List<Future<? >>futures)
end note
switch (try/catch block)
case (try)
:f.get();;
case (catch (InterruptedExceptione))
:instance.clear();;
:throw new RuntimeException(e);;
stop
case (catch (ExecutionExceptione))
:instance.clear();;
:throw new RuntimeException(e);;
stop
endswitch
end
@enduml

