.8594" y2="563.8594"/><line style="stroke:#181818;stroke-width:1.0;" x1="349.5" x2="252.25" y1="563.8594" y2="563.8594"/><polygon fill="#181818" points="262.25,559.8594,252.25,563.8594,262.25,567.8594,258.25,563.8594" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="240.25" x2="240.25" y1="457.8906" y2="477.8906"/><polygon fill="#181818" points="236.25,467.8906,240.25,477.8906,244.25,467.8906,240.25,471.8906" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="240.25" x2="240.25" y1="575.8594" y2="595.8594"/><polygon fill="#181818" points="236.25,585.8594,240.25,595.8594,244.25,585.8594,240.25,589.8594" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[0798246b1d57f532e52f569e25de771b]
@startuml
!pragma layout smetana
start
note right
void fillBlock(Block X,Block Y,Block currentBlock,
boolean withXor)
end note
:Block R=new Block();;
:Block Z=new Block();;
:R.xor(X,Y);;
:Z.copyBlock(R);;
:Functions.roundFunction(Z,16*i,16*i+1,16*i+
2,16*i+3,16*i+4,16*i+5,16*i+6,16*i+7,16*i+
8,16*i+9,16*i+10,16*i+11,16*i+12,16*i+13,16*i+
14,16*i+15);;
:Functions.roundFunction(Z,2*i,2*i+1,2*i+
16,2*i+17,2*i+32,2*i+33,2*i+48,2*i+49,2*i+
64,2*i+65,2*i+80,2*i+81,2*i+96,2*i+97,2*i+
112,2*i+113);;
if (withXor) then (yes) 
:currentBlock.xor(R,Z,currentBlock);;
else (no)
:currentBlock.xor(R,Z);;
endif 
end
@enduml

