@startuml
!pragma layout smetana
start
note right
void finalize(Instance instance,Argon2 argon2)
end note
:Block finalBlock=instance.memory[instance.getLaneLength()-1];;
:int lastBlockInLane=i*instance.getLaneLength()+
(instance.getLaneLength()-1);;
:finalBlock.xorWith(instance.memory[lastBlockInLane]);;
:byte[] finalBlockBytes=finalBlock.toBytes();;
:byte[] finalResult=Functions.blake2bLong(finalBlockBytes,
argon2.getOutputLength());;
:argon2.setOutput(finalResult);;
if (argon2.isClearMemory()) then (yes) 
:instance.clear();;
:argon2.clear();;
endif 
end
@enduml

