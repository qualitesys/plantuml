@startuml
!pragma layout smetana
start
note right
constructor NamedOutputStream(SFilefile)
end note
:this.os=file.createBufferedOutputStream();;
:this.basefile=new BaseFile(file);;
end
start
note right
void close()
end note
:os.close();;
end
start
note right
void flush()
end note
:os.flush();;
end
start
note right
void write(byte[]b)
end note
:os.write(b);;
end
start
note right
void write(byte[]b,intoff,intlen)
end note
:os.write(b,off,len);;
end
start
note right
void write(intb)
end note
:os.write(b);;
end
start
note right
BaseFilegetBasefile()
end note
:return basefile;;
stop
end
@enduml

