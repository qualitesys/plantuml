@startuml
!pragma layout smetana
:booleanok=true;;
switch (try/catch block)
case (try)
:Class.forName(Dictionary.class .getPackage().getName()+
".DictionaryData");;
case (catch (Throwableex))
:ok=false;;
endswitch
:OK=ok;;
start
note right
void setData(ByteBufferdata)
end note
if (!data.isDirect()||!data.isReadOnly()) then (yes) 
:throw new BrotliRuntimeException("data must be a direct read-only byte buffer");;
stop
endif 
:Dictionary.data=data;;
end
start
note right
ByteBuffergetData()
end note
if (data!=null ) then (yes) 
:return data;;
stop
endif 
if (!DataLoader.OK) then (yes) 
:throw new BrotliRuntimeException("brotli dictionary is not set");;
stop
endif 
:return data;;
stop
end
@enduml

