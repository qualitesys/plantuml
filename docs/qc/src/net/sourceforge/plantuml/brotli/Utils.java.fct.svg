/><polygon fill="#181818" points="455.5,1024.2656,459.5,1034.2656,463.5,1024.2656,459.5,1028.2656" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="280" x2="127.5" y1="932.6875" y2="932.6875"/><line style="stroke:#181818;stroke-width:1.0;" x1="127.5" x2="127.5" y1="932.6875" y2="980.2969"/><polygon fill="#181818" points="123.5,970.2969,127.5,980.2969,131.5,970.2969,127.5,974.2969" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="15" x="127.5" y="960.3003">try</text><line style="stroke:#181818;stroke-width:1.0;" x1="386" x2="459.5" y1="932.6875" y2="932.6875"/><line style="stroke:#181818;stroke-width:1.0;" x1="459.5" x2="459.5" y1="932.6875" y2="980.2969"/><polygon fill="#181818" points="455.5,970.2969,459.5,980.2969,463.5,970.2969,459.5,974.2969" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="119" x="459.5" y="960.3003">catch (IOException e)</text><line style="stroke:#181818;stroke-width:1.0;" x1="333" x2="333" y1="890.5547" y2="920.6875"/><polygon fill="#181818" points="329,910.6875,333,920.6875,337,910.6875,333,914.6875" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="333" x2="333" y1="1118.832" y2="1141.3984"/><polygon fill="#181818" points="329,1131.3984,333,1141.3984,337,1131.3984,333,1135.3984" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="333" x2="333" y1="1175.3672" y2="1195.3672"/><polygon fill="#181818" points="329,1185.3672,333,1195.3672,337,1185.3672,333,1189.3672" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[c36326dd70f5628b88a5959a34f7486d]
@startuml
!pragma layout smetana
start
note right
void fillBytesWithZeroes(byte[] dest,int start,
int end)
end note
:int cursor=start;;
while (cursor<end)
:int step=Math.min(cursor+1024,end)-cursor;;
:System.arraycopy(BYTE_ZEROES,0,dest,cursor,
step);;
:cursor+=step;;
endwhile
end
start
note right
void fillIntsWithZeroes(int[] dest,int start,
int end)
end note
:int cursor=start;;
while (cursor<end)
:int step=Math.min(cursor+1024,end)-cursor;;
:System.arraycopy(INT_ZEROES,0,dest,cursor,
step);;
:cursor+=step;;
endwhile
end
start
note right
void copyBytesWithin(byte[] bytes,int target,
int start,int end)
end note
:System.arraycopy(bytes,start,bytes,target,
end-start);;
end
start
note right
int readInput(InputStream src,byte[] dst,
int offset,int length)
end note
switch (try/catch block)
case (try)
:return src.read(dst,offset,length);;
stop
case (catch (IOException e))
:throw new BrotliRuntimeException("Failed to read input",e);;
stop
endswitch
end
start
note right
void closeInput(InputStream src)
end note
:src.close();;
end
