@startuml
!pragma layout smetana
start
note right
constructor ImageDataAbstract(int width,int height)
end note
:this.width=width;;
:this.height=height;;
end
start
note right
constructor ImageDataAbstract(XDimension2D dim)
end note
:this((int )dim.getWidth(),(int )dim.getHeight());;
end
start
note right
int getWidth()
end note
:return width;;
stop
end
start
note right
int getHeight()
end note
:return height;;
stop
end
start
note right
int getStatus()
end note
:return status;;
stop
end
start
note right
void setStatus(int status)
end note
:this.status=status;;
end
@enduml

