1.6133" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="240" x2="240" y1="1341.582" y2="1361.582"/><polygon fill="#181818" points="236,1351.582,240,1361.582,244,1351.582,240,1355.582" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[fbac832e1e9b9fac5372727a7889fb0e]
@startuml
!pragma layout smetana
start
note right
intgetNicer(final intvalue)
end note
if (value<=18) then (yes) 
:return value;;
stop
endif 
if (value<93) then (yes) 
:return ((value+2)/5)*5;;
stop
endif 
if (value<100) then (yes) 
:return ((value+5)/10)*10;;
stop
endif 
:intm=1;;
:doublehead=value;;
while (head>=100)
:head=head/10.0;;
:m*=10;;
endwhile
:return getNicer((int)Math.round(head))*m;;
stop
end
start
note right
Stringformat(final longv)
end note
:final DecimalFormatdf=new DecimalFormat();;
:df.setDecimalFormatSymbols(new DecimalFormatSymbols(Locale.US));;
:df.setGroupingSize(3);;
:df.setMaximumFractionDigits(0);;
:final Stringt=df.format(v).replace(',',' ');;
:return t;;
stop
end
@enduml

