@startuml
!pragma layout smetana
start
note right
boolean hasCMapData(String uml)
end note
:List<BlockUml> blocks=new SourceStringReader(uml)
.getBlocks();;
if (blocks.size()==0) then (yes) 
:uml="@startuml\n"+uml+"\n@enduml";;
:blocks=new SourceStringReader(uml).getBlocks();;
if (blocks.size()==0) then (yes) 
:return false;;
stop
endif 
endif 
:final BlockUml block=blocks.get(0);;
:final Diagram diagram=block.getDiagram();;
:return diagram.hasUrl();;
stop
end
@enduml

