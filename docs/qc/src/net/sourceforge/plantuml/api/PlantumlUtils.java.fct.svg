end note
:List<BlockUml>blocks=new SourceStringReader(uml)
.getBlocks();;
if (blocks.size()==0) then (yes) 
:uml="@startuml\n"+uml+"\n@enduml";;
:blocks=new SourceStringReader(uml).getBlocks();;
if (blocks.size()==0) then (yes) 
:return false;;
stop
endif 
endif 
:final BlockUmlblock=blocks.get(0);;
:final Diagramdiagram=block.getDiagram();;
:return diagram.hasUrl();;
stop
end
