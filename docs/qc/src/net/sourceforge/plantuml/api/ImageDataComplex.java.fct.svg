@startuml
!pragma layout smetana
start
note right
constructor ImageDataComplex(XDimension2Dinfo,
CMapDatacmap,StringwarningOrError)
end note
:super (info);;
:this.cmap=cmap;;
:this.warningOrError=warningOrError;;
end
start
note right
constructor ImageDataComplex(XDimension2Dinfo,
CMapDatacmap,StringwarningOrError,intstatus)
end note
:super (info);;
:this.cmap=cmap;;
:this.warningOrError=warningOrError;;
:setStatus(status);;
end
start
note right
booleancontainsCMapData()
end note
:return cmap!=null &&cmap.containsData();;
stop
end
start
note right
StringgetCMapData(StringnameId)
end note
:return cmap.asString(nameId);;
stop
end
start
note right
StringgetWarningOrError()
end note
:return warningOrError;;
stop
end
@enduml

