2bca3fe91a382c52f]
@startuml
!pragma layout smetana
start
note right
constructor TimeoutExecutor(longms)
end note
:this.ms=ms;;
end
start
note right
booleanexecuteNow(MyRunnabletask)
end note
:final MyThreadmainThread=new MyThread(task);;
:booleandone=false;;
switch (try/catch block)
case (try)
:mainThread.start();;
:mainThread.join(ms);;
endswitch
:return done;;
stop
end
start
note right
constructor MyThread(MyRunnabletask)
end note
:this.task=task;;
end
start
note right
void run()
end note
switch (try/catch block)
case (try)
:task.runJob();;
:done.set(true);;
case (catch (InterruptedExceptione))
:System.err.println("TimeoutExecutorB "+e);;
:Logme.error(e);;
endswitch
end
@enduml

