55776440e5972c9a27a40167]
@startuml
!pragma layout smetana
start
note right
constructor TimeoutExecutor(long ms)
end note
:this.ms=ms;;
end
start
note right
boolean executeNow(MyRunnable task)
end note
:final MyThread mainThread=new MyThread(task);;
:boolean done=false;;
switch (try/catch block)
case (try)
:mainThread.start();;
:mainThread.join(ms);;
endswitch
:return done;;
stop
end
start
note right
constructor MyThread(MyRunnable task)
end note
:this.task=task;;
end
start
note right
void run()
end note
switch (try/catch block)
case (try)
:task.runJob();;
:done.set(true);;
case (catch (InterruptedException e))
:System.err.println("TimeoutExecutorB "+e);;
:Logme.error(e);;
endswitch
end
@enduml

