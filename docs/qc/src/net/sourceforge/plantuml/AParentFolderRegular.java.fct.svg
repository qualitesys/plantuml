@startuml
!pragma layout smetana
start
note right
constructor AParentFolderRegular(SFiledir)
end note
:this.dir=dir;;
end
start
note right
StringtoString()
end note
:return "AParentFolderRegular::"+(dir==null ? String.valueOf("NULL"):dir.getPrintablePath());;
stop
end
start
note right
AFilegetAFile(StringnameOrPath)
end note
:final SFilefilecurrent;;
if (dir==null ) then (yes) 
:filecurrent=new SFile(nameOrPath);;
else (no)
:filecurrent=dir.getAbsoluteFile().file(nameOrPath);;
endif 
if (filecurrent.exists()) then (yes) 
:return new AFileRegular(filecurrent.getCanonicalFile());;
stop
endif 
:return null ;;
stop
end
@enduml

