@startuml
!pragma layout smetana
start
note right
AbstractPSystemexecuteLine(UmlSourcesource,
Stringline)
end note
if (line.matches("(?i)^(donors)\\s*$")) then (yes) 
:return PSystemDonors.create(source);;
stop
endif 
:return null ;;
stop
end
@enduml

