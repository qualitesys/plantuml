@startuml
!pragma layout smetana
start
note right
AbstractPSystemexecuteLine(UmlSourcesource,
Stringline)
end note
if (line.matches("(?i)^(skinparameters)\\s*$")) then (yes) 
:return PSystemSkinparameterList.create(source);;
stop
endif 
:return null ;;
stop
end
@enduml

