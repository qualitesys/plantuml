start
note right
constructor PSystemSkinparameterList(UmlSourcesource)
end note
:super (source);;
end
start
note right
UDrawablegetRootDrawable(FileFormatOptionfileFormatOption)
end note
:final List<TextBlock>cols=getCols(getDonors(),5);;
:return new UDrawable(){public void drawU(UGraphicug){final StringBounderstringBounder=ug.getStringBounder();
:doublex=0;doubley=0;for (TextBlocktb:cols){final XDimension2Ddim=tb.calculateDimension(stringBounder);tb.drawU(ug.apply(UTranslate.dx(x)));x+
=dim.getWidth()+10;y=Math.max(y,dim.getHeight());}}};;
stop
end
start
note right
List<TextBlock>getCols(List<String>lines,
final intnbCol)
end note
:final List<TextBlock>result=new ArrayList<>();;
:final intmaxLine=(lines.size()+(nbCol-1))/nbCol;;
:final List<String>current=lines.subList(i,Math.min(lines.size(),i+
maxLine));;
:result.add(GraphicStrings.createBlackOnWhite(current));;
:return result;;
stop
end
start
note right
List<String>getDonors()
end note
:final List<String>lines=new ArrayList<>(SkinParam.getPossibleValues());;
:return lines;;
stop
end
start
