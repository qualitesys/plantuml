@startuml
!pragma layout smetana
start
note right
constructor PSystemSkinparameterList(UmlSource source)
end note
:super (source);;
end
start
note right
UDrawable getRootDrawable(FileFormatOption fileFormatOption)
end note
:final List<TextBlock> cols=getCols(getDonors(),5);;
:return new UDrawable(){public void drawU(UGraphic ug){final StringBounder stringBounder=ug.getStringBounder();
:double x=0;double y=0;for (TextBlock tb:cols){final XDimension2D dim=tb.calculateDimension(stringBounder);tb.drawU(ug.apply(UTranslate.dx(x)));x+
=dim.getWidth()+10;y=Math.max(y,dim.getHeight());}}};;
stop
end
start
note right
List<TextBlock> getCols(List<String> lines,
final int nbCol)
end note
:final List<TextBlock> result=new ArrayList<>();;
:final int maxLine=(lines.size()+(nbCol-1))/nbCol;;
:final List<String> current=lines.subList(i,Math.min(lines.size(),i+
maxLine));;
:result.add(GraphicStrings.createBlackOnWhite(current));;
:return result;;
stop
end
start
note right
List<String> getDonors()
end note
:final List<String> lines=new ArrayList<>(SkinParam.getPossibleValues());;
:return lines;;
stop
end
start
note right
DiagramDescription getDescription()
end note
:return new DiagramDescription("(Parameters)");;
stop
end
start
note right
PSystemSkinparameterList create(UmlSource source)
end note
:return new PSystemSkinparameterList(source);;
stop
end
@enduml

