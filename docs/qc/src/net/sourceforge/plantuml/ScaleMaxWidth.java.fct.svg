@startuml
!pragma layout smetana
start
note right
constructor ScaleMaxWidth(double maxWidth)
end note
:this.maxWidth=maxWidth;;
end
start
note right
double getScaleInternal(double width,double height)
end note
:final double result=maxWidth/width;;
if (result>1) then (yes) 
:return 1;;
stop
endif 
:return result;;
stop
end
@enduml

