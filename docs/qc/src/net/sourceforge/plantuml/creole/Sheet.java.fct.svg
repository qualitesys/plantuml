@startuml
!pragma layout smetana
start
note right
constructor Sheet(HorizontalAlignment horizontalAlignment)
end note
:this.horizontalAlignment=horizontalAlignment;;
end
start
note right
String toString()
end note
:return stripes.toString();;
stop
end
start
note right
void add(Stripe stripe)
end note
:stripes.add(stripe);;
end
start
note right
Iterator<Stripe> iterator()
end note
:return stripes.iterator();;
stop
end
start
note right
Stripe getLastStripe()
end note
:final int size=stripes.size();;
if (size==0) then (yes) 
:return null ;;
stop
endif 
:return stripes.get(size-1);;
stop
end
start
note right
HorizontalAlignment getHorizontalAlignment()
end note
:return horizontalAlignment;;
stop
end
@enduml

