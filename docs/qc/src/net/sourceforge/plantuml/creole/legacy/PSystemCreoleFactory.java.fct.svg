3" x2="153" y1="520.3555" y2="550.4883"/><polygon fill="#181818" points="149,540.4883,153,550.4883,157,540.4883,153,544.4883" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="153" x2="153" y1="584.457" y2="604.457"/><polygon fill="#181818" points="149,594.457,153,604.457,157,594.457,153,598.457" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="153" x2="153" y1="638.4258" y2="658.4258"/><polygon fill="#181818" points="149,648.4258,153,658.4258,157,648.4258,153,652.4258" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[d61f00bcfebdbd5a3b177a73a7c22ce1]
@startuml
!pragma layout smetana
start
note right
constructor PSystemCreoleFactory()
end note
:super (DiagramType.CREOLE);;
end
start
note right
PSystemCreole initDiagram(UmlSource source,
String startLine)
end note
if (getDiagramType()==DiagramType.CREOLE) then (yes) 
:return new PSystemCreole(source);;
stop
endif 
:return null ;;
stop
end
start
note right
PSystemCreole executeLine(UmlSource source,
PSystemCreole system,String line)
end note
:system.doCommandLine(line);;
:return system;;
stop
end
@enduml

