:1.0;"/><!--MD5=[0cbfa3e455f4ae5f557f255e16253696]
@startuml
!pragma layout smetana
start
note right
constructor PSystemCreole(UmlSource source)
end note
:super (source);;
end
start
note right
DiagramDescription getDescription()
end note
:return new DiagramDescription("(Creole)");;
stop
end
start
note right
void doCommandLine(String line)
end note
:lines.add(line);;
end
start
note right
UDrawable getRootDrawable(FileFormatOption fileFormatOption)
end note
:final Display display=Display.create(lines);;
:final UFont font=UFont.serif(14);;
:final FontConfiguration fontConfiguration=FontConfiguration.blackBlueTrue(font);;
:final Sheet sheet=Parser.build(fontConfiguration,
HorizontalAlignment.LEFT,SkinParam.create(UmlDiagramType.SEQUENCE),
CreoleMode.FULL).createSheet(display);;
:return new SheetBlock1(sheet,LineBreakStrategy.NONE,0);;
stop
end
@enduml

