@startuml
!pragma layout smetana
start
note right
constructor PSystemCreole(UmlSourcesource)
end note
:super (source);;
end
start
note right
DiagramDescriptiongetDescription()
end note
:return new DiagramDescription("(Creole)");;
stop
end
start
note right
void doCommandLine(Stringline)
end note
:lines.add(line);;
end
start
note right
UDrawablegetRootDrawable(FileFormatOptionfileFormatOption)
end note
:final Displaydisplay=Display.create(lines);;
:final UFontfont=UFont.serif(14);;
:final FontConfigurationfontConfiguration=FontConfiguration.blackBlueTrue(font);;
:final Sheetsheet=Parser.build(fontConfiguration,
HorizontalAlignment.LEFT,SkinParam.create(UmlDiagramType.SEQUENCE),
CreoleMode.FULL).createSheet(display);;
:return new SheetBlock1(sheet,LineBreakStrategy.NONE,0);;
stop
end
@enduml

