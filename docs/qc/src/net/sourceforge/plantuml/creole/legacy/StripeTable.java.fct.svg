@startuml
!pragma layout smetana
start
note right
constructor StripeTable(FontConfigurationfontConfiguration,
ISkinSimpleskinParam,Stringline)
end note
:this.skinParam=skinParam;;
:this.fontConfiguration=fontConfiguration;;
:HColorlineColor=getBackOrFrontColor(line,1);;
if (lineColor==null ) then (yes) 
:lineColor=fontConfiguration.getColor();;
endif 
:this.table=new AtomTable(lineColor);;
:this.marged=new AtomWithMargin(table,2,2);;
:analyzeAndAddInternal(line);;
end
start
note right
List<Atom>getAtoms()
end note
:return Collections.<Atom>singletonList(marged);;
stop
end
start
note right
AtomgetLHeader()
end note
:return null ;;
stop
end
start
note right
AtomasAtom(List<StripeSimple>cells,doublepadding)
end note
:final Sheetsheet=new Sheet(HorizontalAlignment.LEFT);;
:sheet.add(cell);;
:return new SheetBlock1(sheet,LineBreakStrategy.NONE,
padding);;
stop
end
start
note right
HColorgetBackOrFrontColor(Stringline,intidx)
end note
if (CreoleParser.doesStartByColor(line)) then (yes) 
:final intidx1=line.indexOf('#');;
:final intidx2=line.indexOf('>');;
if (idx2==-1) then (yes) 
:throw new IllegalStateException();;
stop
endif 
:final String[]color=line.substring(idx1,
idx2).split(",");;
if (idx<color.length) then (yes) 
:final Strings=color[idx];;
:return s==null ? null :skinParam.getIHtmlColorSet()
.getColorOrWhite(s);;
stop
endif 
endif 
:return null ;;
stop
end
start
note right
StringwithouBackColor(Stringline)
end note
:final intidx2=line.indexOf('>');;
if (idx2==-1) then (yes) 
:throw new IllegalStateException();;
stop
endif 
:return line.substring(idx2+1);;
stop
end
start
note right
void analyzeAndAddInternal(Stringline)
end note
:line=line.replace("\\|",hiddenBar);;
:HColorlineBackColor=getBackOrFrontColor(line,0);;
if (lineBackColor!=null ) then (yes) 
:line=withouBackColor(line);;
endif 
:table.newLine(lineBackColor);;
:Modemode=Mode.NORMAL;;
:Stringv=st.nextToken().replace(hiddenBar.charAt(0),
'|');;
if (v.startsWith("=")) then (yes) 
:v=v.substring(1);;
:mode=Mode.HEADER;;
endif 
:HColorcellBackColor=getBackOrFrontColor(v,0);;
if (cellBackColor!=null ) then (yes) 
:v=withouBackColor(v);;
endif 
:final List<String>lines=getWithNewlinesInternal(v);;
:final List<StripeSimple>cells=new ArrayList<>();;
:final StripeSimplecell=new StripeSimple(getFontConfiguration(mode),
stripeStyle,new CreoleContext(),skinParam,
CreoleMode.FULL);;
if (s.startsWith("<r>")) then (yes) 
:cell.setCellAlignment(HorizontalAlignment.RIGHT);;
:s=s.substring(String.valueOf("<r>").length());;
endif 
:cell.analyzeAndAdd(s);;
:cells.add(cell);;
:table.addCell(asAtom(cells,skinParam.getPadding()),
cellBackColor);;
end
start
note right
List<String>getWithNewlinesInternal(Strings)
end note
:final List<String>result=new ArrayList<>();;
:final StringBuildercurrent=new StringBuilder();;
:final charc=s.charAt(i);;
if (c=='\\'&&i<s.length()-1) then (yes) 
:final charc2=s.charAt(i+1);;
:i++;;
if (c2=='n') then (yes) 
:result.add(current.toString());;
:current.setLength(0);;
else if (c2=='\\') then (yes) 
:current.append(c2);;
else (no)
:current.append(c);;
:current.append(c2);;
endif 
else if (c==BackSlash.hiddenNewLine()) then (yes) 
:result.add(current.toString());;
:current.setLength(0);;
else (no)
:current.append(c);;
endif 
:result.add(current.toString());;
:return result;;
stop
end
start
note right
FontConfigurationgetFontConfiguration(Modemode)
end note
if (mode==Mode.NORMAL) then (yes) 
:return fontConfiguration;;
stop
endif 
:return fontConfiguration.bold();;
stop
end
start
note right
void analyzeAndAddLine(Stringline)
end note
:analyzeAndAddInternal(line);;
end
@enduml

