@startuml
!pragma layout smetana
start
note right
int getLocalNumber(int order)
end note
:ensureStackOk(order);;
:final int n=stack.get(order);;
:stack.set(order,n+1);;
:return n;;
stop
end
start
note right
void ensureStackOk(int order)
end note
while (stack.size()<=order)
:stack.add(0);;
endwhile
while (stack.size()>order+1)
:stack.remove(order+1);;
endwhile
end
@enduml

