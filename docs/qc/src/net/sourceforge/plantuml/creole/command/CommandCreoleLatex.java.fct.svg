@startuml
!pragma layout smetana
start
note right
String startingChars()
end note
:return "<";;
stop
end
start
note right
constructor CommandCreoleLatex()
end note
end
start
note right
Command create()
end note
:return new CommandCreoleLatex();;
stop
end
start
note right
int matchingSize(String line)
end note
:final Matcher2 m=pattern.matcher(line);;
if (m.find()==false) then (yes) 
:return 0;;
stop
endif 
:return m.group(1).length();;
stop
end
start
note right
String executeAndGetRemaining(String line,
StripeSimple stripe)
end note
:final Matcher2 m=pattern.matcher(line);;
if (m.find()==false) then (yes) 
:throw new IllegalStateException();;
stop
endif 
:final String latex=m.group(2);;
:stripe.addMath(ScientificEquationSafe.fromLatex(latex));;
:return line.substring(m.group(1).length());;
stop
end
@enduml

