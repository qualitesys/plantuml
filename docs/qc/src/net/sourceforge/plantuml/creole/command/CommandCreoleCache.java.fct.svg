@startuml
!pragma layout smetana
start
note right
constructor CommandCreoleCache(Stringp)
end note
:Pattern2result=cache.get(p);;
if (result==null ) then (yes) 
:result=MyPattern.cmpile(p);;
:cache.put(p,result);;
endif 
:this.mypattern=result;;
end
@enduml

