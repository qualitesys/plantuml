@startuml
!pragma layout smetana
start
note right
StringstartingChars()
end note
:return "<";;
stop
end
start
note right
constructor CommandCreoleQrcode()
end note
end
start
note right
Commandcreate()
end note
:return new CommandCreoleQrcode();;
stop
end
start
note right
intmatchingSize(Stringline)
end note
:final Matcher2m=pattern.matcher(line);;
if (m.find()==false) then (yes) 
:return 0;;
stop
endif 
:return m.group(1).length();;
stop
end
start
note right
StringexecuteAndGetRemaining(Stringline,StripeSimplestripe)
end note
:final Matcher2m=pattern.matcher(line);;
if (m.find()==false) then (yes) 
:throw new IllegalStateException();;
stop
endif 
:final Stringsrc=m.group(2);;
:final doublescale=Parser.getScale(m.group(3),3);;
:stripe.addQrcode(src,scale);;
:return line.substring(m.group(1).length());;
stop
end
@enduml

