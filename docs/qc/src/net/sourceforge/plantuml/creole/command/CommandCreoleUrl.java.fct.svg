@startuml
!pragma layout smetana
start
note right
StringstartingChars()
end note
:return "[";;
stop
end
start
note right
Commandcreate()
end note
:return new CommandCreoleUrl();;
stop
end
start
note right
constructor CommandCreoleUrl()
end note
end
start
note right
intmatchingSize(Stringline)
end note
:final Matcher2m=pattern.matcher(line);;
if (m.find()==false) then (yes) 
:return 0;;
stop
endif 
:return m.group(1).length();;
stop
end
start
note right
StringexecuteAndGetRemaining(Stringline,StripeSimplestripe)
end note
:final Matcher2m=pattern.matcher(line);;
if (m.find()==false) then (yes) 
:throw new IllegalStateException();;
stop
endif 
:final UrlBuilderurlBuilder=new UrlBuilder(stripe.getSkinParam().getValue("topurl"),
UrlMode.STRICT);;
:final Urlurl=urlBuilder.getUrl(m.group(1));;
:stripe.addUrl(url);;
:return line.substring(m.group(1).length());;
stop
end
@enduml

