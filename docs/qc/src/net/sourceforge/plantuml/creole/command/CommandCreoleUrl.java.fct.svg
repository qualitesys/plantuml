@startuml
!pragma layout smetana
start
note right
String startingChars()
end note
:return "[";;
stop
end
start
note right
Command create()
end note
:return new CommandCreoleUrl();;
stop
end
start
note right
constructor CommandCreoleUrl()
end note
end
start
note right
int matchingSize(String line)
end note
:final Matcher2 m=pattern.matcher(line);;
if (m.find()==false) then (yes) 
:return 0;;
stop
endif 
:return m.group(1).length();;
stop
end
start
note right
String executeAndGetRemaining(String line,
StripeSimple stripe)
end note
:final Matcher2 m=pattern.matcher(line);;
if (m.find()==false) then (yes) 
:throw new IllegalStateException();;
stop
endif 
:final UrlBuilder urlBuilder=new UrlBuilder(stripe.getSkinParam().getValue("topurl"),
UrlMode.STRICT);;
:final Url url=urlBuilder.getUrl(m.group(1));;
:stripe.addUrl(url);;
:return line.substring(m.group(1).length());;
stop
end
@enduml

