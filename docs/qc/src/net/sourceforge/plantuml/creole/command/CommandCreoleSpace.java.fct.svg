@startuml
!pragma layout smetana
start
note right
StringstartingChars()
end note
:return "<";;
stop
end
start
note right
constructor CommandCreoleSpace()
end note
end
start
note right
Commandcreate()
end note
:return new CommandCreoleSpace();;
stop
end
start
note right
intmatchingSize(Stringline)
end note
:final Matcher2m=pattern.matcher(line);;
if (m.find()==false) then (yes) 
:return 0;;
stop
endif 
:return m.group(1).length();;
stop
end
start
note right
StringexecuteAndGetRemaining(Stringline,StripeSimplestripe)
end note
:final Matcher2m=pattern.matcher(line);;
if (m.find()==false) then (yes) 
:throw new IllegalStateException();;
stop
endif 
:final intsize=Integer.parseInt(m.group(2));;
:stripe.addSpace(size);;
:return line.substring(m.group(1).length());;
stop
end
@enduml

