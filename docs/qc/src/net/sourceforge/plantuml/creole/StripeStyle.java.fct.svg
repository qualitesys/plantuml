,1258.9063,201.5,1268.9063,205.5,1258.9063,201.5,1262.9063" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[cc6860cf7b0a946ff78de2f92fd0a4b1]
@startuml
!pragma layout smetana
start
note right
constructor StripeStyle(StripeStyleType type,
int order,char style)
end note
:this.type=type;;
:this.order=order;;
:this.style=style;;
end
start
note right
StripeStyleType getType()
end note
:return type;;
stop
end
start
note right
Atom getHeader(FontConfiguration fontConfiguration,
CreoleContext context)
end note
if (type==StripeStyleType.LIST_WITHOUT_NUMBER) then (yes) 
:return new Bullet(fontConfiguration,order);;
stop
endif 
if (type==StripeStyleType.LIST_WITH_NUMBER) then (yes) 
:final int localNumber=context.getLocalNumber(order);;
:return AtomTextUtils.createListNumber(fontConfiguration,
order,localNumber);;
stop
endif 
:return null ;;
stop
end
start
note right
int getOrder()
end note
:return order;;
stop
end
start
note right
char getStyle()
end note
:return style;;
stop
end
@enduml

