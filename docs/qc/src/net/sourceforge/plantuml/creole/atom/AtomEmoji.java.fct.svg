@startuml
!pragma layout smetana
start
note right
constructor AtomEmoji(Emoji emoji,double scale,
double size2D,HColor color)
end note
:this.emoji=emoji;;
:this.factor=scale*size2D/MAGIC;;
:this.color=color;;
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:final double size=36*factor;;
:return new XDimension2D(size,size);;
stop
end
start
note right
double getStartingAltitude(StringBounder stringBounder)
end note
:return -3*factor;;
stop
end
start
note right
void drawU(UGraphic ug)
end note
:emoji.drawU(ug,this.factor,this.color);;
end
@enduml

