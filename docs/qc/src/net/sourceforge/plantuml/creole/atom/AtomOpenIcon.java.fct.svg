@startuml
!pragma layout smetana
start
note right
constructor AtomOpenIcon(HColor newColor,
double scale,OpenIcon openIcon,FontConfiguration fontConfiguration,
Url url)
end note
:this.url=url;;
:this.openIcon=openIcon;;
:this.factor=scale*fontConfiguration.getSize2D()/12.0;;
:this.color=newColor==null ? fontConfiguration.getColor():newColor;;
end
start
note right
TextBlock asTextBlock()
end note
:return TextBlockUtils.withMargin(openIcon.asTextBlock(color,
factor),1,0);;
stop
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:return asTextBlock().calculateDimension(stringBounder);;
stop
end
start
note right
double getStartingAltitude(StringBounder stringBounder)
end note
:return -3*factor;;
stop
end
start
note right
void drawU(UGraphic ug)
end note
if (url!=null ) then (yes) 
:ug.startUrl(url);;
endif 
:asTextBlock().drawU(ug);;
if (url!=null ) then (yes) 
:ug.closeUrl();;
endif 
end
@enduml

