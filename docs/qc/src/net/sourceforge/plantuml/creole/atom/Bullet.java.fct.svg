 x1="292.5" x2="304.5" y1="956.332" y2="956.332"/><polygon fill="#181818" points="300.5,1025.2188,304.5,1035.2188,308.5,1025.2188,304.5,1029.2188" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="304.5" x2="304.5" y1="956.332" y2="1099.2188"/><line style="stroke:#181818;stroke-width:1.0;" x1="304.5" x2="252.5" y1="1099.2188" y2="1099.2188"/><line style="stroke:#181818;stroke-width:1.0;" x1="252.5" x2="252.5" y1="1099.2188" y2="1119.2188"/><polygon fill="#181818" points="248.5,1109.2188,252.5,1119.2188,256.5,1109.2188,252.5,1113.2188" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="252.5" x2="252.5" y1="921.7656" y2="944.332"/><polygon fill="#181818" points="248.5,934.332,252.5,944.332,256.5,934.332,252.5,938.332" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="252.5" x2="252.5" y1="1153.1875" y2="1173.1875"/><polygon fill="#181818" points="248.5,1163.1875,252.5,1173.1875,256.5,1163.1875,252.5,1167.1875" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[3b14e18602824500066359d87e24d151]
@startuml
!pragma layout smetana
start
note right
constructor Bullet(FontConfiguration fontConfiguration,
int order)
end note
:this.fontConfiguration=fontConfiguration;;
:this.order=order;;
end
start
note right
void drawU(UGraphic ug)
end note
:final HColor color=fontConfiguration.getColor();;
:ug=ug.apply(color).apply(color.bg()).apply(new UStroke(0));;
if (order==0) then (yes) 
:ug=ug.apply(UTranslate.dx(3));;
:ug.draw(new UEllipse(5,5));;
else (no)
:ug=ug.apply(UTranslate.dx(1+8*order));;
:ug.draw(new URectangle(3.5,3.5));;
endif 
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
if (order==0) then (yes) 
:return new XDimension2D(12,5);;
stop
endif 
:return new XDimension2D(8+8*order,3);;
stop
end
start
note right
double getStartingAltitude(StringBounder stringBounder)
end note
if (order==0) then (yes) 
:return -5;;
stop
endif 
:return -7;;
stop
end
@enduml

