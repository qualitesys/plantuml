@startuml
!pragma layout smetana
start
note right
constructor AtomWithMargin(Atom atom,double marginY1,
double marginY2)
end note
:this.atom=atom;;
:this.marginY1=marginY1;;
:this.marginY2=marginY2;;
end
start
note right
List<Atom> splitInTwo(StringBounder stringBounder,
double width)
end note
:final List<Atom> result=new ArrayList<>();;
:final List<Atom> list=atom.splitInTwo(stringBounder,
width);;
:double y1=marginY1;;
:double y2=marginY2;;
if (list.size()==2&&result.size()==0) then (yes) 
:y2=0;;
endif 
if (list.size()==2&&result.size()==1) then (yes) 
:y1=0;;
endif 
:result.add(new AtomWithMargin(a,y1,y2));;
:return Collections.unmodifiableList(result);;
stop
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:return XDimension2D.delta(atom.calculateDimension(stringBounder),0,marginY1+
marginY2);;
stop
