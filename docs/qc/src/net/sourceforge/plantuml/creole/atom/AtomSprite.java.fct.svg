@startuml
!pragma layout smetana
start
note right
constructor AtomSprite(HColor newColor,double scale,
FontConfiguration fontConfiguration,Sprite sprite,
Url url)
end note
:this.scale=scale;;
:this.sprite=sprite;;
:this.url=url;;
:this.color=newColor==null ? fontConfiguration.getColor():newColor;;
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:return sprite.asTextBlock(color,scale).calculateDimension(stringBounder);;
stop
end
start
note right
double getStartingAltitude(StringBounder stringBounder)
end note
:return 0;;
stop
end
start
note right
void drawU(UGraphic ug)
end note
if (url!=null ) then (yes) 
:ug.startUrl(url);;
endif 
:sprite.asTextBlock(color,scale).drawU(ug);;
if (url!=null ) then (yes) 
:ug.closeUrl();;
endif 
end
@enduml

