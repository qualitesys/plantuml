@startuml
!pragma layout smetana
start
note right
constructor AtomHorizontalTexts(List<Atom>texts)
end note
:this.all=texts;;
end
start
note right
XDimension2DcalculateDimension(StringBounderstringBounder)
end note
:doublewidth=0;;
:doubleheight=0;;
:final XDimension2Ddim=text.calculateDimension(stringBounder);;
:height=Math.max(height,dim.getHeight());;
:width+=dim.getWidth();;
:return new XDimension2D(width,height);;
stop
end
start
note right
doublegetStartingAltitude(StringBounderstringBounder)
end note
if (all.size()==0) then (yes) 
:return 0;;
stop
endif 
:return all.get(0).getStartingAltitude(stringBounder);;
stop
end
start
note right
void drawU(UGraphicug)
end note
:doublex=0;;
:final XDimension2Ddim=text.calculateDimension(ug.getStringBounder());;
:text.drawU(ug.apply(UTranslate.dx(x)));;
:x+=dim.getWidth();;
end
@enduml

