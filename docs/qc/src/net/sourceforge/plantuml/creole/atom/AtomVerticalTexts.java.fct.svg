@startuml
!pragma layout smetana
start
note right
constructor AtomVerticalTexts(List<Atom>texts)
end note
:this.all=texts;;
end
start
note right
XDimension2DcalculateDimension(StringBounderstringBounder)
end note
:doublewidth=0;;
:doubleheight=0;;
:final XDimension2Ddim=text.calculateDimension(stringBounder);;
:width=Math.max(width,dim.getWidth());;
:height+=dim.getHeight();;
:return new XDimension2D(width,height);;
stop
end
start
note right
doublegetStartingAltitude(StringBounderstringBounder)
end note
:return all.get(0).getStartingAltitude(stringBounder);;
stop
end
start
note right
void drawU(UGraphicug)
end note
:doubley=0;;
:final XDimension2Ddim=text.calculateDimension(ug.getStringBounder());;
:text.drawU(ug.apply(UTranslate.dy(y)));;
:y+=dim.getHeight();;
end
@enduml

