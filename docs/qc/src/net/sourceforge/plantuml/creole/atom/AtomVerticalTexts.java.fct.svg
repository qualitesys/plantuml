@startuml
!pragma layout smetana
start
note right
constructor AtomVerticalTexts(List<Atom> texts)
end note
:this.all=texts;;
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:double width=0;;
:double height=0;;
:final XDimension2D dim=text.calculateDimension(stringBounder);;
:width=Math.max(width,dim.getWidth());;
:height+=dim.getHeight();;
:return new XDimension2D(width,height);;
stop
end
start
note right
double getStartingAltitude(StringBounder stringBounder)
end note
:return all.get(0).getStartingAltitude(stringBounder);;
stop
end
start
note right
void drawU(UGraphic ug)
end note
:double y=0;;
:final XDimension2D dim=text.calculateDimension(ug.getStringBounder());;
:text.drawU(ug.apply(UTranslate.dy(y)));;
:y+=dim.getHeight();;
end
@enduml

