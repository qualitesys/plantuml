@startuml
!pragma layout smetana
start
note right
constructor AtomImgSvg(TileImageSvg tileImageSvg)
end note
:this.tileImageSvg=tileImageSvg;;
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:return tileImageSvg.calculateDimension(stringBounder);;
stop
end
start
note right
double getStartingAltitude(StringBounder stringBounder)
end note
:return 0;;
stop
end
start
note right
void drawU(UGraphic ug)
end note
:tileImageSvg.drawU(ug);;
end
@enduml

