@startuml
!pragma layout smetana
start
note right
UFont getFont(ISkinParam skinParam,FontParam fontParam,
Stereotype stereo)
end note
:return skinParam.getFont(stereo,false,fontParam);;
stop
end
start
note right
HColor getFontColor(ISkinParam skinParam,
FontParam fontParam,Stereotype stereo)
end note
:return skinParam.getFontHtmlColor(stereo,
fontParam);;
stop
end
start
note right
HColor getColor(ISkinParam skinParam,Stereotype stereo,
ColorParam ... colorParam)
end note
:return rose.getHtmlColor(skinParam,stereo,
colorParam);;
stop
end
@enduml

