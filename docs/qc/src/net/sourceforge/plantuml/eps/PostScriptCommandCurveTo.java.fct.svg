@startuml
!pragma layout smetana
start
note right
constructor PostScriptCommandCurveTo(doublex1,
doubley1,doublex2,doubley2,doublex3,doubley3)
end note
:this.x1=x1;;
:this.y1=y1;;
:this.x2=x2;;
:this.y2=y2;;
:this.x3=x3;;
:this.y3=y3;;
end
start
note right
StringtoPostString()
end note
:return EpsGraphics.format(x1)+" "+EpsGraphics.format(y1)+
" "+EpsGraphics.format(x2)+" "+EpsGraphics.format(y2)+
" "+EpsGraphics.format(x3)+" "+EpsGraphics.format(y3)+
" rcurveto";;
stop
end
@enduml

