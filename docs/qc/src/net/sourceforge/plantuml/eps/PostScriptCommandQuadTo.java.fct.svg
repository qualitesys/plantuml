@startuml
!pragma layout smetana
start
note right
constructor PostScriptCommandQuadTo(double x1,
double y1,double x2,double y2)
end note
:this.x1=x1;;
:this.y1=y1;;
:this.x2=x2;;
:this.y2=y2;;
end
start
note right
String toPostString()
end note
:return EpsGraphics.format(x1)+" "+EpsGraphics.format(y1)+
" "+EpsGraphics.format(x2)+" "+EpsGraphics.format(y2)+
" rquadto";;
stop
end
@enduml

