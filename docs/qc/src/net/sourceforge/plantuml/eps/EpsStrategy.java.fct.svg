@startuml
!pragma layout smetana
start
note right
EpsGraphics creatEpsGraphics()
end note
if (this==VERY_SIMPLE) then (yes) 
:return new EpsGraphics();;
stop
endif 
if (this==WITH_MACRO) then (yes) 
:return new EpsGraphicsMacro();;
stop
endif 
if (this==WITH_MACRO_AND_TEXT) then (yes) 
:return new EpsGraphicsMacroAndText();;
stop
endif 
:throw new IllegalArgumentException();;
stop
end
start
note right
EpsStrategy getDefault2()
end note
:return WITH_MACRO;;
stop
end
@enduml

