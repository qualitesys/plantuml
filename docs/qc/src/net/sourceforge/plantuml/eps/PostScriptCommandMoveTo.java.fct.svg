@startuml
!pragma layout smetana
start
note right
constructor PostScriptCommandMoveTo(double x,
double y)
end note
:this.x=x;;
:this.y=y;;
end
start
note right
String toPostString()
end note
:return EpsGraphics.format(x)+" "+EpsGraphics.format(y)+
" moveto";;
stop
end
@enduml

