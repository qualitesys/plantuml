@startuml
!pragma layout smetana
start
note right
StringtoPostString()
end note
if (this.toString==null ) then (yes) 
:this.toString=toPostStringSlow();;
endif 
:return this.toString;;
stop
end
start
note right
StringtoPostStringSlow()
end note
:final StringBuildersb=new StringBuilder();;
:sb.append(cmd.toPostString());;
:sb.append('\n');;
:return sb.toString();;
stop
end
start
note right
void add(PostScriptCommandcmd)
end note
:data.add(cmd);;
:this.toString=null ;;
end
@enduml

