@startuml
!pragma layout smetana
start
note right
String toPostString()
end note
if (this.toString==null ) then (yes) 
:this.toString=toPostStringSlow();;
endif 
:return this.toString;;
stop
end
start
note right
String toPostStringSlow()
end note
:final StringBuilder sb=new StringBuilder();;
:sb.append(cmd.toPostString());;
:sb.append('\n');;
:return sb.toString();;
stop
end
start
note right
void add(PostScriptCommand cmd)
end note
:data.add(cmd);;
:this.toString=null ;;
end
@enduml

