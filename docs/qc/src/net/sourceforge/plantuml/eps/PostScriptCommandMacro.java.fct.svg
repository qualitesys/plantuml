@startuml
!pragma layout smetana
start
note right
constructor PostScriptCommandMacro(String name)
end note
:this.name=name;;
end
start
note right
String getName()
end note
:return name;;
stop
end
start
note right
void add(PostScriptCommand cmd)
end note
:data.add(cmd);;
end
start
note right
String toPostString()
end note
:return name;;
stop
end
start
note right
String getPostStringDefinition()
end note
:final StringBuilder sb=new StringBuilder();;
:sb.append("/"+name+" {\n");;
:sb.append(data.toPostString());;
:sb.append("} def\n");;
:return sb.toString();;
stop
end
start
note right
int hashCode()
end note
:return data.toPostString().hashCode();;
stop
end
start
note right
boolean equals(Object obj)
end note
:final PostScriptCommandMacro other=(PostScriptCommandMacro )obj;;
:return this.data.toPostString().equals(other.data.toPostString());;
stop
end
@enduml

