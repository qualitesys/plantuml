@startuml
!pragma layout smetana
start
note right
constructor PostScriptCommandMacro(Stringname)
end note
:this.name=name;;
end
start
note right
StringgetName()
end note
:return name;;
stop
end
start
note right
void add(PostScriptCommandcmd)
end note
:data.add(cmd);;
end
start
note right
StringtoPostString()
end note
:return name;;
stop
end
start
note right
StringgetPostStringDefinition()
end note
:final StringBuildersb=new StringBuilder();;
:sb.append("/"+name+" {\n");;
:sb.append(data.toPostString());;
:sb.append("} def\n");;
:return sb.toString();;
stop
end
start
note right
inthashCode()
end note
:return data.toPostString().hashCode();;
stop
end
start
note right
booleanequals(Objectobj)
end note
:final PostScriptCommandMacroother=(PostScriptCommandMacro)obj;;
:return this.data.toPostString().equals(other.data.toPostString());;
stop
end
@enduml

