@startuml
!pragma layout smetana
start
note right
constructor PostScriptCommandRaw(String cmd,
boolean checkConsistence)
end note
if (checkConsistence&&cmd.indexOf('\n')!=-1) then (yes) 
:throw new IllegalArgumentException(cmd);;
stop
endif 
:this.cmd=cmd;;
end
start
note right
String toPostString()
end note
:return cmd;;
stop
end
@enduml

