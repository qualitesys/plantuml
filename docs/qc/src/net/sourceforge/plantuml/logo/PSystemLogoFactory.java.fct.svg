@startuml
!pragma layout smetana
start
note right
PSystemLogoinitDiagram(UmlSourcesource,StringstartLine)
end note
:return null ;;
stop
end
start
note right
PSystemLogoexecuteLine(UmlSourcesource,PSystemLogosystem,
Stringline)
end note
if (system==null &&line.equalsIgnoreCase("logo")) then (yes) 
:return new PSystemLogo(source);;
stop
endif 
if (system==null ) then (yes) 
:return null ;;
stop
endif 
:system.doCommandLine(line);;
:return system;;
stop
end
@enduml

