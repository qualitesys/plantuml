@startuml
!pragma layout smetana
start
note right
PSystemLogo initDiagram(UmlSource source,
String startLine)
end note
:return null ;;
stop
end
start
note right
PSystemLogo executeLine(UmlSource source,
PSystemLogo system,String line)
end note
if (system==null &&line.equalsIgnoreCase("logo")) then (yes) 
:return new PSystemLogo(source);;
stop
endif 
if (system==null ) then (yes) 
:return null ;;
stop
endif 
:system.doCommandLine(line);;
:return system;;
stop
end
@enduml

