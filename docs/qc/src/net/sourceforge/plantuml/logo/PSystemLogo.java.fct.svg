@startuml
!pragma layout smetana
start
note right
constructor PSystemLogo(UmlSourcesource)
end note
:super (source);;
end
start
note right
ImageDataexportDiagramNow(OutputStreamos,
intnum,FileFormatOptionfileFormat)
end note
:final intwidth=640;;
:final intheight=480;;
:final StringBounderstringBounder=FileFormat.PNG.getDefaultStringBounder();;
:final EmptyImageBuilderbuilder=new EmptyImageBuilder(fileFormat.getWatermark(),
width,height,Color.WHITE,stringBounder);;
:final BufferedImageim=builder.getBufferedImage();;
:final UGraphicug=new UGraphicG2d(HColors.WHITE,
ColorMapper.IDENTITY,stringBounder,builder.getGraphics2D(),
1.0);;
:((UGraphicG2d)ug).setBufferedImage(im);;
:final TurtleGraphicsPaneturtleGraphicsPane=new TurtleGraphicsPane(width,
height);;
:final TinyJavaLogotinyJavaLogo=new TinyJavaLogo(turtleGraphicsPane);;
:tinyJavaLogo.doCommandLine(line);;
:turtleGraphicsPane.paint(ug);;
:PngIO.write(im,os,96);;
:return new ImageDataSimple(im.getWidth(),
im.getHeight());;
stop
end
start
note right
DiagramDescriptiongetDescription()
end note
:return new DiagramDescription("(Logo)");;
stop
end
start
note right
void doCommandLine(Stringline)
end note
:lines.add(line);;
end
@enduml

