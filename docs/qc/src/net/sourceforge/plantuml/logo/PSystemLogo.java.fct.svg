@startuml
!pragma layout smetana
start
note right
constructor PSystemLogo(UmlSource source)
end note
:super (source);;
end
start
note right
ImageData exportDiagramNow(OutputStream os,
int num,FileFormatOption fileFormat)
end note
:final int width=640;;
:final int height=480;;
:final StringBounder stringBounder=FileFormat.PNG.getDefaultStringBounder();;
:final EmptyImageBuilder builder=new EmptyImageBuilder(fileFormat.getWatermark(),
width,height,Color.WHITE,stringBounder);;
:final BufferedImage im=builder.getBufferedImage();;
:final UGraphic ug=new UGraphicG2d(HColors.WHITE,
ColorMapper.IDENTITY,stringBounder,builder.getGraphics2D(),
1.0);;
:((UGraphicG2d )ug).setBufferedImage(im);;
:final TurtleGraphicsPane turtleGraphicsPane=new TurtleGraphicsPane(width,
height);;
:final TinyJavaLogo tinyJavaLogo=new TinyJavaLogo(turtleGraphicsPane);;
:tinyJavaLogo.doCommandLine(line);;
:turtleGraphicsPane.paint(ug);;
:PngIO.write(im,os,96);;
:return new ImageDataSimple(im.getWidth(),
im.getHeight());;
stop
end
start
note right
DiagramDescription getDescription()
end note
:return new DiagramDescription("(Logo)");;
stop
end
start
note right
void doCommandLine(String line)
end note
:lines.add(line);;
end
@enduml

