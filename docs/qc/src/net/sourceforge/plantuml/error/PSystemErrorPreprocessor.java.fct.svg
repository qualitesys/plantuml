@startuml
!pragma layout smetana
start
note right
constructor PSystemErrorPreprocessor(List<StringLocated>input,
List<StringLocated>trace)
end note
:super (UmlSource.create(input,DiagramType.getTypeFromArobaseStart(input.get(0)
.getString())==DiagramType.UML));;
:this.trace=trace;;
:this.singleError=new ErrorUml(ErrorUmlType.SYNTAX_ERROR,
getLastLine().getPreprocessorError(),0,getLastLine().getLocation());;
end
@enduml

