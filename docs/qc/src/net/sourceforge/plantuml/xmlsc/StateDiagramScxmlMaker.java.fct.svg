@startuml
!pragma layout smetana
start
note right
constructor StateDiagramScxmlMaker(StateDiagramdiagram)
end note
:this.diagram=diagram;;
end
start
note right
void createFiles(OutputStreamfos)
end note
switch (try/catch block)
case (try)
:final ScxmlStateDiagramStandardxmi;;
:xmi=new ScxmlStateDiagramStandard(diagram);;
:xmi.transformerXml(fos);;
case (catch (ParserConfigurationExceptione))
:Log.error(e.toString());;
:Logme.error(e);;
:throw new IOException(e.toString());;
stop
case (catch (TransformerExceptione))
:Log.error(e.toString());;
:Logme.error(e);;
:throw new IOException(e.toString());;
stop
endswitch
end
@enduml

