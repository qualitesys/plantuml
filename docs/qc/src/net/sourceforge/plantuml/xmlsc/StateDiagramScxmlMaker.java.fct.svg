@startuml
!pragma layout smetana
start
note right
constructor StateDiagramScxmlMaker(StateDiagram diagram)
end note
:this.diagram=diagram;;
end
start
note right
void createFiles(OutputStream fos)
end note
switch (try/catch block)
case (try)
:final ScxmlStateDiagramStandard xmi;;
:xmi=new ScxmlStateDiagramStandard(diagram);;
:xmi.transformerXml(fos);;
case (catch (ParserConfigurationException e))
:Log.error(e.toString());;
:Logme.error(e);;
:throw new IOException(e.toString());;
stop
case (catch (TransformerException e))
:Log.error(e.toString());;
:Logme.error(e);;
:throw new IOException(e.toString());;
stop
endswitch
end
@enduml

