@startuml
!pragma layout smetana
start
note right
constructor CommandMindMapOrgmode()
end note
:super (false,getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandMindMapOrgmode.class .getName(),RegexLeaf.start(),new RegexLeaf("TYPE","([ \t]*[*]+
)"),new RegexOptional(new RegexLeaf("BACKCOLOR","\\[(#\\w+
)\\]")),new RegexLeaf("SHAPE","(_)?"),RegexLeaf.spaceOneOrMore(),
new RegexLeaf("LABEL","([^%s].*)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(MindMapDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:final Stringtype=arg.get("TYPE",0);;
:final Stringlabel=arg.get("LABEL",0);;
:final StringstringColor=arg.get("BACKCOLOR",0);;
:HColorbackColor=null ;;
if (stringColor!=null ) then (yes) 
:backColor=diagram.getSkinParam().getIHtmlColorSet()
.getColor(stringColor);;
endif 
:return diagram.addIdea(backColor,diagram.getSmartLevel(type),
