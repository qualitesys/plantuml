@startuml
!pragma layout smetana
start
note right
constructor MindMapDiagramFactory()
end note
:super (DiagramType.MINDMAP);;
end
start
note right
List<Command> createCommands()
end note
:final List<Command> cmds=new ArrayList<>();;
:CommonCommands.addCommonCommands1(cmds);;
:cmds.add(new CommandRankDir());;
:cmds.add(new CommandMindMapOrgmode());;
:cmds.add(new CommandMindMapOrgmodeMultiline());;
:cmds.add(new CommandMindMapRoot());;
:cmds.add(new CommandMindMapPlus());;
:cmds.add(new CommandMindMapDirection());;
:return cmds;;
stop
end
start
note right
MindMapDiagram createEmptyDiagram(UmlSource source,
Map<String,String> skinParam)
end note
:return new MindMapDiagram(source);;
stop
end
@enduml

