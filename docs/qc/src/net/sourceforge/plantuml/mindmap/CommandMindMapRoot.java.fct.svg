@startuml
!pragma layout smetana
start
note right
constructor CommandMindMapRoot()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandMindMapRoot.class .getName(),
RegexLeaf.start(),new RegexLeaf("TYPE","(0)"),
RegexLeaf.spaceOneOrMore(),new RegexLeaf("LABEL",
"([^%s].*)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(MindMapDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final String label=arg.get("LABEL",0);;
:return diagram.addIdea(null ,0,Display.getWithNewlines(label),
IdeaShape.BOX,true);;
stop
end
@enduml

