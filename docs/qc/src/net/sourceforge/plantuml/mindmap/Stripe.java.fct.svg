@startuml
!pragma layout smetana
start
note right
String toString()
end note
:return ""+(int )x1+"->"+(int )x2+" ("+(int )value+
")";;
stop
end
start
note right
constructor Stripe(double x1,double x2,double value)
end note
if (x2<=x1) then (yes) 
:System.err.println("x1="+x1);;
:System.err.println("x2="+x2);;
:throw new IllegalArgumentException();;
stop
endif 
:this.x1=x1;;
:this.x2=x2;;
:this.value=value;;
end
start
note right
boolean contains(double x)
end note
:return x>=x1&&x<=x2;;
stop
end
start
note right
int compareTo(Stripe other)
end note
:return (int )Math.signum(this.x1-other.x1);;
stop
end
start
note right
double getValue()
end note
:return value;;
stop
end
start
note right
double getStart()
end note
:return x1;;
stop
end
start
note right
double getEnd()
end note
:return x2;;
stop
end
@enduml

