@startuml
!pragma layout smetana
start
note right
constructor CommandMindMapPlus()
end note
:super (false,getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandMindMapPlus.class .getName(),RegexLeaf.start(),new RegexLeaf("TYPE","([+
-]+)"),new RegexOptional(new RegexLeaf("BACKCOLOR","\\[(#\\w+
)\\]")),new RegexLeaf("SHAPE","(_)?"),RegexLeaf.spaceOneOrMore(),
new RegexLeaf("LABEL","([^%s].*)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(MindMapDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final String type=arg.get("TYPE",0);;
:final String label=arg.get("LABEL",0);;
:final String stringColor=arg.get("BACKCOLOR",0);;
:HColor backColor=null ;;
if (stringColor!=null ) then (yes) 
:backColor=diagram.getSkinParam().getIHtmlColorSet()
.getColor(stringColor);;
endif 
:final boolean direction=type.contains("-")? false:true;;
:return diagram.addIdea(backColor,type.length()-1,
Display.getWithNewlines(label),IdeaShape.fromDesc(arg.get("SHAPE",
0)),direction);;
stop
end
@enduml

