@startuml
!pragma layout smetana
start
note right
constructor CommandMindMapDirection()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandMindMapDirection.class .getName(),
RegexLeaf.start(),new RegexLeaf("[^*]*"),
new RegexLeaf("\\b"),new RegexLeaf("DIRECTION",
"(left|right|top|bottom)"),new RegexLeaf("\\b"),
new RegexLeaf("[^*]*"),new RegexLeaf("(side|direction)"),
new RegexLeaf("[^*]*"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(MindMapDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final String dir=arg.get("DIRECTION",0);;
:final Direction direction=Direction.lazzyValueOf(dir);;
:diagram.setDefaultDirection(direction);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

