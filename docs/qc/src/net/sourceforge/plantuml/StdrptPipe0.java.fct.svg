@startuml
!pragma layout smetana
start
note right
void printInfo(final PrintStream output,final Diagram sys)
end note
if (sys instanceof PSystemError ) then (yes) 
:final PSystemError err=(PSystemError )sys;;
:output.println("ERROR");;
:output.println(err.getLineLocation().getPosition());;
:output.println(er.getError());;
:output.flush();;
endif 
end
start
note right
void finalMessage(ErrorStatus error)
end note
if (error.hasError()) then (yes) 
:Log.error("Some diagram description contains errors");;
endif 
if (error.isNoData()) then (yes) 
:Log.error("No diagram found");;
endif 
end
start
note right
void errorLine(int lineError,File file)
end note
:Log.error("Error line "+(lineError+1)+" in file: "+
file.getPath());;
end
@enduml

