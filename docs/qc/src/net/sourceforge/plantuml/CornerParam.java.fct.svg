@startuml
!pragma layout smetana
start
note right
String getRoundKey()
end note
if (this==DEFAULT) then (yes) 
:return "roundcorner";;
stop
endif 
:return name()+"roundcorner";;
stop
end
start
note right
String getDiagonalKey()
end note
if (this==DEFAULT) then (yes) 
:return "diagonalcorner";;
stop
endif 
:return name()+"diagonalcorner";;
stop
end
@enduml

