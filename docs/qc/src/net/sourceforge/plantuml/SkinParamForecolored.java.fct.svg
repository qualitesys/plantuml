@startuml
!pragma layout smetana
start
note right
constructor SkinParamForecolored(ISkinParam skinParam,
HColor forecolor)
end note
:super (skinParam);;
:this.forecolor=forecolor;;
end
start
note right
HColor getHtmlColor(ColorParam param,Stereotype stereotype,
boolean clickable)
end note
:return forecolor;;
stop
end
@enduml

