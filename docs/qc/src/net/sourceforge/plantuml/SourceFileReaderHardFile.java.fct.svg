@startuml
!pragma layout smetana
start
note right
constructor SourceFileReaderHardFile(Definesdefines,
final Filefile,FileoutputFile,List<String>config,
Stringcharset,FileFormatOptionfileFormatOption)
end note
:super (file,fileFormatOption,defines,config,
charset);;
:this.outputFile=outputFile;;
:FileSystem.getInstance().setCurrentDir(SFile.fromFile(file.getAbsoluteFile()
.getParentFile()));;
end
start
note right
SuggestedFilegetSuggestedFile(BlockUmlblockUml)
end note
:final SuggestedFilesuggested=SuggestedFile.fromOutputFile(outputFile,
getFileFormatOption().getFileFormat());;
:return suggested;;
stop
end
@enduml

