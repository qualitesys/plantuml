@startuml
!pragma layout smetana
start
note right
constructor BpmBranch(intuid)
end note
:this.uid=uid;;
end
start
note right
intincAndGetCounter()
end note
:counter++;;
:return counter;;
stop
end
start
note right
StringgetEntryId()
end note
:return "$branchA"+uid;;
stop
end
start
note right
StringgetExitId()
end note
:return "$branchB"+uid;;
stop
end
start
note right
BpmElementgetEntryElement()
end note
:return new BpmElement(getEntryId(),BpmElementType.MERGE,
null );;
stop
end
start
note right
BpmElementgetElseElement()
end note
:return new BpmElement(getExitId(),BpmElementType.MERGE,
null );;
stop
end
start
note right
BpmEventgetResumeEntryEvent()
end note
:return new BpmEventResume(getEntryId());;
stop
end
start
note right
BpmEventgetGoToEndEvent()
end note
:return new BpmEventGoto(getExitId());;
stop
end
@enduml

