@startuml
!pragma layout smetana
start
note right
boolean clean(Grid grid)
end note
:boolean result=false;;
if (grid.usedColsOf(line).isEmpty()) then (yes) 
:grid.removeLine(line);;
:result=true;;
endif 
:return result;;
stop
end
@enduml

