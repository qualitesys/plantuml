@startuml
!pragma layout smetana
start
note right
constructor CommandResume()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandResume.class .getName(),RegexLeaf.start(),new RegexLeaf("resume"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("ID","([%pLN_.@]+
)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(BpmDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final BpmEvent event=new BpmEventResume(arg.get("ID",
0));;
:return diagram.addEvent(event);;
stop
end
@enduml

