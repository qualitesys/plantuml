@startuml
!pragma layout smetana
start
note right
constructor Coord(Lineline,Colrow)
end note
:this.line=Objects.requireNonNull(line);;
:this.col=Objects.requireNonNull(row);;
end
start
note right
ColgetCol()
end note
:return col;;
stop
end
start
note right
StringtoString()
end note
:return "line="+line+" col="+col;;
stop
end
start
note right
LinegetLine()
end note
:return line;;
stop
end
start
note right
inthashCode()
end note
:return line.hashCode()+col.hashCode();;
stop
end
start
note right
booleanequals(Objectobj)
end note
:final Coordother=(Coord)obj;;
:return this.line==other.line&&this.col==other.col;;
stop
end
@enduml

