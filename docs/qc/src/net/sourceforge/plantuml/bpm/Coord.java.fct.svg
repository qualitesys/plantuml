@startuml
!pragma layout smetana
start
note right
constructor Coord(Line line,Col row)
end note
:this.line=Objects.requireNonNull(line);;
:this.col=Objects.requireNonNull(row);;
end
start
note right
Col getCol()
end note
:return col;;
stop
end
start
note right
String toString()
end note
:return "line="+line+" col="+col;;
stop
end
start
note right
Line getLine()
end note
:return line;;
stop
end
start
note right
int hashCode()
end note
:return line.hashCode()+col.hashCode();;
stop
end
start
note right
boolean equals(Object obj)
end note
:final Coord other=(Coord )obj;;
:return this.line==other.line&&this.col==other.col;;
stop
end
@enduml

