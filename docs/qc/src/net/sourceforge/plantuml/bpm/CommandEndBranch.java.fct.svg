@startuml
!pragma layout smetana
start
note right
constructor CommandEndBranch()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandEndBranch.class .getName(),
RegexLeaf.start(),new RegexLeaf("end"),RegexLeaf.spaceOneOrMore(),
new RegexLeaf("branch"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(BpmDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:return diagram.endBranch();;
stop
end
@enduml

