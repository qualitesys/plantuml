@startuml
!pragma layout smetana
start
note right
constructor BpmDiagramFactory(DiagramTypetype)
end note
:super (DiagramType.BPM);;
end
start
note right
List<Command>createCommands()
end note
:final List<Command>result=new ArrayList<>();;
:result.add(new CommandDockedEvent());;
:result.add(new CommandMerge());;
:result.add(new CommandResume());;
:result.add(new CommandGoto());;
:result.add(new CommandNewBranch());;
:result.add(new CommandElseBranch());;
:result.add(new CommandEndBranch());;
:return result;;
stop
end
start
note right
AbstractPSystemcreateEmptyDiagram(UmlSourcesource,
Map<String,String>skinParam)
end note
:return new BpmDiagram(source);;
stop
end
@enduml

