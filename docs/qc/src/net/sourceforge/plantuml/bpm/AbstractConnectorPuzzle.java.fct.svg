@startuml
!pragma layout smetana
start
note right
booleanhave(Wherewhere)
end note
:return connections.contains(where);;
stop
end
start
note right
void append(Wherewhere)
end note
:this.connections.add(where);;
end
start
note right
void remove(Wherewhere)
end note
:final booleanok=connections.remove(where);;
if (ok==false) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
end
start
note right
void append(ConnectorPuzzleother)
end note
:this.connections.addAll(((AbstractConnectorPuzzle)other)
.connections);;
end
start
note right
Set<Where>connections()
end note
:return connections;;
stop
end
@enduml

