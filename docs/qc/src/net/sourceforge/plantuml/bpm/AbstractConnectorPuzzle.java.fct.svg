@startuml
!pragma layout smetana
start
note right
boolean have(Where where)
end note
:return connections.contains(where);;
stop
end
start
note right
void append(Where where)
end note
:this.connections.add(where);;
end
start
note right
void remove(Where where)
end note
:final boolean ok=connections.remove(where);;
if (ok==false) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
end
start
note right
void append(ConnectorPuzzle other)
end note
:this.connections.addAll(((AbstractConnectorPuzzle )other)
.connections);;
end
start
note right
Set<Where> connections()
end note
:return connections;;
stop
end
@enduml

