@startuml
!pragma layout smetana
start
note right
Placeable getData()
end note
:return data;;
stop
end
start
note right
void setData(Placeable data)
end note
:this.data=data;;
end
start
note right
String toString()
end note
if (data==null ) then (yes) 
:return super .toString();;
stop
endif 
:return super .toString()+" "+data;;
stop
end
start
note right
void addConnectionTo2(Placeable other)
end note
if (other instanceof BpmElement ==false) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:this.destinations.add(other);;
end
start
note right
List<Placeable> getDestinations2()
end note
:return Collections.unmodifiableList(destinations);;
stop
end
@enduml

