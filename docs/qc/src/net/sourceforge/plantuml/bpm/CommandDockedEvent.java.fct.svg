.5,554.2813,232.5,558.2813" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="232.5" x2="232.5" y1="598.25" y2="618.25"/><polygon fill="#181818" points="228.5,608.25,232.5,618.25,236.5,608.25,232.5,612.25" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[263aacd1b3a430665cbcd195af0863ad]
@startuml
!pragma layout smetana
start
note right
constructor CommandDockedEvent()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandDockedEvent.class .getName(),
RegexLeaf.start(),new RegexLeaf(":"),new RegexLeaf("LABEL",
"(.*)"),new RegexLeaf("STYLE",";"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(BpmDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final String label=arg.get("LABEL",0);;
:final BpmElement element=new BpmElement(null ,
BpmElementType.DOCKED_EVENT,label);;
:final BpmEvent event=new BpmEventAdd(element);;
:return diagram.addEvent(event);;
stop
end
@enduml

