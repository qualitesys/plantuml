@startuml
!pragma layout smetana
start
note right
constructor CommandElseBranch()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandElseBranch.class .getName(),
RegexLeaf.start(),new RegexLeaf("else"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(BpmDiagram diagram,
LineLocation location,RegexResult arg)
end note
:return diagram.elseBranch();;
stop
end
@enduml

