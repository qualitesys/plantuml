@startuml
!pragma layout smetana
start
note right
constructor CommandNewBranch()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandNewBranch.class .getName(),
RegexLeaf.start(),new RegexLeaf("new"),RegexLeaf.spaceOneOrMore(),
new RegexLeaf("branch"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(BpmDiagram diagram,
LineLocation location,RegexResult arg)
end note
:return diagram.newBranch();;
stop
end
@enduml

