<polygon fill="#181818" points="187,443.2734,191,453.2734,195,443.2734,191,447.2734" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="191" x2="191" y1="607.2109" y2="627.2109"/><polygon fill="#181818" points="187,617.2109,191,627.2109,195,617.2109,191,621.2109" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="191" x2="191" y1="711.7773" y2="734.3438"/><polygon fill="#181818" points="187,724.3438,191,734.3438,195,724.3438,191,728.3438" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="191" x2="191" y1="768.3125" y2="788.3125"/><polygon fill="#181818" points="187,778.3125,191,788.3125,195,778.3125,191,782.3125" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[22e842627f18eca4071c0bddd55ba6d1]
@startuml
!pragma layout smetana
start
note right
constructor Stereostyles()
end note
end
start
note right
boolean isEmpty()
end note
:return names.isEmpty();;
stop
end
start
note right
Stereostyles build(String label)
end note
:final Stereostyles result=new Stereostyles();;
:final Pattern2 p=MyPattern.cmpile("\\<{3}(.*?)\\>{3}");;
:final Matcher2 m=p.matcher(label);;
while (m.find())
:result.names.add(m.group(1));;
endwhile
:return result;;
stop
end
start
note right
Collection<String> getStyleNames()
end note
:return Collections.unmodifiableCollection(names);;
stop
end
@enduml

