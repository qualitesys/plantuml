@startuml
!pragma layout smetana
start
note right
constructor Stereostyles()
end note
end
start
note right
booleanisEmpty()
end note
:return names.isEmpty();;
stop
end
start
note right
Stereostylesbuild(Stringlabel)
end note
:final Stereostylesresult=new Stereostyles();;
:final Pattern2p=MyPattern.cmpile("\\<{3}(.*?)\\>{3}");;
:final Matcher2m=p.matcher(label);;
while (m.find())
:result.names.add(m.group(1));;
endwhile
:return result;;
stop
end
start
note right
Collection<String>getStyleNames()
end note
:return Collections.unmodifiableCollection(names);;
stop
end
@enduml

