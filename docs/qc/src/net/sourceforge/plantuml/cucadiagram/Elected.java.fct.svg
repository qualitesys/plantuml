@startuml
!pragma layout smetana
start
note right
StringtoString()
end note
:return shortName+"/"+score;;
stop
end
start
note right
constructor Elected(StringshortName,intscore)
end note
:this.shortName=shortName;;
:this.score=score;;
end
start
note right
StringgetShortName()
end note
:return shortName;;
stop
end
start
note right
intgetScore()
end note
:return score;;
stop
end
@enduml

