@startuml
!pragma layout smetana
start
note right
MiddleFactory getMiddleFactory(HColor backColor,
HColor diagramBackColor)
end note
if (this==CIRCLE) then (yes) 
:return new MiddleFactoryCircle(backColor);;
stop
endif 
if (this==CIRCLE_CIRCLED) then (yes) 
:return new MiddleFactoryCircleCircled(MiddleCircleCircledMode.BOTH,
backColor,diagramBackColor);;
stop
endif 
if (this==CIRCLE_CIRCLED1) then (yes) 
:return new MiddleFactoryCircleCircled(MiddleCircleCircledMode.MODE1,
backColor,diagramBackColor);;
stop
endif 
if (this==CIRCLE_CIRCLED2) then (yes) 
:return new MiddleFactoryCircleCircled(MiddleCircleCircledMode.MODE2,
backColor,diagramBackColor);;
stop
endif 
:throw new UnsupportedOperationException();;
stop
end
start
note right
LinkMiddleDecor getInversed()
end note
if (this==CIRCLE_CIRCLED1) then (yes) 
:return CIRCLE_CIRCLED2;;
stop
else if (this==CIRCLE_CIRCLED2) then (yes) 
:return CIRCLE_CIRCLED1;;
stop
endif 
:return this;;
stop
end
@enduml

