@startuml
!pragma layout smetana
start
note right
constructor UnparsableGraphvizException(Exception cause,
String graphvizVersion,String svg,String diagramSource)
end note
:super (cause);;
:this.graphvizVersion=graphvizVersion;;
:this.svg=svg;;
:this.diagramSource=diagramSource;;
end
start
note right
String getGraphvizVersion()
end note
:return graphvizVersion;;
stop
end
start
note right
String getDebugData()
end note
:return "SVG="+svg+"\r\nDIAGRAM="+diagramSource;;
stop
end
@enduml

