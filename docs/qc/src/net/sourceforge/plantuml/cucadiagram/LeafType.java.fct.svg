@startuml
!pragma layout smetana
start
note right
LeafType getLeafType(String type)
end note
:type=StringUtils.goUpperCase(type);;
if (type.startsWith("ABSTRACT")) then (yes) 
:return LeafType.ABSTRACT_CLASS;;
stop
endif 
if (type.startsWith("DIAMOND")) then (yes) 
:return LeafType.STATE_CHOICE;;
stop
endif 
if (type.startsWith("STATIC")) then (yes) 
:return LeafType.CLASS;;
stop
endif 
:return LeafType.valueOf(type);;
stop
end
start
note right
boolean isLikeClass()
end note
:return this==LeafType.ANNOTATION||this==LeafType.ABSTRACT_CLASS||this==LeafType.CLASS||this==LeafType.INTERFACE||this==LeafType.ENUM||this==LeafType.ENTITY||this==LeafType.PROTOCOL||this==LeafType.STRUCT||this==LeafType.EXCEPTION||this==LeafType.METACLASS||this==LeafType.STEREOTYPE;;
stop
end
start
note right
String toHtml()
end note
:final String html=StringUtils.goLowerCase(toString().replace('_',
' '));;
:return StringUtils.capitalize(html);;
stop
end
@enduml

