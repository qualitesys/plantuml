@startuml
!pragma layout smetana
start
note right
constructor DisplayPositioned(Displaydisplay,
HorizontalAlignmenthorizontalAlignment,VerticalAlignmentverticalAlignment)
end note
:this.display=display;;
:this.horizontalAlignment=horizontalAlignment;;
:this.verticalAlignment=verticalAlignment;;
end
start
note right
DisplayPositionedsingle(Displaydisplay,HorizontalAlignmenthorizontalAlignment,
VerticalAlignmentverticalAlignment)
end note
:return new DisplayPositioned(display,horizontalAlignment,
verticalAlignment);;
stop
end
start
note right
DisplayPositionednone(HorizontalAlignmenthorizontalAlignment,
VerticalAlignmentverticalAlignment)
end note
:return new DisplayPositioned(Display.NULL,
horizontalAlignment,verticalAlignment);;
stop
end
start
note right
DisplaygetDisplay()
end note
