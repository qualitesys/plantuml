@startuml
!pragma layout smetana
start
note right
String pattern()
end note
:return "("+SINGLE+"([%s]+"+SINGLE+")*)";;
stop
end
start
note right
constructor Stereotag(String name)
end note
if (Objects.requireNonNull(name).startsWith("$")) then (yes) 
:throw new IllegalArgumentException(name);;
stop
endif 
:this.name=name;;
end
start
note right
String getName()
end note
:return name;;
stop
end
start
note right
int hashCode()
end note
:return name.hashCode();;
stop
end
start
note right
boolean equals(Object arg0)
end note
:return name.equals(((Stereotag )arg0).name);;
stop
end
start
note right
String toString()
end note
:return "$"+name;;
stop
end
@enduml

