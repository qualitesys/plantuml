@startuml
!pragma layout smetana
start
note right
Stringpattern()
end note
:return "("+SINGLE+"([%s]+"+SINGLE+")*)";;
stop
end
start
note right
constructor Stereotag(Stringname)
end note
if (Objects.requireNonNull(name).startsWith("$")) then (yes) 
:throw new IllegalArgumentException(name);;
stop
endif 
:this.name=name;;
end
start
note right
StringgetName()
end note
:return name;;
stop
end
start
note right
inthashCode()
end note
:return name.hashCode();;
stop
end
start
note right
booleanequals(Objectarg0)
end note
:return name.equals(((Stereotag)arg0).name);;
stop
end
start
note right
StringtoString()
end note
:return "$"+name;;
stop
end
@enduml

