end note
:final FileusrLocalBinDot=new File("/usr/local/bin/dot");;
if (usrLocalBinDot.exists()) then (yes) 
:return usrLocalBinDot;;
stop
endif 
:final FileusrBinDot=new File("/usr/bin/dot");;
if (usrBinDot.exists()) then (yes) 
:return usrBinDot;;
stop
endif 
:final FileoptLocalBinDot=new File("/opt/local/bin/dot");;
:return optLocalBinDot;;
stop
end
start
