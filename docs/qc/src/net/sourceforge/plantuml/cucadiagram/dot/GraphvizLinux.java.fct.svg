@startuml
!pragma layout smetana
start
note right
constructor GraphvizLinux(ISkinParam skinParam,
String dotString,String ... type)
end note
:super (skinParam,dotString,type);;
end
start
note right
File specificDotExe()
end note
:final File usrLocalBinDot=new File("/usr/local/bin/dot");;
if (usrLocalBinDot.exists()) then (yes) 
:return usrLocalBinDot;;
stop
endif 
:final File usrBinDot=new File("/usr/bin/dot");;
if (usrBinDot.exists()) then (yes) 
:return usrBinDot;;
stop
endif 
:final File optLocalBinDot=new File("/opt/local/bin/dot");;
:return optLocalBinDot;;
stop
end
start
note right
String getExeName()
end note
:return "dot";;
stop
end
start
note right
boolean graphviz244onWindows()
end note
:return false;;
stop
end
@enduml

