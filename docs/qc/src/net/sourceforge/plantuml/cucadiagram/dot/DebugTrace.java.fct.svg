@startuml
!pragma layout smetana
start
note right
PrintWritergetPrintWriter()
end note
if (pw==null ) then (yes) 
switch (try/catch block)
case (try)
:pw=out.createPrintWriter();;
case (catch (FileNotFoundExceptione))
endswitch
endif 
:return pw;;
stop
end
start
note right
void DEBUG(Strings)
end note
:final PrintWriterpw=getPrintWriter();;
:pw.println(s);;
:pw.flush();;
end
start
note right
void DEBUG(Strings,Throwablet)
end note
:DEBUG(s);;
:t.printStackTrace(pw);;
:pw.flush();;
end
@enduml

