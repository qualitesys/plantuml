@startuml
!pragma layout smetana
start
note right
constructor CucaDiagramSimplifierActivity(CucaDiagram diagram,
List<String> dotStrings,StringBounder stringBounder)
end note
:this.diagram=diagram;;
:this.stringBounder=stringBounder;;
:boolean changed;;
repeat
:changed=false;;
:final Collection<IGroup> groups=new ArrayList<>(diagram.getGroups(false));;
if (diagram.isAutarkic(g)) then (yes) 
:final IEntityImage img=computeImage(g);;
:g.overrideImage(img,LeafType.ACTIVITY);;
:changed=true;;
endif 
repeat while (changed)
end
start
note right
IEntityImage computeImage(IGroup g)
end note
:final GroupPngMakerActivity maker=new GroupPngMakerActivity(diagram,
g,stringBounder);;
:return maker.getImage();;
stop
end
@enduml

