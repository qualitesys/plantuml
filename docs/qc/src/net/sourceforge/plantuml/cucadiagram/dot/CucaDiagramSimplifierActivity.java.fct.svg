@startuml
!pragma layout smetana
start
note right
constructor CucaDiagramSimplifierActivity(CucaDiagramdiagram,
List<String>dotStrings,StringBounderstringBounder)
end note
:this.diagram=diagram;;
:this.stringBounder=stringBounder;;
:booleanchanged;;
repeat
:changed=false;;
:final Collection<IGroup>groups=new ArrayList<>(diagram.getGroups(false));;
if (diagram.isAutarkic(g)) then (yes) 
:final IEntityImageimg=computeImage(g);;
:g.overrideImage(img,LeafType.ACTIVITY);;
:changed=true;;
endif 
repeat while (changed)
end
start
note right
IEntityImagecomputeImage(IGroupg)
end note
:final GroupPngMakerActivitymaker=new GroupPngMakerActivity(diagram,
g,stringBounder);;
:return maker.getImage();;
stop
end
@enduml

