@startuml
!pragma layout smetana
start
note right
constructor GraphvizVersions()
end note
end
start
note right
GraphvizVersions getInstance()
end note
:return singleton;;
stop
end
start
note right
GraphvizVersion getVersion(File f)
end note
if (f==null ) then (yes) 
:return null ;;
stop
endif 
:GraphvizVersion result=map.get(f);;
if (result!=null ) then (yes) 
:return result;;
stop
endif 
:result=checkVersionSlow(f.getAbsolutePath());;
:map.put(f,result);;
:return result;;
stop
end
start
note right
GraphvizVersion checkVersionSlow(String pathExecutable)
end note
:final GraphvizVersionFinder finder=new GraphvizVersionFinder(new File(pathExecutable));;
:return finder.getVersion();;
stop
end
@enduml

