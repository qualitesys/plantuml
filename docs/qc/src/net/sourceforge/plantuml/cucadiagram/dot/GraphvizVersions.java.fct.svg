@startuml
!pragma layout smetana
start
note right
constructor GraphvizVersions()
end note
end
start
note right
GraphvizVersionsgetInstance()
end note
:return singleton;;
stop
end
start
note right
GraphvizVersiongetVersion(Filef)
end note
if (f==null ) then (yes) 
:return null ;;
stop
endif 
:GraphvizVersionresult=map.get(f);;
if (result!=null ) then (yes) 
:return result;;
stop
endif 
:result=checkVersionSlow(f.getAbsolutePath());;
:map.put(f,result);;
:return result;;
stop
end
start
note right
GraphvizVersioncheckVersionSlow(StringpathExecutable)
end note
:final GraphvizVersionFinderfinder=new GraphvizVersionFinder(new File(pathExecutable));;
:return finder.getVersion();;
stop
end
@enduml

