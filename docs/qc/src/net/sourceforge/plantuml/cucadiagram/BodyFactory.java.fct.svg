e5b8ba960deded8719a4e6fc]
@startuml
!pragma layout smetana
start
note right
BodiercreateLeaf(LeafTypetype,Set<VisibilityModifier>hides)
end note
if (type.isLikeClass()||type==LeafType.OBJECT) then (yes) 
:return new BodierLikeClassOrObject(type,
hides);;
stop
endif 
:return new BodierSimple();;
stop
end
start
note right
BodiercreateGroup(Set<VisibilityModifier>hides)
end note
:return new BodierSimple();;
stop
end
start
note right
TextBlockcreate1(HorizontalAlignmentalign,
List<CharSequence>rawBody,ISkinParamskinParam,
Stereotypestereotype,ILeafentity,Stylestyle)
end note
:return new BodyEnhanced1(align,rawBody,skinParam,
entity,style);;
stop
end
start
note right
TextBlockcreate2(HorizontalAlignmentalign,
Displaydisplay,ISkinParamskinParam,Stereotypestereotype,
ILeafentity,Stylestyle)
end note
:return new BodyEnhanced1(align,display,skinParam,
entity,style);;
stop
end
start
note right
TextBlockcreate3(DisplayrawBody,ISkinSimpleskinParam,
HorizontalAlignmentalign,FontConfigurationtitleConfig,
LineBreakStrategylineBreakStrategy,Stylestyle)
end note
:return new BodyEnhanced2(rawBody,skinParam,
align,titleConfig,lineBreakStrategy,style);;
stop
end
@enduml

