;" x1="153" x2="153" y1="400.0391" y2="420.0391"/><polygon fill="#181818" points="149,410.0391,153,420.0391,157,410.0391,153,414.0391" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="153" x2="153" y1="454.0078" y2="474.0078"/><polygon fill="#181818" points="149,464.0078,153,474.0078,157,464.0078,153,468.0078" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[41ae9073c5a0b2c4da36e258bee8a3bb]
@startuml
!pragma layout smetana
start
note right
XDimension2DcomputeDimension(doublewidth,
doubleheight)
end note
if (this==HALF_PRINTED_FULL) then (yes) 
:return new XDimension2D(width/2,height);;
stop
endif 
if (this==HALF_NOT_PRINTED) then (yes) 
:return new XDimension2D(0,0);;
stop
endif 
:return new XDimension2D(width,height);;
stop
end
@enduml

