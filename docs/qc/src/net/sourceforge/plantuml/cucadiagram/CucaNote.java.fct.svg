-width:1.0;"/><!--MD5=[00a87456ebee5a352627e9cd318ecd92]
@startuml
!pragma layout smetana
start
note right
constructor CucaNote(Displaydisplay,Positionposition,
Colorscolors,NoteLinkStrategystrategy)
end note
:this.display=display;;
:this.position=position;;
:this.colors=colors;;
:this.strategy=strategy;;
end
start
note right
CucaNotebuild(Displaydisplay,Positionposition,
Colorscolors)
end note
:return new CucaNote(display,position,colors,
NoteLinkStrategy.NORMAL);;
stop
end
start
note right
CucaNotewithStrategy(NoteLinkStrategystrategy)
end note
:return new CucaNote(display,position,colors,
strategy);;
stop
end
start
note right
DisplaygetDisplay()
end note
:return display;;
stop
end
start
note right
NoteLinkStrategygetStrategy()
end note
:return strategy;;
stop
end
start
note right
ColorsgetColors()
end note
:return colors;;
stop
end
start
note right
PositiongetPosition()
end note
:return position;;
stop
end
@enduml

