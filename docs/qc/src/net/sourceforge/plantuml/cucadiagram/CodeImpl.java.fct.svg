@startuml
!pragma layout smetana
start
note right
constructor CodeImpl(String name)
end note
:this.name=Objects.requireNonNull(name);;
end
start
note right
Code of(String code)
end note
if (code==null ) then (yes) 
:EntityFactory.bigError();;
endif 
:return new CodeImpl(code);;
stop
end
start
note right
String getName()
end note
:return name;;
stop
end
start
note right
String toString()
end note
:return name;;
stop
end
start
note right
int hashCode()
end note
:return name.hashCode();;
stop
end
start
note right
boolean equals(Object obj)
end note
:final CodeImpl other=(CodeImpl )obj;;
:return this.name.equals(other.name);;
stop
end
start
note right
Code eventuallyRemoveStartingAndEndingDoubleQuote(String format)
end note
:return CodeImpl.of(StringUtils.eventuallyRemoveStartingAndEndingDoubleQuote(getName(),
format));;
stop
end
@enduml

