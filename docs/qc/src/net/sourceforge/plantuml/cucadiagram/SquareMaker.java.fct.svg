@startuml
!pragma layout smetana
start
note right
void putInSquare(List<O> data,SquareLinker<O> linker)
end note
:final int branch=computeBranch(data.size());;
:int headBranch=0;;
:final int dist=i-headBranch;;
:final O ent2=data.get(i);;
if (dist==branch) then (yes) 
:final O ent1=data.get(headBranch);;
:linker.topDown(ent1,ent2);;
:headBranch=i;;
else (no)
:final O ent1=data.get(i-1);;
:linker.leftRight(ent1,ent2);;
endif 
end
start
note right
int computeBranch(final int size)
end note
:final double sqrt=Math.sqrt(size);;
:final int r=(int )sqrt;;
if (r*r==size) then (yes) 
:return r;;
stop
endif 
:return r+1;;
stop
end
start
note right
int getBottomLeft(final int size)
end note
:final int s=computeBranch(size);;
:final int line=(size-1)/s;;
:return line*s;;
stop
end
@enduml

