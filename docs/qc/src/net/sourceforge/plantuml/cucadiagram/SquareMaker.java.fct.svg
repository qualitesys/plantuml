@startuml
!pragma layout smetana
start
note right
void putInSquare(List<O>data,SquareLinker<O>linker)
end note
:final intbranch=computeBranch(data.size());;
:intheadBranch=0;;
:final intdist=i-headBranch;;
:final Oent2=data.get(i);;
if (dist==branch) then (yes) 
:final Oent1=data.get(headBranch);;
:linker.topDown(ent1,ent2);;
:headBranch=i;;
else (no)
:final Oent1=data.get(i-1);;
:linker.leftRight(ent1,ent2);;
endif 
end
start
note right
intcomputeBranch(final intsize)
end note
:final doublesqrt=Math.sqrt(size);;
:final intr=(int)sqrt;;
if (r*r==size) then (yes) 
:return r;;
stop
endif 
:return r+1;;
stop
end
start
note right
intgetBottomLeft(final intsize)
end note
:final ints=computeBranch(size);;
:final intline=(size-1)/s;;
:return line*s;;
stop
end
@enduml

