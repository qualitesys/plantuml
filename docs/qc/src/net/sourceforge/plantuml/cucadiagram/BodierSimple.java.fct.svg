@startuml
!pragma layout smetana
start
note right
void muteClassToObject()
end note
:throw new UnsupportedOperationException();;
stop
end
start
note right
constructor BodierSimple()
end note
end
start
note right
void setLeaf(ILeaf leaf)
end note
:this.leaf=Objects.requireNonNull(leaf);;
end
start
note right
boolean addFieldOrMethod(String s)
end note
:final Display display=Display.getWithNewlines2(s);;
:rawBody.addAll(display.asList());;
:return true;;
stop
end
start
note right
Display getMethodsToDisplay()
end note
:throw new UnsupportedOperationException();;
stop
end
start
note right
Display getFieldsToDisplay()
end note
:throw new UnsupportedOperationException();;
stop
end
start
note right
boolean hasUrl()
end note
:return false;;
stop
end
start
note right
List<CharSequence> getRawBody()
end note
:return Collections.unmodifiableList(rawBody);;
stop
end
