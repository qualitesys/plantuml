@startuml
!pragma layout smetana
start
note right
constructor Body3(List<CharSequence> rawBody_,
ISkinParam skinParam,Stereotype stereotype,
Style style)
end note
:this.rawBody.add(VisibilityModifier.replaceVisibilityModifierByUnicodeChar(s.toString(),
true));;
:this.skinParam=skinParam;;
:this.stereotype=stereotype;;
:this.style=style;;
end
start
note right
void drawU(UGraphic ug)
end note
:getTextBlock().drawU(ug);;
end
start
note right
TextBlock getTextBlock()
end note
:final Display display=Display.create(rawBody);;
:final FontConfiguration config=FontConfiguration.create(skinParam,
style);;
:return display.create(config,HorizontalAlignment.LEFT,
skinParam);;
stop
end
start
note right
Ports getPorts(StringBounder stringBounder)
end note
:return new Ports();;
stop
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:return getTextBlock().calculateDimension(stringBounder);;
stop
end
@enduml

