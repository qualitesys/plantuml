@startuml
!pragma layout smetana
start
note right
void add(Magmamagma)
end note
:all.add(magma);;
end
start
note right
MagmaListgetMagmas(IGroupgroup)
end note
:final MagmaListresult=new MagmaList();;
if (m.getContainer()==group) then (yes) 
:result.add(m);;
endif 
:return result;;
stop
end
start
note right
intsize()
end note
:return all.size();;
stop
end
start
note right
void putInSquare()
end note
:final SquareLinker<Magma>linker=new SquareLinker<Magma>(){public void topDown(Magmatop,
Magmadown){top.linkToDown(down);}public void leftRight(Magmaleft,
Magmaright){left.linkToRight(right);}};;
:new SquareMaker<Magma>().putInSquare(all,
linker);;
end
@enduml

