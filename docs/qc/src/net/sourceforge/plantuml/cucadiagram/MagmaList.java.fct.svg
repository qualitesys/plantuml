@startuml
!pragma layout smetana
start
note right
void add(Magma magma)
end note
:all.add(magma);;
end
start
note right
MagmaList getMagmas(IGroup group)
end note
:final MagmaList result=new MagmaList();;
if (m.getContainer()==group) then (yes) 
:result.add(m);;
endif 
:return result;;
stop
end
start
note right
int size()
end note
:return all.size();;
stop
end
start
note right
void putInSquare()
end note
:final SquareLinker<Magma> linker=new SquareLinker<Magma >(){public void topDown(Magma top,
Magma down){top.linkToDown(down);}public void leftRight(Magma left,
Magma right){left.linkToRight(right);}};;
:new SquareMaker<Magma >().putInSquare(all,
linker);;
end
@enduml

