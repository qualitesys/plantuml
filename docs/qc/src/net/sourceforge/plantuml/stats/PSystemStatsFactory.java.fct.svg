@startuml
!pragma layout smetana
start
note right
AbstractPSystem executeLine(UmlSource source,
String line)
end note
switch (try/catch block)
case (try)
if (line.matches("(?i)^stats\\s*$")) then (yes) 
:return PSystemStats.create(source);;
stop
endif 
case (catch (IOException e))
:Log.error("Error "+e);;
endswitch
:return null ;;
stop
end
@enduml

