@startuml
!pragma layout smetana
start
note right
constructor PSystemStats(UmlSourcesource)
end note
:super (source);;
:final StatsImplstats=(StatsImpl)StatsUtils.getStats();;
:strings.addAll(new CreoleConverter(stats)
.toCreole());;
end
start
note right
PSystemStatscreate(UmlSourcesource)
end note
:return new PSystemStats(source);;
stop
end
start
note right
DiagramDescriptiongetDescription()
end note
:return new DiagramDescription("(Stats)");;
stop
end
@enduml

