@startuml
!pragma layout smetana
start
note right
constructor PSystemStats(UmlSource source)
end note
:super (source);;
:final StatsImpl stats=(StatsImpl )StatsUtils.getStats();;
:strings.addAll(new CreoleConverter(stats)
.toCreole());;
end
start
note right
PSystemStats create(UmlSource source)
end note
:return new PSystemStats(source);;
stop
end
start
note right
DiagramDescription getDescription()
end note
:return new DiagramDescription("(Stats)");;
stop
end
@enduml

