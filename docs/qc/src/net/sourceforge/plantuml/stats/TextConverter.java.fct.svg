285,1358.3086" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[1d2014f0ef982c7782bbce5df98af491]
@startuml
!pragma layout smetana
start
note right
constructor TextConverter(Statsstats)
end note
:this.stats=stats;;
end
start
note right
void printMe(PrintStreamps)
end note
:final TextTabletable=new TextTable();;
:table.addSeparator();;
:table.addLine("ID","Start","Duration","Generated",
"Mean(ms)");;
:table.addSeparator();;
:Objectid=(Long)line.getValue(StatsColumn.SESSION_ID);;
if (id==null ) then (yes) 
:id="";;
endif 
:final Datestart=(Date)line.getValue(StatsColumn.STARTING);;
:final Stringduration=line.getValue(StatsColumn.DURATION_STRING)
.toString();;
:final Longgenerated=(Long)line.getValue(StatsColumn.GENERATED_COUNT);;
:final Longgenerated_ms=(Long)line.getValue(StatsColumn.GENERATED_MEAN_TIME);;
:table.addLine(id,start,duration,generated,
generated_ms);;
:table.addSeparator();;
:linesUsed=table.getLines();;
:table.printMe(ps);;
end
start
note right
intgetLinesUsed()
end note
:return linesUsed;;
stop
end
start
note right
void main(String[]args)
end note
:StatsUtils.dumpStats();;
end
@enduml

