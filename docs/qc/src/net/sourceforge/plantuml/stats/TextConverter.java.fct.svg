293,1354.3086,289,1358.3086" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[1bf66eb42a147f7c0d496a1cc838a657]
@startuml
!pragma layout smetana
start
note right
constructor TextConverter(Stats stats)
end note
:this.stats=stats;;
end
start
note right
void printMe(PrintStream ps)
end note
:final TextTable table=new TextTable();;
:table.addSeparator();;
:table.addLine("ID","Start","Duration","Generated",
"Mean(ms)");;
:table.addSeparator();;
:Object id=(Long )line.getValue(StatsColumn.SESSION_ID);;
if (id==null ) then (yes) 
:id="";;
endif 
:final Date start=(Date )line.getValue(StatsColumn.STARTING);;
:final String duration=line.getValue(StatsColumn.DURATION_STRING)
.toString();;
:final Long generated=(Long )line.getValue(StatsColumn.GENERATED_COUNT);;
:final Long generated_ms=(Long )line.getValue(StatsColumn.GENERATED_MEAN_TIME);;
:table.addLine(id,start,duration,generated,
generated_ms);;
:table.addSeparator();;
:linesUsed=table.getLines();;
:table.printMe(ps);;
end
start
note right
int getLinesUsed()
end note
:return linesUsed;;
stop
end
start
note right
void main(String[] args)
end note
:StatsUtils.dumpStats();;
end
@enduml

