1148.6133" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="174" x2="174" y1="1188.582" y2="1208.582"/><polygon fill="#181818" points="170,1198.582,174,1208.582,178,1198.582,174,1202.582" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[9b1189d4e84e3bdb87f215f9f218cced]
@startuml
!pragma layout smetana
start
note right
constructor HumanDuration(long duration)
end note
:this.duration=duration;;
end
start
note right
String toString()
end note
:long time=duration;;
:time=time/1000;;
:final long sec=time%60;;
:time=time/60;;
:final long min=time%60;;
:time=time/60;;
:final long hour=time%24;;
:final long day=time/24;;
if (day>0) then (yes) 
:return String.format("%dd %02dh%02dm%02ds",
day,hour,min,sec);;
stop
endif 
if (hour>0) then (yes) 
:return String.format("%dh%02dm%02ds",hour,
min,sec);;
stop
endif 
if (min>0) then (yes) 
:return String.format("%dm%02ds",min,sec);;
stop
endif 
:return String.format("%ds",sec);;
stop
end
@enduml

