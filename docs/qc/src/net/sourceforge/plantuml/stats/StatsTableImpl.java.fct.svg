@startuml
!pragma layout smetana
start
note right
constructor StatsTableImpl(String name)
end note
:this.name=name;;
:this.columnHeaders=EnumSet.noneOf(StatsColumn.class );;
end
start
note right
String getName()
end note
:return name;;
stop
end
start
note right
Collection<StatsColumn> getColumnHeaders()
end note
:return Collections.unmodifiableCollection(columnHeaders);;
stop
end
start
note right
List<StatsLine> getLines()
end note
:return Collections.unmodifiableList(lines);;
stop
end
start
note right
void addLine(StatsLine line)
end note
:this.columnHeaders.addAll(line.getColumnHeaders());;
:lines.add(line);;
end
@enduml

