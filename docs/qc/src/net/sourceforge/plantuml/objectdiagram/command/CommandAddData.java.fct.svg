@startuml
!pragma layout smetana
start
note right
constructor CommandAddData()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandAddData.class .getName(),RegexLeaf.start(),new RegexLeaf("NAME","([%pLN_.]+
)"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf(":"),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf("DATA",
"(.*)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(AbstractClassOrObjectDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final String name=arg.get("NAME",0);;
:final IEntity entity=diagram.getOrCreateLeaf(diagram.buildLeafIdent(name),
diagram.buildCode(name),null ,null );;
:final String field=arg.get("DATA",0);;
if (field.length()>0&&VisibilityModifier.isVisibilityCharacter(field)) then (yes) 
:diagram.setVisibilityModifierPresent(true);;
endif 
:entity.getBodier().addFieldOrMethod(field);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

