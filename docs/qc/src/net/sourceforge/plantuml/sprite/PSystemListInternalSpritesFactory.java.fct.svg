@startuml
!pragma layout smetana
start
note right
AbstractPSystem executeLine(UmlSource source,
String line)
end note
:final String lineLower=StringUtils.goLowerCase(line);;
if (lineLower.startsWith("listsprite")) then (yes) 
:return new PSystemListInternalSprites(source);;
stop
endif 
:return null ;;
stop
end
@enduml

