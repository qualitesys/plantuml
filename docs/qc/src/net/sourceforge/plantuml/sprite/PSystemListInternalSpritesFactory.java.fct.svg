@startuml
!pragma layout smetana
start
note right
AbstractPSystemexecuteLine(UmlSourcesource,
Stringline)
end note
:final StringlineLower=StringUtils.goLowerCase(line);;
if (lineLower.startsWith("listsprite")) then (yes) 
:return new PSystemListInternalSprites(source);;
stop
endif 
:return null ;;
stop
end
@enduml

