@startuml
!pragma layout smetana
start
note right
constructor SpriteSvg(String svg)
end note
:this.svg=svg;;
end
start
note right
TextBlock asTextBlock(final HColor color,
final double scale)
end note
:final UImageSvg img=new UImageSvg(svg,scale);;
:return new AbstractTextBlock(){public void drawU(UGraphic ug){ug.draw(img);}public XDimension2D calculateDimension(StringBounder stringBounder){return new XDimension2D(img.getWidth()*scale,
img.getHeight()*scale);}};;
stop
end
@enduml

