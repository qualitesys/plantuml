@startuml
!pragma layout smetana
start
note right
Sprite buildSprite(List<String> strings)
end note
:final SpriteColor result=new SpriteColor(strings.get(0).length()/2,
strings.size());;
if (col*2>=strings.get(line).length()) then (yes) 
:continue ;;
endif 
:final String charColor=strings.get(line).toString().substring(col*2,
col*2+2);;
:final Color rgb=COLOR_PALETTE.getColorFor(charColor);;
:result.setColor(col,line,rgb.getRGB()&0xFFFFFF);;
:return result;;
stop
end
start
note right
List<String> encodeColor(BufferedImage img)
end note
:final int width=img.getWidth();;
:final int height=img.getHeight();;
:final List<String> result=new ArrayList<>();;
:final StringBuilder sb=new StringBuilder();;
:final int rgb=(img.getRGB(x,y)&0xFFFFFF);;
:final String code=COLOR_PALETTE.getStringFor(new Color(rgb));;
:sb.append(code);;
:result.add(sb.toString());;
:return Collections.unmodifiableList(result);;
stop
end
@enduml

