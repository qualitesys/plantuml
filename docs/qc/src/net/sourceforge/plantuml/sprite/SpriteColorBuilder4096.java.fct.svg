@startuml
!pragma layout smetana
start
note right
SpritebuildSprite(List<String>strings)
end note
:final SpriteColorresult=new SpriteColor(strings.get(0).length()/2,
strings.size());;
if (col*2>=strings.get(line).length()) then (yes) 
:continue ;;
endif 
:final StringcharColor=strings.get(line).toString().substring(col*2,
col*2+2);;
:final Colorrgb=COLOR_PALETTE.getColorFor(charColor);;
:result.setColor(col,line,rgb.getRGB()&0xFFFFFF);;
:return result;;
stop
end
start
note right
List<String>encodeColor(BufferedImageimg)
end note
:final intwidth=img.getWidth();;
:final intheight=img.getHeight();;
:final List<String>result=new ArrayList<>();;
:final StringBuildersb=new StringBuilder();;
:final intrgb=(img.getRGB(x,y)&0xFFFFFF);;
:final Stringcode=COLOR_PALETTE.getStringFor(new Color(rgb));;
:sb.append(code);;
:result.add(sb.toString());;
:return Collections.unmodifiableList(result);;
stop
end
@enduml

