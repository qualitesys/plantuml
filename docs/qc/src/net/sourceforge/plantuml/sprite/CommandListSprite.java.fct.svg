@startuml
!pragma layout smetana
start
note right
constructor CommandListSprite()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandListSprite.class .getName(),
RegexLeaf.start(),new RegexLeaf("listsprites?"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(UmlDiagramsystem,
LineLocationlocation,RegexResultarg)
end note
:return CommandExecutionResult.ok();;
stop
end
@enduml

