@startuml
!pragma layout smetana
start
note right
List<Command>createCommands()
end note
:final List<Command>cmds=new ArrayList<>();;
:cmds.add(new CommandStdlib());;
:return cmds;;
stop
end
start
note right
StdlibDiagramcreateEmptyDiagram(UmlSourcesource,
Map<String,String>skinParam)
end note
:return new StdlibDiagram(source,skinParam);;
stop
end
@enduml

