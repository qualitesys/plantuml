end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandStdlib.class .getName(),RegexLeaf.start(),new RegexLeaf("stdlib"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("NAME","([-\\w]+
