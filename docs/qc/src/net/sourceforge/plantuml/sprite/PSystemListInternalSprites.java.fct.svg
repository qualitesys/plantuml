@startuml
!pragma layout smetana
start
note right
constructor PSystemListInternalSprites(UmlSourcesource)
end note
:super (source);;
end
start
note right
UDrawablegetRootDrawable(FileFormatOptionfileFormatOption)
end note
:final List<String>lines=new ArrayList<>();;
:lines.add("<b>List Current Sprites");;
:lines.add("<i>Credit to");;
:lines.add("http://www.archimatetool.com");;
:lines.add(" ");;
:lines.add("<u>"+folder+"</u> :");;
:lines.add(" ");;
if (png.endsWith(".png")) then (yes) 
:final StringspriteName=png.substring(0,png.length()-4);;
:lines.add("<$archimate/"+spriteName+"> "+
spriteName);;
endif 
:final List<TextBlock>cols=PSystemDonors.getCols(lines,
4,0);;
:return new TextBlockHorizontal(cols,VerticalAlignment.TOP);;
stop
end
start
note right
DiagramDescriptiongetDescription()
end note
:return new DiagramDescription("(Sprites)");;
stop
end
@enduml

