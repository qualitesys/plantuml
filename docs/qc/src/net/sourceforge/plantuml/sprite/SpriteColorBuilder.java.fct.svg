1367,255.75,1146.1367,251.75,1150.1367" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="251.75" x2="251.75" y1="1190.1055" y2="1210.1055"/><polygon fill="#181818" points="247.75,1200.1055,251.75,1210.1055,255.75,1200.1055,251.75,1204.1055" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[a296ed0e3cc000699002c1239e52178d]
@startuml
!pragma layout smetana
start
note right
SpritebuildSprite(List<CharSequence>strings)
end note
:final SpriteColorresult=new SpriteColor(strings.get(0).length(),
strings.size());;
if (col>=strings.get(line).length()) then (yes) 
:continue ;;
endif 
:final charcharColor=strings.get(line).charAt(col);;
:final intidx=String.valueOf("0123456789ABCDEF")
.indexOf(charColor);;
if (idx!=-1) then (yes) 
:result.setGray(col,line,idx);;
else (no)
:final Colorrgb=COLOR_PALETTE.getColorFor(charColor);;
:result.setColor(col,line,rgb.getRGB()&0xFFFFFF);;
endif 
:return result;;
stop
end
start
note right
List<String>encodeColor(BufferedImageimg)
end note
:final intwidth=img.getWidth();;
:final intheight=img.getHeight();;
:final List<String>result=new ArrayList<>();;
:final StringBuildersb=new StringBuilder();;
:final intrgb=(img.getRGB(x,y)&0xFFFFFF);;
:final charcode=COLOR_PALETTE.getCharFor(new Color(rgb));;
:sb.append(code);;
:result.add(sb.toString());;
:return Collections.unmodifiableList(result);;
stop
end
@enduml

