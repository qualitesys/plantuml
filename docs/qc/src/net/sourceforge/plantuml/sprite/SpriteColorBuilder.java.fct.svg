7,252.75,1156.1367,256.75,1146.1367,252.75,1150.1367" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="252.75" x2="252.75" y1="1190.1055" y2="1210.1055"/><polygon fill="#181818" points="248.75,1200.1055,252.75,1210.1055,256.75,1200.1055,252.75,1204.1055" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[6332139044552ce135441537f11cacf8]
@startuml
!pragma layout smetana
start
note right
Sprite buildSprite(List<CharSequence> strings)
end note
:final SpriteColor result=new SpriteColor(strings.get(0).length(),
strings.size());;
if (col>=strings.get(line).length()) then (yes) 
:continue ;;
endif 
:final char charColor=strings.get(line).charAt(col);;
:final int idx=String.valueOf("0123456789ABCDEF")
.indexOf(charColor);;
if (idx!=-1) then (yes) 
:result.setGray(col,line,idx);;
else (no)
:final Color rgb=COLOR_PALETTE.getColorFor(charColor);;
:result.setColor(col,line,rgb.getRGB()&0xFFFFFF);;
endif 
:return result;;
stop
end
start
note right
List<String> encodeColor(BufferedImage img)
end note
:final int width=img.getWidth();;
:final int height=img.getHeight();;
:final List<String> result=new ArrayList<>();;
:final StringBuilder sb=new StringBuilder();;
:final int rgb=(img.getRGB(x,y)&0xFFFFFF);;
:final char code=COLOR_PALETTE.getCharFor(new Color(rgb));;
:sb.append(code);;
:result.add(sb.toString());;
:return Collections.unmodifiableList(result);;
stop
end
@enduml

