@startuml
!pragma layout smetana
start
note right
constructor PositionedNote(Display display,
NotePosition position,NoteType type,Swimlane swimlaneNote,
Colors colors)
end note
:this.display=display;;
:this.notePosition=position;;
:this.type=type;;
:this.colors=colors;;
:this.swimlaneNote=swimlaneNote;;
end
start
note right
constructor PositionedNote(Display note,NotePosition position,
NoteType type,Swimlane swimlaneNote)
end note
:this(note,position,type,swimlaneNote,null );;
end
start
note right
String toString()
end note
:return "type="+type+" notePosition="+notePosition+
" "+display;;
stop
end
start
note right
Display getDisplay()
end note
:return display;;
stop
end
start
note right
NotePosition getNotePosition()
end note
:return notePosition;;
stop
end
start
note right
NoteType getType()
end note
:return type;;
stop
end
start
note right
Colors getColors()
end note
:return colors;;
stop
end
start
note right
Swimlane getSwimlaneNote()
end note
:return swimlaneNote;;
stop
end
@enduml

