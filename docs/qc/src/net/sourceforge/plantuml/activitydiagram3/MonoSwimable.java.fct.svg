@startuml
!pragma layout smetana
start
note right
constructor MonoSwimable(Swimlane swimlane)
end note
:this.swimlane=swimlane;;
end
start
note right
Set<Swimlane> getSwimlanes()
end note
if (swimlane==null ) then (yes) 
:return Collections.emptySet();;
stop
endif 
:return Collections.<Swimlane >singleton(swimlane);;
stop
end
start
note right
Swimlane getSwimlaneIn()
end note
:return swimlane;;
stop
end
start
note right
Swimlane getSwimlaneOut()
end note
:return swimlane;;
stop
end
@enduml

