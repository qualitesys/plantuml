@startuml
!pragma layout smetana
start
note right
constructor InstructionStop(Swimlane swimlane,
LinkRendering inlinkRendering)
end note
:super (swimlane);;
:this.inlinkRendering=Objects.requireNonNull(inlinkRendering);;
end
start
note right
boolean containsBreak()
end note
:return false;;
stop
end
start
note right
Gtile createGtile(ISkinParam skinParam,StringBounder stringBounder)
end note
:return new GtileCircleStart(stringBounder,
skinParam,HColors.BLACK,getSwimlaneIn());;
stop
end
start
note right
Ftile createFtile(FtileFactory factory)
end note
:Ftile result=factory.stop(getSwimlaneIn());;
:result=eventuallyAddNote(factory,result,
result.getSwimlaneIn(),VerticalAlignment.CENTER);;
:return result;;
stop
end
start
note right
CommandExecutionResult add(Instruction other)
end note
:throw new UnsupportedOperationException();;
stop
end
start
note right
boolean kill()
end note
:return false;;
stop
end
start
note right
LinkRendering getInLinkRendering()
end note
:return inlinkRendering;;
stop
end
@enduml

