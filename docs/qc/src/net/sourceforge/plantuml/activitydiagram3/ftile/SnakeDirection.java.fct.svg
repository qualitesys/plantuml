18;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="141" x2="141" y1="438.875" y2="458.875"/><polygon fill="#181818" points="137,448.875,141,458.875,145,448.875,141,452.875" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[e5ca192d33b7cb65f443f3ff13bbb547]
@startuml
!pragma layout smetana
start
note right
SnakeDirectiongetDirection(XPoint2Dpt1,XPoint2Dpt2)
end note
if (pt1.getX()==pt2.getX()) then (yes) 
:return VERTICAL_THEN_HORIZONTAL;;
stop
endif 
if (pt1.getY()==pt2.getY()) then (yes) 
:return HORIZONTAL_THEN_VERTICAL;;
stop
endif 
:throw new IllegalArgumentException();;
stop
end
@enduml

