@startuml
!pragma layout smetana
start
note right
constructor TextBlockInterceptorUDrawable(TextBlock textBlock)
end note
:this.textBlock=textBlock;;
end
start
note right
void drawU(UGraphic ug)
end note
:new UGraphicInterceptorUDrawable2(ug,emptyHashMap())
.draw(textBlock);;
:ug.flushUg();;
end
start
note right
HashMap<String,UTranslate> emptyHashMap()
end note
:return new HashMap<>();;
stop
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:throw new UnsupportedOperationException();;
stop
end
@enduml

