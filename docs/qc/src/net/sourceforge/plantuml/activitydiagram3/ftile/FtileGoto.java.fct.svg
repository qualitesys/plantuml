@startuml
!pragma layout smetana
start
note right
constructor FtileGoto(ISkinParamskinParam,
Swimlaneswimlane,Stringname)
end note
:super (skinParam,swimlane);;
:this.name=name;;
end
start
note right
FtileGeometrycalculateDimensionFtile(StringBounderstringBounder)
end note
:return calculateDimensionEmpty().withoutPointOut();;
stop
end
start
note right
StringgetName()
end note
:return name;;
stop
end
@enduml

