@startuml
!pragma layout smetana
start
note right
constructor FtileWithUrl(Ftile ftile,Url url)
end note
:super (ftile);;
:this.url=Objects.requireNonNull(url);;
end
start
note right
void drawU(UGraphic ug)
end note
:ug.startUrl(url);;
:getFtileDelegated().drawU(ug);;
:ug.closeUrl();;
end
@enduml

