@startuml
!pragma layout smetana
start
note right
constructor FtileDecorateWelding(final Ftileftile,
final List<WeldingPoint>breaks)
end note
:super (ftile);;
:this.breaks=new ArrayList<>(breaks);;
end
start
note right
List<WeldingPoint>getWeldingPoints()
end note
:return Collections.unmodifiableList(breaks);;
stop
end
@enduml

