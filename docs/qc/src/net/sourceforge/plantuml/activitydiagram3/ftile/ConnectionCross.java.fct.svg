@startuml
!pragma layout smetana
start
note right
constructor ConnectionCross(Connection connection)
end note
:super (connection.getFtile1(),connection.getFtile2());;
:this.connection=connection;;
end
start
note right
void drawU(UGraphic ug)
end note
if (connection instanceof ConnectionTranslatable ) then (yes) 
:final ConnectionTranslatable conn=(ConnectionTranslatable )connection;;
:final Swimlane swimlane1=getFtile1().getSwimlaneOut();;
:final Swimlane swimlane2=getFtile2().getSwimlaneIn();;
if (swimlane1==null ) then (yes) 
:return ;;
stop
endif 
if (swimlane2==null ) then (yes) 
:return ;;
stop
endif 
:conn.drawTranslate(ug,swimlane1.getTranslate(),
swimlane2.getTranslate());;
endif 
end
@enduml

