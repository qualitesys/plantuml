@startuml
!pragma layout smetana
start
note right
constructor FtileDecoratePointOut(final Ftile ftile,
final double dx,double dy)
end note
:super (ftile);;
:this.dx=dx;;
if (dx!=0) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:this.dy=dy;;
end
start
note right
FtileGeometry calculateDimension(StringBounder stringBounder)
end note
:final FtileGeometry geo=super .calculateDimension(stringBounder);;
:return new FtileGeometry(geo.getWidth(),geo.getHeight(),geo.getLeft(),geo.getInY(),geo.getOutY()+
dy);;
stop
end
@enduml

