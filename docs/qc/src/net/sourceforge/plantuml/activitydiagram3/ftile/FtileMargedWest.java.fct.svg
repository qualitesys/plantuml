@startuml
!pragma layout smetana
start
note right
constructor FtileMargedWest(Ftile tile,double margin)
end note
:super (tile);;
:this.margin=margin;;
end
start
note right
void drawU(UGraphic ug)
end note
:super .drawU(ug.apply(UTranslate.dx(margin)));;
end
start
note right
FtileGeometry calculateDimension(StringBounder stringBounder)
end note
:FtileGeometry result=super .calculateDimension(stringBounder);;
:result=result.incLeft(margin);;
:return result;;
stop
end
@enduml

