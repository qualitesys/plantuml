@startuml
!pragma layout smetana
start
note right
constructor FtileMargedWest(Ftiletile,doublemargin)
end note
:super (tile);;
:this.margin=margin;;
end
start
note right
void drawU(UGraphicug)
end note
:super .drawU(ug.apply(UTranslate.dx(margin)));;
end
start
note right
FtileGeometrycalculateDimension(StringBounderstringBounder)
end note
:FtileGeometryresult=super .calculateDimension(stringBounder);;
:result=result.incLeft(margin);;
:return result;;
stop
end
@enduml

