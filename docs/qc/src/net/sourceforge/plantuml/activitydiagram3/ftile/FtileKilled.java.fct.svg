@startuml
!pragma layout smetana
start
note right
constructor FtileKilled(Ftile tileToKill)
end note
:super (tileToKill.skinParam());;
:this.tile=tileToKill;;
end
start
note right
Collection<Ftile> getMyChildren()
end note
:return tile.getMyChildren();;
stop
end
start
note right
Set<Swimlane> getSwimlanes()
end note
:return tile.getSwimlanes();;
stop
end
start
note right
Swimlane getSwimlaneIn()
end note
:return tile.getSwimlaneIn();;
stop
end
start
note right
Swimlane getSwimlaneOut()
end note
:return tile.getSwimlaneOut();;
stop
end
start
note right
FtileGeometry calculateDimensionFtile(StringBounder stringBounder)
end note
:final FtileGeometry geo=tile.calculateDimension(stringBounder);;
:return new FtileGeometry(tile.calculateDimension(stringBounder),
geo.getLeft(),geo.getInY());;
stop
end
start
note right
void drawU(UGraphic ug)
end note
:ug.draw(tile);;
end
@enduml

