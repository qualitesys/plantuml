@startuml
!pragma layout smetana
start
note right
TextBlockcreate(Displaynote,ISkinParamskinParam)
end note
:final Stylestyle=StyleSignatureBasic.of(SName.root,
SName.root,SName.document,skinParam.getUmlDiagramType().getStyleName(),
SName.legend).getMergedStyle(skinParam.getCurrentStyleBuilder());;
:return style.createTextBlockBordered(note,
skinParam.getIHtmlColorSet(),skinParam,Style.ID_LEGEND);;
stop
end
@enduml

