@startuml
!pragma layout smetana
start
note right
constructor FtileMargedVertically(Ftiletile,
doublemargin1,doublemargin2)
end note
:super (tile);;
:this.margin1=margin1;;
:this.margin2=margin2;;
end
start
note right
void drawU(UGraphicug)
end note
if (margin1>0) then (yes) 
:ug=ug.apply(UTranslate.dy(margin1));;
endif 
:ug.draw(getFtileDelegated());;
end
start
note right
FtileGeometrycalculateDimension(StringBounderstringBounder)
end note
if (cached==null ) then (yes) 
:this.cached=calculateDimensionSlow(stringBounder);;
endif 
:return this.cached;;
stop
end
start
note right
FtileGeometrycalculateDimensionSlow(StringBounderstringBounder)
end note
:return super .calculateDimension(stringBounder).incVertically(margin1,
margin2);;
stop
end
@enduml

