@startuml
!pragma layout smetana
start
note right
constructor FtileFactoryDelegatorAddUrl(FtileFactory factory)
end note
:super (factory);;
end
start
note right
Ftile addUrl(Ftile ftile,Url url)
end note
if (ftile instanceof FtileBox ) then (yes) 
:return new FtileWithUrl(ftile,url);;
stop
endif 
:return ftile;;
stop
end
@enduml

