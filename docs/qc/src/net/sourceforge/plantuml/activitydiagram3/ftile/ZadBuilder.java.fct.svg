@startuml
!pragma layout smetana
start
note right
UGraphicapply(UChangechange)
end note
:return new ZadBuilder(this,change);;
stop
end
start
note right
constructor ZadBuilder(StringBounderstringBounder)
end note
:super (stringBounder,new UTranslate());;
:this.context=new Context();;
end
start
note right
constructor ZadBuilder(ZadBuilderother,UChangechange)
end note
:super (other.getStringBounder(),change instanceof UTranslate? other.getTranslate()
.compose((UTranslate)change):other.getTranslate());;
if (!instanceOfAny(change,UBackground.class ,HColor.class ,UStroke.class ,UTranslate.class )) then (yes) 
:throw new UnsupportedOperationException(change.getClass()
.toString());;
stop
endif 
:this.context=other.context;;
end
start
note right
void draw(UShapeshape)
end note
if (shape instanceof URectangle) then (yes) 
:drawRectangle((URectangle)shape);;
endif 
end
start
note right
void drawRectangle(URectangleshape)
end note
:final MinMaxarea=shape.getMinMax().translate(getTranslate());;
:context.zad.add(area);;
end
start
note right
ZadgetZad()
end note
:return context.zad;;
stop
end
@enduml

