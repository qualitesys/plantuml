@startuml
!pragma layout smetana
start
note right
constructor UGraphicInterceptorGoto(UGraphicug)
end note
:super (ug);;
end
start
note right
void draw(UShapeshape)
end note
:System.err.println("inter="+shape.getClass());;
if (shape instanceof Ftile) then (yes) 
:final Ftilefoo=(Ftile)shape;;
:foo.drawU(this);;
else (no)
:getUg().draw(shape);;
:System.err.println("Drawing "+shape);;
endif 
end
start
note right
UGraphicapply(UChangechange)
end note
:return new UGraphicInterceptorGoto(getUg()
.apply(change));;
stop
end
@enduml

