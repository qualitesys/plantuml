@startuml
!pragma layout smetana
start
note right
constructor UGraphicInterceptorGoto(UGraphic ug)
end note
:super (ug);;
end
start
note right
void draw(UShape shape)
end note
:System.err.println("inter="+shape.getClass());;
if (shape instanceof Ftile ) then (yes) 
:final Ftile foo=(Ftile )shape;;
:foo.drawU(this);;
else (no)
:getUg().draw(shape);;
:System.err.println("Drawing "+shape);;
endif 
end
start
note right
UGraphic apply(UChange change)
end note
:return new UGraphicInterceptorGoto(getUg()
.apply(change));;
stop
end
@enduml

