start
note right
constructor Genealogy(Ftile root)
end note
:this.root=root;;
:process(root);;
end
start
note right
void process(Ftile current)
end note
:final Collection<Ftile> children=current.getMyChildren();;
:setMyFather(child,current);;
:process(child);;
end
start
note right
Ftile getMyFather(Ftile me)
end note
:return myFatherIs.get(me);;
stop
end
start
note right
void setMyFather(Ftile child,Ftile father)
end note
if (myFatherIs.containsKey(child)) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:myFatherIs.put(child,father);;
end
start
note right
UTranslate getTranslate(Ftile child,StringBounder stringBounder)
end note
:Ftile current=child;;
:UTranslate result=new UTranslate();;
while (current!=root)
:final Ftile father=getMyFather(current);;
:final UTranslate tr=father.getTranslateFor(current,
stringBounder);;
:result=tr.compose(result);;
:current=father;;
endwhile
:return result;;
stop
end
@enduml

