@startuml
!pragma layout smetana
start
note right
void add(MinMaxrect)
end note
:this.rectangles.add(rect);;
end
start
note right
void drawDebug(UGraphicug)
end note
:ug=ug.apply(HColors.BLUE.bg()).apply(HColors.RED_LIGHT);;
:System.err.println("minmax="+minMax);;
:minMax.drawGray(ug);;
end
start
note right
booleandoesHorizontalCross(Snakesnake)
end note
if (snake.doesHorizontalCross(minMax)) then (yes) 
:return true;;
stop
endif 
:return false;;
stop
end
@enduml

