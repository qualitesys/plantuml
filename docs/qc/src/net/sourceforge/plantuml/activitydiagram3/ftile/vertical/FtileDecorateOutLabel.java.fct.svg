@startuml
!pragma layout smetana
start
note right
constructor FtileDecorateOutLabel(Ftileftile,
XDimension2Ddim)
end note
:this(ftile,dim.getWidth(),dim.getHeight());;
end
start
note right
constructor FtileDecorateOutLabel(Ftileftile,
doublexl,doubleyl)
end note
:super (ftile);;
:this.xl=xl;;
:this.yl=yl;;
end
start
note right
FtileGeometrycalculateDimension(StringBounderstringBounder)
end note
:FtileGeometryresult=super .calculateDimension(stringBounder);;
:result=result.addBottom(yl);;
:final doublemissing=xl-result.getRight();;
if (missing>0) then (yes) 
:result=result.incRight(missing);;
endif 
:return result;;
stop
end
start
note right
void drawU(UGraphicug)
end note
:super .drawU(ug);;
end
@enduml

