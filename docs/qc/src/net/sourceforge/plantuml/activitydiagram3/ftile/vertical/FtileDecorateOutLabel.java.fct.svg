7852,223.5,813.7852,227.5,803.7852,223.5,807.7852" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="223.5" x2="223.5" y1="898.3516" y2="920.918"/><polygon fill="#181818" points="219.5,910.918,223.5,920.918,227.5,910.918,223.5,914.918" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="223.5" x2="223.5" y1="954.8867" y2="974.8867"/><polygon fill="#181818" points="219.5,964.8867,223.5,974.8867,227.5,964.8867,223.5,968.8867" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[c17f27d765f0f16f50346e51728dd407]
@startuml
!pragma layout smetana
start
note right
constructor FtileDecorateOutLabel(Ftile ftile,
XDimension2D dim)
end note
:this(ftile,dim.getWidth(),dim.getHeight());;
end
start
note right
constructor FtileDecorateOutLabel(Ftile ftile,
double xl,double yl)
end note
:super (ftile);;
:this.xl=xl;;
:this.yl=yl;;
end
start
note right
FtileGeometry calculateDimension(StringBounder stringBounder)
end note
:FtileGeometry result=super .calculateDimension(stringBounder);;
:result=result.addBottom(yl);;
:final double missing=xl-result.getRight();;
if (missing>0) then (yes) 
:result=result.incRight(missing);;
endif 
:return result;;
stop
end
start
note right
void drawU(UGraphic ug)
end note
:super .drawU(ug);;
end
@enduml

