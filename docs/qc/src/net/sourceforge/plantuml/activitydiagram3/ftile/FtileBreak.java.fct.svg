@startuml
!pragma layout smetana
start
note right
constructor FtileBreak(ISkinParam skinParam,
Swimlane swimlane)
end note
:super (skinParam,swimlane);;
end
start
note right
Collection<Ftile> getMyChildren()
end note
:return Collections.emptyList();;
stop
end
start
note right
String toString()
end note
:return "FtileBreak";;
stop
end
start
note right
FtileGeometry calculateDimensionFtile(StringBounder stringBounder)
end note
:return calculateDimensionEmpty().withoutPointOut();;
stop
end
start
note right
List<WeldingPoint> getWeldingPoints()
end note
:return Collections.singletonList((WeldingPoint )this);;
stop
end
@enduml

