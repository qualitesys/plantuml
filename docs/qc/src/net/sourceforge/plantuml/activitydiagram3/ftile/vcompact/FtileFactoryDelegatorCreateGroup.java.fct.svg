@startuml
!pragma layout smetana
start
note right
constructor FtileFactoryDelegatorCreateGroup(FtileFactory factory)
end note
:super (factory);;
end
start
note right
Ftile createGroup(Ftile list,Display name,
HColor backColor,PositionedNote note,USymbol type,
Style style)
end note
:Ftile result=new FtileGroup(list,name,backColor,
skinParam(),type,style);;
if (note!=null ) then (yes) 
:result=new FtileWithNotes(result,Collections.singleton(note),
skinParam(),VerticalAlignment.CENTER);;
endif 
:return result;;
stop
end
@enduml

