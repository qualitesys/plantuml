@startuml
!pragma layout smetana
start
note right
constructor FtileFactoryDelegatorCreateGroup(FtileFactoryfactory)
end note
:super (factory);;
end
start
note right
FtilecreateGroup(Ftilelist,Displayname,HColorbackColor,
PositionedNotenote,USymboltype,Stylestyle)
end note
:Ftileresult=new FtileGroup(list,name,backColor,
skinParam(),type,style);;
if (note!=null ) then (yes) 
:result=new FtileWithNotes(result,Collections.singleton(note),
skinParam(),VerticalAlignment.CENTER);;
endif 
:return result;;
stop
end
@enduml

