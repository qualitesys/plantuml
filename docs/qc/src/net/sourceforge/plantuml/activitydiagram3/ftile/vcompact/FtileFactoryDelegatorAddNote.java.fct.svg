9a91dc1c3]
@startuml
!pragma layout smetana
start
note right
constructor FtileFactoryDelegatorAddNote(FtileFactory factory)
end note
:super (factory);;
end
start
note right
Ftile addNote(Ftile ftile,Swimlane swimlane,
Collection<PositionedNote> notes,VerticalAlignment verticalAlignment)
end note
if (notes.size()==0) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:ISkinParam skinParam=skinParam();;
if (ftile==null ) then (yes) 
:final PositionedNote note=notes.iterator()
.next();;
if (note.getColors()!=null ) then (yes) 
:skinParam=note.getColors().mute(skinParam);;
endif 
:return new FtileNoteAlone(skinParam.shadowing(null ),
note.getDisplay(),skinParam,note.getType()==NoteType.NOTE,
swimlane);;
stop
endif 
:return FtileWithNoteOpale.create(ftile,notes,
skinParam,true,verticalAlignment);;
stop
end
@enduml

