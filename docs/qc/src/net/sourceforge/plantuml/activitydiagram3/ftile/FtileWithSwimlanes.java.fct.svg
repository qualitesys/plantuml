@startuml
!pragma layout smetana
start
note right
constructor FtileWithSwimlanes(Ftileftile,
Swimlanein,Swimlaneout)
end note
:super (ftile);;
:this.in=in;;
:this.out=out;;
end
start
note right
SwimlanegetSwimlaneIn()
end note
:return in;;
stop
end
start
note right
SwimlanegetSwimlaneOut()
end note
:return out;;
stop
end
@enduml

