f28fa2b664]
@startuml
!pragma layout smetana
start
note right
constructor FtileGeometryMerger(FtileGeometrygeo1,
FtileGeometrygeo2)
end note
:final doubleleft=Math.max(geo1.getLeft(),
geo2.getLeft());;
:final doubledx1=left-geo1.getLeft();;
:final doubledx2=left-geo2.getLeft();;
:final doublewidth=Math.max(geo1.getWidth()+
dx1,geo2.getWidth()+dx2);;
:final doubleheight=geo1.getHeight()+geo2.getHeight();;
if (geo2.hasPointOut()) then (yes) 
:result=new FtileGeometry(width,height,left,geo1.getInY(),geo2.getOutY()+
geo1.getHeight());;
else (no)
:result=new FtileGeometry(width,height,left,
geo1.getInY());;
endif 
end
start
note right
FtileGeometrygetResult()
end note
:return result;;
stop
end
@enduml

