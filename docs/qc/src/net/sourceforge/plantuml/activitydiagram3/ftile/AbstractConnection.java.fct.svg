@startuml
!pragma layout smetana
start
note right
constructor AbstractConnection(Ftile ftile1,
Ftile ftile2)
end note
:this.ftile1=ftile1;;
:this.ftile2=ftile2;;
end
start
note right
String toString()
end note
:return "["+ftile1+"]->["+ftile2+"]";;
stop
end
start
note right
Ftile getFtile1()
end note
:return ftile1;;
stop
end
start
note right
Ftile getFtile2()
end note
:return ftile2;;
stop
end
start
note right
HorizontalAlignment arrowHorizontalAlignment()
end note
if (ftile1!=null ) then (yes) 
:return ftile1.arrowHorizontalAlignment();;
stop
endif 
if (ftile2!=null ) then (yes) 
:return ftile2.arrowHorizontalAlignment();;
stop
endif 
:return HorizontalAlignment.LEFT;;
stop
end
@enduml

