@startuml
!pragma layout smetana
start
note right
constructor FtileFactoryDelegatorCreateParallel(FtileFactory factory)
end note
:super (factory);;
end
start
note right
Ftile createParallel(List<Ftile> all,ForkStyle style,
String label,Swimlane in,Swimlane out)
end note
:AbstractParallelFtilesBuilder builder;;
if (style==ForkStyle.SPLIT) then (yes) 
:builder=new ParallelBuilderSplit(skinParam(),
getStringBounder(),all);;
else if (style==ForkStyle.MERGE) then (yes) 
:builder=new ParallelBuilderMerge(skinParam(),
getStringBounder(),all);;
else if (style==ForkStyle.FORK) then (yes) 
:builder=new ParallelBuilderFork(skinParam(),
getStringBounder(),label,in,out,all);;
else (no)
:throw new IllegalStateException();;
stop
endif 
:final Ftile inner=super .createParallel(builder.list99,
style,label,in,out);;
:return builder.build(inner);;
stop
end
@enduml

