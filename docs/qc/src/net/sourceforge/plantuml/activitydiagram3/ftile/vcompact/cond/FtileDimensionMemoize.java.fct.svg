@startuml
!pragma layout smetana
start
note right
constructor FtileDimensionMemoize(ISkinParam skinParam)
end note
:super (skinParam);;
end
start
note right
FtileGeometry calculateDimensionInternal(StringBounder stringBounder)
end note
if (calculateDimensionInternal==null ) then (yes) 
:calculateDimensionInternal=calculateDimensionInternalSlow(stringBounder);;
endif 
:return calculateDimensionInternal;;
stop
end
@enduml

