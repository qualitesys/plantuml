@startuml
!pragma layout smetana
start
note right
constructor FtileWithConnection(Ftileftile,
Collection<Connection>connections)
end note
:super (ftile);;
if (Objects.requireNonNull(connections).size()==0) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:this.connections.addAll(connections);;
end
start
note right
StringtoString()
end note
:return super .toString()+" "+connections;;
stop
end
start
note right
constructor FtileWithConnection(Ftileftile,
Connectionconnection)
end note
:this(ftile,Arrays.asList(Objects.requireNonNull(connection)));;
end
start
note right
void drawU(UGraphicug)
end note
:getFtileDelegated().drawU(ug);;
:ug.draw(c);;
end
start
note right
Collection<Connection>getInnerConnections()
end note
:final List<Connection>result=new ArrayList<>(super .getInnerConnections());;
:result.addAll(connections);;
:return Collections.unmodifiableList(connections);;
stop
end
@enduml

