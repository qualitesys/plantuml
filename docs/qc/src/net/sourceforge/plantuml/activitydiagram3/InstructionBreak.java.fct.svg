@startuml
!pragma layout smetana
start
note right
constructor InstructionBreak(Swimlane swimlane,
LinkRendering inlinkRendering)
end note
:super (swimlane);;
:this.inlinkRendering=Objects.requireNonNull(inlinkRendering);;
end
start
note right
Ftile createFtile(FtileFactory factory)
end note
:return new FtileBreak(factory.skinParam(),
getSwimlaneIn());;
stop
end
start
note right
Gtile createGtile(ISkinParam skinParam,StringBounder stringBounder)
end note
:return new GtileBreak(stringBounder,skinParam,
getSwimlaneIn());;
stop
end
start
note right
CommandExecutionResult add(Instruction other)
end note
:throw new UnsupportedOperationException();;
stop
end
start
note right
boolean kill()
end note
:return false;;
stop
end
start
note right
LinkRendering getInLinkRendering()
end note
:return inlinkRendering;;
stop
end
start
note right
boolean containsBreak()
end note
:return true;;
stop
end
@enduml

