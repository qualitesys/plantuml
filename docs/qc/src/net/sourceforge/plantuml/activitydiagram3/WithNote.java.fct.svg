@startuml
!pragma layout smetana
start
note right
boolean addNote(Display note,NotePosition position,
NoteType type,Colors colors,Swimlane swimlaneNote)
end note
:this.notes.add(new PositionedNote(note,position,
type,swimlaneNote,colors));;
:return true;;
stop
end
start
note right
Ftile eventuallyAddNote(FtileFactory factory,
Ftile ftile,Swimlane swimlane,VerticalAlignment verticalAlignment)
end note
if (notes.size()==0) then (yes) 
:return ftile;;
stop
endif 
:return factory.addNote(ftile,swimlane,notes,
verticalAlignment);;
stop
end
start
note right
Collection<PositionedNote> getPositionedNotes()
end note
:return Collections.unmodifiableCollection(notes);;
stop
end
start
note right
boolean hasNotes()
end note
:return notes.size()>0;;
stop
end
@enduml

