@startuml
!pragma layout smetana
start
note right
constructor InstructionLabel(Swimlane swimlane,
String name)
end note
:super (swimlane);;
:this.name=name;;
end
start
note right
Ftile createFtile(FtileFactory factory)
end note
:return new FtileLabel(factory.skinParam(),
getSwimlaneIn(),name);;
stop
end
start
note right
Gtile createGtile(ISkinParam skinParam,StringBounder stringBounder)
end note
:return new GtileEmpty(stringBounder,skinParam);;
stop
end
start
note right
CommandExecutionResult add(Instruction other)
end note
:throw new UnsupportedOperationException();;
stop
end
start
note right
boolean kill()
end note
:return false;;
stop
end
start
note right
LinkRendering getInLinkRendering()
end note
:return LinkRendering.none();;
stop
end
start
note right
boolean containsBreak()
end note
:return false;;
stop
end
@enduml

