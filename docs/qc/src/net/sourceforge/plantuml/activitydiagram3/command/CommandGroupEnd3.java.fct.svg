@startuml
!pragma layout smetana
start
note right
constructor CommandGroupEnd3()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandGroupEnd3.class .getName(),
RegexLeaf.start(),new RegexLeaf("(end ?group|group ?end)"),
new RegexLeaf(";?"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(ActivityDiagram3 diagram,
LineLocation location,RegexResult arg)
end note
:return diagram.endGroup();;
stop
end
@enduml

