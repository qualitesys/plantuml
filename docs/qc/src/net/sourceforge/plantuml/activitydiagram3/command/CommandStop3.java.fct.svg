@startuml
!pragma layout smetana
start
note right
constructor CommandStop3()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandStop3.class .getName(),
RegexLeaf.start(),new RegexLeaf("stop"),new RegexLeaf(";?"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(ActivityDiagram3 diagram,
LineLocation location,RegexResult arg)
end note
:diagram.stop();;
:return CommandExecutionResult.ok();;
stop
end
@enduml

