@startuml
!pragma layout smetana
start
note right
constructor CommandElseLegacy1()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandElseLegacy1.class .getName(),
RegexLeaf.start(),new RegexLeaf("else"),RegexLeaf.spaceOneOrMore(),
new RegexLeaf("when"),RegexLeaf.spaceOneOrMore(),
new RegexLeaf("WHEN","(.*)"),new RegexLeaf(";?"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(ActivityDiagram3diagram,
LineLocationlocation,RegexResultarg)
end note
:final Displaywhen=Display.getWithNewlines(arg.get("WHEN",
0));;
:return diagram.else2(LinkRendering.none()
.withDisplay(when));;
stop
end
@enduml

