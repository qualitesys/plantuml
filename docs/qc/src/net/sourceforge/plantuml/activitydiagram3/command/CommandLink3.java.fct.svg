@startuml
!pragma layout smetana
start
note right
constructor CommandLink3()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandLink3.class .getName(),RegexLeaf.start(),new RegexLeaf("link"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("COLOR","(#\\w+
)"),new RegexLeaf(";?"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(ActivityDiagram3 diagram,
LineLocation location,RegexResult arg)
end note
:final String s=arg.get("COLOR",0);;
:final HColor color=s==null ? null :diagram.getSkinParam()
.getIHtmlColorSet().getColor(s);;
if (color!=null ) then (yes) 
:diagram.setColorNextArrow(Rainbow.fromColor(color,
null ));;
endif 
:return CommandExecutionResult.ok();;
stop
end
@enduml

