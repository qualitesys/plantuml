@startuml
!pragma layout smetana
start
note right
constructor CommandForkEnd3()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandForkEnd3.class .getName(),
RegexLeaf.start(),new RegexOr("STYLE",new RegexConcat(new RegexLeaf("end"),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf("fork")),
new RegexConcat(new RegexLeaf("fork"),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("end")),new RegexConcat(new RegexLeaf("end"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("merge"))),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("LABEL","(\\{.+
\\})?"),new RegexLeaf(";?"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(ActivityDiagram3 diagram,
LineLocation location,RegexResult arg)
end note
:final String style=arg.get("STYLE",0);;
:final ForkStyle forkStyle=style.contains("merge")? ForkStyle.MERGE:ForkStyle.FORK;;
:final String label=arg.get("LABEL",0);;
:return diagram.endFork(forkStyle,label);;
stop
end
@enduml

