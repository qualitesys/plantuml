@startuml
!pragma layout smetana
start
note right
constructor CommandSplitEnd3()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandSplitEnd3.class .getName(),
RegexLeaf.start(),new RegexOr(new RegexConcat(new RegexLeaf("end"),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf("split")),
new RegexConcat(new RegexLeaf("split"),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("end"))),new RegexLeaf(";?"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(ActivityDiagram3 diagram,
LineLocation location,RegexResult arg)
end note
:return diagram.endSplit();;
stop
end
@enduml

