@startuml
!pragma layout smetana
start
note right
constructor CommandSwitch()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandSwitch.class .getName(),
RegexLeaf.start(),ColorParser.exp4(),new RegexLeaf("switch"),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf("\\("),
new RegexLeaf("TEST","(.*?)"),new RegexLeaf("\\)"),
RegexLeaf.spaceZeroOrMore(),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(ActivityDiagram3diagram,
LineLocationlocation,RegexResultarg)
end note
:final Strings=arg.get("COLOR",0);;
:final HColorcolor=s==null ? null :diagram.getSkinParam()
.getIHtmlColorSet().getColor(s);;
:Stringtest=arg.get("TEST",0);;
if (test.length()==0) then (yes) 
:test=null ;;
endif 
:diagram.startSwitch(Display.getWithNewlines(test),
color);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

