@startuml
!pragma layout smetana
start
note right
constructor CommandBackwardLong3()
end note
:super (getRegexConcat(),MultilinesStrategy.REMOVE_STARTING_QUOTE,
Trim.BOTH);;
end
start
note right
String getPatternEnd()
end note
:return "^(.*)"+CommandActivity3.endingGroup()+
"$";;
stop
end
start
note right
ColorParser color()
end note
:return ColorParser.simpleColor(ColorType.BACK);;
stop
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandBackwardLong3.class .getName(),
RegexLeaf.start(),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("backward"),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf(":"),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("DATA","(.*)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeNow(ActivityDiagram3 diagram,
BlocLines lines)
end note
:lines=lines.removeEmptyColumns();;
:final RegexResult line0=getStartingPattern()
.matcher(lines.getFirst().getTrimmed().getString());;
:final BoxStyle style=BoxStyle.fromChar(lines.getLastChar());;
:lines=lines.removeStartingAndEnding(line0.get("DATA",
0),1);;
:final LinkRendering in=LinkRendering.none();;
:final LinkRendering out=LinkRendering.none();;
:return diagram.backward(lines.toDisplay(),
style,in,out);;
stop
end
@enduml

