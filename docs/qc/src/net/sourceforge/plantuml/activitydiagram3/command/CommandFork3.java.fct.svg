@startuml
!pragma layout smetana
start
note right
constructor CommandFork3()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandFork3.class .getName(),
RegexLeaf.start(),new RegexLeaf("fork"),new RegexLeaf(";?"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(ActivityDiagram3diagram,
LineLocationlocation,RegexResultarg)
end note
:diagram.fork();;
:return CommandExecutionResult.ok();;
stop
end
@enduml

