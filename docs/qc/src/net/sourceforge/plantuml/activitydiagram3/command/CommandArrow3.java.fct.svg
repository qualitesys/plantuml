,851.4766,259,841.4766,255,845.4766" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="255" x2="255" y1="729.1055" y2="749.1055"/><polygon fill="#181818" points="251,739.1055,255,749.1055,259,739.1055,255,743.1055" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="255" x2="255" y1="875.4766" y2="895.4766"/><polygon fill="#181818" points="251,885.4766,255,895.4766,259,885.4766,255,889.4766" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="255" x2="255" y1="929.4453" y2="949.4453"/><polygon fill="#181818" points="251,939.4453,255,949.4453,259,939.4453,255,943.4453" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[0652cad3f7c3afbc8a8c94a3689a9517]
@startuml
!pragma layout smetana
start
note right
constructor CommandArrow3()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandArrow3.class .getName(),
RegexLeaf.start(),new RegexOr(new RegexLeaf("->"),
new RegexLeaf("COLOR",CommandLinkElement.STYLE_COLORS_MULTIPLES)),
RegexLeaf.spaceZeroOrMore(),new RegexOr(new RegexLeaf("LABEL",
"(.*);"),new RegexLeaf("")),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(ActivityDiagram3 diagram,
LineLocation location,RegexResult arg)
end note
:final String colorString=arg.get("COLOR",0);;
if (colorString!=null ) then (yes) 
:final Rainbow rainbow=Rainbow.build(diagram.getSkinParam(),
colorString,diagram.getSkinParam().colorArrowSeparationSpace());;
:diagram.setColorNextArrow(rainbow);;
endif 
:final String label=arg.get("LABEL",0);;
if (label!=null &&label.length()>0) then (yes) 
:diagram.setLabelNextArrow(Display.getWithNewlines(label));;
endif 
:return CommandExecutionResult.ok();;
stop
end
@enduml

