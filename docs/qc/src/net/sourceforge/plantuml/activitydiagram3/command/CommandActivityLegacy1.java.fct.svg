@startuml
!pragma layout smetana
start
note right
constructor CommandActivityLegacy1()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandActivityLegacy1.class .getName(),
RegexLeaf.start(),new RegexLeaf("-"),new RegexLeaf("LABEL",
"(.*)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(ActivityDiagram3 diagram,
LineLocation location,RegexResult arg)
end note
:return diagram.addActivity(Display.getWithNewlines(arg.get("LABEL",
0)),BoxStyle.PLAIN,null ,Colors.empty(),null );;
stop
end
@enduml

