@startuml
!pragma layout smetana
start
note right
constructor CommandKill3()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandKill3.class .getName(),
RegexLeaf.start(),new RegexLeaf("kill|detach"),
new RegexLeaf(";?"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(ActivityDiagram3 diagram,
LineLocation location,RegexResult arg)
end note
:return diagram.kill();;
stop
end
@enduml

