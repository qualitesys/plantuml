@startuml
!pragma layout smetana
start
note right
constructor CommandNoteLong3()
end note
:super (getRegexConcat(),MultilinesStrategy.REMOVE_STARTING_QUOTE,
Trim.BOTH);;
end
start
note right
ColorParser color()
end note
:return ColorParser.simpleColor(ColorType.BACK);;
stop
end
start
note right
String getPatternEnd()
end note
:return "^end[%s]?note$";;
stop
end
start
note right
CommandExecutionResult executeNow(final ActivityDiagram3 diagram,
BlocLines lines)
end note
:final RegexResult line0=getStartingPattern()
.matcher(lines.getFirst().getTrimmed().getString());;
:lines=lines.subExtract(1,1);;
:lines=lines.removeEmptyColumns();;
:final NotePosition position=NotePosition.defaultLeft(line0.get("POSITION",
0));;
:final NoteType type=NoteType.defaultType(line0.get("TYPE",
0));;
:final Display note=lines.toDisplay();;
:final Colors colors=color().getColor(line0,
diagram.getSkinParam().getIHtmlColorSet());;
:return diagram.addNote(note,position,type,
colors);;
stop
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandNoteLong3.class .getName(),
RegexLeaf.start(),new RegexLeaf("TYPE","(note|floating note)"),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf("POSITION",
"(left|right)?"),RegexLeaf.spaceZeroOrMore(),
color().getRegex(),RegexLeaf.end());;
stop
end
@enduml

