@startuml
!pragma layout smetana
start
note right
constructor CommandCircleSpot3()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandCircleSpot3.class .getName(),
RegexLeaf.start(),ColorParser.exp4(),new RegexLeaf("SPOT",
"\\((\\S)\\)"),new RegexLeaf(";?"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(ActivityDiagram3diagram,
LineLocationlocation,RegexResultarg)
end note
:Strings=arg.get("COLOR",0);;
:final HColorcolor=s==null ? null :diagram.getSkinParam()
.getIHtmlColorSet().getColor(s);;
:diagram.addSpot(arg.get("SPOT",0),color);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

