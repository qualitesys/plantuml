@startuml
!pragma layout smetana
start
note right
constructor CommandEndSwitch()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandEndSwitch.class .getName(),
RegexLeaf.start(),new RegexLeaf("endswitch"),
RegexLeaf.spaceZeroOrMore(),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(ActivityDiagram3diagram,
LineLocationlocation,RegexResultarg)
end note
:return diagram.endSwitch();;
stop
end
@enduml

