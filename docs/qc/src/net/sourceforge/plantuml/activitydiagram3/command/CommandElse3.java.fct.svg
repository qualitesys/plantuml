@startuml
!pragma layout smetana
start
note right
constructor CommandElse3()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandElse3.class .getName(),
RegexLeaf.start(),new RegexLeaf("else"),RegexLeaf.spaceZeroOrMore(),
new RegexOptional(new RegexConcat(new RegexLeaf("\\("),
new RegexOptional(new RegexOr(new RegexLeaf("->"),
new RegexLeaf("WHEN_COLOR",CommandLinkElement.STYLE_COLORS_MULTIPLES))),
new RegexLeaf("WHEN","(.*?)"),new RegexLeaf("\\)"))),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf(";?"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(ActivityDiagram3 diagram,
LineLocation location,RegexResult arg)
end note
:final LinkRendering when=CommandBackward3.getBackRendering(diagram,
arg,"WHEN");;
:return diagram.else2(when);;
stop
end
@enduml

