><polygon fill="#181818" points="242.5,935.0703,246.5,945.0703,250.5,935.0703,246.5,939.0703" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[0b335755bcf9e31a7c0501f5232ac3cf]
@startuml
!pragma layout smetana
start
note right
constructor CommandNote3()
end note
:super (getRegexConcat());;
end
start
note right
ColorParser color()
end note
:return ColorParser.simpleColor(ColorType.BACK);;
stop
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandNote3.class .getName(),
RegexLeaf.start(),new RegexLeaf("TYPE","(note|floating note)"),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf("POSITION",
"(left|right)?"),RegexLeaf.spaceZeroOrMore(),
color().getRegex(),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf(":"),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("NOTE","(.*)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(ActivityDiagram3 diagram,
LineLocation location,RegexResult arg)
end note
:final Colors colors=color().getColor(arg,
diagram.getSkinParam().getIHtmlColorSet());;
:final Display note=Display.getWithNewlines(arg.get("NOTE",
0));;
:final NotePosition position=NotePosition.defaultLeft(arg.get("POSITION",
0));;
:final NoteType type=NoteType.defaultType(arg.get("TYPE",
0));;
:return diagram.addNote(note,position,type,
colors);;
stop
end
@enduml

