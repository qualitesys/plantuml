@startuml
!pragma layout smetana
start
note right
constructor CommandNote3()
end note
:super (getRegexConcat());;
end
start
note right
ColorParsercolor()
end note
:return ColorParser.simpleColor(ColorType.BACK);;
stop
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandNote3.class .getName(),
RegexLeaf.start(),new RegexLeaf("TYPE","(note|floating note)"),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf("POSITION",
"(left|right)?"),RegexLeaf.spaceZeroOrMore(),
color().getRegex(),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf(":"),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("NOTE","(.*)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(ActivityDiagram3diagram,
LineLocationlocation,RegexResultarg)
end note
:final Colorscolors=color().getColor(arg,
diagram.getSkinParam().getIHtmlColorSet());;
:final Displaynote=Display.getWithNewlines(arg.get("NOTE",
0));;
:final NotePositionposition=NotePosition.defaultLeft(arg.get("POSITION",
0));;
:final NoteTypetype=NoteType.defaultType(arg.get("TYPE",
0));;
:return diagram.addNote(note,position,type,
colors);;
stop
end
@enduml

