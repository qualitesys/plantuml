@startuml
!pragma layout smetana
start
note right
constructor CommandSplitAgain3()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandSplitAgain3.class .getName(),
RegexLeaf.start(),new RegexLeaf("split"),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf("again"),
new RegexLeaf(";?"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(ActivityDiagram3diagram,
LineLocationlocation,RegexResultarg)
end note
:return diagram.splitAgain();;
stop
end
@enduml

