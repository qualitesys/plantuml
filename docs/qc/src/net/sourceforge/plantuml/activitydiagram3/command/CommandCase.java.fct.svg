@startuml
!pragma layout smetana
start
note right
constructor CommandCase()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandCase.class .getName(),
RegexLeaf.start(),new RegexLeaf("case"),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("\\("),new RegexLeaf("TEST",
"(.*?)"),new RegexLeaf("\\)"),RegexLeaf.spaceZeroOrMore(),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(ActivityDiagram3 diagram,
LineLocation location,RegexResult arg)
end note
:String test=arg.get("TEST",0);;
if (test.length()==0) then (yes) 
:test=null ;;
endif 
:return diagram.switchCase(Display.getWithNewlines(test));;
stop
end
@enduml

