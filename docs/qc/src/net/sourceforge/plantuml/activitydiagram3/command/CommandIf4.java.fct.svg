@startuml
!pragma layout smetana
start
note right
constructor CommandIf4()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandIf4.class .getName(),
RegexLeaf.start(),ColorParser.exp4(),new RegexLeaf("if"),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf("\\("),
new RegexLeaf("TEST","(.*?)"),new RegexLeaf("\\)"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("(is|equals?)"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("\\("),new RegexLeaf("WHEN","(.+
?)"),new RegexLeaf("\\)"),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("then"),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf(";?"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(ActivityDiagram3 diagram,
LineLocation location,RegexResult arg)
end note
:final String s=arg.get("COLOR",0);;
:final HColor color=s==null ? null :diagram.getSkinParam()
.getIHtmlColorSet().getColor(s);;
:String test=arg.get("TEST",0);;
if (test.length()==0) then (yes) 
:test=null ;;
endif 
:diagram.startIf(Display.getWithNewlines(test),
Display.getWithNewlines(arg.get("WHEN",0)),
color,null );;
:return CommandExecutionResult.ok();;
stop
end
@enduml

