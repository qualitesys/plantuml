@startuml
!pragma layout smetana
start
note right
constructor CommandWhileEnd3()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandWhileEnd3.class .getName(),
RegexLeaf.start(),new RegexOr(new RegexConcat(new RegexLeaf("end"),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf("while")),
new RegexConcat(new RegexLeaf("while"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("end"))),RegexLeaf.spaceZeroOrMore(),new RegexOptional(new RegexLeaf("OUT","\\((.+
?)\\)")),new RegexLeaf(";?"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(ActivityDiagram3 diagram,
LineLocation location,RegexResult arg)
end note
:return diagram.endwhile(Display.getWithNewlines(arg.get("OUT",
0)));;
stop
end
@enduml

