@startuml
!pragma layout smetana
start
note right
constructor CommandEndPartition3()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandEndPartition3.class .getName(),
RegexLeaf.start(),new RegexLeaf("\\}"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(ActivityDiagram3 diagram,
LineLocation location,RegexResult arg)
end note
:return diagram.endGroup();;
stop
end
@enduml

