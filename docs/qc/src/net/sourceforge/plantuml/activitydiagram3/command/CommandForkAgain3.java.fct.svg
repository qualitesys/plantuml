@startuml
!pragma layout smetana
start
note right
constructor CommandForkAgain3()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandForkAgain3.class .getName(),
RegexLeaf.start(),new RegexLeaf("fork"),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("again"),new RegexLeaf(";?"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(ActivityDiagram3 diagram,
LineLocation location,RegexResult arg)
end note
:return diagram.forkAgain();;
stop
end
@enduml

