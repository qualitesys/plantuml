18;stroke-width:1.0;"/><!--MD5=[0e667002c891fb371813833ea8015fc6]
@startuml
!pragma layout smetana
start
note right
constructor InstructionEnd(Swimlaneswimlane,
LinkRenderinginlinkRendering)
end note
:super (swimlane);;
:this.inlinkRendering=Objects.requireNonNull(inlinkRendering);;
end
start
note right
GtilecreateGtile(ISkinParamskinParam,StringBounderstringBounder)
end note
:return new GtileCircleStart(stringBounder,
skinParam,HColors.BLACK,getSwimlaneIn());;
stop
end
start
note right
FtilecreateFtile(FtileFactoryfactory)
end note
:Ftileresult=factory.end(getSwimlaneIn());;
:result=eventuallyAddNote(factory,result,
result.getSwimlaneIn(),VerticalAlignment.CENTER);;
:return result;;
stop
end
start
note right
CommandExecutionResultadd(Instructionother)
end note
:throw new UnsupportedOperationException();;
stop
end
start
note right
booleankill()
end note
:return false;;
stop
end
start
note right
LinkRenderinggetInLinkRendering()
end note
:return inlinkRendering;;
stop
end
start
note right
booleancontainsBreak()
end note
:return false;;
stop
end
@enduml

