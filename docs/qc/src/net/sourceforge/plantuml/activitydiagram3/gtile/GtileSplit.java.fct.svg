@startuml
!pragma layout smetana
start
note right
constructor GtileSplit(List<Gtile> gtiles,
Swimlane singleSwimlane,HColor lineColor)
end note
:super (gtiles,singleSwimlane,20);;
:this.lineColor=lineColor;;
end
start
note right
StyleSignatureBasic getDefaultStyleDefinitionActivity()
end note
:return StyleSignatureBasic.of(SName.root,
SName.element,SName.activityDiagram,SName.activity);;
stop
end
start
note right
StyleSignatureBasic getDefaultStyleDefinitionDiamond()
end note
:return StyleSignatureBasic.of(SName.root,
SName.element,SName.activityDiagram,SName.activity,
SName.diamond);;
stop
end
start
note right
StyleSignatureBasic getDefaultStyleDefinitionArrow()
end note
:return StyleSignatureBasic.of(SName.root,
SName.element,SName.activityDiagram,SName.arrow);;
stop
end
start
note right
void drawUInternal(UGraphic ug)
end note
:super .drawUInternal(ug);;
:final double x0=gtiles.get(0).getCoord(GPoint.NORTH_HOOK)
.compose(getPosition(0)).getDx();;
:final int last=gtiles.size()-1;;
:final double xLast=gtiles.get(last).getCoord(GPoint.NORTH_HOOK)
.compose(getPosition(last)).getDx();;
:final ULine hline=ULine.hline(xLast-x0);;
:ug=ug.apply(lineColor).apply(new UStroke(1.5));;
:ug.apply(UTranslate.dx(x0)).draw(hline);;
:final double y=getCoord(GPoint.SOUTH_BORDER)
.getDy();;
:ug.apply(new UTranslate(x0,y)).draw(hline);;
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:return XDimension2D.delta(super .calculateDimension(stringBounder),
0,0);;
stop
end
@enduml

