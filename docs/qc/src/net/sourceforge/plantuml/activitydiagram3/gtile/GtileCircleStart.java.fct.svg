@startuml
!pragma layout smetana
start
note right
StyleSignatureBasic getDefaultStyleDefinitionCircle()
end note
:return StyleSignatureBasic.of(SName.root,
SName.element,SName.activityDiagram,SName.circle);;
stop
end
start
note right
constructor GtileCircleStart(StringBounder stringBounder,
ISkinParam skinParam,HColor backColor,Swimlane swimlane)
end note
:super (stringBounder,skinParam,swimlane);;
:this.backColor=backColor;;
:final Style style=getDefaultStyleDefinitionCircle()
.getMergedStyle(skinParam().getCurrentStyleBuilder());;
:this.shadowing=style.value(PName.Shadowing)
.asDouble();;
end
start
note right
void drawUInternal(UGraphic ug)
end note
:final UEllipse circle=new UEllipse(SIZE,
SIZE);;
:circle.setDeltaShadow(shadowing);;
:ug.apply(HColors.none()).apply(backColor.bg())
.draw(circle);;
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:return new XDimension2D(SIZE,SIZE);;
stop
end
@enduml

