@startuml
!pragma layout smetana
start
note right
StyleSignatureBasicgetDefaultStyleDefinitionCircle()
end note
:return StyleSignatureBasic.of(SName.root,
SName.element,SName.activityDiagram,SName.circle);;
stop
end
start
note right
constructor GtileCircleStart(StringBounderstringBounder,
ISkinParamskinParam,HColorbackColor,Swimlaneswimlane)
end note
:super (stringBounder,skinParam,swimlane);;
:this.backColor=backColor;;
:final Stylestyle=getDefaultStyleDefinitionCircle()
.getMergedStyle(skinParam().getCurrentStyleBuilder());;
:this.shadowing=style.value(PName.Shadowing)
.asDouble();;
end
start
note right
void drawUInternal(UGraphicug)
end note
:final UEllipsecircle=new UEllipse(SIZE,SIZE);;
:circle.setDeltaShadow(shadowing);;
:ug.apply(HColors.none()).apply(backColor.bg())
.draw(circle);;
end
start
note right
XDimension2DcalculateDimension(StringBounderstringBounder)
end note
:return new XDimension2D(SIZE,SIZE);;
stop
end
@enduml

