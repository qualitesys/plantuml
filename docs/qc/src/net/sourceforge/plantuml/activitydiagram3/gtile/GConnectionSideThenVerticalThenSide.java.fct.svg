@startuml
!pragma layout smetana
start
note right
constructor GConnectionSideThenVerticalThenSide(UTranslatepos1,
GPointgpoint1,UTranslatepos2,GPointgpoint2,
doublexpos,TextBlocktextBlock)
end note
:super (gpoint1,gpoint2);;
:this.textBlock=textBlock;;
:this.pos1=pos1;;
:this.pos2=pos2;;
:this.xpos=xpos;;
end
start
note right
void drawTranslate(UGraphicug,UTranslatetranslate1,
UTranslatetranslate2)
end note
:throw new UnsupportedOperationException("wip3");;
stop
end
start
note right
void drawU(UGraphicug)
end note
:final XPoint2Dp1=pos1.getTranslated(gpoint1.getPoint2D());;
:final XPoint2Dp2=pos2.getTranslated(gpoint2.getPoint2D());;
:final Directiondirection=p1.getY()<p2.getY()? Direction.DOWN:Direction.UP;;
:final UPolygontmp=p1.getX()<p2.getX()? Arrows.asToRight():Arrows.asToLeft();;
:final Snakesnake=Snake.create(skinParam(),
getInLinkRenderingColor(),tmp).emphasizeDirection(direction).withLabel(textBlock,
HorizontalAlignment.LEFT);;
:final doublemaxX=xpos;;
:snake.addPoint(p1);;
:snake.addPoint(new XPoint2D(maxX,p1.getY()));;
:snake.addPoint(new XPoint2D(maxX,p2.getY()));;
:snake.addPoint(p2);;
:ug.draw(snake);;
end
@enduml

