@startuml
!pragma layout smetana
start
note right
constructor GtileGoto(StringBounder stringBounder,
ISkinParam skinParam,Swimlane swimlane,String name)
end note
:super (stringBounder,skinParam,swimlane);;
:this.name=name;;
end
start
note right
String getName()
end note
:return name;;
stop
end
@enduml

