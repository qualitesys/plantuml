@startuml
!pragma layout smetana
start
note right
constructor GtileWithOutgoingArrow(AbstractGtileRoot orig,
double south)
end note
:super (orig,0,south,0);;
if (orig instanceof GtileEmpty ) then (yes) 
:System.err.println("Warning 1");;
endif 
end
start
note right
Collection<GConnection> getInnerConnections()
end note
:final GConnection arrow=new GConnectionVerticalDown(UTranslate.dy(0),
orig.getGPoint(GPoint.SOUTH_HOOK),UTranslate.dy(south),
orig.getGPoint(GPoint.SOUTH_HOOK),TextBlockUtils.EMPTY_TEXT_BLOCK);;
:return Collections.singletonList(arrow);;
stop
end
@enduml

