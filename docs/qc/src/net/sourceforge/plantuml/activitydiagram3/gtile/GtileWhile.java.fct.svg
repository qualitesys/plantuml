@startuml
!pragma layout smetana
start
note right
constructor GtileWhile(Gtiletile1,Gtiletile2,
Gtiletile3)
end note
:super (tile1,tile2,tile3);;
end
start
note right
StyleSignatureBasicgetDefaultStyleDefinitionDiamond()
end note
:return StyleSignatureBasic.of(SName.root,
SName.element,SName.activityDiagram,SName.activity,
SName.diamond);;
stop
end
start
note right
GtilegetShape1(Gtiletoto,Swimlaneswimlane,
Displaytest,Displayyes)
end note
:GtileHexagonInsidetmp0=Gtiles.hexagonInside(swimlane,
toto.getStringBounder(),toto.skinParam(),
getDefaultStyleDefinitionDiamond(),HColors.BLUE,
test);;
:return Gtiles.withSouthMargin(tmp0,20);;
stop
end
start
note right
GtilecreateWhile(Swimlaneswimlane,Gtiletmp,
Displaytest,Displayyes,InstructionspecialOut,
Gtileback)
end note
:final Gtileshape1=getShape1(tmp,swimlane,
test,yes);;
:final Gtiletile3=new GtileEmpty(tmp.getStringBounder(),
tmp.skinParam(),10,20,swimlane);;
:return new GtileWhile(shape1,tmp,tile3);;
stop
end
start
note right
Collection<GConnection>getInnerConnections()
end note
:final GConnectionarrow1=new GConnectionVerticalDown(getPos1(),
tile1.getGPoint(GPoint.SOUTH_HOOK),getPos2(),
tile2.getGPoint(GPoint.NORTH_HOOK),TextBlockUtils.EMPTY_TEXT_BLOCK);;
:final doublexright=calculateDimension(stringBounder)
.getWidth();;
:final GConnectionarrow2=new GConnectionVerticalDownThenBack(getPos2(),
tile2.getGPoint(GPoint.SOUTH_HOOK),getPos1(),
tile1.getGPoint(GPoint.EAST_HOOK),TextBlockUtils.EMPTY_TEXT_BLOCK,
xright);;
:final doublexleft=0;;
:final GConnectionarrow3=new GConnectionSideThenVerticalThenSide(getPos1(),
tile1.getGPoint(GPoint.WEST_HOOK),getPos3(),
tile3.getGPoint(GPoint.SOUTH_HOOK),xleft,
TextBlockUtils.EMPTY_TEXT_BLOCK);;
:return Arrays.asList(arrow1,arrow2,arrow3);;
stop
end
@enduml

