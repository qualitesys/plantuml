@startuml
!pragma layout smetana
start
note right
constructor GtileWhile(Gtile tile1,Gtile tile2,
Gtile tile3)
end note
:super (tile1,tile2,tile3);;
end
start
note right
StyleSignatureBasic getDefaultStyleDefinitionDiamond()
end note
:return StyleSignatureBasic.of(SName.root,
SName.element,SName.activityDiagram,SName.activity,
SName.diamond);;
stop
end
start
note right
Gtile getShape1(Gtile toto,Swimlane swimlane,
Display test,Display yes)
end note
:GtileHexagonInside tmp0=Gtiles.hexagonInside(swimlane,
toto.getStringBounder(),toto.skinParam(),
getDefaultStyleDefinitionDiamond(),HColors.BLUE,
test);;
:return Gtiles.withSouthMargin(tmp0,20);;
stop
end
start
note right
Gtile createWhile(Swimlane swimlane,Gtile tmp,
Display test,Display yes,Instruction specialOut,
Gtile back)
end note
:final Gtile shape1=getShape1(tmp,swimlane,
test,yes);;
:final Gtile tile3=new GtileEmpty(tmp.getStringBounder(),
tmp.skinParam(),10,20,swimlane);;
:return new GtileWhile(shape1,tmp,tile3);;
stop
end
start
note right
Collection<GConnection> getInnerConnections()
end note
:final GConnection arrow1=new GConnectionVerticalDown(getPos1(),
tile1.getGPoint(GPoint.SOUTH_HOOK),getPos2(),
tile2.getGPoint(GPoint.NORTH_HOOK),TextBlockUtils.EMPTY_TEXT_BLOCK);;
:final double xright=calculateDimension(stringBounder)
.getWidth();;
:final GConnection arrow2=new GConnectionVerticalDownThenBack(getPos2(),
tile2.getGPoint(GPoint.SOUTH_HOOK),getPos1(),
tile1.getGPoint(GPoint.EAST_HOOK),TextBlockUtils.EMPTY_TEXT_BLOCK,
xright);;
:final double xleft=0;;
:final GConnection arrow3=new GConnectionSideThenVerticalThenSide(getPos1(),
tile1.getGPoint(GPoint.WEST_HOOK),getPos3(),
tile3.getGPoint(GPoint.SOUTH_HOOK),xleft,
TextBlockUtils.EMPTY_TEXT_BLOCK);;
:return Arrays.asList(arrow1,arrow2,arrow3);;
stop
end
@enduml

