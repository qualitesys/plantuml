@startuml
!pragma layout smetana
start
note right
constructor GtileEmpty(StringBounder stringBounder,
ISkinParam skinParam,double width,double height)
end note
:this(stringBounder,skinParam,width,height,
null );;
end
start
note right
constructor GtileEmpty(StringBounder stringBounder,
ISkinParam skinParam)
end note
:this(stringBounder,skinParam,0,0,null );;
end
start
note right
constructor GtileEmpty(StringBounder stringBounder,
ISkinParam skinParam,Swimlane swimlane)
end note
:this(stringBounder,skinParam,0,0,swimlane);;
end
start
note right
constructor GtileEmpty(StringBounder stringBounder,
ISkinParam skinParam,double width,double height,
Swimlane swimlane)
end note
:super (stringBounder,skinParam,swimlane);;
:this.width=width;;
:this.height=height;;
end
start
note right
String toString()
end note
:return "GtileEmpty";;
stop
end
start
note right
void drawUInternal(UGraphic ug)
end note
if (width>0&&height>0) then (yes) 
:ug.draw(new UEmpty(width,height));;
endif 
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:return new XDimension2D(width,height);;
stop
end
@enduml

