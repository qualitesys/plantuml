@startuml
!pragma layout smetana
start
note right
StyleSignatureBasicgetDefaultStyleDefinitionCircle()
end note
:return StyleSignatureBasic.of(SName.root,
SName.element,SName.activityDiagram,SName.circle);;
stop
end
start
note right
constructor GtileCircleSpot(StringBounderstringBounder,
ISkinParamskinParam,HColorbackColor,Swimlaneswimlane,
Stringspot,UFontfont)
end note
:super (stringBounder,skinParam,swimlane);;
:this.spot=spot;;
:this.backColor=backColor;;
:this.fc=FontConfiguration.create(skinParam,
FontParam.ACTIVITY,null );;
:final Stylestyle=getDefaultStyleDefinitionCircle()
.getMergedStyle(skinParam().getCurrentStyleBuilder());;
:this.shadowing=style.value(PName.Shadowing)
.asDouble();;
end
start
note right
void drawUInternal(UGraphicug)
end note
:final HColorborderColor=SkinParamUtils.getColor(skinParam(),
null ,ColorParam.activityBorder);;
:final HColorbackColor=this.backColor==null ? SkinParamUtils.getColor(skinParam(),
null ,ColorParam.activityBackground):this.backColor;;
:final UEllipsecircle=new UEllipse(SIZE,SIZE);;
:circle.setDeltaShadow(shadowing);;
:ug.apply(borderColor).apply(backColor.bg())
.apply(getThickness()).draw(circle);;
:ug.apply(fc.getColor()).apply(new UTranslate(SIZE/2,
SIZE/2)).draw(new UCenteredCharacter(spot.charAt(0),
fc.getFont()));;
end
start
note right
XDimension2DcalculateDimension(StringBounderstringBounder)
end note
:return new XDimension2D(SIZE,SIZE);;
stop
end
@enduml

