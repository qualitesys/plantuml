@startuml
!pragma layout smetana
start
note right
StyleSignatureBasic getDefaultStyleDefinitionCircle()
end note
:return StyleSignatureBasic.of(SName.root,
SName.element,SName.activityDiagram,SName.circle);;
stop
end
start
note right
constructor GtileCircleSpot(StringBounder stringBounder,
ISkinParam skinParam,HColor backColor,Swimlane swimlane,
String spot,UFont font)
end note
:super (stringBounder,skinParam,swimlane);;
:this.spot=spot;;
:this.backColor=backColor;;
:this.fc=FontConfiguration.create(skinParam,
FontParam.ACTIVITY,null );;
:final Style style=getDefaultStyleDefinitionCircle()
.getMergedStyle(skinParam().getCurrentStyleBuilder());;
:this.shadowing=style.value(PName.Shadowing)
.asDouble();;
end
start
note right
void drawUInternal(UGraphic ug)
end note
:final HColor borderColor=SkinParamUtils.getColor(skinParam(),
null ,ColorParam.activityBorder);;
:final HColor backColor=this.backColor==null ? SkinParamUtils.getColor(skinParam(),
null ,ColorParam.activityBackground):this.backColor;;
:final UEllipse circle=new UEllipse(SIZE,
SIZE);;
:circle.setDeltaShadow(shadowing);;
:ug.apply(borderColor).apply(backColor.bg())
.apply(getThickness()).draw(circle);;
:ug.apply(fc.getColor()).apply(new UTranslate(SIZE/2,
SIZE/2)).draw(new UCenteredCharacter(spot.charAt(0),
fc.getFont()));;
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:return new XDimension2D(SIZE,SIZE);;
stop
end
@enduml

