230.5" y1="1366.0469" y2="1386.0469"/><polygon fill="#181818" points="226.5,1376.0469,230.5,1386.0469,234.5,1376.0469,230.5,1380.0469" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="230.5" x2="230.5" y1="1420.0156" y2="1440.0156"/><polygon fill="#181818" points="226.5,1430.0156,230.5,1440.0156,234.5,1430.0156,230.5,1434.0156" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[df778c3ab684bb9cb04195e2cbedb31a]
@startuml
!pragma layout smetana
start
note right
constructor GConnectionVerticalDown(UTranslate pos1,
GPoint gpoint1,UTranslate pos2,GPoint gpoint2,
TextBlock textBlock)
end note
:super (gpoint1,gpoint2);;
:this.textBlock=textBlock;;
:this.pos1=pos1;;
:this.pos2=pos2;;
end
start
note right
void drawTranslate(UGraphic ug,UTranslate translate1,
UTranslate translate2)
end note
:final Snake snake=Snake.create(skinParam(),
getInLinkRenderingColor(),Arrows.asToDown()).withLabel(textBlock,
HorizontalAlignment.LEFT);;
:final XPoint2D p1=pos1.getTranslated(gpoint1.getPoint2D());;
:final XPoint2D p2=pos2.getTranslated(gpoint2.getPoint2D());;
:final XPoint2D mp1a=translate1.getTranslated(p1);;
:final XPoint2D mp2b=translate2.getTranslated(p2);;
:final double middle=(mp1a.getY()+mp2b.getY())/2.0;;
:snake.addPoint(mp1a);;
:snake.addPoint(mp1a.getX(),middle);;
:snake.addPoint(mp2b.getX(),middle);;
:snake.addPoint(mp2b);;
:ug.draw(snake);;
end
start
note right
void drawU(UGraphic ug)
end note
:final Snake snake=Snake.create(skinParam(),
getInLinkRenderingColor(),Arrows.asToDown()).withLabel(textBlock,
HorizontalAlignment.LEFT);;
:final XPoint2D p1=pos1.getTranslated(gpoint1.getPoint2D());;
:final XPoint2D p2=pos2.getTranslated(gpoint2.getPoint2D());;
:snake.addPoint(p1);;
:snake.addPoint(p2);;
:ug.draw(snake);;
end
@enduml

