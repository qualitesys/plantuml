@startuml
!pragma layout smetana
start
note right
constructor GtileWithMargin(AbstractGtileRoot orig,
double north,double south,double east)
end note
:super (orig.stringBounder,orig.skinParam());;
:this.orig=orig;;
:this.north=north;;
:this.south=south;;
:this.east=east;;
end
start
note right
Set<Swimlane> getSwimlanes()
end note
:return orig.getSwimlanes();;
stop
end
start
note right
Swimlane getSwimlane(String point)
end note
:return orig.getSwimlane(point);;
stop
end
start
note right
