@startuml
!pragma layout smetana
start
note right
constructor SkinParamForceColor(ISkinParamskinParam,
ColorParamcolorParam,HColorcolor)
end note
:super (skinParam);;
:this.color=color;;
:this.colorParam=colorParam;;
end
start
note right
HColorgetHtmlColor(ColorParamparam,Stereotypestereotype,
booleanclickable)
end note
if (colorParam==param) then (yes) 
:return color;;
stop
endif 
:return super .getHtmlColor(param,stereotype,
clickable);;
stop
end
@enduml

