@startuml
!pragma layout smetana
start
note right
constructor CommandConcurrentState()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandConcurrentState.class .getName(),RegexLeaf.start(),new RegexLeaf("TYPE","(- -+
|\\|\\|+)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(StateDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
if (diagram.concurrentState(arg.get("TYPE",0).charAt(0))) then (yes) 
:return CommandExecutionResult.ok();;
stop
endif 
:return CommandExecutionResult.error("Error 42");;
stop
end
@enduml

