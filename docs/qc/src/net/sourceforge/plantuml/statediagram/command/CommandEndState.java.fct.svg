@startuml
!pragma layout smetana
start
note right
constructor CommandEndState()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandEndState.class .getName(),
RegexLeaf.start(),new RegexLeaf("(end[%s]?state|\\})"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(StateDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:final IEntitycurrentPackage=diagram.getCurrentGroup();;
if (currentPackage==null ) then (yes) 
:return CommandExecutionResult.error("No inner state defined");;
stop
endif 
:diagram.endGroup();;
:return CommandExecutionResult.ok();;
stop
end
@enduml

