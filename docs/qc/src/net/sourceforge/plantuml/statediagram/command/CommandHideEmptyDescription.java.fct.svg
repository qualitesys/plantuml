@startuml
!pragma layout smetana
start
note right
constructor CommandHideEmptyDescription()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandHideEmptyDescription.class .getName(),
RegexLeaf.start(),new RegexLeaf("HIDE","(hide|show)"),
RegexLeaf.spaceOneOrMore(),new RegexLeaf("empty"),
RegexLeaf.spaceOneOrMore(),new RegexLeaf("description"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(UmlDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:final booleanhide=arg.get("HIDE",0).equalsIgnoreCase("hide");;
:diagram.setHideEmptyDescription(hide);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

