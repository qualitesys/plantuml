@startuml
!pragma layout smetana
start
note right
void addRowLayout(RowLayoutrawLayout)
end note
:this.all.add(rawLayout);;
end
start
note right
void drawU(UGraphicug)
end note
:doubley=0;;
:rawLayout.drawU(ug.apply(UTranslate.dy(y)));;
:y+=rawLayout.getHeight(ug.getStringBounder())+20;;
end
@enduml

