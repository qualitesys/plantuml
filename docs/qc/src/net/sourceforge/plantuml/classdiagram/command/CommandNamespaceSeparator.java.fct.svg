@startuml
!pragma layout smetana
start
note right
constructor CommandNamespaceSeparator()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandNamespaceSeparator.class .getName(),
RegexLeaf.start(),new RegexLeaf("set"),RegexLeaf.spaceOneOrMore(),
new RegexOr(new RegexLeaf("separator"),new RegexLeaf("namespaceseparator")),RegexLeaf.spaceOneOrMore(),new RegexLeaf("SEPARATOR","(\\S+
)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(CucaDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:final Strings=arg.get("SEPARATOR",0);;
if (String.valueOf("none").equalsIgnoreCase(s)) then (yes) 
:diagram.setNamespaceSeparator(null );;
else (no)
:diagram.setNamespaceSeparator(s);;
endif 
:return CommandExecutionResult.ok();;
stop
end
