@startuml
!pragma layout smetana
start
note right
constructor CommandHideShow2()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandHideShow2.class .getName(),RegexLeaf.start(),new RegexLeaf("COMMAND","(hide|hide-class|show|show-class)"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("WHAT","([^%s]+
|\\<\\<.*\\>\\>)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(CucaDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final char tmp=arg.get("COMMAND",0).charAt(0);;
:final boolean show=tmp=='s'||tmp=='S';;
:final String what=arg.get("WHAT",0).trim();;
:diagram.hideOrShow2(what,show);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

