@startuml
!pragma layout smetana
start
note right
StringgetGenericRegex(intlevel)
end note
if (level<0) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
if (level==0) then (yes) 
:return part1+part2;;
stop
endif 
:return part1+getGenericRegex(level-1)+part2;;
stop
end
@enduml

