start
note right
CommandExecutionResultexecuteArg(CucaDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:final booleanshow=arg.get("COMMAND",0).equalsIgnoreCase("restore");;
:final Stringwhat=arg.get("WHAT",0).trim();;
:diagram.removeOrRestore(what,show);;
:return CommandExecutionResult.ok();;
stop
