start
note right
constructor CommandRemoveRestore()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandRemoveRestore.class .getName(),RegexLeaf.start(),new RegexLeaf("COMMAND","(remove|restore)"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("WHAT","(.+
)"),RegexLeaf.end());;
stop
