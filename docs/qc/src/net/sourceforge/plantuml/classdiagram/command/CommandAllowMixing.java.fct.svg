@startuml
!pragma layout smetana
start
note right
constructor CommandAllowMixing()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandAllowMixing.class .getName(),
RegexLeaf.start(),new RegexLeaf("allow"),
new RegexLeaf("_?"),new RegexLeaf("mixing"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(ClassDiagram diagram,
LineLocation location,RegexResult arg)
end note
:diagram.setAllowMixing(true);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

