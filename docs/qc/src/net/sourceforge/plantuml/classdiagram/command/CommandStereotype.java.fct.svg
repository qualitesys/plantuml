@startuml
!pragma layout smetana
start
note right
constructor CommandStereotype()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandStereotype.class .getName(),RegexLeaf.start(),new RegexLeaf("NAME","([%pLN_.]+
|[%g][^%g]+[%g])"),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("STEREO","(\\<\\<.*\\>\\>)"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(ClassDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:final Stringname=arg.get("NAME",0);;
:final Identident=diagram.buildLeafIdent(name);;
:final Codecode=diagram.V1972()? ident:diagram.buildCode(name);;
:final Stringstereotype=arg.get("STEREO",0);;
:final IEntityentity=diagram.getOrCreateLeaf(ident,
code,null ,null );;
:entity.setStereotype(Stereotype.build(stereotype,
diagram.getSkinParam().getCircledCharacterRadius(),
diagram.getSkinParam().getFont(null ,false,
FontParam.CIRCLED_CHARACTER),diagram.getSkinParam().getIHtmlColorSet()));;
:return CommandExecutionResult.ok();;
stop
end
