@startuml
!pragma layout smetana
start
note right
constructor CommandLayoutNewLine()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandLayoutNewLine.class .getName(),
RegexLeaf.start(),new RegexLeaf("layout_new_line"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(ClassDiagram diagram,
LineLocation location,RegexResult arg)
end note
:diagram.layoutNewLine();;
:return CommandExecutionResult.ok();;
stop
end
@enduml

