@startuml
!pragma layout smetana
start
note right
constructor CommandDiamondAssociation()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandDiamondAssociation.class .getName(),RegexLeaf.start(),new RegexLeaf("\\<\\>"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("CODE","([%pLN_.]+
)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(ClassDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final String idShort=arg.get("CODE",0);;
:final Ident ident=diagram.buildLeafIdent(idShort);;
:final Code code=diagram.V1972()? ident:diagram.buildCode(idShort);;
:final boolean leafExist=diagram.V1972()? diagram.leafExistSmart(ident):diagram.leafExist(code);;
if (leafExist) then (yes) 
:return CommandExecutionResult.error("Already existing : "+
code.getName());;
stop
endif 
:diagram.createLeaf(ident,code,Display.NULL,
LeafType.ASSOCIATION,null );;
:return CommandExecutionResult.ok();;
stop
end
@enduml

