@startuml
!pragma layout smetana
start
note right
constructor AbstractEntityDiagram(UmlSource source,
UmlDiagramType type,Map<String,String> orig)
end note
:super (source,type,orig);;
end
start
note right
List<String> getDotStrings()
end note
:final List<String> def=Arrays.asList("nodesep=.35;",
"ranksep=0.8;","edge [fontsize=11,labelfontsize=11];",
"node [fontsize=11,height=.35,width=.55];");;
if (getPragma().isDefine("graphattributes")==false) then (yes) 
:return def;;
stop
endif 
:final String attribute=getPragma().getValue("graphattributes");;
:final List<String> result=new ArrayList<>(def);;
:result.add(attribute);;
:return Collections.unmodifiableList(result);;
stop
end
start
note right
DiagramDescription getDescription()
end note
:final StringBuilder result=new StringBuilder("("+
getLeafssize()+" entities");;
if (getSource()!=null ) then (yes) 
:final String id=getSource().getId();;
if (id!=null ) then (yes) 
:result.append(", ");;
:result.append(id);;
endif 
endif 
:result.append(")");;
:return new DiagramDescription(result.toString());;
stop
end
@enduml

