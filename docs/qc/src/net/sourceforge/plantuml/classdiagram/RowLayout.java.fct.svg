@startuml
!pragma layout smetana
start
note right
void addLeaf(TextBlockentityImageClass)
end note
:this.all.add(entityImageClass);;
end
start
note right
doublegetHeight(StringBounderstringBounder)
end note
:doubley=0;;
:y=Math.max(y,leaf.calculateDimension(stringBounder)
.getHeight());;
:return y;;
stop
end
start
note right
void drawU(UGraphicug)
end note
:doublex=0;;
:leaf.drawU(ug.apply(UTranslate.dx(x)));;
:x+=leaf.calculateDimension(ug.getStringBounder())
.getWidth()+20;;
end
@enduml

