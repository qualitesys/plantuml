@startuml
!pragma layout smetana
start
note right
void write(RenderedImageimage,SFilefile,intdpi)
end note
:write(image,file,null ,dpi);;
end
start
note right
void write(RenderedImageimage,OutputStreamos,
intdpi)
end note
:write(image,os,null ,dpi);;
end
start
note right
void write(RenderedImageimage,SFilefile,Stringmetadata,
intdpi)
end note
switch (try/catch block)
case (try)
:write(image,os,metadata,dpi);;
endswitch
:Log.debug("File is "+file);;
:Log.debug("File size "+file.length());;
if (file.length()==0) then (yes) 
:Log.error("File size is zero: "+file);;
:SImageIO.write(image,"png",file);;
endif 
end
start
note right
void write(RenderedImageimage,OutputStreamos,
Stringmetadata,intdpi)
end note
:write(image,os,metadata,dpi,null );;
end
start
note right
void write(RenderedImageimage,OutputStreamos,
Stringmetadata,intdpi,StringdebugData)
end note
if (metadata==null ) then (yes) 
:SImageIO.write(image,"png",os);;
else (no)
:PngIOMetadata.writeWithMetadata(image,os,
metadata,dpi,debugData);;
endif 
end
@enduml

