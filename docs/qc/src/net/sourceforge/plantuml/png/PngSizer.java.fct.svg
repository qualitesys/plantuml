@startuml
!pragma layout smetana
start
note right
BufferedImageprocess(BufferedImageim,intminsize)
end note
if (minsize!=Integer.MAX_VALUE) then (yes) 
:return resize(im,minsize);;
stop
endif 
:return im;;
stop
end
start
note right
BufferedImageresize(BufferedImageim,intminsize)
end note
:Log.info("Resizing file to "+minsize);;
if (im.getWidth()>=minsize) then (yes) 
:return im;;
stop
endif 
:final BufferedImagenewIm=new BufferedImage(minsize,
im.getHeight(),BufferedImage.TYPE_INT_RGB);;
:final Graphics2Dg2d=newIm.createGraphics();;
:g2d.setColor(Color.WHITE);;
:g2d.fillRect(0,0,newIm.getWidth(),newIm.getHeight());;
:final intdelta=(minsize-im.getWidth())/2;;
:g2d.drawImage(im,delta,0,null );;
:g2d.dispose();;
:return newIm;;
stop
end
@enduml

