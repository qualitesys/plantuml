@startuml
!pragma layout smetana
start
note right
constructor PngTitler(DisplaySectiontext,
Stylestyle,HColorSetset,ISkinSimplespriteContainer)
end note
:this.style=style;;
:this.set=set;;
:this.spriteContainer=spriteContainer;;
:this.text=text;;
end
start
note right
XDimension2DgetTextDimension(StringBounderstringBounder)
end note
:final TextBlocktextBloc=getRibbonBlock();;
if (textBloc==null ) then (yes) 
:return null ;;
stop
endif 
:return textBloc.calculateDimension(stringBounder);;
stop
end
start
note right
TextBlockgetRibbonBlock()
end note
:final Displaydisplay=text.getDisplay();;
if (display==null ) then (yes) 
:return null ;;
stop
endif 
:return style.createTextBlockBordered(display,
set,spriteContainer,Style.ID_TITLE);;
stop
end
@enduml

