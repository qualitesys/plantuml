@startuml
!pragma layout smetana
start
note right
BufferedImageprocess(BufferedImageim)
end note
:Log.info("Rotation");;
:final BufferedImagenewIm=new BufferedImage(im.getHeight(),
im.getWidth(),BufferedImage.TYPE_INT_RGB);;
:final Graphics2Dg2d=newIm.createGraphics();;
:final AffineTransformat=new AffineTransform(0,
1,1,0,0,0);;
:at.concatenate(new AffineTransform(-1,0,
0,1,im.getWidth(),0));;
:g2d.setTransform(at);;
:g2d.drawImage(im,0,0,null );;
:g2d.dispose();;
:return newIm;;
stop
end
@enduml

