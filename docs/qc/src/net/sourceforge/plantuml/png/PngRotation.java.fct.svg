@startuml
!pragma layout smetana
start
note right
BufferedImage process(BufferedImage im)
end note
:Log.info("Rotation");;
:final BufferedImage newIm=new BufferedImage(im.getHeight(),
im.getWidth(),BufferedImage.TYPE_INT_RGB);;
:final Graphics2D g2d=newIm.createGraphics();;
:final AffineTransform at=new AffineTransform(0,
1,1,0,0,0);;
:at.concatenate(new AffineTransform(-1,0,
0,1,im.getWidth(),0));;
:g2d.setTransform(at);;
:g2d.drawImage(im,0,0,null );;
:g2d.dispose();;
:return newIm;;
stop
end
@enduml

