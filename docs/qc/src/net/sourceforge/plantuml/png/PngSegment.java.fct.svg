@startuml
!pragma layout smetana
start
note right
constructor PngSegment(int totalSize,int nbPiece)
end note
:this.nbPiece=nbPiece;;
:this.totalSize=totalSize;;
end
start
note right
int getStart(int idx)
end note
if (idx<0||idx>nbPiece-1) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:return (int )(1.0*totalSize/nbPiece*idx);;
stop
end
start
note right
int getLen(int idx)
end note
if (idx<0||idx>nbPiece-1) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:return (int )(1.0*totalSize/nbPiece);;
stop
end
@enduml

