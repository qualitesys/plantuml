@startuml
!pragma layout smetana
start
note right
constructor PngSegment(inttotalSize,intnbPiece)
end note
:this.nbPiece=nbPiece;;
:this.totalSize=totalSize;;
end
start
note right
intgetStart(intidx)
end note
if (idx<0||idx>nbPiece-1) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:return (int)(1.0*totalSize/nbPiece*idx);;
stop
end
start
note right
intgetLen(intidx)
end note
if (idx<0||idx>nbPiece-1) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:return (int)(1.0*totalSize/nbPiece);;
stop
end
@enduml

