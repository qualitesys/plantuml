@startuml
!pragma layout smetana
start
note right
constructor ErrorStatus()
end note
:this.noData=true;;
end
start
note right
ErrorStatusinit()
end note
:return new ErrorStatus();;
stop
end
start
note right
void goWithError()
end note
:this.hasErrors=true;;
:this.noData=false;;
end
start
note right
void goOk()
end note
:this.hasOk=true;;
:this.noData=false;;
end
start
note right
booleanhasError()
end note
:return hasErrors;;
stop
end
start
note right
booleanisNoData()
end note
:return noData;;
stop
end
start
note right
intgetExitCode()
end note
if (isNoData()) then (yes) 
:return 100;;
stop
endif 
if (hasErrors) then (yes) 
:return 200;;
stop
endif 
:return 0;;
stop
end
@enduml

