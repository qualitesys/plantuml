@startuml
!pragma layout smetana
start
note right
constructor Position(int row,int col)
end note
:this.row=row;;
:this.col=col;;
end
start
note right
int getRow()
end note
:return row;;
stop
end
start
note right
int getCol()
end note
:return col;;
stop
end
start
note right
int hashCode()
end note
:return row*49+col;;
stop
end
start
note right
boolean equals(Object obj)
end note
:final Position other=(Position )obj;;
:return row==other.row&&col==other.col;;
stop
end
@enduml

