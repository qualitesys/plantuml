#181818;stroke-width:1.0;" x1="184.5" x2="184.5" y1="537.8398" y2="560.4063"/><polygon fill="#181818" points="180.5,550.4063,184.5,560.4063,188.5,550.4063,184.5,554.4063" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="184.5" x2="184.5" y1="594.375" y2="614.375"/><polygon fill="#181818" points="180.5,604.375,184.5,614.375,188.5,604.375,184.5,608.375" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[4722775a9a2bde006cc7918957183cee]
@startuml
!pragma layout smetana
start
note right
constructor Terminated(O element,Terminator terminator)
end note
:this.element=element;;
:this.terminator=Objects.requireNonNull(terminator);;
end
start
note right
O getElement()
end note
:return element;;
stop
end
start
note right
Terminator getTerminator()
end note
:return terminator;;
stop
end
start
note right
String toString()
end note
:return element.toString()+" "+terminator;;
stop
end
@enduml

