@startuml
!pragma layout smetana
start
note right
constructor CommandSalt()
end note
:super (false,getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandSalt.class .getName(),
RegexLeaf.start(),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("salt"),RegexLeaf.spaceZeroOrMore(),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(PSystemSalt diagram,
LineLocation location,RegexResult arg)
end note
:diagram.setIamSalt(true);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

