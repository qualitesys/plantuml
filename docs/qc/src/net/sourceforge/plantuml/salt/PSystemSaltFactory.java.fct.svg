@startuml
!pragma layout smetana
start
note right
constructor PSystemSaltFactory(DiagramType diagramType)
end note
:super (diagramType);;
end
start
note right
PSystemSalt initDiagram(UmlSource source,
String startLine)
end note
if (getDiagramType()==DiagramType.UML) then (yes) 
:return null ;;
stop
else if (getDiagramType()==DiagramType.SALT) then (yes) 
:return new PSystemSalt(source);;
stop
else (no)
:throw new IllegalStateException(getDiagramType()
.name());;
stop
endif 
end
start
note right
PSystemSalt executeLine(UmlSource source,
PSystemSalt system,String line)
end note
if (system==null &&line.replace('\t',' ').trim().equals("salt")) then (yes) 
:return new PSystemSalt(source);;
stop
endif 
if (system==null ) then (yes) 
:return null ;;
stop
endif 
:system.add(StringUtils.trin(line));;
:return system;;
stop
end
@enduml

