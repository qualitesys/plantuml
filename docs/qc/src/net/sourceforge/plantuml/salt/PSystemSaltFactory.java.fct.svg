@startuml
!pragma layout smetana
start
note right
constructor PSystemSaltFactory(DiagramTypediagramType)
end note
:super (diagramType);;
end
start
note right
PSystemSaltinitDiagram(UmlSourcesource,StringstartLine)
end note
if (getDiagramType()==DiagramType.UML) then (yes) 
:return null ;;
stop
else if (getDiagramType()==DiagramType.SALT) then (yes) 
:return new PSystemSalt(source);;
stop
else (no)
:throw new IllegalStateException(getDiagramType()
.name());;
stop
endif 
end
start
note right
PSystemSaltexecuteLine(UmlSourcesource,PSystemSaltsystem,
Stringline)
end note
if (system==null &&line.replace('\t',' ').trim().equals("salt")) then (yes) 
:return new PSystemSalt(source);;
stop
endif 
if (system==null ) then (yes) 
:return null ;;
stop
endif 
:system.add(StringUtils.trin(line));;
:return system;;
stop
end
@enduml

