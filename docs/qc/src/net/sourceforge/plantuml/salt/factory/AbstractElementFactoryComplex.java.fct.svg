@startuml
!pragma layout smetana
start
note right
constructor AbstractElementFactoryComplex(DataSource dataSource,
Dictionary dictionary)
end note
:this.dataSource=dataSource;;
:this.dictionary=dictionary;;
end
start
note right
void addFactory(ElementFactory factory)
end note
:factories.add(factory);;
end
start
note right
Terminated<Element> getNextElement()
end note
if (factory.ready()) then (yes) 
:return factory.create();;
stop
endif 
:throw new IllegalStateException(dataSource.peek(0)
.getElement());;
stop
end
start
note right
DataSource getDataSource()
end note
:return dataSource;;
stop
end
start
note right
Dictionary getDictionary()
end note
:return dictionary;;
stop
end
@enduml

