@startuml
!pragma layout smetana
start
note right
constructor ElementFactoryRadioOn(DataSource dataSource,
ISkinSimple spriteContainer)
end note
:this.dataSource=dataSource;;
:this.spriteContainer=spriteContainer;;
end
start
note right
Terminated<Element> create()
end note
if (ready()==false) then (yes) 
:throw new IllegalStateException();;
stop
endif 
:final Terminated<String> next=dataSource.next();;
:final String text=next.getElement();;
:final UFont font=UFont.byDefault(12);;
:return new Terminated<Element >(new ElementRadioCheckbox(extracted(text),
font,true,true,spriteContainer),next.getTerminator());;
stop
end
start
note right
List<String> extracted(final String text)
end note
:final int x=text.indexOf(')');;
:return Arrays.asList(StringUtils.trin(text.substring(x+
1)));;
stop
end
start
note right
boolean ready()
end note
:final String text=dataSource.peek(0).getElement();;
:return text.startsWith("(X)");;
stop
end
@enduml

