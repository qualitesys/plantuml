@startuml
!pragma layout smetana
start
note right
constructor ElementFactoryText(DataSourcedataSource,
ISkinSimplespriteContainer)
end note
:this.dataSource=dataSource;;
:this.spriteContainer=spriteContainer;;
end
start
note right
Terminated<Element>create()
end note
if (ready()==false) then (yes) 
:throw new IllegalStateException();;
stop
endif 
:final Terminated<String>next=dataSource.next();;
:final Stringtext=next.getElement();;
:final UFontfont=UFont.byDefault(12);;
:return new Terminated<Element>(new ElementText(Arrays.asList(text),
font,spriteContainer),next.getTerminator());;
stop
end
start
note right
booleanready()
end note
:final Stringtext=dataSource.peek(0).getElement();;
if (text.startsWith("{")||text.startsWith("}")) then (yes) 
:return false;;
stop
endif 
:return StringUtils.trin(text).length()>0;;
stop
end
@enduml

