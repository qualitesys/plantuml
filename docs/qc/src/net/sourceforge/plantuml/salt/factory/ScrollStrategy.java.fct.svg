@startuml
!pragma layout smetana
start
note right
ScrollStrategy fromDesc(String s)
end note
if (s.endsWith("-")) then (yes) 
:return HORIZONTAL_ONLY;;
stop
endif 
if (s.endsWith("I")) then (yes) 
:return VERTICAL_ONLY;;
stop
endif 
:return BOTH;;
stop
end
@enduml

