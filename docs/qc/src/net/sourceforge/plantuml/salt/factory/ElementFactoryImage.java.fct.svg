@startuml
!pragma layout smetana
start
note right
constructor ElementFactoryImage(DataSourcedataSource,
Dictionarydictionary)
end note
:this.dataSource=dataSource;;
:this.dictionary=dictionary;;
end
start
note right
Terminated<Element>create()
end note
if (ready()==false) then (yes) 
:throw new IllegalStateException();;
stop
endif 
:final Stringheader=dataSource.next().getElement();;
:final Stringname=header.length()>2? header.substring(2):null ;;
:final List<String>img=new ArrayList<>();;
while (dataSource.peek(0).getElement().equals(">>")==false)
:img.add(dataSource.next().getElement());;
endwhile
:final Terminated<String>next=dataSource.next();;
:final ElementImageelement=new ElementImage(img);;
if (name!=null ) then (yes) 
:dictionary.put(name,element);;
endif 
:return new Terminated<Element>(element,next.getTerminator());;
stop
end
start
note right
booleanready()
end note
:final Stringtext=dataSource.peek(0).getElement();;
:return text.equals("<<")||text.matches("\\<\\<\\w+");;
stop
end
@enduml

