@startuml
!pragma layout smetana
start
note right
constructor ElementFactoryCheckboxOn(DataSourcedataSource,
ISkinSimplespriteContainer)
end note
:this.dataSource=dataSource;;
:this.spriteContainer=spriteContainer;;
end
start
note right
Terminated<Element>create()
end note
if (ready()==false) then (yes) 
:throw new IllegalStateException();;
stop
endif 
:final Terminated<String>next=dataSource.next();;
:final Stringtext=next.getElement();;
:final UFontfont=UFont.byDefault(12);;
:return new Terminated<Element>(new ElementRadioCheckbox(extracted(text),
font,false,true,spriteContainer),next.getTerminator());;
stop
end
start
note right
List<String>extracted(final Stringtext)
end note
:final intx=text.indexOf(']');;
:return Arrays.asList(StringUtils.trin(text.substring(x+
1)));;
stop
end
start
note right
booleanready()
end note
:final Stringtext=dataSource.peek(0).getElement();;
:return text.startsWith("[X]");;
stop
end
@enduml

