@startuml
!pragma layout smetana
start
note right
constructor ElementFactoryDroplist(DataSource dataSource,
ISkinSimple spriteContainer)
end note
:this.dataSource=dataSource;;
:this.spriteContainer=spriteContainer;;
end
start
note right
Terminated<Element> create()
end note
if (ready()==false) then (yes) 
:throw new IllegalStateException();;
stop
endif 
:final Terminated<String> next=dataSource.next();;
:final String text=next.getElement();;
:final UFont font=UFont.byDefault(12);;
:return new Terminated<Element >(new ElementDroplist(text.substring(1,
text.length()-1),font,spriteContainer),next.getTerminator());;
stop
end
start
note right
boolean ready()
end note
:final String text=dataSource.peek(0).getElement();;
:return text.startsWith("^")&&text.endsWith("^");;
stop
end
@enduml

