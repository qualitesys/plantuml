@startuml
!pragma layout smetana
start
note right
constructor ElementFactoryRetrieveFromDictonnary(DataSourcedataSource,
Dictionarydictionary)
end note
:this.dataSource=dataSource;;
:this.dictionary=dictionary;;
end
start
note right
Terminated<Element>create()
end note
if (ready()==false) then (yes) 
:throw new IllegalStateException();;
stop
endif 
:final Terminated<String>next=dataSource.next();;
:Stringname=next.getElement();;
:name=name.substring(2,name.length()-2);;
:final Elementretrieve=Objects.requireNonNull(dictionary.get(name),
name);;
:return new Terminated<>(retrieve,next.getTerminator());;
stop
end
start
note right
booleanready()
end note
:final Stringtext=dataSource.peek(0).getElement();;
:return text.matches("\\<\\<\\w+\\>\\>");;
stop
end
@enduml

