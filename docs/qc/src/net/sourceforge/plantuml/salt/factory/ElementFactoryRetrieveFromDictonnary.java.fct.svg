@startuml
!pragma layout smetana
start
note right
constructor ElementFactoryRetrieveFromDictonnary(DataSource dataSource,
Dictionary dictionary)
end note
:this.dataSource=dataSource;;
:this.dictionary=dictionary;;
end
start
note right
Terminated<Element> create()
end note
if (ready()==false) then (yes) 
:throw new IllegalStateException();;
stop
endif 
:final Terminated<String> next=dataSource.next();;
:String name=next.getElement();;
:name=name.substring(2,name.length()-2);;
:final Element retrieve=Objects.requireNonNull(dictionary.get(name),
name);;
:return new Terminated<>(retrieve,next.getTerminator());;
stop
end
start
note right
boolean ready()
end note
:final String text=dataSource.peek(0).getElement();;
:return text.matches("\\<\\<\\w+\\>\\>");;
stop
end
@enduml

