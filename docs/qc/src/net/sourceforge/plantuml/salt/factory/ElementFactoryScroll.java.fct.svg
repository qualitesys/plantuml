@startuml
!pragma layout smetana
start
note right
constructor ElementFactoryScroll(DataSource dataSource,
Dictionary dictionary)
end note
:super (dataSource,dictionary);;
end
start
note right
Terminated<Element> create()
end note
if (ready()==false) then (yes) 
:throw new IllegalStateException();;
stop
endif 
:final Terminated<String> tmp=getDataSource()
.next();;
:final String header=tmp.getElement();;
:assert header.startsWith("{");;
:final Positionner2 positionner=new Positionner2();;
while (getDataSource().peek(0).getElement().equals("}")==false)
:final Terminated<Element> next=getNextElement();;
:positionner.add(next);;
endwhile
:final Terminated<String> next=getDataSource()
.next();;
:return new Terminated<Element >(new ElementPyramidScrolled(positionner,
getDictionary(),ScrollStrategy.fromDesc(header)),
next.getTerminator());;
stop
end
start
note right
boolean ready()
end note
:final String text=getDataSource().peek(0)
.getElement();;
if (text.equals("{S")||text.equals("{S-")||text.equals("{SI")) then (yes) 
:return true;;
stop
endif 
:return false;;
stop
end
@enduml

