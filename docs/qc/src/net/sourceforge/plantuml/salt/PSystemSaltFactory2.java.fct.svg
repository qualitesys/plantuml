@startuml
!pragma layout smetana
start
note right
constructor PSystemSaltFactory2(DiagramTypeinit)
end note
:super (init);;
end
start
note right
List<Command>createCommands()
end note
:final List<Command>cmds=new ArrayList<>();;
if (getDiagramType()==DiagramType.UML) then (yes) 
:cmds.add(new CommandSalt());;
endif 
:CommonCommands.addCommonCommands2(cmds);;
:CommonCommands.addTitleCommands(cmds);;
:cmds.add(new CommandAnything());;
:return cmds;;
stop
end
start
note right
PSystemSaltcreateEmptyDiagram(UmlSourcesource,
Map<String,String>skinParam)
end note
:final PSystemSaltresult=new PSystemSalt(source);;
if (getDiagramType()==DiagramType.SALT) then (yes) 
:result.setIamSalt(true);;
endif 
:return result;;
stop
end
@enduml

