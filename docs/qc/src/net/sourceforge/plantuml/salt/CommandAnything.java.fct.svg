@startuml
!pragma layout smetana
start
note right
constructor CommandAnything()
end note
:super (false,getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandAnything.class .getName(),
RegexLeaf.start(),new RegexLeaf("ALL","(.*)"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(PSystemSaltdiagram,
LineLocationlocation,RegexResultarg)
end note
:final Strings=arg.get("ALL",0);;
if (diagram.isIamSalt()==false) then (yes) 
if (StringUtils.isEmpty(s)) then (yes) 
:return CommandExecutionResult.ok();;
stop
endif 
:return CommandExecutionResult.error("Not ready");;
stop
endif 
:diagram.add(s);;
:return CommandExecutionResult.ok();;
stop
end
