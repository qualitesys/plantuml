@startuml
!pragma layout smetana
start
note right
constructor WrappedElement(Element element)
end note
:this.wrapped=element;;
end
start
note right
XDimension2D getPreferredDimension(StringBounder stringBounder,
double x,double y)
end note
:return wrapped.getPreferredDimension(stringBounder,
0,0);;
stop
end
start
note right
void drawU(UGraphic ug,int zIndex,XDimension2D dimToUse)
end note
:wrapped.drawU(ug,zIndex,dimToUse);;
end
@enduml

