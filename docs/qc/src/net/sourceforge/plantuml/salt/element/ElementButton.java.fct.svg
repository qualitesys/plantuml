@startuml
!pragma layout smetana
start
note right
constructor ElementButton(Stringtext,UFontfont,
ISkinSimplespriteContainer)
end note
:super (text,font,true,spriteContainer);;
end
start
note right
XDimension2DgetPreferredDimension(StringBounderstringBounder,
doublex,doubley)
end note
:XDimension2Ddim=getTextDimensionAt(stringBounder,x+
stroke+marginX);;
:dim=XDimension2D.delta(dim,2*marginX,2*marginY);;
:return XDimension2D.delta(dim,2*stroke);;
stop
end
start
note right
void drawU(UGraphicug,intzIndex,XDimension2DdimToUse)
end note
if (zIndex!=0) then (yes) 
:return ;;
stop
endif 
:final XDimension2Ddim=getPreferredDimension(ug.getStringBounder(),
0,0);;
:ug=ug.apply(new UStroke(stroke));;
:ug=ug.apply(getColorEE().bg()).apply(getBlack());;
:ug.apply(new UTranslate(stroke,stroke)).draw(new URectangle(dim.getWidth()-2*stroke,
dim.getHeight()-2*stroke).rounded(10));;
:final XDimension2DdimPureText=getPureTextDimension(ug.getStringBounder());;
:drawText(ug,(dim.getWidth()-dimPureText.getWidth())/2,stroke+
marginY);;
end
@enduml

