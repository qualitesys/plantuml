@startuml
!pragma layout smetana
start
note right
int compare(Cell c0,Cell c1)
end note
:final int diffNb=c0.getNbRows()-c1.getNbRows();;
if (diffNb!=0) then (yes) 
:return diffNb;;
stop
endif 
:final int diffPos=c0.getMinRow()-c1.getMinRow();;
:return diffPos;;
stop
end
@enduml

