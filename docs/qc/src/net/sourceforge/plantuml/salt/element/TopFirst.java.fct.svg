@startuml
!pragma layout smetana
start
note right
intcompare(Cellc0,Cellc1)
end note
:final intdiffNb=c0.getNbRows()-c1.getNbRows();;
if (diffNb!=0) then (yes) 
:return diffNb;;
stop
endif 
:final intdiffPos=c0.getMinRow()-c1.getMinRow();;
:return diffPos;;
stop
end
@enduml

