@startuml
!pragma layout smetana
start
note right
constructor ElementImage(List<String> img)
end note
:this.img=img;;
end
start
note right
XDimension2D getPreferredDimension(StringBounder stringBounder,
double x,double y)
end note
:return new XDimension2D(img.get(0).length(),
img.size());;
stop
end
start
note right
void drawU(UGraphic ug,int zIndex,XDimension2D dimToUse)
end note
if (zIndex!=0) then (yes) 
:return ;;
stop
endif 
:ug=ug.apply(getBlack());;
:final int w=img.get(0).length();;
:final int h=img.size();;
:final char c=img.get(j).charAt(i);;
if (c=='X') then (yes) 
:ug.apply(new UTranslate(i,j)).draw(new UPixel());;
endif 
end
@enduml

