@startuml
!pragma layout smetana
start
note right
constructor ElementImage(List<String>img)
end note
:this.img=img;;
end
start
note right
XDimension2DgetPreferredDimension(StringBounderstringBounder,
doublex,doubley)
end note
:return new XDimension2D(img.get(0).length(),
img.size());;
stop
end
start
note right
void drawU(UGraphicug,intzIndex,XDimension2DdimToUse)
end note
if (zIndex!=0) then (yes) 
:return ;;
stop
endif 
:ug=ug.apply(getBlack());;
:final intw=img.get(0).length();;
:final inth=img.size();;
:final charc=img.get(j).charAt(i);;
if (c=='X') then (yes) 
:ug.apply(new UTranslate(i,j)).draw(new UPixel());;
endif 
end
@enduml

