@startuml
!pragma layout smetana
start
note right
int compare(Cell c0,Cell c1)
end note
:final int diffNb=c0.getNbCols()-c1.getNbCols();;
if (diffNb!=0) then (yes) 
:return diffNb;;
stop
endif 
:final int diffPos=c0.getMinCol()-c1.getMinCol();;
:return diffPos;;
stop
end
@enduml

