@startuml
!pragma layout smetana
start
note right
intcompare(Cellc0,Cellc1)
end note
:final intdiffNb=c0.getNbCols()-c1.getNbCols();;
if (diffNb!=0) then (yes) 
:return diffNb;;
stop
endif 
:final intdiffPos=c0.getMinCol()-c1.getMinCol();;
:return diffPos;;
stop
end
@enduml

