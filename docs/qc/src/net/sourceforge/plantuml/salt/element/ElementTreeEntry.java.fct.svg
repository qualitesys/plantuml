@startuml
!pragma layout smetana
start
note right
constructor ElementTreeEntry(intlevel,Elementelmt)
end note
:this.firstElement=elmt;;
:this.level=level;;
end
start
note right
void addCell(Elementelmt)
end note
:this.otherElements.add(elmt);;
end
start
note right
XDimension2DgetPreferredDimensionFirstCell(StringBounderstringBounder)
end note
:return XDimension2D.delta(firstElement.getPreferredDimension(stringBounder,
0,0),getXDelta(),0);;
stop
end
start
note right
ListWidthgetPreferredDimensionOtherCell(StringBounderstringBounder)
end note
:final ListWidthresult=new ListWidth();;
:result.add(element.getPreferredDimension(stringBounder,
0,0).getWidth());;
:return result;;
stop
end
start
note right
doublegetXDelta()
end note
:return level*10;;
stop
end
start
note right
void drawFirstCell(UGraphicug,doublex,doubley)
end note
:firstElement.drawU(ug.apply(new UTranslate(x+
getXDelta(),y)),0,null );;
end
start
note right
void drawSecondCell(UGraphicug,doublex,doubley,
ListWidthotherWidth,doublemargin)
end note
:final Iterator<Double>it=otherWidth.iterator();;
:element.drawU(ug.apply(new UTranslate(x,
y)),0,null );;
:x+=it.next()+margin;;
end
@enduml

