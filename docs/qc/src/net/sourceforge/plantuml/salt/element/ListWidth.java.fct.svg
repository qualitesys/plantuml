@startuml
!pragma layout smetana
start
note right
void add(doublewidth)
end note
:this.allWidth.add(width);;
end
start
note right
ListWidthmergeMax(ListWidthother)
end note
:final ListWidthresult=new ListWidth();;
:final doublew1=this.getWidthSafe(i);;
:final doublew2=other.getWidthSafe(i);;
:result.add(Math.max(w1,w2));;
:return result;;
stop
end
start
note right
doublegetWidthSafe(inti)
end note
if (i<allWidth.size()) then (yes) 
:return allWidth.get(i);;
stop
endif 
:return 0;;
stop
end
start
note right
doublegetTotalWidthWithMargin(final doublemargin)
end note
:doubleresult=0;;
if (result>0) then (yes) 
:result+=margin;;
endif 
:result+=w;;
:return result;;
stop
end
start
note right
Iterator<Double>iterator()
end note
:return allWidth.iterator();;
stop
end
@enduml

