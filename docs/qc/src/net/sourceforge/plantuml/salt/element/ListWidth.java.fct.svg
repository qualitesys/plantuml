@startuml
!pragma layout smetana
start
note right
void add(double width)
end note
:this.allWidth.add(width);;
end
start
note right
ListWidth mergeMax(ListWidth other)
end note
:final ListWidth result=new ListWidth();;
:final double w1=this.getWidthSafe(i);;
:final double w2=other.getWidthSafe(i);;
:result.add(Math.max(w1,w2));;
:return result;;
stop
end
start
note right
double getWidthSafe(int i)
end note
if (i<allWidth.size()) then (yes) 
:return allWidth.get(i);;
stop
endif 
:return 0;;
stop
end
start
note right
double getTotalWidthWithMargin(final double margin)
end note
:double result=0;;
if (result>0) then (yes) 
:result+=margin;;
endif 
:result+=w;;
:return result;;
stop
end
start
note right
Iterator<Double> iterator()
end note
:return allWidth.iterator();;
stop
end
@enduml

