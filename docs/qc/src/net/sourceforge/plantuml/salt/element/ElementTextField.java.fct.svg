.1445,255,1024.1445,259,1014.1445,255,1018.1445" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[210337227cfefa7b30533e35057db528]
@startuml
!pragma layout smetana
start
note right
constructor ElementTextField(Stringtext,UFontfont,
ISkinSimplespriteContainer)
end note
:super (text,font,true,spriteContainer);;
end
start
note right
XDimension2DgetPreferredDimension(StringBounderstringBounder,
doublex,doubley)
end note
:final XDimension2Ddim=getTextDimensionAt(stringBounder,x);;
:return XDimension2D.delta(dim,6,2);;
stop
end
start
note right
void drawU(UGraphicug,intzIndex,XDimension2DdimToUse)
end note
if (zIndex!=0) then (yes) 
:return ;;
stop
endif 
:drawText(ug,3,0);;
:final XDimension2Ddim=getPreferredDimension(ug.getStringBounder(),
0,0);;
:final XDimension2DtextDim=getTextDimensionAt(ug.getStringBounder(),0);;
:ug.apply(new UTranslate(1,textDim.getHeight()))
.draw(ULine.hline(dim.getWidth()-3));;
:final doubley3=textDim.getHeight()-3;;
:ug.apply(new UTranslate(1,y3)).draw(ULine.vline(2));;
:ug.apply(new UTranslate(3+textDim.getWidth()+
1,y3)).draw(ULine.vline(2));;
end
@enduml

