ints="253,1014.1445,257,1024.1445,261,1014.1445,257,1018.1445" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[89804411cb131baf4c9cab203af602a2]
@startuml
!pragma layout smetana
start
note right
constructor ElementTextField(String text,
UFont font,ISkinSimple spriteContainer)
end note
:super (text,font,true,spriteContainer);;
end
start
note right
XDimension2D getPreferredDimension(StringBounder stringBounder,
double x,double y)
end note
:final XDimension2D dim=getTextDimensionAt(stringBounder,x);;
:return XDimension2D.delta(dim,6,2);;
stop
end
start
note right
void drawU(UGraphic ug,int zIndex,XDimension2D dimToUse)
end note
if (zIndex!=0) then (yes) 
:return ;;
stop
endif 
:drawText(ug,3,0);;
:final XDimension2D dim=getPreferredDimension(ug.getStringBounder(),
0,0);;
:final XDimension2D textDim=getTextDimensionAt(ug.getStringBounder(),0);;
:ug.apply(new UTranslate(1,textDim.getHeight()))
.draw(ULine.hline(dim.getWidth()-3));;
:final double y3=textDim.getHeight()-3;;
:ug.apply(new UTranslate(1,y3)).draw(ULine.vline(2));;
:ug.apply(new UTranslate(3+textDim.getWidth()+
1,y3)).draw(ULine.vline(2));;
end
@enduml

