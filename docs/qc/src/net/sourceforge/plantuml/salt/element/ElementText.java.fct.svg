@startuml
!pragma layout smetana
start
note right
constructor ElementText(List<String> text,
UFont font,ISkinSimple spriteContainer)
end note
:final FontConfiguration config=FontConfiguration.blackBlueTrue(font);;
:this.block=Display.create(text).create(config,
HorizontalAlignment.LEFT,spriteContainer);;
:this.show=text.get(0).equals(".")==false;;
:this.text=text.get(0);;
end
start
note right
XDimension2D getPreferredDimension(StringBounder stringBounder,
double x,double y)
end note
:return block.calculateDimension(stringBounder);;
stop
end
start
note right
void drawU(UGraphic ug,int zIndex,XDimension2D dimToUse)
end note
if (zIndex!=0) then (yes) 
:return ;;
stop
endif 
if (show) then (yes) 
:block.drawU(ug);;
endif 
end
start
note right
String getText()
end note
:return text;;
stop
end
@enduml

