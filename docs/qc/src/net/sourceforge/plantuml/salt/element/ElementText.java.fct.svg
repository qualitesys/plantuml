@startuml
!pragma layout smetana
start
note right
constructor ElementText(List<String>text,
UFontfont,ISkinSimplespriteContainer)
end note
:final FontConfigurationconfig=FontConfiguration.blackBlueTrue(font);;
:this.block=Display.create(text).create(config,
HorizontalAlignment.LEFT,spriteContainer);;
:this.show=text.get(0).equals(".")==false;;
:this.text=text.get(0);;
end
start
note right
XDimension2DgetPreferredDimension(StringBounderstringBounder,
doublex,doubley)
end note
:return block.calculateDimension(stringBounder);;
stop
end
start
note right
void drawU(UGraphicug,intzIndex,XDimension2DdimToUse)
end note
if (zIndex!=0) then (yes) 
:return ;;
stop
endif 
if (show) then (yes) 
:block.drawU(ug);;
endif 
end
start
note right
StringgetText()
end note
:return text;;
stop
end
@enduml

