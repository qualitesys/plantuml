@startuml
!pragma layout smetana
start
note right
constructor AbstractTask(StyleBuilderstyleBuilder,
TaskCodecode)
end note
:this.styleBuilder=styleBuilder;;
:this.code=code;;
end
start
note right
void putInSameRowAs(Taskrow)
end note
if (this!=row) then (yes) 
:this.row=row;;
endif 
end
start
note right
TaskgetRow()
end note
:return row;;
stop
end
start
note right
TaskCodegetCode()
end note
:return code;;
stop
end
start
note right
StyleBuildergetStyleBuilder()
end note
:return styleBuilder;;
stop
end
@enduml

