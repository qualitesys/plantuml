@startuml
!pragma layout smetana
start
note right
constructor PrintScale(intcompress)
end note
:this.defaultScale=1.0/compress;;
end
start
note right
doublegetDefaultScale()
end note
:return defaultScale;;
stop
end
start
note right
PrintScalefromString(Stringvalue)
end note
if (value.startsWith("w")) then (yes) 
:return WEEKLY;;
stop
endif 
if (value.startsWith("m")) then (yes) 
:return MONTHLY;;
stop
endif 
if (value.startsWith("q")) then (yes) 
:return QUARTERLY;;
stop
endif 
if (value.startsWith("y")) then (yes) 
:return YEARLY;;
stop
endif 
:return DAILY;;
stop
end
@enduml

