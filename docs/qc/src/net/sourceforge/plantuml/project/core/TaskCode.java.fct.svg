@startuml
!pragma layout smetana
start
note right
constructor TaskCode(Stringcode)
end note
:this.code=code;;
end
start
note right
inthashCode()
end note
:return code.hashCode();;
stop
end
start
note right
booleanequals(Objectarg)
end note
:final TaskCodeother=(TaskCode)arg;;
:return this.code.equals(other.code);;
stop
end
start
note right
StringtoString()
end note
:return code.toString();;
stop
end
start
note right
StringgetSimpleDisplay()
end note
:return code;;
stop
end
@enduml

