@startuml
!pragma layout smetana
start
note right
constructor TaskCode(String code)
end note
:this.code=code;;
end
start
note right
int hashCode()
end note
:return code.hashCode();;
stop
end
start
note right
boolean equals(Object arg)
end note
:final TaskCode other=(TaskCode )arg;;
:return this.code.equals(other.code);;
stop
end
start
note right
String toString()
end note
:return code.toString();;
stop
end
start
note right
String getSimpleDisplay()
end note
:return code;;
stop
end
@enduml

