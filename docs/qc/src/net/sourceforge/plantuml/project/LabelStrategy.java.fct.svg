,730.6406" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="168" x2="168" y1="770.6094" y2="790.6094"/><polygon fill="#181818" points="164,780.6094,168,790.6094,172,780.6094,168,784.6094" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[c41be42b6e41a6f6ce171555f9abb9db]
@startuml
!pragma layout smetana
start
note right
constructor LabelStrategy(LabelPositionposition,
HorizontalAlignmentalignment)
end note
:this.position=position;;
:this.alignment=alignment;;
end
start
note right
booleantitleInFirstColumn()
end note
:return position==LabelPosition.FIRST_COLUMN;;
stop
end
start
note right
booleantitleInLastColumn()
end note
:return position==LabelPosition.LAST_COLUMN;;
stop
end
start
note right
booleantitleInside()
end note
:return position==LabelPosition.LEGACY;;
stop
end
start
note right
booleanrightAligned()
end note
:return alignment==HorizontalAlignment.RIGHT;;
stop
end
@enduml

