@startuml
!pragma layout smetana
start
note right
constructor CommandNoteBottom()
end note
:super ("^note[%s]*bottom$");;
end
start
note right
String getPatternEnd()
end note
:return "^end[%s]*note$";;
stop
end
start
note right
CommandExecutionResult execute(GanttDiagram diagram,
BlocLines lines)
end note
:lines=lines.subExtract(1,1);;
:lines=lines.removeEmptyColumns();;
:final Display strings=lines.toDisplay();;
if (strings.size()>0) then (yes) 
:return diagram.addNote(strings);;
stop
endif 
:return CommandExecutionResult.error("No note defined");;
stop
end
@enduml

