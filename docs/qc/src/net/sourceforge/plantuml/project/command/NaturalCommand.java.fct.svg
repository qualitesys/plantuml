@startuml
!pragma layout smetana
start
note right
constructor NaturalCommand(Sentencesentence)
end note
:super (sentence.toRegex());;
:this.sentence=sentence;;
end
start
note right
CommandExecutionResultexecuteArg(GanttDiagramsystem,
LineLocationlocation,RegexResultarg)
end note
:return sentence.execute(system,arg);;
stop
end
start
note right
NaturalCommandcreate(Sentencesentence)
end note
:return new NaturalCommand(sentence);;
stop
end
@enduml

