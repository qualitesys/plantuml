@startuml
!pragma layout smetana
start
note right
constructor CommandGroupEnd()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandGroupEnd.class .getName(),
RegexLeaf.start(),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("end"),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("group"),RegexLeaf.spaceZeroOrMore(),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(GanttDiagram diagram,
LineLocation location,RegexResult arg)
end note
:return diagram.endGroup();;
stop
end
@enduml

