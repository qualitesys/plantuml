@startuml
!pragma layout smetana
start
note right
constructor CommandColorTask()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandColorTask.class .getName(),RegexLeaf.start(),new RegexLeaf("CODE","\\[([%pLN_.]+
)\\]"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("COLORS","#(\\w+
)(?:/(#?\\w+))?"),RegexLeaf.spaceZeroOrMore(),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(GanttDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final String code=arg.get("CODE",0);;
:final Task task=diagram.getExistingTask(code);;
if (task==null ) then (yes) 
:return CommandExecutionResult.error("No such task "+
code);;
stop
endif 
:final String color1=arg.get("COLORS",0);;
:final String color2=arg.get("COLORS",1);;
:final HColor col1=color1==null ? null :diagram.getIHtmlColorSet()
.getColor(color1);;
:final HColor col2=color2==null ? null :diagram.getIHtmlColorSet()
.getColor(color2);;
:task.setColors(new CenterBorderColor(col1,
col2));;
:return CommandExecutionResult.ok();;
stop
end
@enduml

