@startuml
!pragma layout smetana
start
note right
constructor CommandLabelOnColumn()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandLabelOnColumn.class .getName(),
RegexLeaf.start(),new RegexLeaf("labels?"),
RegexLeaf.spaceOneOrMore(),new RegexLeaf("on"),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf("POSITION",
"(first|last)"),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("column"),new RegexOptional(new RegexConcat(RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("and"),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("ALIGNED","(left|right)"),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("aligned"))),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(GanttDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:final LabelPositionposition=String.valueOf("first").equalsIgnoreCase(arg.get("POSITION",
0))? LabelPosition.FIRST_COLUMN:LabelPosition.LAST_COLUMN;;
:final HorizontalAlignmentalignment=String.valueOf("right").equalsIgnoreCase(arg.get("ALIGNED",
0))? HorizontalAlignment.RIGHT:HorizontalAlignment.LEFT;;
:final LabelStrategystrategy=new LabelStrategy(position,
alignment);;
:diagram.setLabelStrategy(strategy);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

