@startuml
!pragma layout smetana
start
note right
constructor CommandPrintScale()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandPrintScale.class .getName(),
RegexLeaf.start(),new RegexOr(new RegexLeaf("projectscale"),
new RegexLeaf("ganttscale"),new RegexLeaf("printscale")),
RegexLeaf.spaceOneOrMore(),new RegexOr("SCALE",
new RegexLeaf("yearly"),new RegexLeaf("quarterly"),
new RegexLeaf("monthly"),new RegexLeaf("daily"),
new RegexLeaf("weekly")),new RegexOptional(new RegexConcat(RegexLeaf.spaceOneOrMore(),
new RegexLeaf("DATE","(with)"),RegexLeaf.spaceOneOrMore(),
new RegexLeaf("calendar"),RegexLeaf.spaceOneOrMore(),
new RegexLeaf("date"))),new RegexOptional(new RegexConcat(RegexLeaf.spaceOneOrMore(),new RegexLeaf("zoom"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("ZOOM","([.\\d]+
)"))),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(GanttDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final String scaleString=arg.get("SCALE",0);;
:final PrintScale scale=PrintScale.fromString(scaleString);;
:diagram.setPrintScale(scale);;
:final String zoom=arg.get("ZOOM",0);;
if (zoom!=null ) then (yes) 
:diagram.setFactorScale(Double.parseDouble(zoom));;
endif 
:final String withCalendarDate=arg.get("DATE",0);;
if (withCalendarDate!=null ) then (yes) 
:diagram.setWithCalendarDate(true);;
endif 
:return CommandExecutionResult.ok();;
stop
end
@enduml

