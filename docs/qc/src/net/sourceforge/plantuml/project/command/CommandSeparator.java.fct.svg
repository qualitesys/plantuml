@startuml
!pragma layout smetana
start
note right
constructor CommandSeparator()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandSeparator.class .getName(),RegexLeaf.start(),new RegexLeaf("- -"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("COMMENT","((.+
?)[%s]*- -)?"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(GanttDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final String comment=arg.get("COMMENT",1);;
:diagram.addSeparator(comment);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

