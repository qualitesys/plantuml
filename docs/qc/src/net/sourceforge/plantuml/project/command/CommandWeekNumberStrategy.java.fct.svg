@startuml
!pragma layout smetana
start
note right
constructor CommandWeekNumberStrategy()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandWeekNumberStrategy.class .getName(),
RegexLeaf.start(),new RegexLeaf("weeks?"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("starts?"),new RegexLeaf("[^0-9]*?"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("WEEKDAY","("+
DayOfWeek.getRegexString()+")"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("[^0-9]*?"),new RegexLeaf("NUM","([0-9]+
)"),new RegexLeaf("[^0-9]*?"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(GanttDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final DayOfWeek weekDay=DayOfWeek.fromString(arg.get("WEEKDAY",
0));;
:final String num=arg.get("NUM",0);;
:diagram.setWeekNumberStrategy(weekDay,Integer.parseInt(num));;
:return CommandExecutionResult.ok();;
stop
end
@enduml

