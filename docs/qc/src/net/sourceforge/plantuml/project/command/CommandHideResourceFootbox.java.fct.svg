@startuml
!pragma layout smetana
start
note right
constructor CommandHideResourceFootbox()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandHideResourceFootbox.class .getName(),
RegexLeaf.start(),new RegexLeaf("hide"),RegexLeaf.spaceOneOrMore(),
new RegexLeaf("ress?ources?"),RegexLeaf.spaceOneOrMore(),
new RegexLeaf("footbox"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(GanttDiagram diagram,
LineLocation location,RegexResult arg)
end note
:return diagram.hideResourceFootbox();;
stop
end
@enduml

