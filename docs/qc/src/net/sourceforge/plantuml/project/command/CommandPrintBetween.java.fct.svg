@startuml
!pragma layout smetana
start
note right
constructor CommandPrintBetween()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandPrintBetween.class .getName(),
RegexLeaf.start(),new RegexLeaf("print"),
RegexLeaf.spaceOneOrMore(),new RegexLeaf("between"),
RegexLeaf.spaceOneOrMore(),pattern.toRegex("START"),
RegexLeaf.spaceOneOrMore(),new RegexLeaf("and"),
RegexLeaf.spaceOneOrMore(),pattern.toRegex("END"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(GanttDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:final Daystart=(Day)pattern.getMe(diagram,
arg,"START").get();;
:final Dayend=(Day)pattern.getMe(diagram,
arg,"END").get();;
:diagram.setPrintInterval(start,end);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

