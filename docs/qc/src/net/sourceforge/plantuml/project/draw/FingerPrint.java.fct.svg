@startuml
!pragma layout smetana
start
note right
constructor FingerPrint(double x,double y,
double width,double height)
end note
:this.x=x;;
:this.y=y;;
:this.width=width;;
:this.height=height;;
end
start
note right
String toString()
end note
:return "X=("+x+"->"+(x+width)+") Y=("+y+
" ->"+(y+height)+")";;
stop
end
start
note right
double overlap(FingerPrint other)
end note
if (x>=other.x+other.width||other.x>=x+width) then (yes) 
:return 0;;
stop
endif 
if (y>=other.y+other.height||other.y>=y+height) then (yes) 
:return 0;;
stop
endif 
:return y+height-other.y;;
stop
end
@enduml

