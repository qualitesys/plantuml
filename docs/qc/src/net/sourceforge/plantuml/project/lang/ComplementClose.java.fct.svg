@startuml
!pragma layout smetana
start
note right
IRegex toRegex(String suffix)
end note
:return new RegexLeaf("CLOSED"+suffix,"(closed?(?: for \\[([^\\[\\]]+
?)\\])?)");;
stop
end
start
note right
Failable<String> getMe(GanttDiagram project,
RegexResult arg,String suffix)
end note
:final String value=arg.get("CLOSED"+suffix,0);;
:final int x=value.indexOf('[');;
if (x>0) then (yes) 
:final int y=value.lastIndexOf(']');;
:final String s=value.substring(x+1,y);;
:return Failable.ok(s);;
stop
endif 
:return Failable.ok("");;
stop
end
@enduml

