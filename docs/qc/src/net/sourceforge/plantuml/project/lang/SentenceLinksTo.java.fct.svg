@startuml
!pragma layout smetana
start
note right
constructor SentenceLinksTo()
end note
:super (new SubjectTask(),Verbs.linksTo(),
new ComplementUrl());;
end
start
note right
CommandExecutionResult execute(GanttDiagram project,
Object subject,Object complement)
end note
:final Task task=(Task )subject;;
:final Url url=(Url )complement;;
:task.setUrl(url);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

