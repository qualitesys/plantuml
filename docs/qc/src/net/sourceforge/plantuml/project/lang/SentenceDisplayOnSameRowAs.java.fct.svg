h:1.0;"/><!--MD5=[385b9f0b93ebaa11b6cc0c170f64fdb1]
@startuml
!pragma layout smetana
start
note right
constructor SentenceDisplayOnSameRowAs()
end note
:super (new SubjectTask(),Verbs.displayOnSameRowAs(),
new ComplementNamed());;
end
start
note right
CommandExecutionResult execute(GanttDiagram project,
Object subject,Object complement)
end note
:final Task task1=(Task )subject;;
:final Task task2=project.getExistingTask((String )complement);;
if (task2==null ) then (yes) 
:return CommandExecutionResult.error("No such task "+
task2);;
stop
endif 
:task1.putInSameRowAs(task2);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

