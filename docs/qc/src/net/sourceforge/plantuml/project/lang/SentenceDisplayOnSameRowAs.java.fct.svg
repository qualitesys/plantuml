<!--MD5=[de99f61c9a1e4d92cd32a9aba6440bc5]
@startuml
!pragma layout smetana
start
note right
constructor SentenceDisplayOnSameRowAs()
end note
:super (new SubjectTask(),Verbs.displayOnSameRowAs(),
new ComplementNamed());;
end
start
note right
CommandExecutionResultexecute(GanttDiagramproject,
Objectsubject,Objectcomplement)
end note
:final Tasktask1=(Task)subject;;
:final Tasktask2=project.getExistingTask((String)complement);;
if (task2==null ) then (yes) 
:return CommandExecutionResult.error("No such task "+
task2);;
stop
endif 
:task1.putInSameRowAs(task2);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

