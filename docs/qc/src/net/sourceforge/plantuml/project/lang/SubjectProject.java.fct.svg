;stroke-width:1.0;"/><!--MD5=[bface569aeb32f985e121c7d6eedadbc]
@startuml
!pragma layout smetana
start
note right
IRegex toRegex()
end note
:return new RegexLeaf("SUBJECT","project");;
stop
end
start
note right
Failable<GanttDiagram> getMe(GanttDiagram project,
RegexResult arg)
end note
:return Failable.ok(project);;
stop
end
start
note right
Collection<?extendsSentenceSimple> getSentences()
end note
:return Arrays.asList(new Starts());;
stop
end
start
note right
constructor Starts()
end note
:super (SubjectProject.this,Verbs.starts(),
new ComplementDate());;
end
start
note right
CommandExecutionResult execute(GanttDiagram project,
Object subject,Object complement)
end note
:final Day start=(Day )complement;;
:assert project==subject;;
:project.setStartingDate(start);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

