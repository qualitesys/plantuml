@startuml
!pragma layout smetana
start
note right
constructor SentenceTaskEndsAbsolute()
end note
:super (new SubjectTask(),Verbs.ends2(),new ComplementDate());;
end
start
note right
CommandExecutionResultexecute(GanttDiagramproject,
Objectsubject,Objectcomplement)
end note
:final Tasktask=(Task)subject;;
:final Dayend=(Day)complement;;
:task.setEnd(end);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

