@startuml
!pragma layout smetana
start
note right
IRegextoRegex(Stringsuffix)
end note
:final StringoptionalStyle="(?:(dotted|bold|dashed)[%s]+
)?";;
:return new RegexLeaf("COMPLEMENT"+suffix,"with[%s]+
"+optionalStyle+"(#?\\w+)[%s]+"+optionalStyle+
"link");;
stop
end
start
note right
Failable<CenterBorderColor>getMe(GanttDiagramdiagram,
RegexResultarg,Stringsuffix)
end note
:final Stringstyle0=arg.get("COMPLEMENT"+
suffix,0);;
:final Stringcolor1=arg.get("COMPLEMENT"+
suffix,1);;
:final Stringstyle2=arg.get("COMPLEMENT"+
suffix,2);;
:final HColorcol1=color1==null ? null :diagram.getIHtmlColorSet()
.getColorOrWhite(color1);;
:final Stringstyle=style0==null ? style2:style0;;
:return Failable.ok(new CenterBorderColor(col1,
col1,style));;
stop
end
@enduml

