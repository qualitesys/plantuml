@startuml
!pragma layout smetana
start
note right
IRegex toRegex(String suffix)
end note
:final String optionalStyle="(?:(dotted|bold|dashed)[%s]+
)?";;
:return new RegexLeaf("COMPLEMENT"+suffix,"with[%s]+
"+optionalStyle+"(#?\\w+)[%s]+"+optionalStyle+
"link");;
stop
end
start
note right
Failable<CenterBorderColor> getMe(GanttDiagram diagram,
RegexResult arg,String suffix)
end note
:final String style0=arg.get("COMPLEMENT"+
suffix,0);;
:final String color1=arg.get("COMPLEMENT"+
suffix,1);;
:final String style2=arg.get("COMPLEMENT"+
suffix,2);;
:final HColor col1=color1==null ? null :diagram.getIHtmlColorSet()
.getColorOrWhite(color1);;
:final String style=style0==null ? style2:style0;;
:return Failable.ok(new CenterBorderColor(col1,
col1,style));;
stop
end
@enduml

