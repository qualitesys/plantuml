@startuml
!pragma layout smetana
start
note right
constructor SentenceHappensDate()
end note
:super (new SubjectTask(),Verbs.happens(),
new ComplementDate());;
end
start
note right
CommandExecutionResultexecute(GanttDiagramproject,
Objectsubject,Objectcomplement)
end note
:final Tasktask=(Task)subject;;
:task.setLoad(Load.inWinks(1));;
:final Daystart=(Day)complement;;
:task.setStart(start);;
:task.setDiamond(true);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

