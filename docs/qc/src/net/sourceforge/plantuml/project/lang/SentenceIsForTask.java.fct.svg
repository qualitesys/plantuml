@startuml
!pragma layout smetana
start
note right
constructor SentenceIsForTask()
end note
:super (new SubjectTask(),Verbs.is(),new ComplementCompleted());;
end
start
note right
CommandExecutionResultexecute(GanttDiagramproject,
Objectsubject,Objectcomplement)
end note
:final Tasktask=(Task)subject;;
:final Completioncompleted=(Completion)complement;;
:task.setCompletion(completed.getCompletion());;
:return CommandExecutionResult.ok();;
stop
end
@enduml

