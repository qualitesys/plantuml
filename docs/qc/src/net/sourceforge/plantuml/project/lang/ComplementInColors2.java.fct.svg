@startuml
!pragma layout smetana
start
note right
IRegex toRegex(String suffix)
end note
:return new RegexLeaf("COMPLEMENT"+suffix,"colou?red[%s]+
(?:in[%s]+)?(#?\\w+)(?:/(#?\\w+))?");;
stop
end
start
note right
Failable<CenterBorderColor> getMe(GanttDiagram diagram,
RegexResult arg,String suffix)
end note
:final String color1=arg.get("COMPLEMENT"+
suffix,0);;
:final String color2=arg.get("COMPLEMENT"+
suffix,1);;
:final HColor col1=color1==null ? null :diagram.getIHtmlColorSet()
.getColorOrWhite(color1);;
:final HColor col2=color2==null ? null :diagram.getIHtmlColorSet()
.getColorOrWhite(color2);;
:return Failable.ok(new CenterBorderColor(col1,
col2));;
stop
end
@enduml

