@startuml
!pragma layout smetana
start
note right
IRegextoRegex(Stringsuffix)
end note
:return new RegexLeaf("COMPLEMENT"+suffix,"colou?red[%s]+
(?:in[%s]+)?(#?\\w+)(?:/(#?\\w+))?");;
stop
end
start
note right
Failable<CenterBorderColor>getMe(GanttDiagramdiagram,
RegexResultarg,Stringsuffix)
end note
:final Stringcolor1=arg.get("COMPLEMENT"+
suffix,0);;
:final Stringcolor2=arg.get("COMPLEMENT"+
suffix,1);;
:final HColorcol1=color1==null ? null :diagram.getIHtmlColorSet()
.getColorOrWhite(color1);;
:final HColorcol2=color2==null ? null :diagram.getIHtmlColorSet()
.getColorOrWhite(color2);;
:return Failable.ok(new CenterBorderColor(col1,
col2));;
stop
end
@enduml

