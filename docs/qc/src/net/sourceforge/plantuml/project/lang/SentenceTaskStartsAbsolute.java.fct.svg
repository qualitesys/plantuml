@startuml
!pragma layout smetana
start
note right
constructor SentenceTaskStartsAbsolute()
end note
:super (new SubjectTask(),Verbs.starts3(),
new ComplementDate());;
end
start
note right
CommandExecutionResultexecute(GanttDiagramproject,
Objectsubject,Objectcomplement)
end note
:final Tasktask=(Task)subject;;
:final Daystart=(Day)complement;;
:task.setStart(start);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

