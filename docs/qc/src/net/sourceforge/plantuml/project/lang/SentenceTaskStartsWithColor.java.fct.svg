@startuml
!pragma layout smetana
start
note right
constructor SentenceTaskStartsWithColor()
end note
:super (new SubjectTask(),Verbs.starts2(),
new PairOfSomething(new ComplementBeforeOrAfterOrAtTaskStartOrEnd(),
new ComplementWithColorLink()));;
end
start
note right
CommandExecutionResultexecute(GanttDiagramdiagram,
Objectsubject,Objectcomplement)
end note
:final Tasktask=(Task)subject;;
:final TaskInstantwhen;;
:final Object[]pairs=(Object[])complement;;
:when=(TaskInstant)pairs[0];;
:final CenterBorderColorcomplement22=(CenterBorderColor)pairs[1];;
:task.setStart(when.getInstantPrecise());;
if (when.isTask()) then (yes) 
:final HColorcolor=complement22.getCenter();;
:final GanttConstraintlink=new GanttConstraint(diagram.getIHtmlColorSet(),
diagram.getCurrentStyleBuilder(),when,new TaskInstant(task,
TaskAttribute.START),color);;
:link.applyStyle(complement22.getStyle());;
:diagram.addContraint(link);;
endif 
:return CommandExecutionResult.ok();;
stop
end
@enduml

