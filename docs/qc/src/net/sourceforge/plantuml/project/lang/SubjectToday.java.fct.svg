@startuml
!pragma layout smetana
start
note right
IRegex toRegex()
end note
:return new RegexConcat(new RegexLeaf("today"));;
stop
end
start
note right
Failable<Today> getMe(GanttDiagram project,
RegexResult arg)
end note
:return Failable.ok(new Today());;
stop
end
start
note right
Collection<?extendsSentenceSimple> getSentences()
end note
:return Arrays.asList(new InColor(),new IsDate());;
stop
end
start
note right
constructor InColor()
end note
:super (SubjectToday.this,Verbs.isColored(),
new ComplementInColors());;
end
start
note right
CommandExecutionResult execute(GanttDiagram project,
Object subject,Object complement)
end note
:final Today task=(Today )subject;;
:final CenterBorderColor colors=(CenterBorderColor )complement;;
:project.setTodayColors(colors);;
:return CommandExecutionResult.ok();;
stop
end
start
note right
constructor IsDate()
end note
:super (SubjectToday.this,Verbs.is(),new ComplementDate());;
end
start
note right
CommandExecutionResult execute(GanttDiagram project,
Object subject,Object complement)
end note
:final Day date=(Day )complement;;
:return project.setToday(date);;
stop
end
@enduml

