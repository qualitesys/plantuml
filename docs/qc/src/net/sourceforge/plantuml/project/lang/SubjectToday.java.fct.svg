@startuml
!pragma layout smetana
start
note right
IRegextoRegex()
end note
:return new RegexConcat(new RegexLeaf("today"));;
stop
end
start
note right
Failable<Today>getMe(GanttDiagramproject,
RegexResultarg)
end note
:return Failable.ok(new Today());;
stop
end
start
note right
Collection<?  extends SentenceSimple>getSentences()
end note
:return Arrays.asList(new InColor(),new IsDate());;
stop
end
start
note right
constructor InColor()
end note
:super (SubjectToday.this,Verbs.isColored(),
new ComplementInColors());;
end
start
note right
CommandExecutionResultexecute(GanttDiagramproject,
Objectsubject,Objectcomplement)
end note
:final Todaytask=(Today)subject;;
:final CenterBorderColorcolors=(CenterBorderColor)complement;;
:project.setTodayColors(colors);;
:return CommandExecutionResult.ok();;
stop
end
start
note right
constructor IsDate()
end note
:super (SubjectToday.this,Verbs.is(),new ComplementDate());;
end
start
note right
CommandExecutionResultexecute(GanttDiagramproject,
Objectsubject,Objectcomplement)
end note
:final Daydate=(Day)complement;;
:return project.setToday(date);;
stop
end
@enduml

