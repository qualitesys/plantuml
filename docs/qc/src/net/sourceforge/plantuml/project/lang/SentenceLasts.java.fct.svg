@startuml
!pragma layout smetana
start
note right
constructor SentenceLasts()
end note
:super (new SubjectTask(),Verbs.lasts(),new ComplementSeveralDays());;
end
start
note right
CommandExecutionResult execute(GanttDiagram project,
Object subject,Object complement)
end note
:final Task task=(Task )subject;;
:final Load duration=(Load )complement;;
:task.setLoad(duration);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

