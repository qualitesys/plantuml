@startuml
!pragma layout smetana
start
note right
constructor SentenceOccurs()
end note
:super (new SubjectTask(),Verbs.occurs(),
new ComplementFromTo());;
end
start
note right
CommandExecutionResultexecute(GanttDiagramproject,
Objectsubject,Objectcomplement)
end note
:final Tasktask=(Task)subject;;
:final TwoNamesbothNames=(TwoNames)complement;;
:final Stringname1=bothNames.getName1();;
:final Stringname2=bothNames.getName2();;
:final Taskfrom=project.getExistingTask(name1);;
if (from==null ) then (yes) 
:return CommandExecutionResult.error("No such "+
name1+" task");;
stop
endif 
:final Taskto=project.getExistingTask(name2);;
if (to==null ) then (yes) 
:return CommandExecutionResult.error("No such "+
name2+" task");;
stop
endif 
:task.setStart(from.getEnd());;
:task.setEnd(to.getEnd());;
:project.addContraint(new GanttConstraint(project.getIHtmlColorSet(),
project.getCurrentStyleBuilder(),new TaskInstant(from,
TaskAttribute.START),new TaskInstant(task,
TaskAttribute.START)));;
:project.addContraint(new GanttConstraint(project.getIHtmlColorSet(),
project.getCurrentStyleBuilder(),new TaskInstant(to,
TaskAttribute.END),new TaskInstant(task,TaskAttribute.END)));;
:return CommandExecutionResult.ok();;
stop
end
@enduml

