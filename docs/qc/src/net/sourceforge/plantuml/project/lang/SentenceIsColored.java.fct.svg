bb60f1]
@startuml
!pragma layout smetana
start
note right
constructor SentenceIsColored()
end note
:super (new SubjectTask(),Verbs.isColored(),
new ComplementInColors());;
end
start
note right
CommandExecutionResult execute(GanttDiagram project,
Object subject,Object complement)
end note
:final Task task=(Task )subject;;
:final CenterBorderColor colors=(CenterBorderColor )complement;;
:task.setColors(colors);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

