@startuml
!pragma layout smetana
start
note right
constructor SentenceIsColored()
end note
:super (new SubjectTask(),Verbs.isColored(),
new ComplementInColors());;
end
start
note right
CommandExecutionResultexecute(GanttDiagramproject,
Objectsubject,Objectcomplement)
end note
:final Tasktask=(Task)subject;;
:final CenterBorderColorcolors=(CenterBorderColor)complement;;
:task.setColors(colors);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

