@startuml
!pragma layout smetana
start
note right
IRegextoRegex(Stringsuffix)
end note
:return new RegexConcat(new RegexLeaf("COMPLEMENT"+
suffix,"("+DayOfWeek.getRegexString()+")"));;
stop
end
start
note right
Failable<DayOfWeek>getMe(GanttDiagramproject,
RegexResultarg,Stringsuffix)
end note
:final Strings=arg.get("COMPLEMENT"+suffix,0);;
:return Failable.ok(DayOfWeek.fromString(s));;
stop
end
@enduml

