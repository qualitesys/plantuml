@startuml
!pragma layout smetana
start
note right
constructor SentencePausesDayOfWeek()
end note
:super (new SubjectTask(),Verbs.pauses(),
new ComplementDayOfWeek());;
end
start
note right
CommandExecutionResult execute(GanttDiagram project,
Object subject,Object complement)
end note
:final Task task=(Task )subject;;
:final DayOfWeek pause=(DayOfWeek )complement;;
:task.addPause(pause);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

