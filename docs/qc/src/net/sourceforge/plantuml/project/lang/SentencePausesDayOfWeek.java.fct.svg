@startuml
!pragma layout smetana
start
note right
constructor SentencePausesDayOfWeek()
end note
:super (new SubjectTask(),Verbs.pauses(),
new ComplementDayOfWeek());;
end
start
note right
CommandExecutionResultexecute(GanttDiagramproject,
Objectsubject,Objectcomplement)
end note
:final Tasktask=(Task)subject;;
:final DayOfWeekpause=(DayOfWeek)complement;;
:task.addPause(pause);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

