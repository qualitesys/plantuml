49.1484,200.5,439.1484,196.5,443.1484" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[b8aa765a9db98538ad5fb01e4d652d3d]
@startuml
!pragma layout smetana
start
note right
IRegex toRegex(String suffix)
end note
:return new RegexLeaf("COMPLEMENT"+suffix,"from[%s]+
\\[([^\\[\\]]+)\\][%s]+to[%s]+\\[([^\\[\\]]+
)\\]");;
stop
end
start
note right
Failable<TwoNames> getMe(GanttDiagram system,
RegexResult arg,String suffix)
end note
:final String name1=arg.get("COMPLEMENT"+
suffix,0);;
:final String name2=arg.get("COMPLEMENT"+
suffix,1);;
:return Failable.ok(new TwoNames(name1,name2));;
stop
end
@enduml

