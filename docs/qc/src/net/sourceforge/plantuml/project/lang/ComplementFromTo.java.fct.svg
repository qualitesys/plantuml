@startuml
!pragma layout smetana
start
note right
IRegextoRegex(Stringsuffix)
end note
:return new RegexLeaf("COMPLEMENT"+suffix,"from[%s]+
\\[([^\\[\\]]+)\\][%s]+to[%s]+\\[([^\\[\\]]+
)\\]");;
stop
end
start
note right
Failable<TwoNames>getMe(GanttDiagramsystem,
RegexResultarg,Stringsuffix)
end note
:final Stringname1=arg.get("COMPLEMENT"+suffix,0);;
:final Stringname2=arg.get("COMPLEMENT"+suffix,1);;
:return Failable.ok(new TwoNames(name1,name2));;
stop
end
@enduml

