@startuml
!pragma layout smetana
start
note right
constructor SentenceTaskStarts()
end note
:super (new SubjectTask(),Verbs.starts2(),
new ComplementBeforeOrAfterOrAtTaskStartOrEnd());;
end
start
note right
CommandExecutionResult execute(GanttDiagram project,
Object subject,Object complement)
end note
:final Task task=(Task )subject;;
:final TaskInstant when;;
:HColor color=null ;;
:when=(TaskInstant )complement;;
:task.setStart(when.getInstantPrecise());;
if (when.isTask()) then (yes) 
:project.addContraint(new GanttConstraint(project.getIHtmlColorSet(),
project.getCurrentStyleBuilder(),when,new TaskInstant(task,
TaskAttribute.START),color));;
endif 
:return CommandExecutionResult.ok();;
stop
end
@enduml

