@startuml
!pragma layout smetana
start
note right
IRegex toRegex()
end note
:return new RegexLeaf("SUBJECT","links?");;
stop
end
start
note right
Failable<GanttDiagram> getMe(GanttDiagram project,
RegexResult arg)
end note
:return Failable.ok(project);;
stop
end
start
note right
Collection<?extendsSentenceSimple> getSentences()
end note
:return Arrays.asList(new InColor());;
stop
end
start
note right
constructor InColor()
end note
:super (SubjectLinks.this,Verbs.areColored(),
new ComplementInColors());;
end
start
note right
CommandExecutionResult execute(GanttDiagram project,
Object subject,Object complement)
end note
:final CenterBorderColor colors=(CenterBorderColor )complement;;
:return CommandExecutionResult.ok();;
stop
end
@enduml

