@startuml
!pragma layout smetana
start
note right
IRegextoRegex()
end note
:return new RegexLeaf("SUBJECT","links?");;
stop
end
start
note right
Failable<GanttDiagram>getMe(GanttDiagramproject,
RegexResultarg)
end note
:return Failable.ok(project);;
stop
end
start
note right
Collection<?  extends SentenceSimple>getSentences()
end note
:return Arrays.asList(new InColor());;
stop
end
start
note right
constructor InColor()
end note
:super (SubjectLinks.this,Verbs.areColored(),
new ComplementInColors());;
end
start
note right
CommandExecutionResultexecute(GanttDiagramproject,
Objectsubject,Objectcomplement)
end note
:final CenterBorderColorcolors=(CenterBorderColor)complement;;
:return CommandExecutionResult.ok();;
stop
end
@enduml

