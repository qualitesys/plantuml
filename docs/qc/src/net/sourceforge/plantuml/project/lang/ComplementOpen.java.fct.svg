-width:1.0;" x1="364.5" x2="228.5" y1="616.0977" y2="616.0977"/><line style="stroke:#181818;stroke-width:1.0;" x1="228.5" x2="228.5" y1="616.0977" y2="636.0977"/><polygon fill="#181818" points="224.5,626.0977,228.5,636.0977,232.5,626.0977,228.5,630.0977" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="228.5" x2="228.5" y1="333.2734" y2="353.2734"/><polygon fill="#181818" points="224.5,343.2734,228.5,353.2734,232.5,343.2734,228.5,347.2734" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="228.5" x2="228.5" y1="670.0664" y2="690.0664"/><polygon fill="#181818" points="224.5,680.0664,228.5,690.0664,232.5,680.0664,228.5,684.0664" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[c0af6cf4a265ee411b96f716c350f64e]
@startuml
!pragma layout smetana
start
note right
IRegex toRegex(String suffix)
end note
:return new RegexLeaf("OPEN"+suffix,"(opene?d?(?: for \\[([^\\[\\]]+
?)\\])?)");;
stop
end
start
note right
Failable<String> getMe(GanttDiagram project,
RegexResult arg,String suffix)
end note
:final String value=arg.get("OPEN"+suffix,0);;
:final int x=value.indexOf('[');;
if (x>0) then (yes) 
:final int y=value.lastIndexOf(']');;
:final String s=value.substring(x+1,y);;
:return Failable.ok(s);;
stop
endif 
:return Failable.ok("");;
stop
end
@enduml

