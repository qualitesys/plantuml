@startuml
!pragma layout smetana
start
note right
IRegextoRegex(Stringsuffix)
end note
:return new RegexLeaf("COMPLEMENT"+suffix,"\\[([^\\[\\]]+
)\\]");;
stop
end
start
note right
Failable<String>getMe(GanttDiagramsystem,
RegexResultarg,Stringsuffix)
end note
:final Stringname=arg.get("COMPLEMENT"+suffix,0);;
:return Failable.ok(name);;
stop
end
@enduml

