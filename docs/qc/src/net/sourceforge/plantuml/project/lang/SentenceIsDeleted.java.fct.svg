@startuml
!pragma layout smetana
start
note right
constructor SentenceIsDeleted()
end note
:super (new SubjectTask(),Verbs.isDeleted(),
new ComplementEmpty());;
end
start
note right
CommandExecutionResultexecute(GanttDiagramproject,
Objectsubject,Objectcomplement)
end note
:final Tasktask=(Task)subject;;
:return project.deleteTask(task);;
stop
end
@enduml

