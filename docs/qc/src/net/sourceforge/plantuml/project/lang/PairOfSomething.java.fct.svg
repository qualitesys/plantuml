5,1045.0938" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="248.5" x2="248.5" y1="1099.0313" y2="1119.0313"/><polygon fill="#181818" points="244.5,1109.0313,248.5,1119.0313,252.5,1109.0313,248.5,1113.0313" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="248.5" x2="248.5" y1="1166.9688" y2="1186.9688"/><polygon fill="#181818" points="244.5,1176.9688,248.5,1186.9688,252.5,1176.9688,248.5,1180.9688" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[ee658cb8e066c362ef770a31f1fc0e66]
@startuml
!pragma layout smetana
start
note right
constructor PairOfSomething(Something complement1,
Something complement2)
end note
:this.complement1=complement1;;
:this.complement2=complement2;;
end
start
note right
Failable<?extendsObject> getMe(GanttDiagram system,
RegexResult arg,String suffix)
end note
:final Failable<?extendsObject> r1=complement1.getMe(system,arg,"A"+
suffix);;
:final Failable<?extendsObject> r2=complement2.getMe(system,arg,"B"+
suffix);;
if (r1.isFail()) then (yes) 
:return r1;;
stop
endif 
if (r2.isFail()) then (yes) 
:return r2;;
stop
endif 
:final Object[] result=new Object[]{r1.get(),
r2.get()};;
:return Failable.ok(result);;
stop
end
start
note right
IRegex toRegex(String suffix)
end note
:final IRegex pattern1=complement1.toRegex("A"+
suffix);;
:final IRegex pattern2=complement2.toRegex("B"+
suffix);;
:return new RegexConcat(pattern1,new RegexLeaf("[%s]+
"),pattern2);;
stop
end
@enduml

