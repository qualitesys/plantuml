@startuml
!pragma layout smetana
start
note right
constructor PairOfSomething(Somethingcomplement1,
Somethingcomplement2)
end note
:this.complement1=complement1;;
:this.complement2=complement2;;
end
start
note right
Failable<?  extends Object>getMe(GanttDiagramsystem,
RegexResultarg,Stringsuffix)
end note
:final Failable<?  extends Object>r1=complement1.getMe(system,arg,"A"+
suffix);;
:final Failable<?  extends Object>r2=complement2.getMe(system,arg,"B"+
suffix);;
if (r1.isFail()) then (yes) 
:return r1;;
stop
endif 
if (r2.isFail()) then (yes) 
:return r2;;
stop
endif 
:final Object[]result=new Object[]{r1.get(),
r2.get()};;
:return Failable.ok(result);;
stop
end
start
note right
IRegextoRegex(Stringsuffix)
end note
:final IRegexpattern1=complement1.toRegex("A"+
suffix);;
:final IRegexpattern2=complement2.toRegex("B"+
suffix);;
:return new RegexConcat(pattern1,new RegexLeaf("[%s]+
"),pattern2);;
stop
end
@enduml

