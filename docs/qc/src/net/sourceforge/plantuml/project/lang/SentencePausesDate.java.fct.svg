@startuml
!pragma layout smetana
start
note right
constructor SentencePausesDate()
end note
:super (new SubjectTask(),Verbs.pauses(),
new ComplementDate());;
end
start
note right
CommandExecutionResultexecute(GanttDiagramproject,
Objectsubject,Objectcomplement)
end note
:final Tasktask=(Task)subject;;
:final Daypause=(Day)complement;;
:task.addPause(pause);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

