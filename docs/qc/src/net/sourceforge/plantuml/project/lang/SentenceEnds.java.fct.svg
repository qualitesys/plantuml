@startuml
!pragma layout smetana
start
note right
constructor SentenceEnds()
end note
:super (new SubjectTask(),Verbs.ends(),new ComplementBeforeOrAfterOrAtTaskStartOrEnd());;
end
start
note right
CommandExecutionResult execute(GanttDiagram project,
Object subject,Object complement)
end note
:final Task task=(Task )subject;;
:final TaskInstant when=(TaskInstant )complement;;
:task.setEnd(when.getInstantPrecise().decrement());;
:project.addContraint(new GanttConstraint(project.getIHtmlColorSet(),
project.getCurrentStyleBuilder(),when,new TaskInstant(task,
TaskAttribute.END)));;
:return CommandExecutionResult.ok();;
stop
end
@enduml

