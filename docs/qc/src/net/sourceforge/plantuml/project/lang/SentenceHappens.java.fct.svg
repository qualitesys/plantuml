@startuml
!pragma layout smetana
start
note right
constructor SentenceHappens()
end note
:super (new SubjectTask(),Verbs.happens(),
new ComplementBeforeOrAfterOrAtTaskStartOrEnd());;
end
start
note right
CommandExecutionResult execute(GanttDiagram project,
Object subject,Object complement)
end note
:final Task task=(Task )subject;;
:task.setLoad(Load.inWinks(1));;
:final TaskInstant when=(TaskInstant )complement;;
:task.setStart(when.getInstantTheorical());;
:task.setDiamond(true);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

