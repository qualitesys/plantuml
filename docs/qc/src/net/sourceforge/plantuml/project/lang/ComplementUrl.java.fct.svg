1797,205,425.1797,201,429.1797" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="201" x2="201" y1="469.1484" y2="489.1484"/><polygon fill="#181818" points="197,479.1484,201,489.1484,205,479.1484,201,483.1484" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[6bbe9e86a07e49046ec3715b2f1c3e24]
@startuml
!pragma layout smetana
start
note right
IRegex toRegex(String suffix)
end note
:return new RegexConcat(new RegexLeaf("COMPLEMENT"+
suffix,"("+UrlBuilder.getRegexp()+")"));;
stop
end
start
note right
Failable<Url> getMe(GanttDiagram diagram,
RegexResult arg,String suffix)
end note
:final String urlString=arg.get("COMPLEMENT"+
suffix,0);;
:final UrlBuilder urlBuilder=new UrlBuilder("",
UrlMode.STRICT);;
:final Url url=urlBuilder.getUrl(urlString);;
:return Failable.ok(url);;
stop
end
@enduml

