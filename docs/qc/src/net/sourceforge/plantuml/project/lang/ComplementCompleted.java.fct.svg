@startuml
!pragma layout smetana
start
note right
IRegex toRegex(String suffix)
end note
:return new RegexLeaf("COMPLEMENT"+suffix,"(\\d+
).*completed?");;
stop
end
start
note right
Failable<Completion> getMe(GanttDiagram system,
RegexResult arg,String suffix)
end note
:final String value=arg.get("COMPLEMENT"+
suffix,0);;
:return Failable.ok(new Completion(Integer.parseInt(value)));;
stop
end
@enduml

