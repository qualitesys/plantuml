@startuml
!pragma layout smetana
start
note right
IRegextoRegex(Stringsuffix)
end note
:return new RegexLeaf("COMPLEMENT"+suffix,"(\\d+
).*completed?");;
stop
end
start
note right
Failable<Completion>getMe(GanttDiagramsystem,
RegexResultarg,Stringsuffix)
end note
:final Stringvalue=arg.get("COMPLEMENT"+suffix,0);;
:return Failable.ok(new Completion(Integer.parseInt(value)));;
stop
end
@enduml

