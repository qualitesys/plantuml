@startuml
!pragma layout smetana
start
note right
constructor SentencePausesDates()
end note
:super (new SubjectTask(),Verbs.pauses(),
new ComplementDates());;
end
start
note right
CommandExecutionResultexecute(GanttDiagramproject,
Objectsubject,Objectcomplement)
end note
:final Tasktask=(Task)subject;;
:final DaysAsDatespauses=(DaysAsDates)complement;;
:task.addPause(day);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

