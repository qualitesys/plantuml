#181818;stroke-width:1.0;" x1="201" x2="201" y1="801.9102" y2="821.9102"/><polygon fill="#181818" points="197,811.9102,201,821.9102,205,811.9102,201,815.9102" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[1c38d29015f4896f821505255d4aec86]
@startuml
!pragma layout smetana
start
note right
IRegextoRegex(Stringsuffix)
end note
:return new RegexConcat(new RegexLeaf("COMPLEMENT"+
suffix,"(\\d+)[%s]+(day|week)s?"+"(?:[%s]+
and[%s]+(\\d+)[%s]+(day|week)s?)?"));;
stop
end
start
note right
Failable<Load>getMe(GanttDiagramsystem,RegexResultarg,
Stringsuffix)
end note
:final Stringnb1=arg.get("COMPLEMENT"+suffix,0);;
:final intfactor1=arg.get("COMPLEMENT"+suffix,
1).startsWith("w")? system.daysInWeek():1;;
:final intdays1=Integer.parseInt(nb1)*factor1;;
:final Stringnb2=arg.get("COMPLEMENT"+suffix,2);;
:intdays2=0;;
if (nb2!=null ) then (yes) 
:final intfactor2=arg.get("COMPLEMENT"+suffix,
3).startsWith("w")? system.daysInWeek():1;;
:days2=Integer.parseInt(nb2)*factor2;;
endif 
:return Failable.ok(Load.inWinks(days1+days2));;
stop
end
@enduml

