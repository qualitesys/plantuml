03.5,383.5703" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[79699ec9a21cc02c154cf06271965ccd]
@startuml
!pragma layout smetana
start
note right
constructor PlanUtils()
end note
end
start
note right
LoadPlanable minOf(final LoadPlanable p1,
final LoadPlanable p2)
end note
:return new LoadPlanable(){public int getLoadAt(Day instant){return Math.min(p1.getLoadAt(instant),
p2.getLoadAt(instant));}};;
stop
end
start
note right
LoadPlanable multiply(final LoadPlanable p1,
final LoadPlanable p2)
end note
:return new LoadPlanable(){public int getLoadAt(Day instant){return p1.getLoadAt(instant)*p2.getLoadAt(instant)/100;}};;
stop
end
@enduml

