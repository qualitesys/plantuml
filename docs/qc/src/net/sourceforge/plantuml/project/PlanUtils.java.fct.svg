@startuml
!pragma layout smetana
start
note right
constructor PlanUtils()
end note
end
start
note right
LoadPlanableminOf(final LoadPlanablep1,final LoadPlanablep2)
end note
:return new LoadPlanable(){public intgetLoadAt(Dayinstant){return Math.min(p1.getLoadAt(instant),
p2.getLoadAt(instant));}};;
stop
end
start
note right
LoadPlanablemultiply(final LoadPlanablep1,
final LoadPlanablep2)
end note
:return new LoadPlanable(){public intgetLoadAt(Dayinstant){return p1.getLoadAt(instant)*p2.getLoadAt(instant)/100;}};;
stop
end
@enduml

