@startuml
!pragma layout smetana
start
note right
constructor TimeScaleWink(double scale,PrintScale printScale)
end note
:this.scale=16.0*scale;;
:this.printScale=printScale;;
end
start
note right
double getStartingPosition(Day instant)
end note
:final long wink=instant.getMillis();;
:return wink*scale/Day.MILLISECONDS_PER_DAY;;
stop
end
start
note right
double getEndingPosition(Day instant)
end note
:return getStartingPosition(instant)+getWidth(instant);;
stop
end
start
note right
double getWidth(Day instant)
end note
:return scale;;
stop
end
start
note right
boolean isBreaking(Day instant)
end note
if (printScale==PrintScale.WEEKLY) then (yes) 
:final long num=instant.getMillis()/Day.MILLISECONDS_PER_DAY;;
:return num%7==6;;
stop
endif 
:return true;;
stop
end
@enduml

