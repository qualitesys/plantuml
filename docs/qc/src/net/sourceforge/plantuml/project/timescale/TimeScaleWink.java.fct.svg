@startuml
!pragma layout smetana
start
note right
constructor TimeScaleWink(doublescale,PrintScaleprintScale)
end note
:this.scale=16.0*scale;;
:this.printScale=printScale;;
end
start
note right
doublegetStartingPosition(Dayinstant)
end note
:final longwink=instant.getMillis();;
:return wink*scale/Day.MILLISECONDS_PER_DAY;;
stop
end
start
note right
doublegetEndingPosition(Dayinstant)
end note
:return getStartingPosition(instant)+getWidth(instant);;
stop
end
start
note right
doublegetWidth(Dayinstant)
end note
:return scale;;
stop
end
start
note right
booleanisBreaking(Dayinstant)
end note
if (printScale==PrintScale.WEEKLY) then (yes) 
:final longnum=instant.getMillis()/Day.MILLISECONDS_PER_DAY;;
:return num%7==6;;
stop
endif 
:return true;;
stop
end
@enduml

