@startuml
!pragma layout smetana
start
note right
constructor TimeScaleCompressed(Daycalendar,
doublescale)
end note
:this.daily=new TimeScaleDaily(calendar,scale,
null );;
end
start
note right
doublegetStartingPosition(Dayinstant)
end note
:return daily.getStartingPosition(instant);;
stop
end
start
note right
doublegetEndingPosition(Dayinstant)
end note
:return daily.getEndingPosition(instant);;
stop
end
start
note right
doublegetWidth(Dayinstant)
end note
:return daily.getWidth(instant);;
stop
end
start
note right
booleanisBreaking(Dayinstant)
end note
:return instant.getDayOfWeek()==DayOfWeek.SUNDAY;;
stop
end
@enduml

