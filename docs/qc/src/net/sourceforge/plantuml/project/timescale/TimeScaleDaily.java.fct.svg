@startuml
!pragma layout smetana
start
note right
constructor TimeScaleDaily(DaystartingDay,
doublescale,DayzeroDay)
end note
:this.basic=new TimeScaleWink(scale,PrintScale.DAILY);;
if (zeroDay==null ) then (yes) 
:this.delta=basic.getStartingPosition(startingDay);;
else (no)
:this.delta=basic.getStartingPosition(zeroDay);;
endif 
end
start
note right
doublegetStartingPosition(Dayinstant)
end note
:return basic.getStartingPosition(instant)-delta;;
stop
end
start
note right
doublegetEndingPosition(Dayinstant)
end note
:return basic.getEndingPosition(instant)-delta;;
stop
end
start
note right
doublegetWidth(Dayinstant)
end note
:return basic.getWidth(instant);;
stop
end
start
note right
booleanisBreaking(Dayinstant)
end note
:return true;;
stop
end
@enduml

