@startuml
!pragma layout smetana
start
note right
long getNext(long moment)
end note
if (e>moment) then (yes) 
:return e;;
stop
endif 
:return TimeLine.MAX_TIME;;
stop
end
start
note right
long getPrevious(long moment)
end note
:long last=-TimeLine.MAX_TIME;;
if (e>=moment) then (yes) 
:return last;;
stop
endif 
:last=e;;
:return last;;
stop
end
start
note right
void add(long event)
end note
:this.events.add(event);;
:Collections.sort(events);;
end
@enduml

