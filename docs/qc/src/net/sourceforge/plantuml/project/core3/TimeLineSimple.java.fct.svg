@startuml
!pragma layout smetana
start
note right
longgetNext(longmoment)
end note
if (e>moment) then (yes) 
:return e;;
stop
endif 
:return TimeLine.MAX_TIME;;
stop
end
start
note right
longgetPrevious(longmoment)
end note
:longlast=-TimeLine.MAX_TIME;;
if (e>=moment) then (yes) 
:return last;;
stop
endif 
:last=e;;
:return last;;
stop
end
start
note right
void add(longevent)
end note
:this.events.add(event);;
:Collections.sort(events);;
end
@enduml

