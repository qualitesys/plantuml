@startuml
!pragma layout smetana
start
note right
longgetNext(longmoment)
end note
if (e>moment) then (yes) 
:return e;;
stop
endif 
:return TimeLine.MAX_TIME;;
stop
end
start
note right
longgetPrevious(longmoment)
end note
:longlast=-TimeLine.MAX_TIME;;
if (e>=moment) then (yes) 
:return last;;
stop
endif 
:last=e;;
:return last;;
stop
end
start
note right
void put(longevent,longvalue)
end note
:this.events.put(event,value);;
end
start
note right
StringtoString()
end note
:return events.toString();;
stop
end
start
note right
longgetValueAt(longmoment)
end note
:longlast=0;;
if (ent.getKey()>moment) then (yes) 
:return last;;
stop
endif 
:last=ent.getValue();;
:return last;;
stop
end
@enduml

