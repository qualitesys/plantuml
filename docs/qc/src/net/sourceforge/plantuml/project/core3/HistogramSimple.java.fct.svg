@startuml
!pragma layout smetana
start
note right
long getNext(long moment)
end note
if (e>moment) then (yes) 
:return e;;
stop
endif 
:return TimeLine.MAX_TIME;;
stop
end
start
note right
long getPrevious(long moment)
end note
:long last=-TimeLine.MAX_TIME;;
if (e>=moment) then (yes) 
:return last;;
stop
endif 
:last=e;;
:return last;;
stop
end
start
note right
void put(long event,long value)
end note
:this.events.put(event,value);;
end
start
note right
String toString()
end note
:return events.toString();;
stop
end
start
note right
long getValueAt(long moment)
end note
:long last=0;;
if (ent.getKey()>moment) then (yes) 
:return last;;
stop
endif 
:last=ent.getValue();;
:return last;;
stop
end
@enduml

