@startuml
!pragma layout smetana
start
note right
Instantcreate(longms)
end note
:return new Instant(ms);;
stop
end
start
note right
Instanttoday()
end note
:return create(System.currentTimeMillis());;
stop
end
start
note right
constructor Instant(longms)
end note
:this.ms=ms;;
end
start
note right
longgetMillis()
end note
:return ms;;
stop
end
start
note right
StringtoString()
end note
:return ""+ms;;
stop
end
start
note right
inthashCode()
end note
:return toLong().hashCode();;
stop
end
start
note right
LongtoLong()
end note
:return Long.valueOf(ms);;
stop
end
start
note right
booleanequals(Objectobj)
end note
:final Instantother=(Instant)obj;;
:return this.ms==other.ms;;
stop
end
start
note right
intcompareTo(Instantother)
end note
:return toLong().compareTo(other.toLong());;
stop
end
@enduml

