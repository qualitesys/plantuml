@startuml
!pragma layout smetana
start
note right
constructor WeekNumberStrategy(DayOfWeekfirstDayOfWeek,
intminimalDaysInFirstWeek)
end note
:this.firstDayOfWeek=firstDayOfWeek;;
:this.minimalDaysInFirstWeek=minimalDaysInFirstWeek;;
end
start
note right
intgetFirstDayOfWeekAsLegacyInt()
end note
:return firstDayOfWeek.getLegacyJavaValue();;
stop
end
start
note right
intgetMinimalDaysInFirstWeek()
end note
:return minimalDaysInFirstWeek;;
stop
end
start
note right
DayOfWeekgetFirstDayOfWeek()
end note
:return firstDayOfWeek;;
stop
end
@enduml

