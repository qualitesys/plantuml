@startuml
!pragma layout smetana
start
note right
constructor Load(intwinks)
end note
:this.winks=winks;;
end
start
note right
LoadinWinks(intwinks)
end note
:return new Load(winks);;
stop
end
start
note right
intgetFullLoad()
end note
:return winks*100;;
stop
end
start
note right
StringtoString()
end note
:return "("+winks+")";;
stop
end
@enduml

