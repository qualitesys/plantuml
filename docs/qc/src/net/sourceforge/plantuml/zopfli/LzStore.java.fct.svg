@startuml
!pragma layout smetana
start
note right
constructor LzStore(final intmaxBlockSize)
end note
:litLens=new char[maxBlockSize];;
:dists=new char[maxBlockSize];;
end
start
note right
void append(final charlength,final chardist)
end note
:litLens[size]=length;;
:dists[size++]=dist;;
end
start
note right
void reset()
end note
:size=0;;
end
start
note right
void copy(final LzStoresource)
end note
:size=source.size;;
:System.arraycopy(source.litLens,0,litLens,
0,size);;
:System.arraycopy(source.dists,0,dists,0,
size);;
end
@enduml

