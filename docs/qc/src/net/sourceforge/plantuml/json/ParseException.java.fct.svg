@startuml
!pragma layout smetana
start
note right
constructor ParseException(String message,
Location location)
end note
:super (message+" at "+location);;
:this.location=location;;
end
start
note right
Location getLocation()
end note
:return location;;
stop
end
start
note right
int getOffset()
end note
:return location.offset;;
stop
end
start
note right
int getLine()
end note
:return location.line;;
stop
end
start
note right
int getColumn()
end note
:return location.column;;
stop
end
@enduml

