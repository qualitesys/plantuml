@startuml
!pragma layout smetana
start
note right
constructor Location(intoffset,intline,intcolumn)
end note
:this.offset=offset;;
:this.column=column;;
:this.line=line;;
end
start
note right
StringtoString()
end note
:return line+":"+column;;
stop
end
start
note right
inthashCode()
end note
:return offset;;
stop
end
start
note right
booleanequals(Objectobj)
end note
if (this==obj) then (yes) 
:return true;;
stop
endif 
if (obj==null ) then (yes) 
:return false;;
stop
endif 
if (getClass()!=obj.getClass()) then (yes) 
:return false;;
stop
endif 
:Locationother=(Location)obj;;
:return offset==other.offset&&column==other.column&&line==other.line;;
stop
end
@enduml

