@startuml
!pragma layout smetana
start
note right
constructor Location(int offset,int line,
int column)
end note
:this.offset=offset;;
:this.column=column;;
:this.line=line;;
end
start
note right
String toString()
end note
:return line+":"+column;;
stop
end
start
note right
int hashCode()
end note
:return offset;;
stop
end
start
note right
boolean equals(Object obj)
end note
if (this==obj) then (yes) 
:return true;;
stop
endif 
if (obj==null ) then (yes) 
:return false;;
stop
endif 
if (getClass()!=obj.getClass()) then (yes) 
:return false;;
stop
endif 
:Location other=(Location )obj;;
:return offset==other.offset&&column==other.column&&line==other.line;;
stop
end
@enduml

