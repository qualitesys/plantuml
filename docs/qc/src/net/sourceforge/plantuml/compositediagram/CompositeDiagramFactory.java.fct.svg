@startuml
!pragma layout smetana
start
note right
constructor CompositeDiagramFactory(ISkinSimpleskinParam)
end note
:this.skinParam=skinParam;;
end
start
note right
List<Command>createCommands()
end note
:final List<Command>cmds=new ArrayList<>();;
:cmds.add(new CommandCreateBlock());;
:cmds.add(new CommandLinkBlock());;
:cmds.add(new CommandCreatePackageBlock());;
:cmds.add(new CommandEndPackageBlock());;
:CommonCommands.addCommonCommands1(cmds);;
:return cmds;;
stop
end
start
note right
CompositeDiagramcreateEmptyDiagram(UmlSourcesource,
Map<String,String>skinParam)
end note
:return new CompositeDiagram(source,skinParam);;
stop
end
@enduml

