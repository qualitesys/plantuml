@startuml
!pragma layout smetana
start
note right
constructor CompositeDiagram(UmlSource source,
Map<String,String> skinParam)
end note
:super (source,UmlDiagramType.COMPOSITE,skinParam);;
end
start
note right
IEntity getOrCreateLeaf(Ident ident,Code code,
LeafType type,USymbol symbol)
end note
:Objects.requireNonNull(ident);;
if (type==null ) then (yes) 
if (isGroup(code)) then (yes) 
:return getGroup(code);;
stop
endif 
:return getOrCreateLeafDefault(ident,code,
LeafType.BLOCK,symbol);;
stop
endif 
:return getOrCreateLeafDefault(ident,code,
type,symbol);;
stop
end
@enduml

