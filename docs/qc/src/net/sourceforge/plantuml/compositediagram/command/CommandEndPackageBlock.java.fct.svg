@startuml
!pragma layout smetana
start
note right
constructor CommandEndPackageBlock()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandEndPackageBlock.class .getName(),
RegexLeaf.start(),new RegexLeaf("(end[%s]?block|\\})"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(CompositeDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:final IEntitycurrentPackage=diagram.getCurrentGroup();;
if (currentPackage==null ) then (yes) 
:return CommandExecutionResult.error("No inner block defined");;
stop
endif 
:diagram.endGroup();;
:return CommandExecutionResult.ok();;
stop
end
@enduml

