@startuml
!pragma layout smetana
start
note right
constructor CommandCreatePackageBlock()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandCreatePackageBlock.class .getName(),
RegexLeaf.start(),new RegexLeaf("block"),RegexLeaf.spaceOneOrMore(),new RegexOptional(new RegexConcat(new RegexLeaf("DISPLAY","[%g]([^%g]+
)[%g]"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("as"),RegexLeaf.spaceOneOrMore())),new RegexLeaf("CODE","([%pLN_.]+
)"),new RegexLeaf("(?:[%s]*\\{|[%s]+begin)"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(CompositeDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final IGroup currentPackage=diagram.getCurrentGroup();;
:String display=arg.get("DISPLAY",0);;
:final String idShort=arg.get("CODE",0);;
:final Code code=diagram.buildCode(idShort);;
if (display==null ) then (yes) 
:display=code.getName();;
endif 
:final Ident idNewLong=diagram.buildLeafIdent(idShort);;
:diagram.gotoGroup(idNewLong,code,Display.getWithNewlines(display),
GroupType.PACKAGE,currentPackage,NamespaceStrategy.SINGLE);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

