@startuml
!pragma layout smetana
start
note right
DotPathgetRacordIn(XRectangle2Drect,XLine2Dtangeante)
end note
:final DotPathresult=new DotPath();;
:final XPoint2Dcenter=new XPoint2D(rect.getCenterX(),
rect.getCenterY());;
:final XLine2Dline=new XLine2D(tangeante.getP1(),
center);;
:final XPoint2Dinter=BezierUtils.intersect(line,
rect);;
:final XCubicCurve2Dcurv=new XCubicCurve2D(line.getX1(),
line.getY1(),line.getX1(),line.getY1(),inter.getX(),
inter.getY(),inter.getX(),inter.getY());;
:return result.addAfter(curv);;
stop
end
@enduml

