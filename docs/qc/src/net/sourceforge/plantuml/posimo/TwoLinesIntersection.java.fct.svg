ke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="170.5" x2="170.5" y1="751.8594" y2="771.8594"/><polygon fill="#181818" points="166.5,761.8594,170.5,771.8594,174.5,761.8594,170.5,765.8594" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="170.5" x2="170.5" y1="805.8281" y2="825.8281"/><polygon fill="#181818" points="166.5,815.8281,170.5,825.8281,174.5,815.8281,170.5,819.8281" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="170.5" x2="170.5" y1="878.3945" y2="900.9609"/><polygon fill="#181818" points="166.5,890.9609,170.5,900.9609,174.5,890.9609,170.5,894.9609" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="170.5" x2="170.5" y1="934.9297" y2="954.9297"/><polygon fill="#181818" points="166.5,944.9297,170.5,954.9297,174.5,944.9297,170.5,948.9297" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[162432002f414f7ef4fd8f98dd39f8f8]
@startuml
!pragma layout smetana
start
note right
constructor TwoLinesIntersection(Line2D lineA,
Line2D lineB)
end note
:final double x1=lineA.getX1();;
:final double y1=lineA.getY1();;
:final double x2=lineA.getX2();;
:final double y2=lineA.getY2();;
:final double x3=lineB.getX1();;
:final double y3=lineB.getY1();;
:final double x4=lineB.getX2();;
:final double y4=lineB.getY2();;
:final double den=(y4-y3)*(x2-x1)-(x4-x3)*(y2-y1);;
:final double uA1=(x4-x3)*(y1-y3)-(y4-y3)*(x1-x3);;
:final double uA=uA1/den;;
:final double x=x1+uA*(x2-x1);;
:final double y=y1+uA*(y2-y1);;
:inter=new XPoint2D(x,y);;
end
start
note right
XPoint2D getIntersection()
end note
:return inter;;
stop
end
@enduml

