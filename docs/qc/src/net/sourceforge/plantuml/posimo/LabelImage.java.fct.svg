@startuml
!pragma layout smetana
start
note right
constructor LabelImage(Linklink,Roserose,
ISkinParamparam)
end note
:Objects.requireNonNull(link);;
:this.param=param;;
:this.rose=rose;;
:throw new UnsupportedOperationException();;
stop
end
start
note right
XDimension2DgetDimension(StringBounderstringBounder)
end note
:final XDimension2Ddim=name.calculateDimension(stringBounder);;
:return dim;;
stop
end
start
note right
void drawU(UGraphicug,doublex,doubley)
end note
:name.drawU(ug.apply(new UTranslate(x,y)));;
end
@enduml

