@startuml
!pragma layout smetana
start
note right
constructor LabelImage(Link link,Rose rose,
ISkinParam param)
end note
:Objects.requireNonNull(link);;
:this.param=param;;
:this.rose=rose;;
:throw new UnsupportedOperationException();;
stop
end
start
note right
XDimension2D getDimension(StringBounder stringBounder)
end note
:final XDimension2D dim=name.calculateDimension(stringBounder);;
:return dim;;
stop
end
start
note right
void drawU(UGraphic ug,double x,double y)
end note
:name.drawU(ug.apply(new UTranslate(x,y)));;
end
@enduml

