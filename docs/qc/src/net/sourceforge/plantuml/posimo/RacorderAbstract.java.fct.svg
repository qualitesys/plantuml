@startuml
!pragma layout smetana
start
note right
DotPathgetRacordOut(XRectangle2Drect,XLine2Dtangeante)
end note
:tangeante=symetric(tangeante);;
:return getRacordIn(rect,tangeante).reverse();;
stop
end
start
note right
XLine2Dsymetric(XLine2Dline)
end note
:final doublex1=line.getX1();;
:final doubley1=line.getY1();;
:final doublex2=line.getX2();;
:final doubley2=line.getY2();;
:final doubledx=x2-x1;;
:final doubledy=y2-y1;;
:return new XLine2D(x1,y1,x1-dx,y1-dy);;
stop
end
@enduml

