@startuml
!pragma layout smetana
start
note right
DotPath getRacordIn(XRectangle2D rect,XLine2D tangeante)
end note
:final DotPath result=new DotPath();;
:XPoint2D inter=new LineRectIntersection(tangeante,
rect).getIntersection();;
if (inter==null ) then (yes) 
:final XPoint2D p1=new XPoint2D(rect.getMinX(),
rect.getMinY());;
:final XPoint2D p2=new XPoint2D(rect.getMaxX(),
rect.getMinY());;
:final XPoint2D p3=new XPoint2D(rect.getMaxX(),
rect.getMaxY());;
:final XPoint2D p4=new XPoint2D(rect.getMinX(),
rect.getMaxY());;
:inter=LineRectIntersection.getCloser(tangeante.getP1(),
p1,p2,p3,p4);;
endif 
:final XCubicCurve2D curv=new XCubicCurve2D(tangeante.getX1(),
tangeante.getY1(),tangeante.getX1(),tangeante.getY1(),
inter.getX(),inter.getY(),inter.getX(),inter.getY());;
:return result.addAfter(curv);;
stop
end
@enduml

