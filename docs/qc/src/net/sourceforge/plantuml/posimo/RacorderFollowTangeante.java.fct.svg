@startuml
!pragma layout smetana
start
note right
DotPathgetRacordIn(XRectangle2Drect,XLine2Dtangeante)
end note
:final DotPathresult=new DotPath();;
:XPoint2Dinter=new LineRectIntersection(tangeante,
rect).getIntersection();;
if (inter==null ) then (yes) 
:final XPoint2Dp1=new XPoint2D(rect.getMinX(),
rect.getMinY());;
:final XPoint2Dp2=new XPoint2D(rect.getMaxX(),
rect.getMinY());;
:final XPoint2Dp3=new XPoint2D(rect.getMaxX(),
rect.getMaxY());;
:final XPoint2Dp4=new XPoint2D(rect.getMinX(),
rect.getMaxY());;
:inter=LineRectIntersection.getCloser(tangeante.getP1(),
p1,p2,p3,p4);;
endif 
:final XCubicCurve2Dcurv=new XCubicCurve2D(tangeante.getX1(),
tangeante.getY1(),tangeante.getX1(),tangeante.getY1(),
inter.getX(),inter.getY(),inter.getX(),inter.getY());;
:return result.addAfter(curv);;
stop
end
@enduml

