 fill="#181818" points="138.5,748.6094,142.5,758.6094,146.5,748.6094,142.5,752.6094" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[b17ff918f7d33ddeba24398bbb339d9f]
@startuml
!pragma layout smetana
start
note right
constructor PositionableImpl(doublex,doubley,
XDimension2Ddim)
end note
:this.pos=new XPoint2D(x,y);;
:this.dim=dim;;
end
start
note right
constructor PositionableImpl(XPoint2Dpt,XDimension2Ddim)
end note
:this(pt.getX(),pt.getY(),dim);;
end
start
note right
XPoint2DgetPosition()
end note
:return pos;;
stop
end
start
note right
XDimension2DgetSize()
end note
:return dim;;
stop
end
start
note right
void moveSvek(doubledeltaX,doubledeltaY)
end note
:this.pos=this.pos.move(deltaX,deltaY);;
end
@enduml

