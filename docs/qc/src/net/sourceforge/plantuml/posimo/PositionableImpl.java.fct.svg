@startuml
!pragma layout smetana
start
note right
constructor PositionableImpl(double x,double y,
XDimension2D dim)
end note
:this.pos=new XPoint2D(x,y);;
:this.dim=dim;;
end
start
note right
constructor PositionableImpl(XPoint2D pt,
XDimension2D dim)
end note
:this(pt.getX(),pt.getY(),dim);;
end
start
note right
XPoint2D getPosition()
end note
:return pos;;
stop
end
start
note right
XDimension2D getSize()
end note
:return dim;;
stop
end
start
note right
void moveSvek(double deltaX,double deltaY)
end note
:this.pos=this.pos.move(deltaX,deltaY);;
end
@enduml

