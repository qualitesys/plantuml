@startuml
!pragma layout smetana
start
note right
constructor SimpleDrawer(Clusterroot,Collection<Path>paths)
end note
:this.root=root;;
:this.paths=paths;;
end
start
note right
void draw(Graphics2Dg2d)
end note
:g2d.setColor(Color.BLACK);;
:final Blockb=(Block)cl;;
:final XPoint2Dpos=b.getPosition();;
:final XDimension2Ddim=b.getSize();;
:drawRect(g2d,pos,dim);;
:g2d.setColor(Color.GREEN);;
:final Labellabel=p.getLabel();;
:final XPoint2DlabelPos=label.getPosition();;
:final XDimension2DlabelDim=label.getSize();;
:drawRect(g2d,labelPos,labelDim);;
:g2d.setColor(Color.RED);;
:p.getDotPath().draw(g2d,0,0);;
:new SimpleDrawer(sub,new ArrayList<Path>())
.draw(g2d);;
end
start
note right
void drawRectCentered(Graphics2Dg2d,final XPoint2Dpos,
final XDimension2Ddim)
end note
:final Rectangle2Drect=new Rectangle2D.Double(pos.getX()-dim.getWidth()/2,
pos.getY()-dim.getHeight()/2,dim.getWidth(),
dim.getHeight());;
:g2d.draw(rect);;
end
start
note right
void drawRect(Graphics2Dg2d,final XPoint2Dpos,
final XDimension2Ddim)
end note
:final Rectangle2Drect=new Rectangle2D.Double(pos.getX(),
pos.getY(),dim.getWidth(),dim.getHeight());;
:g2d.draw(rect);;
end
@enduml

