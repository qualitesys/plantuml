@startuml
!pragma layout smetana
start
note right
constructor SimpleDrawer(Cluster root,Collection<Path> paths)
end note
:this.root=root;;
:this.paths=paths;;
end
start
note right
void draw(Graphics2D g2d)
end note
:g2d.setColor(Color.BLACK);;
:final Block b=(Block )cl;;
:final XPoint2D pos=b.getPosition();;
:final XDimension2D dim=b.getSize();;
:drawRect(g2d,pos,dim);;
:g2d.setColor(Color.GREEN);;
:final Label label=p.getLabel();;
:final XPoint2D labelPos=label.getPosition();;
:final XDimension2D labelDim=label.getSize();;
:drawRect(g2d,labelPos,labelDim);;
:g2d.setColor(Color.RED);;
:p.getDotPath().draw(g2d,0,0);;
:new SimpleDrawer(sub,new ArrayList<Path >())
.draw(g2d);;
end
start
note right
void drawRectCentered(Graphics2D g2d,final XPoint2D pos,
final XDimension2D dim)
end note
:final Rectangle2D rect=new Rectangle2D.Double(pos.getX()-dim.getWidth()/2,
pos.getY()-dim.getHeight()/2,dim.getWidth(),
dim.getHeight());;
:g2d.draw(rect);;
end
start
note right
void drawRect(Graphics2D g2d,final XPoint2D pos,
final XDimension2D dim)
end note
:final Rectangle2D rect=new Rectangle2D.Double(pos.getX(),
pos.getY(),dim.getWidth(),dim.getHeight());;
:g2d.draw(rect);;
end
@enduml

