@startuml
!pragma layout smetana
start
note right
constructor MargedBlock(StringBounderstringBounder,
IEntityImageBlockimageBlock,doublemarginDecorator,
Clusterparent)
end note
:this.imageBlock=imageBlock;;
:this.marginDecorator=marginDecorator;;
:this.imageDimension=imageBlock.getDimension(stringBounder);;
:this.block=new Block(uid++,imageDimension.getWidth()+
2*marginDecorator,imageDimension.getHeight()+
2*marginDecorator,parent);;
end
start
note right
BlockgetBlock()
end note
:return block;;
stop
end
start
note right
doublegetMarginDecorator()
end note
:return marginDecorator;;
stop
end
start
note right
IEntityImageBlockgetImageBlock()
end note
:return imageBlock;;
stop
end
start
note right
PositionablegetImagePosition()
end note
:return new Positionable(){public XDimension2DgetSize(){return imageDimension;}public XPoint2DgetPosition(){final XPoint2Dpos=block.getPosition();return new XPoint2D(pos.getX()+
marginDecorator,pos.getY()+marginDecorator);}public void moveSvek(doubledeltaX,
doubledeltaY){throw new UnsupportedOperationException();}};;
stop
end
