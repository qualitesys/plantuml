@startuml
!pragma layout smetana
start
note right
constructor MargedBlock(StringBounder stringBounder,
IEntityImageBlock imageBlock,double marginDecorator,
Cluster parent)
end note
:this.imageBlock=imageBlock;;
:this.marginDecorator=marginDecorator;;
:this.imageDimension=imageBlock.getDimension(stringBounder);;
:this.block=new Block(uid++,imageDimension.getWidth()+
2*marginDecorator,imageDimension.getHeight()+
2*marginDecorator,parent);;
end
start
note right
Block getBlock()
end note
:return block;;
stop
end
start
note right
double getMarginDecorator()
end note
:return marginDecorator;;
stop
end
start
note right
IEntityImageBlock getImageBlock()
end note
:return imageBlock;;
stop
end
start
note right
Positionable getImagePosition()
end note
:return new Positionable(){public XDimension2D getSize(){return imageDimension;}public XPoint2D getPosition(){final XPoint2D pos=block.getPosition();return new XPoint2D(pos.getX()+
marginDecorator,pos.getY()+marginDecorator);}public void moveSvek(double deltaX,
double deltaY){throw new UnsupportedOperationException();}};;
stop
end
@enduml

