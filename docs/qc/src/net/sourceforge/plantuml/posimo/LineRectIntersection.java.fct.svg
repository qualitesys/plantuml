@startuml
!pragma layout smetana
start
note right
constructor LineRectIntersection(XLine2D line,
XRectangle2D rect)
end note
:final XPoint2D p1=new XPoint2D(rect.getMinX(),
rect.getMinY());;
:final XPoint2D p2=new XPoint2D(rect.getMaxX(),
rect.getMinY());;
:final XPoint2D p3=new XPoint2D(rect.getMaxX(),
rect.getMaxY());;
:final XPoint2D p4=new XPoint2D(rect.getMinX(),
rect.getMaxY());;
:final XPoint2D inter1=new LineSegmentIntersection(new XLine2D(p1,
p2),line).getIntersection();;
:final XPoint2D inter2=new LineSegmentIntersection(new XLine2D(p2,
p3),line).getIntersection();;
:final XPoint2D inter3=new LineSegmentIntersection(new XLine2D(p3,
p4),line).getIntersection();;
:final XPoint2D inter4=new LineSegmentIntersection(new XLine2D(p4,
p1),line).getIntersection();;
:final XPoint2D o=line.getP1();;
:inter=getCloser(o,inter1,inter2,inter3,inter4);;
end
start
note right
XPoint2D getCloser(final XPoint2D o,final XPoint2D ... other)
end note
:double minDist=Double.MAX_VALUE;;
:XPoint2D result=null ;;
if (pt!=null ) then (yes) 
:final double dist=pt.distanceSq(o);;
if (dist<minDist) then (yes) 
:minDist=dist;;
