@startuml
!pragma layout smetana
start
note right
constructor LineRectIntersection(XLine2Dline,
XRectangle2Drect)
end note
:final XPoint2Dp1=new XPoint2D(rect.getMinX(),
rect.getMinY());;
:final XPoint2Dp2=new XPoint2D(rect.getMaxX(),
rect.getMinY());;
:final XPoint2Dp3=new XPoint2D(rect.getMaxX(),
rect.getMaxY());;
:final XPoint2Dp4=new XPoint2D(rect.getMinX(),
rect.getMaxY());;
:final XPoint2Dinter1=new LineSegmentIntersection(new XLine2D(p1,
p2),line).getIntersection();;
:final XPoint2Dinter2=new LineSegmentIntersection(new XLine2D(p2,
p3),line).getIntersection();;
:final XPoint2Dinter3=new LineSegmentIntersection(new XLine2D(p3,
p4),line).getIntersection();;
:final XPoint2Dinter4=new LineSegmentIntersection(new XLine2D(p4,
p1),line).getIntersection();;
:final XPoint2Do=line.getP1();;
:inter=getCloser(o,inter1,inter2,inter3,inter4);;
end
start
note right
XPoint2DgetCloser(final XPoint2Do,final XPoint2D... other)
end note
:doubleminDist=Double.MAX_VALUE;;
:XPoint2Dresult=null ;;
if (pt!=null ) then (yes) 
:final doubledist=pt.distanceSq(o);;
if (dist<minDist) then (yes) 
