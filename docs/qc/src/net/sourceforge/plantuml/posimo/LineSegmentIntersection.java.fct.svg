@startuml
!pragma layout smetana
start
note right
constructor LineSegmentIntersection(XLine2Dsegment,
XLine2DlineB)
end note
:final doublex1=segment.getX1();;
:final doubley1=segment.getY1();;
:final doublex2=segment.getX2();;
:final doubley2=segment.getY2();;
:final doublex3=lineB.getX1();;
:final doubley3=lineB.getY1();;
:final doublex4=lineB.getX2();;
:final doubley4=lineB.getY2();;
:final doubleden=(y4-y3)*(x2-x1)-(x4-x3)*(y2-y1);;
if (den==0) then (yes) 
:inter=null ;;
else (no)
:final doubleuA1=(x4-x3)*(y1-y3)-(y4-y3)*(x1-x3);;
:final doubleuA=uA1/den;;
:final doublex=x1+uA*(x2-x1);;
:final doubley=y1+uA*(y2-y1);;
if (uA>=0&&uA<=1) then (yes) 
:inter=new XPoint2D(x,y);;
else (no)
:inter=null ;;
endif 
endif 
end
start
note right
XPoint2DgetIntersection()
end note
:return inter;;
stop
end
@enduml

