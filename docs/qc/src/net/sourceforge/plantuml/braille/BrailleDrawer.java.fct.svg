oints="219,693.5195,223,703.5195,227,693.5195,223,697.5195" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="223" x2="223" y1="737.4883" y2="757.4883"/><polygon fill="#181818" points="219,747.4883,223,757.4883,227,747.4883,223,751.4883" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="223" x2="223" y1="805.4258" y2="825.4258"/><polygon fill="#181818" points="219,815.4258,223,825.4258,227,815.4258,223,819.4258" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[9db42ef2445490a172d85b1287d7723d]
@startuml
!pragma layout smetana
start
note right
constructor BrailleDrawer(BrailleGridgrid)
end note
:this.grid=grid;;
end
start
note right
void drawU(UGraphicug)
end note
:ug=ug.apply(HColorSet.instance().getColorOrWhite("#F0F0F0"));;
:ug.apply(UTranslate.dx(x*step+spotSize+1))
.draw(ULine.vline((grid.getMaxY()-grid.getMinY())*step));;
:ug.apply(UTranslate.dy(y*step+spotSize+1))
.draw(ULine.hline((grid.getMaxX()-grid.getMinX())*step));;
:ug=ug.apply(HColors.BLACK).apply(HColors.BLACK.bg());;
if (grid.getState(x,y)) then (yes) 
:drawCircle(ug,x,y);;
endif 
end
start
note right
void drawCircle(UGraphicug,intx,inty)
end note
:final doublecx=x*step;;
:final doublecy=y*step;;
:ug.apply(new UTranslate(cx,cy)).draw(new UEllipse(spotSize,
spotSize));;
end
@enduml

