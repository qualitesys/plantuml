@startuml
!pragma layout smetana
start
note right
constructor DriverLineBraille(ClipContainer clipContainer)
end note
:this.clipContainer=clipContainer;;
end
start
note right
void draw(ULine shape,double x,double y,ColorMapper mapper,
UParam param,BrailleGrid grid)
end note
:double x2=x+shape.getDX();;
:double y2=y+shape.getDY();;
:final UClip clip=clipContainer.getClip();;
if (clip!=null ) then (yes) 
:final Line2D.Double line=clip.getClippedLine(new Line2D.Double(x,
y,x2,y2));;
if (line==null ) then (yes) 
:return ;;
stop
endif 
:x=line.x1;;
:y=line.y1;;
:x2=line.x2;;
:y2=line.y2;;
endif 
:grid.line(x,y,x2,y2);;
end
@enduml

