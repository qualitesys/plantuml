@startuml
!pragma layout smetana
start
note right
constructor DriverTextBraille()
end note
end
start
note right
void draw(UText text,double x,double y,ColorMapper mapper,
UParam param,BrailleGrid grid)
end note
:y-=grid.getQuanta()*3;;
:x+=grid.getQuanta();;
:bchar.draw(grid,x,y);;
:x+=grid.getQuanta()*3;;
end
@enduml

