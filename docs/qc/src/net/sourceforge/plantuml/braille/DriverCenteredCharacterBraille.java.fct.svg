@startuml
!pragma layout smetana
start
note right
void draw(UCenteredCharactercharacterCircled,
doublex,doubley,ColorMappermapper,UParamparam,
BrailleGridgrid)
end note
:final doublexpos=x;;
:final doubleypos=y;;
:final BrailleCharbchar=BrailleCharFactory.build(""+
characterCircled.getChar()).get(0);;
:bchar.draw(grid,xpos,ypos);;
end
@enduml

