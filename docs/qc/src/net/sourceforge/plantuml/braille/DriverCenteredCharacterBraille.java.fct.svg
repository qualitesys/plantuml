@startuml
!pragma layout smetana
start
note right
void draw(UCenteredCharacter characterCircled,
double x,double y,ColorMapper mapper,UParam param,
BrailleGrid grid)
end note
:final double xpos=x;;
:final double ypos=y;;
:final BrailleChar bchar=BrailleCharFactory.build(""+
characterCircled.getChar()).get(0);;
:bchar.draw(grid,xpos,ypos);;
end
@enduml

