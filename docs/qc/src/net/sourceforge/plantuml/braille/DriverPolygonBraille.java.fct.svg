UParamparam,BrailleGridgrid)
end note
:final List<XPoint2D>points=new ArrayList<>();;
:inti=0;;
:points.add(new UTranslate(x,y).getTranslated(pt));;
:final UClipclip=clipContainer.getClip();;
if (clip!=null ) then (yes) 
if (clip.isInside(pt)==false) then (yes) 
:return ;;
stop
endif 
endif 
:grid.drawPolygon(points);;
end
