@startuml
!pragma layout smetana
start
note right
constructor Coords(int x,int y)
end note
:this.x=x;;
:this.y=y;;
end
start
note right
boolean equals(Object obj)
end note
:final Coords other=(Coords )obj;;
:return this.x==other.x&&this.y==other.y;;
stop
end
start
note right
int hashCode()
end note
:return x+y*8192;;
stop
end
start
note right
String toString()
end note
:return "( "+x+" ; "+y+" )";;
stop
end
start
note right
int getX()
end note
:return x;;
stop
end
start
note right
int getY()
end note
:return y;;
stop
end
@enduml

