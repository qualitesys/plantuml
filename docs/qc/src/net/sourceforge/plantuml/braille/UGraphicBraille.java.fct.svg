@startuml
!pragma layout smetana
start
note right
AbstractCommonUGraphic copyUGraphic()
end note
:return new UGraphicBraille(this);;
stop
end
start
note right
constructor UGraphicBraille(HColor defaultBackground,
ColorMapper colorMapper,StringBounder stringBounder)
end note
:super (defaultBackground,colorMapper,stringBounder,
new BrailleGrid(QUANTA));;
:register();;
end
start
note right
constructor UGraphicBraille(UGraphicBraille other)
end note
:super (other);;
:register();;
end
start
note right
void register()
end note
:ignoreShape(URectangle.class );;
:registerDriver(URectangle.class ,new DriverRectangleBraille(this));;
:registerDriver(UText.class ,new DriverTextBraille());;
:registerDriver(ULine.class ,new DriverLineBraille(this));;
:registerDriver(UPolygon.class ,new DriverPolygonBraille(this));;
:ignoreShape(UEllipse.class );;
:ignoreShape(UImage.class );;
:ignoreShape(UPath.class );;
:registerDriver(DotPath.class ,new DriverDotPathBraille());;
:registerDriver(UCenteredCharacter.class ,
new DriverCenteredCharacterBraille());;
end
start
note right
void writeToStream(OutputStream os,String metadata,
int dpi)
end note
:plainPngBuilder(new BrailleDrawer(getGraphicObject()))
.metadata(metadata).write(os);;
end
@enduml

