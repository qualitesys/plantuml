@startuml
!pragma layout smetana
start
note right
constructor DriverRectangleBraille(ClipContainerclipContainer)
end note
:this.clipContainer=clipContainer;;
end
start
note right
void draw(URectanglerect,doublex,doubley,
ColorMappermapper,UParamparam,BrailleGridgrid)
end note
:doublewidth=rect.getWidth();;
:doubleheight=rect.getHeight();;
:final UClipclip=clipContainer.getClip();;
if (clip!=null ) then (yes) 
:final Rectangle2D.Doubler=clip.getClippedRectangle(new Rectangle2D.Double(x,
y,width,height));;
:x=r.x;;
:y=r.y;;
:width=r.width;;
:height=r.height;;
if (height<=0) then (yes) 
:return ;;
stop
endif 
endif 
:grid.rectangle(x,y,width,height);;
end
