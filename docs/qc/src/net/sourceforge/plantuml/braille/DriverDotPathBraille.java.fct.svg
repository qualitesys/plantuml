@startuml
!pragma layout smetana
start
note right
void draw(DotPathshape,doublex,doubley,ColorMappermapper,
UParamparam,BrailleGridgrid)
end note
if (param.getColor().isTransparent()==false) then (yes) 
:grid.drawDotPath(x,y,shape);;
endif 
end
@enduml

