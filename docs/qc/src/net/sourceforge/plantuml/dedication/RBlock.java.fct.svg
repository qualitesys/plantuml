@startuml
!pragma layout smetana
start
note right
constructor RBlock(final byte[]init)
end note
:this.buffer=new byte[init.length+1];;
:System.arraycopy(init,0,buffer,1,init.length);;
end
start
note right
constructor RBlock(final byte[]init,intstart,
intsize)
end note
:this.buffer=new byte[size+1];;
if (start+size<init.length) then (yes) 
:System.arraycopy(init,start,buffer,1,size);;
else (no)
:System.arraycopy(init,start,buffer,1,init.length-start);;
endif 
end
start
note right
RBlockchange(BigIntegerE,BigIntegerN)
end note
:final BigIntegerbig=new BigInteger(buffer);;
:final BigIntegerchanged=big.modPow(E,N);;
:return new RBlock(changed.toByteArray());;
stop
end
start
note right
byte[]getData(intsize)
end note
if (buffer.length==size) then (yes) 
:return buffer;;
stop
endif 
:final byte[]result=new byte[size];;
:System.arraycopy(buffer,buffer.length-size,
result,0,size);;
:return result;;
stop
end
@enduml

