@startuml
!pragma layout smetana
start
note right
constructor TinyHashableString(Stringsentence)
end note
:this.sentence=sentence;;
end
start
note right
StringgetSentence()
end note
:return sentence;;
stop
end
start
note right
inttinyHash()
end note
if (cachedTinyHash==-1) then (yes) 
:cachedTinyHash=Noise.shortHash(sentence.getBytes(UTF_8),
Dedication.N.toByteArray());;
endif 
:return cachedTinyHash;;
stop
end
@enduml

