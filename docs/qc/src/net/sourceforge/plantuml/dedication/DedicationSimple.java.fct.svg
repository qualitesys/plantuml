@startuml
!pragma layout smetana
start
note right
constructor DedicationSimple(byte[] crypted,
String sentence)
end note
:this.crypted=crypted;;
:this.sentence=sentence;;
end
start
note right
BufferedImage getImage(TinyHashableString sentence)
end note
if (same(this.sentence,sentence.getSentence())==false) then (yes) 
:return null ;;
stop
endif 
switch (try/catch block)
case (try)
:byte[] current=crypted.clone();;
:final RBlocks init=RBlocks.readFrom(current,
513);;
:final RBlocks decoded=init.change(E,N);;
:current=decoded.toByteArray(512);;
:return PSystemDedication.getBufferedImage(new ByteArrayInputStream(current));;
stop
case (catch (Throwable t))
:Logme.error(t);;
:return null ;;
stop
endswitch
end
start
note right
boolean same(String s1,String s2)
end note
:s1=s1.replaceAll("[^\\p{L}0-9]+","");;
:s2=s2.replaceAll("[^\\p{L}0-9]+","");;
:return s1.equalsIgnoreCase(s2);;
stop
end
@enduml

