@startuml
!pragma layout smetana
start
note right
constructor QBlocks()
end note
end
start
note right
QBlocks readFrom(InputStream source,int size)
end note
:final QBlocks result=new QBlocks();;
while (true)
:final QBlock block=QBlock.read(source,size);;
if (block==null ) then (yes) 
:return result;;
stop
endif 
:result.all.add(block);;
endwhile
end
start
note right
QBlocks change(BigInteger E,BigInteger N)
end note
:final QBlocks result=new QBlocks();;
:result.all.add(rsa.change(E,N));;
:return result;;
stop
end
start
note right
void writeTo(OutputStream os,int size)
end note
:rsa.write(os,size);;
end
@enduml

