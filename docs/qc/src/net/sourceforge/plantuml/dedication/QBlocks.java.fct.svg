@startuml
!pragma layout smetana
start
note right
constructor QBlocks()
end note
end
start
note right
QBlocksreadFrom(InputStreamsource,intsize)
end note
:final QBlocksresult=new QBlocks();;
while (true)
:final QBlockblock=QBlock.read(source,size);;
if (block==null ) then (yes) 
:return result;;
stop
endif 
:result.all.add(block);;
endwhile
end
start
note right
QBlockschange(BigIntegerE,BigIntegerN)
end note
:final QBlocksresult=new QBlocks();;
:result.all.add(rsa.change(E,N));;
:return result;;
stop
end
start
note right
void writeTo(OutputStreamos,intsize)
end note
:rsa.write(os,size);;
end
@enduml

