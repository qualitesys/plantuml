@startuml
!pragma layout smetana
start
note right
AbstractPSystem executeLine(UmlSource source,
String line)
end note
:final BufferedImage dedication=Dedications.get(line);;
if (dedication!=null ) then (yes) 
:return new PSystemDedication(source,dedication);;
stop
endif 
:return null ;;
stop
end
@enduml

