@startuml
!pragma layout smetana
start
note right
AbstractPSystemexecuteLine(UmlSourcesource,
Stringline)
end note
:final BufferedImagededication=Dedications.get(line);;
if (dedication!=null ) then (yes) 
:return new PSystemDedication(source,dedication);;
stop
endif 
:return null ;;
stop
end
@enduml

