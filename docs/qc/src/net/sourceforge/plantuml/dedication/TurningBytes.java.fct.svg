@startuml
!pragma layout smetana
start
note right
constructor TurningBytes(byte[] key)
end note
:this.key=key;;
end
start
note right
byte nextByte()
end note
if (key.length==0) then (yes) 
:return 0;;
stop
endif 
:final byte result=key[idx];;
:idx++;;
if (idx>=key.length) then (yes) 
:idx=0;;
endif 
:return result;;
stop
end
@enduml

