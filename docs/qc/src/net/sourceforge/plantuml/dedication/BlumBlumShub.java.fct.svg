n fill="#181818" points="155.5,390.1094,159.5,400.1094,163.5,390.1094,159.5,394.1094" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="159.5" x2="159.5" y1="434.0781" y2="454.0781"/><polygon fill="#181818" points="155.5,444.0781,159.5,454.0781,163.5,444.0781,159.5,448.0781" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="159.5" x2="159.5" y1="488.0469" y2="508.0469"/><polygon fill="#181818" points="155.5,498.0469,159.5,508.0469,163.5,498.0469,159.5,502.0469" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[d0edbbb49461bfc62a50b3869cb6a5a4]
@startuml
!pragma layout smetana
start
note right
constructor BlumBlumShub(BigIntegerpq,byte[]seed)
end note
:this.pq=pq;;
:this.state=new BigInteger(1,seed).mod(pq);;
end
start
note right
intnextRnd(intnumBits)
end note
:intresult=0;;
:state=state.modPow(two,pq);;
:final intbit=state.testBit(0)? 1:0;;
:result=(result<<1)|bit;;
:return result;;
stop
end
@enduml

