@startuml
!pragma layout smetana
start
note right
constructor PSystemDedication(UmlSource source,
BufferedImage img)
end note
:super (source);;
:this.img=Objects.requireNonNull(img);;
end
start
note right
UDrawable getRootDrawable(FileFormatOption fileFormatOption)
end note
:return new UDrawable(){public void drawU(UGraphic ug){ug.draw(new UImage(new PixelImage(img,
AffineTransformType.TYPE_BILINEAR)));}};;
stop
end
start
note right
BufferedImage getBufferedImage(InputStream is)
end note
switch (try/catch block)
case (try)
:final Class<?> clVP8Decoder=Class.forName("net.sourceforge.plantuml.webp.VP8Decoder");;
:final Object vp8Decoder=clVP8Decoder.getDeclaredConstructor()
.newInstance();;
:final Method decodeFrame=clVP8Decoder.getMethod("decodeFrame",
ImageInputStream.class );;
:final ImageInputStream iis=SImageIO.createImageInputStream(is);;
:decodeFrame.invoke(vp8Decoder,iis);;
:iis.close();;
:final Object frame=clVP8Decoder.getMethod("getFrame")
.invoke(vp8Decoder);;
:return (BufferedImage )frame.getClass().getMethod("getBufferedImage")
.invoke(frame);;
stop
case (catch (Exception e))
:Logme.error(e);;
:return null ;;
stop
endswitch
end
start
note right
DiagramDescription getDescription()
end note
:return new DiagramDescription("(Dedication)");;
stop
end
@enduml

