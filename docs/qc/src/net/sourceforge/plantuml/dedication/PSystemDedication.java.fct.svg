@startuml
!pragma layout smetana
start
note right
constructor PSystemDedication(UmlSourcesource,
BufferedImageimg)
end note
:super (source);;
:this.img=Objects.requireNonNull(img);;
end
start
note right
UDrawablegetRootDrawable(FileFormatOptionfileFormatOption)
end note
:return new UDrawable(){public void drawU(UGraphicug){ug.draw(new UImage(new PixelImage(img,
AffineTransformType.TYPE_BILINEAR)));}};;
stop
end
start
note right
BufferedImagegetBufferedImage(InputStreamis)
end note
switch (try/catch block)
case (try)
:final Class<? >clVP8Decoder=Class.forName("net.sourceforge.plantuml.webp.VP8Decoder");;
:final Objectvp8Decoder=clVP8Decoder.getDeclaredConstructor()
.newInstance();;
:final MethoddecodeFrame=clVP8Decoder.getMethod("decodeFrame",
ImageInputStream.class );;
:final ImageInputStreamiis=SImageIO.createImageInputStream(is);;
:decodeFrame.invoke(vp8Decoder,iis);;
:iis.close();;
:final Objectframe=clVP8Decoder.getMethod("getFrame")
.invoke(vp8Decoder);;
:return (BufferedImage)frame.getClass().getMethod("getBufferedImage")
.invoke(frame);;
stop
case (catch (Exceptione))
:Logme.error(e);;
:return null ;;
stop
endswitch
end
start
note right
DiagramDescriptiongetDescription()
end note
:return new DiagramDescription("(Dedication)");;
stop
end
@enduml

