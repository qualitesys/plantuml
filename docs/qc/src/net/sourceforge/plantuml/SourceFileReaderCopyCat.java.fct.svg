@startuml
!pragma layout smetana
start
note right
constructor SourceFileReaderCopyCat(Defines defines,
final File file,File outputDirectory,List<String> config,
String charset,FileFormatOption fileFormatOption)
end note
:super (file,fileFormatOption,defines,config,
charset);;
:final String path=file.getParentFile().getPath();;
:this.outputDirectory=new File(outputDirectory,
path).getAbsoluteFile();;
if (outputDirectory.exists()==false) then (yes) 
:outputDirectory.mkdirs();;
endif 
end
start
note right
SuggestedFile getSuggestedFile(BlockUml blockUml)
end note
:String newName=blockUml.getFileOrDirname();;
if (newName==null ) then (yes) 
:newName=getFileName();;
endif 
:final SuggestedFile suggested=getSuggestedFile(outputDirectory,
newName);;
:suggested.getParentFile().mkdirs();;
:return suggested;;
stop
end
@enduml

