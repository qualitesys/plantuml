@startuml
!pragma layout smetana
start
note right
constructor SourceFileReaderCopyCat(Definesdefines,
final Filefile,FileoutputDirectory,List<String>config,
Stringcharset,FileFormatOptionfileFormatOption)
end note
:super (file,fileFormatOption,defines,config,
charset);;
:final Stringpath=file.getParentFile().getPath();;
:this.outputDirectory=new File(outputDirectory,
path).getAbsoluteFile();;
if (outputDirectory.exists()==false) then (yes) 
:outputDirectory.mkdirs();;
endif 
end
start
note right
SuggestedFilegetSuggestedFile(BlockUmlblockUml)
end note
:StringnewName=blockUml.getFileOrDirname();;
if (newName==null ) then (yes) 
:newName=getFileName();;
endif 
:final SuggestedFilesuggested=getSuggestedFile(outputDirectory,
newName);;
:suggested.getParentFile().mkdirs();;
:return suggested;;
stop
end
@enduml

