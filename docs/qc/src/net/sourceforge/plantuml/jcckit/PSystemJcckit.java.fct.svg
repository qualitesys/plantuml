@startuml
!pragma layout smetana
start
note right
constructor PSystemJcckit(UmlSourcesource,
Propertiesp,intwidth,intheight)
end note
:super (source);;
:this.width=width;;
:this.height=height;;
:prop=new PropertiesBasedConfigData(p);;
end
start
note right
ImageDataexportDiagramNow(OutputStreamos,
intnum,FileFormatOptionfileFormat)
end note
:BufferedImageimage=new BufferedImage(width,
height,BufferedImage.TYPE_INT_RGB);;
:ConfigParametersconfig=new ConfigParameters(prop);;
:GraphicsPlotCanvasplotCanvas=new GraphicsPlotCanvas(config,
image);;
:plotCanvas.connect(DataPlot.create(config));;
:plotCanvas.paint();;
:SImageIO.write(image,"png",os);;
:return new ImageDataSimple(width,height);;
stop
end
start
note right
DiagramDescriptiongetDescription()
end note
:return new DiagramDescription("(JCCKit)");;
stop
end
@enduml

