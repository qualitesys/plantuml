@startuml
!pragma layout smetana
start
note right
constructor PSystemJcckit(UmlSource source,
Properties p,int width,int height)
end note
:super (source);;
:this.width=width;;
:this.height=height;;
:prop=new PropertiesBasedConfigData(p);;
end
start
note right
ImageData exportDiagramNow(OutputStream os,
int num,FileFormatOption fileFormat)
end note
:BufferedImage image=new BufferedImage(width,
height,BufferedImage.TYPE_INT_RGB);;
:ConfigParameters config=new ConfigParameters(prop);;
:GraphicsPlotCanvas plotCanvas=new GraphicsPlotCanvas(config,
image);;
:plotCanvas.connect(DataPlot.create(config));;
:plotCanvas.paint();;
:SImageIO.write(image,"png",os);;
:return new ImageDataSimple(width,height);;
stop
end
start
note right
DiagramDescription getDescription()
end note
:return new DiagramDescription("(JCCKit)");;
stop
end
@enduml

