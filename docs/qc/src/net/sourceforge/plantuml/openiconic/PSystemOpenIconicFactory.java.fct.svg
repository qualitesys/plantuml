@startuml
!pragma layout smetana
start
note right
AbstractPSystemexecuteLine(UmlSourcesource,
Stringline)
end note
:final StringlineLower=StringUtils.goLowerCase(line);;
if (lineLower.startsWith("openiconic ")) then (yes) 
:final intidx=line.indexOf(' ');;
:return new PSystemOpenIconic(source,lineLower.substring(idx+
1),1.0);;
stop
endif 
:return null ;;
stop
end
@enduml

