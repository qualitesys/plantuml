:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="167.5" x2="167.5" y1="454.8203" y2="474.8203"/><polygon fill="#181818" points="163.5,464.8203,167.5,474.8203,171.5,464.8203,167.5,468.8203" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="167.5" x2="167.5" y1="628.7578" y2="648.7578"/><polygon fill="#181818" points="163.5,638.7578,167.5,648.7578,171.5,638.7578,167.5,642.7578" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[899b8d991686a87812f61108050a6470]
@startuml
!pragma layout smetana
start
note right
Stringdecipher(Stringpath)
end note
:path=path.trim();;
:path=path.replace(',',' ');;
:path=path.replaceAll("\\s+"," ");;
:path=path.replaceAll("([^e\\s])-","$1 -");;
:path=path.replaceAll("([a-df-zA-Z])(\\S)",
"$1 $2");;
:path=path.replaceAll("(\\S)([a-df-zA-Z])",
"$1 $2");;
:path=path.replaceAll("([a-df-zA-Z])(\\S)",
"$1 $2");;
while (path.matches(".*\\.\\d+\\..*"))
:path=path.replaceAll("(\\.\\d+)\\.","$1 .");;
endwhile
:return path;;
stop
end
@enduml

