@startuml
!pragma layout smetana
start
note right
constructor PSystemOpenIconic(UmlSourcesource,
StringiconName,doublefactor)
end note
:super (source);;
:this.iconName=iconName;;
:this.factor=factor;;
end
start
note right
UDrawablegetRootDrawable(FileFormatOptionfileFormatOption)
end note
:final OpenIconicon=OpenIcon.retrieve(iconName);;
:return icon.asTextBlock(HColors.BLACK,factor);;
stop
end
start
note right
DiagramDescriptiongetDescription()
end note
:return new DiagramDescription("(Open iconic)");;
stop
end
start
note right
ClockwiseTopRightBottomLeftgetDefaultMargins()
end note
:return ClockwiseTopRightBottomLeft.same(5);;
stop
end
@enduml

