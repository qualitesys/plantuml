@startuml
!pragma layout smetana
start
note right
constructor PSystemOpenIconic(UmlSource source,
String iconName,double factor)
end note
:super (source);;
:this.iconName=iconName;;
:this.factor=factor;;
end
start
note right
UDrawable getRootDrawable(FileFormatOption fileFormatOption)
end note
:final OpenIcon icon=OpenIcon.retrieve(iconName);;
:return icon.asTextBlock(HColors.BLACK,factor);;
stop
end
start
note right
DiagramDescription getDescription()
end note
:return new DiagramDescription("(Open iconic)");;
stop
end
start
note right
ClockwiseTopRightBottomLeft getDefaultMargins()
end note
:return ClockwiseTopRightBottomLeft.same(5);;
stop
end
@enduml

