D5=[92d49bed6780b6819460297f1e091642]
@startuml
!pragma layout smetana
start
note right
constructor SvgCommandNumber(String number)
end note
if (number.matches("[-.0-9e]+")==false) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:this.number=number;;
end
start
note right
String toString()
end note
:return " "+number;;
stop
end
start
note right
constructor SvgCommandNumber(double number)
end note
:this.number=String.format(Locale.US,"%1.4f",
number);;
end
start
note right
SvgCommandNumber add(SvgCommandNumber other)
end note
:return new SvgCommandNumber(getDouble()+
other.getDouble());;
stop
end
start
note right
String toSvg()
end note
:return number;;
stop
end
start
note right
double getDouble()
end note
:return Double.parseDouble(number);;
stop
end
@enduml

