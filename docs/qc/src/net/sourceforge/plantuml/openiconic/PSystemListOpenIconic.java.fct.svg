@startuml
!pragma layout smetana
start
note right
constructor PSystemListOpenIconic(UmlSource source)
end note
:super (source);;
end
start
note right
UDrawable getRootDrawable(FileFormatOption fileFormatOption)
end note
:final List<String> lines=new ArrayList<>();;
:lines.add("<b>List Open Iconic");;
:lines.add("<i>Credit to");;
:lines.add("https://useiconic.com/open");;
:lines.add(" ");;
switch (try/catch block)
case (try)
:String s=null ;;
while ((s=br.readLine())!=null )
:lines.add("<&"+s+"> "+s);;
endwhile
endswitch
:final List<TextBlock> cols=PSystemDonors.getCols(lines,
7,0);;
:return new TextBlockHorizontal(cols,VerticalAlignment.TOP);;
stop
end
start
note right
InputStream getResourceAllTxt()
end note
:return DummyIcon.class .getResourceAsStream("all.txt");;
stop
end
start
note right
DiagramDescription getDescription()
end note
:return new DiagramDescription("(Open iconic)");;
stop
end
@enduml

