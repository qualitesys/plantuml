@startuml
!pragma layout smetana
start
note right
constructor PSystemDefinition(UmlSource source,
String startLine)
end note
:super (source);;
:this.startLine=startLine;;
end
start
note right
DiagramDescription getDescription()
end note
:return new DiagramDescription("(Definition)");;
stop
end
start
note right
UDrawable getRootDrawable(FileFormatOption fileFormatOption)
end note
:return this;;
stop
end
start
note right
void drawU(UGraphic ug)
end note
:final UFont font=UFont.sansSerif(14);;
:final FontConfiguration fc=FontConfiguration.create(font,
HColors.BLACK,HColors.BLACK,null );;
:Display.getWithNewlines(startLine).create(fc,
HorizontalAlignment.LEFT,new SpriteContainerEmpty()).drawU(ug);;
end
start
note right
void doCommandLine(String line)
end note
:this.lines.add(line);;
end
@enduml

