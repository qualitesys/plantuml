@startuml
!pragma layout smetana
start
note right
constructor PSystemDefinitionFactory()
end note
:super (DiagramType.DEFINITION);;
end
start
note right
PSystemDefinitioninitDiagram(UmlSourcesource,
StringstartLine)
end note
if (getDiagramType()==DiagramType.DEFINITION) then (yes) 
:return new PSystemDefinition(source,startLine);;
stop
endif 
:return null ;;
stop
end
start
note right
PSystemDefinitionexecuteLine(UmlSourcesource,
PSystemDefinitionsystem,Stringline)
end note
:system.doCommandLine(line);;
:return system;;
stop
end
@enduml

