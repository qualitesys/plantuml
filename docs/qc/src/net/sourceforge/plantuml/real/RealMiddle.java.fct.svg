@startuml
!pragma layout smetana
start
note right
constructor RealMiddle(RealMoveable p1,RealMoveable p2,
double delta)
end note
:super (p1.getLine());;
:this.p1=p1;;
:this.p2=p2;;
:this.delta=delta;;
end
start
note right
RealMiddle create(RealMoveable p1,RealMoveable p2)
end note
:return new RealMiddle(p1,p2,0);;
stop
end
start
note right
double getCurrentValueInternal()
end note
:return (p1.getCurrentValue()+p2.getCurrentValue())/2+
delta;;
stop
end
start
note right
Real addFixed(double diff)
end note
:return new RealMiddle(p1,p2,delta+diff);;
stop
end
start
note right
Real addAtLeast(double delta)
end note
:throw new UnsupportedOperationException();;
stop
end
start
note right
void ensureBiggerThan(Real other)
end note
:throw new UnsupportedOperationException();;
stop
end
start
note right
String getName()
end note
:return "[Middle "+p1.getName()+" and "+p2.getName()+
"]";;
stop
end
start
note right
void printCreationStackTrace()
end note
:throw new UnsupportedOperationException();;
stop
end
@enduml

