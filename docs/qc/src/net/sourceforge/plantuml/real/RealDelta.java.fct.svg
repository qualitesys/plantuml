@startuml
!pragma layout smetana
start
note right
constructor RealDelta(Realdelegated,doublediff)
end note
:super (((AbstractReal)delegated).getLine(),"[Delegated {"+
delegated.getName()+"} d="+diff+"]");;
:this.delegated=delegated;;
:this.diff=diff;;
end
start
note right
doublegetCurrentValueInternal()
end note
:return delegated.getCurrentValue()+diff;;
stop
end
start
note right
RealaddAtLeast(doubledelta)
end note
:return new RealDelta(delegated.addAtLeast(delta),
diff);;
stop
end
start
note right
void ensureBiggerThan(Realother)
end note
:delegated.ensureBiggerThan(new RealDelta(other,
-diff));;
end
start
note right
void move(doubledelta)
end note
:((RealMoveable)delegated).move(delta);;
end
@enduml

