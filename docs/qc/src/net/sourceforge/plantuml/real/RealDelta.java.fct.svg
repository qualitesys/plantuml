@startuml
!pragma layout smetana
start
note right
constructor RealDelta(Real delegated,double diff)
end note
:super (((AbstractReal )delegated).getLine(),"[Delegated {"+
delegated.getName()+"} d="+diff+"]");;
:this.delegated=delegated;;
:this.diff=diff;;
end
start
note right
double getCurrentValueInternal()
end note
:return delegated.getCurrentValue()+diff;;
stop
end
start
note right
Real addAtLeast(double delta)
end note
:return new RealDelta(delegated.addAtLeast(delta),
diff);;
stop
end
start
note right
void ensureBiggerThan(Real other)
end note
:delegated.ensureBiggerThan(new RealDelta(other,
-diff));;
end
start
note right
void move(double delta)
end note
:((RealMoveable )delegated).move(delta);;
end
@enduml

