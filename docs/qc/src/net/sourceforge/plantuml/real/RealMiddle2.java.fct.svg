@startuml
!pragma layout smetana
start
note right
constructor RealMiddle2(RealMoveablep1,RealMoveablep2)
end note
:super (p1.getLine(),"middle");;
:assert p1.getLine()==p2.getLine();;
:this.p1=p1;;
:this.p2=p2;;
end
start
note right
doublegetCurrentValueInternal()
end note
:return (p1.getCurrentValue()+p2.getCurrentValue())/2;;
stop
end
start
note right
RealaddAtLeast(doubledelta)
end note
:throw new UnsupportedOperationException();;
stop
end
start
note right
void ensureBiggerThan(Realother)
end note
:getLine().addForce(new PositiveForce(other,
this,0));;
end
start
note right
void move(doubledelta)
end note
:p1.move(delta/2);;
:p2.move(delta/2);;
end
@enduml

