@startuml
!pragma layout smetana
start
note right
constructor RealImpl(String name,RealLine line,
double currentValue)
end note
:super (line,name);;
:this.currentValue=currentValue;;
end
start
note right
void move(double delta)
end note
:this.currentValue+=delta;;
end
start
note right
double getCurrentValueInternal()
end note
:return currentValue;;
stop
end
start
note right
Real addAtLeast(double delta)
end note
:final RealImpl result=new RealImpl(getName()+
".addAtLeast"+delta,getLine(),this.currentValue+
delta);;
:getLine().addForce(new PositiveForce(this,
result,delta));;
:return result;;
stop
end
start
note right
void ensureBiggerThan(Real other)
end note
:getLine().addForce(new PositiveForce(other,
this,0));;
end
start
note right
void compileNow()
end note
:getLine().compile();;
end
@enduml

