@startuml
!pragma layout smetana
start
note right
constructor AbstractReal(RealLine line)
end note
:this.line=line;;
:this.line.register2(this);;
end
start
note right
RealLine getLine()
end note
:return line;;
stop
end
start
note right
double getCurrentValue()
end note
:final double result=getCurrentValueInternal();;
:line.register(result);;
:return result;;
stop
end
start
note right
Real getMaxAbsolute()
end note
:return line.asMaxAbsolute();;
stop
end
start
note right
Real getMinAbsolute()
end note
:return line.asMinAbsolute();;
stop
end
@enduml

