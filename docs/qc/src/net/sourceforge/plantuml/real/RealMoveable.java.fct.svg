th:1.0;"/><!--MD5=[5b4009cc9d491becb67de0ced0b6c4f8]
@startuml
!pragma layout smetana
start
note right
constructor RealMoveable(RealLine line,String name)
end note
:super (line);;
:this.name=name;;
:this.creationPoint=new Throwable();;
:this.creationPoint.fillInStackTrace();;
end
start
note right
void move(double delta)
end note
end
start
note right
void printCreationStackTrace()
end note
:Logme.error(creationPoint);;
end
start
note right
Real addFixed(double delta)
end note
:return new RealDelta(this,delta);;
stop
end
start
note right
String toString()
end note
:return "#"+cpt+"_"+name;;
stop
end
start
note right
String getName()
end note
:return name;;
stop
end
@enduml

