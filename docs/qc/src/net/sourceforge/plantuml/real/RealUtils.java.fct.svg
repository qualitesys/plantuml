@startuml
!pragma layout smetana
start
note right
RealOrigincreateOrigin()
end note
:final RealLineline=new RealLine();;
:final RealImplresult=new RealImpl("O",line,0);;
:return result;;
stop
end
start
note right
Realmiddle(Realr1,Realr2)
end note
:return new RealMiddle2((RealMoveable)r1,
(RealMoveable)r2);;
stop
end
start
note right
Realmax(Real... reals)
end note
:return new RealMax(Arrays.asList(reals));;
stop
end
start
note right
Realmax(Collection<Real>reals)
end note
:return new RealMax(reals);;
stop
end
start
note right
Realmin(Real... reals)
end note
:return new RealMin(Arrays.asList(reals));;
stop
end
start
note right
Realmin(Collection<Real>reals)
end note
:return new RealMin(reals);;
stop
end
@enduml

