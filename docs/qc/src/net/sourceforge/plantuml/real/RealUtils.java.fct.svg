@startuml
!pragma layout smetana
start
note right
RealOrigin createOrigin()
end note
:final RealLine line=new RealLine();;
:final RealImpl result=new RealImpl("O",line,0);;
:return result;;
stop
end
start
note right
Real middle(Real r1,Real r2)
end note
:return new RealMiddle2((RealMoveable )r1,
(RealMoveable )r2);;
stop
end
start
note right
Real max(Real ... reals)
end note
:return new RealMax(Arrays.asList(reals));;
stop
end
start
note right
Real max(Collection<Real> reals)
end note
:return new RealMax(reals);;
stop
end
start
note right
Real min(Real ... reals)
end note
:return new RealMin(Arrays.asList(reals));;
stop
end
start
note right
Real min(Collection<Real> reals)
end note
:return new RealMin(reals);;
stop
end
@enduml

