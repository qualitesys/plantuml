" x1="299.25" x2="299.25" y1="985.2578" y2="1005.2578"/><polygon fill="#181818" points="295.25,995.2578,299.25,1005.2578,303.25,995.2578,299.25,999.2578" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[cd4cd0a0165cc0bbebfcaaeb3b54747f]
@startuml
!pragma layout smetana
start
note right
constructor RenderRequest(String[] options,
String source)
end note
:this.options=options;;
:this.source=source;;
end
start
note right
String[] getOptions()
end note
:return options;;
stop
end
start
note right
String getSource()
end note
:return source;;
stop
end
start
note right
RenderRequest fromJson(String json)
end note
:final JsonObject parsed=Json.parse(json)
.asObject();;
:final String[] options;;
if (parsed.contains("options")) then (yes) 
:final JsonArray jsonArray=parsed.get("options")
.asArray();;
:options=new String[jsonArray.size()];;
:options[i]=jsonArray.get(i).asString();;
else (no)
:options=new String[0];;
endif 
:return new RenderRequest(options,parsed.get("source")
.asString());;
stop
end
@enduml

