6.25,985.2891" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[edec823bc22bb873a253dbaf15ef1819]
@startuml
!pragma layout smetana
start
note right
constructor RenderRequest(String[]options,
Stringsource)
end note
:this.options=options;;
:this.source=source;;
end
start
note right
String[]getOptions()
end note
:return options;;
stop
end
start
note right
StringgetSource()
end note
:return source;;
stop
end
start
note right
RenderRequestfromJson(Stringjson)
end note
:final JsonObjectparsed=Json.parse(json).asObject();;
:final String[]options;;
if (parsed.contains("options")) then (yes) 
:final JsonArrayjsonArray=parsed.get("options")
.asArray();;
:options=new String[jsonArray.size()];;
:options[i]=jsonArray.get(i).asString();;
else (no)
:options=new String[0];;
endif 
:return new RenderRequest(options,parsed.get("source")
.asString());;
stop
end
@enduml

