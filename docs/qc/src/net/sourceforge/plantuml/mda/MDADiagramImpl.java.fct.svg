255.168" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[4ffe6bb87cbd6ccbc514cffd60d85b0f]
@startuml
!pragma layout smetana
start
note right
MDADiagram create(String uml)
end note
:List<BlockUml> blocks=new SourceStringReader(uml)
.getBlocks();;
if (blocks.size()==0) then (yes) 
:uml="@startuml\n"+uml+"\n@enduml";;
:blocks=new SourceStringReader(uml).getBlocks();;
if (blocks.size()==0) then (yes) 
:return null ;;
stop
endif 
endif 
:final BlockUml block=blocks.get(0);;
:final Diagram diagram=block.getDiagram();;
if (diagram instanceof ClassDiagram ) then (yes) 
:return new MDADiagramImpl((ClassDiagram )diagram);;
stop
endif 
:return null ;;
stop
end
start
note right
constructor MDADiagramImpl(ClassDiagram classDiagram)
end note
:final EntityFactory entityFactory=classDiagram.getEntityFactory();;
:packages.add(new MDAPackageImpl(entityFactory.getRootGroup()));;
:packages.add(new MDAPackageImpl(group));;
end
start
note right
Collection<MDAPackage> getPackages()
end note
:return Collections.unmodifiableCollection(packages);;
stop
end
@enduml

