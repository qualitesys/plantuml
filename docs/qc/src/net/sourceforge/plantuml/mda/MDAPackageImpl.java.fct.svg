@startuml
!pragma layout smetana
start
note right
constructor MDAPackageImpl(IGroup group)
end note
:this.group=group;;
:entities.add(new MDAEntityImpl(leaf));;
end
start
note right
Collection<MDAEntity> getEntities()
end note
:return Collections.unmodifiableCollection(entities);;
stop
end
start
note right
String getName()
end note
if (group instanceof GroupRoot ) then (yes) 
:return "";;
stop
endif 
:return group.getCodeGetName();;
stop
end
@enduml

