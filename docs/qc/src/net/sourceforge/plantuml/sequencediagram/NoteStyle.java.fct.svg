@startuml
!pragma layout smetana
start
note right
NoteStylegetNoteStyle(Strings)
end note
if (s.equalsIgnoreCase("hnote")) then (yes) 
:return NoteStyle.HEXAGONAL;;
stop
else if (s.equalsIgnoreCase("rnote")) then (yes) 
:return NoteStyle.BOX;;
stop
endif 
:return NoteStyle.NORMAL;;
stop
end
start
note right
ComponentTypegetNoteComponentType()
end note
if (this==NoteStyle.HEXAGONAL) then (yes) 
:return ComponentType.NOTE_HEXAGONAL;;
stop
endif 
if (this==NoteStyle.BOX) then (yes) 
:return ComponentType.NOTE_BOX;;
stop
endif 
:return ComponentType.NOTE;;
stop
end
start
note right
StyleSignatureBasicgetDefaultStyleDefinition()
end note
:return StyleSignatureBasic.of(SName.root,
SName.element,SName.sequenceDiagram,SName.note);;
stop
end
@enduml

