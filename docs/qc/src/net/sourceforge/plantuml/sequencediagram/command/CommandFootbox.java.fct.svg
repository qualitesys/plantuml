@startuml
!pragma layout smetana
start
note right
constructor CommandFootbox()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandFootbox.class .getName(),
RegexLeaf.start(),new RegexLeaf("TYPE","(hide|show)?"),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf("footbox"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(SequenceDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:final booleanfootbox=arg.get("TYPE",0).equalsIgnoreCase("show");;
:diagram.setShowFootbox(footbox);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

