@startuml
!pragma layout smetana
start
note right
constructor CommandBoxEnd()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandBoxEnd.class .getName(),
RegexLeaf.start(),new RegexLeaf("end"),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("box"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(SequenceDiagram diagram,
LineLocation location,RegexResult arg)
end note
if (diagram.isBoxPending()==false) then (yes) 
:return CommandExecutionResult.error("Missing starting box");;
stop
endif 
:diagram.endBox();;
:return CommandExecutionResult.ok();;
stop
end
@enduml

