@startuml
!pragma layout smetana
start
note right
constructor CommandSkin()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandSkin.class .getName(),RegexLeaf.start(),new RegexLeaf("skin"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("SKIN","([\\w.]+
)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(TitledDiagram diagram,
LineLocation location,RegexResult arg)
end note
switch (try/catch block)
case (try)
:return diagram.loadSkin(arg.get("SKIN",0));;
stop
case (catch (IOException e))
:return CommandExecutionResult.error("Skin read error");;
stop
endswitch
end
@enduml

