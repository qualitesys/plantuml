@startuml
!pragma layout smetana
start
note right
constructor CommandAutoactivate()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandAutoactivate.class .getName(),
RegexLeaf.start(),new RegexLeaf("autoactivate"),
RegexLeaf.spaceOneOrMore(),new RegexLeaf("ON",
"(off|on)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(SequenceDiagramsequenceDiagram,
LineLocationlocation,RegexResultarg)
end note
:sequenceDiagram.setAutoactivate(String.valueOf("on").equalsIgnoreCase(arg.get("ON",
0)));;
:return CommandExecutionResult.ok();;
stop
end
@enduml

