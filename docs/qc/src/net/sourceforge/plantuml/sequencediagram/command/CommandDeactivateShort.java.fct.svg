@startuml
!pragma layout smetana
start
note right
constructor CommandDeactivateShort()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandDeactivateShort.class .getName(),
RegexLeaf.start(),new RegexLeaf("TYPE","deactivate"),
RegexLeaf.spaceZeroOrMore(),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(SequenceDiagram sequenceDiagram,
LineLocation location,RegexResult arg2)
end note
:final AbstractMessage message=sequenceDiagram.getActivatingMessage();;
if (message==null ) then (yes) 
:return CommandExecutionResult.error("Nothing to deactivate.");;
stop
endif 
:final String error=sequenceDiagram.activate(message.getParticipant2(),
LifeEventType.DEACTIVATE,null );;
if (error!=null ) then (yes) 
:return CommandExecutionResult.error(error);;
stop
endif 
:return CommandExecutionResult.ok();;
stop
end
@enduml

