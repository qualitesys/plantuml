@startuml
!pragma layout smetana
start
note right
constructor CommandNewpage()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandNewpage.class .getName(),RegexLeaf.start(),new RegexLeaf("@?"),new RegexLeaf("newpage"),new RegexOptional(new RegexConcat(new RegexLeaf("(?:[%s]*:[%s]*|[%s]+
)"),new RegexLeaf("LABEL","(.*[%pLN_.].*)"))),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(SequenceDiagram sequenceDiagram,
LineLocation location,RegexResult arg)
end note
:final String label=arg.get("LABEL",0);;
:final Display strings=label==null ? Display.NULL:Display.getWithNewlines(label);;
:sequenceDiagram.newpage(strings);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

