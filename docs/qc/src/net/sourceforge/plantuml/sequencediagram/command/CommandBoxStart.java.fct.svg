@startuml
!pragma layout smetana
start
note right
constructor CommandBoxStart()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandBoxStart.class .getName(),
RegexLeaf.start(),new RegexLeaf("box"),new RegexOptional(new RegexOr(new RegexConcat(RegexLeaf.spaceOneOrMore(),new RegexLeaf("NAME1","[%g]([^%g]+
)[%g]")),new RegexConcat(RegexLeaf.spaceOneOrMore(),new RegexLeaf("NAME2","([^#]+
)")))),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("STEREO",
"(\\<\\<.*\\>\\>)?"),color().getRegex(),RegexLeaf.end());;
stop
end
start
note right
ColorParser color()
end note
:return ColorParser.simpleColor(ColorType.BACK);;
stop
end
start
note right
CommandExecutionResult executeArg(SequenceDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final String argTitle=arg.getLazzy("NAME",0);;
:final String argColor=arg.get("COLOR",0);;
:final String stereo=arg.get("STEREO",0);;
:Stereotype stereotype=null ;;
if (stereo!=null ) then (yes) 
:final ISkinParam skinParam=diagram.getSkinParam();;
:stereotype=Stereotype.build(stereo);;
endif 
:Colors colors=color().getColor(arg,diagram.getSkinParam()
.getIHtmlColorSet());;
:final String title=argTitle==null ? String.valueOf(""):argTitle;;
:diagram.boxStart(Display.getWithNewlines(title),
colors.getColor(ColorType.BACK),stereotype);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

