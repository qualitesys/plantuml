@startuml
!pragma layout smetana
start
note right
constructor CommandDelay()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandDelay.class .getName(),
RegexLeaf.start(),new RegexLeaf("(?:\\.{3}|\u2026)"),
new RegexOptional(new RegexLeaf("LABEL","(.*)(?:\\.{3}|\u2026)")),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(SequenceDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final Display strings=arg.get("LABEL",0)==null ? Display.empty():Display.getWithNewlines(arg.get("LABEL",
0));;
:diagram.delay(strings);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

