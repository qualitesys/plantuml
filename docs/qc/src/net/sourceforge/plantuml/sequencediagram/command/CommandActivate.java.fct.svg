@startuml
!pragma layout smetana
start
note right
constructor CommandActivate()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandActivate.class .getName(),RegexLeaf.start(),new RegexLeaf("TYPE","(activate|deactivate|destroy|create)"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("WHO","([%pLN_.@]+
|[%g][^%g]+[%g])"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("BACK","(#\\w+
)?"),new RegexOptional(new RegexConcat(RegexLeaf.spaceOneOrMore(),new RegexLeaf("LINE","(#\\w+
)"))),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(SequenceDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final LifeEventType type=LifeEventType.valueOf(StringUtils.goUpperCase(arg.get("TYPE",
0)));;
:final Participant p=diagram.getOrCreateParticipant(StringUtils.eventuallyRemoveStartingAndEndingDoubleQuote(arg.get("WHO",
0)));;
:final String back=arg.get("BACK",0);;
:final HColor backColor=back==null ? null :diagram.getSkinParam()
.getIHtmlColorSet().getColor(back);;
:final String line=arg.get("LINE",0);;
:final HColor lineColor=line==null ? null :diagram.getSkinParam()
.getIHtmlColorSet().getColor(line);;
:final String error=diagram.activate(p,type,
backColor,lineColor);;
if (error==null ) then (yes) 
:return CommandExecutionResult.ok();;
stop
endif 
:return CommandExecutionResult.error(error);;
stop
end
@enduml

