@startuml
!pragma layout smetana
start
note right
constructor CommandIgnoreNewpage()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandIgnoreNewpage.class .getName(),
RegexLeaf.start(),new RegexLeaf("ignore"),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf("newpage"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(SequenceDiagram diagram,
LineLocation location,RegexResult arg)
end note
:diagram.ignoreNewpage();;
:return CommandExecutionResult.ok();;
stop
end
@enduml

