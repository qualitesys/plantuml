@startuml
!pragma layout smetana
start
note right
constructor CommandHSpace()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandHSpace.class .getName(),RegexLeaf.start(),new RegexLeaf("\\|\\|"),new RegexLeaf("VALUE","(\\d+
)?"),new RegexLeaf("\\|+"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(SequenceDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:final Stringsize=arg.get("VALUE",0);;
if (StringUtils.isNotEmpty(size)) then (yes) 
:diagram.hspace(Integer.parseInt(size));;
else (no)
:diagram.hspace();;
endif 
:return CommandExecutionResult.ok();;
stop
end
@enduml

