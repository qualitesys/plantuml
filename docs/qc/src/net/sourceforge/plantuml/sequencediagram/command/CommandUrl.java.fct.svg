roke:#181818;stroke-width:1.0;"/><!--MD5=[824ecd3c2442d2d67a2a26eb358e7042]
@startuml
!pragma layout smetana
start
note right
constructor CommandUrl()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandUrl.class .getName(),
RegexLeaf.start(),new RegexLeaf("url"),RegexLeaf.spaceZeroOrMore(),new RegexOptional(new RegexLeaf("of|for")),RegexLeaf.spaceOneOrMore(),new RegexLeaf("CODE","([%pLN_.@]+
|[%g][^%g]+[%g])"),RegexLeaf.spaceOneOrMore(),new RegexOptional(new RegexLeaf("is")),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("URL","("+
UrlBuilder.getRegexp()+")"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(SequenceDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final String code=arg.get("CODE",0);;
:final String urlString=arg.get("URL",0);;
:final Participant p=diagram.getOrCreateParticipant(code);;
:final UrlBuilder urlBuilder=new UrlBuilder(diagram.getSkinParam().getValue("topurl"),
UrlMode.STRICT);;
:final Url url=urlBuilder.getUrl(urlString);;
:p.setUrl(url);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

