@startuml
!pragma layout smetana
start
note right
constructor CommandHideUnlinked()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandHideUnlinked.class .getName(),
RegexLeaf.start(),new RegexLeaf("HIDE","(hide|show)"),
RegexLeaf.spaceOneOrMore(),new RegexLeaf("@?unlinked"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(SequenceDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:diagram.setHideUnlinkedData(arg.get("HIDE",
0).equalsIgnoreCase("hide"));;
:return CommandExecutionResult.ok();;
stop
end
@enduml

