@startuml
!pragma layout smetana
start
note right
constructor CommandFootboxOld()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandFootboxOld.class .getName(),
RegexLeaf.start(),new RegexLeaf("footbox"),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf("TYPE",
"(on|off)?"),RegexLeaf.spaceZeroOrMore(),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(SequenceDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final boolean footbox=arg.get("TYPE",0).equalsIgnoreCase("on");;
:diagram.setShowFootbox(footbox);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

