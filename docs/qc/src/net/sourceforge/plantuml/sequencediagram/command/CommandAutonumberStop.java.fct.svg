@startuml
!pragma layout smetana
start
note right
constructor CommandAutonumberStop()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandAutonumberStop.class .getName(),
RegexLeaf.start(),new RegexLeaf("autonumber"),
RegexLeaf.spaceOneOrMore(),new RegexLeaf("stop"),
RegexLeaf.spaceZeroOrMore(),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(SequenceDiagram diagram,
LineLocation location,RegexResult arg)
end note
:diagram.autonumberStop();;
:return CommandExecutionResult.ok();;
stop
end
@enduml

