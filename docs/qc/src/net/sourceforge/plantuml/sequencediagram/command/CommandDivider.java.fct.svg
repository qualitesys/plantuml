@startuml
!pragma layout smetana
start
note right
constructor CommandDivider()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandDivider.class .getName(),
RegexLeaf.start(),new RegexLeaf("=="),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("LABEL","(.*)"),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("=="),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(SequenceDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:final Displaystrings=Display.getWithNewlines(arg.get("LABEL",
0));;
:diagram.divider(strings);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

