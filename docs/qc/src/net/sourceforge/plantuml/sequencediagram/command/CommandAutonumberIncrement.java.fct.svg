8;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="575.5" x2="575.5" y1="606.2188" y2="624.2188"/><line style="stroke:#181818;stroke-width:1.0;" x1="575.5" x2="391.5" y1="624.2188" y2="624.2188"/><polygon fill="#181818" points="401.5,620.2188,391.5,624.2188,401.5,628.2188,397.5,624.2188" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="379.5" x2="379.5" y1="464.2813" y2="484.2813"/><polygon fill="#181818" points="375.5,474.2813,379.5,484.2813,383.5,474.2813,379.5,478.2813" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="379.5" x2="379.5" y1="636.2188" y2="656.2188"/><polygon fill="#181818" points="375.5,646.2188,379.5,656.2188,383.5,646.2188,379.5,650.2188" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="379.5" x2="379.5" y1="690.1875" y2="710.1875"/><polygon fill="#181818" points="375.5,700.1875,379.5,710.1875,383.5,700.1875,379.5,704.1875" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[12337a1dec098be282d4a6cf0fb17374]
@startuml
!pragma layout smetana
start
note right
constructor CommandAutonumberIncrement()
end note
:super (getConcat());;
end
start
note right
RegexConcat getConcat()
end note
:return RegexConcat.build(CommandAutonumberIncrement.class .getName(),
RegexLeaf.start(),new RegexLeaf("autonumber"),
RegexLeaf.spaceOneOrMore(),new RegexLeaf("inc"),
new RegexOptional(new RegexConcat(RegexLeaf.spaceOneOrMore(),
new RegexLeaf("POS","([A-Za-z])"))),RegexLeaf.spaceZeroOrMore(),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(SequenceDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final String position=arg.get("POS",0);;
if (position==null ) then (yes) 
:diagram.getAutoNumber().incrementIntermediate();;
else (no)
:final int pos=StringUtils.goLowerCase(position.charAt(0))-'a';;
:diagram.getAutoNumber().incrementIntermediate(pos);;
endif 
:return CommandExecutionResult.ok();;
stop
end
@enduml

