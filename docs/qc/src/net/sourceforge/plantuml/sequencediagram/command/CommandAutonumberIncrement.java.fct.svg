@startuml
!pragma layout smetana
start
note right
constructor CommandAutonumberIncrement()
end note
:super (getConcat());;
end
start
note right
RegexConcatgetConcat()
end note
:return RegexConcat.build(CommandAutonumberIncrement.class .getName(),
RegexLeaf.start(),new RegexLeaf("autonumber"),
RegexLeaf.spaceOneOrMore(),new RegexLeaf("inc"),
new RegexOptional(new RegexConcat(RegexLeaf.spaceOneOrMore(),
new RegexLeaf("POS","([A-Za-z])"))),RegexLeaf.spaceZeroOrMore(),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(SequenceDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:final Stringposition=arg.get("POS",0);;
if (position==null ) then (yes) 
:diagram.getAutoNumber().incrementIntermediate();;
else (no)
:final intpos=StringUtils.goLowerCase(position.charAt(0))-'a';;
:diagram.getAutoNumber().incrementIntermediate(pos);;
endif 
:return CommandExecutionResult.ok();;
stop
end
@enduml

