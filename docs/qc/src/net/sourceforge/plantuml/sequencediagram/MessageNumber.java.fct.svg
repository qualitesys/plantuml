@startuml
!pragma layout smetana
start
note right
String toString()
end note
:return representation;;
stop
end
start
note right
constructor MessageNumber(String s)
end note
:this.representation=s;;
end
start
note right
String getNumberRaw()
end note
:return representation.replaceAll("\\</?b\\>",
"");;
stop
end
start
note right
char charAt(int arg0)
end note
:return representation.charAt(arg0);;
stop
end
start
note right
int length()
end note
:return representation.length();;
stop
end
start
note right
CharSequence subSequence(int arg0,int arg1)
end note
:return representation.subSequence(arg0,arg1);;
stop
end
@enduml

