@startuml
!pragma layout smetana
start
note right
void addStep(Stepstep)
end note
if (step.getIndent()<0) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
if (values.size()>0) then (yes) 
:final doublelastY=values.get(values.size()-1)
.getValue();;
if (step.getValue()<=lastY) then (yes) 
:return ;;
stop
endif 
endif 
:values.add(step);;
end
start
note right
intgetMaxIndent()
end note
:intmax=Integer.MIN_VALUE;;
:final intv=step.getIndent();;
if (v>max) then (yes) 
:max=v;;
endif 
:return max;;
stop
end
start
note right
Collection<Step>getSteps()
end note
:return Collections.unmodifiableCollection(values);;
stop
end
@enduml

