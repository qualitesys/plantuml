@startuml
!pragma layout smetana
start
note right
constructor UGraphicInterceptorTile(UGraphic ug,
boolean isBackground)
end note
:super (ug);;
:this.isBackground=isBackground;;
end
start
note right
void draw(UShape shape)
end note
if (shape instanceof Tile ) then (yes) 
:final UDrawable drawable=(UDrawable )shape;;
:drawable.drawU(this);;
else (no)
:getUg().draw(shape);;
endif 
end
start
note right
UGraphic apply(UChange change)
end note
:return new UGraphicInterceptorTile(getUg().apply(change),
isBackground);;
stop
end
start
note right
boolean isBackground()
end note
:return isBackground;;
stop
end
@enduml

