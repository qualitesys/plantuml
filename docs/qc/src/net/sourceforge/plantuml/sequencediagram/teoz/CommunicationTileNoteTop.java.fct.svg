86" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[062c642b65c0b70fd1c0be61c36cf5f6]
@startuml
!pragma layout smetana
start
note right
constructor CommunicationTileNoteTop(Tiletile,
AbstractMessagemessage,Roseskin,ISkinParamskinParam,
NotenoteOnMessage,YGaugecurrentY)
end note
:super (tile,message,skin,skinParam,noteOnMessage,
currentY);;
end
start
note right
void drawU(UGraphicug)
end note
:final StringBounderstringBounder=ug.getStringBounder();;
:final Componentcomp=getComponent(stringBounder);;
:final XDimension2Ddim=comp.getPreferredDimension(stringBounder);;
:final Areaarea=Area.create(dim.getWidth(),
dim.getHeight());;
:((UDrawable)tile).drawU(ug.apply(UTranslate.dy(dim.getHeight()+
spacey)));;
if (YGauge.USE_ME) then (yes) 
:ug=ug.apply(UTranslate.dy(getYGauge().getMin()
.getCurrentValue()));;
endif 
:final doublemiddleMsg=(tile.getMinX().getCurrentValue()+
tile.getMaxX().getCurrentValue())/2;;
:final doublexNote=getNotePosition(stringBounder)
.getCurrentValue();;
:comp.drawU(ug.apply(UTranslate.dx(xNote)),
area,(Context2D)ug);;
:drawLine(ug,middleMsg,tile.getContactPointRelative()+
dim.getHeight()+spacey,xNote+dim.getWidth()/2,
dim.getHeight()-2*Rose.paddingY);;
end
@enduml

