@startuml
!pragma layout smetana
start
note right
constructor CommonTile(StringBounder stringBounder)
end note
:this.stringBounder=stringBounder;;
end
start
note right
void callbackY(TimeHook y)
end note
if (YGauge.USE_ME) then (yes) 
else (no)
:this.y=y;;
:callbackY_internal(y);;
endif 
end
start
note right
void callbackY_internal(TimeHook y)
end note
if (YGauge.USE_ME) then (yes) 
:System.err.println("callbackY_internal::y="+
y+" gauge="+getYGauge()+" "+getClass());;
endif 
end
start
note right
StringBounder getStringBounder()
end note
:return stringBounder;;
stop
end
start
note right
double getMiddleX()
end note
:final double max=getMaxX().getCurrentValue();;
:final double min=getMinX().getCurrentValue();;
:return (min+max)/2;;
stop
end
start
note right
TimeHook getTimeHook()
end note
if (YGauge.USE_ME) then (yes) 
:throw new IllegalStateException();;
stop
endif 
:return y;;
stop
end
@enduml

