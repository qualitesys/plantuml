@startuml
!pragma layout smetana
start
note right
constructor CommonTile(StringBounderstringBounder)
end note
:this.stringBounder=stringBounder;;
end
start
note right
void callbackY(TimeHooky)
end note
if (YGauge.USE_ME) then (yes) 
else (no)
:this.y=y;;
:callbackY_internal(y);;
endif 
end
start
note right
void callbackY_internal(TimeHooky)
end note
if (YGauge.USE_ME) then (yes) 
:System.err.println("callbackY_internal::y="+
y+" gauge="+getYGauge()+" "+getClass());;
endif 
end
start
note right
StringBoundergetStringBounder()
end note
:return stringBounder;;
stop
end
start
note right
doublegetMiddleX()
end note
:final doublemax=getMaxX().getCurrentValue();;
:final doublemin=getMinX().getCurrentValue();;
:return (min+max)/2;;
stop
end
start
note right
TimeHookgetTimeHook()
end note
if (YGauge.USE_ME) then (yes) 
:throw new IllegalStateException();;
stop
endif 
:return y;;
stop
end
@enduml

