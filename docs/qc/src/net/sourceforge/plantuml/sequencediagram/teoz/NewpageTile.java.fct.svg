@startuml
!pragma layout smetana
start
note right
double getContactPointRelative()
end note
:return 0;;
stop
end
start
note right
constructor NewpageTile(Newpage newpage,TileArguments tileArguments,
YGauge currentY)
end note
:super (tileArguments.getStringBounder(),
currentY);;
:this.newpage=newpage;;
:this.tileArguments=tileArguments;;
end
start
note right
void drawU(UGraphic ug)
end note
end
start
note right
double getPreferredHeight()
end note
:return 0;;
stop
end
start
note right
void addConstraints()
end note
end
start
note right
Real getMinX()
end note
:return tileArguments.getXOrigin();;
stop
end
start
note right
Real getMaxX()
end note
:return tileArguments.getXOrigin();;
stop
end
start
note right
Event getEvent()
end note
:return newpage;;
stop
end
@enduml

