@startuml
!pragma layout smetana
start
note right
constructor Step(doublevalue,booleandestroy,
intindent,SymbolContextcolor)
end note
if (indent<0) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:this.indent=indent;;
:this.color=color;;
:this.value=value;;
:this.destroy=destroy;;
end
start
note right
doublegetValue()
end note
:return value;;
stop
end
start
note right
booleanisDestroy()
end note
:return destroy;;
stop
end
start
note right
intgetIndent()
end note
:return indent;;
stop
end
start
note right
SymbolContextgetColors()
end note
:return color;;
stop
end
@enduml

