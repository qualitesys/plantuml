@startuml
!pragma layout smetana
start
note right
constructor TeozLayer(PngTitler titler,StringBounder stringBounder,
FontParam param)
end note
:this.titler=titler;;
:this.param=param;;
:dimension=new XDimension2D(0,0);;
if (titler!=null &&titler.getRibbonBlock()!=null ) then (yes) 
:dimension=titler.getRibbonBlock().calculateDimension(stringBounder);;
endif 
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:return dimension;;
stop
end
start
note right
FontParam getParam()
end note
:return param;;
stop
end
start
note right
void drawU(UGraphic ug)
end note
if (titler!=null ) then (yes) 
:titler.getRibbonBlock().drawU(ug);;
endif 
end
@enduml

