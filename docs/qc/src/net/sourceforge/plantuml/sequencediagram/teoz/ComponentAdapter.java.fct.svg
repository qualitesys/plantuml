@startuml
!pragma layout smetana
start
note right
constructor ComponentAdapter(Component component)
end note
:this.component=component;;
end
start
note right
void drawU(UGraphic ug)
end note
if (component==null ) then (yes) 
:return ;;
stop
endif 
:component.drawU(ug,new Area(calculateDimension(ug.getStringBounder())),
new SimpleContext2D(false));;
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
if (component==null ) then (yes) 
:return new XDimension2D(0,0);;
stop
endif 
:final double width=component.getPreferredWidth(stringBounder);;
:final double height=component.getPreferredHeight(stringBounder);;
:return new XDimension2D(width,height);;
stop
end
@enduml

