@startuml
!pragma layout smetana
start
note right
UGraphicNewpages create(UGraphic ug,double ymin,
double ymax)
end note
:return new UGraphicNewpages(ug,ymin,ymax,0);;
stop
end
start
note right
constructor UGraphicNewpages(UGraphic ug,
double ymin,double ymax,double dy)
end note
:super (ug);;
:this.ymin=ymin;;
:this.ymax=ymax;;
:this.dy=dy;;
end
start
note right
void draw(UShape shape)
end note
:System.err.println("UGraphicNewpages "+shape.getClass());;
if (dy>=ymin&&dy<ymax) then (yes) 
:getUg().draw(shape);;
else (no)
:System.err.println("Removing "+shape);;
endif 
end
start
note right
UGraphic apply(UChange change)
end note
:double newdy=dy;;
if (change instanceof UTranslate ) then (yes) 
:newdy+=((UTranslate )change).getDy();;
endif 
:return new UGraphicNewpages(getUg().apply(change),
ymin,ymax,newdy);;
stop
end
@enduml

