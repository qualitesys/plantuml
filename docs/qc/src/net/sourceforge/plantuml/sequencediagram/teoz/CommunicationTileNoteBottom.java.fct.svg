,930.4023,243.5,920.4023,239.5,924.4023" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="239.5" x2="239.5" y1="978.3398" y2="998.3398"/><polygon fill="#181818" points="235.5,988.3398,239.5,998.3398,243.5,988.3398,239.5,992.3398" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[f3ab7b074290e41cf79d0551af7cc7be]
@startuml
!pragma layout smetana
start
note right
constructor CommunicationTileNoteBottom(Tiletile,
AbstractMessagemessage,Roseskin,ISkinParamskinParam,
NotenoteOnMessage,YGaugecurrentY)
end note
:super (tile,message,skin,skinParam,noteOnMessage,
currentY);;
end
start
note right
void drawU(UGraphicug)
end note
:final StringBounderstringBounder=ug.getStringBounder();;
:final Componentcomp=getComponent(stringBounder);;
:final XDimension2Ddim=comp.getPreferredDimension(stringBounder);;
:final Areaarea=Area.create(dim.getWidth(),
dim.getHeight());;
:((UDrawable)tile).drawU(ug);;
if (YGauge.USE_ME) then (yes) 
:ug=ug.apply(UTranslate.dy(getYGauge().getMin()
.getCurrentValue()));;
endif 
:final doublemiddleMsg=(tile.getMinX().getCurrentValue()+
tile.getMaxX().getCurrentValue())/2;;
:final doublexNote=getNotePosition(stringBounder)
.getCurrentValue();;
:final doubleyNote=tile.getPreferredHeight();;
:comp.drawU(ug.apply(new UTranslate(xNote,yNote+
spacey)),area,(Context2D)ug);;
:drawLine(ug,middleMsg,tile.getContactPointRelative(),xNote+
dim.getWidth()/2,yNote+spacey+Rose.paddingY);;
end
@enduml

