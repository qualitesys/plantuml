5,920.4023,241.5,930.4023,245.5,920.4023,241.5,924.4023" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="241.5" x2="241.5" y1="978.3398" y2="998.3398"/><polygon fill="#181818" points="237.5,988.3398,241.5,998.3398,245.5,988.3398,241.5,992.3398" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[46e05055a7b30fb5c8a53d5201c890f7]
@startuml
!pragma layout smetana
start
note right
constructor CommunicationTileNoteBottom(Tile tile,
AbstractMessage message,Rose skin,ISkinParam skinParam,
Note noteOnMessage,YGauge currentY)
end note
:super (tile,message,skin,skinParam,noteOnMessage,
currentY);;
end
start
note right
void drawU(UGraphic ug)
end note
:final StringBounder stringBounder=ug.getStringBounder();;
:final Component comp=getComponent(stringBounder);;
:final XDimension2D dim=comp.getPreferredDimension(stringBounder);;
:final Area area=Area.create(dim.getWidth(),
dim.getHeight());;
:((UDrawable )tile).drawU(ug);;
if (YGauge.USE_ME) then (yes) 
:ug=ug.apply(UTranslate.dy(getYGauge().getMin()
.getCurrentValue()));;
endif 
:final double middleMsg=(tile.getMinX().getCurrentValue()+
tile.getMaxX().getCurrentValue())/2;;
:final double xNote=getNotePosition(stringBounder)
.getCurrentValue();;
:final double yNote=tile.getPreferredHeight();;
:comp.drawU(ug.apply(new UTranslate(xNote,yNote+
spacey)),area,(Context2D )ug);;
:drawLine(ug,middleMsg,tile.getContactPointRelative(),xNote+
dim.getWidth()/2,yNote+spacey+Rose.paddingY);;
end
@enduml

