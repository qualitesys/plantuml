@startuml
!pragma layout smetana
start
note right
constructor EmptyTile(double height,Tile position,
YGauge currentY)
end note
:super (((AbstractTile )position).getStringBounder(),
currentY);;
if (YGauge.USE_ME) then (yes) 
:throw new UnsupportedOperationException();;
stop
endif 
:this.height=height;;
:this.position=position;;
:this.yGauge=YGauge.create(currentY.getMax(),
getPreferredHeight());;
end
start
note right
YGauge getYGauge()
end note
:return yGauge;;
stop
end
start
note right
void drawU(UGraphic ug)
end note
end
start
note right
double getPreferredHeight()
end note
:return height;;
stop
end
start
note right
void addConstraints()
end note
end
start
note right
Real getMinX()
end note
:return position.getMinX();;
stop
end
start
note right
Real getMaxX()
end note
:return position.getMaxX();;
stop
end
start
note right
Event getEvent()
end note
:return new AbstractEvent(){public boolean dealWith(Participant someone){return false;}};;
stop
end
@enduml

