@startuml
!pragma layout smetana
start
note right
constructor TileMarged(Tile tile,double x1,
double x2,double y1,double y2)
end note
:super (((AbstractTile )tile).getStringBounder());;
:this.tile=tile;;
:this.x1=x1;;
:this.x2=x2;;
:this.y1=y1;;
:this.y2=y2;;
end
start
note right
void drawU(UGraphic ug)
end note
:((UDrawable )tile).drawU(ug.apply(new UTranslate(x1,
y1)));;
end
start
note right
double getPreferredHeight()
end note
:return tile.getPreferredHeight()+y1+y2;;
stop
end
start
note right
void addConstraints()
end note
:tile.addConstraints();;
end
start
note right
Real getMinX()
end note
:return tile.getMinX();;
stop
end
start
note right
Real getMaxX()
end note
:return tile.getMaxX().addFixed(x1+x2);;
stop
end
start
note right
Event getEvent()
end note
:return tile.getEvent();;
stop
end
@enduml

