@startuml
!pragma layout smetana
start
note right
constructor TileMarged(Tiletile,doublex1,
doublex2,doubley1,doubley2)
end note
:super (((AbstractTile)tile).getStringBounder());;
:this.tile=tile;;
:this.x1=x1;;
:this.x2=x2;;
:this.y1=y1;;
:this.y2=y2;;
end
start
note right
void drawU(UGraphicug)
end note
:((UDrawable)tile).drawU(ug.apply(new UTranslate(x1,
y1)));;
end
start
note right
doublegetPreferredHeight()
end note
:return tile.getPreferredHeight()+y1+y2;;
stop
end
start
note right
void addConstraints()
end note
:tile.addConstraints();;
end
start
note right
RealgetMinX()
end note
:return tile.getMinX();;
stop
end
start
note right
RealgetMaxX()
end note
:return tile.getMaxX().addFixed(x1+x2);;
stop
end
start
note right
EventgetEvent()
end note
:return tile.getEvent();;
stop
end
@enduml

