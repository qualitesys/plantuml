@startuml
!pragma layout smetana
start
note right
EventgetEvent()
end note
:return hspace;;
stop
end
start
note right
constructor HSpaceTile(HSpacehspace,TileArgumentstileArguments,
YGaugecurrentY)
end note
:super (tileArguments.getStringBounder(),
currentY);;
:this.hspace=hspace;;
:this.xorigin=tileArguments.getXOrigin();;
:this.yGauge=YGauge.create(currentY.getMax(),
getPreferredHeight());;
end
start
note right
YGaugegetYGauge()
end note
:return yGauge;;
stop
end
start
note right
void drawU(UGraphicug)
end note
end
start
note right
doublegetPreferredHeight()
end note
:return hspace.getPixel();;
stop
end
start
note right
void addConstraints()
end note
end
start
note right
RealgetMinX()
end note
:return xorigin;;
stop
end
start
note right
RealgetMaxX()
end note
:return xorigin.addFixed(10);;
stop
end
@enduml

