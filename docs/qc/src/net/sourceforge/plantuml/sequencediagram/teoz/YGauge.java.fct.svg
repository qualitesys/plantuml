@startuml
!pragma layout smetana
start
note right
constructor YGauge(Realmin,Realmax)
end note
:this.min=min;;
:this.max=max;;
end
start
note right
StringtoString()
end note
:return min.getCurrentValue()+" "+max.getCurrentValue();;
stop
end
start
note right
YGaugecreate(Realmin,doubleheight)
end note
if (height<0) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:return new YGauge(min,min.addFixed(height));;
stop
end
start
note right
RealgetMin()
end note
:return min;;
stop
end
start
note right
RealgetMax()
end note
:return max;;
stop
end
@enduml

