@startuml
!pragma layout smetana
start
note right
StyleSignatureBasic getStyleSignature()
end note
:return ComponentType.DELAY_TEXT.getStyleSignature();;
stop
end
start
note right
Style[] getUsedStyles()
end note
:return new Style[]{style};;
stop
end
start
note right
constructor Delay(Display text,StyleBuilder styleBuilder)
end note
:this.text=text;;
:this.style=getStyleSignature().getMergedStyle(styleBuilder);;
end
start
note right
Display getText()
end note
:return text;;
stop
end
start
note right
boolean dealWith(Participant someone)
end note
:return false;;
stop
end
@enduml

