@startuml
!pragma layout smetana
start
note right
constructor SegmentPosition(PSegment segment,
double position)
end note
:this.segment=segment;;
:this.position=position;;
end
start
note right
double getPosition()
end note
:return segment.getPosition(position);;
stop
end
start
note right
PSegment getSegment()
end note
:return segment;;
stop
end
@enduml

