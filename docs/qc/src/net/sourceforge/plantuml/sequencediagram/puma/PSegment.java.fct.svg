@startuml
!pragma layout smetana
start
note right
constructor PSegment(doubleminsize)
end note
:this.minsize=minsize;;
:this.startx=0;;
:this.endx=minsize;;
end
start
note right
doublegetMinsize()
end note
:return minsize;;
stop
end
start
note right
void push(doubledelta)
end note
:this.startx+=delta;;
:this.endx+=delta;;
end
start
note right
StringgetDebugPosition()
end note
:return ""+((int)startx)+"-"+((int)endx);;
stop
end
start
note right
doublegetPosition(doubleposition)
end note
if (position==0) then (yes) 
:return startx;;
stop
endif 
if (position==1) then (yes) 
:return endx;;
stop
endif 
:throw new UnsupportedOperationException();;
stop
end
@enduml

