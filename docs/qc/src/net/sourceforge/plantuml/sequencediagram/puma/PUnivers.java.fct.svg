@startuml
!pragma layout smetana
start
note right
PSegmentcreatePSegment(doubleminsize)
end note
:final PSegmentresult=new PSegment(minsize);;
:all.add(result);;
:return result;;
stop
end
start
note right
void addFixedLink(PSegmentsegment1,doubleposition1,
PSegmentsegment2,doubleposition2)
end note
:final FixedLinklink=new FixedLink(new SegmentPosition(segment1,
position1),new SegmentPosition(segment2,position2));;
:links.add(link);;
end
start
note right
void solve()
end note
:booleanchanged=false;;
repeat
:changed=false;;
if (link.pushIfNeed()) then (yes) 
:changed=true;;
endif 
repeat while (changed)
end
@enduml

