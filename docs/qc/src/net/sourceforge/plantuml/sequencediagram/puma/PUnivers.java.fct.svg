@startuml
!pragma layout smetana
start
note right
PSegment createPSegment(double minsize)
end note
:final PSegment result=new PSegment(minsize);;
:all.add(result);;
:return result;;
stop
end
start
note right
void addFixedLink(PSegment segment1,double position1,
PSegment segment2,double position2)
end note
:final FixedLink link=new FixedLink(new SegmentPosition(segment1,
position1),new SegmentPosition(segment2,position2));;
:links.add(link);;
end
start
note right
void solve()
end note
:boolean changed=false;;
repeat
:changed=false;;
if (link.pushIfNeed()) then (yes) 
:changed=true;;
endif 
repeat while (changed)
end
@enduml

