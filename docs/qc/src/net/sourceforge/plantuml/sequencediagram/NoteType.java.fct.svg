@startuml
!pragma layout smetana
start
note right
NoteTypedefaultType(Strings)
end note
if (s==null ) then (yes) 
:return NoteType.NOTE;;
stop
endif 
:return NoteType.valueOf(StringUtils.goUpperCase(s).replace(' ',
'_'));;
stop
end
@enduml

