6,949.6172,290,939.6172,286,943.6172" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[4332a5e345255bc99af691a76c9fe6e6]
@startuml
!pragma layout smetana
start
note right
constructor LifeDestroy(doublestartingY,ParticipantBoxparticipant,
Componentcomp)
end note
:super (startingY);;
:this.participant=participant;;
:this.comp=comp;;
end
start
note right
void drawInternalU(UGraphicug,doublemaxX,
Context2Dcontext)
end note
:final StringBounderstringBounder=ug.getStringBounder();;
:ug=ug.apply(new UTranslate(getStartingX(stringBounder),
getStartingY()));;
:comp.drawU(ug,null ,context);;
end
start
note right
doublegetPreferredHeight(StringBounderstringBounder)
end note
:return comp.getPreferredHeight(stringBounder);;
stop
end
start
note right
doublegetPreferredWidth(StringBounderstringBounder)
end note
:return comp.getPreferredWidth(stringBounder);;
stop
end
start
note right
doublegetStartingX(StringBounderstringBounder)
end note
:return participant.getCenterX(stringBounder)-getPreferredWidth(stringBounder)/2.0;;
stop
end
@enduml

