@startuml
!pragma layout smetana
start
note right
constructor GraphicalDivider(doublestartingY,
Componentcomp)
end note
:super (startingY);;
:this.comp=comp;;
end
start
note right
void drawInternalU(UGraphicug,doublemaxX,
Context2Dcontext)
end note
:ug=ug.apply(UTranslate.dy(getStartingY()));;
:final StringBounderstringBounder=ug.getStringBounder();;
:final XDimension2Ddim=new XDimension2D(maxX,
comp.getPreferredHeight(stringBounder));;
:comp.drawU(ug,new Area(dim),context);;
end
start
note right
doublegetPreferredHeight(StringBounderstringBounder)
end note
:return comp.getPreferredHeight(stringBounder);;
stop
end
start
note right
doublegetPreferredWidth(StringBounderstringBounder)
end note
:return comp.getPreferredWidth(stringBounder);;
stop
end
start
note right
doublegetStartingX(StringBounderstringBounder)
end note
:return 0;;
stop
end
@enduml

