@startuml
!pragma layout smetana
start
note right
constructor GraphicalDelayText(doublestartingY,
ComponentcompText,ParticipantBoxfirst,ParticipantBoxlast)
end note
:super (startingY);;
:this.compText=compText;;
:this.p1=first;;
:this.p2=last;;
end
start
note right
void drawInternalU(UGraphicug,doublemaxX,
Context2Dcontext)
end note
:final StringBounderstringBounder=ug.getStringBounder();;
:final doublex1=p1.getCenterX(stringBounder);;
