@startuml
!pragma layout smetana
start
note right
constructor GroupingGraphicalElement(double currentY,
InGroupableList inGroupableList)
end note
:super (currentY);;
:this.inGroupableList=Objects.requireNonNull(inGroupableList);;
end
start
note right
double getActualWidth(StringBounder stringBounder)
end note
:return Math.max(getPreferredWidth(stringBounder),inGroupableList.getMaxX(stringBounder)-inGroupableList.getMinX(stringBounder)+
2*InGroupableList.MARGIN10);;
stop
end
start
note right
double getStartingX(StringBounder stringBounder)
end note
:return inGroupableList.getMinX(stringBounder)-InGroupableList.MARGIN10;;
stop
end
start
note right
InGroupableList getInGroupableList()
end note
:return inGroupableList;;
stop
end
@enduml

