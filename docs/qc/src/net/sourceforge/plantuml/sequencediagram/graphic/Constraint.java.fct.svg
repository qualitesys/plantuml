@startuml
!pragma layout smetana
start
note right
constructor Constraint(Pushablep1,Pushablep2)
end note
:this.p1=Objects.requireNonNull(p1);;
:this.p2=Objects.requireNonNull(p2);;
end
start
note right
PushablegetParticipant1()
end note
:return p1;;
stop
end
start
note right
PushablegetParticipant2()
end note
:return p2;;
stop
end
start
note right
doublegetValue()
end note
:return value;;
stop
end
start
note right
void ensureValue(doublenewValue)
end note
if (newValue>value) then (yes) 
:this.value=newValue;;
endif 
end
start
note right
void push(doubledelta)
end note
:value+=delta;;
end
start
note right
StringtoString()
end note
:return "Constraint "+p1+" "+p2+" "+value;;
stop
end
@enduml

