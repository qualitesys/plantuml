@startuml
!pragma layout smetana
start
note right
void addList(InGroupableList inGroupableList)
end note
:other.addInGroupable(inGroupableList);;
:inGroupableStack.add(inGroupableList);;
end
start
note right
void pop()
end note
:final int idx=inGroupableStack.size()-1;;
:inGroupableStack.remove(idx);;
end
start
note right
void addElement(InGroupable inGroupable)
end note
:groupingStructure.addInGroupable(inGroupable);;
end
start
note right
InGroupableList getTopGroupingStructure()
end note
if (inGroupableStack.size()==0) then (yes) 
:return null ;;
stop
endif 
:return inGroupableStack.get(inGroupableStack.size()-1);;
stop
end
@enduml

