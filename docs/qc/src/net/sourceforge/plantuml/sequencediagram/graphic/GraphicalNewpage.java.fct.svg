roke-width:1.0;"/><!--MD5=[4e439a4d06c260828f7302c4595a6ce3]
@startuml
!pragma layout smetana
start
note right
constructor GraphicalNewpage(double startingY,
Component comp)
end note
:super (startingY);;
:this.comp=comp;;
end
start
note right
void drawInternalU(UGraphic ug,double maxX,
Context2D context)
end note
:ug=ug.apply(UTranslate.dy(getStartingY()));;
:final StringBounder stringBounder=ug.getStringBounder();;
:final XDimension2D dim=new XDimension2D(maxX,
comp.getPreferredHeight(stringBounder));;
:comp.drawU(ug,new Area(dim),context);;
end
start
note right
double getPreferredHeight(StringBounder stringBounder)
end note
:return comp.getPreferredHeight(stringBounder);;
stop
end
start
note right
double getPreferredWidth(StringBounder stringBounder)
end note
:return comp.getPreferredWidth(stringBounder);;
stop
end
start
note right
double getStartingX(StringBounder stringBounder)
end note
:return 0;;
stop
end
@enduml

