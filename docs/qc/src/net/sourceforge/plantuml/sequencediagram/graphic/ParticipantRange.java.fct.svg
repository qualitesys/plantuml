@startuml
!pragma layout smetana
start
note right
constructor ParticipantRange(intstart,intend)
end note
if (start>end) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:this.start=start;;
:this.end=end;;
end
start
note right
intstart()
end note
:return start;;
stop
end
start
note right
intend()
end note
:return end;;
stop
end
start
note right
ParticipantRangemerge(ParticipantRangeother)
end note
:return new ParticipantRange(this.start,other.end);;
stop
end
@enduml

