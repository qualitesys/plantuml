@startuml
!pragma layout smetana
start
note right
intapply(intv)
end note
if (this==LARGER) then (yes) 
:return v+1;;
stop
endif 
:assert this==SMALLER;;
if (v==0) then (yes) 
:return 0;;
stop
endif 
:return v-1;;
stop
end
@enduml

