@startuml
!pragma layout smetana
start
note right
constructor FrontierSimple(doublefreeY)
end note
:this.freeY=freeY;;
end
start
note right
doublegetFreeY(ParticipantRangerange)
end note
:Objects.requireNonNull(range);;
:return freeY;;
stop
end
start
note right
FrontierSimpleadd(doubledelta,ParticipantRangerange)
end note
:Objects.requireNonNull(range);;
:return new FrontierSimple(freeY+delta);;
stop
end
@enduml

