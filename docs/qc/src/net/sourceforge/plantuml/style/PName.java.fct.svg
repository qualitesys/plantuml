@startuml
!pragma layout smetana
start
note right
PName getFromName(String name,StyleScheme scheme)
end note
if (prop.name().equalsIgnoreCase(name)) then (yes) 
:return prop;;
stop
endif 
:return null ;;
stop
end
@enduml

