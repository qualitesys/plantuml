@startuml
!pragma layout smetana
start
note right
StringtoString()
end note
:return color.toString();;
stop
end
start
note right
constructor ValueColor(HColorcolor,intpriority)
end note
:this.color=color;;
:this.priority=priority;;
end
start
note right
HColorasColor(HColorSetset)
end note
:return color;;
stop
end
start
note right
intgetPriority()
end note
:return priority;;
stop
end
@enduml

