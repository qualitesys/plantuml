@startuml
!pragma layout smetana
start
note right
constructor CommandStyleMultilinesCSS()
end note
:super (getRegexConcat(),MultilinesStrategy.REMOVE_STARTING_QUOTE,
Trim.BOTH);;
end
start
note right
StringgetPatternEnd()
end note
:return "^[%s]*\\</style\\>[%s]*$";;
stop
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandStyleMultilinesCSS.class .getName(),
RegexLeaf.start(),new RegexLeaf("\\<style\\>"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteNow(TitledDiagramdiagram,
BlocLineslines)
end note
switch (try/catch block)
case (try)
:final StyleBuilderstyleBuilder=diagram.getSkinParam()
.getCurrentStyleBuilder();;
:diagram.getSkinParam().muteStyle(modifiedStyle);;
:((SkinParam)diagram.getSkinParam()).applyPendingStyleMigration();;
:return CommandExecutionResult.ok();;
stop
case (catch (NoStyleAvailableExceptione))
:return CommandExecutionResult.error("General failure: no style available.");;
stop
endswitch
end
@enduml

