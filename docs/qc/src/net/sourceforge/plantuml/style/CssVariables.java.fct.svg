@startuml
!pragma layout smetana
start
note right
void learn(String s)
end note
:final Matcher m=learnPattern.matcher(s);;
if (m.matches()) then (yes) 
:variables.put(m.group(1),m.group(2));;
endif 
end
start
note right
String value(String v)
end note
if (v.startsWith("var(")) then (yes) 
:final Matcher m=retrieve.matcher(v);;
if (m.matches()) then (yes) 
:final String varname=m.group(1);;
:final String result=variables.get(varname);;
if (result!=null ) then (yes) 
:return result;;
stop
endif 
endif 
endif 
:return v;;
stop
end
@enduml

