@startuml
!pragma layout smetana
start
note right
void learn(Strings)
end note
:final Matcherm=learnPattern.matcher(s);;
if (m.matches()) then (yes) 
:variables.put(m.group(1),m.group(2));;
endif 
end
start
note right
Stringvalue(Stringv)
end note
if (v.startsWith("var(")) then (yes) 
:final Matcherm=retrieve.matcher(v);;
if (m.matches()) then (yes) 
:final Stringvarname=m.group(1);;
:final Stringresult=variables.get(varname);;
if (result!=null ) then (yes) 
:return result;;
stop
endif 
endif 
endif 
:return v;;
stop
end
@enduml

