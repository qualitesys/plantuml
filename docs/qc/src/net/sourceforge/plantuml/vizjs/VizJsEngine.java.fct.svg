@startuml
!pragma layout smetana
start
note right
booleanisOk()
end note
switch (try/catch block)
case (try)
:final ClassclassVizJS=Class.forName("ch.braincell.viz.VizJS");;
:return true;;
stop
case (catch (Exceptione))
:return false;;
stop
endswitch
end
start
note right
constructor VizJsEngine()
end note
:final ClassclassVizJS=Class.forName("ch.braincell.viz.VizJS");;
:final MethodmCreate=classVizJS.getMethod("create");;
:mExecute=classVizJS.getMethod("execute",
String.class );;
:this.viz=mCreate.invoke(null );;
end
start
note right
Stringexecute(Stringdot)
end note
:return (String)mExecute.invoke(viz,dot);;
stop
end
@enduml

