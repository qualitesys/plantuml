@startuml
!pragma layout smetana
start
note right
boolean isOk()
end note
switch (try/catch block)
case (try)
:final Class classVizJS=Class.forName("ch.braincell.viz.VizJS");;
:return true;;
stop
case (catch (Exception e))
:return false;;
stop
endswitch
end
start
note right
constructor VizJsEngine()
end note
:final Class classVizJS=Class.forName("ch.braincell.viz.VizJS");;
:final Method mCreate=classVizJS.getMethod("create");;
:mExecute=classVizJS.getMethod("execute",
String.class );;
:this.viz=mCreate.invoke(null );;
end
start
note right
String execute(String dot)
end note
:return (String )mExecute.invoke(viz,dot);;
stop
end
@enduml

