@startuml
!pragma layout smetana
start
note right
constructor CommandNewpage(PSystemCommandFactory factory)
end note
:super (getRegexConcat());;
:this.factory=factory;;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandNewpage.class .getName(),
RegexLeaf.start(),new RegexLeaf("newpage"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(UmlDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final int dpi=diagram.getSkinParam().getDpi();;
:final UmlDiagram emptyDiagram=(UmlDiagram )factory.createEmptyDiagram(diagram.getSource(),
diagram.getSkinParam().values());;
if (dpi!=96) then (yes) 
:emptyDiagram.setParam("dpi",""+dpi);;
endif 
:final NewpagedDiagram result=new NewpagedDiagram(diagram.getSource(),
diagram,emptyDiagram);;
:return CommandExecutionResult.newDiagram(result);;
stop
end
@enduml

