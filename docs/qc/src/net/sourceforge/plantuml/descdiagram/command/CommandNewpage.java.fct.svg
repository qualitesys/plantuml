@startuml
!pragma layout smetana
start
note right
constructor CommandNewpage(PSystemCommandFactoryfactory)
end note
:super (getRegexConcat());;
:this.factory=factory;;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandNewpage.class .getName(),
RegexLeaf.start(),new RegexLeaf("newpage"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(UmlDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:final intdpi=diagram.getSkinParam().getDpi();;
:final UmlDiagramemptyDiagram=(UmlDiagram)factory.createEmptyDiagram(diagram.getSource(),
diagram.getSkinParam().values());;
if (dpi!=96) then (yes) 
:emptyDiagram.setParam("dpi",""+dpi);;
endif 
:final NewpagedDiagramresult=new NewpagedDiagram(diagram.getSource(),
diagram,emptyDiagram);;
:return CommandExecutionResult.newDiagram(result);;
stop
end
@enduml

