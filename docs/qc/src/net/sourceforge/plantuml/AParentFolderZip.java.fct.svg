@startuml
!pragma layout smetana
start
note right
String toString()
end note
:return "AParentFolderZip::"+zipFile+" "+
parent;;
stop
end
start
note right
constructor AParentFolderZip(SFile zipFile,
String entry)
end note
:this.zipFile=zipFile;;
:final int idx=entry.lastIndexOf('/');;
if (idx==-1) then (yes) 
:parent="";;
else (no)
:parent=entry.substring(0,idx+1);;
endif 
end
start
note right
AFile getAFile(String nameOrPath)
end note
:return new AFileZipEntry(zipFile,merge(parent+
nameOrPath));;
stop
end
start
note right
String merge(String full)
end note
while (true)
:int len=full.length();;
:full=full.replaceFirst("[^/]+/\\.\\./","");;
if (full.length()==len) then (yes) 
:return full;;
stop
endif 
endwhile
end
@enduml

