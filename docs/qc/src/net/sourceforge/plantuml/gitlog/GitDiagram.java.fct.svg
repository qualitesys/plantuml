@startuml
!pragma layout smetana
start
note right
constructor GitDiagram(UmlSource source,GitTextArea textArea)
end note
:super (source,UmlDiagramType.GIT,null );;
:this.gnodes=new GNodeBuilder(textArea.getAllCommits())
.getAllNodes();;
:new GNodeBuilder(textArea.getAllCommits());;
end
start
note right
DiagramDescription getDescription()
end note
:return new DiagramDescription("(Git)");;
stop
end
start
note right
ImageData exportDiagramInternal(OutputStream os,
int index,FileFormatOption fileFormatOption)
end note
:return createImageBuilder(fileFormatOption)
.drawable(getTextBlock()).write(os);;
stop
end
start
note right
void drawInternal(UGraphic ug)
end note
:new SmetanaForGit(ug,getSkinParam()).drawMe(gnodes);;
end
start
note right
TextBlockBackcolored getTextBlock()
end note
:return new TextBlockBackcolored(){public void drawU(UGraphic ug){drawInternal(ug);
:}public MinMax getMinMax(StringBounder stringBounder){return null ;}public XRectangle2D getInnerPosition(String member,
StringBounder stringBounder,InnerStrategy strategy){return null ;}public XDimension2D calculateDimension(StringBounder stringBounder){return null ;}public HColor getBackcolor(){return null ;}};;
stop
end
@enduml

