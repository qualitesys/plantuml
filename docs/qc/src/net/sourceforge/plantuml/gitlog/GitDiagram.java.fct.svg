@startuml
!pragma layout smetana
start
note right
constructor GitDiagram(UmlSourcesource,GitTextAreatextArea)
end note
:super (source,UmlDiagramType.GIT,null );;
:this.gnodes=new GNodeBuilder(textArea.getAllCommits())
.getAllNodes();;
:new GNodeBuilder(textArea.getAllCommits());;
end
start
note right
DiagramDescriptiongetDescription()
end note
:return new DiagramDescription("(Git)");;
stop
end
start
note right
ImageDataexportDiagramInternal(OutputStreamos,
intindex,FileFormatOptionfileFormatOption)
end note
:return createImageBuilder(fileFormatOption)
.drawable(getTextBlock()).write(os);;
stop
end
start
note right
void drawInternal(UGraphicug)
end note
:new SmetanaForGit(ug,getSkinParam()).drawMe(gnodes);;
end
start
note right
TextBlockBackcoloredgetTextBlock()
end note
:return new TextBlockBackcolored(){public void drawU(UGraphicug){drawInternal(ug);}public MinMaxgetMinMax(StringBounderstringBounder){return null ;}public XRectangle2DgetInnerPosition(Stringmember,
StringBounderstringBounder,InnerStrategystrategy){return null ;}public XDimension2DcalculateDimension(StringBounderstringBounder){return null ;}public HColorgetBackcolor(){return null ;}};;
stop
end
@enduml

