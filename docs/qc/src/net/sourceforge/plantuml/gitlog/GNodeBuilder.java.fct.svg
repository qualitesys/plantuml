@startuml
!pragma layout smetana
start
note right
constructor GNodeBuilder(List<Commit>allCommits)
end note
:final Map<String,GNode>tmp=new LinkedHashMap<String,
GNode>();;
:final GNodenode=new GNode();;
:node.setComment(commit.getComment());;
:node.addText(commit.getName());;
:tmp.put(commit.getName(),node);;
:GNode.link(tmp.get(commit.getName()),tmp.get(parent.getName()));;
:this.all.addAll(tmp.values());;
:merge();;
end
start
note right
void merge()
end note
while (true)
:booleanchanged=false;;
:final GNodenode=it.next();;
if (node.canEatTheNextOne()) then (yes) 
:final GNoderemoved=node.eatTheNextOne();;
:all.remove(removed);;
:changed=true;;
:break ;;
endif 
if (changed==false) then (yes) 
:return ;;
stop
endif 
endwhile
end
start
note right
Collection<GNode>getAllNodes()
end note
:return Collections.unmodifiableCollection(all);;
stop
end
@enduml

