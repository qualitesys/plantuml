@startuml
!pragma layout smetana
start
note right
constructor GitDiagramFactory()
end note
:super (DiagramType.GIT);;
end
start
note right
Diagram createSystem(UmlSource source,Map<String,
String> skinParam)
end note
:final GitTextArea textArea=new GitTextArea();;
:final Iterator<StringLocated> it=source.iterator2();;
:it.next();;
while (true)
:final String line=it.next().getString();;
if (it.hasNext()==false) then (yes) 
:break ;;
endif 
:textArea.add(line);;
endwhile
:return new GitDiagram(source,textArea);;
stop
end
@enduml

