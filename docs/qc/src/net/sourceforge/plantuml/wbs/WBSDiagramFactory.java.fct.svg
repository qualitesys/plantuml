" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="185.5" x2="185.5" y1="610.3125" y2="630.3125"/><polygon fill="#181818" points="181.5,620.3125,185.5,630.3125,189.5,620.3125,185.5,624.3125" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[7dad71ae0af99f9c32f6bdd851fdaf04]
@startuml
!pragma layout smetana
start
note right
constructor WBSDiagramFactory()
end note
:super (DiagramType.WBS);;
end
start
note right
List<Command> createCommands()
end note
:final List<Command> cmds=new ArrayList<>();;
:CommonCommands.addCommonCommands1(cmds);;
:cmds.add(new CommandWBSItem());;
:cmds.add(new CommandWBSItemMultiline());;
:return cmds;;
stop
end
start
note right
WBSDiagram createEmptyDiagram(UmlSource source,
Map<String,String> skinParam)
end note
:return new WBSDiagram(source);;
stop
end
@enduml

