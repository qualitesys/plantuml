@startuml
!pragma layout smetana
start
note right
String toString()
end note
:return all.toString();;
stop
end
start
note right
void add(S element)
end note
:int x=0;;
while (true)
if (grid.isSpaceAvailable(element,x)) then (yes) 
:all.put(element,x);;
:grid.useSpace(element,x);;
:return ;;
stop
endif 
:x++;;
if (x>100) then (yes) 
:throw new IllegalStateException();;
stop
endif 
endwhile
end
start
note right
Map<S,Integer> getPositions()
end note
:return Collections.unmodifiableMap(all);;
stop
end
start
note right
int getNWidth()
end note
:int max=0;;
:max=Math.max(max,ent.getValue()+ent.getKey()
.getNWidth());;
:return max;;
stop
end
@enduml

