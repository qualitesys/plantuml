@startuml
!pragma layout smetana
start
note right
constructor NStage(int number)
end note
:this.number=number;;
end
start
note right
String toString()
end note
:return "S"+number;;
stop
end
start
note right
int compareTo(NStage other)
end note
:return Integer.compare(this.number,other.number);;
stop
end
start
note right
int getNumber()
end note
:return number;;
stop
end
start
note right
NStage getMin(NStage stage1,NStage stage2)
end note
if (stage1.number<stage2.number) then (yes) 
:return stage1;;
stop
endif 
:return stage2;;
stop
end
start
note right
NStage getMax(NStage stage1,NStage stage2)
end note
if (stage1.number>stage2.number) then (yes) 
:return stage1;;
stop
endif 
:return stage2;;
stop
end
@enduml

