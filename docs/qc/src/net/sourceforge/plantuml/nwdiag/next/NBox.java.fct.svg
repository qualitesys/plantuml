317.3398,261,1327.3398,265,1317.3398,261,1321.3398" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[a1aa25cfc1aa45fcaea5ca818e859c2e]
@startuml
!pragma layout smetana
start
note right
void add(NBarbar)
end note
if (this.bars.contains(bar)) then (yes) 
:return ;;
stop
endif 
:this.bars.add(bar);;
:this.tetris.add(bar);;
end
start
note right
NStagegetStart()
end note
:NStageresult=bars.get(0).getStart();;
:result=NStage.getMin(result,bars.get(i).getStart());;
:return result;;
stop
end
start
note right
NStagegetEnd()
end note
:NStageresult=bars.get(0).getEnd();;
:result=NStage.getMax(result,bars.get(i).getEnd());;
:return result;;
stop
end
start
note right
intgetNWidth()
end note
:return tetris.getNWidth();;
stop
end
start
note right
Map<NBar,Integer>getPositions()
end note
:return tetris.getPositions();;
stop
end
start
note right
booleancontains(NStagestage)
end note
:return stage.compareTo(getStart())>=0&&stage.compareTo(getEnd())<=0;;
stop
end
@enduml

