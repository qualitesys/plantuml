@startuml
!pragma layout smetana
start
note right
constructor CommandNwDiagInit()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandNwDiagInit.class .getName(),
RegexLeaf.start(),new RegexLeaf("TYPE","nwdiag"),
RegexLeaf.spaceOneOrMore(),new RegexLeaf("\\{"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(NwDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:diagram.init();;
:return CommandExecutionResult.ok();;
stop
end
@enduml

