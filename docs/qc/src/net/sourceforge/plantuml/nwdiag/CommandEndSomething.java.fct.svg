@startuml
!pragma layout smetana
start
note right
constructor CommandEndSomething()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandEndSomething.class .getName(),
RegexLeaf.start(),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("\\}"),RegexLeaf.spaceZeroOrMore(),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(NwDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:return diagram.closeSomething();;
stop
end
@enduml

