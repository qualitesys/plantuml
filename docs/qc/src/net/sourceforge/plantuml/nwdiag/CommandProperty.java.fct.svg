@startuml
!pragma layout smetana
start
note right
constructor CommandProperty()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandProperty.class .getName(),
RegexLeaf.start(),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("NAME","(address|color|width|description)"),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf("="),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf("\"?"),
new RegexLeaf("VALUE","([^\"]*)"),new RegexLeaf("\"?"),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf(";?"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(NwDiagram diagram,
LineLocation location,RegexResult arg)
end note
:return diagram.setProperty(arg.get("NAME",
0),arg.get("VALUE",0));;
stop
end
@enduml

