@startuml
!pragma layout smetana
start
note right
constructor CommandNetwork()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandNetwork.class .getName(),RegexLeaf.start(),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("network"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("NAME","([-.%pLN_]+
)?"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("\\{"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(NwDiagram diagram,
LineLocation location,RegexResult arg)
end note
:return diagram.openNetwork(arg.get("NAME",
0));;
stop
end
@enduml

