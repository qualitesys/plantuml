@startuml
!pragma layout smetana
start
note right
constructor CommandElement()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandElement.class .getName(),RegexLeaf.start(),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("NAME","([-.%pLN_]+
)"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("DEFINITION",
"(\\[(.*)\\])?"),new RegexLeaf(";?"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(NwDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:return diagram.addElement(arg.get("NAME",
0),arg.get("DEFINITION",1));;
stop
end
@enduml

