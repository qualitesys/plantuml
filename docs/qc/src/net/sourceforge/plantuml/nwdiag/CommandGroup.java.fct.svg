@startuml
!pragma layout smetana
start
note right
constructor CommandGroup()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandGroup.class .getName(),RegexLeaf.start(),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("group"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("NAME","([%pLN_]+
)?"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("\\{"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(NwDiagram diagram,
LineLocation location,RegexResult arg)
end note
:return diagram.openGroup(arg.get("NAME",
0));;
stop
end
@enduml

