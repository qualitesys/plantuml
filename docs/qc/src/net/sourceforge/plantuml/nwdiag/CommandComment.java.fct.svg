@startuml
!pragma layout smetana
start
note right
constructor CommandComment()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandComment.class .getName(),
RegexLeaf.start(),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("//"),new RegexLeaf(".*"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(NwDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:return CommandExecutionResult.ok();;
stop
end
@enduml

