@startuml
!pragma layout smetana
start
note right
constructor NwDiagramFactory(DiagramTypetype)
end note
:super (type);;
end
start
note right
NwDiagramcreateEmptyDiagram(UmlSourcesource,
Map<String,String>skinParam)
end note
:return new NwDiagram(source);;
stop
end
start
note right
List<Command>createCommands()
end note
:final List<Command>cmds=new ArrayList<>();;
:CommonCommands.addCommonCommands1(cmds);;
:cmds.add(new CommandNwDiagInit());;
:cmds.add(new CommandComment());;
:cmds.add(new CommandElement());;
:cmds.add(new CommandGroup());;
:cmds.add(new CommandNetwork());;
:cmds.add(new CommandLink());;
:cmds.add(new CommandProperty());;
:cmds.add(new CommandEndSomething());;
:cmds.add(new CommandFootboxIgnored());;
:return cmds;;
stop
end
@enduml

