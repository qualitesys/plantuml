@startuml
!pragma layout smetana
start
note right
constructor YMirror(doublemax)
end note
:this.max=max;;
end
start
note right
doublegetMirrored(doublev)
end note
if (v<0||v>max) then (yes) 
:System.err.println("BAD VALUE IN YMirror");;
endif 
:return max-v;;
stop
end
start
note right
XPoint2DgetMirrored(XPoint2Dpt)
end note
:return new XPoint2D(pt.getX(),max-pt.getY());;
stop
end
start
note right
DotPathgetMirrored(DotPathpath)
end note
:DotPathresult=new DotPath();;
:result=result.addCurve(getMirrored(bez.getP1()),
getMirrored(bez.getCtrlP1()),getMirrored(bez.getCtrlP2()),
getMirrored(bez.getP2()));;
:return result;;
stop
end
start
note right
UTranslategetMirrored(UTranslatetr)
end note
:return new UTranslate(tr.getDx(),max-tr.getDy());;
stop
end
@enduml

