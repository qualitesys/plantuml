@startuml
!pragma layout smetana
start
note right
constructor Arrow(XPoint2Dp1,XPoint2Dp2)
end note
:this.p1=p1;;
:this.p2=p2;;
end
start
note right
void drawArrow(UGraphicug)
end note
:ug=ug.apply(new UStroke());;
:final ULinep1p2=new ULine(p1,p2);;
:final doubledist=p1.distance(p2);;
:final doublealpha=Math.atan2(p1p2.getDX(),
p1p2.getDY());;
:final doublefactor=.4;;
:final doublefactor2=.3;;
:final XPoint2Dp3=getPoint(p1,alpha+Math.PI/2,
dist*factor);;
:final XPoint2Dp4=getPoint(p1,alpha-Math.PI/2,
dist*factor);;
:final XPoint2Dp11=getPoint(p1,alpha,dist*factor2);;
:final UPathpath=new UPath();;
:path.moveTo(p4);;
:path.lineTo(p11);;
:path.lineTo(p3);;
:path.lineTo(p2);;
:path.lineTo(p4);;
:path.closePath();;
:ug.draw(path);;
end
start
note right
XPoint2DgetPoint(XPoint2Dcenter,doublealpha,
doublelen)
end note
:final doublex=center.getX()+len*Math.sin(alpha);;
:final doubley=center.getY()+len*Math.cos(alpha);;
:return new XPoint2D(x,y);;
stop
end
@enduml

