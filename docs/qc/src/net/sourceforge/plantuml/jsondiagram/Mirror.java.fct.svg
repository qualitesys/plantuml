3,150.5,922.6523,154.5,912.6523,150.5,916.6523" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[f05cba32f1a090c3bafbdccded835721]
@startuml
!pragma layout smetana
start
note right
constructor Mirror(doublemax)
end note
:this.max=max;;
end
start
note right
doubleinv(doublev)
end note
if (v<0||v>max) then (yes) 
:System.err.println("BAD VALUE IN Mirror");;
endif 
:return max-v;;
stop
end
start
note right
XPoint2DinvAndXYSwitch(XPoint2Dpt)
end note
:final doublex=inv(pt.getY());;
:final doubley=pt.getX();;
:return new XPoint2D(x,y);;
stop
end
start
note right
XPoint2DinvGit(XPoint2Dpt)
end note
:final doublex=pt.getX();;
:final doubley=inv(pt.getY());;
:return new XPoint2D(x,y);;
stop
end
@enduml

