7" y1="922.0625" y2="942.0625"/><polygon fill="#181818" points="263,932.0625,267,942.0625,271,932.0625,267,936.0625" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="267" x2="267" y1="990" y2="1010"/><polygon fill="#181818" points="263,1000,267,1010,271,1000,267,1004" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="267" x2="267" y1="1043.9688" y2="1063.9688"/><polygon fill="#181818" points="263,1053.9688,267,1063.9688,271,1053.9688,267,1057.9688" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="267" x2="267" y1="1097.9375" y2="1117.9375"/><polygon fill="#181818" points="263,1107.9375,267,1117.9375,271,1107.9375,267,1111.9375" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[91302726b1b8e0fbc8568bdc99abb35e]
@startuml
!pragma layout smetana
start
note right
constructor GraphicsPath(ColorMapper colorMapper,
String path)
end note
:this.path=path;;
:this.colorMapper=colorMapper;;
end
start
note right
ImageData writeImage(OutputStream os)
end note
:final BufferedImage im=createImage();;
:PngIO.write(im,os,96);;
:return new ImageDataSimple(im.getWidth(),
im.getHeight());;
stop
end
start
note right
BufferedImage createImage()
end note
:final StringBounder stringBounder=FileFormat.PNG.getDefaultStringBounder();;
:final EmptyImageBuilder builder=new EmptyImageBuilder(null ,
50,50,Color.WHITE,stringBounder);;
:final BufferedImage im=builder.getBufferedImage();;
:final Graphics2D g2d=builder.getGraphics2D();;
:final UGraphicG2d ug=new UGraphicG2d(HColors.WHITE,
colorMapper,stringBounder,g2d,1.0);;
:ug.setBufferedImage(im);;
:final UMotif motif=new UMotif(path);;
:motif.drawHorizontal(ug.apply((UChange )HColors.BLACK),
20,20,1);;
:g2d.dispose();;
:return im;;
stop
end
@enduml

