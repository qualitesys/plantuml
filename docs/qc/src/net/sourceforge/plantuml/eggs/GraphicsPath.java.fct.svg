@startuml
!pragma layout smetana
start
note right
constructor GraphicsPath(ColorMappercolorMapper,
Stringpath)
end note
:this.path=path;;
:this.colorMapper=colorMapper;;
end
start
note right
ImageDatawriteImage(OutputStreamos)
end note
:final BufferedImageim=createImage();;
:PngIO.write(im,os,96);;
:return new ImageDataSimple(im.getWidth(),
im.getHeight());;
stop
end
start
note right
BufferedImagecreateImage()
end note
:final StringBounderstringBounder=FileFormat.PNG.getDefaultStringBounder();;
:final EmptyImageBuilderbuilder=new EmptyImageBuilder(null ,
50,50,Color.WHITE,stringBounder);;
:final BufferedImageim=builder.getBufferedImage();;
:final Graphics2Dg2d=builder.getGraphics2D();;
:final UGraphicG2dug=new UGraphicG2d(HColors.WHITE,
colorMapper,stringBounder,g2d,1.0);;
:ug.setBufferedImage(im);;
:final UMotifmotif=new UMotif(path);;
:motif.drawHorizontal(ug.apply((UChange)HColors.BLACK),
20,20,1);;
:g2d.dispose();;
:return im;;
stop
end
@enduml

