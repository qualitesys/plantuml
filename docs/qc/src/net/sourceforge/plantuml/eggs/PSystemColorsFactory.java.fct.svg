@startuml
!pragma layout smetana
start
note right
AbstractPSystemexecuteLine(UmlSourcesource,
Stringline)
end note
:final Patternpattern=Pattern.compile("^colors?\\s*(#?\\w+
)?\\s*$");;
:final Matchermatcher=pattern.matcher(line);;
if (matcher.matches()) then (yes) 
:return new PSystemColors(source,matcher.group(1));;
stop
endif 
:return null ;;
stop
end
@enduml

