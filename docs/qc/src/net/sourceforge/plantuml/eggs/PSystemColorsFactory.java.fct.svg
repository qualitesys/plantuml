@startuml
!pragma layout smetana
start
note right
AbstractPSystem executeLine(UmlSource source,
String line)
end note
:final Pattern pattern=Pattern.compile("^colors?\\s*(#?\\w+
)?\\s*$");;
:final Matcher matcher=pattern.matcher(line);;
if (matcher.matches()) then (yes) 
:return new PSystemColors(source,matcher.group(1));;
stop
endif 
:return null ;;
stop
end
@enduml

