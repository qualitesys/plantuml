@startuml
!pragma layout smetana
start
note right
constructor PSystemAppleTwo(UmlSourcesource)
end note
:super (source);;
:strings.add("                             <b><size:18>Apple //e for ever !                             ");;
:strings.add(" ");;
:image=PSystemVersion.getApple2Image();;
:imagePosition=GraphicPosition.BOTTOM;;
end
