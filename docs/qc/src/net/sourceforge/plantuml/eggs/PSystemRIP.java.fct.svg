@startuml
!pragma layout smetana
start
note right
constructor PSystemRIP(UmlSourcesource)
end note
:super (source);;
:strings.add(" To my Grandfather,");;
:strings.add(" A mon grand-pere,");;
:strings.add(" ");;
:strings.add("          <b>Jean CANOUET");;
:strings.add(" ");;
:strings.add(" 31-OCT-1921 <i>(Neuilly-Sur-Seine,
 France)");;
:strings.add(" 15-SEP-2009 <i>(Nanterre, France)");;
:strings.add(" ");;
:strings.add("         <b>Requiescat In Pace");;
:strings.add(" ");;
:image=SImageIO.read(imm);;
:imagePosition=GraphicPosition.BOTTOM;;
end
start
note right
DiagramDescriptiongetDescription()
end note
:return new DiagramDescription("(RIP)");;
stop
end
@enduml

