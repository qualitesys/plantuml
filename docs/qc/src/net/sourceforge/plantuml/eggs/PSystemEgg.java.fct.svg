@startuml
!pragma layout smetana
start
note right
constructor PSystemEgg(UmlSourcesource,Stringsentence)
end note
:super (source);;
:final StringTokenizerst=new StringTokenizer(sentence,
"|");;
while (st.hasMoreTokens())
:strings.add(st.nextToken());;
endwhile
end
start
note right
DiagramDescriptiongetDescription()
end note
:return new DiagramDescription("(Easter Eggs)");;
stop
end
@enduml

