@startuml
!pragma layout smetana
start
note right
constructor PSystemEgg(UmlSource source,String sentence)
end note
:super (source);;
:final StringTokenizer st=new StringTokenizer(sentence,
"|");;
while (st.hasMoreTokens())
:strings.add(st.nextToken());;
endwhile
end
start
note right
DiagramDescription getDescription()
end note
:return new DiagramDescription("(Easter Eggs)");;
stop
end
@enduml

