@startuml
!pragma layout smetana
start
note right
constructor PSystemPath(UmlSource source,
String s)
end note
:super (source);;
:this.path=new GraphicsPath(ColorMapper.IDENTITY,s);;
end
start
note right
ImageData exportDiagramNow(OutputStream os,
int num,FileFormatOption fileFormat)
end note
:return path.writeImage(os);;
stop
end
start
note right
DiagramDescription getDescription()
end note
:return new DiagramDescription("(Path)");;
stop
end
@enduml

