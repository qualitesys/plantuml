@startuml
!pragma layout smetana
start
note right
AbstractPSystemexecuteLine(UmlSourcesource,
Stringline)
end note
if (line.equalsIgnoreCase("charlie")||line.equalsIgnoreCase("jesuischarlie")) then (yes) 
:return new PSystemCharlie(source);;
stop
endif 
:return null ;;
stop
end
@enduml

