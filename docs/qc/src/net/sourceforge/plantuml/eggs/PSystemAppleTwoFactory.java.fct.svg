@startuml
!pragma layout smetana
start
note right
AbstractPSystemexecuteLine(UmlSourcesource,
Stringline)
end note
if (line.equalsIgnoreCase("apple //e")||line.equalsIgnoreCase("apple ][")||line.equalsIgnoreCase("apple II")||line.equalsIgnoreCase("Steve Jobs")||line.equalsIgnoreCase("Steve Wozniak")) then (yes) 
switch (try/catch block)
case (try)
:return new PSystemAppleTwo(source);;
stop
case (catch (IOExceptione))
:Log.error("Error "+e);;
:Logme.error(e);;
endswitch
endif 
:return null ;;
stop
end
@enduml

