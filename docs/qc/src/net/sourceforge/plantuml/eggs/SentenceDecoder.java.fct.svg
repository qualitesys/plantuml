@startuml
!pragma layout smetana
start
note right
constructor SentenceDecoder(String sentence1,
byte[] crypted)
end note
:final byte[] key=EggUtils.fromSecretSentence(sentence1)
.toByteArray();;
:final byte[] sen2=EggUtils.xor(crypted,key);;
:this.secret=new String(sen2,UTF_8);;
end
start
note right
boolean isOk()
end note
if ((int )c>256) then (yes) 
:return false;;
stop
endif 
if (Character.isDefined(c)==false) then (yes) 
:return false;;
stop
endif 
if (Character.isISOControl(c)) then (yes) 
:return false;;
stop
endif 
:return true;;
stop
end
start
note right
String getSecret()
end note
:return secret;;
stop
end
@enduml

