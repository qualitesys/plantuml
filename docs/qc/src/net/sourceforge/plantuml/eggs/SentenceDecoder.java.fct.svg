@startuml
!pragma layout smetana
start
note right
constructor SentenceDecoder(Stringsentence1,
byte[]crypted)
end note
:final byte[]key=EggUtils.fromSecretSentence(sentence1)
.toByteArray();;
:final byte[]sen2=EggUtils.xor(crypted,key);;
:this.secret=new String(sen2,UTF_8);;
end
start
note right
booleanisOk()
end note
if ((int)c>256) then (yes) 
:return false;;
stop
endif 
if (Character.isDefined(c)==false) then (yes) 
:return false;;
stop
endif 
if (Character.isISOControl(c)) then (yes) 
:return false;;
stop
endif 
:return true;;
stop
end
start
note right
StringgetSecret()
end note
:return secret;;
stop
end
@enduml

