@startuml
!pragma layout smetana
start
note right
constructor PSystemCharlie(UmlSource source)
end note
:super (source);;
:image=PSystemVersion.getCharlieImage();;
end
start
note right
ImageBuilder createImageBuilder(FileFormatOption fileFormatOption)
end note
:return super .createImageBuilder(fileFormatOption)
.blackBackcolor();;
stop
end
start
note right
UDrawable getRootDrawable(FileFormatOption fileFormatOption)
end note
:return new UDrawable(){public void drawU(UGraphic ug){final UImage im=new UImage(new PixelImage(image,
AffineTransformType.TYPE_BILINEAR));ug.draw(im);}};;
stop
end
start
note right
DiagramDescription getDescription()
end note
:return new DiagramDescription("(Je Suis Charlie)");;
stop
end
@enduml

