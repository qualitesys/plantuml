@startuml
!pragma layout smetana
start
note right
constructor SentenceProducer(String sentence1,
String sentence2)
end note
:final byte[] key=EggUtils.fromSecretSentence(sentence1)
.toByteArray();;
:final byte[] sen2=sentence2.getBytes(UTF_8);;
:final byte[] crypted=EggUtils.xor(sen2,key);;
:this.secret=EggUtils.fromByteArrays(crypted);;
end
start
note right
String getSecret()
end note
:return secret;;
stop
end
@enduml

