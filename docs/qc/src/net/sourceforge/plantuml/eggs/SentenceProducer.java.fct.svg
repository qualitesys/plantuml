@startuml
!pragma layout smetana
start
note right
constructor SentenceProducer(Stringsentence1,
Stringsentence2)
end note
:final byte[]key=EggUtils.fromSecretSentence(sentence1)
.toByteArray();;
:final byte[]sen2=sentence2.getBytes(UTF_8);;
:final byte[]crypted=EggUtils.xor(sen2,key);;
:this.secret=EggUtils.fromByteArrays(crypted);;
end
start
note right
StringgetSecret()
end note
:return secret;;
stop
end
@enduml

