@startuml
!pragma layout smetana
start
note right
AbstractPSystem executeLine(UmlSource source,
String line)
end note
:final Matcher2 m=p.matcher(line);;
if (m.find()==false) then (yes) 
:return null ;;
stop
endif 
:return new PSystemPath(source,m.group(1));;
stop
end
@enduml

