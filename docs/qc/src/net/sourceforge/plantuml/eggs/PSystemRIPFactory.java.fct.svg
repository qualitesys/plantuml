@startuml
!pragma layout smetana
start
note right
AbstractPSystemexecuteLine(UmlSourcesource,
Stringline)
end note
if (line.equalsIgnoreCase("jean canouet")) then (yes) 
switch (try/catch block)
case (try)
:return new PSystemRIP(source);;
stop
case (catch (IOExceptione))
:Log.error("Error "+e);;
:Logme.error(e);;
endswitch
endif 
:return null ;;
stop
end
@enduml

