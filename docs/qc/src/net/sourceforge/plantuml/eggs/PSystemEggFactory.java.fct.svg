@startuml
!pragma layout smetana
start
note right
AbstractPSystemexecuteLine(UmlSourcesource,
Stringline)
end note
switch (try/catch block)
case (try)
:final SentenceDecoderdecoder=new SentenceDecoder(line,
crypted);;
if (decoder.isOk()) then (yes) 
:return new PSystemEgg(source,decoder.getSecret());;
stop
endif 
case (catch (UnsupportedEncodingExceptione))
:return null ;;
stop
endswitch
:return null ;;
stop
end
@enduml

