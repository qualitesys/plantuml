@startuml
!pragma layout smetana
start
note right
AbstractPSystem executeLine(UmlSource source,
String line)
end note
switch (try/catch block)
case (try)
:final SentenceDecoder decoder=new SentenceDecoder(line,
crypted);;
if (decoder.isOk()) then (yes) 
:return new PSystemEgg(source,decoder.getSecret());;
stop
endif 
case (catch (UnsupportedEncodingException e))
:return null ;;
stop
endswitch
:return null ;;
stop
end
@enduml

