@startuml
!pragma layout smetana
start
note right
AbstractPSystem executeLine(UmlSource source,
String line)
end note
if (line.matches("^4\\D+8\\D+15\\D+16\\D+23\\D+42")) then (yes) 
:return new PSystemLost(source);;
stop
endif 
:return null ;;
stop
end
@enduml

