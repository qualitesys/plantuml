@startuml
!pragma layout smetana
start
note right
constructor Tile(intnum)
end note
:this.num=num;;
:final Map<TileGeometry,TileArea>tmp=new EnumMap<TileGeometry,
TileArea>(TileGeometry.class );;
:tmp.put(g,new TileArea(this,g));;
:this.geometries=Collections.unmodifiableMap(tmp);;
end
start
note right
TileAreagetArea(TileGeometrygeometry)
end note
:return this.geometries.get(geometry);;
stop
end
start
note right
void drawU(UGraphicug)
end note
:ug=ug.apply(HColors.BLACK);;
:final TextBlockn=Display.create(""+num).create(fc,
HorizontalAlignment.LEFT,new SpriteContainerEmpty());;
:final XDimension2DdimNum=n.calculateDimension(ug.getStringBounder());;
:final XDimension2DdimTotal=calculateDimension(ug.getStringBounder());;
:final doublediffx=dimTotal.getWidth()-dimNum.getWidth();;
:final doublediffy=dimTotal.getHeight()-dimNum.getHeight();;
:final doubleradius=Math.max(dimNum.getWidth(),
dimNum.getHeight());;
:final doublediffx2=dimTotal.getWidth()-radius;;
:final doublediffy2=dimTotal.getHeight()-radius;;
:n.drawU(ug.apply(new UTranslate((diffx/2),
(diffy/2))));;
:ug.draw(new URectangle(SIZE,SIZE));;
:ug.apply(new UTranslate(diffx2/2,diffy2/2)).draw(new UEllipse(radius,
radius));;
end
start
note right
XDimension2DcalculateDimension(StringBounderstringBounder)
end note
:return new XDimension2D(SIZE,SIZE);;
stop
end
@enduml

