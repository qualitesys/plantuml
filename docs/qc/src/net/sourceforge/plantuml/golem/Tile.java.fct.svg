@startuml
!pragma layout smetana
start
note right
constructor Tile(int num)
end note
:this.num=num;;
:final Map<TileGeometry,TileArea> tmp=new EnumMap<TileGeometry ,
TileArea >(TileGeometry.class );;
:tmp.put(g,new TileArea(this,g));;
:this.geometries=Collections.unmodifiableMap(tmp);;
end
start
note right
TileArea getArea(TileGeometry geometry)
end note
:return this.geometries.get(geometry);;
stop
end
start
note right
void drawU(UGraphic ug)
end note
:ug=ug.apply(HColors.BLACK);;
:final TextBlock n=Display.create(""+num).create(fc,
HorizontalAlignment.LEFT,new SpriteContainerEmpty());;
:final XDimension2D dimNum=n.calculateDimension(ug.getStringBounder());;
:final XDimension2D dimTotal=calculateDimension(ug.getStringBounder());;
:final double diffx=dimTotal.getWidth()-dimNum.getWidth();;
:final double diffy=dimTotal.getHeight()-dimNum.getHeight();;
:final double radius=Math.max(dimNum.getWidth(),
dimNum.getHeight());;
:final double diffx2=dimTotal.getWidth()-radius;;
:final double diffy2=dimTotal.getHeight()-radius;;
:n.drawU(ug.apply(new UTranslate((diffx/2),
(diffy/2))));;
:ug.draw(new URectangle(SIZE,SIZE));;
:ug.apply(new UTranslate(diffx2/2,diffy2/2)).draw(new UEllipse(radius,
radius));;
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:return new XDimension2D(SIZE,SIZE);;
stop
end
@enduml

