5" x2="109.5" y1="537.8398" y2="560.4063"/><polygon fill="#181818" points="105.5,550.4063,109.5,560.4063,113.5,550.4063,109.5,554.4063" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="109.5" x2="109.5" y1="594.375" y2="614.375"/><polygon fill="#181818" points="105.5,604.375,109.5,614.375,113.5,604.375,109.5,608.375" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[fa494af6dc192fb030a4639510f75498]
@startuml
!pragma layout smetana
start
note right
Path build(TileArea start,TileArea dest)
end note
:return new Path(start,dest);;
stop
end
start
note right
constructor Path(TileArea start,TileArea dest)
end note
:this.all.add(start);;
:this.all.add(dest);;
end
start
note right
TileArea getStart()
end note
:return all.get(0);;
stop
end
start
note right
TileArea getDest()
end note
:return all.get(all.size()-1);;
stop
end
@enduml

