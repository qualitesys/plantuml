:1.0;"/><!--MD5=[f5012fbc92350359c243ec1f0c79b704]
@startuml
!pragma layout smetana
start
note right
AbstractPSystem executeLine(UmlSource source,
String line)
end note
:final String lineLower=StringUtils.goLowerCase(line);;
if (lineLower.equals("emoji")||lineLower.startsWith("emoji ")) then (yes) 
:final int idx=line.indexOf(' ');;
:final String code=idx==-1? String.valueOf("26"):line.substring(idx+1);;
:return new PSystemListEmoji(source,code.toLowerCase());;
stop
endif 
:return null ;;
stop
end
@enduml

