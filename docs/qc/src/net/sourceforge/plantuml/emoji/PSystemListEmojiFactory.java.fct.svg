/><!--MD5=[9fc6e1c618cd3b2e976922b503b8834b]
@startuml
!pragma layout smetana
start
note right
AbstractPSystemexecuteLine(UmlSourcesource,
Stringline)
end note
:final StringlineLower=StringUtils.goLowerCase(line);;
if (lineLower.equals("emoji")||lineLower.startsWith("emoji ")) then (yes) 
:final intidx=line.indexOf(' ');;
:final Stringcode=idx==-1? String.valueOf("26"):line.substring(idx+1);;
:return new PSystemListEmoji(source,code.toLowerCase());;
stop
endif 
:return null ;;
stop
end
@enduml

