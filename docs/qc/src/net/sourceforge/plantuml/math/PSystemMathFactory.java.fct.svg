@startuml
!pragma layout smetana
start
note right
constructor PSystemMathFactory(DiagramType type)
end note
:super (type);;
end
start
note right
PSystemMath initDiagram(UmlSource source,
String startLine)
end note
if (getDiagramType()==DiagramType.MATH) then (yes) 
:return new PSystemMath(source);;
stop
endif 
:return null ;;
stop
end
start
note right
PSystemMath executeLine(UmlSource source,
PSystemMath system,String line)
end note
:system.doCommandLine(line);;
:return system;;
stop
end
@enduml

