@startuml
!pragma layout smetana
start
note right
constructor PSystemMathFactory(DiagramTypetype)
end note
:super (type);;
end
start
note right
PSystemMathinitDiagram(UmlSourcesource,StringstartLine)
end note
if (getDiagramType()==DiagramType.MATH) then (yes) 
:return new PSystemMath(source);;
stop
endif 
:return null ;;
stop
end
start
note right
PSystemMathexecuteLine(UmlSourcesource,PSystemMathsystem,
Stringline)
end note
:system.doCommandLine(line);;
:return system;;
stop
end
@enduml

