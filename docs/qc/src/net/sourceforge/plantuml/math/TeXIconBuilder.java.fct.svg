@startuml
!pragma layout smetana
start
note right
constructor TeXIconBuilder(Stringtex,ColorforegroundColor)
end note
:final Class<? >clTeXFormula=Class.forName("org.scilab.forge.jlatexmath.TeXFormula");;
:final Objectformula=clTeXFormula.getConstructor(String.class )
.newInstance(tex);;
:final Class<? >clTeXIconBuilder=clTeXFormula.getClasses()[0];;
:final Objectbuilder=clTeXIconBuilder.getConstructors()[0].newInstance(formula);;
:clTeXIconBuilder.getMethod("setStyle",int.class )
.invoke(builder,0);;
:clTeXIconBuilder.getMethod("setSize",float.class ).invoke(builder,
(float)20);;
:icon=(Icon)clTeXIconBuilder.getMethod("build")
.invoke(builder);;
:final intmargin=1;;
:final Insetsinsets=new Insets(margin,margin,
margin,margin);;
:icon.getClass().getMethod("setInsets",insets.getClass()).invoke(icon,
insets);;
:icon.getClass().getMethod("setForeground",
foregroundColor.getClass()).invoke(icon,foregroundColor);;
end
start
note right
IcongetIcon()
end note
:return icon;;
stop
end
