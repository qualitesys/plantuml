@startuml
!pragma layout smetana
start
note right
constructor AsciiMath(String form)
end note
:this.tex=new ASCIIMathTeXImg().getTeX(form);;
:this.builder=new LatexBuilder(tex);;
end
start
note right
XDimension2D getDimension()
end note
:return builder.getDimension();;
stop
end
start
note right
UImageSvg getSvg(double scale,Color foregroundColor,
Color backgroundColor)
end note
:return builder.getSvg(scale,foregroundColor,
backgroundColor);;
stop
end
start
note right
MutableImage getImage(Color foregroundColor,
Color backgroundColor)
end note
:return builder.getImage(foregroundColor,
backgroundColor);;
stop
end
start
note right
String getSource()
end note
:return tex;;
stop
end
@enduml

