@startuml
!pragma layout smetana
start
note right
constructor PSystemLatexFactory(DiagramTypetype)
end note
:super (type);;
end
start
note right
PSystemLatexinitDiagram(UmlSourcesource,StringstartLine)
end note
if (getDiagramType()==DiagramType.LATEX) then (yes) 
:return new PSystemLatex(source);;
stop
endif 
:return null ;;
stop
end
start
note right
PSystemLatexexecuteLine(UmlSourcesource,PSystemLatexsystem,
Stringline)
end note
:system.doCommandLine(line);;
:return system;;
stop
end
@enduml

