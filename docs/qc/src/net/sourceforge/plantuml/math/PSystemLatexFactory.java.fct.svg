@startuml
!pragma layout smetana
start
note right
constructor PSystemLatexFactory(DiagramType type)
end note
:super (type);;
end
start
note right
PSystemLatex initDiagram(UmlSource source,
String startLine)
end note
if (getDiagramType()==DiagramType.LATEX) then (yes) 
:return new PSystemLatex(source);;
stop
endif 
:return null ;;
stop
end
start
note right
PSystemLatex executeLine(UmlSource source,
PSystemLatex system,String line)
end note
:system.doCommandLine(line);;
:return system;;
stop
end
@enduml

