@startuml
!pragma layout smetana
start
note right
constructor HColorScheme(HColor colorForLight,
HColor colorForDark,HColor colorForTransparent)
end note
:this.colorForLight=colorForLight;;
:this.colorForDark=colorForDark;;
:this.colorForTransparent=colorForTransparent;;
end
start
note right
HColor getAppropriateColor(HColor back)
end note
if (back.isTransparent()) then (yes) 
if (colorForTransparent!=null ) then (yes) 
:return colorForTransparent;;
stop
endif 
:return colorForLight.withDark(colorForDark);;
stop
endif 
if (back.isDark()) then (yes) 
:return colorForDark;;
stop
endif 
:return colorForLight;;
stop
end
@enduml

