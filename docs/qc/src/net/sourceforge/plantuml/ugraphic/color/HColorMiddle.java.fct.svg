@startuml
!pragma layout smetana
start
note right
constructor HColorMiddle(HColorc1,HColorc2)
end note
:this.color1=c1;;
:this.color2=c2;;
end
start
note right
HColorgetColor1()
end note
:return color1;;
stop
end
start
note right
HColorgetColor2()
end note
:return color2;;
stop
end
start
note right
ColortoColor(ColorMappermapper)
end note
:final Colorcc1=color1.toColor(mapper);;
:final Colorcc2=color2.toColor(mapper);;
:final intr1=cc1.getRed();;
:final intg1=cc1.getGreen();;
:final intb1=cc1.getBlue();;
:final intr2=cc2.getRed();;
:final intg2=cc2.getGreen();;
:final intb2=cc2.getBlue();;
:final intr=(r1+r2)/2;;
:final intg=(g1+g2)/2;;
:final intb=(b1+b2)/2;;
:return new Color(r,g,b);;
stop
end
@enduml

