@startuml
!pragma layout smetana
start
note right
constructor HColorMiddle(HColor c1,HColor c2)
end note
:this.color1=c1;;
:this.color2=c2;;
end
start
note right
HColor getColor1()
end note
:return color1;;
stop
end
start
note right
HColor getColor2()
end note
:return color2;;
stop
end
start
note right
Color toColor(ColorMapper mapper)
end note
:final Color cc1=color1.toColor(mapper);;
:final Color cc2=color2.toColor(mapper);;
:final int r1=cc1.getRed();;
:final int g1=cc1.getGreen();;
:final int b1=cc1.getBlue();;
:final int r2=cc2.getRed();;
:final int g2=cc2.getGreen();;
:final int b2=cc2.getBlue();;
:final int r=(r1+r2)/2;;
:final int g=(g1+g2)/2;;
:final int b=(b1+b2)/2;;
:return new Color(r,g,b);;
stop
end
@enduml

