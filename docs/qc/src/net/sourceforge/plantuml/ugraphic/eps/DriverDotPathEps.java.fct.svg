@startuml
!pragma layout smetana
start
note right
void draw(DotPathshape,doublex,doubley,ColorMappermapper,
UParamparam,EpsGraphicseps)
end note
if (param.getColor().isTransparent()==false) then (yes) 
:eps.setStrokeColor(param.getColor().toColor(mapper));;
:eps.setStrokeWidth(param.getStroke().getThickness(),
param.getStroke().getDashVisible(),param.getStroke().getDashSpace());;
:shape.draw(eps,x,y);;
endif 
end
@enduml

