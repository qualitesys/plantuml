@startuml
!pragma layout smetana
start
note right
constructor DriverLineEps(ClipContainerclipContainer)
end note
:this.clipContainer=clipContainer;;
end
start
note right
void draw(ULineshape,doublex,doubley,ColorMappermapper,
UParamparam,EpsGraphicseps)
end note
:doublex2=x+shape.getDX();;
:doubley2=y+shape.getDY();;
:final UClipclip=clipContainer.getClip();;
if (clip!=null ) then (yes) 
:final Line2D.Doubleline=clip.getClippedLine(new Line2D.Double(x,
y,x2,y2));;
if (line==null ) then (yes) 
:return ;;
stop
endif 
:x=line.x1;;
:y=line.y1;;
:x2=line.x2;;
:y2=line.y2;;
endif 
:eps.setStrokeColor(param.getColor().toColor(mapper));;
:eps.setStrokeWidth(param.getStroke().getThickness(),
param.getStroke().getDashVisible(),param.getStroke().getDashSpace());;
:eps.epsLine(x,y,x2,y2);;
end
@enduml

