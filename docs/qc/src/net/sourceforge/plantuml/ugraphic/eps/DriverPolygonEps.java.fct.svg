@startuml
!pragma layout smetana
start
note right
constructor DriverPolygonEps(ClipContainerclipContainer)
end note
:this.clipContainer=clipContainer;;
end
start
note right
void draw(UPolygonshape,doublex,doubley,ColorMappermapper,
UParamparam,EpsGraphicseps)
end note
:final doublepoints[]=new double[shape.getPoints()
.size()*2];;
:inti=0;;
:points[i++]=pt.getX()+x;;
:points[i++]=pt.getY()+y;;
:final UClipclip=clipContainer.getClip();;
if (clip!=null ) then (yes) 
if (clip.isInside(points[j],points[j+1])==false) then (yes) 
:return ;;
stop
endif 
endif 
if (shape.getDeltaShadow()!=0) then (yes) 
:eps.epsPolygonShadow(shape.getDeltaShadow(),
points);;
endif 
:final HColorback=param.getBackcolor();;
if (back instanceof HColorGradient) then (yes) 
:eps.setStrokeColor(param.getColor().toColor(mapper));;
:eps.epsPolygon((HColorGradient)back,mapper,
points);;
else (no)
:eps.setFillColor(back.toColor(mapper));;
:eps.setStrokeColor(param.getColor().toColor(mapper));;
:eps.epsPolygon(points);;
endif 
end
@enduml

