oke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="332" x2="332" y1="758.4492" y2="778.4492"/><polygon fill="#181818" points="328,768.4492,332,778.4492,336,768.4492,332,772.4492" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[1e5d5f3195ef0f6a0130f7f8c19ae82b]
@startuml
!pragma layout smetana
start
note right
constructor DriverImageEps(ClipContainer clipContainer)
end note
:this.clipContainer=clipContainer;;
end
start
note right
void draw(UImage shape,double x,double y,
ColorMapper mapper,UParam param,EpsGraphics eps)
end note
:final UClip clip=clipContainer.getClip();;
if (clip!=null ) then (yes) 
if (clip.isInside(x,y)==false) then (yes) 
:return ;;
stop
endif 
if (clip.isInside(x+shape.getWidth(),y+shape.getHeight())==false) then (yes) 
:return ;;
stop
endif 
endif 
:eps.drawImage(shape.muteTransparentColor(param.getBackcolor().toColor(mapper)).getImage(1),
x,y);;
end
@enduml

