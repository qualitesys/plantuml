@startuml
!pragma layout smetana
start
note right
void draw(UPathshape,doublex,doubley,ColorMappermapper,
UParamparam,EpsGraphicseps)
end note
:eps.setStrokeColor(param.getColor().toColor(mapper));;
:eps.setFillColor(param.getBackcolor().toColor(mapper));;
:eps.setStrokeWidth(param.getStroke().getThickness(),
param.getStroke().getDashVisible(),param.getStroke().getDashSpace());;
:eps.epsPath(x,y,shape);;
end
@enduml

