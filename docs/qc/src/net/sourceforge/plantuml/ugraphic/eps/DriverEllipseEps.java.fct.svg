@startuml
!pragma layout smetana
start
note right
constructor DriverEllipseEps(ClipContainer clipContainer)
end note
:this.clipContainer=clipContainer;;
end
start
note right
void draw(UEllipse shape,double x,double y,
ColorMapper mapper,UParam param,EpsGraphics eps)
end note
:final double width=shape.getWidth();;
:final double height=shape.getHeight();;
:final UClip clip=clipContainer.getClip();;
if (clip!=null ) then (yes) 
if (clip.isInside(x,y)==false) then (yes) 
:return ;;
stop
endif 
if (clip.isInside(x+width,y+height)==false) then (yes) 
:return ;;
stop
endif 
endif 
if (shape.getDeltaShadow()!=0) then (yes) 
:eps.epsEllipseShadow(x+width/2,y+height/2,
width/2,height/2,shape.getDeltaShadow());;
endif 
:eps.setFillColor(param.getBackcolor().toColor(mapper));;
:eps.setStrokeColor(param.getColor().toColor(mapper));;
:eps.setStrokeWidth(param.getStroke().getThickness(),
param.getStroke().getDashVisible(),param.getStroke().getDashSpace());;
if (shape.getStart()==0&&shape.getExtend()==0) then (yes) 
:eps.epsEllipse(x+width/2,y+height/2,width/2,
height/2);;
else (no)
:eps.epsEllipse(x+width/2,y+height/2,width/2,
height/2,shape.getStart(),shape.getExtend());;
endif 
end
@enduml

