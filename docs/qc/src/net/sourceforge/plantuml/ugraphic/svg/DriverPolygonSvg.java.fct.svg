@startuml
!pragma layout smetana
start
note right
constructor DriverPolygonSvg(ClipContainer clipContainer)
end note
:this.clipContainer=clipContainer;;
end
start
note right
void draw(UPolygon shape,double x,double y,
ColorMapper mapper,UParam param,SvgGraphics svg)
end note
:final double points[]=shape.getPointArray(x,y);;
:assert points.length%2==0;;
:final UClip clip=clipContainer.getClip();;
if (clip!=null ) then (yes) 
if (clip.isInside(points[j],points[j+1])==false) then (yes) 
:return ;;
stop
endif 
endif 
:DriverRectangleSvg.applyFillColor(svg,mapper,
param);;
:DriverRectangleSvg.applyStrokeColor(svg,
mapper,param);;
:svg.setStrokeWidth(param.getStroke().getThickness(),
param.getStroke().getDasharraySvg());;
:svg.svgPolygon(shape.getDeltaShadow(),points);;
end
@enduml

