;"/><line style="stroke:#181818;stroke-width:1.0;" x1="303" x2="303" y1="732.0664" y2="752.0664"/><polygon fill="#181818" points="299,742.0664,303,752.0664,307,742.0664,303,746.0664" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="303" x2="303" y1="786.0352" y2="806.0352"/><polygon fill="#181818" points="299,796.0352,303,806.0352,307,796.0352,303,800.0352" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[cc983dbbb3f1161d4f32de68c59f974a]
@startuml
!pragma layout smetana
start
note right
constructor DriverPathSvg(ClipContainer clipContainer)
end note
:this.clipContainer=clipContainer;;
end
start
note right
void draw(UPath shape,double x,double y,ColorMapper mapper,
UParam param,SvgGraphics svg)
end note
:final UClip clip=clipContainer.getClip();;
if (clip!=null &&clip.isInside(x,y,shape)==false) then (yes) 
:return ;;
stop
endif 
if (shape.isOpenIconic()) then (yes) 
:final HColor color=param.getColor();;
:svg.setFillColor(color.toSvg(mapper));;
:svg.setStrokeColor("");;
:svg.setStrokeWidth(0,"");;
else (no)
:DriverRectangleSvg.applyFillColor(svg,mapper,
param);;
:DriverRectangleSvg.applyStrokeColor(svg,
mapper,param);;
:svg.setStrokeWidth(param.getStroke().getThickness(),
param.getStroke().getDasharraySvg());;
endif 
:svg.svgPath(x,y,shape,shape.getDeltaShadow());;
end
@enduml

