;" x1="254" x2="254" y1="403.1797" y2="423.1797"/><polygon fill="#181818" points="250,413.1797,254,423.1797,258,413.1797,254,417.1797" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="254" x2="254" y1="457.1484" y2="477.1484"/><polygon fill="#181818" points="250,467.1484,254,477.1484,258,467.1484,254,471.1484" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="254" x2="254" y1="511.1172" y2="531.1172"/><polygon fill="#181818" points="250,521.1172,254,531.1172,258,521.1172,254,525.1172" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="254" x2="254" y1="579.0547" y2="599.0547"/><polygon fill="#181818" points="250,589.0547,254,599.0547,258,589.0547,254,593.0547" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[cceea46852092065f5231a34a1e6187d]
@startuml
!pragma layout smetana
start
note right
void draw(UCenteredCharacter characterCircled,
double x,double y,ColorMapper mapper,UParam param,
SvgGraphics svg)
end note
:final char c=characterCircled.getChar();;
:final UFont font=characterCircled.getFont();;
:final UnusedSpace unusedSpace=UnusedSpace.getUnusedSpace(font,c);;
:final double xpos=x-unusedSpace.getCenterX()-0.5;;
:final double ypos=y-unusedSpace.getCenterY()-0.5;;
:final TextLayout t=createTextLayout(font,
""+c);;
:final HColor textColor=param.getColor();;
:svg.setFillColor(textColor.toSvg(mapper));;
:svg.drawPathIterator(xpos,ypos,t.getOutline(null )
.getPathIterator(null ));;
end
@enduml

