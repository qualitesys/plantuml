@startuml
!pragma layout smetana
start
note right
void draw(UCenteredCharactercharacterCircled,
doublex,doubley,ColorMappermapper,UParamparam,
SvgGraphicssvg)
end note
:final charc=characterCircled.getChar();;
:final UFontfont=characterCircled.getFont();;
:final UnusedSpaceunusedSpace=UnusedSpace.getUnusedSpace(font,c);;
:final doublexpos=x-unusedSpace.getCenterX()-0.5;;
:final doubleypos=y-unusedSpace.getCenterY()-0.5;;
:final TextLayoutt=createTextLayout(font,
""+c);;
:final HColortextColor=param.getColor();;
:svg.setFillColor(textColor.toSvg(mapper));;
:svg.drawPathIterator(xpos,ypos,t.getOutline(null )
.getPathIterator(null ));;
end
@enduml

