@startuml
!pragma layout smetana
start
note right
void draw(DotPath shape,double x,double y,
ColorMapper mapper,UParam param,SvgGraphics svg)
end note
if (param.getColor().isTransparent()==false) then (yes) 
:DriverRectangleSvg.applyStrokeColor(svg,
mapper,param);;
:svg.setFillColor(null );;
:svg.setStrokeWidth(param.getStroke().getThickness(),
param.getStroke().getDasharraySvg());;
:svg.svgPath(x,y,shape.toUPath(),0);;
endif 
end
@enduml

