@startuml
!pragma layout smetana
start
note right
constructor DriverImagePng(ClipContainerclipContainer)
end note
:this.clipContainer=clipContainer;;
end
start
note right
void draw(UImageimage,doublex,doubley,ColorMappermapper,
UParamparam,SvgGraphicssvg)
end note
:final UClipclip=clipContainer.getClip();;
if (clip!=null ) then (yes) 
if (clip.isInside(x,y)==false) then (yes) 
:return ;;
stop
endif 
if (clip.isInside(x+image.getWidth(),y+image.getHeight())==false) then (yes) 
:return ;;
stop
endif 
endif 
switch (try/catch block)
case (try)
:svg.svgImage(image.getImage(1),x,y);;
case (catch (IOExceptione))
:Log.error("Error in svg for image "+e);;
endswitch
end
@enduml

