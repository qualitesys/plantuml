@startuml
!pragma layout smetana
start
note right
constructor DriverTextAsPathSvg(ClipContainerclipContainer)
end note
:this.clipContainer=clipContainer;;
end
start
note right
void draw(UTextushape,doublex,doubley,ColorMappermapper,
UParamparam,SvgGraphicssvg)
end note
:final UClipclip=clipContainer.getClip();;
if (clip!=null &&clip.isInside(x,y)==false) then (yes) 
:return ;;
stop
endif 
:final TextLayoutt=createTextLayout(ushape);;
:svg.drawPathIterator(x,y,t.getOutline(null )
.getPathIterator(null ));;
end
