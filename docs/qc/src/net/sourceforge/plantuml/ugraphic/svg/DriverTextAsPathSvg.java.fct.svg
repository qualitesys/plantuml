@startuml
!pragma layout smetana
start
note right
constructor DriverTextAsPathSvg(ClipContainer clipContainer)
end note
:this.clipContainer=clipContainer;;
end
start
note right
void draw(UText ushape,double x,double y,
ColorMapper mapper,UParam param,SvgGraphics svg)
end note
:final UClip clip=clipContainer.getClip();;
if (clip!=null &&clip.isInside(x,y)==false) then (yes) 
:return ;;
stop
endif 
:final TextLayout t=createTextLayout(ushape);;
:svg.drawPathIterator(x,y,t.getOutline(null )
.getPathIterator(null ));;
end
@enduml

