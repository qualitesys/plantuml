@startuml
!pragma layout smetana
start
note right
constructor DriverLineSvg(ClipContainerclipContainer)
end note
:this.clipContainer=clipContainer;;
end
start
note right
void draw(ULineshape,doublex,doubley,ColorMappermapper,
UParamparam,SvgGraphicssvg)
end note
:doublex2=x+shape.getDX();;
:doubley2=y+shape.getDY();;
:final UClipclip=clipContainer.getClip();;
if (clip!=null ) then (yes) 
:final Line2D.Doubleline=clip.getClippedLine(new Line2D.Double(x,
y,x2,y2));;
if (line==null ) then (yes) 
:return ;;
stop
endif 
:x=line.x1;;
:y=line.y1;;
:x2=line.x2;;
:y2=line.y2;;
endif 
:final HColorcolor=param.getColor();;
if (color instanceof HColorGradient) then (yes) 
:final HColorGradientgr=(HColorGradient)color;;
:svg.setStrokeColor(gr.getColor1().toSvg(mapper));;
else (no)
:svg.setStrokeColor(color.toSvg(mapper));;
endif 
:svg.setStrokeWidth(param.getStroke().getThickness(),
param.getStroke().getDasharraySvg());;
:svg.svgLine(x,y,x2,y2,shape.getDeltaShadow());;
end
@enduml

