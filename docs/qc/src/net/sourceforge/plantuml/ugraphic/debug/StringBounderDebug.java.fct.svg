@startuml
!pragma layout smetana
start
note right
XDimension2DcalculateDimensionInternal(UFontfont,
Stringtext)
end note
:final Randomrnd=new Random(StringUtils.seed(text));;
:final doublefactor=0.8+0.5*rnd.nextDouble();;
:final doublesize=font.getSize2D();;
:final doubleheight=size;;
:final doublewidth=size*text.length()*factor;;
:return new XDimension2D(width,height);;
stop
end
start
note right
doublegetDescent(UFontfont,Stringtext)
end note
:final doubledescent=font.getSize2D()/4.5;;
:return descent;;
stop
end
@enduml

