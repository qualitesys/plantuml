@startuml
!pragma layout smetana
start
note right
void apply(Graphics2D g2d)
end note
if (this==ANTI_ALIASING_ON) then (yes) 
:g2d.setRenderingHint(RenderingHints.KEY_ANTIALIASING,
RenderingHints.VALUE_ANTIALIAS_ON);;
else (no)
:g2d.setRenderingHint(RenderingHints.KEY_ANTIALIASING,
RenderingHints.VALUE_ANTIALIAS_OFF);;
endif 
end
@enduml

