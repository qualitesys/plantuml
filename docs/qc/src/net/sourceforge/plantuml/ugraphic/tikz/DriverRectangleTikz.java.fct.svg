@startuml
!pragma layout smetana
start
note right
void draw(URectangle rect,double x,double y,
ColorMapper mapper,UParam param,TikzGraphics tikz)
end note
:final double width=rect.getWidth();;
:final double height=rect.getHeight();;
:final double r=MathUtils.min(rect.getRx(),
rect.getRy(),width/2,height/2);;
:final HColor back=param.getBackcolor();;
if (back instanceof HColorGradient ) then (yes) 
:final HColorGradient gr=(HColorGradient )back;;
:tikz.setGradientColor(gr.getColor1(),gr.getColor2(),
gr.getPolicy());;
else (no)
:tikz.setFillColor(back);;
endif 
:tikz.setStrokeColor(param.getColor());;
:tikz.setStrokeWidth(param.getStroke().getThickness(),
param.getStroke().getDashTikz());;
if (r==0) then (yes) 
:tikz.rectangle(x,y,width,height);;
else (no)
:tikz.rectangleRound(x,y,width,height,r);;
endif 
end
@enduml

