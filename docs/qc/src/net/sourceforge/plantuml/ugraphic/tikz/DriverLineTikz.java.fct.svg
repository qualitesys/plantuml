@startuml
!pragma layout smetana
start
note right
void draw(ULineline,doublex,doubley,ColorMappermapper,
UParamparam,TikzGraphicstikz)
end note
:doublex2=x+line.getDX();;
:doubley2=y+line.getDY();;
:tikz.setStrokeColor(param.getColor());;
:tikz.setStrokeWidth(param.getStroke().getThickness(),
param.getStroke().getDashTikz());;
:tikz.line(x,y,x2,y2);;
end
@enduml

