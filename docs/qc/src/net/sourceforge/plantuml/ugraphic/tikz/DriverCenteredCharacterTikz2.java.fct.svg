@startuml
!pragma layout smetana
start
note right
void draw(UCenteredCharacter centeredCharacter,
double x,double y,ColorMapper mapper,UParam param,
TikzGraphics tikz)
end note
:final char c=centeredCharacter.getChar();;
:tikz.setStrokeColor(param.getColor());;
:tikz.drawSingleCharacter(x,y,c);;
end
@enduml

