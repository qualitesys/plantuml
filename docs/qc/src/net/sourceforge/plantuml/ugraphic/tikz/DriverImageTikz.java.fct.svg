@startuml
!pragma layout smetana
start
note right
void draw(UImageshape,doublex,doubley,ColorMappermapper,
UParamparam,TikzGraphicstikz)
end note
:final StringrawFileName=shape.getRawFileName();;
if (rawFileName!=null ) then (yes) 
:final Stringraw="\\includegraphics{"+rawFileName+
"}";;
:tikz.appendRaw(x,y,raw);;
:return ;;
stop
endif 
:final Stringformula=shape.getFormula();;
if (formula!=null ) then (yes) 
:tikz.appendRaw(x,y,formula);;
endif 
end
@enduml

