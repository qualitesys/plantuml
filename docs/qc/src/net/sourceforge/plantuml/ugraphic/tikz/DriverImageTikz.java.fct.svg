@startuml
!pragma layout smetana
start
note right
void draw(UImage shape,double x,double y,
ColorMapper mapper,UParam param,TikzGraphics tikz)
end note
:final String rawFileName=shape.getRawFileName();;
if (rawFileName!=null ) then (yes) 
:final String raw="\\includegraphics{"+rawFileName+
"}";;
:tikz.appendRaw(x,y,raw);;
:return ;;
stop
endif 
:final String formula=shape.getFormula();;
if (formula!=null ) then (yes) 
:tikz.appendRaw(x,y,formula);;
endif 
end
@enduml

