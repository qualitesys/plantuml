939.7344,330.25,943.7344,326.25,939.7344" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="308.25" x2="308.25" y1="549.9531" y2="569.9531"/><polygon fill="#181818" points="304.25,559.9531,308.25,569.9531,312.25,559.9531,308.25,563.9531" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="308.25" x2="308.25" y1="951.7344" y2="971.7344"/><polygon fill="#181818" points="304.25,961.7344,308.25,971.7344,312.25,961.7344,308.25,965.7344" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[ccdbb7660c0ad4e365fd6501f2d88890]
@startuml
!pragma layout smetana
start
note right
void draw(UEllipse shape,double x,double y,
ColorMapper mapper,UParam param,TikzGraphics tikz)
end note
:final double width=shape.getWidth();;
:final double height=shape.getHeight();;
:double start=shape.getStart();;
:final double extend=shape.getExtend();;
:final double cx=x+width/2;;
:final double cy=y+height/2;;
:tikz.setFillColor(param.getBackcolor());;
:tikz.setStrokeColor(param.getColor());;
:tikz.setStrokeWidth(param.getStroke().getThickness(),
param.getStroke().getDashTikz());;
if (start==0&&extend==0) then (yes) 
:tikz.ellipse(cx,cy,width/2,height/2);;
else (no)
:start=start+90;;
:final double x1=cx+Math.sin(start*Math.PI/180.)*width/2;;
:final double y1=cy+Math.cos(start*Math.PI/180.)*height/2;;
:final double x2=cx+Math.sin((start+extend)*Math.PI/180.)*width/2;;
:final double y2=cy+Math.cos((start+extend)*Math.PI/180.)*height/2;;
:tikz.arc(x1,y1,(int )((360-(start+270))),(int )(360-((start+
270+extend))),(width+height)/4);;
endif 
end
@enduml

