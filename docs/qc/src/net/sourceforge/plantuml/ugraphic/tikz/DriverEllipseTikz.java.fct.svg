@startuml
!pragma layout smetana
start
note right
void draw(UEllipseshape,doublex,doubley,ColorMappermapper,
UParamparam,TikzGraphicstikz)
end note
:final doublewidth=shape.getWidth();;
:final doubleheight=shape.getHeight();;
:doublestart=shape.getStart();;
:final doubleextend=shape.getExtend();;
:final doublecx=x+width/2;;
:final doublecy=y+height/2;;
:tikz.setFillColor(param.getBackcolor());;
:tikz.setStrokeColor(param.getColor());;
:tikz.setStrokeWidth(param.getStroke().getThickness(),
param.getStroke().getDashTikz());;
if (start==0&&extend==0) then (yes) 
:tikz.ellipse(cx,cy,width/2,height/2);;
else (no)
:start=start+90;;
:final doublex1=cx+Math.sin(start*Math.PI/180.)*width/2;;
:final doubley1=cy+Math.cos(start*Math.PI/180.)*height/2;;
:final doublex2=cx+Math.sin((start+extend)*Math.PI/180.)*width/2;;
:final doubley2=cy+Math.cos((start+extend)*Math.PI/180.)*height/2;;
:tikz.arc(x1,y1,(int)((360-(start+270))),(int)(360-((start+
270+extend))),(width+height)/4);;
endif 
end
@enduml

