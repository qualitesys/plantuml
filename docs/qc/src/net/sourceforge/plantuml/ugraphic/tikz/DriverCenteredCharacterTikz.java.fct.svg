@startuml
!pragma layout smetana
start
note right
void draw(UCenteredCharactercenteredCharacter,
doublex,doubley,ColorMappermapper,UParamparam,
TikzGraphicstikz)
end note
:final charc=centeredCharacter.getChar();;
:final UFontfont=centeredCharacter.getFont();;
:final UnusedSpaceunusedSpace=UnusedSpace.getUnusedSpace(font,c);;
:final doublexpos=x-unusedSpace.getCenterX()-0.5;;
:final doubleypos=y-unusedSpace.getCenterY()-0.5;;
:final TextLayoutt=createTextLayout(font,
""+c);;
:tikz.setStrokeColor(param.getColor());;
:tikz.drawPathIterator(xpos,ypos,t.getOutline(null )
.getPathIterator(null ));;
end
@enduml

