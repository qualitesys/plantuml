#181818;stroke-width:1.0;"/><!--MD5=[19aed5130852f0aa1d251f357ecabc6b]
@startuml
!pragma layout smetana
start
note right
void draw(UText shape,double x,double y,ColorMapper mapper,
UParam param,TikzGraphics tikz)
end note
:final FontConfiguration fontConfiguration=shape.getFontConfiguration();;
:final UFont font=fontConfiguration.getFont();;
:final HColor col=fontConfiguration.getColor();;
:tikz.setStrokeColor(col);;
:final boolean underline=fontConfiguration.containsStyle(FontStyle.UNDERLINE);;
:final boolean italic=font.isItalic();;
:final boolean bold=font.isBold();;
:tikz.text(x,y,shape.getText(),underline,
italic,bold);;
end
@enduml

