ke-width:1.0;"/><!--MD5=[5a277c40e17c08a1a29f0d97bbb25003]
@startuml
!pragma layout smetana
start
note right
void draw(UTextshape,doublex,doubley,ColorMappermapper,
UParamparam,TikzGraphicstikz)
end note
:final FontConfigurationfontConfiguration=shape.getFontConfiguration();;
:final UFontfont=fontConfiguration.getFont();;
:final HColorcol=fontConfiguration.getColor();;
:tikz.setStrokeColor(col);;
:final booleanunderline=fontConfiguration.containsStyle(FontStyle.UNDERLINE);;
:final booleanitalic=font.isItalic();;
:final booleanbold=font.isBold();;
:tikz.text(x,y,shape.getText(),underline,
italic,bold);;
end
@enduml

