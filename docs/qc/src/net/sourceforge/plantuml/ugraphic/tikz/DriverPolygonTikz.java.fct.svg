18;stroke-width:1.0;" x1="314.25" x2="314.25" y1="519.9844" y2="539.9844"/><polygon fill="#181818" points="310.25,529.9844,314.25,539.9844,318.25,529.9844,314.25,533.9844" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[a136d170728d1d15f0f9f54bf7694e1a]
@startuml
!pragma layout smetana
start
note right
void draw(UPolygonpoly,doublex,doubley,ColorMappermapper,
UParamparam,TikzGraphicstikz)
end note
:final doublepoints[]=poly.getPointArray(x,y);;
:final HColorback=param.getBackcolor();;
if (back instanceof HColorGradient) then (yes) 
:final HColorGradientgr=(HColorGradient)back;;
:tikz.setGradientColor(gr.getColor1(),gr.getColor2(),
gr.getPolicy());;
else (no)
:tikz.setFillColor(back);;
endif 
:tikz.setStrokeColor(param.getColor());;
:tikz.setStrokeWidth(param.getStroke().getThickness(),
param.getStroke().getDashTikz());;
:tikz.polygon(points);;
end
@enduml

