@startuml
!pragma layout smetana
start
note right
constructor DriverLineHtml5(ClipContainerclipContainer)
end note
:this.clipContainer=clipContainer;;
end
start
note right
void draw(ULineshape,doublex,doubley,ColorMappermapper,
UParamparam,Html5Drawerhtml)
end note
:doublex2=x+shape.getDX();;
:doubley2=y+shape.getDY();;
:final UClipclip=clipContainer.getClip();;
if (clip!=null ) then (yes) 
:final Line2D.Doubleline=clip.getClippedLine(new Line2D.Double(x,
y,x2,y2));;
if (line==null ) then (yes) 
:return ;;
stop
endif 
:x=line.x1;;
:y=line.y1;;
:x2=line.x2;;
:y2=line.y2;;
endif 
:final Stringcolor=param.getColor()==null ? null :param.getColor()
.toRGB(mapper);;
:html.setStrokeColor(color);;
:html.htmlLine(x,y,x2,y2,0);;
end
@enduml

