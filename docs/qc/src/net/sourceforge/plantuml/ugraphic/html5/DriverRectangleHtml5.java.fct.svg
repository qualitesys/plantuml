34]
@startuml
!pragma layout smetana
start
note right
constructor DriverRectangleHtml5(ClipContainer clipContainer)
end note
:this.clipContainer=clipContainer;;
end
start
note right
void draw(URectangle rect,double x,double y,
ColorMapper mapper,UParam param,Html5Drawer html)
end note
:double width=rect.getWidth();;
:double height=rect.getHeight();;
:final UClip clip=clipContainer.getClip();;
if (clip!=null ) then (yes) 
:final Rectangle2D.Double r=clip.getClippedRectangle(new Rectangle2D.Double(x,
y,width,height));;
:x=r.x;;
:y=r.y;;
:width=r.width;;
:height=r.height;;
endif 
:final double rx=rect.getRx();;
:final double ry=rect.getRy();;
:final HColor back=param.getBackcolor();;
if (back instanceof HColorGradient ) then (yes) 
else (no)
:final String color=param.getColor()==null ? null :param.getColor()
.toRGB(mapper);;
:final String backcolor=param.getColor()==null ? null :param.getBackcolor()
.toRGB(mapper);;
:html.setStrokeColor(color);;
:html.setFillColor(backcolor);;
:html.htmlRectangle(x,y,width,height,rx/2,
ry/2);;
endif 
end
@enduml

