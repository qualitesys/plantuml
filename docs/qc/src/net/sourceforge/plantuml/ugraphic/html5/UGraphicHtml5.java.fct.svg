@startuml
!pragma layout smetana
start
note right
AbstractCommonUGraphiccopyUGraphic()
end note
:return this;;
stop
end
start
note right
constructor UGraphicHtml5(HColordefaultBackground,
ColorMappercolorMapper,StringBounderstringBounder)
end note
:super (defaultBackground,colorMapper,stringBounder,
new Html5Drawer());;
:registerDriver(URectangle.class ,new DriverRectangleHtml5(this));;
:ignoreShape(UText.class );;
:registerDriver(ULine.class ,new DriverLineHtml5(this));;
:ignoreShape(UPolygon.class );;
end
start
note right
StringgenerateHtmlCode()
end note
:return getGraphicObject().generateHtmlCode();;
stop
end
start
note right
void writeToStream(OutputStreamos,Stringmetadata,
intdpi)
end note
:os.write(generateHtmlCode().getBytes());;
end
@enduml

