@startuml
!pragma layout smetana
start
note right
AbstractCommonUGraphic copyUGraphic()
end note
:return this;;
stop
end
start
note right
constructor UGraphicHtml5(HColor defaultBackground,
ColorMapper colorMapper,StringBounder stringBounder)
end note
:super (defaultBackground,colorMapper,stringBounder,
new Html5Drawer());;
:registerDriver(URectangle.class ,new DriverRectangleHtml5(this));;
:ignoreShape(UText.class );;
:registerDriver(ULine.class ,new DriverLineHtml5(this));;
:ignoreShape(UPolygon.class );;
end
start
note right
String generateHtmlCode()
end note
:return getGraphicObject().generateHtmlCode();;
stop
end
start
note right
void writeToStream(OutputStream os,String metadata,
int dpi)
end note
:os.write(generateHtmlCode().getBytes());;
end
@enduml

