@startuml
!pragma layout smetana
start
note right
constructor ULineHand(ULineline,Randomrnd)
end note
:final doubleendX=line.getDX();;
:final doubleendY=line.getDY();;
:final HandJigglejiggle=new HandJiggle(0,
0,2.0,rnd);;
:jiggle.lineTo(endX,endY);;
:this.path=jiggle.toUPath();;
end
start
note right
UPathgetHanddrawn()
end note
:return this.path;;
stop
end
@enduml

