@startuml
!pragma layout smetana
start
note right
constructor ULineHand(ULine line,Random rnd)
end note
:final double endX=line.getDX();;
:final double endY=line.getDY();;
:final HandJiggle jiggle=new HandJiggle(0,
0,2.0,rnd);;
:jiggle.lineTo(endX,endY);;
:this.path=jiggle.toUPath();;
end
start
note right
UPath getHanddrawn()
end note
:return this.path;;
stop
end
@enduml

