@startuml
!pragma layout smetana
start
note right
constructor UPolygonHand(UPolygonsource,Randomrnd)
end note
:final List<XPoint2D>pt=source.getPoints();;
if (pt.size()==0) then (yes) 
:poly=new UPolygon();;
:return ;;
stop
endif 
:final HandJigglejiggle=HandJiggle.create(pt.get(0),
1.5,rnd);;
:jiggle.lineTo(pt.get(i));;
:jiggle.lineTo(pt.get(0));;
:this.poly=jiggle.toUPolygon();;
:this.poly.setDeltaShadow(source.getDeltaShadow());;
end
start
note right
ShadowablegetHanddrawn()
end note
:return this.poly;;
stop
end
@enduml

