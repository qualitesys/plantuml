@startuml
!pragma layout smetana
start
note right
constructor UPolygonHand(UPolygon source,
Random rnd)
end note
:final List<XPoint2D> pt=source.getPoints();;
if (pt.size()==0) then (yes) 
:poly=new UPolygon();;
:return ;;
stop
endif 
:final HandJiggle jiggle=HandJiggle.create(pt.get(0),
1.5,rnd);;
:jiggle.lineTo(pt.get(i));;
:jiggle.lineTo(pt.get(0));;
:this.poly=jiggle.toUPolygon();;
:this.poly.setDeltaShadow(source.getDeltaShadow());;
end
start
note right
Shadowable getHanddrawn()
end note
:return this.poly;;
stop
end
@enduml

