@startuml
!pragma layout smetana
start
note right
constructor URectangleHand(URectanglerectangle,
Randomrnd)
end note
:final doublewidth=rectangle.getWidth();;
:final doubleheight=rectangle.getHeight();;
:final HandJigglejiggle;;
:final doublerx=Math.min(rectangle.getRx()/2,
width/2);;
:final doublery=Math.min(rectangle.getRy()/2,
height/2);;
if (rx==0&&ry==0) then (yes) 
:jiggle=new HandJiggle(0,0,1.5,rnd);;
:jiggle.lineTo(width,0);;
:jiggle.lineTo(width,height);;
:jiggle.lineTo(0,height);;
:jiggle.lineTo(0,0);;
else (no)
:jiggle=new HandJiggle(rx,0,1.5,rnd);;
:jiggle.lineTo(width-rx,0);;
:jiggle.arcTo(-Math.PI/2,0,width-rx,ry,rx,
ry);;
:jiggle.lineTo(width,height-ry);;
:jiggle.arcTo(0,Math.PI/2,width-rx,height-ry,
rx,ry);;
:jiggle.lineTo(rx,height);;
:jiggle.arcTo(Math.PI/2,Math.PI,rx,height-ry,
rx,ry);;
:jiggle.lineTo(0,ry);;
:jiggle.arcTo(Math.PI,3*Math.PI/2,rx,ry,rx,
ry);;
endif 
:this.poly=jiggle.toUPolygon();;
:this.poly.setDeltaShadow(rectangle.getDeltaShadow());;
end
start
note right
ShadowablegetHanddrawn()
end note
:return this.poly;;
stop
end
@enduml

