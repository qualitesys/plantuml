@startuml
!pragma layout smetana
start
note right
constructor UDotPathHand(DotPathsource,Randomrnd)
end note
:final HandJigglejiggle=HandJiggle.create(source.getStartPoint(),
2.0,rnd);;
:jiggle.curveTo(curve);;
:this.path=jiggle.toUPath();;
end
start
note right
UPathgetHanddrawn()
end note
:return this.path;;
stop
end
@enduml

