@startuml
!pragma layout smetana
start
note right
constructor UDotPathHand(DotPath source,Random rnd)
end note
:final HandJiggle jiggle=HandJiggle.create(source.getStartPoint(),
2.0,rnd);;
:jiggle.curveTo(curve);;
:this.path=jiggle.toUPath();;
end
start
note right
UPath getHanddrawn()
end note
:return this.path;;
stop
end
@enduml

