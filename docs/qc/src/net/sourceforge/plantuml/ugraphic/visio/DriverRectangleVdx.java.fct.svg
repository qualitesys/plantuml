@startuml
!pragma layout smetana
start
note right
void draw(URectangle rect,double x,double y,
ColorMapper mapper,UParam param,VisioGraphics visio)
end note
:final double width=rect.getWidth();;
:final double height=rect.getHeight();;
:visio.rectangle(x,y,width,height);;
end
@enduml

