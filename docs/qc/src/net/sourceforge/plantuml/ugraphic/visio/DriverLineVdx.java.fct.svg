@startuml
!pragma layout smetana
start
note right
void draw(ULine line,double x,double y,ColorMapper mapper,
UParam param,VisioGraphics visio)
end note
:final double dx=line.getDX();;
:final double dy=line.getDY();;
:visio.line(x,y,x+dx,y+dy);;
end
@enduml

