:#181818;stroke-width:1.0;" x1="246.5" x2="246.5" y1="800.4883" y2="820.4883"/><polygon fill="#181818" points="242.5,810.4883,246.5,820.4883,250.5,810.4883,246.5,814.4883" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="246.5" x2="246.5" y1="868.4258" y2="888.4258"/><polygon fill="#181818" points="242.5,878.4258,246.5,888.4258,250.5,878.4258,246.5,882.4258" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="246.5" x2="246.5" y1="950.332" y2="970.332"/><polygon fill="#181818" points="242.5,960.332,246.5,970.332,250.5,960.332,246.5,964.332" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[c1b09008dc9f25dba040bdcaee991153]
@startuml
!pragma layout smetana
start
note right
constructor DriverTextVdx(StringBounderstringBounder)
end note
:this.stringBounder=stringBounder;;
end
start
note right
void draw(UTextshape,doublex,doubley,ColorMappermapper,
UParamparam,VisioGraphicsvisio)
end note
:Thread.dumpStack();;
:final FontConfigurationfontConfiguration=shape.getFontConfiguration();;
:final UFontfont=fontConfiguration.getFont();;
:Stringtext=shape.getText();;
if (text.startsWith(" ")) then (yes) 
:final doublespace=stringBounder.calculateDimension(font,
" ").getWidth();;
while (text.startsWith(" "))
:x+=space;;
:text=text.substring(1);;
endwhile
endif 
:text=StringUtils.trin(text);;
:final XDimension2Ddim=stringBounder.calculateDimension(font,
text);;
:visio.text(text,x,y,font.getFamily(UFontContext.SVG),
font.getSize(),dim.getWidth(),dim.getHeight(),
fontConfiguration.getAttributes());;
end
@enduml

