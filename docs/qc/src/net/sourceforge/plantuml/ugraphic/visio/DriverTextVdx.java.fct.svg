@startuml
!pragma layout smetana
start
note right
constructor DriverTextVdx(StringBounder stringBounder)
end note
:this.stringBounder=stringBounder;;
end
start
note right
void draw(UText shape,double x,double y,ColorMapper mapper,
UParam param,VisioGraphics visio)
end note
:Thread.dumpStack();;
:final FontConfiguration fontConfiguration=shape.getFontConfiguration();;
:final UFont font=fontConfiguration.getFont();;
:String text=shape.getText();;
if (text.startsWith(" ")) then (yes) 
:final double space=stringBounder.calculateDimension(font,
" ").getWidth();;
while (text.startsWith(" "))
:x+=space;;
:text=text.substring(1);;
endwhile
endif 
:text=StringUtils.trin(text);;
:final XDimension2D dim=stringBounder.calculateDimension(font,
text);;
:visio.text(text,x,y,font.getFamily(UFontContext.SVG),
font.getSize(),dim.getWidth(),dim.getHeight(),
fontConfiguration.getAttributes());;
end
@enduml

