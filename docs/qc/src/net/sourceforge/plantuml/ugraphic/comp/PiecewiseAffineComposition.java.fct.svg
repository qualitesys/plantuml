@startuml
!pragma layout smetana
start
note right
constructor PiecewiseAffineComposition(PiecewiseAffineCompositionfirst,
PiecewiseAffineCompositionsecond)
end note
:this.first=first;;
:this.second=second;;
end
start
note right
doubletransform(doublev)
end note
:return second.transform(first.transform(v));;
stop
end
@enduml

