@startuml
!pragma layout smetana
start
note right
constructor CompressionTransform(SlotSet slotSet)
end note
:this.all=slotSet.getSlots();;
end
start
note right
double transform(double v)
end note
:return v-getCompressDelta(v);;
stop
end
start
note right
double getCompressDelta(double v)
end note
:double result=0;;
if (s.getStart()>v) then (yes) 
:continue ;;
endif 
if (v>s.getEnd()) then (yes) 
:result+=s.size();;
else (no)
:result+=v-s.getStart();;
endif 
:return result;;
stop
end
@enduml

