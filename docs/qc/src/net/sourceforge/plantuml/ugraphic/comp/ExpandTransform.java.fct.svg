stroke-width:1.0;" x1="259" x2="259" y1="815.3516" y2="835.3516"/><polygon fill="#181818" points="255,825.3516,259,835.3516,263,825.3516,259,829.3516" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="259" x2="259" y1="712.9805" y2="732.9805"/><polygon fill="#181818" points="255,722.9805,259,732.9805,263,722.9805,259,726.9805" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="259" x2="259" y1="859.3516" y2="879.3516"/><polygon fill="#181818" points="255,869.3516,259,879.3516,263,869.3516,259,873.3516" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="259" x2="259" y1="913.3203" y2="933.3203"/><polygon fill="#181818" points="255,923.3203,259,933.3203,263,923.3203,259,927.3203" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[aa69f8f51ec3232ddaa91df8bd773a07]
@startuml
!pragma layout smetana
start
note right
String toString()
end note
:return all.toString();;
stop
end
start
note right
void addExpandIncludingLimit(double position,
double extend)
end note
:this.all.add(new Expand(ExpandType.INCLUDING_LIMIT,
position,extend));;
end
start
note right
void addExpandExcludingLimit(double position,
double extend)
end note
:this.all.add(new Expand(ExpandType.EXCLUDING_LIMIT,
position,extend));;
end
start
note right
double transform(final double init)
end note
:double result=init;;
if (ExpandType.INCLUDING_LIMIT==expand.getType()&&init>=expand.getPosition()) then (yes) 
:result+=expand.getExtend();;
endif 
if (ExpandType.EXCLUDING_LIMIT==expand.getType()&&init>expand.getPosition()) then (yes) 
:result+=expand.getExtend();;
endif 
:return result;;
stop
end
@enduml

