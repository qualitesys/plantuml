@startuml
!pragma layout smetana
start
note right
constructor Expand(ExpandType type,double position,
double extend)
end note
if (extend<=0) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:this.type=type;;
:this.position=position;;
:this.extend=extend;;
end
start
note right
String toString()
end note
:return "("+position+"==>+"+extend+" "+type+
")";;
stop
end
start
note right
int compareTo(Expand other)
end note
if (this.position<other.position) then (yes) 
:return -1;;
stop
endif 
if (this.position>other.position) then (yes) 
:return 1;;
stop
endif 
:return 0;;
stop
end
start
note right
double getPosition()
end note
:return position;;
stop
end
start
note right
double getExtend()
end note
:return extend;;
stop
end
start
note right
ExpandType getType()
end note
:return type;;
stop
end
@enduml

