@startuml
!pragma layout smetana
start
note right
TextBlock build(CompressionMode mode,TextBlock textBlock,
StringBounder stringBounder)
end note
:final PiecewiseAffineTransform affine=getPiecewiseAffineTransform(mode,
textBlock,stringBounder);;
:return PiecewiseAffineOnXorYBuilder.build(mode,
textBlock,affine);;
stop
end
start
note right
PiecewiseAffineTransform getPiecewiseAffineTransform(CompressionMode mode,
TextBlock textBlock,StringBounder stringBounder)
end note
:final SlotFinder slotFinder=SlotFinder.create(mode,
stringBounder);;
:textBlock.drawU(slotFinder);;
:final SlotSet ysSlotSet=slotFinder.getSlotSet()
.reverse().smaller(5.0);;
:return new CompressionTransform(ysSlotSet);;
stop
end
@enduml

