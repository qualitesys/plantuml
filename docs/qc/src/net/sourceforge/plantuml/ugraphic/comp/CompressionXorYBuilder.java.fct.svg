@startuml
!pragma layout smetana
start
note right
TextBlockbuild(CompressionModemode,TextBlocktextBlock,
StringBounderstringBounder)
end note
:final PiecewiseAffineTransformaffine=getPiecewiseAffineTransform(mode,
textBlock,stringBounder);;
:return PiecewiseAffineOnXorYBuilder.build(mode,
textBlock,affine);;
stop
end
start
note right
PiecewiseAffineTransformgetPiecewiseAffineTransform(CompressionModemode,
TextBlocktextBlock,StringBounderstringBounder)
end note
:final SlotFinderslotFinder=SlotFinder.create(mode,
stringBounder);;
:textBlock.drawU(slotFinder);;
:final SlotSetysSlotSet=slotFinder.getSlotSet()
.reverse().smaller(5.0);;
:return new CompressionTransform(ysSlotSet);;
stop
end
@enduml

