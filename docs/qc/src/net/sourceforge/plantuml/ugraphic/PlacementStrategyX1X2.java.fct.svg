@startuml
!pragma layout smetana
start
note right
constructor PlacementStrategyX1X2(StringBounderstringBounder)
end note
:super (stringBounder);;
end
start
note right
Map<TextBlock,XPoint2D>getPositions(doublewidth,
doubleheight)
end note
:final doubleusedWidth=getSumWidth();;
:final doublespace=(width-usedWidth)/(getDimensions()
.size()+1);;
:final Map<TextBlock,XPoint2D>result=new LinkedHashMap<>();;
:doublex=space;;
:final doubley=(height-ent.getValue().getHeight())/2;;
:result.put(ent.getKey(),new XPoint2D(x,y));;
:x+=ent.getValue().getWidth()+space;;
:return result;;
stop
end
@enduml

