@startuml
!pragma layout smetana
start
note right
HColorgetColor()
end note
:return HColors.BLACK;;
stop
end
start
note right
HColorgetBackcolor()
end note
:return HColors.BLACK;;
stop
end
start
note right
UStrokegetStroke()
end note
:return new UStroke();;
stop
end
start
note right
booleanisHidden()
end note
:return false;;
stop
end
start
note right
UPatterngetPattern()
end note
:return UPattern.FULL;;
stop
end
@enduml

