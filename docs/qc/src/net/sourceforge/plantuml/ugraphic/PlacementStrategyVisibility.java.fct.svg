@startuml
!pragma layout smetana
start
note right
constructor PlacementStrategyVisibility(StringBounder stringBounder,
int col2)
end note
:super (stringBounder);;
:this.col2=col2;;
end
start
note right
Map<TextBlock,XPoint2D> getPositions(double width,
double height)
end note
:final Map<TextBlock,XPoint2D> result=new LinkedHashMap<>();;
:double y=0;;
:final Map.Entry<TextBlock,XDimension2D> ent1=it.next();;
:final Map.Entry<TextBlock,XDimension2D> ent2=it.next();;
:final double height1=ent1.getValue().getHeight();;
:final double height2=ent2.getValue().getHeight();;
:final double maxHeight12=Math.max(height1,
height2);;
:result.put(ent1.getKey(),new XPoint2D(0,2+
y+(maxHeight12-height1)/2));;
:result.put(ent2.getKey(),new XPoint2D(col2,y+
(maxHeight12-height2)/2));;
:y+=maxHeight12;;
:return result;;
stop
end
@enduml

