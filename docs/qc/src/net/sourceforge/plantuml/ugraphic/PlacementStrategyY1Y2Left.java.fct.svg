@startuml
!pragma layout smetana
start
note right
constructor PlacementStrategyY1Y2Left(StringBounder stringBounder)
end note
:super (stringBounder);;
end
start
note right
Map<TextBlock,XPoint2D> getPositions(double width,
double height)
end note
:final double usedHeight=getSumHeight();;
:final double space=(height-usedHeight)/(getDimensions()
.size()+1);;
:final Map<TextBlock,XPoint2D> result=new LinkedHashMap<>();;
:double y=space;;
:final double x=0;;
:result.put(ent.getKey(),new XPoint2D(x,y));;
:y+=ent.getValue().getHeight()+space;;
:return result;;
stop
end
@enduml

