@startuml
!pragma layout smetana
start
note right
UGraphic create(UGraphic ug,Stencil stencil,
UStroke defaultStroke)
end note
:return new UGraphicStencil(ug,stencil,defaultStroke);;
stop
end
start
note right
UGraphic create(UGraphic ug,XDimension2D dim)
end note
:return new UGraphicStencil(ug,getRectangleStencil(dim),
new UStroke());;
stop
end
start
note right
Stencil getRectangleStencil(final XDimension2D dim)
end note
:return new Stencil(){public double getStartingX(StringBounder stringBounder,
double y){return 0;}public double getEndingX(StringBounder stringBounder,
double y){return dim.getWidth();}};;
stop
end
start
note right
constructor UGraphicStencil(UGraphic ug,Stencil stencil,
UStroke defaultStroke)
end note
:super (ug);;
:this.stencil=stencil;;
:this.defaultStroke=defaultStroke;;
end
start
note right
AbstractUGraphicHorizontalLine copy(UGraphic ug)
end note
:return new UGraphicStencil(ug,stencil,defaultStroke);;
stop
end
start
note right
void drawHline(UGraphic ug,UHorizontalLine line,
UTranslate translate)
end note
:line.drawLineInternal(ug,stencil,translate.getDy(),
defaultStroke);;
end
@enduml

