@startuml
!pragma layout smetana
start
note right
UGraphiccreate(UGraphicug,Stencilstencil,
UStrokedefaultStroke)
end note
:return new UGraphicStencil(ug,stencil,defaultStroke);;
stop
end
start
note right
UGraphiccreate(UGraphicug,XDimension2Ddim)
end note
:return new UGraphicStencil(ug,getRectangleStencil(dim),
new UStroke());;
stop
end
start
note right
StencilgetRectangleStencil(final XDimension2Ddim)
end note
:return new Stencil(){public doublegetStartingX(StringBounderstringBounder,
doubley){return 0;}public doublegetEndingX(StringBounderstringBounder,
doubley){return dim.getWidth();}};;
stop
end
start
note right
constructor UGraphicStencil(UGraphicug,Stencilstencil,
UStrokedefaultStroke)
end note
:super (ug);;
:this.stencil=stencil;;
:this.defaultStroke=defaultStroke;;
end
start
note right
AbstractUGraphicHorizontalLinecopy(UGraphicug)
end note
:return new UGraphicStencil(ug,stencil,defaultStroke);;
stop
end
start
note right
void drawHline(UGraphicug,UHorizontalLineline,
UTranslatetranslate)
end note
:line.drawLineInternal(ug,stencil,translate.getDy(),
defaultStroke);;
end
@enduml

