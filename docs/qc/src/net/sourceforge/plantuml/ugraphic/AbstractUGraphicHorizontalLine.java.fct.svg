@startuml
!pragma layout smetana
start
note right
UGraphicapply(UChangechange)
end note
:final AbstractUGraphicHorizontalLineresult;;
if (change instanceof UTranslate) then (yes) 
:result=copy(getUg());;
:result.translate=this.translate.compose((UTranslate)change);;
else if (change instanceof UClip) then (yes) 
:final UClipclip=((UClip)change).translate(translate);;
:result=copy(getUg().apply(clip));;
:result.translate=this.translate;;
else (no)
:result=copy(getUg().apply(change));;
:result.translate=this.translate;;
endif 
:return result;;
stop
end
start
note right
constructor AbstractUGraphicHorizontalLine(UGraphicug)
end note
:super (ug);;
end
start
note right
void drawHline(UGraphicug,UHorizontalLineline,
UTranslatetranslate)
end note
end
start
note right
void draw(UShapeshape)
end note
if (shape instanceof UHorizontalLine) then (yes) 
:drawHline(getUg(),(UHorizontalLine)shape,
UTranslate.dy(translate.getDy()));;
else (no)
:getUg().apply(translate).draw(shape);;
endif 
end
@enduml

