@startuml
!pragma layout smetana
start
note right
UGraphic apply(UChange change)
end note
:final AbstractUGraphicHorizontalLine result;;
if (change instanceof UTranslate ) then (yes) 
:result=copy(getUg());;
:result.translate=this.translate.compose((UTranslate )change);;
else if (change instanceof UClip ) then (yes) 
:final UClip clip=((UClip )change).translate(translate);;
:result=copy(getUg().apply(clip));;
:result.translate=this.translate;;
else (no)
:result=copy(getUg().apply(change));;
:result.translate=this.translate;;
endif 
:return result;;
stop
end
start
note right
constructor AbstractUGraphicHorizontalLine(UGraphic ug)
end note
:super (ug);;
end
start
note right
void drawHline(UGraphic ug,UHorizontalLine line,
UTranslate translate)
end note
end
start
note right
void draw(UShape shape)
end note
if (shape instanceof UHorizontalLine ) then (yes) 
:drawHline(getUg(),(UHorizontalLine )shape,
UTranslate.dy(translate.getDy()));;
else (no)
:getUg().apply(translate).draw(shape);;
endif 
end
@enduml

