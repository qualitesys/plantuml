@startuml
!pragma layout smetana
start
note right
String toString()
end note
:return "UText["+text+"]";;
stop
end
start
note right
constructor UText(String text,FontConfiguration font,
int orientation)
end note
:assert text.indexOf('\t')==-1;;
:this.text=text;;
:this.font=font;;
:this.orientation=orientation;;
end
start
note right
constructor UText(String text,FontConfiguration font)
end note
:this(text,font,0);;
end
start
note right
UText withOrientation(int orientation)
end note
:return new UText(text,font,orientation);;
stop
end
start
note right
String getText()
end note
:return text;;
stop
end
start
note right
FontConfiguration getFontConfiguration()
end note
:return font;;
stop
end
start
note right
double getDescent(StringBounder stringBounder)
end note
:return stringBounder.getDescent(font.getFont(),
text);;
stop
end
start
note right
int getOrientation()
end note
:return orientation;;
stop
end
@enduml

