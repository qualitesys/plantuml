@startuml
!pragma layout smetana
start
note right
constructor ShadowManager(intc1,intc2)
end note
:this.c1=c1;;
:this.c2=c2;;
end
start
note right
double[]getShadowDeltaPoints(doubledeltaShadow,
doublediff,double[]points)
end note
:assert points.length%2==0;;
:doublecx=0;;
:doublecy=0;;
:cx+=points[i];;
:cy+=points[i+1];;
:final intnbPoints=points.length/2;;
:cx=cx/nbPoints;;
:cy=cy/nbPoints;;
:final double[]result=new double[points.length];;
:final doublediffx=points[i]>cx? -diff:diff;;
:final doublediffy=points[i+1]>cy? -diff:diff;;
:result[i]=points[i]+diffx+deltaShadow;;
:result[i+1]=points[i+1]+diffy+deltaShadow;;
:return result;;
stop
end
start
note right
ColorgetColor(doubledelta,doubletotal)
end note
:final intc=(int)(c2+1.0*delta/total*(c1-c2));;
:return new Color(c,c,c);;
stop
end
@enduml

