@startuml
!pragma layout smetana
start
note right
constructor ShadowManager(int c1,int c2)
end note
:this.c1=c1;;
:this.c2=c2;;
end
start
note right
double[] getShadowDeltaPoints(double deltaShadow,
double diff,double[] points)
end note
:assert points.length%2==0;;
:double cx=0;;
:double cy=0;;
:cx+=points[i];;
:cy+=points[i+1];;
:final int nbPoints=points.length/2;;
:cx=cx/nbPoints;;
:cy=cy/nbPoints;;
:final double[] result=new double[points.length];;
:final double diffx=points[i]>cx? -diff:diff;;
:final double diffy=points[i+1]>cy? -diff:diff;;
:result[i]=points[i]+diffx+deltaShadow;;
:result[i+1]=points[i+1]+diffy+deltaShadow;;
:return result;;
stop
end
start
note right
Color getColor(double delta,double total)
end note
:final int c=(int )(c2+1.0*delta/total*(c1-c2));;
:return new Color(c,c,c);;
stop
end
@enduml

