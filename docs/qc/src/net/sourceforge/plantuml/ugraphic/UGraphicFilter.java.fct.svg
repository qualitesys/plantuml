@startuml
!pragma layout smetana
start
note right
UGraphic apply(UChange translate)
end note
:throw new UnsupportedOperationException();;
stop
end
start
note right
constructor UGraphicFilter(UGraphic ug,Class<?extendsUShape> ... toprint)
end note
:super (ug);;
:this.toprint=Arrays.asList(toprint);;
end
start
note right
void draw(UShape shape)
end note
if (toprint.contains(shape.getClass())) then (yes) 
:getUg().draw(shape);;
endif 
end
@enduml

