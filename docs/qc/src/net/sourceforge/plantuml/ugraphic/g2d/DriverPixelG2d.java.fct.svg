@startuml
!pragma layout smetana
start
note right
void draw(UPixel pixel,double x,double y,
ColorMapper mapper,UParam param,Graphics2D g2d)
end note
:g2d.setColor(param.getColor().toColor(mapper));;
:g2d.fillRect((int )x,(int )y,1,1);;
end
@enduml

