17.75" x2="317.75" y1="678.1875" y2="698.1875"/><polygon fill="#181818" points="313.75,688.1875,317.75,698.1875,321.75,688.1875,317.75,692.1875" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[d53489f9a51682bf57630db30f873556]
@startuml
!pragma layout smetana
start
note right
constructor DriverImageG2d(doubledpiFactor,
EnsureVisiblevisible)
end note
:this.visible=visible;;
:this.dpiFactor=dpiFactor;;
end
start
note right
void draw(UImageshape,doublex,doubley,ColorMappermapper,
UParamparam,Graphics2Dg2d)
end note
:visible.ensureVisible(x,y);;
:visible.ensureVisible(x+shape.getWidth(),y+
shape.getHeight());;
if (dpiFactor==1) then (yes) 
:g2d.drawImage(shape.getImage(1),(int)(x),
(int)(y),null );;
else (no)
:final AffineTransformback=g2d.getTransform();;
:g2d.scale(1/dpiFactor,1/dpiFactor);;
:g2d.drawImage(shape.getImage(dpiFactor),
(int)(x*dpiFactor),(int)(y*dpiFactor),null );;
:g2d.setTransform(back);;
endif 
end
@enduml

