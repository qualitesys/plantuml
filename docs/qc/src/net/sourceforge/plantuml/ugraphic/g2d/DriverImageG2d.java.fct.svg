h:1.0;" x1="321.75" x2="321.75" y1="678.1875" y2="698.1875"/><polygon fill="#181818" points="317.75,688.1875,321.75,698.1875,325.75,688.1875,321.75,692.1875" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[4eb8bb1250041e781d603bd9596a7ef6]
@startuml
!pragma layout smetana
start
note right
constructor DriverImageG2d(double dpiFactor,
EnsureVisible visible)
end note
:this.visible=visible;;
:this.dpiFactor=dpiFactor;;
end
start
note right
void draw(UImage shape,double x,double y,
ColorMapper mapper,UParam param,Graphics2D g2d)
end note
:visible.ensureVisible(x,y);;
:visible.ensureVisible(x+shape.getWidth(),y+
shape.getHeight());;
if (dpiFactor==1) then (yes) 
:g2d.drawImage(shape.getImage(1),(int )(x),
(int )(y),null );;
else (no)
:final AffineTransform back=g2d.getTransform();;
:g2d.scale(1/dpiFactor,1/dpiFactor);;
:g2d.drawImage(shape.getImage(dpiFactor),
(int )(x*dpiFactor),(int )(y*dpiFactor),null );;
:g2d.setTransform(back);;
endif 
end
@enduml

