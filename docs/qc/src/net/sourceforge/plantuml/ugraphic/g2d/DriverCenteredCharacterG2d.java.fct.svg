width:1.0;"/><!--MD5=[984a279ced0f20104c72a4d77f660f30]
@startuml
!pragma layout smetana
start
note right
void draw(UCenteredCharactercharacterCircled,
doublex,doubley,ColorMappermapper,UParamparam,
Graphics2Dg2d)
end note
:final charc=characterCircled.getChar();;
:final UFontfont=characterCircled.getFont();;
:final UnusedSpaceunusedSpace=UnusedSpace.getUnusedSpace(font,c);;
:g2d.setColor(param.getColor().toColor(mapper));;
:final doublexpos=x-unusedSpace.getCenterX();;
:final doubleypos=y-unusedSpace.getCenterY()-0.5;;
:g2d.setFont(font.getUnderlayingFont());;
:g2d.drawString(""+c,(float)xpos,(float)ypos);;
end
@enduml

