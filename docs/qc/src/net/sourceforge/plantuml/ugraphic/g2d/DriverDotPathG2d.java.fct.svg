@startuml
!pragma layout smetana
start
note right
constructor DriverDotPathG2d(EnsureVisible visible)
end note
:this.visible=visible;;
end
start
note right
void draw(DotPath shape,double x,double y,
ColorMapper mapper,UParam param,Graphics2D g2d)
end note
:DriverLineG2d.manageStroke(param,g2d);;
if (param.getColor().isTransparent()==false) then (yes) 
:g2d.setColor(param.getColor().toColor(mapper));;
:shape.draw(g2d,x,y);;
:shape.manageEnsureVisible(x,y,visible);;
endif 
end
@enduml

