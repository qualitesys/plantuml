tyle="stroke:#181818;stroke-width:1.0;" x1="324" x2="324" y1="1149.5352" y2="1169.5352"/><polygon fill="#181818" points="320,1159.5352,324,1169.5352,328,1159.5352,324,1163.5352" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[b8cd190fd6cd81b58d678fe5f3b0aabb]
@startuml
!pragma layout smetana
start
note right
constructor DriverLineG2d(double dpiFactor)
end note
:this.dpiFactor=dpiFactor;;
end
start
note right
void draw(ULine shape,double x,double y,ColorMapper mapper,
UParam param,Graphics2D g2d)
end note
:final Shape line=new Line2D.Double(x,y,x+
shape.getDX(),y+shape.getDY());;
:manageStroke(param,g2d);;
if (shape.getDeltaShadow()!=0) then (yes) 
:drawShadow(g2d,line,shape.getDeltaShadow(),
dpiFactor);;
endif 
:final HColor color=param.getColor();;
:DriverRectangleG2d.drawBorder(param,color,
mapper,shape,line,g2d,x,y);;
end
start
note right
void manageStroke(UParam param,Graphics2D g2d)
end note
:manageStroke(param.getStroke(),g2d);;
end
start
note right
void manageStroke(UStroke stroke,Graphics2D g2d)
end note
:final float thickness=(float )stroke.getThickness();;
if (stroke.getDashVisible()==0) then (yes) 
:g2d.setStroke(new BasicStroke(thickness));;
else (no)
:final float dash1=(float )stroke.getDashVisible();;
:final float dash2=(float )stroke.getDashSpace();;
:final float[] style={dash1,dash2};;
:g2d.setStroke(new BasicStroke(thickness,
BasicStroke.CAP_BUTT,BasicStroke.JOIN_MITER,
10.0f,style,0));;
endif 
end
@enduml

