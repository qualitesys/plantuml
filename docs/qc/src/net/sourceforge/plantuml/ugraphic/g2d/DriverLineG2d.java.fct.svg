;stroke-width:1.0;" x1="322" x2="322" y1="1149.5352" y2="1169.5352"/><polygon fill="#181818" points="318,1159.5352,322,1169.5352,326,1159.5352,322,1163.5352" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[fd334ccd455de17087ff25544ecfc791]
@startuml
!pragma layout smetana
start
note right
constructor DriverLineG2d(doubledpiFactor)
end note
:this.dpiFactor=dpiFactor;;
end
start
note right
void draw(ULineshape,doublex,doubley,ColorMappermapper,
UParamparam,Graphics2Dg2d)
end note
:final Shapeline=new Line2D.Double(x,y,x+
shape.getDX(),y+shape.getDY());;
:manageStroke(param,g2d);;
if (shape.getDeltaShadow()!=0) then (yes) 
:drawShadow(g2d,line,shape.getDeltaShadow(),
dpiFactor);;
endif 
:final HColorcolor=param.getColor();;
:DriverRectangleG2d.drawBorder(param,color,
mapper,shape,line,g2d,x,y);;
end
start
note right
void manageStroke(UParamparam,Graphics2Dg2d)
end note
:manageStroke(param.getStroke(),g2d);;
end
start
note right
void manageStroke(UStrokestroke,Graphics2Dg2d)
end note
:final floatthickness=(float)stroke.getThickness();;
if (stroke.getDashVisible()==0) then (yes) 
:g2d.setStroke(new BasicStroke(thickness));;
else (no)
:final floatdash1=(float)stroke.getDashVisible();;
:final floatdash2=(float)stroke.getDashSpace();;
:final float[]style={dash1,dash2};;
:g2d.setStroke(new BasicStroke(thickness,
BasicStroke.CAP_BUTT,BasicStroke.JOIN_MITER,
10.0f,style,0));;
endif 
end
@enduml

