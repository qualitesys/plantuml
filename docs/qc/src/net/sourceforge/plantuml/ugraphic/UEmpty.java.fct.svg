@startuml
!pragma layout smetana
start
note right
constructor UEmpty(double width,double height)
end note
if (width==0) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:this.width=width;;
:this.height=height;;
end
start
note right
constructor UEmpty(XDimension2D dim)
end note
:this(dim.getWidth(),dim.getHeight());;
end
start
note right
double getWidth()
end note
:return width;;
stop
end
start
note right
double getHeight()
end note
:return height;;
stop
end
@enduml

