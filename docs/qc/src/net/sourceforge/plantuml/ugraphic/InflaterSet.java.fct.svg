@startuml
!pragma layout smetana
start
note right
constructor Inflater(double start,double size)
end note
:this.start=start;;
:this.size=size;;
end
start
note right
void addInflater(double start,double size)
end note
:all.add(new Inflater(start,size));;
end
start
note right
double inflate(double v)
end note
:double result=v;;
if (v>in.start) then (yes) 
:result+=in.size;;
endif 
:return result;;
stop
end
@enduml

