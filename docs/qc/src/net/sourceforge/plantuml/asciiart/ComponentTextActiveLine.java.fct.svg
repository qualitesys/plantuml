@startuml
!pragma layout smetana
start
note right
constructor ComponentTextActiveLine(FileFormatfileFormat)
end note
:this.fileFormat=fileFormat;;
end
start
note right
void drawU(UGraphicug,Areaarea,Context2Dcontext)
end note
:final XDimension2DdimensionToUse=area.getDimensionToUse();;
:final UmlCharAreacharArea=((UGraphicTxt)ug)
.getCharArea();;
:final intwidth=(int)dimensionToUse.getWidth();;
:final intheight=(int)dimensionToUse.getHeight();;
if (fileFormat==FileFormat.UTXT) then (yes) 
:charArea.fillRect(' ',0,0,width,height);;
:charArea.drawBoxSimpleUnicode(0,0,width,
height);;
:charArea.drawChar('\u2534',width/2,0);;
:charArea.drawChar('\u252c',width/2,height-1);;
else (no)
:charArea.fillRect('X',0,0,width,height);;
:charArea.drawBoxSimple(0,0,width,height);;
endif 
end
start
note right
doublegetPreferredHeight(StringBounderstringBounder)
end note
:return 0;;
stop
end
start
note right
doublegetPreferredWidth(StringBounderstringBounder)
end note
:return 3;;
stop
end
@enduml

