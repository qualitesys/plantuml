@startuml
!pragma layout smetana
start
note right
constructor ComponentTextGroupingElse(ComponentTypetype,
DisplaystringsToDisplay,FileFormatfileFormat)
end note
:this.type=type;;
:this.stringsToDisplay=stringsToDisplay;;
:this.fileFormat=fileFormat;;
end
start
note right
void drawU(UGraphicug,Areaarea,Context2Dcontext)
end note
:final XDimension2DdimensionToUse=area.getDimensionToUse();;
:final UmlCharAreacharArea=((UGraphicTxt)ug)
.getCharArea();;
:final intwidth=(int)dimensionToUse.getWidth();;
if (stringsToDisplay.get(0)!=null ) then (yes) 
:charArea.drawStringLR("["+stringsToDisplay.get(0)+
"]",2,0);;
endif 
if (fileFormat==FileFormat.UTXT) then (yes) 
:charArea.drawChar('\u2560',0,-1);;
:charArea.drawChar('\u2563',width-1,-1);;
:charArea.drawHLine('\u2550',-1,1,width-1,
'\u2502','\u256a');;
else (no)
:charArea.drawHLine('~',-1,1,width-1);;
endif 
end
start
note right
doublegetPreferredHeight(StringBounderstringBounder)
end note
:return 1;;
stop
end
start
note right
doublegetPreferredWidth(StringBounderstringBounder)
end note
:return 1;;
stop
end
@enduml

