@startuml
!pragma layout smetana
start
note right
constructor ComponentTextGroupingElse(ComponentType type,
Display stringsToDisplay,FileFormat fileFormat)
end note
:this.type=type;;
:this.stringsToDisplay=stringsToDisplay;;
:this.fileFormat=fileFormat;;
end
start
note right
void drawU(UGraphic ug,Area area,Context2D context)
end note
:final XDimension2D dimensionToUse=area.getDimensionToUse();;
:final UmlCharArea charArea=((UGraphicTxt )ug)
.getCharArea();;
:final int width=(int )dimensionToUse.getWidth();;
if (stringsToDisplay.get(0)!=null ) then (yes) 
:charArea.drawStringLR("["+stringsToDisplay.get(0)+
"]",2,0);;
endif 
if (fileFormat==FileFormat.UTXT) then (yes) 
:charArea.drawChar('\u2560',0,-1);;
:charArea.drawChar('\u2563',width-1,-1);;
:charArea.drawHLine('\u2550',-1,1,width-1,
'\u2502','\u256a');;
else (no)
:charArea.drawHLine('~',-1,1,width-1);;
endif 
end
start
note right
double getPreferredHeight(StringBounder stringBounder)
end note
:return 1;;
stop
end
start
note right
double getPreferredWidth(StringBounder stringBounder)
end note
:return 1;;
stop
end
@enduml

