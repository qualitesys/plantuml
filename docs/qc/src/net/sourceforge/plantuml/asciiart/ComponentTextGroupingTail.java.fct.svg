@startuml
!pragma layout smetana
start
note right
constructor ComponentTextGroupingTail(ComponentTypetype,
List<?  extends CharSequence>stringsToDisplay,
FileFormatfileFormat)
end note
:this.type=type;;
:this.stringsToDisplay=stringsToDisplay;;
:this.fileFormat=fileFormat;;
end
start
note right
void drawU(UGraphicug,Areaarea,Context2Dcontext)
end note
:final XDimension2DdimensionToUse=area.getDimensionToUse();;
:final UmlCharAreacharArea=((UGraphicTxt)ug)
.getCharArea();;
:final intwidth=(int)dimensionToUse.getWidth();;
:final intheight=(int)dimensionToUse.getHeight();;
if (fileFormat==FileFormat.UTXT) then (yes) 
:charArea.drawChar('\u255a',0,height-1);;
:charArea.drawChar('\u255d',width-1,height-1);;
endif 
end
start
note right
doublegetPreferredHeight(StringBounderstringBounder)
end note
:return 1;;
stop
end
start
note right
doublegetPreferredWidth(StringBounderstringBounder)
end note
:return 1;;
stop
end
@enduml

