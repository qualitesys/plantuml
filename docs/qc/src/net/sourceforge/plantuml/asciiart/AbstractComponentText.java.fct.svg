@startuml
!pragma layout smetana
start
note right
XDimension2DgetPreferredDimension(StringBounderstringBounder)
end note
:final doublew=getPreferredWidth(stringBounder);;
:final doubleh=getPreferredHeight(stringBounder);;
:return new XDimension2D(w,h);;
stop
end
start
note right
Style[]getUsedStyles()
end note
:throw new UnsupportedOperationException();;
stop
end
start
note right
StyleSignatureBasicgetStyleSignature()
end note
:throw new UnsupportedOperationException();;
stop
end
@enduml

