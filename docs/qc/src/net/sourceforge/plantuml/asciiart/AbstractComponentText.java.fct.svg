@startuml
!pragma layout smetana
start
note right
XDimension2D getPreferredDimension(StringBounder stringBounder)
end note
:final double w=getPreferredWidth(stringBounder);;
:final double h=getPreferredHeight(stringBounder);;
:return new XDimension2D(w,h);;
stop
end
start
note right
Style[] getUsedStyles()
end note
:throw new UnsupportedOperationException();;
stop
end
start
note right
StyleSignatureBasic getStyleSignature()
end note
:throw new UnsupportedOperationException();;
stop
end
@enduml

