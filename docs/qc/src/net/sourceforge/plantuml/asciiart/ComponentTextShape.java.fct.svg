@startuml
!pragma layout smetana
start
note right
constructor ComponentTextShape(ComponentTypetype,
DisplaystringsToDisplay,AsciiShapeshape)
end note
:this.type=type;;
:this.stringsToDisplay=stringsToDisplay;;
:this.shape=shape;;
end
start
note right
void drawU(UGraphicug,Areaarea,Context2Dcontext)
end note
:final XDimension2DdimensionToUse=area.getDimensionToUse();;
:final UmlCharAreacharArea=((UGraphicTxt)ug)
.getCharArea();;
:final intwidth=(int)dimensionToUse.getWidth();;
:final intheight=(int)dimensionToUse.getHeight();;
:charArea.fillRect(' ',0,0,width,height);;
:final intxman=width/2-shape.getWidth()/2+1;;
if (type.name().endsWith("_HEAD")) then (yes) 
:charArea.drawStringsLRSimple(stringsToDisplay.asList(),
1,getHeight());;
:charArea.drawShape(shape,xman,0);;
else (no)
:charArea.drawStringsLRSimple(stringsToDisplay.asList(),
1,0);;
:charArea.drawShape(shape,xman,1);;
endif 
end
start
note right
intgetHeight()
end note
:return shape.getHeight();;
stop
end
start
note right
doublegetPreferredHeight(StringBounderstringBounder)
end note
:return StringUtils.getHeight(stringsToDisplay)+
getHeight();;
stop
end
