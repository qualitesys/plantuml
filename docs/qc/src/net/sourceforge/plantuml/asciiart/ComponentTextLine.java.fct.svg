@startuml
!pragma layout smetana
start
note right
constructor ComponentTextLine(ComponentTypetype,
FileFormatfileFormat)
end note
if (fileFormat==FileFormat.UTXT) then (yes) 
:using='\u2502';;
else (no)
:using='|';;
endif 
if (type==ComponentType.DELAY_LINE) then (yes) 
:using='.';;
endif 
end
start
note right
void drawU(UGraphicug,Areaarea,Context2Dcontext)
end note
:final XDimension2DdimensionToUse=area.getDimensionToUse();;
:final UmlCharAreacharArea=((UGraphicTxt)ug)
.getCharArea();;
:final intwidth=(int)dimensionToUse.getWidth();;
:final intheight=(int)dimensionToUse.getHeight();;
:charArea.drawVLine(using,(width-1)/2,MAGIC_NUMBER,
height);;
end
start
note right
doublegetPreferredHeight(StringBounderstringBounder)
end note
:return 0;;
stop
end
start
note right
doublegetPreferredWidth(StringBounderstringBounder)
end note
:return 3;;
stop
end
@enduml

