@startuml
!pragma layout smetana
start
note right
constructor ComponentTextLine(ComponentType type,
FileFormat fileFormat)
end note
if (fileFormat==FileFormat.UTXT) then (yes) 
:using='\u2502';;
else (no)
:using='|';;
endif 
if (type==ComponentType.DELAY_LINE) then (yes) 
:using='.';;
endif 
end
start
note right
void drawU(UGraphic ug,Area area,Context2D context)
end note
:final XDimension2D dimensionToUse=area.getDimensionToUse();;
:final UmlCharArea charArea=((UGraphicTxt )ug)
.getCharArea();;
:final int width=(int )dimensionToUse.getWidth();;
:final int height=(int )dimensionToUse.getHeight();;
:charArea.drawVLine(using,(width-1)/2,MAGIC_NUMBER,
height);;
end
start
note right
double getPreferredHeight(StringBounder stringBounder)
end note
:return 0;;
stop
end
start
note right
double getPreferredWidth(StringBounder stringBounder)
end note
:return 3;;
stop
end
@enduml

