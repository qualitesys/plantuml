@startuml
!pragma layout smetana
start
note right
constructor ComponentTextDelay(ComponentTypetype,
DisplaystringsToDisplay,FileFormatfileFormat)
end note
:this.stringsToDisplay=stringsToDisplay;;
end
start
note right
void drawU(UGraphicug,Areaarea,Context2Dcontext)
end note
:final XDimension2DdimensionToUse=area.getDimensionToUse();;
:final UmlCharAreacharArea=((UGraphicTxt)ug)
.getCharArea();;
:final intwidth=(int)dimensionToUse.getWidth();;
:final inttextWidth=StringUtils.getWcWidth(stringsToDisplay);;
:final inttextPos=(width-textWidth)/2;;
if (stringsToDisplay.isWhite()) then (yes) 
:return ;;
stop
endif 
:final Stringdesc=stringsToDisplay.get(0)
.toString();;
:charArea.drawStringLR(desc,textPos,1);;
end
start
note right
doublegetPreferredHeight(StringBounderstringBounder)
end note
:return StringUtils.getHeight(stringsToDisplay)+4;;
stop
end
start
note right
doublegetPreferredWidth(StringBounderstringBounder)
end note
:return StringUtils.getWcWidth(stringsToDisplay)+2;;
stop
end
@enduml

