@startuml
!pragma layout smetana
start
note right
constructor ComponentTextDelay(ComponentType type,
Display stringsToDisplay,FileFormat fileFormat)
end note
:this.stringsToDisplay=stringsToDisplay;;
end
start
note right
void drawU(UGraphic ug,Area area,Context2D context)
end note
:final XDimension2D dimensionToUse=area.getDimensionToUse();;
:final UmlCharArea charArea=((UGraphicTxt )ug)
.getCharArea();;
:final int width=(int )dimensionToUse.getWidth();;
:final int textWidth=StringUtils.getWcWidth(stringsToDisplay);;
:final int textPos=(width-textWidth)/2;;
if (stringsToDisplay.isWhite()) then (yes) 
:return ;;
stop
endif 
:final String desc=stringsToDisplay.get(0)
.toString();;
:charArea.drawStringLR(desc,textPos,1);;
end
start
note right
double getPreferredHeight(StringBounder stringBounder)
end note
:return StringUtils.getHeight(stringsToDisplay)+4;;
stop
end
start
note right
double getPreferredWidth(StringBounder stringBounder)
end note
:return StringUtils.getWcWidth(stringsToDisplay)+2;;
stop
end
@enduml

