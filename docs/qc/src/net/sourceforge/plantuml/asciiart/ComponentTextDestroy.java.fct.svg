@startuml
!pragma layout smetana
start
note right
constructor ComponentTextDestroy()
end note
end
start
note right
void drawU(UGraphic ug,Area area,Context2D context)
end note
:final UmlCharArea charArea=((UGraphicTxt )ug)
.getCharArea();;
:charArea.drawStringLR("/",2,0);;
:charArea.drawStringLR("\\",0,0);;
:charArea.drawStringLR("X",1,1);;
:charArea.drawStringLR("\\",2,2);;
:charArea.drawStringLR("/",0,2);;
end
start
note right
double getPreferredHeight(StringBounder stringBounder)
end note
:return 5;;
stop
end
start
note right
double getPreferredWidth(StringBounder stringBounder)
end note
:return 3;;
stop
end
@enduml

