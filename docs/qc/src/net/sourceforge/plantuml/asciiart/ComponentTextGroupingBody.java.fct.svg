@startuml
!pragma layout smetana
start
note right
constructor ComponentTextGroupingBody(ComponentType type,
List<?extendsCharSequence> stringsToDisplay,
FileFormat fileFormat)
end note
:this.type=type;;
:this.stringsToDisplay=stringsToDisplay;;
:this.fileFormat=fileFormat;;
end
start
note right
void drawU(UGraphic ug,Area area,Context2D context)
end note
:final XDimension2D dimensionToUse=area.getDimensionToUse();;
:final UmlCharArea charArea=((UGraphicTxt )ug)
.getCharArea();;
:final int width=(int )dimensionToUse.getWidth();;
:final int height=(int )dimensionToUse.getHeight();;
if (fileFormat==FileFormat.UTXT) then (yes) 
:charArea.drawVLine('\u2551',0,0,height);;
:charArea.drawVLine('\u2551',width-1,0,height);;
:charArea.drawHLine('\u2550',height-1,1,width-1,
'\u2502','\u256a');;
:charArea.drawChar('\u2560',0,height-1);;
:charArea.drawChar('\u2563',width-1,height-1);;
else (no)
:charArea.drawVLine('!',0,0,height);;
:charArea.drawVLine('!',width-1,0,height);;
:charArea.drawHLine('~',height-1,1,width-1);;
endif 
end
start
note right
double getPreferredHeight(StringBounder stringBounder)
end note
:return 1;;
stop
end
start
note right
double getPreferredWidth(StringBounder stringBounder)
end note
:return 1;;
stop
end
@enduml

