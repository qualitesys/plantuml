76,564.1914,180,574.1914,184,564.1914,180,568.1914" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="180" x2="180" y1="783.0469" y2="803.0469"/><polygon fill="#181818" points="176,793.0469,180,803.0469,184,793.0469,180,797.0469" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[5c56e01c81bfb41e4d4968ff8ac95245]
@startuml
!pragma layout smetana
start
note right
constructor FileWatcher(Set<File> files)
end note
if (files.size()==0) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:modified2.put(f,f.lastModified());;
end
start
note right
String toString()
end note
:return modified2.toString();;
stop
end
start
note right
boolean hasChanged()
end note
:final long nowModified=ent.getKey().lastModified();;
if (ent.getValue().longValue()!=nowModified) then (yes) 
:return true;;
stop
endif 
:return false;;
stop
end
@enduml

