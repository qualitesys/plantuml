4.1914,178,574.1914,182,564.1914,178,568.1914" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="178" x2="178" y1="783.0469" y2="803.0469"/><polygon fill="#181818" points="174,793.0469,178,803.0469,182,793.0469,178,797.0469" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[b23fbda8695c3ab043a05cc4f7ae27ba]
@startuml
!pragma layout smetana
start
note right
constructor FileWatcher(Set<File>files)
end note
if (files.size()==0) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:modified2.put(f,f.lastModified());;
end
start
note right
StringtoString()
end note
:return modified2.toString();;
stop
end
start
note right
booleanhasChanged()
end note
:final longnowModified=ent.getKey().lastModified();;
if (ent.getValue().longValue()!=nowModified) then (yes) 
:return true;;
stop
endif 
:return false;;
stop
end
@enduml

