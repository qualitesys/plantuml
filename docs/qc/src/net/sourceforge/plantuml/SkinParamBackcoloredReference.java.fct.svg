@startuml
!pragma layout smetana
start
note right
constructor SkinParamBackcoloredReference(ISkinParamskinParam,
HColorsequenceReferenceHeaderBackground,HColorsequenceReferenceBackground)
end note
:super (skinParam);;
:this.sequenceReferenceBackground=sequenceReferenceBackground;;
:this.sequenceReferenceHeaderBackground=sequenceReferenceHeaderBackground;;
end
start
note right
HColorgetHtmlColor(ColorParamparam,Stereotypestereotype,
booleanclickable)
end note
if (param==ColorParam.sequenceReferenceHeaderBackground&&sequenceReferenceHeaderBackground!=null ) then (yes) 
:return sequenceReferenceHeaderBackground;;
stop
endif 
if (param==ColorParam.sequenceReferenceBackground&&sequenceReferenceBackground!=null ) then (yes) 
:return sequenceReferenceBackground;;
stop
endif 
:return super .getHtmlColor(param,stereotype,
clickable);;
stop
end
@enduml

