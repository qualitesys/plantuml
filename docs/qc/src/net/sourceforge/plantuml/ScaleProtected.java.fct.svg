@startuml
!pragma layout smetana
start
note right
doublegetScale(doublewidth,doubleheight)
end note
:final doubleresult=getScaleInternal(width,
height);;
if (result<=0) then (yes) 
:return 1;;
stop
endif 
if (result>4) then (yes) 
:return 4;;
stop
endif 
:return result;;
stop
end
@enduml

