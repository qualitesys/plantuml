@startuml
!pragma layout smetana
start
note right
double getScale(double width,double height)
end note
:final double result=getScaleInternal(width,
height);;
if (result<=0) then (yes) 
:return 1;;
stop
endif 
if (result>4) then (yes) 
:return 4;;
stop
endif 
:return result;;
stop
end
@enduml

