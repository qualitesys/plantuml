"209" y1="639.1602" y2="659.1602"/><polygon fill="#181818" points="205,649.1602,209,659.1602,213,649.1602,209,653.1602" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="209" x2="209" y1="40.1328" y2="70.2656"/><polygon fill="#181818" points="205,60.2656,209,70.2656,213,60.2656,209,64.2656" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="209" x2="209" y1="693.1289" y2="713.1289"/><polygon fill="#181818" points="205,703.1289,209,713.1289,213,703.1289,209,707.1289" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[1406c480e75ff87f46d54467125ed5d4]
@startuml
!pragma layout smetana
start
note right
BufferedImage exportFlashcode(String s,Color fore,
Color back)
end note
if (lock.tryLock()) then (yes) 
switch (try/catch block)
case (try)
:final QRCodeWriter writer=new QRCodeWriter();;
:final Hashtable hints=new Hashtable();;
:hints.put(EncodeHintType.ERROR_CORRECTION,
ErrorCorrectionLevel.L);;
:hints.put(EncodeHintType.CHARACTER_SET,"UTF8");;
:final int multiple=1;;
:final BitMatrix bit=writer.encode(s,BarcodeFormat.QR_CODE,
multiple,hints);;
:return MatrixToImageWriter.toBufferedImage(bit,
fore.getRGB()|0xFF000000,back.getRGB()|0xFF000000);;
stop
endswitch
endif 
:return null ;;
stop
end
@enduml

