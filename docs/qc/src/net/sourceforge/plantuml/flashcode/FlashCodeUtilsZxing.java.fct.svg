="639.1602" y2="659.1602"/><polygon fill="#181818" points="203,649.1602,207,659.1602,211,649.1602,207,653.1602" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="207" x2="207" y1="40.1328" y2="70.2656"/><polygon fill="#181818" points="203,60.2656,207,70.2656,211,60.2656,207,64.2656" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="207" x2="207" y1="693.1289" y2="713.1289"/><polygon fill="#181818" points="203,703.1289,207,713.1289,211,703.1289,207,707.1289" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[348b829b61dfcc5c1e7c9e19a63dc101]
@startuml
!pragma layout smetana
start
note right
BufferedImageexportFlashcode(Strings,Colorfore,
Colorback)
end note
if (lock.tryLock()) then (yes) 
switch (try/catch block)
case (try)
:final QRCodeWriterwriter=new QRCodeWriter();;
:final Hashtablehints=new Hashtable();;
:hints.put(EncodeHintType.ERROR_CORRECTION,
ErrorCorrectionLevel.L);;
:hints.put(EncodeHintType.CHARACTER_SET,"UTF8");;
:final intmultiple=1;;
:final BitMatrixbit=writer.encode(s,BarcodeFormat.QR_CODE,
multiple,hints);;
:return MatrixToImageWriter.toBufferedImage(bit,
fore.getRGB()|0xFF000000,back.getRGB()|0xFF000000);;
stop
endswitch
endif 
:return null ;;
stop
end
@enduml

