@startuml
!pragma layout smetana
start
note right
FlashCodeUtils getFlashCodeUtils()
end note
:final String name="net.sourceforge.plantuml.flashcode.FlashCodeUtilsZxing";;
switch (try/catch block)
case (try)
:final Class cl=Class.forName(name);;
:return (FlashCodeUtils )cl.newInstance();;
stop
case (catch (ClassNotFoundException e))
:return new FlashCodeUtilsNone();;
stop
case (catch (InstantiationException e))
:return new FlashCodeUtilsNone();;
stop
case (catch (IllegalAccessException e))
:return new FlashCodeUtilsNone();;
stop
endswitch
end
@enduml

