start
note right
void setProperty(Objectkey,Objectvalue)
end note
if (value instanceof EnumSet) then (yes) 
:EnumSetresult=null ;;
:final ElkObjectProxyelk=(ElkObjectProxy)foo;;
if (result==null ) then (yes) 
:result=EnumSet.noneOf((Class)elk.getClass());;
endif 
:result.add(elk);;
:Reflect.call2(obj,"setProperty",key,result);;
else if (value instanceof ElkObjectProxy) then (yes) 
:final Objectelk=((ElkObjectProxy)value).getTrueObject();;
:Reflect.call2(obj,"setProperty",key,elk);;
else (no)
:Reflect.call2(obj,"setProperty",key,value);;
