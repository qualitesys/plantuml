end note
:return this.obj.hashCode();;
stop
end
start
note right
boolean equals(Object other)
end note
:return this.obj.equals(((ElkWithProperty )other)
.obj);;
stop
end
start
note right
void setProperty(Object key,Object value)
end note
if (value instanceof EnumSet ) then (yes) 
:EnumSet result=null ;;
:final ElkObjectProxy elk=(ElkObjectProxy )foo;;
if (result==null ) then (yes) 
:result=EnumSet.noneOf((Class )elk.getClass());;
endif 
:result.add(elk);;
:Reflect.call2(obj,"setProperty",key,result);;
else if (value instanceof ElkObjectProxy ) then (yes) 
:final Object elk=((ElkObjectProxy )value)
.getTrueObject();;
:Reflect.call2(obj,"setProperty",key,elk);;
else (no)
:Reflect.call2(obj,"setProperty",key,value);;
endif 
end
