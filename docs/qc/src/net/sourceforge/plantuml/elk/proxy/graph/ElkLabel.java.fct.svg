@startuml
!pragma layout smetana
start
note right
constructor ElkLabel(Objectobj)
end note
:super (obj);;
end
start
note right
void setText(Stringtext)
end note
:Reflect.call(obj,"setText",text);;
end
start
note right
void setDimensions(doublewidth,doubleheight)
end note
:Reflect.call2(obj,"setDimensions",width,
height);;
end
start
note right
StringgetText()
end note
:return (String)Reflect.call(obj,"getText");;
stop
end
start
note right
doublegetX()
end note
:return (Double)Reflect.call(obj,"getX");;
stop
end
start
note right
doublegetY()
end note
:return (Double)Reflect.call(obj,"getY");;
stop
end
@enduml

