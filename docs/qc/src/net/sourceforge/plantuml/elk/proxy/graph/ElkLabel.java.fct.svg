@startuml
!pragma layout smetana
start
note right
constructor ElkLabel(Object obj)
end note
:super (obj);;
end
start
note right
void setText(String text)
end note
:Reflect.call(obj,"setText",text);;
end
start
note right
void setDimensions(double width,double height)
end note
:Reflect.call2(obj,"setDimensions",width,
height);;
end
start
note right
String getText()
end note
:return (String )Reflect.call(obj,"getText");;
stop
end
start
note right
double getX()
end note
:return (Double )Reflect.call(obj,"getX");;
stop
end
start
note right
double getY()
end note
:return (Double )Reflect.call(obj,"getY");;
stop
end
@enduml

