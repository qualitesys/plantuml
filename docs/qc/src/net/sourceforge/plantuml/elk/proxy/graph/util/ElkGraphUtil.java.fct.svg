@startuml
!pragma layout smetana
start
note right
ElkLabel createLabel(ElkEdge edge)
end note
:return new ElkLabel(Reflect.callStatic2("org.eclipse.elk.graph.util.ElkGraphUtil",
"createLabel",edge.obj));;
stop
end
start
note right
ElkLabel createLabel(ElkNode node)
end note
:return new ElkLabel(Reflect.callStatic2("org.eclipse.elk.graph.util.ElkGraphUtil",
"createLabel",node.obj));;
stop
end
start
note right
ElkNode createNode(ElkNode root)
end note
:return new ElkNode(Reflect.callStatic2("org.eclipse.elk.graph.util.ElkGraphUtil",
"createNode",root.obj));;
stop
end
start
note right
ElkEdge createSimpleEdge(ElkNode node1,ElkNode node2)
end note
:return new ElkEdge(Reflect.callStatic2("org.eclipse.elk.graph.util.ElkGraphUtil",
"createSimpleEdge",node1.obj,node2.obj));;
stop
end
start
note right
ElkNode createGraph()
end note
:return new ElkNode(Reflect.callStatic("org.eclipse.elk.graph.util.ElkGraphUtil",
"createGraph"));;
stop
end
@enduml

