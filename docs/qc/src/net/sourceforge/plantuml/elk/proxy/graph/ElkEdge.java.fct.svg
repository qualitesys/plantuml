@startuml
!pragma layout smetana
start
note right
constructor ElkEdge(Objectobj)
end note
:super (obj);;
end
start
note right
ElkNodegetContainingNode()
end note
:return new ElkNode(Reflect.call(obj,"getContainingNode"));;
stop
end
start
note right
Collection<ElkLabel>getLabels()
end note
:final List<ElkLabel>result=new ArrayList<>();;
:Collectioninternal=(Collection)Reflect.call(obj,
"getLabels");;
:result.add(new ElkLabel(element));;
:return result;;
stop
end
start
note right
List<ElkEdgeSection>getSections()
end note
:final List<ElkEdgeSection>result=new ArrayList<>();;
:Collectioninternal=(Collection)Reflect.call(obj,
"getSections");;
:result.add(new ElkEdgeSection(element));;
:return result;;
stop
end
start
note right
booleanisHierarchical()
end note
:throw new UnsupportedOperationException();;
stop
end
