@startuml
!pragma layout smetana
start
note right
constructor CounterOutputStream(OutputStream os)
end note
:this.os=os;;
end
start
note right
void write(int b)
end note
:os.write(b);;
:length++;;
end
start
note right
void write(byte[] b)
end note
:os.write(b);;
:length+=b.length;;
end
start
note right
void write(byte[] b,int off,int len)
end note
:os.write(b,off,len);;
:length+=len;;
end
start
note right
int getLength()
end note
:return length;;
stop
end
start
note right
void flush()
end note
:os.flush();;
end
start
note right
void close()
end note
:os.close();;
end
@enduml

