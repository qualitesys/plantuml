@startuml
!pragma layout smetana
start
note right
DiagramDescription getDescription()
end note
:return new DiagramDescription("(Help)");;
stop
end
start
note right
constructor Help(UmlSource source)
end note
:super (source,UmlDiagramType.HELP,null );;
end
start
note right
ImageBuilder createImageBuilder(FileFormatOption fileFormatOption)
end note
:return super .createImageBuilder(fileFormatOption)
.annotations(false);;
stop
end
start
note right
ImageData exportDiagramInternal(OutputStream os,
int index,FileFormatOption fileFormat)
end note
:final Display display=Display.create(lines);;
:final UFont font=UFont.serif(16);;
:final FontConfiguration fontConfiguration=FontConfiguration.blackBlueTrue(font);;
:final Sheet sheet=Parser.build(fontConfiguration,
HorizontalAlignment.LEFT,getSkinParam(),CreoleMode.FULL).createSheet(display);;
:final SheetBlock1 sheetBlock=new SheetBlock1(sheet,
LineBreakStrategy.NONE,0);;
:return createImageBuilder(fileFormat).drawable(sheetBlock)
.write(os);;
stop
end
start
note right
void add(CharSequence line)
end note
:this.lines.add(line);;
end
start
note right
ClockwiseTopRightBottomLeft getDefaultMargins()
end note
:return ClockwiseTopRightBottomLeft.same(0);;
stop
end
@enduml

