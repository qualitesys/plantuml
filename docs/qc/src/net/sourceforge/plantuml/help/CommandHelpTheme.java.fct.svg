@startuml
!pragma layout smetana
start
note right
constructor CommandHelpTheme()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandHelpTheme.class .getName(),
RegexLeaf.start(),new RegexLeaf("help"),RegexLeaf.spaceOneOrMore(),
new RegexLeaf("themes?"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(Helpdiagram,
LineLocationlocation,RegexResultarg)
end note
:diagram.add("<b>Help on themes");;
:diagram.add(" ");;
:diagram.add("The code of this command is located in <i>net.sourceforge.plantuml.help</i> package.");;
:diagram.add("You may improve it on <i>https://github.com/plantuml/plantuml/tree/master/src/net/sourceforge/plantuml/help</i>");;
:diagram.add(" ");;
:diagram.add(" The possible themes are :");;
switch (try/catch block)
case (try)
:diagram.add("* "+theme);;
case (catch (IOExceptione))
:final Stringmessage="Unexpected error listing themes: "+
e.getMessage();;
:Log.error(message);;
:Logme.error(e);;
:return CommandExecutionResult.error(message);;
stop
endswitch
:return CommandExecutionResult.ok();;
stop
end
@enduml

