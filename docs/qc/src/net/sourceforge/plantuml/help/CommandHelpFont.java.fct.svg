@startuml
!pragma layout smetana
start
note right
constructor CommandHelpFont()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandHelpFont.class .getName(),
RegexLeaf.start(),new RegexLeaf("help"),RegexLeaf.spaceOneOrMore(),
new RegexLeaf("fonts?"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(Help diagram,
LineLocation location,RegexResult arg)
end note
:diagram.add("<b>Help on font");;
:diagram.add(" ");;
:diagram.add("The code of this command is located in <i>net.sourceforge.plantuml.help</i> package.");;
:diagram.add("You may improve it on <i>https://github.com/plantuml/plantuml/tree/master/src/net/sourceforge/plantuml/help</i>");;
:diagram.add(" ");;
:diagram.add(" The possible font on your system are :");;
:final String name[]=GraphicsEnvironment.getLocalGraphicsEnvironment()
.getAvailableFontFamilyNames();;
:diagram.add("* "+n);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

