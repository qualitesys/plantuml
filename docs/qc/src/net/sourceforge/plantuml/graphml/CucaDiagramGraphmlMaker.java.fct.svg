@startuml
!pragma layout smetana
start
note right
constructor CucaDiagramGraphmlMaker(CucaDiagramdiagram)
end note
:this.diagram=diagram;;
end
start
note right
StringgetModel(UmlDiagramclassDiagram)
end note
:return "model1";;
stop
end
start
note right
void createFiles(OutputStreamfos)
end note
switch (try/catch block)
case (try)
:final XmlDiagramTransformerxmi;;
if (diagram instanceof DescriptionDiagram) then (yes) 
:xmi=new GraphmlDescriptionDiagram((DescriptionDiagram)diagram);;
else (no)
:throw new UnsupportedOperationException();;
stop
endif 
:xmi.transformerXml(fos);;
case (catch (ParserConfigurationExceptione))
:Log.error(e.toString());;
:Logme.error(e);;
:throw new IOException(e.toString());;
stop
case (catch (TransformerExceptione))
:Log.error(e.toString());;
:Logme.error(e);;
:throw new IOException(e.toString());;
stop
endswitch
end
@enduml

