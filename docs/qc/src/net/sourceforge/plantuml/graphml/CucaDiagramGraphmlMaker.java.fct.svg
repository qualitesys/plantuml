@startuml
!pragma layout smetana
start
note right
constructor CucaDiagramGraphmlMaker(CucaDiagram diagram)
end note
:this.diagram=diagram;;
end
start
note right
String getModel(UmlDiagram classDiagram)
end note
:return "model1";;
stop
end
start
note right
void createFiles(OutputStream fos)
end note
switch (try/catch block)
case (try)
:final XmlDiagramTransformer xmi;;
if (diagram instanceof DescriptionDiagram ) then (yes) 
:xmi=new GraphmlDescriptionDiagram((DescriptionDiagram )diagram);;
else (no)
:throw new UnsupportedOperationException();;
stop
endif 
:xmi.transformerXml(fos);;
case (catch (ParserConfigurationException e))
:Log.error(e.toString());;
:Logme.error(e);;
:throw new IOException(e.toString());;
stop
case (catch (TransformerException e))
:Log.error(e.toString());;
:Logme.error(e);;
:throw new IOException(e.toString());;
stop
endswitch
end
@enduml

