start
note right
CommandExecutionResult executeArg(WireDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final String name=arg.get("NAME",0);;
:final String stringColor=arg.get("COLOR",0);;
:HColor color=null ;;
