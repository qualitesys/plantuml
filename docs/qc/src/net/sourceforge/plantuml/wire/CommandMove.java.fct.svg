@startuml
!pragma layout smetana
start
note right
constructor CommandMove()
end note
:super (false,getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandMove.class .getName(),
RegexLeaf.start(),new RegexLeaf("INDENT","([\\s\\t]*)"),new RegexLeaf("move"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("\\("),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("X","(-?\\d+
)"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf(","),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("Y","(-?\\d+
)"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("\\)"),
RegexLeaf.spaceZeroOrMore(),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(WireDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final String indent=arg.get("INDENT",0);;
:final double x=Double.parseDouble(arg.get("X",
0));;
:final double y=Double.parseDouble(arg.get("Y",
0));;
:return diagram.wmove(indent,x,y);;
stop
