@startuml
!pragma layout smetana
start
note right
XPoint2D getPosition()
end note
:return position.getPosition();;
stop
end
start
note right
void move(double dx,double dy)
end note
:position=position.compose(new UTranslate(dx,
dy));;
end
@enduml

