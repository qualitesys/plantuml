@startuml
!pragma layout smetana
start
note right
constructor CommandPrint()
end note
:super (false,getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandPrint.class .getName(),
RegexLeaf.start(),new RegexLeaf("INDENT",
"([\\s\\t]*)"),new RegexLeaf("print"),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("\\("),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("[%g]"),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("TEXT","(.*)"),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("[%g]"),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("\\)"),RegexLeaf.spaceZeroOrMore(),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(WireDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final String indent=arg.get("INDENT",0);;
:final String text=arg.get("TEXT",0);;
:return diagram.print(indent,text);;
stop
end
@enduml

