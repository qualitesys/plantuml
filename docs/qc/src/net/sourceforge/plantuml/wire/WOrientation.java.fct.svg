@startuml
!pragma layout smetana
start
note right
WOrientation from(String style)
end note
if (style.contains("==")||style.contains("- -")) then (yes) 
:return WOrientation.VERTICAL;;
stop
endif 
:return HORIZONTAL;;
stop
end
@enduml

