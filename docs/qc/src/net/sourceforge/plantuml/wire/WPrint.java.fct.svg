181818;stroke-width:1.0;"/><!--MD5=[b72b9de50839daf4a2ab78c22dfd0050]
@startuml
!pragma layout smetana
start
note right
constructor WPrint(ISkinParam skinParam,UTranslate position,
HColor color,Display label)
end note
:this.position=position;;
:this.skinParam=skinParam;;
:this.label=label;;
:this.color=color==null ? getBlack():color;;
end
start
note right
HColor getBlack()
end note
:return HColors.BLACK.withDark(HColors.WHITE);;
stop
end
start
note right
TextBlock getTextBlock()
end note
:final FontConfiguration fontConfiguration=FontConfiguration.blackBlueTrue(UFont.sansSerif(10))
.changeColor(color);;
:return label.create(fontConfiguration,HorizontalAlignment.LEFT,
skinParam);;
stop
end
start
note right
UChange getPosition()
end note
:return position;;
stop
end
start
note right
void drawMe(UGraphic ug)
end note
:getTextBlock().drawU(ug);;
end
start
note right
double getHeight(StringBounder stringBounder)
end note
:return getTextBlock().calculateDimension(stringBounder)
.getHeight();;
stop
end
@enduml

