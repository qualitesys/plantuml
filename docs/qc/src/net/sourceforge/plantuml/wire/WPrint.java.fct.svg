ke-width:1.0;"/><!--MD5=[eef8a388572cc88d79ae56ff4f0510fb]
@startuml
!pragma layout smetana
start
note right
constructor WPrint(ISkinParamskinParam,UTranslateposition,
HColorcolor,Displaylabel)
end note
:this.position=position;;
:this.skinParam=skinParam;;
:this.label=label;;
:this.color=color==null ? getBlack():color;;
end
start
note right
HColorgetBlack()
end note
:return HColors.BLACK.withDark(HColors.WHITE);;
stop
end
start
note right
TextBlockgetTextBlock()
end note
:final FontConfigurationfontConfiguration=FontConfiguration.blackBlueTrue(UFont.sansSerif(10))
.changeColor(color);;
:return label.create(fontConfiguration,HorizontalAlignment.LEFT,
skinParam);;
stop
end
start
note right
UChangegetPosition()
end note
:return position;;
stop
end
start
note right
void drawMe(UGraphicug)
end note
:getTextBlock().drawU(ug);;
end
start
note right
doublegetHeight(StringBounderstringBounder)
end note
:return getTextBlock().calculateDimension(stringBounder)
.getHeight();;
stop
end
@enduml

