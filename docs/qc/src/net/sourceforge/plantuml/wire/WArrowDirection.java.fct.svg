@startuml
!pragma layout smetana
start
note right
WArrowDirectionfrom(Stringtype)
end note
if (type.contains("<")&&type.contains(">")) then (yes) 
:return BOTH;;
stop
endif 
if (type.contains(">")) then (yes) 
:return NORMAL;;
stop
endif 
if (type.contains("<")) then (yes) 
:return REVERSE;;
stop
endif 
:return NONE;;
stop
end
@enduml

