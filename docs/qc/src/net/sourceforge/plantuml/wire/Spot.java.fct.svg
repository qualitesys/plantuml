@startuml
!pragma layout smetana
start
note right
constructor Spot(WBlock block,HColor color,
String x,String y)
end note
:this.block=block;;
:this.color=color==null ? HColors.RED:color;;
:this.x=x==null ? String.valueOf("0"):x;;
:this.y=y==null ? String.valueOf("0"):y;;
end
start
note right
void drawMe(UGraphic ug)
end note
:final UTranslate pos=block.getAbsolutePosition(x,y);;
:final UTranslate tr=pos.compose(new UTranslate(-2,
-2));;
:final UShape circle=new UEllipse(5,5);;
:ug=ug.apply(color).apply(color.bg());;
:ug.apply(tr).draw(circle);;
end
@enduml

