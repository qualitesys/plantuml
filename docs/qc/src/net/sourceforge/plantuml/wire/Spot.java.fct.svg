@startuml
!pragma layout smetana
start
note right
constructor Spot(WBlockblock,HColorcolor,
Stringx,Stringy)
end note
:this.block=block;;
:this.color=color==null ? HColors.RED:color;;
:this.x=x==null ? String.valueOf("0"):x;;
:this.y=y==null ? String.valueOf("0"):y;;
end
start
note right
void drawMe(UGraphicug)
end note
:final UTranslatepos=block.getAbsolutePosition(x,y);;
:final UTranslatetr=pos.compose(new UTranslate(-2,
-2));;
:final UShapecircle=new UEllipse(5,5);;
:ug=ug.apply(color).apply(color.bg());;
:ug.apply(tr).draw(circle);;
end
@enduml

