@startuml
!pragma layout smetana
start
note right
constructor PlainDiagram(UmlSource source)
end note
:super (source);;
end
start
note right
ImageBuilder createImageBuilder(FileFormatOption fileFormatOption)
end note
:return super .createImageBuilder(fileFormatOption)
.margin(getDefaultMargins()).metadata(fileFormatOption.isWithMetadata()? getMetadata():null ).seed(seed());;
stop
end
start
note right
ImageData exportDiagramNow(OutputStream os,
int index,FileFormatOption fileFormatOption)
end note
:return createImageBuilder(fileFormatOption)
.drawable(getRootDrawable(fileFormatOption)).write(os);;
stop
end
@enduml

