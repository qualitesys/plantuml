@startuml
!pragma layout smetana
start
note right
PSystemOregoninitDiagram(UmlSourcesource,
StringstartLine)
end note
:return null ;;
stop
end
start
note right
PSystemOregonexecuteLine(UmlSourcesource,
PSystemOregonsystem,Stringline)
end note
if (system==null &&line.equalsIgnoreCase("run oregon trail")) then (yes) 
:return new PSystemOregon(source);;
stop
endif 
if (system==null ) then (yes) 
:return null ;;
stop
endif 
:system.add(line);;
:return system;;
stop
end
@enduml

