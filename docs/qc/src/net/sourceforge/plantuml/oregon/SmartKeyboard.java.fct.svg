ints="199,1093.7539,203,1103.7539,207,1093.7539,203,1097.7539" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="203" x2="203" y1="1137.7227" y2="1157.7227"/><polygon fill="#181818" points="199,1147.7227,203,1157.7227,207,1147.7227,203,1151.7227" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[2dde0efa420fcc7b45917607717ae332]
@startuml
!pragma layout smetana
start
note right
constructor SmartKeyboard(Keyboard keyboard)
end note
:this.keyboard=keyboard;;
end
start
note right
String input(Screen screen)
end note
:final String s=keyboard.input();;
:history.add(s);;
:screen.print("<i>? "+s);;
:return s;;
stop
end
start
note right
int inputInt(Screen screen)
end note
:final String s=input(screen);;
if (s.matches("\\d+")==false) then (yes) 
:screen.print("Please enter a valid number instead of "+s);;
:throw new NoInputException();;
stop
endif 
:return Integer.parseInt(s);;
stop
end
start
note right
boolean hasMore()
end note
:return keyboard.hasMore();;
stop
end
start
note right
List<String> getHistory()
end note
:return Collections.unmodifiableList(history);;
stop
end
@enduml

