@startuml
!pragma layout smetana
:dec[i]=-1;;
:final int enc=m[i];;
:dec[enc]=i;;
if (dec[n]!=-1) then (yes) 
:throw new IllegalStateException();;
stop
endif 
:dec[n]=i+1000;;
start
note right
int encode(int i)
end note
:return m[i];;
stop
end
start
note right
int decode(int v)
end note
:return dec[v];;
stop
end
@enduml

