@startuml
!pragma layout smetana
start
note right
void clear()
end note
:lines.clear();;
end
start
note right
void print(String s)
end note
:lines.add(s);;
end
start
note right
void print()
end note
:lines.add(" ");;
end
start
note right
List<String> getLines()
end note
:return Collections.unmodifiableList(lines);;
stop
end
start
note right
String getLastLine()
end note
:return lines.get(lines.size()-1);;
stop
end
@enduml

