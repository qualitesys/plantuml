@startuml
!pragma layout smetana
start
note right
constructor KeyboardList(String ... inputs)
end note
:this(Arrays.asList(inputs));;
end
start
note right
constructor KeyboardList(Collection<String> inputs)
end note
:data=inputs.iterator();;
end
start
note right
String input()
end note
if (data.hasNext()) then (yes) 
:return data.next();;
stop
endif 
:throw new NoInputException();;
stop
end
start
note right
boolean hasMore()
end note
:return data.hasNext();;
stop
end
@enduml

