end note
:return SName.storage;;
stop
end
start
note right
TextBlock asSmall(TextBlock name,final TextBlock label,
final TextBlock stereotype,final SymbolContext symbolContext,
final HorizontalAlignment stereoAlignment)
end note
:return TextBlockUtils.empty(10,10);;
stop
end
start
note right
TextBlock asBig(final TextBlock title,HorizontalAlignment labelAlignment,
final TextBlock stereotype,final double width,
final double height,final SymbolContext symbolContext,
final HorizontalAlignment stereoAlignment)
end note
:return new AbstractTextBlock(){public void drawU(UGraphic ug){}public XDimension2D calculateDimension(StringBounder stringBounder){return new XDimension2D(width,
height);}};;
stop
end
@enduml

