@startuml
!pragma layout smetana
start
note right
constructor TileImage(BufferedImageimage,
ImgValignvalign,intvspace)
end note
:this.image=Objects.requireNonNull(image);;
:this.vspace=vspace;;
end
start
note right
XDimension2DcalculateDimension(StringBounderstringBounder)
end note
:return new XDimension2D(image.getWidth(),image.getHeight()+
2*vspace);;
stop
end
start
note right
void drawU(UGraphicug)
end note
:ug.apply(UTranslate.dy(vspace)).draw(new UImage(new PixelImage(image,
AffineTransformType.TYPE_BILINEAR)));;
end
@enduml

