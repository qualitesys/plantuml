:Objects.requireNonNull(stereotype);;
:final TextBlock stickman=getDrawing(symbolContext);;
:return new AbstractTextBlock(){public void drawU(UGraphic ug){final StringBounder stringBounder=ug.getStringBounder();
:final XDimension2D dimLabel=label.calculateDimension(stringBounder);
:final XDimension2D dimStereo=stereotype.calculateDimension(stringBounder);
:final XDimension2D dimStickMan=stickman.calculateDimension(stringBounder);
:final XDimension2D dimTotal=calculateDimension(stringBounder);
:final double stickmanX=(dimTotal.getWidth()-dimStickMan.getWidth())/2;final double stickmanY=dimStereo.getHeight();ug=symbolContext.apply(ug);stickman.drawU(ug.apply(new UTranslate(stickmanX,
