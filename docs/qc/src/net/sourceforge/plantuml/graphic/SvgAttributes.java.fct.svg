@startuml
!pragma layout smetana
start
note right
constructor SvgAttributes()
end note
end
start
note right
constructor SvgAttributes(SvgAttributesother)
end note
:this.attributes.putAll(other.attributes);;
end
start
note right
constructor SvgAttributes(Stringargs)
end note
:final Pattern2p=MyPattern.cmpile("(\\w+)\\s*=\\s*([%g][^%g]*[%g]|(?:\\w+
))");;
:final Matcher2m=p.matcher(args);;
while (m.find())
:attributes.put(m.group(1),StringUtils.eventuallyRemoveStartingAndEndingDoubleQuote(m.group(2)));;
endwhile
end
start
note right
Map<String,String>attributes()
end note
:return Collections.unmodifiableMap(attributes);;
stop
end
start
note right
SvgAttributesadd(Stringkey,Stringvalue)
end note
:final SvgAttributesresult=new SvgAttributes(this);;
:result.attributes.put(key,value);;
:return result;;
stop
end
start
note right
SvgAttributesadd(SvgAttributestoBeAdded)
end note
:final SvgAttributesresult=new SvgAttributes(this);;
:result.attributes.putAll(toBeAdded.attributes);;
:return result;;
stop
