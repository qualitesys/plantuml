@startuml
!pragma layout smetana
start
note right
constructor Margin(doublex1,doublex2,doubley1,
doubley2)
end note
:this.x1=x1;;
:this.x2=x2;;
:this.y1=y1;;
:this.y2=y2;;
end
start
note right
doublegetWidth()
end note
:return x1+x2;;
stop
end
start
note right
doublegetHeight()
end note
:return y1+y2;;
stop
end
start
note right
XDimension2DaddDimension(XDimension2Ddim)
end note
:return new XDimension2D(dim.getWidth()+x1+
x2,dim.getHeight()+y1+y2);;
stop
end
start
note right
doublegetX1()
end note
:return x1;;
stop
end
start
note right
doublegetY1()
end note
:return y1;;
stop
end
start
note right
intsuppHeightBecauseOfShape()
end note
:return 0;;
stop
end
start
note right
intsuppWidthBecauseOfShape()
end note
:return 0;;
stop
end
@enduml

