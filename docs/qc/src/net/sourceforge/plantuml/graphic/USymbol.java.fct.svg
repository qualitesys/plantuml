@startuml
!pragma layout smetana
start
note right
constructor Margin(double x1,double x2,double y1,
double y2)
end note
:this.x1=x1;;
:this.x2=x2;;
:this.y1=y1;;
:this.y2=y2;;
end
start
note right
double getWidth()
end note
:return x1+x2;;
stop
end
start
note right
double getHeight()
end note
:return y1+y2;;
stop
end
start
note right
XDimension2D addDimension(XDimension2D dim)
end note
:return new XDimension2D(dim.getWidth()+x1+
x2,dim.getHeight()+y1+y2);;
stop
end
start
note right
double getX1()
end note
:return x1;;
stop
end
start
note right
double getY1()
end note
:return y1;;
stop
end
start
note right
int suppHeightBecauseOfShape()
end note
:return 0;;
stop
end
start
note right
int suppWidthBecauseOfShape()
end note
:return 0;;
stop
end
@enduml

