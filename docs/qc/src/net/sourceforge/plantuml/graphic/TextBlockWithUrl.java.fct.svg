@startuml
!pragma layout smetana
start
note right
TextBlockwithUrl(TextBlockblock,Urlurl)
end note
if (url==null ) then (yes) 
:return block;;
stop
endif 
:return new TextBlockWithUrl(block,url);;
stop
end
start
note right
constructor TextBlockWithUrl(TextBlockblock,
Urlurl)
end note
:this.block=block;;
:this.url=url;;
end
start
note right
void drawU(UGraphicug)
end note
:ug.startUrl(url);;
:block.drawU(ug);;
:ug.closeUrl();;
end
start
note right
XDimension2DcalculateDimension(StringBounderstringBounder)
end note
:return block.calculateDimension(stringBounder);;
stop
end
start
note right
MinMaxgetMinMax(StringBounderstringBounder)
end note
:return block.getMinMax(stringBounder);;
stop
end
start
note right
XRectangle2DgetInnerPosition(Stringmember,
StringBounderstringBounder,InnerStrategystrategy)
end note
:return block.getInnerPosition(member,stringBounder,
strategy);;
stop
end
@enduml

