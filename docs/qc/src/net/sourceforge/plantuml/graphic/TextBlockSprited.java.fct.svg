#181818" points="289.5,931.2578,293.5,941.2578,297.5,931.2578,293.5,935.2578" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="293.5" x2="293.5" y1="975.2266" y2="995.2266"/><polygon fill="#181818" points="289.5,985.2266,293.5,995.2266,297.5,985.2266,293.5,989.2266" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[19d631d4e7e1e4cc97627b1b0509a0f1]
@startuml
!pragma layout smetana
start
note right
constructor TextBlockSprited(TextBlock sprite,
TextBlock parent)
end note
:this.sprite=sprite;;
:this.parent=parent;;
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:final double widthCircledCharacter=getCircledCharacterWithAndMargin(stringBounder);;
:final double heightCircledCharacter=sprite.calculateDimension(stringBounder)
.getHeight();;
:final XDimension2D dim=parent.calculateDimension(stringBounder);;
:return new XDimension2D(dim.getWidth()+widthCircledCharacter,
Math.max(heightCircledCharacter,dim.getHeight()));;
stop
end
start
note right
double getCircledCharacterWithAndMargin(StringBounder stringBounder)
end note
:return sprite.calculateDimension(stringBounder).getWidth()+
6.0;;
stop
end
start
note right
void drawU(UGraphic ug)
end note
:final StringBounder stringBounder=ug.getStringBounder();;
:sprite.drawU(ug);;
:final double widthCircledCharacter=getCircledCharacterWithAndMargin(stringBounder);;
:parent.drawU(ug.apply(UTranslate.dx(widthCircledCharacter)));;
end
@enduml

