@startuml
!pragma layout smetana
start
note right
constructor TextBlockSprited(TextBlocksprite,
TextBlockparent)
end note
:this.sprite=sprite;;
:this.parent=parent;;
end
start
note right
XDimension2DcalculateDimension(StringBounderstringBounder)
end note
:final doublewidthCircledCharacter=getCircledCharacterWithAndMargin(stringBounder);;
:final doubleheightCircledCharacter=sprite.calculateDimension(stringBounder)
.getHeight();;
:final XDimension2Ddim=parent.calculateDimension(stringBounder);;
:return new XDimension2D(dim.getWidth()+widthCircledCharacter,
Math.max(heightCircledCharacter,dim.getHeight()));;
stop
end
start
note right
doublegetCircledCharacterWithAndMargin(StringBounderstringBounder)
end note
:return sprite.calculateDimension(stringBounder).getWidth()+
6.0;;
stop
end
start
note right
void drawU(UGraphicug)
end note
:final StringBounderstringBounder=ug.getStringBounder();;
:sprite.drawU(ug);;
:final doublewidthCircledCharacter=getCircledCharacterWithAndMargin(stringBounder);;
:parent.drawU(ug.apply(UTranslate.dx(widthCircledCharacter)));;
end
@enduml

