@startuml
!pragma layout smetana
start
note right
DisplaybreakLines(Displaytexts,FontConfigurationfontConfiguration,
SpriteContainerspriteContainer,doublemaxWidth)
end note
if (texts.size()!=1) then (yes) 
:return texts;;
stop
endif 
:final CharSequences=texts.get(0);;
:Displayresult=Display.empty();;
:final intnb=s.length()/2;;
:result=result.add(s.subSequence(0,nb));;
:result=result.add(s.subSequence(nb+1,s.length()));;
:return result;;
stop
end
@enduml

