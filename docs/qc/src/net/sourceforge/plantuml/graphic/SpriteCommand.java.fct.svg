@startuml
!pragma layout smetana
start
note right
constructor SpriteCommand(Stringsprite)
end note
:Objects.requireNonNull(sprite);;
if (sprite.startsWith("<$")==false) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
if (sprite.endsWith(">")==false) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:this.sprite=StringUtils.trin(sprite.substring(2,
sprite.length()-1));;
end
start
note right
StringgetSprite()
end note
:return sprite;;
stop
end
@enduml

