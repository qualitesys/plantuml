@startuml
!pragma layout smetana
start
note right
VerticalAlignment fromString(String s)
end note
if (TOP.name().equalsIgnoreCase(s)) then (yes) 
:return TOP;;
stop
endif 
if (BOTTOM.name().equalsIgnoreCase(s)) then (yes) 
:return BOTTOM;;
stop
endif 
:return BOTTOM;;
stop
end
@enduml

