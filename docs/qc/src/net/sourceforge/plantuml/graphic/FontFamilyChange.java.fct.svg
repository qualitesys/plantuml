@startuml
!pragma layout smetana
start
note right
constructor FontFamilyChange(Strings)
end note
:final Matcher2matcherColor=colorPattern.matcher(s);;
if (matcherColor.find()==false) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:this.family=StringUtils.trin(matcherColor.group(1));;
end
start
note right
FontConfigurationapply(FontConfigurationinitial)
end note
:return initial.changeFamily(family);;
stop
end
@enduml

