@startuml
!pragma layout smetana
start
note right
constructor FontFamilyChange(String s)
end note
:final Matcher2 matcherColor=colorPattern.matcher(s);;
if (matcherColor.find()==false) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:this.family=StringUtils.trin(matcherColor.group(1));;
end
start
note right
FontConfiguration apply(FontConfiguration initial)
end note
:return initial.changeFamily(family);;
stop
end
@enduml

