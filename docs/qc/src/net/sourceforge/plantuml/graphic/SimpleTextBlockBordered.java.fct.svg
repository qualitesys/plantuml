x1="267.5" x2="267.5" y1="570.3125" y2="590.3125"/><polygon fill="#181818" points="263.5,580.3125,267.5,590.3125,271.5,580.3125,267.5,584.3125" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="267.5" x2="267.5" y1="638.25" y2="658.25"/><polygon fill="#181818" points="263.5,648.25,267.5,658.25,271.5,648.25,267.5,652.25" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[4381a7f84ccb7c4cd9274ffff9f92c5e]
@startuml
!pragma layout smetana
start
note right
constructor SimpleTextBlockBordered(TextBlock textBlock,
HColor color)
end note
:this.textBlock=textBlock;;
:this.color=color;;
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:final XDimension2D dim=textBlock.calculateDimension(stringBounder);;
:return XDimension2D.delta(dim,1,1);;
stop
end
start
note right
void drawU(UGraphic ug)
end note
:final XDimension2D dim=textBlock.calculateDimension(ug.getStringBounder());;
:textBlock.drawU(ug.apply(new UTranslate(1,
1)));;
:ug.apply(color).draw(new URectangle(dim.getWidth(),
dim.getHeight()));;
end
@enduml

