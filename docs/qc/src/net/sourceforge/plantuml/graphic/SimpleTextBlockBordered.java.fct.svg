" x2="265.5" y1="570.3125" y2="590.3125"/><polygon fill="#181818" points="261.5,580.3125,265.5,590.3125,269.5,580.3125,265.5,584.3125" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="265.5" x2="265.5" y1="638.25" y2="658.25"/><polygon fill="#181818" points="261.5,648.25,265.5,658.25,269.5,648.25,265.5,652.25" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[5b469acb6b5a96b591521673ed66f50c]
@startuml
!pragma layout smetana
start
note right
constructor SimpleTextBlockBordered(TextBlocktextBlock,
HColorcolor)
end note
:this.textBlock=textBlock;;
:this.color=color;;
end
start
note right
XDimension2DcalculateDimension(StringBounderstringBounder)
end note
:final XDimension2Ddim=textBlock.calculateDimension(stringBounder);;
:return XDimension2D.delta(dim,1,1);;
stop
end
start
note right
void drawU(UGraphicug)
end note
:final XDimension2Ddim=textBlock.calculateDimension(ug.getStringBounder());;
:textBlock.drawU(ug.apply(new UTranslate(1,
1)));;
:ug.apply(color).draw(new URectangle(dim.getWidth(),
dim.getHeight()));;
end
@enduml

