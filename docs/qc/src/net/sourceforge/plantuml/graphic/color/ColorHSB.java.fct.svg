@startuml
!pragma layout smetana
start
note right
constructor ColorHSB(int rgba)
end note
:super (rgba,true);;
:final float[] hsb=Color.RGBtoHSB(getRed(),
getGreen(),getBlue(),null );;
:hue=hsb[0];;
:saturation=hsb[1];;
:brightness=hsb[2];;
end
start
note right
constructor ColorHSB(Color other)
end note
:this(other.getRGB());;
end
start
note right
float getHue()
end note
:return hue;;
stop
end
start
note right
float getSaturation()
end note
:return saturation;;
stop
end
start
note right
float getBrightness()
end note
:return brightness;;
stop
end
start
note right
String toString()
end note
:return String.format(Locale.US,"%s[a=%02X r=%02X g=%02X b=%02X / h=%f s=%f b=%f]",
getClass().getSimpleName(),getAlpha(),getRed(),
getGreen(),getBlue(),getHue(),getSaturation(),
getBrightness());;
stop
end
@enduml

