@startuml
!pragma layout smetana
start
note right
ColorType getType(String s)
end note
:final int x=s.indexOf('.');;
if (x!=-1) then (yes) 
:s=s.substring(0,x);;
endif 
:final ColorType key=ColorType.valueOf(s.toUpperCase());;
:return key;;
stop
end
@enduml

