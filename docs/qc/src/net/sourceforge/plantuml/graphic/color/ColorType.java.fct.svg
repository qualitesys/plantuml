@startuml
!pragma layout smetana
start
note right
ColorTypegetType(Strings)
end note
:final intx=s.indexOf('.');;
if (x!=-1) then (yes) 
:s=s.substring(0,x);;
endif 
:final ColorTypekey=ColorType.valueOf(s.toUpperCase());;
:return key;;
stop
end
@enduml

