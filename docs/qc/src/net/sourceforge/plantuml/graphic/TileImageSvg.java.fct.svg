@startuml
!pragma layout smetana
start
note right
constructor TileImageSvg(Stringsvg,doublescale)
end note
:this.svg=new UImageSvg(svg,scale);;
:this.scale=scale;;
end
start
note right
XDimension2DcalculateDimension(StringBounderstringBounder)
end note
:return new XDimension2D(svg.getWidth(),svg.getHeight());;
stop
end
start
note right
void drawU(UGraphicug)
end note
:ug.draw(svg);;
end
@enduml

