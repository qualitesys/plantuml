@startuml
!pragma layout smetana
start
note right
SName getSName()
end note
:return SName.storage;;
stop
end
start
note right
void drawStorage(UGraphic ug,double width,
double height,double shadowing)
end note
:final URectangle shape=new URectangle(width,
height).rounded(70);;
:shape.setDeltaShadow(shadowing);;
:ug.draw(shape);;
end
start
note right
Margin getMargin()
end note
:return new Margin(10,10,10,10);;
stop
end
start
note right
TextBlock asSmall(TextBlock name,final TextBlock label,
final TextBlock stereotype,final SymbolContext symbolContext,
final HorizontalAlignment stereoAlignment)
end note
:return new AbstractTextBlock(){public void drawU(UGraphic ug){final XDimension2D dim=calculateDimension(ug.getStringBounder());ug=UGraphicStencil.create(ug,
dim);ug=symbolContext.apply(ug);drawStorage(ug,
dim.getWidth(),dim.getHeight(),symbolContext.getDeltaShadow());final Margin margin=getMargin();final TextBlock tb=TextBlockUtils.mergeTB(stereotype,
label,HorizontalAlignment.CENTER);tb.drawU(ug.apply(new UTranslate(margin.getX1(),
margin.getY1())));}public XDimension2D calculateDimension(StringBounder stringBounder){final XDimension2D dimLabel=label.calculateDimension(stringBounder);final XDimension2D dimStereo=stereotype.calculateDimension(stringBounder);return getMargin().addDimension(XDimension2D.mergeTB(dimStereo,dimLabel));}};;
stop
end
start
note right
TextBlock asBig(final TextBlock title,HorizontalAlignment labelAlignment,
final TextBlock stereotype,final double width,
final double height,final SymbolContext symbolContext,
final HorizontalAlignment stereoAlignment)
end note
:return new AbstractTextBlock(){public void drawU(UGraphic ug){final XDimension2D dim=calculateDimension(ug.getStringBounder());ug=symbolContext.apply(ug);drawStorage(ug,
dim.getWidth(),dim.getHeight(),symbolContext.getDeltaShadow());final XDimension2D dimStereo=stereotype.calculateDimension(ug.getStringBounder());final double posStereo=(width-dimStereo.getWidth())/2;stereotype.drawU(ug.apply(new UTranslate(posStereo,5)));final XDimension2D dimTitle=title.calculateDimension(ug.getStringBounder());final double posTitle=(width-dimTitle.getWidth())/2;title.drawU(ug.apply(new UTranslate(posTitle,7+dimStereo.getHeight())));}public XDimension2D calculateDimension(StringBounder stringBounder){return new XDimension2D(width,height);}};;
stop
