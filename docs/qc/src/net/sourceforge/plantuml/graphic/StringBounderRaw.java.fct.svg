@startuml
!pragma layout smetana
start
note right
XDimension2D calculateDimension(UFont font,
String text)
end note
if (RichText.isRich(text)) then (yes) 
:double width=0;;
:double height=0;;
:final UFont newFont=s.getStyle().mutateFont(font);;
:final XDimension2D rect=calculateDimensionInternal(newFont,
s.getText());;
:width+=rect.getWidth();;
:height=Math.max(height,rect.getHeight());;
:return new XDimension2D(width,height);;
stop
endif 
:return calculateDimensionInternal(font,text);;
stop
end
start
note right
double getDescent(UFont font,String text)
end note
:final FontRenderContext frc=FileFormat.gg.getFontRenderContext();;
:final LineMetrics lineMetrics=font.getUnderlayingFont().getLineMetrics(text,
frc);;
:final double descent=lineMetrics.getDescent();;
:return descent;;
stop
end
@enduml

