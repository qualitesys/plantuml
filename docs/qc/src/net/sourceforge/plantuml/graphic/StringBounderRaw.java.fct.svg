@startuml
!pragma layout smetana
start
note right
XDimension2DcalculateDimension(UFontfont,
Stringtext)
end note
if (RichText.isRich(text)) then (yes) 
:doublewidth=0;;
:doubleheight=0;;
:final UFontnewFont=s.getStyle().mutateFont(font);;
:final XDimension2Drect=calculateDimensionInternal(newFont,
s.getText());;
:width+=rect.getWidth();;
:height=Math.max(height,rect.getHeight());;
:return new XDimension2D(width,height);;
stop
endif 
:return calculateDimensionInternal(font,text);;
stop
end
start
note right
doublegetDescent(UFontfont,Stringtext)
end note
:final FontRenderContextfrc=FileFormat.gg.getFontRenderContext();;
:final LineMetricslineMetrics=font.getUnderlayingFont().getLineMetrics(text,
frc);;
:final doubledescent=lineMetrics.getDescent();;
:return descent;;
stop
end
@enduml

