@startuml
!pragma layout smetana
start
note right
constructor ColorChange(String s)
end note
:final Matcher2 matcherColor=colorPattern.matcher(s);;
if (matcherColor.find()==false) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:final String s1=matcherColor.group(1);;
:this.color=HColorSet.instance().getColorOrWhite(s1);;
end
start
note right
HColor getColor()
end note
:return color;;
stop
end
start
note right
FontConfiguration apply(FontConfiguration initial)
end note
:return initial.changeColor(color);;
stop
end
@enduml

