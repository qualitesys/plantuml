dth:1.0;" x1="880" x2="880" y1="796.5425" y2="816.5425"/><polygon fill="#181818" points="876,806.5425,880,816.5425,884,806.5425,880,810.5425" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[1874b7a89120cdb7a40c8843894f77de]
@startuml
!pragma layout smetana
start
note right
constructor TextBlockMinWidth(TextBlock textBlock,
double minWidth,HorizontalAlignment horizontalAlignment)
end note
:this.textBlock=textBlock;;
:this.minWidth=minWidth;;
:this.horizontalAlignment=horizontalAlignment;;
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:final XDimension2D dim=textBlock.calculateDimension(stringBounder);;
:return XDimension2D.atLeast(dim,minWidth,0);;
stop
end
start
note right
void drawU(UGraphic ug)
end note
if (horizontalAlignment==HorizontalAlignment.LEFT) then (yes) 
:textBlock.drawU(ug);;
else if (horizontalAlignment==HorizontalAlignment.CENTER) then (yes) 
:final XDimension2D dimText=textBlock.calculateDimension(ug.getStringBounder());;
:final XDimension2D dimFull=calculateDimension(ug.getStringBounder());;
:final double diffx=dimFull.getWidth()-dimText.getWidth();;
:textBlock.drawU(ug.apply(UTranslate.dx(diffx/2)));;
else if (horizontalAlignment==HorizontalAlignment.RIGHT) then (yes) 
:final XDimension2D dimText=textBlock.calculateDimension(ug.getStringBounder());;
:final XDimension2D dimFull=calculateDimension(ug.getStringBounder());;
:final double diffx=dimFull.getWidth()-dimText.getWidth();;
:textBlock.drawU(ug.apply(UTranslate.dx(diffx)));;
else (no)
:throw new UnsupportedOperationException();;
stop
endif 
end
@enduml

