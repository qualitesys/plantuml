" x2="876" y1="796.5425" y2="816.5425"/><polygon fill="#181818" points="872,806.5425,876,816.5425,880,806.5425,876,810.5425" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[3a0db8b0edee91f42943da4ebc11e27b]
@startuml
!pragma layout smetana
start
note right
constructor TextBlockMinWidth(TextBlocktextBlock,
doubleminWidth,HorizontalAlignmenthorizontalAlignment)
end note
:this.textBlock=textBlock;;
:this.minWidth=minWidth;;
:this.horizontalAlignment=horizontalAlignment;;
end
start
note right
XDimension2DcalculateDimension(StringBounderstringBounder)
end note
:final XDimension2Ddim=textBlock.calculateDimension(stringBounder);;
:return XDimension2D.atLeast(dim,minWidth,0);;
stop
end
start
note right
void drawU(UGraphicug)
end note
if (horizontalAlignment==HorizontalAlignment.LEFT) then (yes) 
:textBlock.drawU(ug);;
else if (horizontalAlignment==HorizontalAlignment.CENTER) then (yes) 
:final XDimension2DdimText=textBlock.calculateDimension(ug.getStringBounder());;
:final XDimension2DdimFull=calculateDimension(ug.getStringBounder());;
:final doublediffx=dimFull.getWidth()-dimText.getWidth();;
:textBlock.drawU(ug.apply(UTranslate.dx(diffx/2)));;
else if (horizontalAlignment==HorizontalAlignment.RIGHT) then (yes) 
:final XDimension2DdimText=textBlock.calculateDimension(ug.getStringBounder());;
:final XDimension2DdimFull=calculateDimension(ug.getStringBounder());;
:final doublediffx=dimFull.getWidth()-dimText.getWidth();;
:textBlock.drawU(ug.apply(UTranslate.dx(diffx)));;
else (no)
:throw new UnsupportedOperationException();;
stop
endif 
end
@enduml

