@startuml
!pragma layout smetana
start
note right
constructor SpecialText(TextBlocktitle)
end note
:this.title=title;;
end
start
note right
booleanisIgnoreForCompressionOn(CompressionModemode)
end note
:return true;;
stop
end
start
note right
void drawWhenCompressed(UGraphicug,CompressionModemode)
end note
:final XDimension2Ddim=title.calculateDimension(ug.getStringBounder());;
:ug.apply(UTranslate.dx(dim.getWidth())).draw(new UEmpty(1,
1));;
end
start
note right
TextBlockgetTitle()
end note
:return title;;
stop
end
@enduml

