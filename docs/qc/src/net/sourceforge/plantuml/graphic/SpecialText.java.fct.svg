@startuml
!pragma layout smetana
start
note right
constructor SpecialText(TextBlock title)
end note
:this.title=title;;
end
start
note right
boolean isIgnoreForCompressionOn(CompressionMode mode)
end note
:return true;;
stop
end
start
note right
void drawWhenCompressed(UGraphic ug,CompressionMode mode)
end note
:final XDimension2D dim=title.calculateDimension(ug.getStringBounder());;
:ug.apply(UTranslate.dx(dim.getWidth())).draw(new UEmpty(1,
1));;
end
start
note right
TextBlock getTitle()
end note
:return title;;
stop
end
@enduml

