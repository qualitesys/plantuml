@startuml
!pragma layout smetana
start
note right
constructor Text(String text)
end note
:this.text=text.replaceAll("\\\\\\[","[").replaceAll("\\\\\\]",
"]");;
if (text.indexOf(BackSlash.CHAR_NEWLINE)!=-1) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
if (text.length()==0) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
end
start
note right
String getText()
end note
:assert text.length()>0;;
:return text;;
stop
end
start
note right
boolean isNewline()
end note
:return text.equals(BackSlash.BS_BS_N);;
stop
end
@enduml

