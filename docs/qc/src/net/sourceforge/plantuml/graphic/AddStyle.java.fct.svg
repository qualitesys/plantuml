@startuml
!pragma layout smetana
start
note right
constructor AddStyle(FontStylestyle,HColorextendedColor)
end note
:this.style=style;;
:this.extendedColor=extendedColor;;
end
start
note right
AddStylefromString(Strings)
end note
:return new AddStyle(FontStyle.getStyle(s),
FontStyle.getStyle(s).getExtendedColor(s));;
stop
end
start
note right
FontConfigurationapply(FontConfigurationinitial)
end note
:initial=initial.add(style);;
if (extendedColor!=null ) then (yes) 
:initial=initial.changeExtendedColor(extendedColor);;
endif 
:return initial;;
stop
end
@enduml

