@startuml
!pragma layout smetana
start
note right
constructor QuoteUtils()
end note
end
start
note right
StringgetSomeQuote()
end note
:synchronized (tmp){if (tmp.size()==0){tmp.addAll(quotes);
:Collections.shuffle(tmp);}final intsize=tmp.size();
:final Stringresult=tmp.get(size-1);tmp.remove(size-1);
:return result;};
end
@enduml

