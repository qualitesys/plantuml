@startuml
!pragma layout smetana
start
note right
booleancheck(final Stringdata,Stringcandidate)
end note
if (this==STRICT) then (yes) 
:return data.startsWith(candidate);;
stop
endif 
if (this==LAZZY) then (yes) 
:return data.contains(candidate);;
stop
endif 
:throw new IllegalStateException();;
stop
end
@enduml

