@startuml
!pragma layout smetana
start
note right
constructor TextBlockTitle(FontConfigurationfont,
DisplaystringsToDisplay,ISkinSimplespriteContainer)
end note
if (stringsToDisplay.size()==1&&stringsToDisplay.get(0).length()==0) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:final LineBreakStrategylineBreak=LineBreakStrategy.NONE;;
:textBlock=stringsToDisplay.create0(font,
HorizontalAlignment.CENTER,spriteContainer,
lineBreak,CreoleMode.FULL,null ,null );;
end
start
note right
void drawU(UGraphicug)
end note
:textBlock.drawU(ug.apply(UTranslate.dx(outMargin)));;
end
start
note right
XDimension2DcalculateDimension(StringBounderstringBounder)
end note
:final XDimension2DtextDim=textBlock.calculateDimension(stringBounder);;
:final doublewidth=textDim.getWidth()+outMargin*2;;
:final doubleheight=textDim.getHeight();;
:return new XDimension2D(width,height);;
stop
end
start
note right
MinMaxgetMinMax(StringBounderstringBounder)
end note
:throw new UnsupportedOperationException();;
stop
end
start
note right
XRectangle2DgetInnerPosition(Stringmember,
StringBounderstringBounder,InnerStrategystrategy)
end note
:return null ;;
stop
end
@enduml

