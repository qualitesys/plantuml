@startuml
!pragma layout smetana
start
note right
constructor TextBlockTitle(FontConfiguration font,
Display stringsToDisplay,ISkinSimple spriteContainer)
end note
if (stringsToDisplay.size()==1&&stringsToDisplay.get(0).length()==0) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:final LineBreakStrategy lineBreak=LineBreakStrategy.NONE;;
:textBlock=stringsToDisplay.create0(font,
HorizontalAlignment.CENTER,spriteContainer,
lineBreak,CreoleMode.FULL,null ,null );;
end
start
note right
void drawU(UGraphic ug)
end note
:textBlock.drawU(ug.apply(UTranslate.dx(outMargin)));;
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:final XDimension2D textDim=textBlock.calculateDimension(stringBounder);;
:final double width=textDim.getWidth()+outMargin*2;;
:final double height=textDim.getHeight();;
:return new XDimension2D(width,height);;
stop
end
start
note right
MinMax getMinMax(StringBounder stringBounder)
end note
:throw new UnsupportedOperationException();;
stop
end
start
note right
XRectangle2D getInnerPosition(String member,
StringBounder stringBounder,InnerStrategy strategy)
end note
:return null ;;
stop
end
@enduml

