@startuml
!pragma layout smetana
start
note right
constructor SvgAttributesChange(String s)
end note
:final Matcher2 m=pattern.matcher(s);;
if (m.find()==false) then (yes) 
:throw new IllegalStateException();;
stop
endif 
:attributes=new SvgAttributes(m.group(1));;
end
start
note right
FontConfiguration apply(FontConfiguration initial)
end note
:return initial.changeAttributes(attributes);;
stop
end
@enduml

