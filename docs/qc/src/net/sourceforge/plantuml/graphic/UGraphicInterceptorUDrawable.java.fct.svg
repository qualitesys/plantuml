@startuml
!pragma layout smetana
start
note right
constructor UGraphicInterceptorUDrawable(UGraphic ug)
end note
:super (ug);;
end
start
note right
void draw(UShape shape)
end note
if (shape instanceof UDrawable ) then (yes) 
:final UDrawable drawable=(UDrawable )shape;;
:drawable.drawU(this);;
else (no)
:getUg().draw(shape);;
endif 
end
start
note right
UGraphic apply(UChange change)
end note
:return new UGraphicInterceptorUDrawable(getUg()
.apply(change));;
stop
end
@enduml

