@startuml
!pragma layout smetana
start
note right
constructor UGraphicInterceptorUDrawable(UGraphicug)
end note
:super (ug);;
end
start
note right
void draw(UShapeshape)
end note
if (shape instanceof UDrawable) then (yes) 
:final UDrawabledrawable=(UDrawable)shape;;
:drawable.drawU(this);;
else (no)
:getUg().draw(shape);;
endif 
end
start
note right
UGraphicapply(UChangechange)
end note
:return new UGraphicInterceptorUDrawable(getUg()
.apply(change));;
stop
end
@enduml

