ke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="180" x2="180" y1="1015.043" y2="1035.043"/><polygon fill="#181818" points="176,1025.043,180,1035.043,184,1025.043,180,1029.043" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="180" x2="180" y1="1069.0117" y2="1089.0117"/><polygon fill="#181818" points="176,1079.0117,180,1089.0117,184,1079.0117,180,1083.0117" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="180" x2="180" y1="1122.9805" y2="1142.9805"/><polygon fill="#181818" points="176,1132.9805,180,1142.9805,184,1132.9805,180,1136.9805" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="180" x2="180" y1="1227.5469" y2="1250.1133"/><polygon fill="#181818" points="176,1240.1133,180,1250.1133,184,1240.1133,180,1244.1133" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="180" x2="180" y1="1284.082" y2="1304.082"/><polygon fill="#181818" points="176,1294.082,180,1304.082,184,1294.082,180,1298.082" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[0bc8d526dab4a182e1accae61980a395]
@startuml
!pragma layout smetana
start
note right
CoordinateChange create(XPoint2D p1,XPoint2D p2)
end note
:return new CoordinateChange(p1.getX(),p1.getY(),
p2.getX(),p2.getY());;
stop
end
start
note right
constructor CoordinateChange(double x1,double y1,
double x2,double y2)
end note
:this.x1=x1;;
:this.y1=y1;;
:this.x2=x2;;
:this.y2=y2;;
:this.len=XPoint2D.distance(x1,y1,x2,y2);;
if (this.len==0) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:this.vect_u_x=(x2-x1)/len;;
:this.vect_u_y=(y2-y1)/len;;
:this.vect_v_x=-this.vect_u_y;;
:this.vect_v_y=this.vect_u_x;;
end
start
note right
XPoint2D getTrueCoordinate(double a,double b)
end note
:final double x=a*vect_u_x+b*vect_v_x;;
:final double y=a*vect_u_y+b*vect_v_y;;
:return new XPoint2D(x1+x,y1+y);;
stop
end
start
note right
double getLength()
end note
:return len;;
stop
end
@enduml

