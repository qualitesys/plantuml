@startuml
!pragma layout smetana
start
note right
constructor TextBlockGeneric(TextBlock textBlock,
HColor background,HColor border)
end note
:this.textBlock=textBlock;;
:this.border=border;;
:this.background=background;;
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:final XDimension2D dim=textBlock.calculateDimension(stringBounder);;
:return dim;;
stop
end
start
note right
void drawU(UGraphic ug)
end note
:ug=ug.apply(background.bg());;
:ug=ug.apply(border);;
:final XDimension2D dim=calculateDimension(ug.getStringBounder());;
:ug.apply(new UStroke(2,2,1)).draw(new URectangle(dim.getWidth(),
dim.getHeight()));;
:textBlock.drawU(ug);;
end
@enduml

