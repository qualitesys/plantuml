@startuml
!pragma layout smetana
start
note right
constructor TextBlockGeneric(TextBlocktextBlock,
HColorbackground,HColorborder)
end note
:this.textBlock=textBlock;;
:this.border=border;;
:this.background=background;;
end
start
note right
XDimension2DcalculateDimension(StringBounderstringBounder)
end note
:final XDimension2Ddim=textBlock.calculateDimension(stringBounder);;
:return dim;;
stop
end
start
note right
void drawU(UGraphicug)
end note
:ug=ug.apply(background.bg());;
:ug=ug.apply(border);;
:final XDimension2Ddim=calculateDimension(ug.getStringBounder());;
:ug.apply(new UStroke(2,2,1)).draw(new URectangle(dim.getWidth(),
dim.getHeight()));;
:textBlock.drawU(ug);;
end
@enduml

