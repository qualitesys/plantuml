oints="180,564.1914,184,574.1914,188,564.1914,184,568.1914" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="184" x2="184" y1="608.1602" y2="628.1602"/><polygon fill="#181818" points="180,618.1602,184,628.1602,188,618.1602,184,622.1602" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[ef4a925d135a698820f7ff657dc45385]
@startuml
!pragma layout smetana
start
note right
constructor SizeChange(String s)
end note
:final Matcher2 matcherSize=sizePattern.matcher(s);;
if (matcherSize.find()==false) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:size=Integer.valueOf(matcherSize.group(1));;
end
start
note right
Integer getSize()
end note
:return size;;
stop
end
start
note right
FontConfiguration apply(FontConfiguration initial)
end note
:return initial.changeSize(size);;
stop
end
@enduml

