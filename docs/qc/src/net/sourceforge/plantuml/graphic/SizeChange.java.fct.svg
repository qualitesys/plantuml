@startuml
!pragma layout smetana
start
note right
constructor SizeChange(Strings)
end note
:final Matcher2matcherSize=sizePattern.matcher(s);;
if (matcherSize.find()==false) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:size=Integer.valueOf(matcherSize.group(1));;
end
start
note right
IntegergetSize()
end note
:return size;;
stop
end
start
note right
FontConfigurationapply(FontConfigurationinitial)
end note
:return initial.changeSize(size);;
stop
end
@enduml

