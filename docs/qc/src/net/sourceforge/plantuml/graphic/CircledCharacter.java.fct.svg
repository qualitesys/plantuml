@startuml
!pragma layout smetana
start
note right
constructor CircledCharacter(charc,doubleradius,
UFontfont,HColorspotBackColor,HColorspotBorder,
HColorfontColor)
end note
:this.c=""+c;;
:this.radius=radius;;
:this.font=font;;
:this.spotBackColor=spotBackColor;;
:this.spotBorder=spotBorder;;
:this.fontColor=fontColor.getAppropriateColor(spotBackColor);;
end
start
note right
void drawU(UGraphicug)
end note
if (spotBorder!=null ) then (yes) 
:ug=ug.apply(spotBorder);;
endif 
:ug=ug.apply(spotBackColor.bg());;
:ug.draw(new UEllipse(radius*2,radius*2));;
:ug=ug.apply(fontColor);;
:ug=ug.apply(new UTranslate(radius,radius));;
:ug.draw(new UCenteredCharacter(c.charAt(0),
font));;
end
start
note right
doublegetPreferredWidth(StringBounderstringBounder)
end note
:return 2*radius;;
stop
end
start
note right
doublegetPreferredHeight(StringBounderstringBounder)
end note
:return 2*radius;;
stop
end
start
note right
XDimension2DcalculateDimension(StringBounderstringBounder)
end note
:return new XDimension2D(getPreferredWidth(stringBounder),
getPreferredHeight(stringBounder));;
stop
end
@enduml

