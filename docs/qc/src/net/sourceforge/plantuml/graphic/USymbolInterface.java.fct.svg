@startuml
!pragma layout smetana
start
note right
SName getSName()
end note
:return SName.interface_;;
stop
end
start
note right
TextBlock getDrawing(SymbolContext symbolContext)
end note
:return new CircleInterface2(symbolContext.getBackColor(),
symbolContext.getForeColor(),symbolContext.isShadowing()? 4.0:0.0);;
stop
end
@enduml

