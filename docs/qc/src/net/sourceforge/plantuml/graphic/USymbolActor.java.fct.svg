@startuml
!pragma layout smetana
start
note right
constructor USymbolActor(ActorStyle actorStyle)
end note
:this.actorStyle=actorStyle;;
end
start
note right
SName getSName()
end note
:return SName.actor;;
stop
end
start
note right
TextBlock getDrawing(SymbolContext symbolContext)
end note
:return actorStyle.getTextBlock(symbolContext);;
stop
end
@enduml

