@startuml
!pragma layout smetana
start
note right
constructor RemoveStyle(FontStyle style)
end note
:this.style=style;;
end
start
note right
FontConfiguration apply(FontConfiguration initial)
end note
:return initial.remove(style);;
stop
end
@enduml

