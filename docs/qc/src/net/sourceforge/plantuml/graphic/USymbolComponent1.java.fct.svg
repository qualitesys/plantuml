@startuml
!pragma layout smetana
start
note right
SName getSName()
end note
:return SName.component;;
stop
end
start
note right
void drawComponent1(UGraphic ug,double widthTotal,
double heightTotal,double shadowing,double roundCorner)
end note
:final URectangle form=new URectangle(widthTotal,
heightTotal).rounded(roundCorner);;
:form.setDeltaShadow(shadowing);;
:ug.draw(form);;
:final UShape small=new URectangle(10,5);;
:ug.apply(new UTranslate(-5,5)).draw(small);;
:ug.apply(new UTranslate(-5,heightTotal-10))
.draw(small);;
end
start
note right
Margin getMargin()
end note
:return new Margin(10,10,10,10);;
stop
end
start
note right
TextBlock asSmall(TextBlock name,final TextBlock label,
final TextBlock stereotype,final SymbolContext symbolContext,
final HorizontalAlignment stereoAlignment)
end note
:return new AbstractTextBlock(){public void drawU(UGraphic ug){final StringBounder stringBounder=ug.getStringBounder();
:final XDimension2D dimTotal=calculateDimension(stringBounder);ug=UGraphicStencil.create(ug,
dimTotal);ug=symbolContext.apply(ug);drawComponent1(ug,
dimTotal.getWidth(),dimTotal.getHeight(),
symbolContext.getDeltaShadow(),symbolContext.getRoundCorner());final Margin margin=getMargin();final TextBlock tb=TextBlockUtils.mergeTB(stereotype,
label,HorizontalAlignment.CENTER);tb.drawU(ug.apply(new UTranslate(margin.getX1(),
margin.getY1())));}public XDimension2D calculateDimension(StringBounder stringBounder){final XDimension2D dimLabel=label.calculateDimension(stringBounder);final XDimension2D dimStereo=stereotype.calculateDimension(stringBounder);return getMargin().addDimension(XDimension2D.mergeTB(dimStereo,dimLabel));}};;
stop
end
start
note right
TextBlock asBig(TextBlock title,HorizontalAlignment labelAlignment,
TextBlock stereotype,double width,double height,
SymbolContext symbolContext,HorizontalAlignment stereoAlignment)
end note
:return USymbols.COMPONENT2.asBig(title,labelAlignment,
stereotype,width,height,symbolContext,stereoAlignment);;
stop
end
@enduml

