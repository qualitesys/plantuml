@startuml
!pragma layout smetana
start
note right
constructor TextBlockRecentred(TextBlock textBlock)
end note
:this.textBlock=textBlock;;
end
start
note right
void drawU(final UGraphic ug)
end note
:StringBounder stringBounder=ug.getStringBounder();;
:final MinMax minMax=getMinMax(stringBounder);;
:textBlock.drawU(ug.apply(new UTranslate(-minMax.getMinX(),
-minMax.getMinY())));;
end
start
note right
MinMax getMinMax(StringBounder stringBounder)
end note
:return textBlock.getMinMax(stringBounder);;
stop
end
start
note right
XDimension2D calculateDimension(StringBounder stringBounder)
end note
:final MinMax minMax=getMinMax(stringBounder);;
:return minMax.getDimension();;
stop
end
start
note right
HColor getBackcolor()
end note
if (textBlock instanceof TextBlockBackcolored ) then (yes) 
:return ((TextBlockBackcolored )textBlock)
.getBackcolor();;
stop
endif 
:return null ;;
stop
end
@enduml

