@startuml
!pragma layout smetana
start
note right
constructor ExposantChange(FontPosition fontPosition)
end note
:this.fontPosition=fontPosition;;
end
start
note right
FontConfiguration apply(FontConfiguration initial)
end note
:return initial.changeFontPosition(fontPosition);;
stop
end
@enduml

