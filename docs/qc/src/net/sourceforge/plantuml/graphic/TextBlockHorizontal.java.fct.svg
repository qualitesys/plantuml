VerticalAlignmentalignment)
end note
if (all.size()<2) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:this.blocks.addAll(all);;
:this.alignment=alignment;;
end
start
note right
XDimension2DcalculateDimension(StringBounderstringBounder)
end note
:XDimension2Ddim=blocks.get(0).calculateDimension(stringBounder);;
:dim=XDimension2D.mergeLR(dim,blocks.get(i)
.calculateDimension(stringBounder));;
:return dim;;
stop
end
start
note right
void drawU(UGraphicug)
end note
:doublex=0;;
:final XDimension2Ddimtotal=calculateDimension(ug.getStringBounder());;
:final XDimension2Ddimb=block.calculateDimension(ug.getStringBounder());;
if (alignment==VerticalAlignment.CENTER) then (yes) 
:final doubledy=(dimtotal.getHeight()-dimb.getHeight())/2;;
:block.drawU(ug.apply(new UTranslate(x,dy)));;
else (no)
:block.drawU(ug.apply(UTranslate.dx(x)));;
endif 
:x+=dimb.getWidth();;
end
@enduml

