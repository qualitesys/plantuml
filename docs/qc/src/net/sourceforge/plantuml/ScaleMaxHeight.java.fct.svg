@startuml
!pragma layout smetana
start
note right
constructor ScaleMaxHeight(double maxHeight)
end note
:this.maxHeight=maxHeight;;
end
start
note right
double getScaleInternal(double width,double height)
end note
:final double result=maxHeight/height;;
if (result>1) then (yes) 
:return 1;;
stop
endif 
:return result;;
stop
end
@enduml

