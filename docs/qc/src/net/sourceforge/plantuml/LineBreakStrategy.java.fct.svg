@startuml
!pragma layout smetana
start
note right
constructor LineBreakStrategy(String value)
end note
:this.value=value;;
end
start
note right
String toString()
end note
:return value;;
stop
end
start
note right
boolean isAuto()
end note
:return String.valueOf("auto").equalsIgnoreCase(value);;
stop
end
start
note right
double getMaxWidth()
end note
if (value!=null &&value.matches("-?\\d+")) then (yes) 
:return Double.parseDouble(value);;
stop
endif 
:return 0;;
stop
end
@enduml

