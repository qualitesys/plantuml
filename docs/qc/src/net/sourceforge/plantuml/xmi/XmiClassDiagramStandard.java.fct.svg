@startuml
!pragma layout smetana
start
note right
constructor XmiClassDiagramStandard(ClassDiagram classDiagram)
end note
:super (classDiagram);;
:final Element cla=createEntityNode(ent);;
if (cla==null ) then (yes) 
:continue ;;
endif 
:ownedElement.appendChild(cla);;
:done.add(ent);;
end
@enduml

