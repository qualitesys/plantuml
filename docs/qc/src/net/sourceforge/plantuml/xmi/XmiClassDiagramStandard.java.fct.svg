@startuml
!pragma layout smetana
start
note right
constructor XmiClassDiagramStandard(ClassDiagramclassDiagram)
end note
:super (classDiagram);;
:final Elementcla=createEntityNode(ent);;
if (cla==null ) then (yes) 
:continue ;;
endif 
:ownedElement.appendChild(cla);;
:done.add(ent);;
end
@enduml

