@startuml
!pragma layout smetana
start
note right
void build()
end note
end
start
note right
constructor XmiSequenceDiagram(SequenceDiagram diagram,
Document document)
end note
:super ();;
:this.diagram=diagram;;
:this.document=document;;
end
start
note right
Element createElement(String tag,String[][] attributes)
end note
:return setAttributes(document.createElement(tag),
attributes);;
stop
end
start
note right
Element setAttribute(Element element,String name,
String value)
end note
:element.setAttribute(name,value);;
:return element;;
stop
end
start
note right
Element setAttributes(Element element,String[][] attributes)
end note
:element.setAttribute(attr[0],attr[1]);;
:return element;;
stop
end
start
note right
String getDisplayString(Display display)
end note
:return String.join("\n",display.asList());;
stop
end
start
note right
String getXmiId(String tag,Object object)
end note
:return Integer.toHexString(tag.hashCode())+
"_"+Integer.toHexString(object.hashCode());;
stop
end
@enduml

