@startuml
!pragma layout smetana
start
note right
void put(BNode node)
end note
:final String key=getKey(node.getX(),node.getStage());;
if (data.containsKey(key)) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
:data.put(key,node);;
:this.maxX=Math.max(this.maxX,node.getX());;
:this.maxY=Math.max(this.maxY,node.getStage());;
end
start
note right
BNode getCell(int x,int y)
end note
:final String key=getKey(x,y);;
:return data.get(key);;
stop
end
start
note right
String getKey(int x,int y)
end note
:return ""+x+";"+y;;
stop
end
start
note right
Iterator<BNode> iterator()
end note
:return Collections.unmodifiableCollection(data.values())
.iterator();;
stop
end
start
note right
int getMaxX()
end note
:return maxX;;
stop
end
start
note right
int getMaxY()
end note
:return maxY;;
stop
end
@enduml

