@startuml
!pragma layout smetana
start
note right
constructor CommandBoardPlus()
end note
:super (false,getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandBoardPlus.class .getName(),RegexLeaf.start(),new RegexLeaf("PLUS","([+
]*)"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("LABEL",
"([^%s].*)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(BoardDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final String plus=arg.get("PLUS",0);;
:final String label=arg.get("LABEL",0);;
:return diagram.addLine(plus,label);;
stop
end
@enduml

