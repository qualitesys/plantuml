@startuml
!pragma layout smetana
start
note right
constructor BoardDiagramFactory()
end note
:super (DiagramType.BOARD);;
end
start
note right
List<Command> createCommands()
end note
:final List<Command> cmds=new ArrayList<>();;
:CommonCommands.addCommonCommands1(cmds);;
:cmds.add(new CommandBoardPlus());;
:return cmds;;
stop
end
start
note right
BoardDiagram createEmptyDiagram(UmlSource source,
Map<String,String> skinParam)
end note
:return new BoardDiagram(source);;
stop
end
@enduml

