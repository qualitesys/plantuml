@startuml
!pragma layout smetana
start
note right
constructor CardBox(Displaylabel,ISkinParamskinParam)
end note
:this.label=label;;
:this.skinParam=skinParam;;
end
start
note right
XDimension2DcalculateDimension(StringBounderstringBounder)
end note
:return new XDimension2D(150,70);;
stop
end
start
note right
void drawU(UGraphicug)
end note
:final URectanglerect=new URectangle(calculateDimension(ug.getStringBounder()));;
:rect.setDeltaShadow(1);;
:ug.apply(HColors.BLACK).apply(HColors.LIGHT_GRAY.bg())
.draw(rect);;
:label.create(FontConfiguration.blackBlueTrue(UFont.sansSerif(14)),
HorizontalAlignment.LEFT,skinParam).drawU(ug.apply(new UTranslate(3,
3)));;
end
@enduml

