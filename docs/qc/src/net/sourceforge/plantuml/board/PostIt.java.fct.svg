@startuml
!pragma layout smetana
start
note right
constructor PostIt(ISkinParamskinParam,BNodenode)
end note
:this.node=node;;
:this.skinParam=skinParam;;
end
start
note right
doublegetHeight()
end note
:return 90;;
stop
end
start
note right
doublegetWidth()
end note
:return 170;;
stop
end
start
note right
TextBlockgetCard()
end note
:return new CardBox(Display.create(node.getName()),
skinParam);;
stop
end
@enduml

