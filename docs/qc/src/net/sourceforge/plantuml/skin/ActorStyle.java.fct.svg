@startuml
!pragma layout smetana
start
note right
USymboltoUSymbol()
end note
if (this==STICKMAN) then (yes) 
:return USymbols.ACTOR_STICKMAN;;
stop
else if (this==AWESOME) then (yes) 
:return USymbols.ACTOR_AWESOME;;
stop
else if (this==HOLLOW) then (yes) 
:return USymbols.ACTOR_HOLLOW;;
stop
endif 
:throw new IllegalStateException();;
stop
end
start
note right
TextBlockgetTextBlock(SymbolContextsymbolContext)
end note
if (this==STICKMAN) then (yes) 
:return new ActorStickMan(symbolContext,false);;
stop
else if (this==STICKMAN_BUSINESS) then (yes) 
:return new ActorStickMan(symbolContext,true);;
stop
else if (this==AWESOME) then (yes) 
:return new ActorAwesome(symbolContext);;
stop
else if (this==HOLLOW) then (yes) 
:return new ActorHollow(symbolContext);;
stop
endif 
:throw new IllegalStateException();;
stop
end
@enduml

