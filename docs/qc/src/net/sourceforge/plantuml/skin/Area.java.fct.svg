@startuml
!pragma layout smetana
start
note right
String toString()
end note
:return dimensionToUse.toString()+" ("+deltaX1+
")";;
stop
end
start
note right
constructor Area(XDimension2D dimensionToUse)
end note
:this.dimensionToUse=dimensionToUse;;
end
start
note right
Area create(double with,double height)
end note
:return new Area(new XDimension2D(with,height));;
stop
end
start
note right
XDimension2D getDimensionToUse()
end note
:return dimensionToUse;;
stop
end
start
note right
void setDeltaX1(double deltaX1)
end note
:this.deltaX1=deltaX1;;
end
start
note right
double getDeltaX1()
end note
:return deltaX1;;
stop
end
@enduml

