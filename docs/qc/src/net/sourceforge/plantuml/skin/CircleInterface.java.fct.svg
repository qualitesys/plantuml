@startuml
!pragma layout smetana
start
note right
constructor CircleInterface(HColorbackgroundColor,
HColorforegroundColor,doubleheadDiam,floatthickness)
end note
:this.backgroundColor=backgroundColor;;
:this.foregroundColor=foregroundColor;;
:this.headDiam=headDiam;;
:this.thickness=thickness;;
end
start
note right
void drawU(UGraphicug)
end note
:final UEllipsehead=new UEllipse(headDiam,
headDiam);;
:ug.apply(new UStroke(thickness)).apply(backgroundColor.bg()).apply(foregroundColor).apply(new UTranslate((double)thickness,
(double)thickness)).draw(head);;
end
start
note right
doublegetPreferredWidth(StringBounderstringBounder)
end note
:return headDiam+2*thickness;;
stop
end
start
note right
doublegetPreferredHeight(StringBounderstringBounder)
end note
:return headDiam+2*thickness;;
stop
end
@enduml

