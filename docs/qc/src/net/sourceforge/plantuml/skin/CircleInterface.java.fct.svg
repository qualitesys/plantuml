3516" y2="787.3516"/><polygon fill="#181818" points="422,777.3516,426,787.3516,430,777.3516,426,781.3516" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[281fdf8c74ebd48d90b3cda1d4a3a6ea]
@startuml
!pragma layout smetana
start
note right
constructor CircleInterface(HColor backgroundColor,
HColor foregroundColor,double headDiam,float thickness)
end note
:this.backgroundColor=backgroundColor;;
:this.foregroundColor=foregroundColor;;
:this.headDiam=headDiam;;
:this.thickness=thickness;;
end
start
note right
void drawU(UGraphic ug)
end note
:final UEllipse head=new UEllipse(headDiam,
headDiam);;
:ug.apply(new UStroke(thickness)).apply(backgroundColor.bg()).apply(foregroundColor).apply(new UTranslate((double )thickness,
(double )thickness)).draw(head);;
end
start
note right
double getPreferredWidth(StringBounder stringBounder)
end note
:return headDiam+2*thickness;;
stop
end
start
note right
double getPreferredHeight(StringBounder stringBounder)
end note
:return headDiam+2*thickness;;
stop
end
@enduml

