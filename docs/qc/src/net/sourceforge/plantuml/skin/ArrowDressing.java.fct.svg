@startuml
!pragma layout smetana
start
note right
Stringname()
end note
:return toString();;
stop
end
start
note right
StringtoString()
end note
:return head.name();;
stop
end
start
note right
constructor ArrowDressing(ArrowHeadhead,ArrowPartpart)
end note
:this.head=Objects.requireNonNull(head);;
:this.part=Objects.requireNonNull(part);;
end
start
note right
ArrowDressingcreate()
end note
:return new ArrowDressing(ArrowHead.NONE,
ArrowPart.FULL);;
stop
end
start
note right
ArrowDressingwithHead(ArrowHeadhead)
end note
:return new ArrowDressing(head,part);;
stop
end
start
note right
ArrowDressingwithPart(ArrowPartpart)
end note
:return new ArrowDressing(head,part);;
stop
end
start
note right
ArrowHeadgetHead()
end note
:return head;;
stop
end
start
note right
ArrowPartgetPart()
end note
:return part;;
stop
end
@enduml

