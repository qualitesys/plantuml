@startuml
!pragma layout smetana
start
note right
String name()
end note
:return toString();;
stop
end
start
note right
String toString()
end note
:return head.name();;
stop
end
start
note right
constructor ArrowDressing(ArrowHead head,
ArrowPart part)
end note
:this.head=Objects.requireNonNull(head);;
:this.part=Objects.requireNonNull(part);;
end
start
note right
ArrowDressing create()
end note
:return new ArrowDressing(ArrowHead.NONE,
ArrowPart.FULL);;
stop
end
start
note right
ArrowDressing withHead(ArrowHead head)
end note
:return new ArrowDressing(head,part);;
stop
end
start
note right
ArrowDressing withPart(ArrowPart part)
end note
:return new ArrowDressing(head,part);;
stop
end
start
note right
ArrowHead getHead()
end note
:return head;;
stop
end
start
note right
ArrowPart getPart()
end note
:return part;;
stop
end
@enduml

