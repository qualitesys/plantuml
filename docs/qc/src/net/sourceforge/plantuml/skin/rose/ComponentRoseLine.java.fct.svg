@startuml
!pragma layout smetana
start
note right
constructor ComponentRoseLine(Stylestyle,
booleancontinueLine,HColorSetset)
end note
:super (style);;
:this.color=style.value(PName.LineColor).asColor(set);;
:this.stroke=style.getStroke();;
:this.continueLine=continueLine;;
end
start
note right
void drawInternalU(UGraphicug,Areaarea)
end note
:final XDimension2DdimensionToUse=area.getDimensionToUse();;
:ug=ug.apply(color);;
:ug=ug.apply(stroke);;
:final intx=(int)(dimensionToUse.getWidth()/2);;
:ug.apply(UTranslate.dx(x)).draw(ULine.vline(dimensionToUse.getHeight()));;
end
start
note right
doublegetPreferredHeight(StringBounderstringBounder)
end note
:return 20;;
stop
end
start
note right
doublegetPreferredWidth(StringBounderstringBounder)
end note
:return 1;;
stop
end
@enduml

