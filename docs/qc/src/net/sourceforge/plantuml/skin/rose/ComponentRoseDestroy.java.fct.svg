@startuml
!pragma layout smetana
start
note right
constructor ComponentRoseDestroy(Style style,
HColor foregroundColor,ISkinSimple spriteContainer)
end note
:super (style);;
if (style!=null ) then (yes) 
:this.foregroundColor=style.value(PName.LineColor)
.asColor(spriteContainer.getIHtmlColorSet());;
else (no)
:this.foregroundColor=foregroundColor;;
endif 
end
start
note right
void drawInternalU(UGraphic ug,Area area)
end note
:ug=ug.apply(new UStroke(2)).apply(foregroundColor);;
:ug.draw(new ULine(2*crossSize,2*crossSize));;
:ug.apply(UTranslate.dy(2*crossSize)).draw(new ULine(2*crossSize,
-2*crossSize));;
end
start
note right
double getPreferredHeight(StringBounder stringBounder)
end note
:return crossSize*2;;
stop
end
start
note right
double getPreferredWidth(StringBounder stringBounder)
end note
:return crossSize*2;;
stop
end
@enduml

