@startuml
!pragma layout smetana
start
note right
constructor ComponentRoseNewpage(Style style,
HColor foregroundColor)
end note
:super (style);;
:this.foregroundColor=foregroundColor;;
end
start
note right
void drawInternalU(UGraphic ug,Area area)
end note
:final XDimension2D dimensionToUse=area.getDimensionToUse();;
:ug=ArrowConfiguration.stroke(ug,2,2,1).apply(foregroundColor);;
:ug.draw(ULine.hline(dimensionToUse.getWidth()));;
end
start
note right
double getPreferredHeight(StringBounder stringBounder)
end note
:return 1;;
stop
end
start
note right
double getPreferredWidth(StringBounder stringBounder)
end note
:return 0;;
stop
end
@enduml

