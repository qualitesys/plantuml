@startuml
!pragma layout smetana
start
note right
constructor ComponentRoseNewpage(Stylestyle,
HColorforegroundColor)
end note
:super (style);;
:this.foregroundColor=foregroundColor;;
end
start
note right
void drawInternalU(UGraphicug,Areaarea)
end note
:final XDimension2DdimensionToUse=area.getDimensionToUse();;
:ug=ArrowConfiguration.stroke(ug,2,2,1).apply(foregroundColor);;
:ug.draw(ULine.hline(dimensionToUse.getWidth()));;
end
start
note right
doublegetPreferredHeight(StringBounderstringBounder)
end note
:return 1;;
stop
end
start
note right
doublegetPreferredWidth(StringBounderstringBounder)
end note
:return 0;;
stop
end
@enduml

