@startuml
!pragma layout smetana
start
note right
constructor ComponentRoseDelayLine(Style style,
HColor color)
end note
:super (style);;
:this.color=color;;
end
start
note right
void drawInternalU(UGraphic ug,Area area)
end note
:final XDimension2D dimensionToUse=area.getDimensionToUse();;
:ug=ArrowConfiguration.stroke(ug,1,4,1).apply(color);;
:final int x=(int )(dimensionToUse.getWidth()/2);;
:ug.apply(UAntiAliasing.ANTI_ALIASING_OFF)
.apply(UTranslate.dx(x)).draw(ULine.vline(dimensionToUse.getHeight()));;
end
start
note right
double getPreferredHeight(StringBounder stringBounder)
end note
:return 20;;
stop
end
start
note right
double getPreferredWidth(StringBounder stringBounder)
end note
:return 1;;
stop
end
@enduml

