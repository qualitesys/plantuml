@startuml
!pragma layout smetana
start
note right
constructor ComponentRoseDelayText(Stylestyle,
DisplaystringsToDisplay,ISkinSimplespriteContainer)
end note
:super (style,LineBreakStrategy.NONE,0,0,
4,spriteContainer,stringsToDisplay,false);;
end
start
note right
void drawInternalU(UGraphicug,Areaarea)
end note
:final XDimension2DdimensionToUse=area.getDimensionToUse();;
:final TextBlocktextBlock=getTextBlock();;
:final StringBounderstringBounder=ug.getStringBounder();;
:final doubletextWidth=getTextWidth(stringBounder);;
:final doubletextHeight=getTextHeight(stringBounder);;
:final doublexpos=(dimensionToUse.getWidth()-textWidth)/2;;
:final doubleypos=(dimensionToUse.getHeight()-textHeight)/2;;
:textBlock.drawU(ug.apply(new UTranslate(xpos,(ypos+
getMarginY()))));;
end
start
note right
doublegetPreferredHeight(StringBounderstringBounder)
end note
:return getTextHeight(stringBounder)+20;;
stop
end
start
note right
doublegetPreferredWidth(StringBounderstringBounder)
end note
:return getPureTextWidth(stringBounder);;
stop
end
@enduml

