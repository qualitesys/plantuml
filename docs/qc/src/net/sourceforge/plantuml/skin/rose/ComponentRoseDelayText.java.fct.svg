@startuml
!pragma layout smetana
start
note right
constructor ComponentRoseDelayText(Style style,
Display stringsToDisplay,ISkinSimple spriteContainer)
end note
:super (style,LineBreakStrategy.NONE,0,0,
4,spriteContainer,stringsToDisplay,false);;
end
start
note right
void drawInternalU(UGraphic ug,Area area)
end note
:final XDimension2D dimensionToUse=area.getDimensionToUse();;
:final TextBlock textBlock=getTextBlock();;
:final StringBounder stringBounder=ug.getStringBounder();;
:final double textWidth=getTextWidth(stringBounder);;
:final double textHeight=getTextHeight(stringBounder);;
:final double xpos=(dimensionToUse.getWidth()-textWidth)/2;;
:final double ypos=(dimensionToUse.getHeight()-textHeight)/2;;
:textBlock.drawU(ug.apply(new UTranslate(xpos,(ypos+
getMarginY()))));;
end
start
note right
double getPreferredHeight(StringBounder stringBounder)
end note
:return getTextHeight(stringBounder)+20;;
stop
end
start
note right
double getPreferredWidth(StringBounder stringBounder)
end note
:return getPureTextWidth(stringBounder);;
stop
end
@enduml

