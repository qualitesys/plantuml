@startuml
!pragma layout smetana
start
note right
constructor ComponentRoseQueue(Style style,
Style stereo,Display stringsToDisplay,boolean head,
ISkinSimple spriteContainer)
end note
:super (style,stereo,LineBreakStrategy.NONE,
3,3,0,spriteContainer,stringsToDisplay,false);;
:final SymbolContext biColor=style.getSymbolContext(getIHtmlColorSet());;
:this.head=head;;
:this.stickman=USymbols.QUEUE.asSmall(TextBlockUtils.empty(0,
0),getTextBlock(),TextBlockUtils.empty(0,
0),biColor,HorizontalAlignment.CENTER);;
end
start
note right
void drawInternalU(UGraphic ug,Area area)
end note
:final StringBounder stringBounder=ug.getStringBounder();;
:final XDimension2D dimStickman=stickman.calculateDimension(stringBounder);;
:final double delta=(getPreferredWidth(stringBounder)-dimStickman.getWidth())/2;;
:ug=ug.apply(UTranslate.dx(delta));;
:stickman.drawU(ug);;
end
start
note right
double getPreferredHeight(StringBounder stringBounder)
end note
:final XDimension2D dimStickman=stickman.calculateDimension(stringBounder);;
:return dimStickman.getHeight();;
stop
end
start
note right
double getPreferredWidth(StringBounder stringBounder)
end note
:final XDimension2D dimStickman=stickman.calculateDimension(stringBounder);;
:return dimStickman.getWidth();;
stop
end
@enduml

