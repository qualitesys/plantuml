@startuml
!pragma layout smetana
start
note right
constructor ComponentRoseQueue(Stylestyle,
Stylestereo,DisplaystringsToDisplay,booleanhead,
ISkinSimplespriteContainer)
end note
:super (style,stereo,LineBreakStrategy.NONE,
3,3,0,spriteContainer,stringsToDisplay,false);;
:final SymbolContextbiColor=style.getSymbolContext(getIHtmlColorSet());;
:this.head=head;;
:this.stickman=USymbols.QUEUE.asSmall(TextBlockUtils.empty(0,
0),getTextBlock(),TextBlockUtils.empty(0,
0),biColor,HorizontalAlignment.CENTER);;
end
start
note right
void drawInternalU(UGraphicug,Areaarea)
end note
:final StringBounderstringBounder=ug.getStringBounder();;
:final XDimension2DdimStickman=stickman.calculateDimension(stringBounder);;
:final doubledelta=(getPreferredWidth(stringBounder)-dimStickman.getWidth())/2;;
:ug=ug.apply(UTranslate.dx(delta));;
:stickman.drawU(ug);;
end
start
note right
doublegetPreferredHeight(StringBounderstringBounder)
end note
:final XDimension2DdimStickman=stickman.calculateDimension(stringBounder);;
:return dimStickman.getHeight();;
stop
end
start
note right
doublegetPreferredWidth(StringBounderstringBounder)
end note
:final XDimension2DdimStickman=stickman.calculateDimension(stringBounder);;
:return dimStickman.getWidth();;
stop
end
@enduml

