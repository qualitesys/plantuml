@startuml
!pragma layout smetana
start
note right
constructor AbstractComponentRoseArrow(Stylestyle,
DisplaystringsToDisplay,ArrowConfigurationarrowConfiguration,
ISkinSimplespriteContainer,LineBreakStrategymaxMessageSize)
end note
:super (style,maxMessageSize,7,7,1,spriteContainer,
stringsToDisplay,false);;
:this.foregroundColor=style.value(PName.LineColor)
.asColor(getIHtmlColorSet());;
:final UStrokestroke=style.getStroke();;
:this.arrowConfiguration=arrowConfiguration.withThickness(stroke.getThickness());;
end
start
note right
TextBlockgetTextBlock()
end note
:final Padderpadder=getISkinSimple() instanceof ISkinParam? ((ISkinParam)getISkinSimple())
.sequenceDiagramPadder():Padder.NONE;;
:return padder.apply(super .getTextBlock());;
stop
end
start
note right
HColorgetForegroundColor()
end note
:return foregroundColor;;
stop
end
start
note right
intgetArrowDeltaX()
end note
:return arrowDeltaX;;
stop
end
start
note right
intgetArrowDeltaY()
end note
:return arrowDeltaY;;
stop
end
start
note right
doublegetPaddingY()
end note
:return 4;;
stop
end
start
note right
ArrowConfigurationgetArrowConfiguration()
end note
:return arrowConfiguration;;
stop
end
@enduml

