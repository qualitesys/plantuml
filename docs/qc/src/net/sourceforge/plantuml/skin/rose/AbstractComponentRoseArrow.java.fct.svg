@startuml
!pragma layout smetana
start
note right
constructor AbstractComponentRoseArrow(Style style,
Display stringsToDisplay,ArrowConfiguration arrowConfiguration,
ISkinSimple spriteContainer,LineBreakStrategy maxMessageSize)
end note
:super (style,maxMessageSize,7,7,1,spriteContainer,
stringsToDisplay,false);;
:this.foregroundColor=style.value(PName.LineColor)
.asColor(getIHtmlColorSet());;
:final UStroke stroke=style.getStroke();;
:this.arrowConfiguration=arrowConfiguration.withThickness(stroke.getThickness());;
end
start
note right
TextBlock getTextBlock()
end note
:final Padder padder=getISkinSimple() instanceof ISkinParam ? ((ISkinParam )getISkinSimple())
.sequenceDiagramPadder():Padder.NONE;;
:return padder.apply(super .getTextBlock());;
stop
end
start
note right
HColor getForegroundColor()
end note
:return foregroundColor;;
stop
end
start
note right
int getArrowDeltaX()
end note
:return arrowDeltaX;;
stop
end
start
note right
int getArrowDeltaY()
end note
:return arrowDeltaY;;
stop
end
start
note right
double getPaddingY()
end note
:return 4;;
stop
end
start
note right
ArrowConfiguration getArrowConfiguration()
end note
:return arrowConfiguration;;
stop
end
@enduml

