@startuml
!pragma layout smetana
start
note right
constructor ComponentRoseEnglober(Stylestyle,
Displaystrings,ISkinSimplespriteContainer)
end note
:super (style,LineBreakStrategy.NONE,3,3,
1,spriteContainer,strings,false);;
:this.roundCorner=style.value(PName.RoundCorner)
.asDouble();;
:this.symbolContext=style.getSymbolContext(getIHtmlColorSet());;
end
start
note right
void drawBackgroundInternalU(UGraphicug,Areaarea)
end note
:final XDimension2DdimensionToUse=area.getDimensionToUse();;
:ug=symbolContext.apply(ug);;
:ug.draw(new URectangle(dimensionToUse.getWidth(),
dimensionToUse.getHeight()).rounded(roundCorner));;
:final doublexpos=(dimensionToUse.getWidth()-getPureTextWidth(ug.getStringBounder()))/2;;
:getTextBlock().drawU(ug.apply(UTranslate.dx(xpos)));;
end
start
note right
void drawInternalU(UGraphicug,Areaarea)
end note
end
start
note right
doublegetPreferredHeight(StringBounderstringBounder)
end note
:return getTextHeight(stringBounder)+3;;
stop
end
start
note right
doublegetPreferredWidth(StringBounderstringBounder)
end note
:return getTextWidth(stringBounder);;
stop
end
@enduml

