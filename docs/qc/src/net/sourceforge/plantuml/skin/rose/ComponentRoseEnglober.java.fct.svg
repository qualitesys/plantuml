@startuml
!pragma layout smetana
start
note right
constructor ComponentRoseEnglober(Style style,
Display strings,ISkinSimple spriteContainer)
end note
:super (style,LineBreakStrategy.NONE,3,3,
1,spriteContainer,strings,false);;
:this.roundCorner=style.value(PName.RoundCorner)
.asDouble();;
:this.symbolContext=style.getSymbolContext(getIHtmlColorSet());;
end
start
note right
void drawBackgroundInternalU(UGraphic ug,
Area area)
end note
:final XDimension2D dimensionToUse=area.getDimensionToUse();;
:ug=symbolContext.apply(ug);;
:ug.draw(new URectangle(dimensionToUse.getWidth(),
dimensionToUse.getHeight()).rounded(roundCorner));;
:final double xpos=(dimensionToUse.getWidth()-getPureTextWidth(ug.getStringBounder()))/2;;
:getTextBlock().drawU(ug.apply(UTranslate.dx(xpos)));;
end
start
note right
void drawInternalU(UGraphic ug,Area area)
end note
end
start
note right
double getPreferredHeight(StringBounder stringBounder)
end note
:return getTextHeight(stringBounder)+3;;
stop
end
start
note right
double getPreferredWidth(StringBounder stringBounder)
end note
:return getTextWidth(stringBounder);;
stop
end
@enduml

