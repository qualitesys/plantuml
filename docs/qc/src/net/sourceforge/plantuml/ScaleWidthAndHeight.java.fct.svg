@startuml
!pragma layout smetana
start
note right
constructor ScaleWidthAndHeight(double maxWidth,
double maxHeight)
end note
:this.maxWidth=maxWidth;;
:this.maxHeight=maxHeight;;
end
start
note right
double getScaleInternal(double width,double height)
end note
:final double scale1=maxWidth/width;;
:final double scale2=maxHeight/height;;
:return Math.min(scale1,scale2);;
stop
end
@enduml

