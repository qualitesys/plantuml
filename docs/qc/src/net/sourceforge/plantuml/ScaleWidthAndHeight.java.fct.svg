@startuml
!pragma layout smetana
start
note right
constructor ScaleWidthAndHeight(doublemaxWidth,
doublemaxHeight)
end note
:this.maxWidth=maxWidth;;
:this.maxHeight=maxHeight;;
end
start
note right
doublegetScaleInternal(doublewidth,doubleheight)
end note
:final doublescale1=maxWidth/width;;
:final doublescale2=maxHeight/height;;
:return Math.min(scale1,scale2);;
stop
end
@enduml

