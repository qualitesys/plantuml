@startuml
!pragma layout smetana
start
note right
void apply(SecurityAuthentication authentication,
URLConnection connection)
end note
if (!header.getKey().startsWith("headers.")||header.getValue()==null ) then (yes) 
:continue ;;
endif 
:String key=header.getKey().substring(8);;
:String value=header.getValue().toString();;
:connection.setRequestProperty(key,value);;
end
@enduml

