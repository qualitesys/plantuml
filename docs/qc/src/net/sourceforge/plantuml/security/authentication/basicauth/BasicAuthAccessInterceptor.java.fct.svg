@startuml
!pragma layout smetana
start
note right
void apply(SecurityAuthentication authentication,
URLConnection connection)
end note
:String auth=getAuth(authentication);;
:String authorization=Base64Coder.encodeString(auth);;
:String authHeaderValue="Basic "+authorization;;
:connection.setRequestProperty("Authorization",
authHeaderValue);;
end
start
note right
String getAuth(SecurityAuthentication authentication)
end note
:String id=(String )authentication.getTokens()
.get("identifier");;
:char[] secret=(char[] )authentication.getTokens()
.get("secret");;
:StringBuilder auth=new StringBuilder();;
if (StringUtils.isNotEmpty(id)) then (yes) 
:auth.append(id);;
if (secret!=null &&secret.length>0) then (yes) 
:auth.append(':').append(secret);;
endif 
endif 
:return auth.toString();;
stop
end
@enduml

