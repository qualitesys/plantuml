@startuml
!pragma layout smetana
start
note right
void apply(SecurityAuthenticationauthentication,
URLConnectionconnection)
end note
:Stringauth=getAuth(authentication);;
:Stringauthorization=Base64Coder.encodeString(auth);;
:StringauthHeaderValue="Basic "+authorization;;
:connection.setRequestProperty("Authorization",
authHeaderValue);;
end
start
note right
StringgetAuth(SecurityAuthenticationauthentication)
end note
:Stringid=(String)authentication.getTokens()
.get("identifier");;
:char[]secret=(char[])authentication.getTokens()
.get("secret");;
:StringBuilderauth=new StringBuilder();;
if (StringUtils.isNotEmpty(id)) then (yes) 
:auth.append(id);;
if (secret!=null &&secret.length>0) then (yes) 
:auth.append(':').append(secret);;
endif 
endif 
:return auth.toString();;
stop
end
@enduml

