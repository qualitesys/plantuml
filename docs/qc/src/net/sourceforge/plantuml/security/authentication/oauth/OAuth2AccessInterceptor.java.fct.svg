@startuml
!pragma layout smetana
start
note right
void apply(SecurityAuthenticationauthentication,
URLConnectionconnection)
end note
:connection.setRequestProperty("Authorization",
getAuth(authentication));;
end
start
note right
StringgetAuth(SecurityAuthenticationauthentication)
end note
:StringaccessToken=(String)authentication.getTokens()
.get(OAuth2Tokens.ACCESS_TOKEN.key());;
:Stringtype=(String)authentication.getTokens()
.get(OAuth2Tokens.TOKEN_TYPE.key());;
:return StringUtils.capitalize(type)+' '+
accessToken;;
stop
end
@enduml

