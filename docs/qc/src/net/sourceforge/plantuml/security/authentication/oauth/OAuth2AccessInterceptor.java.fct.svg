@startuml
!pragma layout smetana
start
note right
void apply(SecurityAuthentication authentication,
URLConnection connection)
end note
:connection.setRequestProperty("Authorization",
getAuth(authentication));;
end
start
note right
String getAuth(SecurityAuthentication authentication)
end note
:String accessToken=(String )authentication.getTokens()
.get(OAuth2Tokens.ACCESS_TOKEN.key());;
:String type=(String )authentication.getTokens()
.get(OAuth2Tokens.TOKEN_TYPE.key());;
:return StringUtils.capitalize(type)+' '+
accessToken;;
stop
end
@enduml

