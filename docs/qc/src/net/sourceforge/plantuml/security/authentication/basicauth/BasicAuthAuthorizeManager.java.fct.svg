@startuml
!pragma layout smetana
start
note right
SecurityAuthenticationcreate(SecurityCredentialscredentials)
end note
:Stringtype=credentials.getType();;
:Stringidentifier=credentials.getIdentifier();;
:char[]secret=credentials.getSecret();;
:Map<String,Object>tokens=new HashMap<String,
Object>();;
:tokens.put("identifier",identifier);;
if (secret!=null ) then (yes) 
:tokens.put("secret",secret.clone());;
endif 
:return new SecurityAuthentication(type,tokens);;
stop
end
@enduml

