@startuml
!pragma layout smetana
start
note right
SecurityAuthenticationcreate(SecurityCredentialscredentials)
end note
:StringgrantType=credentials.getPropertyStr("grantType");;
:StringrequestScope=credentials.getPropertyStr("scope");;
:StringaccessTokenUri=credentials.getPropertyStr("accessTokenUri");;
:StringtokenType=credentials.getPropertyStr("tokenType");;
:Stringusername=credentials.getPropertyStr("resourceOwner.identifier");;
:char[]password=credentials.getPropertyChars("resourceOwner.secret");;
switch (try/catch block)
case (try)
:SURLtokenService=SURL.create(accessTokenUri);;
:StringBuildercontent=new StringBuilder()
.append("grant_type=").append(urlEncode(grantType));;
if (StringUtils.isNotEmpty(requestScope)) then (yes) 
:content.append("&scope=").append(urlEncode(requestScope));;
endif 
:SecurityAuthenticationbasicAuth=basicAuthManager.create(SecurityCredentials.basicAuth(credentials.getIdentifier(),
credentials.getSecret()));;
:content.append("&username=").append(urlEncode(username))
.append("&password=").append(urlEncode(new String(password)));;
:return requestAndCreateAuthFromResponse(credentials.getProxy(),
grantType,tokenType,tokenService,content.toString(),
basicAuth);;
stop
endswitch
end
@enduml

