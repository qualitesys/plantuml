@startuml
!pragma layout smetana
start
note right
constructor TickInPlayer(Playerplayer,TimeTicktick)
end note
:this.player=Objects.requireNonNull(player);;
:this.tick=tick;;
end
start
note right
PlayergetPlayer()
end note
:return player;;
stop
end
start
note right
TimeTickgetTick()
end note
:return tick;;
stop
end
@enduml

