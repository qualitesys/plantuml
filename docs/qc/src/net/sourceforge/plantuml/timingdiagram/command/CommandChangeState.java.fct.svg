@startuml
!pragma layout smetana
start
note right
constructor CommandChangeState(IRegexpattern)
end note
:super (pattern);;
end
start
note right
ColorParsercolor()
end note
:return ColorParser.simpleColor(ColorType.BACK);;
stop
end
start
note right
CommandExecutionResultaddState(TimingDiagramdiagram,
RegexResultarg,final Playerplayer,final TimeTicknow)
end note
:final Stringcomment=arg.get("COMMENT",0);;
:final Colorscolors=color().getColor(arg,
diagram.getSkinParam().getIHtmlColorSet());;
:player.setState(now,comment,colors,getStates(arg));;
:return CommandExecutionResult.ok();;
stop
end
start
note right
String[]getStates(RegexResultarg)
end note
if (arg.get("STATE7",0)!=null ) then (yes) 
:final Stringstate1=arg.get("STATE7",0);;
:final Stringstate2=arg.get("STATE7",1);;
:return new String[]{state1,state2};;
stop
endif 
:return new String[]{arg.getLazzy("STATE",
0)};;
stop
end
start
note right
IRegexgetStateOrHidden()
end note
:return new RegexOr(new RegexLeaf("STATE1",
"[%g]([^%g]*)[%g]"),new RegexLeaf("STATE2",
STATE_CODE),new RegexLeaf("STATE3","(\\{hidden\\})"),
new RegexLeaf("STATE4","(\\{\\.\\.\\.\\})"),new RegexLeaf("STATE5","(\\{-\\})"),new RegexLeaf("STATE6","(\\{\\?\\})"),new RegexLeaf("STATE7","(?:\\{"+
STATE_CODE+","+STATE_CODE+"\\})"));;
stop
end
@enduml

