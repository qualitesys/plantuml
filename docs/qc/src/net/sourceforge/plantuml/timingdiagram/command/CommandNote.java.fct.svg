@startuml
!pragma layout smetana
start
note right
constructor CommandNote()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandNote.class .getName(),
RegexLeaf.start(),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("note"),RegexLeaf.spaceOneOrMore(),
new RegexLeaf("POSITION","(top|bottom)"),
RegexLeaf.spaceOneOrMore(),new RegexLeaf("of"),
RegexLeaf.spaceOneOrMore(),new RegexLeaf("CODE",CommandTimeMessage.PLAYER_CODE),RegexLeaf.spaceZeroOrMore(),new RegexLeaf(":"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("NOTE","(.+
)"),RegexLeaf.spaceZeroOrMore(),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(TimingDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:final Stringcode=arg.get("CODE",0);;
:final Playerplayer=diagram.getPlayer(code);;
if (player==null ) then (yes) 
:return CommandExecutionResult.error("Unkown \""+
code+"\"");;
stop
endif 
:final Displaynote=Display.getWithNewlines(arg.get("NOTE",
0));;
:final TimeTicknow=diagram.getNow();;
:player.addNote(now,note,Position.fromString(arg.get("POSITION",
0)));;
:return CommandExecutionResult.ok();;
stop
end
@enduml

