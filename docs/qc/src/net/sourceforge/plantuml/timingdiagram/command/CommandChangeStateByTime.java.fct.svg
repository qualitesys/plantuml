@startuml
!pragma layout smetana
start
note right
constructor CommandChangeStateByTime()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandChangeStateByTime.class .getName(),
RegexLeaf.start(),RegexLeaf.spaceZeroOrMore(),
TimeTickBuilder.expressionAtWithoutArobase("TIME"),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf("is"),
RegexLeaf.spaceZeroOrMore(),getStateOrHidden(),
RegexLeaf.spaceZeroOrMore(),color().getRegex(),
RegexLeaf.spaceZeroOrMore(),new RegexOptional(new RegexConcat(RegexLeaf.spaceZeroOrMore(),
new RegexLeaf(":"),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("COMMENT","(.*?)"))),RegexLeaf.spaceZeroOrMore(),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(TimingDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final Player player=diagram.getLastPlayer();;
if (player==null ) then (yes) 
:return CommandExecutionResult.error("Missing @ line before this");;
stop
endif 
:final TimeTick tick=TimeTickBuilder.parseTimeTick("TIME",
arg,diagram);;
:diagram.addTime(tick,null );;
:return addState(diagram,arg,player,tick);;
stop
end
@enduml

