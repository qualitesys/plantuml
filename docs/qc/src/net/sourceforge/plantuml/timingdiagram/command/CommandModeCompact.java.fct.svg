@startuml
!pragma layout smetana
start
note right
constructor CommandModeCompact()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandModeCompact.class .getName(),
RegexLeaf.start(),new RegexLeaf("mode"),RegexLeaf.spaceOneOrMore(),
new RegexLeaf("compact"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(TimingDiagram diagram,
LineLocation location,RegexResult arg)
end note
:diagram.goCompactMode();;
:return CommandExecutionResult.ok();;
stop
end
@enduml

