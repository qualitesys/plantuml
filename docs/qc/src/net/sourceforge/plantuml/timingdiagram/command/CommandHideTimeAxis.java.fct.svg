@startuml
!pragma layout smetana
start
note right
constructor CommandHideTimeAxis()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandHideTimeAxis.class .getName(),
RegexLeaf.start(),new RegexLeaf("COMMAND",
"(hide|manual)"),RegexLeaf.spaceOneOrMore(),
new RegexLeaf("time"),new RegexLeaf(".?"),
new RegexLeaf("axis"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(TimingDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:final Stringcmd=arg.get("COMMAND",0);;
if (String.valueOf("MANUAL").equalsIgnoreCase(cmd)) then (yes) 
:return diagram.setTimeAxisStategy(TimeAxisStategy.MANUAL);;
stop
endif 
:return diagram.setTimeAxisStategy(TimeAxisStategy.HIDDEN);;
stop
end
@enduml

