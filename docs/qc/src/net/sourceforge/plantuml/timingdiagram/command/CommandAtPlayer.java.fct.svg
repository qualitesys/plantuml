818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="241" x2="241" y1="780.1211" y2="800.1211"/><polygon fill="#181818" points="237,790.1211,241,800.1211,245,790.1211,241,794.1211" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[d14d9727a212cc65b2bed003ba8f760c]
@startuml
!pragma layout smetana
start
note right
constructor CommandAtPlayer()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandAtPlayer.class .getName(),
RegexLeaf.start(),new RegexLeaf("@"),new RegexLeaf("PLAYER",
CommandTimeMessage.PLAYER_CODE),RegexLeaf.spaceZeroOrMore(),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(TimingDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final String code=arg.get("PLAYER",0);;
:final Player player=diagram.getPlayer(code);;
if (player==null ) then (yes) 
:return CommandExecutionResult.error("No such participant "+
code);;
stop
endif 
:diagram.setLastPlayer(player);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

