@startuml
!pragma layout smetana
start
note right
constructor CommandChangeStateByPlayerCode()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandChangeStateByPlayerCode.class .getName(),
RegexLeaf.start(),new RegexLeaf("CODE",CommandTimeMessage.PLAYER_CODE),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf("is"),
RegexLeaf.spaceZeroOrMore(),getStateOrHidden(),
RegexLeaf.spaceZeroOrMore(),color().getRegex(),
RegexLeaf.spaceZeroOrMore(),new RegexOptional(new RegexConcat(RegexLeaf.spaceZeroOrMore(),
new RegexLeaf(":"),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("COMMENT","(.*?)"))),RegexLeaf.spaceZeroOrMore(),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(TimingDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final String code=arg.get("CODE",0);;
:final Player player=diagram.getPlayer(code);;
if (player==null ) then (yes) 
:return CommandExecutionResult.error("Unkown \""+
code+"\"");;
stop
endif 
:final TimeTick now=diagram.getNow();;
:return addState(diagram,arg,player,now);;
stop
end
@enduml

