@startuml
!pragma layout smetana
start
note right
constructor CommandTicks()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandTicks.class .getName(),RegexLeaf.start(),new RegexLeaf("PLAYER","([%pLN_.@]+
)"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("ticks"),
RegexLeaf.spaceOneOrMore(),new RegexLeaf("num"),
RegexLeaf.spaceOneOrMore(),new RegexLeaf("on"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("multiple"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("NUM","([0-9]+
)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(TimingDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final String code=arg.get("PLAYER",0);;
:final Player player=diagram.getPlayer(code);;
if (player==null ) then (yes) 
:return CommandExecutionResult.error("No such participant "+
code);;
stop
endif 
if (player instanceof PlayerAnalog ) then (yes) 
:((PlayerAnalog )player).setTicks(Integer.parseInt(arg.get("NUM",
0)));;
endif 
:return CommandExecutionResult.ok();;
stop
end
@enduml

