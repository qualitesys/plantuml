@startuml
!pragma layout smetana
start
note right
constructor CommandTimeMessage()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandTimeMessage.class .getName(),
RegexLeaf.start(),new RegexLeaf("PART1",PLAYER_CODE),TimeTickBuilder.optionalExpressionAtWithArobase("TIME1"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("ARROW_BODY","(-+
)"),new RegexLeaf("ARROW_STYLE","(?:\\[("+
CommandLinkElement.LINE_STYLE+")\\])?"),new RegexLeaf("ARROW_HEAD",
"\\>"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("PART2",
PLAYER_CODE),TimeTickBuilder.optionalExpressionAtWithArobase("TIME2"),
RegexLeaf.spaceZeroOrMore(),new RegexOptional(new RegexConcat(new RegexLeaf(":"),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf("MESSAGE",
"(.*)"))),RegexLeaf.spaceZeroOrMore(),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(TimingDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:final Playerplayer1=diagram.getPlayer(arg.get("PART1",
0));;
if (player1==null ) then (yes) 
:return CommandExecutionResult.error("No such element: "+
arg.get("PART1",0));;
stop
endif 
:final Playerplayer2=diagram.getPlayer(arg.get("PART2",
0));;
if (player2==null ) then (yes) 
:return CommandExecutionResult.error("No such element: "+
arg.get("PART2",0));;
stop
endif 
:final TimeTicktick1=TimeTickBuilder.parseTimeTick("TIME1",
arg,diagram);;
:final TimeTicktick2=TimeTickBuilder.parseTimeTick("TIME2",
arg,diagram);;
:final TimeMessageresult=diagram.createTimeMessage(player1,
tick1,player2,tick2,arg.get("MESSAGE",0));;
:result.applyStyle(arg.getLazzy("ARROW_STYLE",
0));;
:return CommandExecutionResult.ok();;
stop
end
@enduml

