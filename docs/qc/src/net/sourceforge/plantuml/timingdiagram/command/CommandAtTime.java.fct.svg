@startuml
!pragma layout smetana
start
note right
constructor CommandAtTime()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandAtTime.class .getName(),
RegexLeaf.start(),TimeTickBuilder.expressionAtWithArobase("TIME"),
new RegexOptional(new RegexConcat(RegexLeaf.spaceOneOrMore(),new RegexLeaf("as"),RegexLeaf.spaceOneOrMore(),new RegexLeaf(":"),new RegexLeaf("CODE","([%pLN_.]+
)"))),RegexLeaf.spaceZeroOrMore(),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(TimingDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final TimeTick timeTick=TimeTickBuilder.parseTimeTick("TIME",
arg,diagram);;
if (timeTick==null ) then (yes) 
:return CommandExecutionResult.error("What time?");;
stop
endif 
:final String code=arg.get("CODE",0);;
:diagram.addTime(timeTick,code);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

