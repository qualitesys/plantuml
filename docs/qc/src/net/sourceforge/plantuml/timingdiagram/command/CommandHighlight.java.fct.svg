@startuml
!pragma layout smetana
start
note right
constructor CommandHighlight()
end note
:super (getRegexConcat());;
end
start
note right
ColorParsercolor()
end note
:return ColorParser.simpleColor(ColorType.BACK);;
stop
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandHighlight.class .getName(),
RegexLeaf.start(),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("highlight"),RegexLeaf.spaceOneOrMore(),
TimeTickBuilder.expressionAtWithoutArobase("FROM"),
RegexLeaf.spaceOneOrMore(),new RegexLeaf("to"),
RegexLeaf.spaceOneOrMore(),TimeTickBuilder.expressionAtWithoutArobase("TO"),
RegexLeaf.spaceZeroOrMore(),color().getRegex(),
RegexLeaf.spaceZeroOrMore(),new RegexOptional(new RegexConcat(new RegexLeaf(":"),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf("CAPTION",
"(.*)"))),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(TimingDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:final TimeTicktickFrom=TimeTickBuilder.parseTimeTick("FROM",
arg,diagram);;
:final TimeTicktickTo=TimeTickBuilder.parseTimeTick("TO",
arg,diagram);;
:final Displaydisplay=Display.getWithNewlines(arg.get("CAPTION",
0));;
:final Colorscolors=color().getColor(arg,
diagram.getSkinParam().getIHtmlColorSet());;
:return diagram.highlight(tickFrom,tickTo,
display,colors);;
stop
end
@enduml

