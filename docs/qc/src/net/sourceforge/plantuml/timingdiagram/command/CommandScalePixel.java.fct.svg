@startuml
!pragma layout smetana
start
note right
constructor CommandScalePixel()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandScalePixel.class .getName(),RegexLeaf.start(),new RegexLeaf("scale"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("TICK","(\\d+
)"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("as"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("PIXEL","(\\d+
)"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("pixels?"),
RegexLeaf.spaceZeroOrMore(),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(TimingDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:final longtick=Long.parseLong(arg.get("TICK",
0));;
:final longpixel=Long.parseLong(arg.get("PIXEL",
0));;
if (tick<=0||pixel<=0) then (yes) 
:return CommandExecutionResult.error("Bad value");;
stop
endif 
:diagram.scaleInPixels(tick,pixel);;
:return CommandExecutionResult.ok();;
stop
end
