@startuml
!pragma layout smetana
start
note right
constructor CommandNoteLong()
end note
:super (getRegexConcat(),MultilinesStrategy.REMOVE_STARTING_QUOTE,
Trim.BOTH);;
end
start
note right
StringgetPatternEnd()
end note
:return "^end[%s]?note$";;
stop
end
start
note right
CommandExecutionResultexecuteNow(final TimingDiagramdiagram,
BlocLineslines)
end note
:final RegexResultline0=getStartingPattern()
.matcher(lines.getFirst().getTrimmed().getString());;
:lines=lines.subExtract(1,1);;
:lines=lines.removeEmptyColumns();;
:final Stringcode=line0.get("CODE",0);;
:final Playerplayer=diagram.getPlayer(code);;
if (player==null ) then (yes) 
:return CommandExecutionResult.error("Unkown \""+
code+"\"");;
stop
endif 
:final Displaynote=lines.toDisplay();;
:final TimeTicknow=diagram.getNow();;
:player.addNote(now,note,Position.fromString(line0.get("POSITION",
0)));;
:return CommandExecutionResult.ok();;
stop
end
start
note right
IRegexgetRegexConcat()
