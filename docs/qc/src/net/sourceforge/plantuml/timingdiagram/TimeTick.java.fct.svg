h:1.0;"/><!--MD5=[3cad0c8431e4bb6c93195c8e3af2a218]
@startuml
!pragma layout smetana
start
note right
constructor TimeTick(BigDecimaltime,TimingFormatformat)
end note
:this.time=time;;
:this.format=format;;
end
start
note right
BigDecimalgetTime()
end note
:return time;;
stop
end
start
note right
intcompareTo(TimeTickother)
end note
:return this.time.compareTo(other.time);;
stop
end
start
note right
TimingFormatgetFormat()
end note
:return format;;
stop
end
start
note right
StringtoString()
end note
:return format.formatTime(time);;
stop
end
@enduml

