@startuml
!pragma layout smetana
start
note right
constructor HexaShape(doublewidth,doubleheight,
SymbolContextcontext)
end note
:this.width=width;;
:this.height=height;;
:this.context=context;;
end
start
note right
HexaShapecreate(doublewidth,doubleheight,
SymbolContextcontext)
end note
:return new HexaShape(width,height,context);;
stop
end
start
note right
void drawU(UGraphicug)
end note
:ug=context.apply(ug);;
:final UPolygonpolygon=new UPolygon();;
:polygon.addPoint(delta,0);;
:polygon.addPoint(width-delta,0);;
:polygon.addPoint(width,height/2);;
:polygon.addPoint(width-delta,height);;
:polygon.addPoint(delta,height);;
:polygon.addPoint(0,height/2);;
:ug.draw(polygon);;
end
@enduml

