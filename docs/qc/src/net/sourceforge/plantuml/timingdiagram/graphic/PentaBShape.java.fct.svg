@startuml
!pragma layout smetana
start
note right
constructor PentaBShape(double width,double height,
SymbolContext context)
end note
:this.width=width;;
:this.height=height;;
:this.context=context;;
end
start
note right
PentaBShape create(double width,double height,
SymbolContext context)
end note
:return new PentaBShape(width,height,context);;
stop
end
start
note right
void drawU(UGraphic ug)
end note
:final UPolygon polygon=new UPolygon();;
:polygon.addPoint(delta,0);;
:polygon.addPoint(width,0);;
:polygon.addPoint(width,height);;
:polygon.addPoint(delta,height);;
:polygon.addPoint(0,height/2);;
:context.withForeColor(context.getBackColor())
.apply(ug).draw(polygon);;
:final UPath path=new UPath();;
:path.moveTo(width,0);;
:path.lineTo(delta,0);;
:path.lineTo(0,height/2);;
:path.lineTo(delta,height);;
:path.lineTo(width,height);;
:context.apply(ug).draw(path);;
end
@enduml

