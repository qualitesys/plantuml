@startuml
!pragma layout smetana
start
note right
constructor IntricatedPoint(XPoint2D pta,
XPoint2D ptb)
end note
:this.pta=pta;;
:this.ptb=ptb;;
end
start
note right
XPoint2D getPointA()
end note
:return pta;;
stop
end
start
note right
XPoint2D getPointB()
end note
:return ptb;;
stop
end
start
note right
IntricatedPoint translated(UTranslate translate)
end note
:return new IntricatedPoint(translate.getTranslated(pta),
translate.getTranslated(ptb));;
stop
end
@enduml

