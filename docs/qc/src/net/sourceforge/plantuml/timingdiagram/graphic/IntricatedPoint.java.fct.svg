@startuml
!pragma layout smetana
start
note right
constructor IntricatedPoint(XPoint2Dpta,XPoint2Dptb)
end note
:this.pta=pta;;
:this.ptb=ptb;;
end
start
note right
XPoint2DgetPointA()
end note
:return pta;;
stop
end
start
note right
XPoint2DgetPointB()
end note
:return ptb;;
stop
end
start
note right
IntricatedPointtranslated(UTranslatetranslate)
end note
:return new IntricatedPoint(translate.getTranslated(pta),
translate.getTranslated(ptb));;
stop
end
@enduml

