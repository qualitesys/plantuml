@startuml
!pragma layout smetana
start
note right
constructor CommandNope()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandNope.class .getName(),
RegexLeaf.start(),RegexLeaf.spaceZeroOrMore(),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(Diagram diagram,
LineLocation location,RegexResult arg)
end note
:return CommandExecutionResult.ok();;
stop
end
@enduml

