@startuml
!pragma layout smetana
start
note right
void cleanList(List<StringLocated>lines)
end note
if (this==REMOVE_STARTING_QUOTE) then (yes) 
:filterQuote(lines);;
endif 
end
start
note right
void filterQuote(List<StringLocated>lines)
end note
:final StringLocateds=it.next();;
if (hasStartingQuote(s)) then (yes) 
:it.remove();;
endif 
end
start
note right
booleanhasStartingQuote(StringLocateds)
end note
:return s.getTrimmed().getString().startsWith("\'");;
stop
end
@enduml

