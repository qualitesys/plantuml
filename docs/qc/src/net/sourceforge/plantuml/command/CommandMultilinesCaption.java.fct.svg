@startuml
!pragma layout smetana
start
note right
constructor CommandMultilinesCaption()
end note
:super ("^caption$");;
end
start
note right
String getPatternEnd()
end note
:return "^end[%s]?caption$";;
stop
end
start
note right
CommandExecutionResult execute(final TitledDiagram diagram,
BlocLines lines)
end note
:lines=lines.subExtract(1,1);;
:lines=lines.removeEmptyColumns();;
:final Display strings=lines.toDisplay();;
if (strings.size()>0) then (yes) 
:diagram.setCaption(DisplayPositioned.single(strings.replaceBackslashT(),
HorizontalAlignment.CENTER,VerticalAlignment.BOTTOM));;
:return CommandExecutionResult.ok();;
stop
endif 
:return CommandExecutionResult.error("No caption defined");;
stop
end
@enduml

