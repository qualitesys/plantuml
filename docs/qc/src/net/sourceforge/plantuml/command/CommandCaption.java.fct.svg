end note
:return RegexConcat.build(CommandCaption.class .getName(),RegexLeaf.start(),new RegexLeaf("caption"),new RegexLeaf("(?:[%s]*:[%s]*|[%s]+
)"),new RegexOr(new RegexLeaf("DISPLAY1",
