@startuml
!pragma layout smetana
start
note right
constructor CommandMinwidth()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandMinwidth.class .getName(),RegexLeaf.start(),new RegexLeaf("minwidth"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("VALUE","(\\d+
)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(UmlDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final int minwidth=Integer.parseInt(arg.get("VALUE",
0));;
:diagram.setMinwidth(minwidth);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

