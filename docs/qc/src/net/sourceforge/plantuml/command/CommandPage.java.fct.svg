@startuml
!pragma layout smetana
start
note right
constructor CommandPage()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandPage.class .getName(),RegexLeaf.start(),new RegexLeaf("page"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("NB1","(\\d+
)"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("x*"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("NB2","(\\d+
)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(AbstractPSystemsystem,
LineLocationlocation,RegexResultarg)
end note
:final inthorizontal=Integer.parseInt(arg.get("NB1",
0));;
:final intvertical=Integer.parseInt(arg.get("NB2",
0));;
if (horizontal<=0||vertical<=0) then (yes) 
:return CommandExecutionResult.error("Argument must be positive");;
stop
endif 
:system.setSplitPagesHorizontal(horizontal);;
:system.setSplitPagesVertical(vertical);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

