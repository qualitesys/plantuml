@startuml
!pragma layout smetana
start
note right
constructor CommandScaleMaxWidthAndHeight()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandScaleMaxWidthAndHeight.class .getName(),
