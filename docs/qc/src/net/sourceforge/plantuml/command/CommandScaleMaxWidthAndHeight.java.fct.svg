)"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("[*x]"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("HEIGHT","([0-9.]+
)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(AbstractPSystemdiagram,
LineLocationlocation,RegexResultarg)
end note
:final doublewidth=Double.parseDouble(arg.get("WIDTH",
