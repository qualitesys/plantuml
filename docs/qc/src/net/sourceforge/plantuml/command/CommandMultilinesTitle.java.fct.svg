ke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="241" x2="241" y1="790.6523" y2="810.6523"/><polygon fill="#181818" points="237,800.6523,241,810.6523,245,800.6523,241,804.6523" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[f11e757bc0e81a570cca8ca2381d6fd1]
@startuml
!pragma layout smetana
start
note right
constructor CommandMultilinesTitle()
end note
:super ("^title$");;
end
start
note right
String getPatternEnd()
end note
:return "^end[%s]?title$";;
stop
end
start
note right
CommandExecutionResult execute(final TitledDiagram diagram,
BlocLines lines)
end note
:lines=lines.subExtract(1,1);;
:lines=lines.removeEmptyColumns();;
:final Display strings=lines.toDisplay();;
if (strings.size()>0) then (yes) 
:diagram.setTitle(DisplayPositioned.single(strings.replaceBackslashT(),
HorizontalAlignment.CENTER,VerticalAlignment.TOP));;
:return CommandExecutionResult.ok();;
stop
endif 
:return CommandExecutionResult.error("No title defined");;
stop
end
@enduml

