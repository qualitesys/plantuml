@startuml
!pragma layout smetana
start
note right
constructor CommandRotate()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandRotate.class .getName(),
RegexLeaf.start(),new RegexLeaf("rotate"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(UmlDiagram diagram,
LineLocation location,RegexResult arg)
end note
:diagram.setRotation(true);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

