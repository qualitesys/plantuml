@startuml
!pragma layout smetana
start
note right
constructor CommandRankDir()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandRankDir.class .getName(),
RegexLeaf.start(),new RegexLeaf("DIRECTION",
"(left[%s]to[%s]right|top[%s]to[%s]bottom)"),
RegexLeaf.spaceOneOrMore(),new RegexLeaf("direction"),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(TitledDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final String s=StringUtils.goUpperCase(arg.get("DIRECTION",
0)).replace(' ','_');;
:((SkinParam )diagram.getSkinParam()).setRankdir(Rankdir.valueOf(s));;
:return CommandExecutionResult.ok();;
stop
end
@enduml

