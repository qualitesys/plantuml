@startuml
!pragma layout smetana
start
note right
constructor CommandAssumeTransparent()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandAssumeTransparent.class .getName(),
RegexLeaf.start(),new RegexLeaf("!assume"),
RegexLeaf.spaceOneOrMore(),new RegexLeaf("transparent"),
RegexLeaf.spaceOneOrMore(),new RegexLeaf("TYPE",
"(dark|light)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(TitledDiagram system,
LineLocation location,RegexResult arg)
end note
:return CommandExecutionResult.ok();;
stop
end
@enduml

