@startuml
!pragma layout smetana
start
note right
constructor CommandConstraintOnLinks()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandConstraintOnLinks.class .getName(),
RegexLeaf.start(),new RegexLeaf("constraint"),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf("on"),
RegexLeaf.spaceOneOrMore(),new RegexLeaf("links"),
RegexLeaf.spaceZeroOrMore(),color().getRegex(),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf(":"),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf("NOTE",
"(.*)"),RegexLeaf.end());;
stop
end
start
note right
ColorParsercolor()
end note
:return ColorParser.simpleColor(ColorType.BACK);;
stop
end
start
note right
CommandExecutionResultexecuteArg(CucaDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:final List<Link>links=diagram.getTwoLastLinks();;
if (links==null ) then (yes) 
:return CommandExecutionResult.error("Cannot put constraint on two last links");;
stop
endif 
:final BlocLinesnote=BlocLines.getWithNewlines(arg.get("NOTE",
0));;
:return diagram.constraintOnLinks(links.get(0),
links.get(1),note.toDisplay());;
stop
end
@enduml

