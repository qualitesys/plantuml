@startuml
!pragma layout smetana
start
note right
constructor ProtectedCommand(Command<S> cmd)
end note
:this.cmd=Objects.requireNonNull(cmd);;
end
start
note right
CommandExecutionResult execute(S system,BlocLines lines)
end note
switch (try/catch block)
case (try)
:final CommandExecutionResult result=cmd.execute(system,
lines);;
:return result;;
stop
case (catch (Throwable t))
:Log.error("Error "+t);;
:Logme.error(t);;
:String msg="You should send a mail to plantuml@gmail.com or post to http://plantuml.com/qa with this log (V"+
Version.versionString()+")";;
:Log.error(msg);;
:msg+=" "+t.toString();;
:return CommandExecutionResult.error(msg,t);;
stop
endswitch
end
start
note right
CommandControl isValid(BlocLines lines)
end note
:return cmd.isValid(lines);;
stop
end
start
note right
String[] getDescription()
end note
:return cmd.getDescription();;
stop
end
@enduml

