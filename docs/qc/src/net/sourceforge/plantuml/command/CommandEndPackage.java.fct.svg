@startuml
!pragma layout smetana
start
note right
constructor CommandEndPackage()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandEndPackage.class .getName(),
RegexLeaf.start(),new RegexLeaf("\\}"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(AbstractEntityDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final IGroup currentPackage=diagram.getCurrentGroup();;
if (EntityUtils.groupRoot(currentPackage)) then (yes) 
:return CommandExecutionResult.error("No package or namespace defined");;
stop
endif 
:diagram.endGroup();;
:return CommandExecutionResult.ok();;
stop
end
@enduml

