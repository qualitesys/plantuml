@startuml
!pragma layout smetana
start
note right
constructor PSystemAbstractFactory(DiagramType type)
end note
:this.type=type;;
end
start
note right
PSystemError buildEmptyError(UmlSource source,
LineLocation lineLocation,List<StringLocated> trace)
end note
:final ErrorUml err=new ErrorUml(ErrorUmlType.SYNTAX_ERROR,
EMPTY_DESCRIPTION,0,lineLocation);;
:final PSystemError result=PSystemErrorUtils.buildV2(source,
err,null ,trace);;
:return result;;
stop
end
start
note right
PSystemError buildExecutionError(UmlSource source,
String stringError,LineLocation lineLocation,
List<StringLocated> trace)
end note
:final ErrorUml err=new ErrorUml(ErrorUmlType.EXECUTION_ERROR,
stringError,0,lineLocation);;
:final PSystemError result=PSystemErrorUtils.buildV2(source,
err,null ,trace);;
:return result;;
stop
end
start
note right
DiagramType getDiagramType()
end note
:return type;;
stop
end
@enduml

