@startuml
!pragma layout smetana
start
note right
constructor PSystemAbstractFactory(DiagramTypetype)
end note
:this.type=type;;
end
start
note right
PSystemErrorbuildEmptyError(UmlSourcesource,
LineLocationlineLocation,List<StringLocated>trace)
end note
:final ErrorUmlerr=new ErrorUml(ErrorUmlType.SYNTAX_ERROR,
EMPTY_DESCRIPTION,0,lineLocation);;
:final PSystemErrorresult=PSystemErrorUtils.buildV2(source,
err,null ,trace);;
:return result;;
stop
end
start
note right
PSystemErrorbuildExecutionError(UmlSourcesource,
StringstringError,LineLocationlineLocation,
List<StringLocated>trace)
end note
:final ErrorUmlerr=new ErrorUml(ErrorUmlType.EXECUTION_ERROR,
stringError,0,lineLocation);;
:final PSystemErrorresult=PSystemErrorUtils.buildV2(source,
