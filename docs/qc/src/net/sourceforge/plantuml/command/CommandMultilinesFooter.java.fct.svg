@startuml
!pragma layout smetana
start
note right
constructor CommandMultilinesFooter()
end note
:super ("^(?:(left|right|center)?[%s]*)footer$");;
end
start
note right
String getPatternEnd()
end note
:return "^end[%s]?footer$";;
stop
end
start
note right
CommandExecutionResult execute(final TitledDiagram diagram,
BlocLines lines)
end note
:lines=lines.trim();;
:final Matcher2 m=getStartingPattern().matcher(lines.getFirst()
.getTrimmed().getString());;
if (m.find()==false) then (yes) 
:throw new IllegalStateException();;
stop
endif 
:final String align=m.group(1);;
:lines=lines.subExtract(1,1);;
:final Display strings=lines.toDisplay();;
if (strings.size()>0) then (yes) 
:HorizontalAlignment ha=HorizontalAlignment.fromString(align,
HorizontalAlignment.CENTER);;
if (align==null ) then (yes) 
:ha=FontParam.FOOTER.getStyleDefinition(null )
.getMergedStyle(((UmlDiagram )diagram).getSkinParam().getCurrentStyleBuilder()).getHorizontalAlignment();;
endif 
:diagram.getFooter().putDisplay(strings,ha);;
:return CommandExecutionResult.ok();;
stop
endif 
:return CommandExecutionResult.error("Empty footer");;
stop
end
@enduml

