2" x2="582" y1="504.2813" y2="524.2813"/><polygon fill="#181818" points="578,514.2813,582,524.2813,586,514.2813,582,518.2813" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="582" x2="582" y1="622.25" y2="642.25"/><polygon fill="#181818" points="578,632.25,582,642.25,586,632.25,582,636.25" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="582" x2="582" y1="676.2188" y2="696.2188"/><polygon fill="#181818" points="578,686.2188,582,696.2188,586,686.2188,582,690.2188" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[60125fe3944897d0e66d0ef287eae04e]
@startuml
!pragma layout smetana
start
note right
constructor CommandScaleWidthOrHeight()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandScaleWidthOrHeight.class .getName(),RegexLeaf.start(),new RegexLeaf("scale"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("VALUE","([0-9.]+
)"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("WIDTH",
"(width|height)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(AbstractPSystem diagram,
LineLocation location,RegexResult arg)
end note
:final double size=Double.parseDouble(arg.get("VALUE",
0));;
:final boolean width=String.valueOf("width").equalsIgnoreCase(arg.get("WIDTH",
0));;
if (width) then (yes) 
:diagram.setScale(new ScaleWidth(size));;
else (no)
:diagram.setScale(new ScaleHeight(size));;
endif 
:return CommandExecutionResult.ok();;
stop
end
@enduml

