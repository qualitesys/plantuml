@startuml
!pragma layout smetana
start
note right
constructor CommandHeader()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandHeader.class .getName(),
RegexLeaf.start(),new RegexOptional(new RegexLeaf("POSITION",
"(left|right|center)")),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("header"),new RegexOr(new RegexConcat(RegexLeaf.spaceZeroOrMore(),
new RegexLeaf(":"),RegexLeaf.spaceZeroOrMore()),
RegexLeaf.spaceOneOrMore()),new RegexOr(new RegexLeaf("LABEL1",
"[%g](.*)[%g]"),new RegexLeaf("LABEL2","(.*[%pLN_.].*)")),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(TitledDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:final Stringalign=arg.get("POSITION",0);;
:HorizontalAlignmentha=HorizontalAlignment.fromString(align,
HorizontalAlignment.RIGHT);;
if (align==null ) then (yes) 
:ha=FontParam.HEADER.getStyleDefinition(null )
.getMergedStyle(diagram.getCurrentStyleBuilder()).getHorizontalAlignment();;
endif 
:final Displays=Display.getWithNewlines(arg.getLazzy("LABEL",
0));;
:diagram.getHeader().putDisplay(s,ha);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

