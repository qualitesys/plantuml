@startuml
!pragma layout smetana
start
note right
constructor CommandLegend()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandLegend.class .getName(),RegexLeaf.start(),new RegexLeaf("legend"),new RegexLeaf("(?:[%s]*:[%s]*|[%s]+
)"),new RegexOr(new RegexLeaf("LEGEND1","[%g](.*)[%g]"),
new RegexLeaf("LEGEND2","(.*[%pLN_.].*)")),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(TitledDiagram diagram,
LineLocation location,RegexResult arg)
end note
:final Display s=Display.getWithNewlines(arg.getLazzy("LEGEND",
0));;
:diagram.setLegend(DisplayPositioned.single(s,
HorizontalAlignment.CENTER,VerticalAlignment.BOTTOM));;
:return CommandExecutionResult.ok();;
stop
end
@enduml

