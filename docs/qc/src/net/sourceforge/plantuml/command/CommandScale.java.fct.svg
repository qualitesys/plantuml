@startuml
!pragma layout smetana
start
note right
constructor CommandScale()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandScale.class .getName(),RegexLeaf.start(),new RegexLeaf("scale"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("SCALE","([0-9.]+
)"),new RegexOptional(new RegexConcat(RegexLeaf.spaceZeroOrMore(),new RegexLeaf("/"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("DIV","([0-9.]+
)"))),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(AbstractPSystem diagram,
LineLocation location,RegexResult arg)
end note
:double scale=Double.parseDouble(arg.get("SCALE",
0));;
if (scale==0) then (yes) 
:return CommandExecutionResult.error("Scale cannot be zero");;
stop
endif 
if (arg.get("DIV",0)!=null ) then (yes) 
:final double div=Double.parseDouble(arg.get("DIV",
0));;
if (div==0) then (yes) 
:return CommandExecutionResult.error("Scale cannot be zero");;
stop
endif 
:scale/=div;;
endif 
:diagram.setScale(new ScaleSimple(scale));;
:return CommandExecutionResult.ok();;
stop
end
@enduml

