@startuml
!pragma layout smetana
start
note right
constructor RegexOptional(IRegex partial)
end note
:super (partial);;
end
start
note right
String getFullSlow()
end note
:final StringBuilder sb=new StringBuilder("(?:");;
:sb.append(partials().get(0).getPattern());;
:sb.append(")?");;
:return sb.toString();;
stop
end
start
note right
boolean match(StringLocated full)
end note
:throw new UnsupportedOperationException();;
stop
end
@enduml

