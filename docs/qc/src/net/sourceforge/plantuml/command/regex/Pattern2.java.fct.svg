@startuml
!pragma layout smetana
start
note right
constructor Pattern2(Patternpattern)
end note
:this.pattern=pattern;;
end
start
note right
Matcher2matcher(CharSequenceinput)
end note
:return Matcher2.build(pattern,input);;
stop
end
start
note right
Stringpattern()
end note
:return pattern.pattern();;
stop
end
@enduml

