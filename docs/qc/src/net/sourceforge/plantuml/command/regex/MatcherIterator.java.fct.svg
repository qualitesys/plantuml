@startuml
!pragma layout smetana
start
note right
constructor MatcherIterator(Matcher2matcher)
end note
:this.matcher=matcher;;
end
start
note right
booleanhasNext()
end note
:return cpt<=matcher.groupCount();;
stop
end
start
note right
Stringnext()
end note
:return matcher.group(cpt++);;
stop
end
