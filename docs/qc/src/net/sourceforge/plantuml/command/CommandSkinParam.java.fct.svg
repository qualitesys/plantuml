@startuml
!pragma layout smetana
start
note right
constructor CommandSkinParam()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandSkinParam.class .getName(),
RegexLeaf.start(),new RegexLeaf("TYPE","(skinparam|skinparamlocked)"),
RegexLeaf.spaceOneOrMore(),new RegexLeaf("NAME",
"([\\w.]*(?:\\<\\<.*\\>\\>)?[\\w.]*)"),RegexLeaf.spaceOneOrMore(),
new RegexLeaf("VALUE","([^{}]*)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(TitledDiagram diagram,
LineLocation location,RegexResult arg)
end note
switch (try/catch block)
case (try)
:diagram.setParam(arg.get("NAME",0),arg.get("VALUE",
0));;
:return CommandExecutionResult.ok();;
stop
case (catch (NoStyleAvailableException e))
:return CommandExecutionResult.error("General failure: no style available.");;
stop
endswitch
end
@enduml

