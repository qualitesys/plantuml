:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="281.5" x2="281.5" y1="852.332" y2="872.332"/><polygon fill="#181818" points="277.5,862.332,281.5,872.332,285.5,862.332,281.5,866.332" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="281.5" x2="281.5" y1="1081.1875" y2="1101.1875"/><polygon fill="#181818" points="277.5,1091.1875,281.5,1101.1875,285.5,1091.1875,281.5,1095.1875" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="281.5" x2="281.5" y1="1135.1563" y2="1155.1563"/><polygon fill="#181818" points="277.5,1145.1563,281.5,1155.1563,285.5,1145.1563,281.5,1149.1563" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[2117e645359ac815d0874300cfb247f8]
@startuml
!pragma layout smetana
start
note right
constructor CommandSkinParamMultilines()
end note
:super ("^skinparam[%s]*(?:[%s]+([\\w.]*(?:\\<\\<.*\\>\\>)?[\\w.]*))?[%s]*\\{$");;
end
start
note right
booleanisLineConsistent(Stringline,intlevel)
end note
:line=StringUtils.trin(line);;
if (hasStartingQuote(line)) then (yes) 
:return true;;
stop
endif 
:return SkinLoader.p1.matcher(line).matches();;
stop
end
start
note right
booleanhasStartingQuote(CharSequenceline)
end note
:return MyPattern.mtches(line,CommandMultilinesComment.COMMENT_SINGLE_LINE);;
stop
end
start
note right
CommandExecutionResultexecute(TitledDiagramdiagram,
BlocLineslines)
end note
:final SkinLoaderskinLoader=new SkinLoader(diagram);;
:final Matcher2mStart=getStartingPattern()
.matcher(lines.getFirst().getTrimmed().getString());;
if (mStart.find()==false) then (yes) 
:throw new IllegalStateException();;
stop
endif 
:final Stringgroup1=mStart.group(1);;
:return skinLoader.execute(lines,group1);;
stop
end
@enduml

