@startuml
!pragma layout smetana
start
note right
constructor CommandAffineTransformMultiline()
end note
:super ("^!transformation[%s]+\\{[%s]*$");;
end
start
note right
String getPatternEnd()
end note
:return "^[%s]*!\\}[%s]*$";;
stop
end
start
note right
CommandExecutionResult execute(final TitledDiagram diagram,
