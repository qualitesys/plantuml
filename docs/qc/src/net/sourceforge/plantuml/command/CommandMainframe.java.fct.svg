@startuml
!pragma layout smetana
start
note right
constructor CommandMainframe()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandMainframe.class .getName(),
RegexLeaf.start(),new RegexLeaf("mainframe"),
new RegexOr(new RegexConcat(RegexLeaf.spaceZeroOrMore(),
new RegexLeaf(":"),RegexLeaf.spaceZeroOrMore()),
RegexLeaf.spaceOneOrMore()),new RegexLeaf("LABEL",
"(.*[%pLN_.].*)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(TitledDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:final Displaylabel=Display.getWithNewlines(arg.get("LABEL",
0));;
:diagram.setMainFrame(label);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

