@startuml
!pragma layout smetana
start
note right
constructor CommandEbnfMultilines()
end note
:super (getRegexConcat(),MultilinesStrategy.KEEP_STARTING_QUOTE,
Trim.BOTH);;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandEbnfMultilines.class .getName(),
RegexLeaf.start(),new RegexLeaf("LINE","(\\w[-\\w]*[%s]*=.*)"),
RegexLeaf.end());;
stop
end
start
note right
StringgetPatternEnd()
end note
:return "^(.*);$";;
stop
end
start
note right
CommandExecutionResultexecuteNow(PSystemEbnfdiagram,
BlocLineslines)
end note
:return diagram.addBlocLines(lines,null ,
null );;
stop
end
@enduml

