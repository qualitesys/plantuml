@startuml
!pragma layout smetana
start
note right
constructor TitleBox(Stringvalue,FontConfigurationfc)
end note
:this.value=value;;
:this.fc=fc.add(FontStyle.BOLD);;
:this.utext=new UText(value,this.fc);;
end
start
note right
XDimension2DcalculateDimension(StringBounderstringBounder)
end note
:return stringBounder.calculateDimension(fc.getFont(),
value);;
stop
end
start
note right
void drawU(UGraphicug)
end note
:final XDimension2DdimText=calculateDimension(ug.getStringBounder());;
:ug.apply(new UTranslate(0,dimText.getHeight()-utext.getDescent(ug.getStringBounder())))
.draw(utext);;
end
@enduml

