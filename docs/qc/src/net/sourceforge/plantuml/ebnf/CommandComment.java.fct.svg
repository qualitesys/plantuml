@startuml
!pragma layout smetana
start
note right
constructor CommandComment()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandComment.class .getName(),
RegexLeaf.start(),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("\\(\\*"),new RegexLeaf("COMMENT",
"(.*[^%s].*)"),new RegexLeaf("\\*\\)"),RegexLeaf.spaceZeroOrMore(),
RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(PSystemEbnfdiagram,
LineLocationlocation,RegexResultarg)
end note
:final Displaynote=Display.getWithNewlines(arg.get("COMMENT",
0));;
:return diagram.addNote(note,null );;
stop
end
@enduml

