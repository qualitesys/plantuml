@startuml
!pragma layout smetana
start
note right
constructor CommandNoteMultilines()
end note
:super (getRegexConcat(),MultilinesStrategy.REMOVE_STARTING_QUOTE,
Trim.BOTH);;
end
start
note right
ColorParser color()
end note
:return ColorParser.simpleColor(ColorType.BACK);;
stop
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandNoteMultilines.class .getName(),
RegexLeaf.start(),new RegexLeaf("note"),RegexLeaf.spaceZeroOrMore(),
color().getRegex(),RegexLeaf.end());;
stop
end
start
note right
String getPatternEnd()
end note
:return "^end[%s]?note$";;
stop
end
start
note right
CommandExecutionResult executeNow(PSystemEbnf diagram,
BlocLines lines)
end note
:final RegexResult line0=getStartingPattern()
.matcher(lines.getFirst().getTrimmed().getString());;
:lines=lines.subExtract(1,1);;
:lines=lines.removeEmptyColumns();;
:final Display note=lines.toDisplay();;
:final Colors colors=color().getColor(line0,
diagram.getSkinParam().getIHtmlColorSet());;
:return diagram.addNote(note,colors);;
stop
end
@enduml

