@startuml
!pragma layout smetana
start
note right
constructor CommandCommentMultilines()
end note
:super (getRegexConcat(),MultilinesStrategy.KEEP_STARTING_QUOTE,
Trim.BOTH);;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandCommentMultilines.class .getName(),
RegexLeaf.start(),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("\\(\\*"),new RegexLeaf(".*"),
RegexLeaf.end());;
stop
end
start
note right
String getPatternEnd()
end note
:return "^.*\\*\\)[%s]*$";;
stop
end
start
note right
CommandExecutionResult executeNow(PSystemEbnf diagram,
BlocLines lines)
end note
:final Display note=lines.removeFewChars(2)
.toDisplay();;
:return diagram.addNote(note,null );;
stop
end
@enduml

