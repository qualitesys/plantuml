@startuml
!pragma layout smetana
start
note right
constructor PSystemEbnfFactory()
end note
:super (DiagramType.EBNF);;
end
start
note right
List<Command> createCommands()
end note
:final List<Command> cmds=new ArrayList<>();;
:CommonCommands.addCommonCommands1(cmds);;
:cmds.add(new CommandComment());;
:cmds.add(new CommandCommentMultilines2());;
:cmds.add(new CommandCommentMultilines());;
:cmds.add(new CommandEBnfSingleLine());;
:cmds.add(new CommandEbnfMultilines());;
:return cmds;;
stop
end
start
note right
PSystemEbnf createEmptyDiagram(UmlSource source,
Map<String,String> skinParam)
end note
:return new PSystemEbnf(source);;
stop
end
@enduml

