@startuml
!pragma layout smetana
start
note right
constructor CommandCommentMultilines2()
end note
:super (getRegexConcat(),MultilinesStrategy.KEEP_STARTING_QUOTE,
Trim.BOTH);;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandCommentMultilines2.class .getName(),
RegexLeaf.start(),RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("\\(\\*\\*"),new RegexLeaf(".*"),
RegexLeaf.end());;
stop
end
start
note right
StringgetPatternEnd()
end note
:return "^.*\\*\\*\\)[%s]*$";;
stop
end
start
note right
CommandExecutionResultexecuteNow(PSystemEbnfdiagram,
BlocLineslines)
end note
:final Displaynote=lines.removeFewChars(3)
.toDisplay();;
:return diagram.addNote(note,null );;
stop
end
@enduml

