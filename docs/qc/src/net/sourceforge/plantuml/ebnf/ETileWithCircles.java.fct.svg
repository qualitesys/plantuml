@startuml
!pragma layout smetana
start
note right
constructor ETileWithCircles(ETileorig,HColorlineColor)
end note
:this.orig=orig;;
:this.lineColor=lineColor;;
end
start
note right
doublegetWidth(StringBounderstringBounder)
end note
:return orig.getWidth(stringBounder)+2*deltax;;
stop
end
start
note right
doublegetH1(StringBounderstringBounder)
end note
:return orig.getH1(stringBounder);;
stop
end
start
note right
doublegetH2(StringBounderstringBounder)
end note
:return orig.getH2(stringBounder);;
stop
end
start
note right
void drawU(UGraphicug)
end note
:final doublelinePos=getH1(ug.getStringBounder());;
:final XDimension2DfullDim=calculateDimension(ug.getStringBounder());;
:ug=ug.apply(lineColor).apply(new UStroke(1.5));;
:orig.drawU(ug.apply(UTranslate.dx(deltax)));;
:final UEllipsecircle=new UEllipse(SIZE,SIZE);;
:ug.apply(new UStroke(2)).apply(new UTranslate(0,
linePos-SIZE/2)).draw(circle);;
:ug.apply(new UStroke(1)).apply(new CopyForegroundColorToBackgroundColor()).apply(new UTranslate(fullDim.getWidth()-SIZE/2,
linePos-SIZE/2)).draw(circle);;
:ug=ug.apply(new UStroke(1.5));;
:drawHlineDirected(ug,linePos,SIZE,deltax,
0.5);;
:drawHlineDirected(ug,linePos,fullDim.getWidth()-deltax,
fullDim.getWidth()-SIZE/2,0.5);;
end
start
note right
void push(ETiletile)
end note
:throw new UnsupportedOperationException();;
stop
end
@enduml

