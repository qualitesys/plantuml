@startuml
!pragma layout smetana
start
note right
constructor CommandEBnfSingleLine()
end note
:super (true,getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandEBnfSingleLine.class .getName(),
RegexLeaf.start(),new RegexOptional(new RegexConcat(RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("\\(\\*"),new RegexLeaf("COMMENTA",
"(.*[^%s].*)"),new RegexLeaf("\\*\\)"),RegexLeaf.spaceZeroOrMore())),
new RegexLeaf("ID","(\\w[-\\w]*)"),new RegexOptional(new RegexConcat(RegexLeaf.spaceZeroOrMore(),
new RegexLeaf("\\(\\*"),new RegexLeaf("COMMENTB",
"(.*[^%s].*)"),new RegexLeaf("\\*\\)"),RegexLeaf.spaceZeroOrMore())),
RegexLeaf.spaceZeroOrMore(),new RegexLeaf("EQUALS",
"(=)"),RegexLeaf.spaceZeroOrMore(),new RegexLeaf("LINE",
"(.*;)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(PSystemEbnf diagram,
LineLocation location,RegexResult arg)
end note
:final String id=arg.get("ID",0);;
:final String equals=arg.get("EQUALS",0);;
:final String line=arg.get("LINE",0);;
:final String full=id+equals+line;;
:final String commentAbove=arg.get("COMMENTA",0);;
:final String commentBelow=arg.get("COMMENTB",0);;
:final StringLocated string=new StringLocated(full,
location);;
:return diagram.addBlocLines(BlocLines.from(Collections.singletonList(string)),
commentAbove,commentBelow);;
stop
end
@enduml

