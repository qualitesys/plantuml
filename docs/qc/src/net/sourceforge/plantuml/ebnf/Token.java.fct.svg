@startuml
!pragma layout smetana
start
note right
constructor Token(Symbolsymbol,Stringdata)
end note
:this.symbol=symbol;;
:this.data=data;;
if (data!=null &&data.length()==0) then (yes) 
:throw new IllegalArgumentException();;
stop
endif 
end
start
note right
StringtoString()
end note
if (data==null ) then (yes) 
:return symbol.toString();;
stop
endif 
:return symbol.toString()+" "+data;;
stop
end
start
note right
SymbolgetSymbol()
end note
:return symbol;;
stop
end
start
note right
StringgetData()
end note
:return data;;
stop
end
@enduml

