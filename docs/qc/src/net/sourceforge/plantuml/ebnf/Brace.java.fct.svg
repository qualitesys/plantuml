@startuml
!pragma layout smetana
start
note right
constructor Brace(double width,double height)
end note
:this.width=width;;
:this.height=height;;
end
start
note right
void drawU(UGraphic ug)
end note
:ug=ug.apply(new UStroke(0.5));;
:final double cinq=5;;
:CornerCurved.createNW(cinq).drawU(ug);;
:CornerCurved.createSE(cinq).drawU(ug.apply(new UTranslate(width/2,
0)));;
:CornerCurved.createSW(cinq).drawU(ug.apply(new UTranslate(width/2,
0)));;
:CornerCurved.createNE(cinq).drawU(ug.apply(new UTranslate(width,
0)));;
:ug.apply(new UTranslate(cinq,0)).draw(new ULine(width/2-2*cinq,
0));;
:ug.apply(new UTranslate(cinq+width/2,0)).draw(new ULine(width/2-2*cinq,
0));;
end
@enduml

