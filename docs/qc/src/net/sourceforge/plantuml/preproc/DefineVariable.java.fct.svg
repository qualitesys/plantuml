@startuml
!pragma layout smetana
start
note right
constructor DefineVariable(Stringname)
end note
:name=name.trim();;
:final intidx=name.indexOf('=');;
if (idx==-1) then (yes) 
:this.name=name;;
:this.defaultValue=null ;;
else (no)
:this.name=name.substring(0,idx).trim();;
:final Stringright=name.substring(idx+1).trim();;
:this.defaultValue=right.substring(1,right.length()-1);;
endif 
end
start
note right
StringgetName()
end note
:return name;;
stop
end
start
note right
StringgetDefaultValue()
end note
:return defaultValue;;
stop
end
start
note right
DefineVariableremoveDefault()
end note
if (defaultValue==null ) then (yes) 
:throw new IllegalStateException();;
stop
endif 
:return new DefineVariable(name);;
stop
end
@enduml

