note right
constructor NumericCompare(Stringoperator)
end note
:this.operator=operator;;
end
start
note right
booleanisCompareOk(intvalue1,intvalue2)
end note
if (operator.equals("<")) then (yes) 
:return value1<value2;;
stop
endif 
if (operator.equals("<=")) then (yes) 
:return value1<=value2;;
stop
endif 
if (operator.equals(">")) then (yes) 
:return value1>value2;;
stop
endif 
if (operator.equals(">=")) then (yes) 
:return value1>=value2;;
stop
endif 
if (operator.equals("=")||operator.equals("==")) then (yes) 
:return value1==value2;;
stop
endif 
if (operator.equals("!=")||operator.equals("<>")) then (yes) 
:return value1!=value2;;
stop
endif 
:throw new IllegalStateException();;
stop
end
