@startuml
!pragma layout smetana
start
note right
constructor ReadLineList(List<String> definition,
LineLocation location)
end note
:this.iterator=definition.iterator();;
:this.location=location;;
end
start
note right
void close()
end note
end
start
note right
StringLocated readLine()
end note
if (iterator.hasNext()==false) then (yes) 
:return null ;;
stop
endif 
:return new StringLocated(iterator.next(),
location);;
stop
end
@enduml

