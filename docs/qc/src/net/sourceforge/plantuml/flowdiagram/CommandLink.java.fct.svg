@startuml
!pragma layout smetana
start
note right
constructor CommandLink()
end note
:super (getRegexConcat());;
end
start
note right
IRegex getRegexConcat()
end note
:return RegexConcat.build(CommandLink.class .getName(),
RegexLeaf.start(),new RegexOptional(new RegexConcat(new RegexLeaf("ORIENTATION","([nsew])"),RegexLeaf.spaceOneOrMore())),new RegexLeaf("ID_DEST","(\\w+
)"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResult executeArg(FlowDiagram system,
LineLocation location,RegexResult arg)
end note
:final String idDest=arg.get("ID_DEST",0);;
:final String orientationString=arg.get("ORIENTATION",0);;
:TileGeometry orientation=TileGeometry.SOUTH;;
if (orientationString!=null ) then (yes) 
:orientation=TileGeometry.fromString(orientationString);;
endif 
:system.linkSimple(orientation,idDest);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

