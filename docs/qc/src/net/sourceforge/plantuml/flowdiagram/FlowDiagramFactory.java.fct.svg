@startuml
!pragma layout smetana
start
note right
constructor FlowDiagramFactory()
end note
:super (DiagramType.FLOW);;
end
start
note right
FlowDiagram createEmptyDiagram(UmlSource source,
Map<String,String> skinParam)
end note
:return new FlowDiagram(source);;
stop
end
start
note right
List<Command> createCommands()
end note
:final List<Command> cmds=new ArrayList<>();;
:cmds.add(new CommandLineSimple());;
:cmds.add(new CommandLink());;
:return cmds;;
stop
end
@enduml

