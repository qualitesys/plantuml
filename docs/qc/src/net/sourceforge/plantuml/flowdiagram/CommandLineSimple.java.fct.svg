@startuml
!pragma layout smetana
start
note right
constructor CommandLineSimple()
end note
:super (getRegexConcat());;
end
start
note right
IRegexgetRegexConcat()
end note
:return RegexConcat.build(CommandLineSimple.class .getName(),
RegexLeaf.start(),new RegexOptional(new RegexConcat(new RegexLeaf("ORIENTATION","([nsew])"),RegexLeaf.spaceOneOrMore())),new RegexLeaf("ID_DEST","(\\w+
)"),RegexLeaf.spaceOneOrMore(),new RegexLeaf("LABEL",
"[%g](.*)[%g]"),RegexLeaf.end());;
stop
end
start
note right
CommandExecutionResultexecuteArg(FlowDiagramdiagram,
LineLocationlocation,RegexResultarg)
end note
:final StringidDest=arg.get("ID_DEST",0);;
:final Stringlabel=arg.get("LABEL",0);;
:final StringorientationString=arg.get("ORIENTATION",0);;
:TileGeometryorientation=TileGeometry.SOUTH;;
if (orientationString!=null ) then (yes) 
:orientation=TileGeometry.fromString(orientationString);;
endif 
:diagram.lineSimple(orientation,idDest,label);;
:return CommandExecutionResult.ok();;
stop
end
@enduml

