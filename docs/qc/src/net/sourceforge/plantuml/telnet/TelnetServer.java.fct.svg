@startuml
!pragma layout smetana
start
note right
void main(String[] args)
end note
:final ServerSocket server=new ServerSocket(4242);;
while (true)
:final Socket socket=server.accept();;
:new AcceptTelnetClient(socket);;
endwhile
end
@enduml

