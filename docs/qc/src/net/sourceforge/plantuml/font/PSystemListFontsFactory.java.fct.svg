@startuml
!pragma layout smetana
start
note right
AbstractPSystem executeLine(UmlSource source,
String line)
end note
:final String lineLower=StringUtils.goLowerCase(line);;
if (lineLower.equals("listfont")||lineLower.equals("listfonts")||lineLower.startsWith("listfont ")||lineLower.startsWith("listfonts ")) then (yes) 
:final int idx=line.indexOf(' ');;
:return new PSystemListFonts(source,idx==-1? String.valueOf("This is a test"):StringUtils.trin(line.substring(idx)));;
stop
endif 
:return null ;;
stop
end
@enduml

