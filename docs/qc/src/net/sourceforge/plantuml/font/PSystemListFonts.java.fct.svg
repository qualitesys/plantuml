@startuml
!pragma layout smetana
start
note right
constructor PSystemListFonts(UmlSource source,
String text)
end note
:super (source);;
:strings.add("   <b><size:16>Fonts available:");;
:strings.add(" ");;
:final String name[]=GraphicsEnvironment.getLocalGraphicsEnvironment()
.getAvailableFontFamilyNames();;
:strings.add(n+" : <font:"+n+">"+text);;
end
start
note right
DiagramDescription getDescription()
end note
:return new DiagramDescription("(List fonts)");;
stop
end
@enduml

