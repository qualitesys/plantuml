@startuml
!pragma layout smetana
start
note right
constructor PSystemListFonts(UmlSourcesource,
Stringtext)
end note
:super (source);;
:strings.add("   <b><size:16>Fonts available:");;
:strings.add(" ");;
:final Stringname[]=GraphicsEnvironment.getLocalGraphicsEnvironment()
.getAvailableFontFamilyNames();;
:strings.add(n+" : <font:"+n+">"+text);;
end
start
note right
DiagramDescriptiongetDescription()
end note
:return new DiagramDescription("(List fonts)");;
stop
end
@enduml

