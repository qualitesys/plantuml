@startuml
!pragma layout smetana
start
note right
constructor SpiralOnRectangle(intwidth,intheight)
end note
:this.width=width;;
:this.height=height;;
:this.delta=new PairInt(width/2,height/2);;
end
start
note right
booleaninside(PairIntpoint)
end note
:final intx=point.getX();;
:final inty=point.getY();;
:return x>=0&&x<width&&y>=0&&y<height;;
stop
end
start
note right
PairIntnextPoint()
end note
repeat
:final PairIntresult=spiral.nextPoint().plus(delta);;
if (inside(result)) then (yes) 
:return result;;
stop
endif 
repeat while (true)
end
@enduml

