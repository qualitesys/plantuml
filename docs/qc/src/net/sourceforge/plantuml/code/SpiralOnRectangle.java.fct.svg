@startuml
!pragma layout smetana
start
note right
constructor SpiralOnRectangle(int width,int height)
end note
:this.width=width;;
:this.height=height;;
:this.delta=new PairInt(width/2,height/2);;
end
start
note right
boolean inside(PairInt point)
end note
:final int x=point.getX();;
:final int y=point.getY();;
:return x>=0&&x<width&&y>=0&&y<height;;
stop
end
start
note right
PairInt nextPoint()
end note
repeat
:final PairInt result=spiral.nextPoint().plus(delta);;
if (inside(result)) then (yes) 
:return result;;
stop
endif 
repeat while (true)
end
@enduml

