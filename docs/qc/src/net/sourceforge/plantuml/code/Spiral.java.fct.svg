@startuml
!pragma layout smetana
start
note right
PairIntnextPoint()
end note
:final PairIntresult=current;;
:oneStep();;
:return result;;
stop
end
start
note right
void oneStep()
end note
:this.current=this.current.plus(this.direction);;
:step++;;
if (step==lim) then (yes) 
:this.direction=this.direction.rotate();;
:cpt++;;
if (cpt==2) then (yes) 
:cpt=0;;
:len++;;
endif 
:lim+=len;;
endif 
end
@enduml

