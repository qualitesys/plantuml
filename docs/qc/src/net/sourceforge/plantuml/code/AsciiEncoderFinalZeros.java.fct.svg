@startuml
!pragma layout smetana
start
note right
String encode(byte[] data)
end note
if (data==null ) then (yes) 
:return "";;
stop
endif 
:final StringBuilder result=new StringBuilder((data.length*4+
2)/3);;
:append3bytes(result,data[i]&0xFF,i+1<data.length? data[i+
1]&0xFF:0,i+2<data.length? data[i+2]&0xFF:0);;
while (result.length()>0&&result.charAt(result.length()-1)=='0')
:result.setLength(result.length()-1);;
endwhile
:return result.toString();;
stop
end
start
note right
void append3bytes(StringBuilder sb,int b1,
int b2,int b3)
end note
:final int c1=b1>>2;;
:final int c2=((b1&0x3)<<4)|(b2>>4);;
:final int c3=((b2&0xF)<<2)|(b3>>6);;
:final int c4=b3&0x3F;;
:sb.append(AsciiEncoder.encode6bit[c1&0x3F]);;
:sb.append(AsciiEncoder.encode6bit[c2&0x3F]);;
:sb.append(AsciiEncoder.encode6bit[c3&0x3F]);;
:sb.append(AsciiEncoder.encode6bit[c4&0x3F]);;
end
@enduml

