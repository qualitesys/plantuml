@startuml
!pragma layout smetana
start
note right
byte[]compress(byte[]in)
end note
:final ByteArrayOutputStreambaos=new ByteArrayOutputStream();;
:final Deflaterdeflater=new Deflater(Deflater.HUFFMAN_ONLY);;
:deflater.setLevel(9);;
:final DeflaterOutputStreamgz=new DeflaterOutputStream(baos,
deflater);;
switch (try/catch block)
case (try)
:gz.write(in);;
:gz.close();;
:baos.close();;
:return baos.toByteArray();;
stop
case (catch (IOExceptione))
:throw new IllegalStateException(e.toString());;
stop
endswitch
end
start
note right
ByteArraydecompress(byte[]in)
end note
switch (try/catch block)
case (try)
:final ByteArrayOutputStreambaos=new ByteArrayOutputStream();;
:final ByteArrayInputStreambais=new ByteArrayInputStream(in);;
:final InflaterInputStreamgz=new InflaterInputStream(bais);;
:intread;;
while ((read=gz.read())!=-1)
:baos.write(read);;
endwhile
:gz.close();;
:bais.close();;
:baos.close();;
:return ByteArray.from(baos.toByteArray());;
stop
case (catch (IOExceptione))
:throw new NoPlantumlCompressionException(e);;
stop
endswitch
end
