@startuml
!pragma layout smetana
start
note right
byte[] compress(byte[] in)
end note
:final ByteArrayOutputStream baos=new ByteArrayOutputStream();;
:final Deflater deflater=new Deflater(Deflater.HUFFMAN_ONLY);;
:deflater.setLevel(9);;
:final DeflaterOutputStream gz=new DeflaterOutputStream(baos,
deflater);;
switch (try/catch block)
case (try)
:gz.write(in);;
:gz.close();;
:baos.close();;
:return baos.toByteArray();;
stop
case (catch (IOException e))
:throw new IllegalStateException(e.toString());;
stop
endswitch
end
start
note right
ByteArray decompress(byte[] in)
end note
switch (try/catch block)
case (try)
:final ByteArrayOutputStream baos=new ByteArrayOutputStream();;
:final ByteArrayInputStream bais=new ByteArrayInputStream(in);;
:final InflaterInputStream gz=new InflaterInputStream(bais);;
:int read;;
while ((read=gz.read())!=-1)
:baos.write(read);;
endwhile
:gz.close();;
:bais.close();;
:baos.close();;
:return ByteArray.from(baos.toByteArray());;
stop
case (catch (IOException e))
:throw new NoPlantumlCompressionException(e);;
stop
endswitch
end
@enduml

