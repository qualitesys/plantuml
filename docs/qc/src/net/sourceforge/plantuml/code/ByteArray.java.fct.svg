@startuml
!pragma layout smetana
start
note right
constructor ByteArray(byte[] data,int length)
end note
:this.data=data;;
:this.length=length;;
end
start
note right
ByteArray from(byte[] input)
end note
:return new ByteArray(input,input.length);;
stop
end
start
note right
String toUFT8String()
end note
:return new String(data,0,length,UTF_8);;
stop
end
start
note right
String toUPF9String()
end note
:return Upf9Decoder.decodeString(data,length);;
stop
end
start
note right
int getByteAt(int i)
end note
:return data[i];;
stop
end
start
note right
