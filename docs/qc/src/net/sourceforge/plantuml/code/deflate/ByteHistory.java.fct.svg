@startuml
!pragma layout smetana
start
note right
constructor ByteHistory(int size)
end note
if (size<1) then (yes) 
:throw new IllegalArgumentException("Size must be positive");;
stop
endif 
:data=new byte[size];;
:index=0;;
end
start
note right
void append(int b)
end note
if (index<0||index>=data.length) then (yes) 
:throw new IllegalStateException();;
stop
endif 
:data[index]=(byte )b;;
:index=(index+1)%data.length;;
end
start
note right
void copy(int dist,int len,OutputStreamProtected out)
end note
