@startuml
!pragma layout smetana
start
note right
String encode(byte[] data)
end note
if (data==null ) then (yes) 
:return "";;
stop
endif 
:final StringBuilder result=new StringBuilder(data.length*2);;
:final String val=Integer.toHexString(b&0xFF);;
if (val.length()==1) then (yes) 
:result.append("0");;
endif 
:result.append(val);;
:return result.toString();;
stop
end
start
note right
byte[] decode(String s)
end note
:final byte result[]=new byte[s.length()/2];;
:result[i]=(byte )Integer.parseInt(s.substring(i*2,i*2+
2),16);;
:return result;;
stop
end
@enduml

