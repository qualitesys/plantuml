@startuml
!pragma layout smetana
start
note right
byte[]compress(byte[]in)
end note
if (in.length==0) then (yes) 
:return null ;;
stop
endif 
:intlen=in.length*2;;
if (len<100) then (yes) 
:len=100;;
endif 
:final Zopflicompressor=new Zopfli(len);;
:final Optionsoptions=new Options(OutputFormat.DEFLATE,
BlockSplitting.FIRST,30);;
:return compressor.compress(options,in).getResult();;
stop
end
start
note right
ByteArraydecompress(byte[]in)
end note
:return new CompressionZlib().decompress(in);;
stop
end
@enduml

