@startuml
!pragma layout smetana
start
note right
byte[] compress(byte[] in)
end note
if (in.length==0) then (yes) 
:return null ;;
stop
endif 
:int len=in.length*2;;
if (len<100) then (yes) 
:len=100;;
endif 
:final Zopfli compressor=new Zopfli(len);;
:final Options options=new Options(OutputFormat.DEFLATE,
BlockSplitting.FIRST,30);;
:return compressor.compress(options,in).getResult();;
stop
end
start
note right
ByteArray decompress(byte[] in)
end note
:return new CompressionZlib().decompress(in);;
stop
end
@enduml

