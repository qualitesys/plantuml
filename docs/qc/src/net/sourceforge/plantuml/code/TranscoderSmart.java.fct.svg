"#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="113" x="310.5" y="619.4058">catch (Exception ex)</text><line style="stroke:#181818;stroke-width:1.0;" x1="217.25" x2="217.25" y1="777.9375" y2="800.5039"/><polygon fill="#181818" points="213.25,790.5039,217.25,800.5039,221.25,790.5039,217.25,794.5039" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="217.25" x2="217.25" y1="834.4727" y2="854.4727"/><polygon fill="#181818" points="213.25,844.4727,217.25,854.4727,221.25,844.4727,217.25,848.4727" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[64435f2b87276bb7e2de9cdfb06653ce]
@startuml
!pragma layout smetana
start
note right
String decode(String code)
end note
if (code.startsWith("~0")) then (yes) 
:return zlib.decode(code.substring(2));;
stop
endif 
if (code.startsWith("~1")) then (yes) 
:return oldOne.decode(code.substring(2));;
stop
endif 
if (code.startsWith("~h")) then (yes) 
:return hexOnly.decode(code.substring(2));;
stop
endif 
switch (try/catch block)
case (try)
:return zlib.decode(code);;
stop
case (catch (Exception ex))
:return oldOne.decode(code);;
stop
endswitch
end
start
note right
String encode(String text)
end note
:return zlib.encode(text);;
stop
end
@enduml

