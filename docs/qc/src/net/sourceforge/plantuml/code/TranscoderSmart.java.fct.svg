@startuml
!pragma layout smetana
start
note right
Stringdecode(Stringcode)
end note
if (code.startsWith("~0")) then (yes) 
:return zlib.decode(code.substring(2));;
stop
endif 
if (code.startsWith("~1")) then (yes) 
:return oldOne.decode(code.substring(2));;
stop
endif 
if (code.startsWith("~h")) then (yes) 
:return hexOnly.decode(code.substring(2));;
stop
endif 
switch (try/catch block)
case (try)
:return zlib.decode(code);;
stop
case (catch (Exceptionex))
:return oldOne.decode(code);;
stop
endswitch
end
start
note right
Stringencode(Stringtext)
end note
:return zlib.encode(text);;
stop
end
@enduml

