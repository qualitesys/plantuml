@startuml
!pragma layout smetana
start
note right
Transcoder getDefaultTranscoder()
end note
:return new TranscoderSmart();;
stop
end
start
note right
Transcoder getDefaultTranscoderProtected()
end note
:return new TranscoderSmartProtected();;
stop
end
start
note right
Transcoder getDefaultTranscoderProtectedPure()
end note
:return getDefaultTranscoderProtected();;
stop
end
@enduml

