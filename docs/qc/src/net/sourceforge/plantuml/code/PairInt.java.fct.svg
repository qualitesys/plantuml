@startuml
!pragma layout smetana
start
note right
constructor PairInt(intx,inty)
end note
:this.x=x;;
:this.y=y;;
end
start
note right
PairIntrotate()
end note
:return new PairInt(-y,x);;
stop
end
start
note right
StringtoString()
end note
:return "("+x+","+y+")";;
stop
end
start
note right
intgetX()
end note
:return x;;
stop
end
start
note right
intgetY()
end note
:return y;;
stop
end
start
note right
PairIntplus(PairIntother)
end note
:return new PairInt(x+other.x,y+other.y);;
stop
end
@enduml

