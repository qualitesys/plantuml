@startuml
!pragma layout smetana
start
note right
String compress(String data)
end note
:return clean2(data);;
stop
end
start
note right
String decompress(String s)
end note
:return clean2(s);;
stop
end
start
note right
String clean2(String s)
end note
:s=StringUtils.trin(s);;
if (s.startsWith("@start")) then (yes) 
:return s;;
stop
endif 
:return "@startuml\n"+s+"\n@enduml";;
stop
end
@enduml

