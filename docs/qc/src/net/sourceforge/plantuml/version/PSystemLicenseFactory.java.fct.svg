@startuml
!pragma layout smetana
start
note right
AbstractPSystemexecuteLine(UmlSourcesource,
Stringline)
end note
switch (try/catch block)
case (try)
if (line.matches("(?i)^li[sc][ea]n[sc]e\\s*$")) then (yes) 
:return PSystemLicense.create(source);;
stop
endif 
case (catch (IOExceptione))
:Log.error("Error "+e);;
endswitch
:return null ;;
stop
end
@enduml

