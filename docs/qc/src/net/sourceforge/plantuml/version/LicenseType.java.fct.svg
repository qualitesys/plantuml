yle="stroke:#181818;stroke-width:1.0;"/><!--MD5=[547fc86c17af738ded0f1432f363f91b]
@startuml
!pragma layout smetana
start
note right
LicenseType fromInt(int type)
end note
if (type==-1) then (yes) 
:return NONE;;
stop
endif 
if (type==0) then (yes) 
:return NAMED;;
stop
endif 
if (type==2) then (yes) 
:return DISTRIBUTOR;;
stop
endif 
:return UNKNOWN;;
stop
end
@enduml

