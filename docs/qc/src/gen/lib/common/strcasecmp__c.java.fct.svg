53e99017168ec97df2acf916c8103]
@startuml
!pragma layout smetana
start
note right
int strcasecmp(CString s1,CString s2)
end note
:ENTERING("22n1uekxezky6gx3cn22ansew","strcasecmp");;
switch (try/catch block)
case (try)
while ((s1.charAt(0)!='\0')&&(tolower(s1.charAt(0))==tolower(s2.charAt(0))))
:s1=s1.plus_(1);;
:s2=s2.plus_(1);;
endwhile
:return tolower(s1.charAt(0))-tolower(s2.charAt(0));;
stop
endswitch
end
@enduml

