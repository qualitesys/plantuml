 x2="281" y1="1105.5352" y2="1105.5352"/><line style="stroke:#181818;stroke-width:1.0;" x1="281" x2="281" y1="1105.5352" y2="1125.5352"/><polygon fill="#181818" points="277,1115.5352,281,1125.5352,285,1115.5352,281,1119.5352" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="281" x2="281" y1="901.0938" y2="931.2266"/><polygon fill="#181818" points="277,921.2266,281,931.2266,285,921.2266,281,925.2266" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="281" x2="281" y1="1178.1016" y2="1200.668"/><polygon fill="#181818" points="277,1190.668,281,1200.668,285,1190.668,281,1194.668" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="281" x2="281" y1="1248.6055" y2="1268.6055"/><polygon fill="#181818" points="277,1258.6055,281,1268.6055,285,1258.6055,281,1262.6055" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="281" x2="281" y1="1353.1719" y2="1375.7383"/><polygon fill="#181818" points="277,1365.7383,281,1375.7383,285,1365.7383,281,1369.7383" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="281" x2="281" y1="1437.6445" y2="1457.6445"/><polygon fill="#181818" points="277,1447.6445,281,1457.6445,285,1447.6445,281,1451.6445" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[bb80da2efe52a8fef8aba9c09b1d4197]
@startuml
!pragma layout smetana
start
note right
constructor CartesianTransformation(boolean xLogScale,
boolean yLogScale,DataPoint dataPoint1,GraphPoint graphPoint1,
DataPoint dataPoint2,GraphPoint graphPoint2)
end note
:_xLogScale=xLogScale;;
:double d1=Util.log(dataPoint1.getX(),xLogScale);;
:double dd=Util.log(dataPoint2.getX(),xLogScale)-d1;;
:check(dd,"data","x",d1);;
:_xScale=(graphPoint2.getX()-graphPoint1.getX())/dd;;
:check(_xScale,"graphical","x",graphPoint1.getX());;
:_xOffset=graphPoint1.getX()-d1*_xScale;;
:_yLogScale=yLogScale;;
:d1=Util.log(dataPoint1.getY(),yLogScale);;
:dd=Util.log(dataPoint2.getY(),yLogScale)-d1;;
:check(dd,"data","y",d1);;
:_yScale=(graphPoint2.getY()-graphPoint1.getY())/dd;;
:check(_yScale,"graphical","y",graphPoint1.getY());;
:_yOffset=graphPoint1.getY()-d1*_yScale;;
end
start
note right
void check(double valueToCheck,String type,
String axis,double value)
end note
if (valueToCheck==0) then (yes) 
:throw new IllegalArgumentException("The "+
type+" reference points in "+axis+" must be different; both are "+
value);;
stop
endif 
end
start
note right
GraphPoint transformToGraph(DataPoint point)
end note
:return new GraphPoint(_xOffset+Util.log(point.getX(),_xLogScale)*_xScale,_yOffset+
Util.log(point.getY(),_yLogScale)*_yScale);;
stop
end
start
note right
DataPoint transformToData(GraphPoint point)
end note
:return new DataPoint(Util.exp((point.getX()-_xOffset)/_xScale,
_xLogScale),Util.exp((point.getY()-_yOffset)/_yScale,
_yLogScale));;
stop
end
@enduml

