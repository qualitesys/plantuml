@startuml
!pragma layout smetana
start
note right
constructor FactoryException(ConfigParametersconfigParameters,
Stringkey,Objectreason)
end note
:_fullKey=configParameters.getFullKey(key);;
:_className=configParameters.get(key,null );;
if (reason instanceof InvocationTargetException) then (yes) 
:reason=((InvocationTargetException)reason)
.getTargetException();;
endif 
:_reason=reason;;
end
start
note right
StringgetFullKey()
end note
:return _fullKey;;
stop
end
start
note right
StringgetClassName()
end note
:return _className;;
stop
end
start
note right
ObjectgetReason()
end note
:return _reason;;
stop
end
start
note right
StringtoString()
end note
:return getClass().getName()+": "+_fullKey+
" = "+_className+": "+_reason;;
stop
end
@enduml

