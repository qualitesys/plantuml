@startuml
!pragma layout smetana
start
note right
constructor FactoryException(ConfigParameters configParameters,
String key,Object reason)
end note
:_fullKey=configParameters.getFullKey(key);;
:_className=configParameters.get(key,null );;
if (reason instanceof InvocationTargetException ) then (yes) 
:reason=((InvocationTargetException )reason)
.getTargetException();;
endif 
:_reason=reason;;
end
start
note right
String getFullKey()
end note
:return _fullKey;;
stop
end
start
note right
String getClassName()
end note
:return _className;;
stop
end
start
note right
Object getReason()
end note
:return _reason;;
stop
end
start
note right
String toString()
end note
:return getClass().getName()+": "+_fullKey+
" = "+_className+": "+_reason;;
stop
end
@enduml

