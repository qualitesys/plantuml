@startuml
!pragma layout smetana
start
note right
constructor Point(double[] vector)
end note
:double x=0;;
:double y=0;;
if (vector!=null &&vector.length>0) then (yes) 
:x=vector[0];;
if (vector.length>1) then (yes) 
:y=vector[1];;
endif 
endif 
:_x=x;;
:_y=y;;
end
start
note right
constructor Point(double x,double y)
end note
:_x=x;;
:_y=y;;
end
start
note right
double getX()
end note
:return _x;;
stop
end
start
note right
double getY()
end note
:return _y;;
stop
end
@enduml

