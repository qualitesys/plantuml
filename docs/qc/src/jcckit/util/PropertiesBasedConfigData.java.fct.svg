@startuml
!pragma layout smetana
start
note right
constructor PropertiesBasedConfigData(Propertiesproperties)
end note
:this(properties,null );;
end
start
note right
constructor PropertiesBasedConfigData(Propertiesproperties,
Stringpath)
end note
:super (path);;
:_properties=properties;;
end
start
note right
StringgetValue(StringfullKey)
end note
:return _properties.getProperty(fullKey);;
stop
end
start
note right
ConfigDatacreateConfigData(Stringpath)
end note
:return new PropertiesBasedConfigData(_properties,
path);;
stop
end
@enduml

