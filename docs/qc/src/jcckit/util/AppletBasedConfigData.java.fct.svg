@startuml
!pragma layout smetana
start
note right
constructor AppletBasedConfigData(Applet applet)
end note
:this(applet,null );;
end
start
note right
constructor AppletBasedConfigData(Applet applet,
String path)
end note
:super (path);;
:_applet=applet;;
end
start
note right
String getValue(String fullKey)
end note
:return _applet.getParameter(fullKey);;
stop
end
start
note right
ConfigData createConfigData(String path)
end note
:return new AppletBasedConfigData(_applet,
path);;
stop
end
@enduml

