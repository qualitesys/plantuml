@startuml
!pragma layout smetana
start
note right
constructor ConfigParametersBasedConfigData(ConfigParameters config,
ConfigParameters defaultConfig)
end note
:_config=config;;
:_defaultConfig=defaultConfig;;
end
start
note right
String getFullKey(String key)
end note
:return _config.getFullKey(key);;
stop
end
start
note right
String get(String key)
end note
:String value=_config.get(key,null );;
:return value==null ? _defaultConfig.get(key,
null ):value;;
stop
end
start
note right
ConfigData getNode(String key)
end note
:return new ConfigParametersBasedConfigData(_config.getNode(key),
_defaultConfig.getNode(key));;
stop
end
@enduml

