@startuml
!pragma layout smetana
start
note right
constructor FontStyle(String description)
end note
:_description=description;;
:REPOSITORY.put(description,this);;
end
start
note right
FontStyle getFontStyle(ConfigParameters config,
String key,FontStyle defaultValue)
end note
:FontStyle result=defaultValue;;
:String value=config.get(key,null );;
if (value!=null ) then (yes) 
:result=(FontStyle )REPOSITORY.get(value);;
if (result==null ) then (yes) 
:throw new FactoryException(config,key,"Invalid font style.");;
stop
endif 
endif 
:return result;;
stop
end
start
note right
String toString()
end note
:return _description;;
stop
end
@enduml

