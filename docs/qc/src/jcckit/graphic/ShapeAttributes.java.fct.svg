@startuml
!pragma layout smetana
start
note right
constructor ShapeAttributes(ConfigParametersconfig)
end note
:this(config.getColor(FILL_COLOR_KEY,null ),
config.getColor(LINE_COLOR_KEY,null ),config.getDouble(LINE_THICKNESS_KEY,
0),config.getDoubleArray(LINE_PATTERN_KEY,
null ));;
end
start
note right
constructor ShapeAttributes(ColorfillColor,
ColorlineColor,doublelineThickness,double[]linePattern)
end note
:_fillColor=fillColor;;
:_lineColor=lineColor;;
:_lineThickness=Math.max(0,lineThickness);;
:_linePattern=linePattern;;
end
start
note right
ColorgetFillColor()
end note
:return _fillColor;;
stop
end
start
note right
ColorgetLineColor()
end note
:return _lineColor;;
stop
end
start
note right
doublegetLineThickness()
end note
:return _lineThickness;;
stop
end
start
note right
double[]getLinePattern()
end note
:return _linePattern;;
stop
end
@enduml

