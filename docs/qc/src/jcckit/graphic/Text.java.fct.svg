@startuml
!pragma layout smetana
start
note right
constructor Text(GraphPointposition,Stringtext,
GraphicAttributesattributes)
end note
:super (attributes);;
:_position=position;;
:_text=text;;
end
start
note right
GraphPointgetPosition()
end note
:return _position;;
stop
end
start
note right
StringgetText()
end note
:return _text;;
stop
end
start
note right
void renderWith(Rendererrenderer)
end note
if (renderer instanceof TextRenderer) then (yes) 
:((TextRenderer)renderer).render(this);;
else (no)
:throw new IllegalArgumentException(renderer+
" does not implements TextRenderer.");;
stop
endif 
end
@enduml

