@startuml
!pragma layout smetana
start
note right
constructor Text(GraphPoint position,String text,
GraphicAttributes attributes)
end note
:super (attributes);;
:_position=position;;
:_text=text;;
end
start
note right
GraphPoint getPosition()
end note
:return _position;;
stop
end
start
note right
String getText()
end note
:return _text;;
stop
end
start
note right
void renderWith(Renderer renderer)
end note
if (renderer instanceof TextRenderer ) then (yes) 
:((TextRenderer )renderer).render(this);;
else (no)
:throw new IllegalArgumentException(renderer+
" does not implements TextRenderer.");;
stop
endif 
end
@enduml

