@startuml
!pragma layout smetana
start
note right
constructor Oval(GraphPoint center,double width,
double height,GraphicAttributes attributes)
end note
:super (center,width,height,attributes);;
end
start
note right
void renderWith(Renderer renderer)
end note
if (renderer instanceof OvalRenderer ) then (yes) 
:((OvalRenderer )renderer).render(this);;
else (no)
:throw new IllegalArgumentException(renderer+
" does not implements OvalRenderer.");;
stop
endif 
end
@enduml

