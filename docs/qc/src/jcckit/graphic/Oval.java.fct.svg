@startuml
!pragma layout smetana
start
note right
constructor Oval(GraphPointcenter,doublewidth,
doubleheight,GraphicAttributesattributes)
end note
:super (center,width,height,attributes);;
end
start
note right
void renderWith(Rendererrenderer)
end note
if (renderer instanceof OvalRenderer) then (yes) 
:((OvalRenderer)renderer).render(this);;
else (no)
:throw new IllegalArgumentException(renderer+
" does not implements OvalRenderer.");;
stop
endif 
end
@enduml

