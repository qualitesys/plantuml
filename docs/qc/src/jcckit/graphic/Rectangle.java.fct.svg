@startuml
!pragma layout smetana
start
note right
constructor Rectangle(GraphPointcenter,doublewidth,
doubleheight,GraphicAttributesattributes)
end note
:super (attributes);;
:_center=center;;
:_width=width;;
:_height=height;;
end
start
note right
GraphPointgetCenter()
end note
:return _center;;
stop
end
start
note right
doublegetWidth()
end note
:return _width;;
stop
end
start
note right
doublegetHeight()
end note
:return _height;;
stop
end
start
note right
void renderWith(Rendererrenderer)
end note
if (renderer instanceof RectangleRenderer) then (yes) 
:((RectangleRenderer)renderer).render(this);;
else (no)
:throw new IllegalArgumentException(renderer+
" does not implements RectangleRenderer.");;
stop
endif 
end
@enduml

