@startuml
!pragma layout smetana
start
note right
constructor Rectangle(GraphPoint center,double width,
double height,GraphicAttributes attributes)
end note
:super (attributes);;
:_center=center;;
:_width=width;;
:_height=height;;
end
start
note right
GraphPoint getCenter()
end note
:return _center;;
stop
end
start
note right
double getWidth()
end note
:return _width;;
stop
end
start
note right
double getHeight()
end note
:return _height;;
stop
end
start
note right
void renderWith(Renderer renderer)
end note
if (renderer instanceof RectangleRenderer ) then (yes) 
:((RectangleRenderer )renderer).render(this);;
else (no)
:throw new IllegalArgumentException(renderer+
" does not implements RectangleRenderer.");;
stop
endif 
end
@enduml

