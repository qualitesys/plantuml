@startuml
!pragma layout smetana
start
note right
constructor Polygon(GraphicAttributesattributes,
booleanclosed)
end note
:super (attributes);;
:_closed=closed;;
end
start
note right
booleanisClosed()
end note
:return _closed;;
stop
end
start
note right
intgetNumberOfPoints()
end note
:return _points.size();;
stop
end
start
note right
GraphPointgetPoint(intindex)
end note
:return (GraphPoint)_points.elementAt(index);;
stop
end
start
note right
void addPoint(GraphPointpoint)
end note
:_points.addElement(point);;
end
start
note right
void removeAllPoints()
end note
:_points.removeAllElements();;
end
start
note right
void replacePointAt(intindex,GraphPointpoint)
end note
:_points.setElementAt(point,index);;
end
start
note right
void renderWith(Rendererrenderer)
end note
if (renderer instanceof PolygonRenderer) then (yes) 
:((PolygonRenderer)renderer).render(this);;
else (no)
:throw new IllegalArgumentException(renderer+
" does not implements PolygonRenderer.");;
stop
endif 
end
@enduml

