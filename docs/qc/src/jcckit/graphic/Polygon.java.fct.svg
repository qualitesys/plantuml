@startuml
!pragma layout smetana
start
note right
constructor Polygon(GraphicAttributes attributes,
boolean closed)
end note
:super (attributes);;
:_closed=closed;;
end
start
note right
boolean isClosed()
end note
:return _closed;;
stop
end
start
note right
int getNumberOfPoints()
end note
:return _points.size();;
stop
end
start
note right
GraphPoint getPoint(int index)
end note
:return (GraphPoint )_points.elementAt(index);;
stop
end
start
note right
void addPoint(GraphPoint point)
end note
:_points.addElement(point);;
end
start
note right
void removeAllPoints()
end note
:_points.removeAllElements();;
end
start
note right
void replacePointAt(int index,GraphPoint point)
end note
:_points.setElementAt(point,index);;
end
start
note right
void renderWith(Renderer renderer)
end note
if (renderer instanceof PolygonRenderer ) then (yes) 
:((PolygonRenderer )renderer).render(this);;
else (no)
:throw new IllegalArgumentException(renderer+
" does not implements PolygonRenderer.");;
stop
endif 
end
@enduml

