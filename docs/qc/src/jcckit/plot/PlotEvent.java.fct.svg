@startuml
!pragma layout smetana
start
note right
constructor PlotEvent(Plot source,PlotEventType type,
Object message)
end note
:_source=source;;
:_type=type;;
:_message=message;;
end
start
note right
Plot getSource()
end note
:return _source;;
stop
end
start
note right
PlotEventType getType()
end note
:return _type;;
stop
end
start
note right
Object getMessage()
end note
:return _message;;
stop
end
@enduml

