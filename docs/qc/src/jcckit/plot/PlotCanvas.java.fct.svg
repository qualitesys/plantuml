;"/><line style="stroke:#181818;stroke-width:1.0;" x1="192.5" x2="192.5" y1="1260.8945" y2="1283.4609"/><polygon fill="#181818" points="188.5,1273.4609,192.5,1283.4609,196.5,1273.4609,192.5,1277.4609" style="stroke:#181818;stroke-width:1.0;"/><!--MD5=[ff8635c01392dfac108fc5d59610444f]
@startuml
!pragma layout smetana
start
note right
constructor PlotCanvas(ConfigParametersconfig)
end note
:double[]paper=config.getDoubleArray(PAPER_KEY,
new double[]{0,0,1,0.6});;
:_paper=new ClippingRectangle(paper[0],paper[1],
paper[2],paper[3]);;
:_horizontalAnchor=Anchor.getHorizontalAnchor(config,
HORIZONTAL_ANCHOR_KEY,Anchor.CENTER);;
:_verticalAnchor=Anchor.getVerticalAnchor(config,
VERTICAL_ANCHOR_KEY,Anchor.CENTER);;
:_plot=new Plot(config.getNode(PLOT_KEY));;
:_plot.addPlotListener(this);;
end
start
note right
ClippingRectanglegetPaper()
end note
:return _paper;;
stop
end
start
note right
AnchorgetHorizontalAnchor()
end note
:return _horizontalAnchor;;
stop
end
start
note right
AnchorgetVerticalAnchor()
end note
:return _verticalAnchor;;
stop
end
start
note right
PlotgetPlot()
end note
:return _plot;;
stop
end
start
note right
void connect(DataPlotdataPlot)
end note
:_plot.connect(dataPlot);;
end
start
note right
void plotChanged(PlotEventevent)
end note
end
@enduml

