@startuml
!pragma layout smetana
start
note right
constructor AbstractSymbolFactory(ConfigParametersconfig)
end note
:_size=config.getDouble(SIZE_KEY,DEFAULT_SIZE);;
:_attributes=(GraphicAttributes)Factory.createOrGet(config.getNode(ATTRIBUTES_KEY),
null );;
end
start
note right
SymbolcreateSymbol(GraphPointpoint,HinthintFromPreviousPoint,
HinthintFromPreviousCurve)
end note
:GraphicAttributesattributes=_attributes;;
:HinthintForNextPoint=hintFromPreviousPoint;;
if (hintFromPreviousPoint instanceof AttributesHint) then (yes) 
:attributes=((AttributesHint)hintFromPreviousPoint)
.getAttributes();;
:hintForNextPoint=((AttributesHint)hintFromPreviousPoint)
.getNextHint();;
endif 
:return createSymbol(point,attributes,hintForNextPoint,
hintFromPreviousCurve);;
stop
end
start
note right
SymbolcreateSymbol(GraphPointpoint,GraphicAttributesattributes,
HinthintForNextPoint,HinthintFromPreviousCurve)
end note
:return new Symbol(createPlainSymbol(point,
_size,attributes),hintForNextPoint,hintFromPreviousCurve);;
stop
end
start
note right
GraphicalElementcreateLegendSymbol(GraphPointcenterPosition,
doublesize)
end note
:return createPlainSymbol(centerPosition,
_size,_attributes);;
stop
end
@enduml

