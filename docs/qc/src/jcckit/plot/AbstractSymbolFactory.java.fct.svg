@startuml
!pragma layout smetana
start
note right
constructor AbstractSymbolFactory(ConfigParameters config)
end note
:_size=config.getDouble(SIZE_KEY,DEFAULT_SIZE);;
:_attributes=(GraphicAttributes )Factory.createOrGet(config.getNode(ATTRIBUTES_KEY),
null );;
end
start
note right
Symbol createSymbol(GraphPoint point,Hint hintFromPreviousPoint,
Hint hintFromPreviousCurve)
end note
:GraphicAttributes attributes=_attributes;;
:Hint hintForNextPoint=hintFromPreviousPoint;;
if (hintFromPreviousPoint instanceof AttributesHint ) then (yes) 
:attributes=((AttributesHint )hintFromPreviousPoint)
.getAttributes();;
:hintForNextPoint=((AttributesHint )hintFromPreviousPoint)
.getNextHint();;
endif 
:return createSymbol(point,attributes,hintForNextPoint,
hintFromPreviousCurve);;
stop
end
start
note right
Symbol createSymbol(GraphPoint point,GraphicAttributes attributes,
Hint hintForNextPoint,Hint hintFromPreviousCurve)
end note
:return new Symbol(createPlainSymbol(point,
_size,attributes),hintForNextPoint,hintFromPreviousCurve);;
stop
end
start
note right
GraphicalElement createLegendSymbol(GraphPoint centerPosition,
double size)
end note
:return createPlainSymbol(centerPosition,
_size,_attributes);;
stop
end
@enduml

