@startuml
!pragma layout smetana
start
note right
constructor Symbol(GraphicalElement symbol,
Hint hintForNextPoint,Hint hintForNextCurve)
end note
:_symbol=symbol;;
:_hintForNextPoint=hintForNextPoint;;
:_hintForNextCurve=hintForNextCurve;;
end
start
note right
GraphicalElement getSymbol()
end note
:return _symbol;;
stop
end
start
note right
Hint getHintForNextPoint()
end note
:return _hintForNextPoint;;
stop
end
start
note right
Hint getHintForNextCurve()
end note
:return _hintForNextCurve;;
stop
end
@enduml

