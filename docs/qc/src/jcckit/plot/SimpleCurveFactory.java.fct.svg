@startuml
!pragma layout smetana
start
note right
constructor SimpleCurveFactory(ConfigParameters config)
end note
:String value=config.get(DEFINITIONS_KEY,
null );;
if (value!=null ) then (yes) 
:StringTokenizer tokenizer=new StringTokenizer(value);;
:_configs=new ConfigParameters[tokenizer.countTokens()];;
:_configs[i]=config.getNode(tokenizer.nextToken());;
endif 
end
start
note right
Curve create(int curveIndex,int numberOfCurves,
ClippingShape clippingShape,Legend legend)
end note
:return new SimpleCurve(_configs[curveIndex%_configs.length],
curveIndex,numberOfCurves,clippingShape,legend);;
stop
end
@enduml

