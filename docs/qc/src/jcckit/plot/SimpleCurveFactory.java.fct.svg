@startuml
!pragma layout smetana
start
note right
constructor SimpleCurveFactory(ConfigParametersconfig)
end note
:Stringvalue=config.get(DEFINITIONS_KEY,null );;
if (value!=null ) then (yes) 
:StringTokenizertokenizer=new StringTokenizer(value);;
:_configs=new ConfigParameters[tokenizer.countTokens()];;
:_configs[i]=config.getNode(tokenizer.nextToken());;
endif 
end
start
note right
Curvecreate(intcurveIndex,intnumberOfCurves,
ClippingShapeclippingShape,Legendlegend)
end note
:return new SimpleCurve(_configs[curveIndex%_configs.length],
curveIndex,numberOfCurves,clippingShape,legend);;
stop
end
@enduml

