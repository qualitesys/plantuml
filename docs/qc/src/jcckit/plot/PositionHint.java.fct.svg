@startuml
!pragma layout smetana
start
note right
constructor PositionHint(ConfigParameters config)
end note
:double[] point=config.getDoubleArray(POSITION_KEY,
null );;
:_position=point==null ? null :new GraphPoint(point);;
:_origin=new GraphPoint(config.getDoubleArray(ORIGIN_KEY,
point));;
end
start
note right
constructor PositionHint(GraphPoint origin,
GraphPoint position)
end note
:_origin=origin;;
:_position=position;;
end
start
note right
GraphPoint getPosition()
end note
:return _position;;
stop
end
start
note right
GraphPoint getOrigin()
end note
:return _origin;;
stop
end
@enduml

