@startuml
!pragma layout smetana
start
note right
constructor DataCurve(String title)
end note
:_title=title;;
end
start
note right
constructor DataCurve(ConfigParameters config)
end note
:this(config.get(TITLE_KEY,""));;
:double[] xPoints=config.getDoubleArray(X_KEY);;
:double[] yPoints=config.getDoubleArray(Y_KEY);;
:int n=Math.min(xPoints.length,yPoints.length);;
:addElement(new DataPoint(xPoints[i],yPoints[i]));;
end
start
note right
DataContainer getContainer()
end note
:return _container;;
stop
end
start
note right
void setContainer(DataContainer container)
end note
:_container=container;;
end
start
note right
String getTitle()
end note
:return _title;;
stop
end
start
note right
boolean isValid(DataElement element)
end note
:return element instanceof DataPoint ;;
stop
end
@enduml

