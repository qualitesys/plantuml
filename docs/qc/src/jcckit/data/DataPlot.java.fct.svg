@startuml
!pragma layout smetana
start
note right
constructor DataPlot()
end note
end
start
note right
constructor DataPlot(ConfigParameters config)
end note
:StringTokenizer tokenizer=new StringTokenizer(config.get(CURVES_KEY));;
while (tokenizer.hasMoreTokens())
:addElement(new DataCurve(config.getNode(tokenizer.nextToken())));;
endwhile
end
start
note right
DataPlot create(ConfigParameters config)
end note
:return new DataPlot(config.getNode(DATA_KEY));;
stop
end
start
note right
boolean isValid(DataElement element)
end note
:return element instanceof DataCurve ;;
stop
end
@enduml

